var _battleScene=null;
var G_autoBattle=false;
var G_battleSpeed=1;
var G_currentStageId=1;
var G_battlePaused=false;
var G_battleRunning=false;

// 战斗统计数据（按角色存储）
var G_battleStats={};
var G_battleUnitIdCounter=0;

function resetBattleStats(){
  G_battleStats={};
  G_battleUnitIdCounter=0;
  updateBattleStatsBoard();
}

function getUnitKey(unit){
  // 使用单位的唯一ID，如果没有则生成一个
  if(!unit.battleId){
    G_battleUnitIdCounter++;
    unit.battleId=(unit.isEnemy?'E':'P')+'_'+G_battleUnitIdCounter;
  }
  return unit.battleId;
}

function recordBattleStat(unit,stat,value){
  var key=getUnitKey(unit);
  if(!G_battleStats[key]){
    G_battleStats[key]={
      name:unit.name,
      icon:unit.icon,
      isEnemy:unit.isEnemy,
      battleId:unit.battleId,
      damage:0,heal:0,damageTaken:0,control:0,dodge:0,crit:0
    };
  }
  G_battleStats[key][stat]=(G_battleStats[key][stat]||0)+value;
  markStatsDirty();
}

function forceEndBattle(){
  if(!G_battleRunning){
    // 不在战斗中，直接返回关卡选择
    hideBattlePanel();
    switchTab('battle');
    return;
  }
  // 战斗中，需要确认
  var confirmed=confirm('确定要结束战斗吗？\n这将视为战斗失败。');
  if(confirmed){
    G_battleRunning=false;
    G_battlePaused=false;
    G_autoBattle=false;
    showToast('战斗已结束');
    hideBattlePanel();
    switchTab('battle');
  }
  // 点击取消时不做任何操作
}

function updateBattleStatsBoard(){
  // 计算统计数据（不分面板类型）
  var allyStats=[];
  var enemyStats=[];
  
  for(var key in G_battleStats){
    var stat=G_battleStats[key];
    if(stat.isEnemy){
      enemyStats.push(stat);
    }else{
      allyStats.push(stat);
    }
  }
  
  // 按输出排序
  allyStats.sort(function(a,b){return b.damage-a.damage;});
  enemyStats.sort(function(a,b){return b.damage-a.damage;});
  
  function renderStatRow(stat){
    var idNum=stat.battleId?stat.battleId.split('_')[1]:'';
    var displayName=stat.name+(idNum?' <span style="color:#888;font-size:9px">#'+idNum+'</span>':'');
    return '<div style="padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.1)">'
      +'<div style="display:flex;align-items:center;gap:4px;margin-bottom:2px">'
      +'<span style="font-size:14px">'+stat.icon+'</span>'
      +'<span style="flex:1;font-weight:bold;font-size:11px">'+displayName+'</span>'
      +'</div>'
      +'<div style="display:flex;gap:4px;flex-wrap:wrap;font-size:10px">'
      +'<span style="color:#ff6b6b">⚔️'+stat.damage+'</span>'
      +'<span style="color:#2ed573">💚'+stat.heal+'</span>'
      +'<span style="color:#ffa502">🛡️'+stat.damageTaken+'</span>'
      +'<span style="color:#a55eea">🎯'+stat.control+'</span>'
      +'<span style="color:#70a1ff">💨'+stat.dodge+'</span>'
      +'<span style="color:#ff4757">💥'+stat.crit+'</span>'
      +'</div>'
      +'</div>';
  }
  
  function renderToPanel(allyEl,enemyEl){
    if(!allyEl||!enemyEl)return;
    allyEl.innerHTML=allyStats.length>0?allyStats.map(renderStatRow).join(''):'<div class="text-dim">暂无数据</div>';
    enemyEl.innerHTML=enemyStats.length>0?enemyStats.map(renderStatRow).join(''):'<div class="text-dim">暂无数据</div>';
  }
  
  // 更新普通战斗面板
  renderToPanel(
    document.getElementById('ally-stats'),
    document.getElementById('enemy-stats')
  );
  
  // 更新竞技场战斗面板
  renderToPanel(
    document.getElementById('arena-ally-stats'),
    document.getElementById('arena-enemy-stats')
  );
}

function toggleBattlePause(){
  G_battlePaused=!G_battlePaused;
  showToast(G_battlePaused?'⏸️ 战斗已暂停':'▶️ 战斗继续');
  updatePauseButton();
}

function updatePauseButton(){
  var btn=document.getElementById('battle-pause-btn');
  if(btn){
    btn.textContent=G_battlePaused?'▶ 继续':'⏸ 暂停';
    if(G_battlePaused){
      btn.classList.add('paused');
    }else{
      btn.classList.remove('paused');
    }
  }
}
// ===== 战斗性能优化：DOM 缓存与对象池 =====
var _unitElCache = {};       // uid -> DOM 元素缓存
var _currentHighlight = null; // 当前高亮元素缓存
var _floatPool = [];         // 浮动数字对象池
var _statsDirty = false;     // 统计面板脏标记
var _logCount = 0;           // 日志计数器
var MAX_LOG_LINES = 100;     // 日志最大条数

function getUnitEl(unit) {
  // 使用 battleId 作为唯一标识（支持同名同头像的英雄）
  var uid = unit.battleId || (unit.name + '-' + unit.icon);
  // 检查缓存的元素是否仍在文档中
  if (_unitElCache[uid] && _unitElCache[uid].isConnected) return _unitElCache[uid];
  var el = document.querySelector('[data-battle-uid="' + uid + '"]');
  if (el) _unitElCache[uid] = el;
  return el;
}

function clearUnitElCache() { _unitElCache = {}; _currentHighlight = null; }

function showFloat(unit, text, cls) {
  var el = getUnitEl(unit);
  if (!el) return;
  var num;
  // 对象池复用
  if (_floatPool.length > 0) {
    num = _floatPool.pop();
    num.className = 'float-num ' + (cls || '');
    num.textContent = text;
    num.style.display = '';
  } else {
    num = document.createElement('div');
    num.className = 'float-num ' + (cls || '');
    num.textContent = text;
  }
  el.appendChild(num);
  setTimeout(function() {
    if (num.parentNode) num.parentNode.removeChild(num);
    num.style.display = 'none';
    if (_floatPool.length < 30) _floatPool.push(num); // 限制池大小
  }, 1100);
}

function showSkillEffect(skillIcon, skillName, elementClass) {
  if (!_battleScene) return;
  var overlay = document.createElement('div');
  overlay.className = 'skill-effect-overlay ' + (elementClass || '');
  overlay.innerHTML = '<div class="skill-effect-bg"></div><div class="skill-effect-text">' + skillIcon + ' ' + skillName + '</div>';
  _battleScene.appendChild(overlay);
  setTimeout(function() { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 900);
}

function animUnit(unit, cls, duration) {
  var el = getUnitEl(unit);
  if (!el) return;
  el.classList.add(cls);
  setTimeout(function() { el.classList.remove(cls); }, duration || 400);
}

function highlightUnit(unit) {
  if (_currentHighlight) { _currentHighlight.classList.remove('acting'); _currentHighlight = null; }
  var el = getUnitEl(unit);
  if (el) { el.classList.add('acting'); _currentHighlight = el; }
}

function clearHighlight() {
  if (_currentHighlight) { _currentHighlight.classList.remove('acting'); _currentHighlight = null; }
}

// 统计面板脏标记更新（延迟到渲染帧）
function markStatsDirty() {
  if (!_statsDirty) {
    _statsDirty = true;
    requestAnimationFrame(function() {
      if (_statsDirty) { updateBattleStatsBoard(); _statsDirty = false; }
    });
  }
}
function stopAutoBattle(){
  G_autoBattle=false;
  G_battleRunning=false;
  G_battlePaused=false;
}

function setBattleSpeed(spd){
  G_battleSpeed=spd;
  showToast('战斗倍速: x'+spd);
  // 更新固定战斗面板中的倍速按钮样式
  var speeds=[1,2,4,8];
  speeds.forEach(function(s){
    var btn=document.getElementById('speed-'+s);
    if(btn){
      if(s===spd){
        btn.classList.add('active');
      }else{
        btn.classList.remove('active');
      }
    }
  });
}

async function runBattle(stageId){
  // 如果战斗已在运行，不重复启动
  if(G_battleRunning){return;}
  G_battleRunning=true;
  G_battlePaused=false;
  updatePauseButton();
  
  const stage=getStage(stageId);
  if(!stage){G_battleRunning=false;return;}
  const teamHeroes=G.team.filter(h=>h!==null);
  if(teamHeroes.length===0){showToast('请先编队！');G_battleRunning=false;return;}

  let playerUnits=teamHeroes.map(h=>createBattleUnit(h,false));

  // 羁绊系统（通关20关后才生效）
  window._battleBondEffects=[];
  var activeBonds=detectActiveBonds(teamHeroes);
  var bondUnlocked=G.stageProgress>20;
  if(bondUnlocked){
    applyBondEffects(playerUnits,activeBonds);
  }

  let enemyUnits=stage.enemies.map(e=>{
    const tpl=HERO_TEMPLATES.find(t=>t.name===e.name)||HERO_TEMPLATES.find(t=>t.role===e.role&&t.quality===e.quality);
    const fakeHero=tpl?{...createHero(tpl.id,e.level),name:e.name,icon:e.icon,skills:e.skills,bonusSkills:[]}
      :{name:e.name,icon:e.icon,role:e.role,quality:e.quality,level:e.level,skills:e.skills,bonusSkills:[],
        maxHP:calcStat(ROLES[e.role]?ROLES[e.role].baseHP:100,QUALITY_MULT[e.quality]||1,e.level),
        atk:calcStat(ROLES[e.role]?ROLES[e.role].baseATK:15,QUALITY_MULT[e.quality]||1,e.level),
        def:calcStat(ROLES[e.role]?ROLES[e.role].baseDEF:10,QUALITY_MULT[e.quality]||1,e.level),
        spd:calcStat(ROLES[e.role]?ROLES[e.role].baseSPD:10,QUALITY_MULT[e.quality]||1,e.level),
        maxMP:calcStat(ROLES[e.role]?ROLES[e.role].baseMP:40,QUALITY_MULT[e.quality]||1,e.level),
        hp:0,mp:0,equipment:{weapon:null,armor:null,accessory:null}};
    fakeHero.hp=fakeHero.maxHP;fakeHero.mp=fakeHero.maxMP;
    var unit=createBattleUnit(fakeHero,true);
    if(e._physResist)unit._physResist=e._physResist;
    if(e._magicResist)unit._magicResist=e._magicResist;
    if(e._dodgeBonus)unit._dodgeBonus=e._dodgeBonus;
    if(e._defBonus)unit._defBonus=e._defBonus;
    if(e._regenPct)unit._regenPct=e._regenPct;
    if(e._atkBonus)unit._atkBonus=e._atkBonus;
    if(e._stunImmune)unit._stunImmune=e._stunImmune;
    if(e._antiHeal)unit._antiHeal=e._antiHeal;
    if(e._dotImmune)unit._dotImmune=e._dotImmune;
    if(e._counterPct)unit._counterPct=e._counterPct;
    if(e.shield>0)unit.shield=e.shield;
    return unit;
  });
  let allUnits=[...playerUnits,...enemyUnits];
  
  // 初始化战斗统计数据
  resetBattleStats();

  // 显示战斗面板，切换到战斗页（自动推图时跳过UI切换，后台执行）
  if(!G_autoBattle){
    currentTab='battle';
    document.querySelectorAll('.nav-btn').forEach(b=>{
      b.classList.toggle('active',b.dataset.tab==='battle');
    });
  }
  var battlePanel=document.getElementById('battle-panel');
  if(!battlePanel){showToast('战斗面板加载失败');G_battleRunning=false;return;}
  if(!G_autoBattle){
    battlePanel.style.display='';
    document.getElementById('content').style.display='none';
  }
  const logEl=document.getElementById('battle-log');
  const playerTeamEl=document.getElementById('player-team');
  const enemyTeamEl=document.getElementById('enemy-team');
  const battleInfoEl=document.getElementById('battle-info');
  const battleScene=document.getElementById('battle-scene');
  if(!logEl||!playerTeamEl||!enemyTeamEl||!battleInfoEl||!battleScene){showToast('战斗元素加载失败');G_battleRunning=false;return;}
  _battleScene=battleScene;
  var pbbRound=0;
  const roundBadge=document.getElementById('battle-round-badge');
  logEl.innerHTML='';
  _logCount = 0;
  _unitElCache = {};
  _currentHighlight = null;
  _floatPool = [];
  _statsDirty = false;
  battleInfoEl.innerHTML=`<div class="log-title">⚔️ 第${stage.id}章：${stage.name}</div><div class="text-dim text-sm">${stage.desc}</div>`;
  if(stage.modifiers&&stage.modifiers.length>0){
    battleInfoEl.innerHTML+='<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">'+stage.modifiers.map(function(m){return '<span class="stage-modifier-tag" style="font-size:11px;padding:2px 8px">'+m.name+' '+m.desc+'</span>'}).join('')+'</div>';
  }

  // 显示激活的羁绊
  if(bondUnlocked&&activeBonds.length>0){
    battleInfoEl.innerHTML+='<div style="margin-top:8px" id="battle-bonds-display">'+renderBondsHTML(activeBonds,true)+'</div>';
  }

  function log(msg,cls){
    cls=cls||'info';
    var line=document.createElement('div');
    line.className='log-line log-'+cls;
    line.textContent=msg;
    logEl.appendChild(line);
    logEl.scrollTop=logEl.scrollHeight;
  }

  // ===== renderTeams：首次全量渲染，后续增量更新 =====
  // 注意：_teamsRendered 必须是 runBattle 级别的变量，不能放在 renderTeams 内部
  var _teamsRendered = false;

  function renderTeams() {
    if (!_teamsRendered) {
      // 首次：全量 innerHTML 渲染
      _teamsRendered = true;
      playerTeamEl.innerHTML = playerUnits.map(u => buildUnitHTML(u, false)).join('');
      enemyTeamEl.innerHTML = enemyUnits.map(u => buildUnitHTML(u, true)).join('');
      // 缓存所有元素引用
      playerUnits.forEach(function(u) { getUnitEl(u); });
      enemyUnits.forEach(function(u) { getUnitEl(u); });
    } else {
      // 后续：增量更新（只更新变化的属性）
      playerUnits.forEach(function(u) { updateUnitDOM(u); });
      enemyUnits.forEach(function(u) { updateUnitDOM(u); });
    }
  }

  function buildUnitHTML(u, isEnemy) {
    var hpPct = Math.max(0, (u.hp / u.maxHP) * 100);
    var mpPct = Math.max(0, (u.mp / u.maxMP) * 100);
    var shieldPct = u.maxHP > 0 ? Math.min(100, (u.shield / u.maxHP) * 100) : 0;
    var isLow = hpPct < 30;
    var roleIcon = ROLES[u.hero.role] ? ROLES[u.hero.role].icon : '⚔️';
    var buffsHTML = u.buffs.map(function(b) {
      var isPos = b.mult > 1 || b.stat === 'taunt' || b.stat === 'dodge' || b.stat === 'reflect' || b.stat === 'stun';
      return '<span class="buff-tag ' + (isPos ? 'buff-positive' : 'buff-negative') + '">' + (b.name || b.stat) + (b.duration > 0 ? '(' + b.duration + ')' : '') + '</span>';
    }).join('');
    var dotsHTML = u.dot.map(function(d) { return '<span class="buff-tag buff-dot">' + d.name + '(' + d.duration + ')</span>'; }).join('');
    var sideClass = isEnemy ? 'enemy-unit' : 'ally-unit';
    return '<div class="battle-unit ' + sideClass + ' ' + (u.alive ? '' : 'dead') + '" data-battle-uid="' + (u.battleId || (u.name + '-' + u.icon)) + '">'
      + '<div class="unit-avatar-wrap">'
      + '<div class="unit-role-icon">' + roleIcon + '</div>'
      + '<div class="unit-avatar quality-' + u.hero.quality + '">' + u.icon + '</div>'
      + '<div class="unit-level">' + u.hero.level + '</div>'
      + '</div>'
      + '<div class="unit-name">' + u.name + '</div>'
      + '<div class="unit-bars">'
      + '<div class="unit-bar"><span class="unit-bar-label">HP</span><div class="unit-bar-track"><div class="unit-bar-fill hp ' + (isLow ? 'low' : '') + '" style="width:' + hpPct + '%"></div></div><span class="unit-bar-val">' + Math.max(0, u.hp) + '/' + u.maxHP + '</span></div>'
      + '<div class="unit-bar"><span class="unit-bar-label">MP</span><div class="unit-bar-track"><div class="unit-bar-fill mp" style="width:' + mpPct + '%"></div></div><span class="unit-bar-val">' + u.mp + '/' + u.maxMP + '</span></div>'
      + (u.shield > 0 ? '<div class="unit-bar unit-shield-bar"><span class="unit-bar-label" style="color:#54a0ff">🛡</span><div class="unit-bar-track"><div class="unit-bar-fill shield-bar" style="width:' + shieldPct + '%"></div></div><span class="unit-bar-val" style="color:#54a0ff">' + u.shield + '</span></div>' : '')
      + '</div>'
      + '<div class="unit-buffs">' + buffsHTML + dotsHTML + '</div>'
      + '</div>';
  }

  function updateUnitDOM(u) {
    // 使用 battleId 获取元素（支持同名同头像的英雄）
    var uid = u.battleId || (u.name + '-' + u.icon);
    var el = _unitElCache[uid];
    if (!el || !el.isConnected) {
      el = document.querySelector('[data-battle-uid="' + uid + '"]');
      if (el) _unitElCache[uid] = el;
    }
    if (!el) return;

    // 更新存活状态
    if (u.alive) { el.classList.remove('dead'); }
    else { el.classList.add('dead'); }

    // 更新 HP 条（第一个 .unit-bar）
    var hpPct = Math.max(0, (u.hp / u.maxHP) * 100);
    var hpBar = el.querySelector('.unit-bar');
    if (hpBar) {
      var hpFill = hpBar.querySelector('.unit-bar-fill.hp');
      if (hpFill) {
        hpFill.style.width = hpPct + '%';
        if (hpPct < 30) hpFill.classList.add('low');
        else hpFill.classList.remove('low');
      }
      var hpVal = hpBar.querySelector('.unit-bar-val');
      if (hpVal) hpVal.textContent = Math.max(0, u.hp) + '/' + u.maxHP;
    }

    // 更新 MP 条（第二个 .unit-bar）
    var mpPct = Math.max(0, (u.mp / u.maxMP) * 100);
    var mpBars = el.querySelectorAll('.unit-bar');
    if (mpBars.length > 1) {
      var mpFill = mpBars[1].querySelector('.unit-bar-fill.mp');
      if (mpFill) mpFill.style.width = mpPct + '%';
      var mpVal = mpBars[1].querySelector('.unit-bar-val');
      if (mpVal) mpVal.textContent = u.mp + '/' + u.maxMP;
    }

    // 更新护盾
    var shieldBar = el.querySelector('.unit-shield-bar');
    if (u.shield > 0) {
      if (!shieldBar) {
        var barsDiv = el.querySelector('.unit-bars');
        if (barsDiv) {
          var shieldPct = u.maxHP > 0 ? Math.min(100, (u.shield / u.maxHP) * 100) : 0;
          barsDiv.insertAdjacentHTML('beforeend',
            '<div class="unit-bar unit-shield-bar"><span class="unit-bar-label" style="color:#54a0ff">🛡</span><div class="unit-bar-track"><div class="unit-bar-fill shield-bar" style="width:' + shieldPct + '%"></div></div><span class="unit-bar-val" style="color:#54a0ff">' + u.shield + '</span></div>');
        }
      } else {
        var shieldPct = u.maxHP > 0 ? Math.min(100, (u.shield / u.maxHP) * 100) : 0;
        shieldBar.querySelector('.unit-bar-fill').style.width = shieldPct + '%';
        shieldBar.querySelector('.unit-bar-val').textContent = u.shield;
      }
    }

    // 更新 buff/dot 显示
    var buffsDiv = el.querySelector('.unit-buffs');
    if (buffsDiv) {
      var buffsHTML = u.buffs.map(function(b) {
        var isPos = b.mult > 1 || b.stat === 'taunt' || b.stat === 'dodge' || b.stat === 'reflect' || b.stat === 'stun';
        return '<span class="buff-tag ' + (isPos ? 'buff-positive' : 'buff-negative') + '">' + (b.name || b.stat) + (b.duration > 0 ? '(' + b.duration + ')' : '') + '</span>';
      }).join('');
      var dotsHTML = u.dot.map(function(d) { return '<span class="buff-tag buff-dot">' + d.name + '(' + d.duration + ')</span>'; }).join('');
      buffsDiv.innerHTML = buffsHTML + dotsHTML;
    }
  }

  renderTeams();
  log('⚔️ 战斗开始！','title');
  await sleep(600);

  let round=0;
  const maxRounds=30;

  while(round<maxRounds){
    round++;
    pbbRound=round;
    roundBadge.textContent='回合 '+round;
    log('—— 第 '+round+' 回合 ——','title');
    // 每3回合有概率触发探索事件（地下城堡风格）
    if(round%3===0 && round<maxRounds-2){
      triggerExploreEvent(log);
      await sleep(200);
    }
    await sleep(300);

    allUnits.filter(u=>u.alive).forEach(function(u){
      // 治愈者：生命链接 - 每回合自动恢复5%生命值
      if(u.role==='healer' && !u.isEnemy){
        const regen=Math.floor(u.maxHP*0.05);
        u.hp=Math.min(u.maxHP,u.hp+regen);
        showFloat(u,'+'+regen+' 生命恢复','heal');
      }
      // 关卡特性：敌方生命回复
      if(u._regenPct&&u.isEnemy){
        var regenAmt=Math.floor(u.maxHP*u._regenPct);
        u.hp=Math.min(u.maxHP,u.hp+regenAmt);
        log(u.icon+u.name+' 回复了 '+regenAmt+' 生命','heal');
        showFloat(u,'+'+regenAmt,'heal');
      }

      // 装备特殊技能触发 - 回合开始 turnStart
      checkEquipSpecialSkill(u,'turnStart',null,allUnits);

      u.dot=u.dot.filter(d=>{
        // 关卡特性：免疫DOT
        if(u._dotImmune){d.duration--;return d.duration>0}
        // 术士：DOT伤害+50%
        let dotDmg=d.dmg;
        if(d.sourceRole==='warlock'){
          dotDmg=Math.floor(dotDmg*1.5);
        }
        u.hp=Math.max(0,u.hp-dotDmg);
        log(u.icon+u.name+' 受到 '+d.name+'，损失 '+dotDmg+' 生命','debuff');
        showFloat(u,'-'+dotDmg+' '+d.name,'damage');
        animUnit(u,'hit',300);
        // 记录DOT承伤
        recordBattleStat(u,'damageTaken',dotDmg);
        
        // 圣骑士：圣光庇护 - 受到致命伤害时保留1点生命
        if(u.hp<=0 && u.role==='paladin' && !u.isEnemy && !u.deathDefyUsed){
          u.hp=1;
          u.deathDefyUsed=true;
          log(u.icon+' '+u.name+' 触发圣光庇护，保留1点生命！','heal');
          showFloat(u,'圣光庇护！','heal');
        }else if(u.hp<=0){
          u.alive=false;
          log(u.icon+' '+u.name+' 倒下了...','death');
          animUnit(u,'dying',700);
        }
        d.duration--;
        return d.duration>0;
      });
      u.buffs=u.buffs.filter(b=>{b.duration--;return b.duration>0});
      // ===== 合成事件战斗效果（地牢） =====
      // 暗影侵蚀：每回合20%概率失控攻击队友
      if(!u.isEnemy && u.hero && u.hero.isShadowCursed && Math.random() < (u.hero.shadowCurseChance || 0.2)){
        var allies = allUnits.filter(function(a){ return !a.isEnemy && a.alive && a.uid !== u.uid; });
        if(allies.length > 0){
          var victim = allies[Math.floor(Math.random() * allies.length)];
          var betrayDmg = Math.floor(u.atk * 0.8);
          victim.hp = Math.max(0, victim.hp - betrayDmg);
          log('🌑 '+u.icon+u.name+' 暗影侵蚀发作！失控攻击了队友 '+victim.icon+victim.name+'，造成 '+betrayDmg+' 伤害！','debuff');
          showFloat(victim,'🌑-'+betrayDmg,'damage');
          animUnit(victim,'hit',300);
          if(victim.hp <= 0){ victim.alive = false; log(victim.icon+' '+victim.name+' 被队友击杀...','death'); animUnit(victim,'dying',700); }
        }
      }
      // 吟游诗人：全队士气+5%（首次回合给全队加buff）
      if(!u.isEnemy && u.hero && u.hero.isBard && u.hero.bardMorale && !u._bardBuffApplied){
        u._bardBuffApplied = true;
        var moraleMult = u.hero.bardMorale;
        allUnits.filter(function(a){ return !a.isEnemy && a.alive; }).forEach(function(ally){
          ally.atk = Math.floor(ally.atk * (1 + moraleMult));
          ally.maxHP = Math.floor(ally.maxHP * (1 + moraleMult));
          ally.hp = Math.min(ally.hp + Math.floor(ally.maxHP * moraleMult), ally.maxHP);
        });
        log('🎵 '+u.icon+u.name+' 吟唱「'+u.hero.bardPoem.name+'」！全队士气+5%！','buff');
        showFloat(u,'🎵士气+5%','heal');
      }
      // 变色龙：每场战斗首次回合随机获得一个职业被动
      if(!u.isEnemy && u.hero && u.hero.isChameleon && !u._chameleonApplied){
        u._chameleonApplied = true;
        var allRoles2 = Object.keys(ROLES).filter(function(r){ return r !== 'unknown'; });
        var chameleonRole = allRoles2[Math.floor(Math.random() * allRoles2.length)];
        var chameleonPassive = ROLES[chameleonRole].passive;
        if(chameleonPassive && chameleonPassive.stat){
          var cVal = chameleonPassive.mult || 0.1;
          u[chameleonPassive.stat] = Math.floor(u[chameleonPassive.stat] * (1 + cVal));
          log('🦎 '+u.icon+u.name+' 变色龙！临时获得'+ROLES[chameleonRole].name+'被动：'+chameleonPassive.stat+'+'+Math.floor(cVal*100)+'%','buff');
          showFloat(u,'🦎被动','buff');
        }
      }
      // 狂战士之血：HP越低攻击越高（基于基础攻击力计算，避免叠加）
      if(!u.isEnemy && u.hero && u.hero.isBerserker){
        var hpRatio = u.maxHP > 0 ? u.hp / u.maxHP : 0;
        // 保存基础攻击力（首次）
        if(!u._berserkBaseAtk) u._berserkBaseAtk = u.atk;
        // 根据HP比例计算加成（HP越低加成越高，最高80%）
        var berserkBonus = Math.floor(u._berserkBaseAtk * (1 - hpRatio) * (u.hero.berserkerMaxBonus || 0.8));
        u.atk = u._berserkBaseAtk + berserkBonus;
      }
      // 吸血鬼：攻击吸血15%
      if(!u.isEnemy && u.hero && u.hero.isVampire && !u._vampireApplied){
        u._vampireApplied = true;
        u._vampireLifesteal = u.hero.vampireLifesteal || 0.15;
      }
    });
    renderTeams();
    await sleep(200);

    if(!playerUnits.some(u=>u.alive)){log('💀 战斗失败...队伍全军覆没。','death');break}
    if(!enemyUnits.some(u=>u.alive)){log('🎉 战斗胜利！','title');break}

    const acting=[...allUnits.filter(u=>u.alive)].sort((a,b)=>b.spd-a.spd);

    for(const unit of acting){
      if(!unit.alive)continue;
      highlightUnit(unit);
      await sleep(200);

      if(unit.buffs.some(b=>b.stat==='stun')){
        log(unit.icon+' '+unit.name+' 处于眩晕状态，无法行动','info');
        showFloat(unit,'眩晕!','debuff-text');
        await sleep(300);
        clearHighlight();
        continue;
      }

      const allSkillIds=[...unit.hero.skills,...unit.bonusSkills];
      let chosenSkill=null;
      let skillId=null;

      // 智能AI选择技能
      const smartChoice=smartChooseSkill(unit,allUnits);
      if(smartChoice){
        skillId=smartChoice.id;
        chosenSkill=smartChoice.skill;
      }

      if(chosenSkill){
        // 金手指：无限蓝
        if(!(G_cheats.enabled && G_cheats.infiniteMP && !unit.isEnemy)){
          unit.mp-=chosenSkill.mpCost;
        }
        unit.cooldowns[skillId]=chosenSkill.cooldown;

        let effectClass='fire';
        if(chosenSkill.name.indexOf('冰')>=0||chosenSkill.name.indexOf('暴风雪')>=0)effectClass='ice';
        else if(chosenSkill.name.indexOf('暗')>=0||chosenSkill.name.indexOf('诅咒')>=0||chosenSkill.name.indexOf('灵魂')>=0)effectClass='dark';
        else if(chosenSkill.name.indexOf('圣')>=0||chosenSkill.name.indexOf('光')>=0||chosenSkill.name.indexOf('净化')>=0)effectClass='holy';
        else if(chosenSkill.name.indexOf('毒')>=0)effectClass='poison';
        else if(chosenSkill.type==='heal'||chosenSkill.type==='cleanse')effectClass='heal-effect';
        else if(chosenSkill.type==='shield')effectClass='shield-effect';

        showSkillEffect(chosenSkill.icon,chosenSkill.name,effectClass);
        showFloat(unit,chosenSkill.icon+chosenSkill.name,'skill-name');
        await sleep(400);

        const target=getValidTarget(unit,allUnits,chosenSkill.target);
        if(target){
          await executeSkillV2(unit,target,chosenSkill,allUnits,log);
          await sleep(300);
        }
      }else{
        const target=getValidTarget(unit,allUnits,'single_enemy');
        if(target){
          const r=calcDamage(unit,target,null);
          // MUD风格战斗描述 + 连击系统
          var comboNum=getCombo(unit);
          if(r.dodged){
            log(getBattleDesc('dodge',unit,target)||unit.icon+' '+unit.name+' 攻击 '+target.icon+target.name+'，但被闪避了！','info');
            showFloat(target,'闪避!','dodge');
            recordBattleStat(target,'dodge',1);
            resetCombo(unit);
          }else{
            let dmg=r.dmg;
            // 连击加成：每次连击+5%伤害，最高+30%
            if(comboNum>0){
              dmg=Math.floor(dmg*(1+Math.min(comboNum*0.05,0.3)));
            }
            const reflectBuff=target.buffs.find(b=>b.stat==='reflect');
            if(reflectBuff){
              const reflectDmg=Math.floor(dmg*reflectBuff.mult);
              unit.hp=Math.max(0,unit.hp-reflectDmg);
              log(target.icon+target.name+' 反弹了 '+reflectDmg+' 点伤害！','damage');
              showFloat(unit,'-'+reflectDmg+' 反弹','damage');
              animUnit(unit,'hit',300);
              if(unit.hp<=0){unit.alive=false;log(unit.icon+' '+unit.name+' 倒下了...','death');animUnit(unit,'dying',700)}
            }
            if(target.shield>0){const absorbed=Math.min(target.shield,dmg);target.shield-=absorbed;dmg-=absorbed;if(absorbed>0)showFloat(target,'🛡-'+absorbed,'shield-num')}
            target.hp=Math.max(0,target.hp-dmg);
            // MUD风格攻击描述
            if(r.crit){
              log(getBattleDesc('crit',unit,target),'crit');
            }else if(comboNum>0){
              log(getBattleDesc('combo',unit,target),'crit');
            }else{
              log(getBattleDesc('attack',unit,target),'damage');
            }
            log('  → 造成 '+dmg+' 点伤害'+(comboNum>0?' ('+(comboNum+1)+'连击)':''),r.crit?'crit':'damage');
            showFloat(target,(r.crit?'💥':'')+dmg,r.crit?'crit':'damage');
            animUnit(target,'hit',300);
            // 吸血鬼：攻击吸血
            if(!unit.isEnemy && unit.hero && unit.hero.isVampire && unit._vampireLifesteal && dmg > 0){
              var healAmt = Math.floor(dmg * unit._vampireLifesteal);
              if(healAmt > 0){
                unit.hp = Math.min(unit.maxHP, unit.hp + healAmt);
                showFloat(unit,'🧛+'+healAmt,'heal');
              }
            }
            // 记录统计数据
            recordBattleStat(unit,'damage',dmg);
            recordBattleStat(target,'damageTaken',dmg);
            if(r.crit)recordBattleStat(unit,'crit',1);
            // 连击计数
            addCombo(unit);
            // 装备特殊技能触发 - 攻击者 onAttack
            checkEquipSpecialSkill(unit,'onAttack',target,allUnits);
            // 反击机制：防御者有10%概率反击（守护者20%）
            if(target.alive && Math.random()<(target.role==='guardian'?0.2:0.1)){
              var counterResult=calcDamage(target,unit,null);
              var counterDmg=counterResult&&counterResult.dmg?Math.floor(counterResult.dmg*0.5):0;
              unit.hp=Math.max(0,unit.hp-counterDmg);
              log(getBattleDesc('counter',unit,target)+' 造成 '+counterDmg+' 点伤害！','skill');
              showFloat(unit,'⚡反击-'+counterDmg,'damage');
              animUnit(unit,'hit',300);
              recordBattleStat(target,'damage',counterDmg);
              if(unit.hp<=0){unit.alive=false;log(unit.icon+' '+unit.name+' 倒下了...','death');animUnit(unit,'dying',700)}
            }
            if(target.hp<=0){
              // 凤凰涅槃：死亡时自动复活一次
              if(!target.isEnemy && target.hero && target.hero.isPhoenix && !target.hero.phoenixUsed){
                target.hero.phoenixUsed = true;
                target.hp = Math.floor(target.maxHP * 0.5);
                target.alive = true;
                log('🔥 '+target.icon+target.name+' 凤凰涅槃！浴火重生！HP恢复50%！','buff');
                showFloat(target,'🔥重生','buff');
                animUnit(target,'heal',500);
              } else {
                target.alive=false;log(target.icon+' '+target.name+' 倒下了...','death');animUnit(target,'dying',700);
              }
              // 装备特殊技能触发 - 击杀 onKill
              if(!target.alive) checkEquipSpecialSkill(unit,'onKill',target,allUnits);
            } else {
              // 装备特殊技能触发 - 被攻击者 onHit
              checkEquipSpecialSkill(target,'onHit',unit,allUnits);
            }
          }
          markStatsDirty();
        }
      }

      for(let sid in unit.cooldowns){unit.cooldowns[sid]--}
      clearHighlight();
      renderTeams();
      await sleep(250);

      if(!playerUnits.some(u=>u.alive)){break}
      if(!enemyUnits.some(u=>u.alive)){break}
    }

    renderTeams();
    if(!playerUnits.some(u=>u.alive)){log('💀 战斗失败...队伍全军覆没。','death');break}
    if(!enemyUnits.some(u=>u.alive)){log('🎉 战斗胜利！','title');renderTeams();break}

    allUnits.filter(u=>u.alive).forEach(u=>{u.mp=Math.min(u.maxMP,u.mp+Math.floor(u.maxMP*0.05))});
  }

  if(round>=maxRounds){log('⏰ 回合用尽，战斗平局。','info')}

  // ===== 战后效果处理 =====
  playerUnits.forEach(function(u){
    if(!u.hero) return;
    // 定时炸弹：倒计时减1，到0时爆炸
    if(u.hero.isTimeBomb && u.hero.timeBombCountdown > 0){
      u.hero.timeBombCountdown--;
      if(u.hero.timeBombCountdown <= 0){
        var bombDmg = u.hero.timeBombDamage || 0;
        log('💣 '+u.icon+u.name+' 定时炸弹爆炸！对全体敌人造成 '+bombDmg+' 点伤害！','crit');
        enemyUnits.forEach(function(e){
          if(e.alive){
            e.hp = Math.max(0, e.hp - bombDmg);
            if(e.hp <= 0){ e.alive = false; log(e.icon+' '+e.name+' 被炸弹炸死！','death'); }
          }
        });
        u.hero.isTimeBomb = false;
      } else {
        log('💣 '+u.icon+u.name+' 定时炸弹倒计时: '+u.hero.timeBombCountdown,'info');
      }
    }
    // 吸血鬼：战后损失5%最大HP（永久）
    if(u.hero.isVampire && u.hero.vampireHPDrain){
      var drainHP = Math.max(1, Math.floor(u.hero.maxHP * u.hero.vampireHPDrain));
      u.hero.maxHP = Math.max(10, u.hero.maxHP - drainHP);
      u.hero.hp = u.hero.maxHP;
      log('🧛 '+u.icon+u.name+' 吸血鬼代价，最大HP -'+drainHP,'debuff');
    }
    // 寄生体：战后吸取随机队友10%属性成长
    if(u.hero.isParasite && u.hero.parasiteRate){
      var allies2 = playerUnits.filter(function(a){ return a.hero && a.uid !== u.uid && a.alive; });
      if(allies2.length > 0){
        var host = allies2[Math.floor(Math.random() * allies2.length)];
        var pRate = u.hero.parasiteRate;
        var stolenHP = Math.max(1, Math.floor((host.hero.maxHP || 100) * pRate * 0.01));
        var stolenAtk = Math.max(1, Math.floor((host.hero.atk || 10) * pRate * 0.01));
        // 限制寄生体属性增长上限（避免无限增长）
        var MAX_PARASITE_HP = 50000;
        var MAX_PARASITE_ATK = 5000;
        u.hero.maxHP = Math.min(MAX_PARASITE_HP, u.hero.maxHP + stolenHP);
        u.hero.atk = Math.min(MAX_PARASITE_ATK, u.hero.atk + stolenAtk);
        host.hero.maxHP = Math.max(10, host.hero.maxHP - stolenHP);
        host.hero.atk = Math.max(1, host.hero.atk - stolenAtk);
        log('🦠 '+u.icon+u.name+' 寄生吸取了 '+host.icon+host.name+' 的属性(HP+'+stolenHP+' ATK+'+stolenAtk+')','debuff');
      }
    }
  });

  const won=enemyUnits.every(u=>!u.alive);
  if(won){
    // 战斗胜利：清空敌方显示区域
    enemyTeamEl.innerHTML='';
    const rw=stage.rewards;
    // 记录怪物图鉴
    recordMonsterCodex(stage.enemies||enemyUnits);
    G.exploreStats.totalBattles++;
    // PVE连胜奖励
    if(stage.isBoss) G.pveWinStreak=(G.pveWinStreak||0)+1; // BOSS关才算连胜
    if(G.pveWinStreak>G.pveMaxStreak) G.pveMaxStreak=G.pveWinStreak;
    var streakBonus=1+Math.min(G.pveWinStreak*(G.pveWinStreak>3?0.08:0.05),0.5); // 最高50%
    // 英雄幸运特质：战斗奖励+15%
    var luckyBonus=1;
    teamHeroes.forEach(h=>{if(h.traits) h.traits.forEach(t=>{if(t.id==='lucky')luckyBonus+=0.15})});
    
    // 奖励受资源上限约束 + 连胜加成 + 幸运加成
    var totalBonus=streakBonus*luckyBonus;
    var finalGold=Math.floor((rw.gold||0)*totalBonus);
    var finalFood=Math.floor((rw.food||0)*totalBonus);
    var finalStone=Math.floor((rw.stone||0)*totalBonus);
    var finalIron=Math.floor((rw.iron||0)*totalBonus);
    G.resources.gold=Math.min((G.resources.gold||0)+finalGold, RESOURCE_LIMITS.gold);
    G.resources.food=Math.min((G.resources.food||0)+finalFood, RESOURCE_LIMITS.food);
    G.resources.stone=Math.min((G.resources.stone||0)+finalStone, RESOURCE_LIMITS.stone);
    G.resources.iron=Math.min((G.resources.iron||0)+finalIron, RESOURCE_LIMITS.iron);
    G.resources.gems=Math.min((G.resources.gems||0)+(rw.gems||0), RESOURCE_LIMITS.gems);
    if(stage.id>=G.stageProgress){G.stageProgress=stage.id+1}
    // 羁绊系统解锁提示（通关第20关）
    if(G.stageProgress===21 && !G._bondUnlockNotified){
      G._bondUnlockNotified=true;
      setTimeout(function(){showToast('🎉 羁绊系统已解锁！前往编队页面查看英雄羁绊加成');},1500);
    }
    G_currentStageId=stage.id+1;
    // 战术大师特质：经验+20%
    teamHeroes.forEach(h=>{
      var expBonus=1;
      if(h.traits) h.traits.forEach(t=>{if(t.id==='tactician')expBonus+=0.20});
      addHeroExp(h,Math.floor((rw.exp||0)*expBonus));
    });
    
    // 经验药水掉落（概率随关卡提升）
    var potionDrop=0;
    var potionChance=0.25+stage.id*0.03; // 基础25%，每关+3%
    if(Math.random()<potionChance){
      potionDrop=Math.floor((20+stage.id*5)*totalBonus);
      G.resources.expPotion=Math.min((G.resources.expPotion||0)+potionDrop,RESOURCE_LIMITS.expPotion);
    }
    
    let drop=null;
    if(Math.random()<0.3+stage.id*0.05){
      const possibleDrops=EQUIP_TEMPLATES.filter(e=>QUALITIES.indexOf(e.quality)<=Math.min(stage.id,4));
      if(possibleDrops.length>0){
        const tpl=pick(possibleDrops);
        drop={uid:++G.heroIdCounter,id:tpl.id,heroUid:null};
        G.equipment.push(drop);
        recordCodex('equipment',tpl.id);
      }
    }
    log('\n📦 战利品：💰'+(rw.gold||0)+' 🍞'+(rw.food||0)+' 🪨'+(rw.stone||0)+' ⛏️'+(rw.iron||0)+(rw.gems?' 💎'+rw.gems:'')+' ⭐经验+'+(rw.exp||0)+(potionDrop>0?' 🧪经验药水+'+potionDrop:'')+(drop?' 🎁'+EQUIP_TEMPLATES.find(t=>t.id===drop.id).name:''),'title');
    if(G.pveWinStreak>=3){
      log('🔥 '+G.pveWinStreak+'连胜！奖励加成 +'+Math.round((streakBonus-1)*100)+'%','crit');
    }
    if(luckyBonus>1) log('🍀 幸运加成 +'+Math.round((luckyBonus-1)*100)+'%','info');
    // 自动战斗时不显示胜利提示，只显示失败提示
    if(!G_autoBattle){
      showToast('战斗胜利！'+(G.pveWinStreak>=3?G.pveWinStreak+'连胜！':''));
    }
    
    // 更新成就统计
    updateStat('kills', stage.enemies.length);
    updateStat('goldEarned', finalGold);
    updateStat('gemsEarned', rw.gems || 0);
    updateStat('stageReached', stage.id + 1);
    
    // 更新未知英雄解锁任务进度
    updateUnknownQuestProgress('stages_cleared', 1);
    updateUnknownQuestProgress('enemies_killed', stage.enemies.length);
    
    // 检查战斗相关成就
    checkAchievement('battle_5');
    checkAchievement('battle_6');
  }else{
    showToast('战斗失败...');
  }

  updateResUI();
  renderTeams();
  saveGame();
  G_battlePaused=false;
  updatePauseButton();
  
  var btnArea=document.getElementById('battle-buttons');
  if(btnArea){
    if(G_autoBattle&&won){
      btnArea.innerHTML='<span class="text-gold text-sm">✅ 胜利！自动进入下一关...</span>';
      updateResUI();
      setTimeout(function(){
        G_battleRunning=false;
        startBattle(G_currentStageId);
      },1500/G_battleSpeed);
    }else if(G_autoBattle&&!won){
      // 自动推图失败：停止自动推图，不切回战斗页
      G_battleRunning=false;
      G_autoBattle=false;
      updateAutoBattleButtons(false);
      showToast('💀 自动推图失败！关卡 '+G_currentStageId);
    }else{
      G_battleRunning=false;
      G_autoBattle=false;
      updateAutoBattleButtons(false);
      // 非自动战斗：显示醒目的"返回"按钮
      btnArea.innerHTML='<div style="text-align:center;padding:16px 0">'
        +'<div style="font-size:16px;font-weight:bold;margin-bottom:8px">'+(won?'🎉 战斗胜利！':'💀 战斗失败...')+'</div>'
        +'<button class="btn btn-primary" onclick="forceEndBattle()" style="font-size:14px;padding:8px 32px">返回关卡选择</button>'
        +'</div>';
      
      // 战斗胜利后提交排行榜
      if(won && isCloudReady){
        var teamPower=0;
        for(var i=0;i<G.team.length;i++){
          if(G.team[i]) teamPower += calcHeroPower(G.team[i]);
        }
        var stageName = STAGES[G.stageProgress-1] ? STAGES[G.stageProgress-1].name : '';
        submitLeaderboard('stage',G.stageProgress,{stageName:stageName});
        submitLeaderboard('power',teamPower,{heroes:G.heroes?G.heroes.length:0});
        // 同时保存到云端
        saveToCloud();
      }
    }
    // 战斗结束清理缓存
    clearUnitElCache();
  }
}

async function executeSkillV2(user,target,skill,allUnits,logFn){
  const targets=Array.isArray(target)?target:[target];
  var userSide=user.isEnemy?'enemy':'ally';
  // 判断是否是变异技能
  var isMutated=false;
  if(user.hero && user.hero.mutatedSkills && user.hero.mutatedSkills.length>0){
    var allSIds=[].concat(user.hero.skills,user.bonusSkills);
    for(var msi=0;msi<allSIds.length;msi++){
      if(allSIds[msi]===skill.id){isMutated=user.hero.mutatedSkills.indexOf(msi)>=0;break;}
    }
  }
  switch(skill.type){
    case 'damage':
      if(skill.selfDamagePct){
        var selfDmg=Math.floor(user.hp*skill.selfDamagePct);
        user.hp=Math.max(1,user.hp-selfDmg);
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，消耗自身 '+selfDmg+' 生命！','debuff');
        showFloat(user,'-'+selfDmg,'damage');
      }
      if(skill.manaBurst){
        var burstCost=Math.floor(user.mp*0.3);
        user.mp=Math.max(0,user.mp-burstCost);
        var burstDmg=burstCost*3;
        skill={...skill,_burstDmg:burstDmg};
      }
      targets.forEach(t=>{
        if(!t.alive)return;
        var useSkill=skill;
        var r=calcDamage(user,t,useSkill);
        if(skill.executeThreshold&&t.hp<t.maxHP*skill.executeThreshold){
          r.dmg*=2;
        }
        if(skill._burstDmg){
          r.dmg=skill._burstDmg;
        }
        if(r.dodged){
          logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，但 '+t.icon+t.name+' 闪避了！','info');
          showFloat(t,'闪避!','dodge');
          recordBattleStat(t,'dodge',1);
          return;
        }
        let dmg=r.dmg;
        if(t.shield>0){const absorbed=Math.min(t.shield,dmg);t.shield-=absorbed;dmg-=absorbed;if(absorbed>0)showFloat(t,'🛡-'+absorbed,'shield-num')}
        t.hp=Math.max(0,t.hp-dmg);
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+(isMutated?' 🧬':'')+' 对 '+t.icon+t.name+' 造成 '+dmg+' 点伤害'+(r.crit?' 💥暴击！':'')+(skill.executeThreshold&&t.hp<t.maxHP*skill.executeThreshold?' ⚔️处决！':'')+(isMutated?' ✨变异':''),r.crit?'crit':'damage');
        showFloat(t,(r.crit?'💥':'')+(isMutated?'🧬':'')+dmg,r.crit?'crit':'damage');
        animUnit(t,'hit',300);
        recordBattleStat(user,'damage',dmg);
        recordBattleStat(t,'damageTaken',dmg);
        if(r.crit)recordBattleStat(user,'crit',1);
        if(skill.stunChance&&Math.random()<skill.stunChance){
          if(!t._stunImmune){
            t.buffs.push({stat:'stun',duration:1,name:'眩晕'});
            logFn(t.icon+t.name+' 被眩晕了！','debuff');
            showFloat(t,'眩晕!','debuff-text');
            recordBattleStat(user,'control',1);
          }else{
            logFn(t.icon+t.name+' 免疫眩晕！','info');
            showFloat(t,'免疫!','buff-text');
          }
        }
        if(skill.dot){
          if(!t._dotImmune){
            t.dot.push({dmg:Math.floor(user.atk*skill.dot.dmgPct),duration:skill.dot.duration,name:skill.dot.name,sourceRole:user.role});
            logFn(t.icon+t.name+' 被施加了 '+skill.dot.name+'！','debuff');
            showFloat(t,'☠'+skill.dot.name,'debuff-text');
          }else{
            logFn(t.icon+t.name+' 免疫DOT！','info');
          }
        }
        if(skill.debuff){const db=skill.debuff;if(db.stat==='all'){t.buffs.push({stat:'atk',mult:db.mult,duration:db.duration,name:'诅咒-攻'});t.buffs.push({stat:'def',mult:db.mult,duration:db.duration,name:'诅咒-防'})}else{t.buffs.push({stat:db.stat,mult:db.mult,duration:db.duration,name:'削弱'})}logFn(t.icon+t.name+' 被削弱了！','debuff');showFloat(t,'▼削弱','debuff-text')}
        if(skill.healPct){
          var healAmt=Math.floor(user.maxHP*skill.healPct);
          user.hp=Math.min(user.maxHP,user.hp+healAmt);
          logFn(user.icon+' '+user.name+' 恢复了 '+healAmt+' 生命','heal');
          showFloat(user,'+'+healAmt,'heal');
        }
        if(t.hp<=0){t.alive=false;logFn(t.icon+' '+t.name+' 倒下了...','death');animUnit(t,'dying',700)}
        // 关卡特性：反击
        if(t.alive&&t._counterPct&&dmg>0){
          var counterDmg=Math.floor(dmg*t._counterPct);
          user.hp=Math.max(0,user.hp-counterDmg);
          logFn(t.icon+t.name+' 反击了 '+user.icon+user.name+'，造成 '+counterDmg+' 伤害','damage');
          showFloat(user,'-'+counterDmg+' 反击','damage');
          if(user.hp<=0){user.alive=false;logFn(user.icon+' '+user.name+' 倒下了...','death');animUnit(user,'dying',700)}
        }
      });
      updateBattleStatsBoard();
      break;
    case 'heal':
      var totalHeal=0;
      var healMult=isMutated?1.4:1.0;
      var hasAntiHeal=allUnits.some(function(e){return e.isEnemy&&e._antiHeal&&e.alive});
      if(hasAntiHeal)healMult*=0.5;
      targets.forEach(t=>{
        if(!t.alive)return;
        const heal=Math.floor(t.maxHP*skill.healPct*healMult);
        t.hp=Math.min(t.maxHP,t.hp+heal);
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+(isMutated?' 🧬':'')+'，恢复 '+t.icon+t.name+' '+heal+' 点生命'+(hasAntiHeal?' (禁疗减半)':'')+(isMutated?' ✨变异+40%':''),'heal');
        showFloat(t,'+'+heal+(isMutated?'🧬':'')+(hasAntiHeal?'⚠️':''),'heal');animUnit(t,'heal-target',500);
        totalHeal+=heal;
      });
      // 记录施法者的治疗输出量（治疗自己或别人的总量）
      if(totalHeal>0)recordBattleStat(user,'heal',totalHeal);
      updateBattleStatsBoard();
      break;
    case 'buff':
      targets.forEach(t=>{
        if(!t.alive)return;
        t.buffs.push({...skill.buff,name:skill.name});
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，'+(t===user?'自身':'队友')+'获得增益效果','buff');
        showFloat(t,'↑'+skill.name,'buff-text');animUnit(t,'heal-target',500);
      });break;
    case 'shield':
      var shieldMult=isMutated?1.4:1.0;
      targets.forEach(t=>{
        if(!t.alive)return;
        const amt=Math.floor(t.maxHP*skill.shieldPct*shieldMult);
        t.shield+=amt;
        if(skill.buff){t.buffs.push({...skill.buff,name:skill.name})}
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+(isMutated?' 🧬':'')+'，为 '+t.icon+t.name+' 添加 '+amt+' 点护盾'+(isMutated?' ✨变异+40%':''),'buff');
        showFloat(t,'🛡+'+amt,'shield-num');animUnit(t,'shield-up',400);
      });break;
    case 'drain':
      targets.forEach(t=>{
        if(!t.alive)return;
        const r=calcDamage(user,t,skill);
        if(r.dodged){logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，但 '+t.icon+t.name+' 闪避了！','info');showFloat(t,'闪避!','dodge');return}
        let dmg=r.dmg;
        if(t.shield>0){const absorbed=Math.min(t.shield,dmg);t.shield-=absorbed;dmg-=absorbed}
        t.hp=Math.max(0,t.hp-dmg);
        // 变异技能吸血从50%提升到70%
        const drainRate=isMutated?0.7:0.5;
        const healAmt=Math.floor(dmg*drainRate);
        user.hp=Math.min(user.maxHP,user.hp+healAmt);
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+(isMutated?' 🧬':'')+'，对 '+t.icon+t.name+' 造成 '+dmg+' 伤害，恢复 '+healAmt+' 生命'+(isMutated?' ✨变异+40%吸血':''),'skill');
        showFloat(t,'-'+dmg,'damage');animUnit(t,'hit',300);
        showFloat(user,'+'+healAmt+(isMutated?'🧬':''),'heal');animUnit(user,'heal-target',500);
        if(t.hp<=0){t.alive=false;logFn(t.icon+' '+t.name+' 倒下了...','death');animUnit(t,'dying',700)}
      });break;
    case 'debuff':
      targets.forEach(t=>{
        if(!t.alive)return;
        const db=skill.debuff;
        if(db.stat==='all'){t.buffs.push({stat:'atk',mult:db.mult,duration:db.duration,name:'诅咒-攻'});t.buffs.push({stat:'def',mult:db.mult,duration:db.duration,name:'诅咒-防'})}else{t.buffs.push({stat:db.stat,mult:db.mult,duration:db.duration,name:'诅咒'})}
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，'+t.icon+t.name+' 被诅咒了！','debuff');
        showFloat(t,'▼'+skill.name,'debuff-text');
      });break;
    case 'cleanse':
      targets.forEach(t=>{
        if(!t.alive)return;
        const negCount=t.buffs.filter(b=>b.stat==='stun'||(b.stat==='atk'&&b.mult<1)||(b.stat==='def'&&b.mult<1)).length;
        t.buffs=t.buffs.filter(b=>!(b.stat==='stun'||(b.stat==='atk'&&b.mult<1)||(b.stat==='def'&&b.mult<1)));
        t.dot=[];
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，清除了 '+t.icon+t.name+' 的 '+negCount+' 个负面效果','heal');
        showFloat(t,'✨净化','buff-text');animUnit(t,'heal-target',500);
      });break;
    case 'revive':
      var deadAllies=allUnits.filter(function(u){return !u.alive&&u.isEnemy===user.isEnemy});
      if(deadAllies.length>0){
        var target2=deadAllies[0];
        target2.alive=true;
        target2.hp=Math.floor(target2.maxHP*skill.revivePct);
        target2.shield=0;
        target2.buffs=[];
        target2.dot=[];
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，复活了 '+target2.icon+target2.name+'！','heal');
        showFloat(target2,'🕊️复活!','heal');animUnit(target2,'heal-target',700);
        recordBattleStat(user,'heal',target2.hp);
      }else{
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，但没有可复活的目标','info');
      }
      break;
  }
}

function sleep(ms){
  return new Promise(function(r){
    var checkPause=function(){
      if(G_battlePaused){
        setTimeout(checkPause,100);
      }else{
        setTimeout(r,Math.max(20,ms/G_battleSpeed));
      }
    };
    checkPause();
  });
}

// ==================== 合成系统 ====================
function findMergeRecipe(heroUids){
  if(heroUids.length<2)return null;
  const heroes=heroUids.map(uid=>G.heroes.find(h=>h.uid==uid)).filter(Boolean);
  if(heroes.length<2)return null;
  return{recipe:{result:'__dynamic__',inheritSkills:true,lore:'英雄的融合创造了新的存在。'},usedHeroes:heroes};
}

// 异变概率配置
var G_MUTATION_RATE = 0.30;       // 30% 异变概率
var G_QUALITY_UP_RATE = 0.05;      // 5% 品质+1概率
var G_LEGENDARY_DIRECT_RATE = 0.03; // 3% 直接传说概率
var G_MYTHIC_DIRECT_RATE = 0.01;   // 1% 直接神话概率
var G_HIDDEN_DIRECT_RATE = 0.01;   // 1% 隐藏品质概率（固定）

// ==================== 属性上限突破系统 ====================
// 通过特定条件提升英雄属性上限
var STAT_CAP_BASE = {
  maxHP: 9999,
  atk: 999,
  def: 999,
  spd: 999,
  maxMP: 999
};

// 计算英雄实际属性上限（可突破）
function getHeroStatCap(hero) {
  var capMult = 1.0;
  
  // 隐藏品质突破上限
  if (hero.isHidden) capMult += 0.5;
  // 异变英雄突破
  else if (hero.isMutation) capMult += 0.3;
  
  // 隐藏融合规则突破
  if (hero.hiddenRule) {
    if (hero.hiddenRule.id === 'three_warriors') capMult += 0.2; // 三英战吕布
    if (hero.hiddenRule.id === 'tank_wall') capMult += 0.2; // 钢铁长城
    if (hero.hiddenRule.id === 'mage_circle') capMult += 0.2; // 奥术环流
    if (hero.hiddenRule.id === 'shadow_assault') capMult += 0.15; // 暗影突袭
    if (hero.hiddenRule.id === 'holy_trinity') capMult += 0.25; // 圣光三杰
    if (hero.hiddenRule.id === 'max_level') capMult += 0.3; // 巅峰融合
  }
  
  // 羁绊加成
  if (hero.bondInfo) capMult += 0.1;
  
  return {
    maxHP: Math.floor(STAT_CAP_BASE.maxHP * capMult),
    atk: Math.floor(STAT_CAP_BASE.atk * capMult),
    def: Math.floor(STAT_CAP_BASE.def * capMult),
    spd: Math.floor(STAT_CAP_BASE.spd * capMult),
    maxMP: Math.floor(STAT_CAP_BASE.maxMP * capMult)
  };
}

// 检查并应用属性上限突破
function applyStatCapBreak(hero) {
  var cap = getHeroStatCap(hero);
  var broke = false;
  var bonus = {};
  
  if (hero.maxHP > STAT_CAP_BASE.maxHP && hero.maxHP <= cap.maxHP) {
    bonus.maxHP = hero.maxHP - STAT_CAP_BASE.maxHP;
    broke = true;
  }
  if (hero.atk > STAT_CAP_BASE.atk && hero.atk <= cap.atk) {
    bonus.atk = hero.atk - STAT_CAP_BASE.atk;
    broke = true;
  }
  if (hero.def > STAT_CAP_BASE.def && hero.def <= cap.def) {
    bonus.def = hero.def - STAT_CAP_BASE.def;
    broke = true;
  }
  if (hero.spd > STAT_CAP_BASE.spd && hero.spd <= cap.spd) {
    bonus.spd = hero.spd - STAT_CAP_BASE.spd;
    broke = true;
  }
  if (hero.maxMP > STAT_CAP_BASE.maxMP && hero.maxMP <= cap.maxMP) {
    bonus.maxMP = hero.maxMP - STAT_CAP_BASE.maxMP;
    broke = true;
  }
  
  return { broke: broke, bonus: bonus, cap: cap };
}

function generateFusedHero(heroes){
  // === 初始化合成计数 ===
  if(!G.mergeTotalCount) G.mergeTotalCount=0;
  G.mergeTotalCount++;
  
  // === 初始化保底计数器 ===
  if(!G.mergeMythicPity) G.mergeMythicPity=0; // 神话保底计数
  if(!G.mergeHiddenPity) G.mergeHiddenPity=0; // 隐藏保底计数
  
  // === 保底规则：前20次内没出神话，第20次保底出神话 ===
  // === 保底规则：第21-100次内没出隐藏，第100次保底出隐藏 ===
  var mythicGuarantee = G.mergeMythicPity >= 19; // 第20次保底
  var hiddenGuarantee = G.mergeTotalCount > 20 && G.mergeHiddenPity >= 79; // 第100次保底(21-100共80次)
  
  // === 幸运值系统：影响异变概率 ===
  var luckyBonus = (G.mergeLucky||0) * 0.005; // 每点幸运+0.5%
  var effectiveMutationRate = Math.min(0.50, G_MUTATION_RATE + luckyBonus);
  
  // === 连击×10：必定异变（触发后进入5分钟冷却） ===
  var streakCount = (G.mergeStreak && G.mergeStreak.count) || 0;
  var streakNow = Date.now();
  var streakCooldownEnd = (G.mergeStreak && G.mergeStreak.cooldownEnd) || 0;
  var streakInCooldown = streakNow < streakCooldownEnd;
  var streakForceMutation = streakCount >= 10 && !streakInCooldown;
  
  // === 保底系统：连续10次无特殊触发，下次必定品质+1 ===
  var pityTrigger = false;
  if((G.mergePity||0) >= 10){
    pityTrigger = true;
    G.mergePity = 0;
  }
  
  // 基于输入英雄属性即时生成新英雄
  var inputIds=heroes.map(function(h){return h.id}).sort().join('+');
  var hash=hashStr(inputIds);
  
  // 1. 确定新品质：金手指强制 > 保底规则 > 正常计算
  var qualities=heroes.map(function(h){return QUALITIES.indexOf(h.quality)});
  var maxQ=Math.max.apply(null,qualities);
  var avgQ=Math.floor(qualities.reduce(function(s,v){return s+v},0)/qualities.length);
  // 新品质 = 平均品质，但不能超过最高品质
  var newQIdx=Math.min(maxQ,avgQ);
  var newQuality=QUALITIES[newQIdx];
  
  // 金手指强制品质（最高优先级）
  if(G_cheats.enabled && G_cheats.forceQuality){
    newQuality=G_cheats.forceQuality;
    newQIdx=QUALITIES.indexOf(newQuality);
  }
  
  // 2. 判定特殊结果
  var isMutation=G_cheats.forceMutation||streakForceMutation||Math.random()<effectiveMutationRate;
  var isQualityUp=false;
  var isDirectLegendary=false;
  var isDirectMythic=false;
  var isDirectHidden=false;
  var isGuaranteeMythic=false; // 神话保底标记
  var isGuaranteeHidden=false; // 隐藏保底标记
  
  // === 保底判定（最高优先级，不显示）===
  if(hiddenGuarantee){
    // 第100次保底出隐藏
    newQuality='hidden';
    newQIdx=QUALITIES.indexOf('hidden');
    isMutation=true;
    isDirectHidden=true;
    isGuaranteeHidden=true;
    G.mergeHiddenPity=0; // 重置隐藏保底计数
  }else if(mythicGuarantee){
    // 第20次保底出神话
    newQuality='mythic';
    newQIdx=QUALITIES.indexOf('mythic');
    isMutation=true;
    isDirectMythic=true;
    isGuaranteeMythic=true;
    G.mergeMythicPity=0; // 重置神话保底计数
    G.mergeHiddenPity=0; // 开始计算隐藏保底
  }else{
    // 正常随机判定
    // 先知之眼：应用品质概率加成
    var oracleBonus = G.oracleBonus || {};
    var hiddenRate = G_HIDDEN_DIRECT_RATE + (oracleBonus.hidden || 0);
    var mythicRate = G_MYTHIC_DIRECT_RATE + (oracleBonus.mythic || 0);
    var legendaryRate = G_LEGENDARY_DIRECT_RATE + (oracleBonus.legendary || 0);
    var qualityUpRate = G_QUALITY_UP_RATE + (oracleBonus.rare || 0);
    // 使用先知加成后清零（一次性）
    G.oracleBonus = {};
    
    // 0.1% 隐藏品质（最高优先级，无视当前品质）
    if(Math.random()<hiddenRate){
      newQuality='hidden';
      newQIdx=QUALITIES.indexOf('hidden');
      isMutation=true;
      isDirectHidden=true;
      // 出隐藏后，重置两个保底计数
      G.mergeMythicPity=0;
      G.mergeHiddenPity=0;
    }
    // 1% 直接神话
    else if(Math.random()<mythicRate){
      newQuality='mythic';
      newQIdx=QUALITIES.indexOf('mythic');
      isMutation=true;
      isDirectMythic=true;
      // 出神话后，重置神话保底，开始计算隐藏保底
      G.mergeMythicPity=0;
      G.mergeHiddenPity=0;
    }
    // 3% 直接传说
    else if(Math.random()<legendaryRate){
      newQuality='legendary';
      newQIdx=QUALITIES.indexOf('legendary');
      isMutation=true;
      isDirectLegendary=true;
    }
    // 5% 品质+1（不超过隐藏）
    else if(Math.random()<qualityUpRate && newQIdx<QUALITIES.length-1){
      newQIdx++;
      newQuality=QUALITIES[newQIdx];
      isMutation=true;
      isQualityUp=true;
    }
    
    // === 保底触发：连续10次无特殊结果，强制品质+1 ===
    if(pityTrigger && !isDirectHidden && !isDirectMythic && !isDirectLegendary && !isQualityUp){
      if(newQIdx < QUALITIES.length-1){
        newQIdx++;
        newQuality=QUALITIES[newQIdx];
        isMutation=true;
        isQualityUp=true;
      }
    }
    
    // === 反转合成（以弱胜强）：所有材料品质<=稀有时，5%直接史诗 ===
    var allLowQuality = qualities.every(function(q){return q<=1});
    var qualityGap = maxQ - Math.min.apply(null,qualities);
    var isUpset = false;
    if(allLowQuality && Math.random()<0.05 && !isDirectHidden && !isDirectMythic && !isDirectLegendary){
      newQuality='epic';
      newQIdx=QUALITIES.indexOf('epic');
      isMutation=true;
      isUpset=true;
    }
    // 材料品质差距大时，属性倍率下限提升到1.0
    var upsetBonus = (qualityGap>=2 && Math.random()<0.3);
    
    // === 保底计数器递增 ===
    if(!isDirectMythic && G.mergeTotalCount <= 20){
      G.mergeMythicPity++;
    }
    if(!isDirectHidden && G.mergeTotalCount > 20 && G.mergeTotalCount <= 100){
      G.mergeHiddenPity++;
    }
  }
  
  // === 未知英雄判定：1%概率生成未知品质英雄（需要连续登录2天解锁机制） ===
  var isUnknownHero = false;
  var unknownTemplate = null;
  
  // 检查未知英雄机制是否已解锁
  var unknownMechanismUnlocked = G.unknownHeroUnlocked || (G_cheats.enabled && G_cheats.forceUnknown);
  
  if(G_cheats.enabled && G_cheats.forceUnknown){
    isUnknownHero = true;
    newQuality = 'unknown';
    newQIdx = QUALITIES.indexOf('unknown');
    // 金手指指定模板或随机选择
    if(G_cheats.forceUnknownTemplate){
      unknownTemplate = UNKNOWN_HERO_TEMPLATES.find(function(t){return t.id===G_cheats.forceUnknownTemplate}) || UNKNOWN_HERO_TEMPLATES[0];
    }else{
      unknownTemplate = UNKNOWN_HERO_TEMPLATES[Math.floor(Math.random() * UNKNOWN_HERO_TEMPLATES.length)];
    }
    isMutation = true;
  }else if(unknownMechanismUnlocked && Math.random() < UNKNOWN_HERO_CONFIG.mergeChance){
    isUnknownHero = true;
    newQuality = 'unknown';
    newQIdx = QUALITIES.indexOf('unknown');
    // 随机选择一个未知英雄模板
    unknownTemplate = UNKNOWN_HERO_TEMPLATES[Math.floor(Math.random() * UNKNOWN_HERO_TEMPLATES.length)];
    isMutation = true;
  }
  
  // === 合成羁绊检测 ===
  var bondInfo = detectMergeBond(heroes);
  var bondMult = bondInfo ? bondInfo.mult : 1.0;
  
  // 3. 确定新职业：基于哈希从输入英雄职业中选（未知英雄使用模板职业）
  var allRoles=heroes.map(function(h){return h.role});
  var uniqueRoles=[];
  allRoles.forEach(function(r){if(uniqueRoles.indexOf(r)===-1)uniqueRoles.push(r)});
  var mainRole = isUnknownHero ? unknownTemplate.role : uniqueRoles[hash%uniqueRoles.length];
  
  // 4. 确定新技能 - 从职业技能池选取，优先材料中同职业技能，材料越多继承越多
  var roleSkillPool=ROLE_SKILLS[mainRole]||[];
  
  var prioritySkills=[];
  heroes.forEach(function(h){
    h.skills.forEach(function(s){
      if(roleSkillPool.indexOf(s)!==-1&&prioritySkills.indexOf(s)===-1)prioritySkills.push(s);
    });
    h.bonusSkills.forEach(function(s){
      if(roleSkillPool.indexOf(s)!==-1&&prioritySkills.indexOf(s)===-1)prioritySkills.push(s);
    });
  });
  
  var maxSkillCount=roleSkillPool.length;
  var skillCountByMaterials=Math.min(maxSkillCount,heroes.length);
  
  var newSkills;
  if(isUnknownHero){
    // 未知英雄使用模板专属技能
    newSkills = unknownTemplate.skills.slice();
  }else if(isDirectHidden){
    newSkills=roleSkillPool.slice();
  }else{
    if(prioritySkills.length>=skillCountByMaterials){
      newSkills=prioritySkills.slice(0,skillCountByMaterials);
    }else{
      var remainingSkills=roleSkillPool.filter(function(s){return prioritySkills.indexOf(s)===-1});
      var need=skillCountByMaterials-prioritySkills.length;
      var extraSkills=remainingSkills.slice(0,need);
      newSkills=prioritySkills.concat(extraSkills);
    }
  }
  
  if(newSkills.length===0&&roleSkillPool.length>0 && !isUnknownHero){
    newSkills=[roleSkillPool[Math.floor(Math.random()*roleSkillPool.length)]];
  }
  
  // === 获取当前天象加成 ===
  var omen = getCurrentOmen();
  var omenEffects = omen.effects || {};
  
  // === 技能变异：异变时10%概率某个技能变异（金手指可强制，天象可加成，技能卷轴可强制） ===
  var mutatedSkills = [];
  var forceMutate = G_cheats.enabled && G_cheats.forceSkillMutate;
  // 技能卷轴独立标记（不依赖金手指系统）
  if (G.mergeForceSkillMutate) {
    forceMutate = true;
  }
  // 天象强制技能变异
  if(omenEffects.forceSkillMutate){
    forceMutate = true;
  }
  // 天象增加变异概率
  var mutationBonus = omenEffects.mutationChance || 0;
  var skillMutateChance = 0.10 + mutationBonus;
  // 技能卷轴：无视 isMutation 条件，必定触发
  var scrollForce = !!G.mergeForceSkillMutate;
  if((isMutation || scrollForce) && newSkills.length > 0 && (forceMutate || Math.random() < skillMutateChance)){
    var mutIdx = Math.floor(Math.random() * newSkills.length);
    mutatedSkills.push(mutIdx);
    // 使用后自动关闭标记（天象强制不关闭）
    if(G.mergeForceSkillMutate) G.mergeForceSkillMutate = false;
    if(forceMutate && !(omenEffects.forceSkillMutate)) G_cheats.forceSkillMutate = false;
  }
  
  // === 天象强制异变 ===
  if(omenEffects.forceMutation && !isMutation){
    isMutation = true;
    // 如果没有其他异变类型，标记为天象异变
    if(!isQualityUp && !isDirectLegendary && !isDirectMythic && !isDirectHidden && !isUpset){
      isQualityUp = true;
      if(newQIdx < QUALITIES.length - 1){
        newQIdx++;
        newQuality = QUALITIES[newQIdx];
      }
    }
  }
  
  // 5. 确定新属性 - 随机选取属性增幅，品质越高选取越多/全属性概率越大，以材料平均值为基准
  var maxLevel=Math.max.apply(null,heroes.map(function(h){return h.level}));
  
  var avgMaterialHP=Math.floor(heroes.reduce(function(s,h){return s+h.maxHP},0)/heroes.length);
  var avgMaterialATK=Math.floor(heroes.reduce(function(s,h){return s+h.atk},0)/heroes.length);
  var avgMaterialDEF=Math.floor(heroes.reduce(function(s,h){return s+h.def},0)/heroes.length);
  var avgMaterialSPD=Math.floor(heroes.reduce(function(s,h){return s+h.spd},0)/heroes.length);
  var avgMaterialMP=Math.floor(heroes.reduce(function(s,h){return s+h.maxMP},0)/heroes.length);
  
  var qualityIdxMap={common:0,rare:1,epic:2,legendary:3,mythic:4,hidden:5,unknown:6};
  var newQIdx=QUALITIES.indexOf(newQuality);
  var resultQualityIdx=newQIdx>=0?newQIdx:0;
  
  // 未知英雄使用模板固定属性，不继承材料属性
  var maxHP, atk, def, spd, maxMP;
  var inheritMult = 1.0; // 默认值，未知英雄使用固定倍率

  if(isUnknownHero){
    // 未知英雄使用模板的隐藏属性
    maxHP = unknownTemplate.hiddenStats.maxHP;
    atk = unknownTemplate.hiddenStats.atk;
    def = unknownTemplate.hiddenStats.def;
    spd = unknownTemplate.hiddenStats.spd;
    maxMP = unknownTemplate.hiddenStats.maxMP;
    // 未知英雄使用固定继承倍率 4.0（与品质倍率一致）
    inheritMult = 4.0;
  }else{
    var minBoost=Math.max(1,1+Math.floor(resultQualityIdx/2));
    var maxBoost=5;
    var allBoostChance=0.05+resultQualityIdx*0.08;
    
    var statKeys=['maxHP','atk','def','spd','maxMP'];
    var statValues={maxHP:avgMaterialHP,atk:avgMaterialATK,def:avgMaterialDEF,spd:avgMaterialSPD,maxMP:avgMaterialMP};
    
    var boostedStats;
    if(isDirectHidden||Math.random()<allBoostChance){
      boostedStats=statKeys.slice();
    }else{
      var boostCount=minBoost+Math.floor(Math.random()*(maxBoost-minBoost+1));
      boostCount=Math.min(boostCount,statKeys.length);
      var shuffled=statKeys.slice().sort(function(){return Math.random()-0.5});
      boostedStats=shuffled.slice(0,boostCount);
    }
    
    var quantityBonus=1+(heroes.length-2)*0.1;
    var qualityBonus=1+resultQualityIdx*0.05;
    var inheritMult=1.2*quantityBonus*qualityBonus*bondMult;
    if(upsetBonus)inheritMult+=0.2;
    if(streakCount>=3)inheritMult+=0.1;
    
    maxHP=Math.max(1,Math.floor(avgMaterialHP*(boostedStats.indexOf('maxHP')>=0?inheritMult:1.0)));
    atk=Math.max(1,Math.floor(avgMaterialATK*(boostedStats.indexOf('atk')>=0?inheritMult:1.0)));
    def=Math.max(1,Math.floor(avgMaterialDEF*(boostedStats.indexOf('def')>=0?inheritMult:1.0)));
    spd=Math.max(1,Math.floor(avgMaterialSPD*(boostedStats.indexOf('spd')>=0?inheritMult:1.0)));
    maxMP=Math.max(1,Math.floor(avgMaterialMP*(boostedStats.indexOf('maxMP')>=0?inheritMult:1.0)));
    
    if(isDirectHidden||isMutation||isQualityUp||isDirectLegendary||isDirectMythic){
      maxHP=Math.floor(maxHP*1.3);
      atk=Math.floor(atk*1.3);
      def=Math.floor(def*1.3);
      spd=Math.floor(spd*1.3);
      maxMP=Math.floor(maxMP*1.3);
    }
  }
  
  // === 天象属性加成 ===
  if(omenEffects.statBonus){
    maxHP=Math.floor(maxHP*(1+omenEffects.statBonus));
    atk=Math.floor(atk*(1+omenEffects.statBonus));
    def=Math.floor(def*(1+omenEffects.statBonus));
    spd=Math.floor(spd*(1+omenEffects.statBonus));
    maxMP=Math.floor(maxMP*(1+omenEffects.statBonus));
  }
  if(omenEffects.atkBonus){
    atk=Math.floor(atk*(1+omenEffects.atkBonus));
  }
  
  // === 限制属性不超过品质上限 ===
  if(STAT_QUALITY_CAP && STAT_QUALITY_CAP[newQuality]){
    var cap=STAT_QUALITY_CAP[newQuality];
    maxHP=Math.min(maxHP,cap.maxHP);
    atk=Math.min(atk,cap.atk);
    def=Math.min(def,cap.def);
    spd=Math.min(spd,cap.spd);
    maxMP=Math.min(maxMP,cap.maxMP);
  }
  
  console.log('[Merge]',newQuality,mainRole,'mult='+inheritMult.toFixed(2),'finalHP='+maxHP);
  
  // === 隐藏融合规则检测 ===
  var hiddenRuleResult = null;
  var hiddenRuleBonus = '';
  var tempHero = {maxHP:maxHP,atk:atk,def:def,spd:spd,maxMP:maxMP,hp:maxHP,mp:maxMP,skills:newSkills,quality:newQuality,level:maxLevel,bonusSkills:[]};
  for(var i=0; i<HIDDEN_MERGE_RULES.length; i++){
    var rule = HIDDEN_MERGE_RULES[i];
    if(rule.check(heroes)){
      hiddenRuleResult = rule;
      hiddenRuleBonus = rule.effect(tempHero, heroes);
      // 应用规则效果后的属性
      maxHP = tempHero.maxHP;
      atk = tempHero.atk;
      def = tempHero.def;
      spd = tempHero.spd;
      maxMP = tempHero.maxMP;
      newQuality = tempHero.quality;
      maxLevel = tempHero.level;
      newSkills = tempHero.skills;
      break; // 只触发第一个匹配的规则
    }
  }
  
  // 6. 生成名称和图标
  var newName, icon, newLore;
  
  if(isUnknownHero){
    // 未知英雄使用隐藏的名称和图标
    newName = UNKNOWN_HERO_CONFIG.displayName;
    icon = UNKNOWN_HERO_CONFIG.displayIcon;
    newLore = '一个神秘的存在，其真实身份被未知的力量所遮蔽。完成特定的试炼任务后，或许能够揭开其真面目...';
  }else{
    var namePrefixes={
      warrior:['战','狂','铁','血','龙','雷','烈'],
      guardian:['圣','磐','不灭','永恒','钢铁','堡垒'],
      mage:['奥','星','虚空','深渊','混沌','元素'],
      healer:['圣','天','生命','光明','神圣','自然'],
      assassin:['影','暗','幽','幻','夜','魂'],
      ranger:['风','雷','疾','苍','天','猎'],
      warlock:['暗','虚空','噬魂','诅咒','冥','渊'],
      paladin:['圣','光','神','天启','审判','黎明']
    };
    var nameSuffixes={
      warrior:['战士','勇者','剑圣','战神','武圣','斗士'],
      guardian:['守卫','壁垒','守护者','铁壁','圣盾','堡垒'],
      mage:['法师','贤者','术士','大魔导师','星术师','元素使'],
      healer:['祭司','圣者','神官','治愈者','生命使','圣女'],
      assassin:['杀手','暗影','收割者','幽灵','夜行者','影刃'],
      ranger:['游侠','猎手','弓圣','风行者','神射手','鹰眼'],
      warlock:['术士','召唤师','噬魂者','冥王','虚空使','深渊者'],
      paladin:['骑士','圣骑','审判者','守护者','神卫','天骑']
    };
    var icons={
      warrior:['⚔️','🗡️','🪓','😤','🐉','⚡'],
      guardian:['🛡️','🏰','🗿','🔱','🧱','🔰'],
      mage:['🔮','🌟','❄️','🔥','💥','🌠'],
      healer:['💚','✝️','🌈','👼','🌳','🌟'],
      assassin:['🗡️','👤','🌑','👻','⚰️','🌙'],
      ranger:['🏹','⛈️','🌪️','🎯','🦅','🌟'],
      warlock:['👁️','😈','🌀','🩸','💀','🌑'],
      paladin:['✨','⚡','🛡️','🔰','🌟','⚜️']
    };
    var prefixes=namePrefixes[mainRole]||namePrefixes.warrior;
    var suffixes=nameSuffixes[mainRole]||nameSuffixes.warrior;
    var iconList=icons[mainRole]||icons.warrior;
    
    var prefix=prefixes[hash%prefixes.length];
    var suffix=suffixes[(hash>>4)%suffixes.length];
    icon=iconList[(hash>>8)%iconList.length];
    
    // 异变英雄名称前缀
    var qualityPrefix={common:'',rare:'精英',epic:'史诗',legendary:'传说',mythic:'神话',hidden:'✦隐藏'};
    var mutationPrefix=isDirectHidden?'✦异变·':isMutation?'☣️异变·':'';
    newName=mutationPrefix+(qualityPrefix[newQuality]||'')+prefix+suffix;
    
    newLore=isDirectHidden?
      '✦隐藏品质！由'+heroes.map(function(h){return h.name}).join('与')+'融合时发生奇迹异变，集所有素材技能于一身，拥有超越神话的力量。':
      isMutation?
      '☣️异变英雄！由'+heroes.map(function(h){return h.name}).join('与')+'融合时发生异变，拥有超越同品质的力量。':
      '由'+heroes.map(function(h){return h.name}).join('与')+'融合诞生的'+QUALITY_NAMES[newQuality]+'英雄。';
  }
  
  // 7. 创建英雄对象（maxLevel已在上面计算，含隐藏规则修正）
  var newHero={
    uid:++G.heroIdCounter,
    id:isUnknownHero?unknownTemplate.id:('fused_'+hash%100000+(isMutation?'_mut':'')),
    name:newName,
    icon:icon,
    role:mainRole,
    quality:newQuality,
    level:maxLevel,
    maxHP:maxHP,
    hp:maxHP,
    atk:atk,
    def:def,
    spd:spd,
    maxMP:maxMP,
    mp:maxMP,
    skills:newSkills,
    bonusSkills:[],
    equipment:{weapon:null,armor:null,accessory:null},
    exp:0,
    lore:newLore,
    deathDefyUsed: false,
    isMutation: isMutation,
    isHidden: !!isDirectHidden,
    isUpset: isUpset,
    bondInfo: bondInfo,
    mutatedSkills: mutatedSkills,
    hiddenRule: hiddenRuleResult ? {id: hiddenRuleResult.id, name: hiddenRuleResult.name, bonus: hiddenRuleBonus} : null,
    inheritMult: inheritMult,
    // 未知英雄特有属性
    isUnknown: isUnknownHero,
    unknownTemplate: isUnknownHero ? unknownTemplate : null,
    isUnlocked: isUnknownHero ? (G_cheats.enabled && G_cheats.unlockAllUnknown) : true, // 未知英雄初始未解锁（金手指自动解锁模式除外）
    displayName: isUnknownHero ? UNKNOWN_HERO_CONFIG.displayName : newName,
    displayIcon: isUnknownHero ? UNKNOWN_HERO_CONFIG.displayIcon : icon,
    displayRole: isUnknownHero ? UNKNOWN_HERO_CONFIG.displayRole : mainRole
  };
  
  // 金手指自动解锁：融合生成未知英雄时立即解锁
  if(isUnknownHero && G_cheats.enabled && G_cheats.unlockAllUnknown && unknownTemplate){
    newHero.isUnlocked = true;
    newHero.name = unknownTemplate.name;
    newHero.icon = unknownTemplate.icon;
    newHero.role = unknownTemplate.role;
    newHero.lore = unknownTemplate.lore;
    newHero.displayName = unknownTemplate.name;
    newHero.displayIcon = unknownTemplate.icon;
    newHero.displayRole = unknownTemplate.role;
  }
  
  // === 更新幸运值和保底 ===
  if(!G.mergeLucky) G.mergeLucky = 0;
  if(!G.mergePity) G.mergePity = 0;
  if(isDirectHidden || isDirectMythic || isDirectLegendary || isQualityUp || isUpset){
    G.mergeLucky = 0; // 特殊触发清零幸运值
    G.mergePity = 0;
  } else if(isMutation){
    G.mergeLucky = Math.max(0, G.mergeLucky - 2); // 异变减2
    G.mergePity = 0;
  } else {
    G.mergeLucky++; // 普通合成+1
    G.mergePity++;
  }
  
  return newHero;
}

function hashStr(str){
  var hash=5381;
  for(var i=0;i<str.length;i++){
    hash=((hash<<5)+hash)+str.charCodeAt(i);
    hash=hash&0x7fffffff;
  }
  return hash;
}


// ==================== 合成结果展示 ====================
function showMergeResult(hero, isQualityUp, oldQuality, materials, accident){
  var statNames2 = {maxHP:'HP',atk:'ATK',def:'DEF',spd:'SPD',maxMP:'MP'};
  var qualityColors={common:'#888',rare:'#4a9eff',epic:'#a855f7',legendary:'#f59e0b',mythic:'#ef4444',hidden:'#00ffcc',unknown:'#ff00ff'};
  var qualityBg={common:'rgba(136,136,136,.15)',rare:'rgba(74,158,255,.15)',epic:'rgba(168,85,247,.15)',legendary:'rgba(245,158,11,.15)',mythic:'rgba(239,68,68,.15)',hidden:'rgba(0,255,204,.12)',unknown:'rgba(255,0,255,.15)'};
  
  // 判断是否为未解锁的未知英雄
  var isUnknownLocked = hero.isUnknown && !hero.isUnlocked;
  var displayIcon = isUnknownLocked ? (hero.displayIcon || '❓') : hero.icon;
  var displayName = isUnknownLocked ? (hero.displayName || '???') : hero.name;
  
  // 创建特效层
  var effects='';
  if(hero.quality==='hidden'){
    effects='<div class="merge-mythic-flash" style="background:radial-gradient(ellipse at center,rgba(0,255,204,.6),transparent 50%),radial-gradient(ellipse at 20% 80%,rgba(0,200,255,.4),transparent 40%),radial-gradient(ellipse at 80% 20%,rgba(0,255,180,.4),transparent 40%)"></div><div class="merge-mythic-text" style="color:#00ffcc;text-shadow:0 0 40px rgba(0,255,204,.9),0 0 80px rgba(0,255,204,.5),0 4px 12px rgba(0,0,0,.8)">✦ 隐藏品质 ✦</div><div class="merge-mythic-particles"></div>';
  }else if(hero.quality==='mythic'){
    effects='<div class="merge-mythic-flash"></div><div class="merge-mythic-text">🔥 神话降临 🔥</div><div class="merge-mythic-particles"></div>';
  }else if(hero.quality==='legendary'){
    effects='<div class="merge-legendary-flash"></div><div class="merge-legendary-text">⚡ 传说诞生 ⚡</div>';
  }else if(isQualityUp){
    effects='<div class="merge-quality-up-flash"></div>';
  }else if(hero.isMutation){
    effects='<div class="merge-mutation-flash"></div>';
  }
  if(hero.bondInfo) effects+='<div class="merge-bond-flash"></div>';
  if(hero.isUpset) effects+='<div class="merge-upset-flash"></div>';
  if(G.mergeStreak && G.mergeStreak.count>=3) effects+='<div class="merge-streak-flash"></div>';
  
  // 材料信息区域（精简版）
  var matHtml='';
  if(materials && materials.length>0){
    matHtml='<div style="margin-top:12px;padding:10px 12px;background:rgba(0,0,0,.2);border-radius:8px;border:1px solid rgba(255,255,255,.06)">'
      +'<div style="font-size:11px;color:var(--text2)">材料: '+materials.map(function(h){
        return '<span class="q-'+h.quality+'" style="margin-right:6px">'+h.icon+h.name+' Lv.'+h.level+'</span>';
      }).join('')+'</div>'
      +'<div style="margin-top:4px;font-size:11px;color:var(--text2)">技能: '+hero.skills.length+'个'
      +(hero.mutatedSkills&&hero.mutatedSkills.length>0?' <span style="color:#d4a0ff">🧬 含变异技能</span>':'')
      +'</div>'
      +'</div>';
  }
  
  // 技能列表 - 变异技能高亮显示
  var stats=getHeroStats(hero);
  var hasMutated=hero.mutatedSkills&&hero.mutatedSkills.length>0;
  var mutatedNames=[];
  var mutatedSkillIds=[];
  var skillsHtml;
  if(isUnknownLocked){
    // 未知英雄隐藏技能名称
    skillsHtml = hero.skills.slice(0,6).map(function(s,i){
      return '<span class="merge-result-skill" style="background:rgba(255,0,255,.2);border-color:#ff00ff">❓???</span>';
    }).join('');
  }else{
    skillsHtml=hero.skills.slice(0,6).map(function(s,i){
      var isMut=hasMutated&&hero.mutatedSkills.indexOf(i)>=0;
      var skillData=SKILLS?SKILLS[s]:null;
      var displayName=skillData?skillData.name:s;
      if(isMut){
        mutatedNames.push(displayName);
        mutatedSkillIds.push(s);
      }
      var tip=skillData?' title="🧬 变异技能 - '+(skillData.desc||'')+'"':'';
      return '<span class="merge-result-skill'+(isMut?' merge-skill-mut':'')+'"'+tip+' data-skill-id="'+s+'" onclick="event.stopPropagation();showSkillDetail(\''+s+'\','+!!isMut+')">'+(isMut?'🧬':'')+displayName+(isMut?'✨':'')+'</span>';
    }).join('');
  }
  
  // 如果有变异技能，添加专门的变异提示区域（可点击查看详情）
  var mutateBanner='';
  if(hasMutated&&mutatedNames.length>0){
    // 使用单引号包裹的JSON字符串，避免HTML属性引号冲突
    var skillIdsJson=JSON.stringify(mutatedSkillIds).replace(/"/g,"'").replace(/'/g,"\\'");
    mutateBanner='<div style="margin:10px 0;padding:10px 14px;background:linear-gradient(135deg,rgba(168,85,247,.25),rgba(239,68,68,.15));border:1px solid #d4a0ff;border-radius:10px;text-align:center;cursor:pointer;box-shadow:0 0 16px rgba(168,85,247,.2)" onclick="event.stopPropagation();showMutatedSkillsDetail(JSON.parse(this.dataset.skillIds))" data-skill-ids=\''+JSON.stringify(mutatedSkillIds)+'\'>'
      +'<div style="font-size:14px;color:#d4a0ff;font-weight:bold;margin-bottom:4px">🧬 技能变异</div>'
      +'<div style="font-size:12px;color:var(--text2)">'+mutatedNames.join('、')+' 发生了变异</div>'
      +'<div style="font-size:10px;color:#a855f7;margin-top:6px;padding:2px 8px;background:rgba(168,85,247,.15);border-radius:8px;display:inline-block">点击查看详情</div>'
      +'</div>';
  }
  
  // 事件信息横幅（非爆炸事件在合成结果弹窗中显示）
  var accidentBanner='';
  if(accident && accident.accident){
    var accInfo=accident.accident;
    accidentBanner='<div style="margin:10px 0;padding:12px 14px;background:linear-gradient(135deg,rgba(255,68,68,.2),rgba(255,165,0,.1));border:1px solid '+accInfo.color+';border-radius:10px;text-align:center;box-shadow:0 0 16px rgba(255,68,68,.15)">'
      +'<div style="font-size:36px;margin-bottom:6px;animation:bounce 0.5s ease">'+accInfo.icon+'</div>'
      +'<div style="font-size:15px;font-weight:bold;color:'+accInfo.color+';margin-bottom:4px">合成事件：'+accInfo.name+'</div>'
      +'<div style="font-size:12px;color:var(--text);line-height:1.6">'+accident.message+'</div>'
      +'</div>';
  }
  
  var avgMatHP=materials&&materials.length>0?Math.floor(materials.reduce(function(s,h){return s+h.maxHP},0)/materials.length):0;

  var avgMatDEF=materials&&materials.length>0?Math.floor(materials.reduce(function(s,h){return s+h.def},0)/materials.length):0;
  var avgMatSPD=materials&&materials.length>0?Math.floor(materials.reduce(function(s,h){return s+h.spd},0)/materials.length):0;
  var avgMatMP=materials&&materials.length>0?Math.floor(materials.reduce(function(s,h){return s+h.maxMP},0)/materials.length):0;
  var avgMatPow=0;
  if(materials&&materials.length>0){
    avgMatPow=Math.floor(materials.reduce(function(s,h){return s+(calcHeroPower?calcHeroPower(h):0)},0)/materials.length);
  }
  
  function growthTag(cur,base){
    if(!base||base===0)return'';
    var d=cur-base;
    if(d>0)return'<span class="merge-stat-growth up">▲+'+d+'</span>';
    if(d<0)return'<span class="merge-stat-growth down">▼'+d+'</span>';
    return'<span class="merge-stat-growth" style="color:#888">—</span>';
  }
  
  var heroPower=calcHeroPower?calcHeroPower(hero):0;
  
  // 属性显示：未知英雄隐藏真实数值
  var displayHP = isUnknownLocked ? '???' : stats.maxHP;
  var displayATK = isUnknownLocked ? '???' : stats.atk;
  var displayDEF = isUnknownLocked ? '???' : stats.def;
  var displaySPD = isUnknownLocked ? '???' : stats.spd;
  var displayMP = isUnknownLocked ? '???' : stats.maxMP;
  var displayPower = isUnknownLocked ? '???' : heroPower;

      (hero.bondInfo?'<div class="merge-result-mutation" style="color:#5dade2">🔗 '+hero.bondInfo.name+' · '+hero.bondInfo.desc+'</div>':'')+
      (hero.isGeneMutation?'<div class="merge-result-mutation" style="color:#22d3ee">🧬 基因突变 · 获得'+(hero.geneMutatedPassive?hero.geneMutatedPassive.name:'')+'被动</div>':'')+
      (hero.inscription?'<div class="merge-result-mutation" style="color:#fb923c">📜 '+hero.inscription.name+' · '+hero.inscription.desc+'</div>':'')+
      (hero.isShadowCursed?'<div class="merge-result-mutation" style="color:#6366f1">🌑 暗影侵蚀 · 全属性+25% 但可能失控</div>':'')+
      (hero.isAwakened?'<div class="merge-result-mutation" style="color:#facc15">🏆 英雄觉醒 · 满级+额外天赋点</div>':'')+
      (hero.isFrogCursed?'<div class="merge-result-mutation" style="color:#4ade80">🐸 青蛙诅咒 · 3天后解除并+20%</div>':'')+

      (hero.isBalanced?'<div class="merge-result-mutation" style="color:#fbbf24">⚖️ 天平审判 · 属性重新分配</div>':'')+
      (hero.isReincarnated?'<div class="merge-result-mutation" style="color:#a78bfa">🔄 轮回转生 · 从'+(ROLES[hero.reincarnatedFrom]?ROLES[hero.reincarnatedFrom].name:'?')+'转生</div>':'')+
      (hero.isSoulSwap?'<div class="merge-result-mutation" style="color:#e879f9">🎭 灵魂交换 · 外观与属性不匹配</div>':'')+
      (hero.isPhoenix?'<div class="merge-result-mutation" style="color:#ef4444">🔥 凤凰涅槃 · 死亡复活一次'+(hero.phoenixUsed?'(已使用)':'')+'</div>':'')+

      (hero.isTimeBomb?'<div class="merge-result-mutation" style="color:#6b7280">💣 定时炸弹 · '+(hero.timeBombCountdown||0)+'场战斗后爆炸</div>':'')+

      '<div class="merge-result-name">'+displayName+'</div>'+

        '<div class="merge-result-stat">❤️ 生命<b>'+displayHP+(isUnknownLocked?'':growthTag(stats.maxHP,avgMatHP))+'</b></div>'+

function closeMergeResult(){
  var overlay=document.querySelector('.merge-result-overlay');
  // 清理所有可能的特效元素（包括新增的羁绊、连击、逆境等特效）
  var flashes=document.querySelectorAll('.merge-mythic-flash,.merge-legendary-flash,.merge-quality-up-flash,.merge-mutation-flash,.merge-mythic-text,.merge-legendary-text,.merge-mythic-particles,.merge-bond-flash,.merge-streak-flash,.merge-upset-flash,.merge-enhance-flash');
  if(overlay)overlay.remove();
  flashes.forEach(function(f){f.remove()});
}

const MERGE_ACCIDENT_RATE = 0.20; // 20%事件率（事件增多后提升）

function rollMergeAccident(hero, materials) {
  // 金手指强制事件：单次或持续模式
  var forceAccident = G_cheats.enabled && (G_cheats.forceAccident || G_cheats.alwaysAccident);
  if (forceAccident) { /* 金手指强制事件，跳过随机判定 */ }
  else if (Math.random() >= MERGE_ACCIDENT_RATE) return null;

  // 镜像数量限制：最多5个，达到后不再触发镜像事件
  var MAX_MIRROR_HEROES = 5;
  var currentMirrorCount = 0;
  if(G.heroes){
    for(var mi=0;mi<G.heroes.length;mi++){
      if(G.heroes[mi] && G.heroes[mi].isMirror) currentMirrorCount++;
    }
  }

  var total = 0;
  for (var k in MERGE_ACCIDENTS) {
    if (!G_cheats.disabledAccidents || !G_cheats.disabledAccidents[k]) {
      total += MERGE_ACCIDENTS[k].weight;
    }
  }
  // 如果镜像数量已达上限，从权重中排除镜像事件
  if(currentMirrorCount >= MAX_MIRROR_HEROES){
    if (!G_cheats.disabledAccidents || !G_cheats.disabledAccidents.mirror) {
      total -= (MERGE_ACCIDENTS.mirror ? MERGE_ACCIDENTS.mirror.weight : 0);
    }
  }
  var roll = Math.random() * total, cur = 0;
  var type = 'explosion';
  // 金手指指定事件类型：直接使用指定类型，跳过随机
  if (G_cheats.enabled && G_cheats.forceAccidentType && MERGE_ACCIDENTS[G_cheats.forceAccidentType]) {
    type = G_cheats.forceAccidentType;
  } else {
    for (var k in MERGE_ACCIDENTS) {
      // 跳过已禁用的事件

        hero.hp = hero.maxHP;
        hero.mp = hero.maxMP;
        hero.skills = (bestMaterial.skills || hero.skills).slice();
        hero.isMimic = true;
        hero.mimicSource = bestMaterial.name;
        result.hero = hero;
        result.message = '🎭 拟态者！完美复制了「' + bestMaterial.name + '」的全部属性！';
      } else {
        result.hero = hero;
        result.message = '🎭 拟态失败…没有可复制的材料。';
      }
      break;
  }
  return result;
}
