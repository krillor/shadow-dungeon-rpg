<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- TapTap H5 横竖屏声明：竖屏游戏 -->
<meta name="x5-orientation" content="portrait">
<meta name="screen-orientation" content="portrait">
<title>暗影地牢 - 文字策略RPG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a12;--panel:#141428;--panel2:#1a1a35;--border:#252548;--gold:#c9a227;--gold2:#e8d44d;--red:#c0392b;--green:#27ae60;--blue:#2980b9;--purple:#8e44ad;--text:#d4c5a0;--text2:#8a7d6b;--text3:#5a5245;--hp-bar:#c0392b;--mp-bar:#2980b9;--exp-bar:#27ae60;--nav-h:56px;--top-h:42px}
body{background:var(--bg);color:var(--text);font-family:'Microsoft YaHei','PingFang SC','SimHei',sans-serif;font-size:14px;overflow:hidden;height:100vh;width:100vw;-webkit-user-select:none;user-select:none}
#app{display:flex;flex-direction:column;height:100vh;width:100vw}

/* ===== 顶部栏 ===== */
#top-bar{height:var(--top-h);background:linear-gradient(180deg,#1a1a35,#141428);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:6px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;flex-wrap:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.3)}
#top-bar::-webkit-scrollbar{display:none}
.res-item{display:flex;align-items:center;gap:3px;font-size:11px;white-space:nowrap;flex-shrink:0;background:rgba(255,255,255,.03);padding:3px 8px;border-radius:12px;border:1px solid rgba(255,255,255,.04)}
.res-icon{font-size:13px}
.res-val{color:var(--gold);font-weight:bold;font-size:12px}
.sep{color:var(--text3);margin:0 1px;flex-shrink:0;opacity:.3}

/* ===== 底部导航 ===== */
#sidebar{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:linear-gradient(180deg,#141428,#0e0e1e);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:0 2px;z-index:50;gap:0;flex-shrink:0;box-shadow:0 -2px 12px rgba(0,0,0,.4)}
#sidebar .nav-btn{width:auto;height:var(--nav-h);border:none;background:transparent;color:var(--text3);cursor:pointer;border-radius:0;font-size:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .25s;flex:1;min-width:0;padding:4px 0;position:relative}
#sidebar .nav-btn:hover{color:var(--text);background:transparent}
#sidebar .nav-btn.active{color:var(--gold);border-color:transparent}
#sidebar .nav-btn.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:2px;background:var(--gold);border-radius:0 0 2px 2px;box-shadow:0 0 8px rgba(201,162,39,.5)}
#sidebar .nav-btn .nav-label{font-size:9px;margin-top:2px;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;transition:color .25s}
#sidebar .nav-btn .nav-icon{font-size:19px;line-height:1;transition:transform .25s}
#sidebar .nav-btn.active .nav-icon{transform:scale(1.1)}
#sidebar .nav-btn.active .nav-label{color:var(--gold);font-weight:bold}

/* ===== 主内容区 ===== */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;padding-bottom:var(--nav-h)}
#content{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
#content::-webkit-scrollbar{width:3px}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* 战斗面板 - 可滚动 */
#battle-panel{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;-webkit-overflow-scrolling:touch}
#battle-panel::-webkit-scrollbar{width:4px}
#battle-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ===== 面板 ===== */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.panel-title{color:var(--gold);font-size:15px;font-weight:bold;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:8px}
.panel-title .icon{font-size:18px}


/* ===== 合成结果展示 ===== */
.merge-result-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.98)}}
@keyframes btnGlow{0%,100%{box-shadow:0 0 5px rgba(255,165,0,.3)}50%{box-shadow:0 0 15px rgba(255,165,0,.6)}}
.merge-result-card{background:var(--panel);border:2px solid var(--gold);border-radius:16px;padding:24px;max-width:360px;width:90%;text-align:center;position:relative;animation:cardPop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes cardPop{0%{opacity:0;transform:scale(.3) translateY(50px)}70%{transform:scale(1.05) translateY(-10px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.merge-result-avatar{width:100px;height:100px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:56px;margin:0 auto 16px;position:relative;border:3px solid var(--border);animation:avatarGlow 1.5s ease infinite alternate}
@keyframes avatarGlow{from{box-shadow:0 0 20px rgba(201,162,39,.3)}to{box-shadow:0 0 40px rgba(201,162,39,.6)}}
.merge-result-quality{font-size:14px;font-weight:bold;margin-bottom:8px}
.merge-result-name{font-size:20px;font-weight:900;color:var(--gold);margin-bottom:12px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.merge-result-mutation{color:#a855f7;font-size:12px;font-weight:bold;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:4px}
.merge-result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0;padding:12px;background:rgba(0,0,0,.3);border-radius:8px}
.merge-result-stat{font-size:11px;color:var(--text2)}
.merge-result-stat b{display:block;color:var(--text);font-size:14px;margin-top:2px}
.merge-result-skills{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:12px 0}
.merge-result-skill{background:rgba(41,128,185,.2);color:var(--blue);padding:3px 8px;border-radius:4px;font-size:10px;border:1px solid rgba(41,128,185,.3)}
/* 异变特效 */
.merge-mutation-flash{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,rgba(168,85,247,.5),transparent 70%);pointer-events:none;z-index:299;animation:mutationFlash 1.2s ease-out forwards}
@keyframes mutationFlash{0%{opacity:0}20%{opacity:1}60%{opacity:.5}100%{opacity:0}}
/* 品质提升特效 */
.merge-quality-up-flash{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,rgba(245,158,11,.5),transparent 70%);pointer-events:none;z-index:299;animation:qualityUpFlash 1.5s ease-out forwards}
@keyframes qualityUpFlash{0%{opacity:0}15%{opacity:1}40%{opacity:.6}100%{opacity:0}}
/* 传说特效 */
.merge-legendary-flash{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,rgba(255,184,51,.6),transparent 60%),radial-gradient(ellipse at 30% 30%,rgba(255,200,100,.4),transparent 50%);pointer-events:none;z-index:299;animation:legendaryFlash 2s ease-out forwards}
@keyframes legendaryFlash{0%{opacity:0;transform:scale(.8)}20%{opacity:1;transform:scale(1)}50%{opacity:.8}100%{opacity:0;transform:scale(1.2)}}
.merge-legendary-text{position:fixed;top:20%;left:50%;transform:translateX(-50%);font-size:48px;font-weight:900;color:#ffb833;text-shadow:0 0 30px rgba(255,184,51,.8),0 0 60px rgba(255,184,51,.4);pointer-events:none;z-index:301;animation:legendaryText 2s ease-out forwards}
@keyframes legendaryText{0%{opacity:0;transform:translateX(-50%) scale(.5) translateY(30px)}30%{opacity:1;transform:translateX(-50%) scale(1.1) translateY(0)}70%{opacity:1}100%{opacity:0;transform:translateX(-50%) scale(1) translateY(-20px)}}
/* 神话特效 */
.merge-mythic-flash{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,rgba(239,68,68,.7),transparent 50%),radial-gradient(ellipse at 20% 80%,rgba(168,85,247,.5),transparent 40%),radial-gradient(ellipse at 80% 20%,rgba(245,158,11,.5),transparent 40%);pointer-events:none;z-index:299;animation:mythicFlash 3s ease-out forwards}
@keyframes mythicFlash{0%{opacity:0;transform:scale(.5)}25%{opacity:1;transform:scale(1.1)}60%{opacity:.9}100%{opacity:0;transform:scale(1.3)}}
.merge-mythic-text{position:fixed;top:15%;left:50%;transform:translateX(-50%);font-size:56px;font-weight:900;color:#ff5555;text-shadow:0 0 40px rgba(239,68,68,.9),0 0 80px rgba(239,68,68,.5),0 4px 12px rgba(0,0,0,.8);pointer-events:none;z-index:301;animation:mythicText 3s ease-out forwards}
@keyframes mythicText{0%{opacity:0;transform:translateX(-50%) scale(.3) rotate(-10deg)}20%{opacity:1;transform:translateX(-50%) scale(1.2) rotate(0)}50%{opacity:1;transform:translateX(-50%) scale(1)}80%{opacity:.8}100%{opacity:0;transform:translateX(-50%) scale(1.1) translateY(-30px)}}
.merge-mythic-particles{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:300;overflow:hidden}
.merge-mythic-particles::before,.merge-mythic-particles::after{content:"✨";position:absolute;font-size:24px;animation:particleFloat 2s ease-out forwards}
.merge-mythic-particles::before{left:20%;top:30%;animation-delay:.2s}
.merge-mythic-particles::after{right:25%;top:40%;animation-delay:.5s}
@keyframes particleFloat{0%{opacity:0;transform:translateY(20px) scale(0)}50%{opacity:1;transform:translateY(-20px) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(.5)}}


/* ===== 城镇界面优化 ===== */
.town-hero-summary{display:flex;gap:8px;margin-top:10px;padding:10px;background:rgba(0,0,0,.2);border-radius:8px;font-size:11px;border:1px solid rgba(255,255,255,.03)}
.town-hero-summary-item{flex:1;text-align:center}
.town-hero-summary-val{font-size:15px;font-weight:bold;color:var(--gold)}
.town-hero-summary-lbl{color:var(--text2);margin-top:3px;font-size:10px}
.town-module-btn{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 8px;cursor:pointer;transition:all .25s;text-align:center;position:relative;overflow:hidden}
.town-module-btn:hover{transform:translateY(-2px);border-color:var(--gold);box-shadow:0 4px 16px rgba(0,0,0,.25),0 0 0 1px rgba(201,162,39,.15)}
.town-module-btn:active{transform:translateY(0);opacity:.85}
.town-module-btn-icon{font-size:28px;margin-bottom:5px;display:block}
.town-module-btn-name{font-size:12px;font-weight:bold;color:var(--gold)}
.town-module-btn-info{font-size:10px;color:var(--text2);margin-top:3px}
.town-quick-btns{display:flex;gap:8px;flex-wrap:wrap}

/* ===== 英雄卡片 ===== */
.hero-card{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .25s ease;display:flex;gap:10px;position:relative;overflow:hidden}
.hero-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .25s}
.hero-card:hover::before{opacity:1}
.hero-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.hero-card:active{transform:translateY(0);box-shadow:none}
.hero-card.selected{border-color:var(--gold);box-shadow:0 0 12px rgba(201,162,39,.3)}
.quality-common::before{background:linear-gradient(90deg,#888,#666)}
.quality-rare::before{background:linear-gradient(90deg,#4a9eff,#2980b9)}
.quality-epic::before{background:linear-gradient(90deg,#a855f7,#8e44ad)}
.quality-legendary::before{background:linear-gradient(90deg,#f59e0b,#d97706)}
.quality-mythic::before{background:linear-gradient(90deg,#ef4444,#dc2626)}
.quality-rare{border-color:rgba(74,158,255,.35)!important}
.quality-epic{border-color:rgba(168,85,247,.35)!important}
.quality-legendary{border-color:rgba(245,158,11,.35)!important;box-shadow:inset 0 0 20px rgba(245,158,11,.05)}
.quality-mythic{border-color:rgba(239,68,68,.35)!important;box-shadow:inset 0 0 20px rgba(239,68,68,.05)}
.hero-avatar{width:48px;height:48px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;border:2px solid var(--border);position:relative;transition:all .25s}
.hero-card:hover .hero-avatar{transform:scale(1.05)}
.hero-info{flex:1;min-width:0}
.hero-name{font-size:13px;font-weight:bold;color:var(--gold);display:flex;align-items:center;gap:4px}
.hero-meta{font-size:10px;color:var(--text2);margin-top:2px}
.hero-stats{font-size:10px;color:var(--text2);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
.hero-skills{font-size:10px;margin-top:4px;display:flex;gap:3px;flex-wrap:wrap}
.skill-tag{background:rgba(41,128,185,.15);color:var(--blue);padding:2px 6px;border-radius:4px;font-size:9px;border:1px solid rgba(41,128,185,.2);transition:all .2s}
.skill-tag:hover{background:rgba(41,128,185,.3)}
.stat-tag{color:var(--text2);display:inline-flex;align-items:center;gap:2px}
.stat-tag b{color:var(--text);font-weight:600}
.bar-wrap{height:4px;background:#111;border-radius:2px;margin-top:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .3s}
.hero-team-badge{position:absolute;top:6px;right:6px;background:rgba(39,174,96,.2);color:#2ed573;font-size:9px;padding:2px 6px;border-radius:4px;border:1px solid rgba(39,174,96,.3);font-weight:bold}
.hero-level-badge{position:absolute;bottom:-2px;right:-2px;background:#111;border:1px solid var(--border);border-radius:4px;padding:0 4px;font-size:8px;color:var(--gold);font-weight:bold}
.hero-power{font-size:10px;color:var(--text3);margin-top:2px}
.hero-power b{color:var(--gold);font-size:11px}

/* 品质颜色 */
.quality-common{border-color:#888!important}
.quality-rare{border-color:#4a9eff!important}
.quality-epic{border-color:#a855f7!important}
.quality-legendary{border-color:#f59e0b!important}
.quality-mythic{border-color:#ef4444!important}
.q-common{color:#999}.q-rare{color:#5bb5ff}.q-epic{color:#b86eff}.q-legendary{color:#ffb833;text-shadow:0 0 8px rgba(255,184,51,.3)}.q-mythic{color:#ff5555;text-shadow:0 0 8px rgba(255,85,85,.3)}

/* ===== 按钮 ===== */
.btn{padding:7px 16px;border:1px solid var(--border);background:var(--panel2);color:var(--text);cursor:pointer;border-radius:8px;font-size:13px;transition:all .2s;font-family:inherit;touch-action:manipulation}
.btn:active{opacity:.7;transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-primary{background:linear-gradient(135deg,#2a1a00,#3a2a00);border-color:var(--gold);color:var(--gold)}
.btn-primary:hover{background:linear-gradient(135deg,#3a2a00,#4a3a00);box-shadow:0 0 12px rgba(201,162,39,.2)}
.btn-primary:active{background:linear-gradient(135deg,#3a2a00,#4a3a00)}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}

/* ===== 战斗场景 ===== */
.battle-scene{position:relative;background:linear-gradient(180deg,#080810 0%,#0e0e1a 50%,#161628 100%);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;overflow:hidden;min-height:200px;box-shadow:inset 0 0 40px rgba(0,0,0,.3)}
.battle-scene::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 120%,rgba(100,50,150,.1) 0%,transparent 70%);pointer-events:none}
.battle-vs{display:flex;gap:6px;align-items:start;justify-content:center}
.battle-vs > div{min-width:0;flex-shrink:1}
.battle-vs .ally-side,.battle-vs .enemy-side{display:flex;flex-direction:column;gap:6px;min-width:0;flex:1}
.battle-vs .vs-center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:20px;flex-shrink:0;min-width:30px}
.battle-side-label{text-align:center;font-size:11px;font-weight:bold;padding:3px 0;border-radius:4px;letter-spacing:1px}
.battle-side-label.ally{color:#5dade2;background:rgba(93,173,226,.1);border:1px solid rgba(93,173,226,.2)}
.battle-side-label.enemy{color:#e74c3c;background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.2)}
.battle-vs-text{font-size:20px;font-weight:900;color:var(--gold);text-shadow:0 0 20px rgba(201,162,39,.5);animation:vsPulse 2s ease-in-out infinite}
@keyframes vsPulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.1);opacity:1}}
.battle-round-badge{font-size:9px;color:var(--text2);margin-top:6px;background:var(--panel2);padding:2px 6px;border-radius:10px;border:1px solid var(--border)}

/* ===== 战斗单位卡片 ===== */
.battle-unit{position:relative;background:linear-gradient(145deg,#16213e,#1a1a2e);border:2px solid var(--border);border-radius:8px;padding:6px;min-width:110px;transition:all .4s ease;overflow:visible;width:100%}
.battle-unit::after{content:'';position:absolute;top:-1px;left:-1px;right:-1px;bottom:-1px;border-radius:8px;opacity:0;transition:opacity .3s;pointer-events:none}
.battle-unit.ally-unit{border-color:rgba(93,173,226,.3)}
.battle-unit.ally-unit::after{box-shadow:0 0 10px rgba(93,173,226,.3)}
.battle-unit.enemy-unit{border-color:rgba(231,76,60,.3)}
.battle-unit.enemy-unit::after{box-shadow:0 0 10px rgba(231,76,60,.3)}
.battle-unit.dead{opacity:.3;filter:grayscale(1) brightness(.5);transform:scale(.92)}
.battle-unit.dead .unit-avatar{filter:grayscale(1)}
.battle-unit.acting{z-index:10;transform:scale(1.04)}
.battle-unit.acting::after{opacity:1}
.battle-unit.acting.ally-unit{border-color:#5dade2;box-shadow:0 0 15px rgba(93,173,226,.4)}
.battle-unit.acting.enemy-unit{border-color:#e74c3c;box-shadow:0 0 15px rgba(231,76,60,.4)}
.battle-unit.hit{animation:hitShake .3s ease}
.battle-unit.heal-target{animation:healGlow .5s ease}
.battle-unit.shield-up{animation:shieldFlash .4s ease}
@keyframes hitShake{0%{transform:translateX(0);filter:brightness(1)}10%{transform:translateX(-5px);filter:brightness(1.5)}20%{transform:translateX(4px);filter:brightness(1.3)}30%{transform:translateX(-3px)}45%{transform:translateX(3px);filter:brightness(1.1)}60%{transform:translateX(-2px)}80%{transform:translateX(1px)}100%{transform:translateX(0);filter:brightness(1)}}
@keyframes healGlow{0%{box-shadow:0 0 0 rgba(46,204,113,0)}50%{box-shadow:0 0 15px rgba(46,204,113,.5)}100%{box-shadow:0 0 0 rgba(46,204,113,0)}}
@keyframes shieldFlash{0%{box-shadow:0 0 0 rgba(52,152,219,0)}50%{box-shadow:0 0 20px rgba(52,152,219,.6)}100%{box-shadow:0 0 0 rgba(52,152,219,0)}}
@keyframes deathFade{0%{opacity:1;transform:scale(1);filter:none}30%{opacity:.8;transform:scale(1.08);filter:brightness(2) saturate(0)}60%{opacity:.4;transform:scale(.95);filter:grayscale(.8) brightness(1.2)}100%{opacity:.25;transform:scale(.9);filter:grayscale(1) brightness(.4)}}
.battle-unit.dying{animation:deathFade .6s ease forwards}
/* 暴击特效 */
@keyframes critFlash{0%{box-shadow:0 0 0 0 rgba(255,200,0,.8)}50%{box-shadow:0 0 30px 8px rgba(255,150,0,.9),inset 0 0 15px rgba(255,200,0,.3)}100%{box-shadow:0 0 0 0 rgba(255,200,0,0)}}
.battle-unit.crit-hit{animation:critFlash .5s ease}
/* 连胜特效 */
@keyframes streakPulse{0%,100%{border-color:var(--gold)}50%{border-color:#ff6b00}}
.streak-active{animation:streakPulse 1.5s ease infinite}
/* 特质标签 */
.trait-tag{display:inline-block;background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,165,0,.1));border:1px solid rgba(255,215,0,.3);color:#ffd700;padding:2px 6px;border-radius:4px;font-size:9px;margin:2px}
/* 每日奖励提示 */
.daily-bonus-banner{background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,165,0,.05));border:1px solid rgba(255,215,0,.3);border-radius:8px;padding:12px;text-align:center;margin-bottom:10px;animation:dailyPulse 2s ease infinite}
@keyframes dailyPulse{0%,100%{opacity:.8}50%{opacity:1}}

/* 战斗单位头像 */
.unit-avatar-wrap{position:relative;width:44px;height:44px;margin:0 auto 4px}
.unit-avatar{width:44px;height:44px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid var(--border);background:rgba(0,0,0,.3);position:relative;z-index:1;margin:0 auto}

.unit-avatar.quality-epic{border-color:#a855f7;box-shadow:0 0 6px rgba(168,85,247,.3)}
.unit-avatar.quality-legendary{border-color:#f59e0b;box-shadow:0 0 8px rgba(245,158,11,.4)}

.unit-role-icon{position:absolute;top:-4px;left:-4px;font-size:11px;z-index:2;filter:drop-shadow(0 1px 2px rgba(0,0,0,.8))}
.unit-name{text-align:center;font-size:11px;font-weight:bold;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.unit-bars{display:flex;flex-direction:column;gap:2px}
.unit-bar{display:flex;align-items:center;gap:3px;font-size:8px}
.unit-bar-label{width:16px;text-align:right;color:var(--text3);font-weight:bold;flex-shrink:0}
.unit-bar-track{flex:1;height:5px;background:#0a0a0a;border-radius:2px;overflow:hidden;position:relative;min-width:30px}
.unit-bar-fill{height:100%;border-radius:2px;transition:width .4s ease;position:relative}
.unit-bar-fill.hp{background:linear-gradient(90deg,#c0392b,#e74c3c)}
.unit-bar-fill.hp.low{background:linear-gradient(90deg,#922b21,#c0392b);animation:hpPulse 1s ease-in-out infinite}
.unit-bar-fill.mp{background:linear-gradient(90deg,#2471a3,#3498db)}
.unit-bar-fill.shield-bar{background:linear-gradient(90deg,#2e86c1,#5dade2);position:absolute;top:0;left:0;z-index:1}
@keyframes hpPulse{0%,100%{opacity:1}50%{opacity:.6}}
.unit-bar-val{width:36px;text-align:left;color:var(--text2);font-size:8px;flex-shrink:0}
.unit-buffs{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:3px;min-height:14px}
.buff-tag{padding:1px 4px;border-radius:2px;font-size:8px;font-weight:bold;border:1px solid transparent}

/* 浮动伤害数字 */
.float-num{position:absolute;font-weight:900;font-size:14px;pointer-events:none;z-index:100;animation:floatUp 1s ease-out forwards;text-shadow:0 2px 4px rgba(0,0,0,.8);white-space:nowrap;left:50%;transform:translateX(-50%)}
.float-num.damage{color:#ff4757}.float-num.crit{color:#ffd32a;font-size:22px;text-shadow:0 0 12px rgba(255,211,42,.8),0 0 24px rgba(255,150,0,.4);animation:critFloat .8s ease-out forwards}
@keyframes critFloat{0%{opacity:1;top:10%;transform:translateX(-50%) scale(.5)}15%{opacity:1;transform:translateX(-50%) scale(1.4)}30%{transform:translateX(-50%) scale(1)}100%{opacity:0;top:-30%;transform:translateX(-50%) scale(.8)}}
.float-num.combo-text{color:#ff6348;font-size:16px;font-weight:900;text-shadow:0 0 10px rgba(255,99,72,.6);animation:comboFloat .7s ease-out forwards}
@keyframes comboFloat{0%{opacity:1;top:5%;transform:translateX(-50%) scale(.6)}20%{opacity:1;transform:translateX(-50%) scale(1.2)}100%{opacity:0;top:-20%;transform:translateX(-50%) scale(.9)}}
.float-num.kill-text{color:#ff4757;font-size:20px;font-weight:900;text-shadow:0 0 15px rgba(255,71,87,.8);animation:killFloat 1s ease-out forwards}
@keyframes killFloat{0%{opacity:1;top:0%;transform:translateX(-50%) scale(.3)}25%{opacity:1;transform:translateX(-50%) scale(1.5)}50%{transform:translateX(-50%) scale(1.1)}100%{opacity:0;top:-35%;transform:translateX(-50%) scale(.7)}}

.float-num.dodge{color:#a4b0be;font-size:11px;font-style:italic}
.float-num.miss{color:#636e72;font-size:11px}
.float-num.skill-name{color:#d4a0ff;font-size:12px;font-weight:bold}
.float-num.buff-text{color:#70a1ff;font-size:10px}
.float-num.debuff-text{color:#ff7979;font-size:10px}
@keyframes floatUp{0%{opacity:1;top:10%}20%{opacity:1}100%{opacity:0;top:-25%}}

/* 技能全屏特效 */
.skill-effect-overlay{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:50;display:flex;align-items:center;justify-content:center}
.skill-effect-bg{position:absolute;top:0;left:0;right:0;bottom:0;opacity:0;animation:skillBgFlash .6s ease-out forwards}

.skill-effect-overlay.holy .skill-effect-bg{background:radial-gradient(ellipse at center,rgba(255,234,167,.5),transparent 70%)}
.skill-effect-overlay.poison .skill-effect-bg{background:radial-gradient(ellipse at center,rgba(0,184,148,.5),transparent 70%)}
.skill-effect-overlay.heal-effect .skill-effect-bg{background:radial-gradient(ellipse at center,rgba(85,239,196,.4),transparent 70%)}
.skill-effect-overlay.shield-effect .skill-effect-bg{background:radial-gradient(ellipse at center,rgba(116,185,255,.4),transparent 70%)}
.skill-effect-text{font-size:20px;font-weight:900;animation:skillFlash .8s ease-out forwards;text-shadow:0 0 20px currentColor,0 2px 8px rgba(0,0,0,.8);position:relative;z-index:1}
@keyframes skillFlash{0%{opacity:0;transform:scale(.3) translateY(10px)}15%{opacity:1;transform:scale(1.3) translateY(-5px)}30%{transform:scale(1) translateY(0)}75%{opacity:1}100%{opacity:0;transform:scale(1.05) translateY(-10px)}}
.skill-effect-overlay.fire .skill-effect-text{color:#ff6348}
.skill-effect-overlay.ice .skill-effect-text{color:#74b9ff}
.skill-effect-overlay.dark .skill-effect-text{color:#6c5ce7}
.skill-effect-overlay.holy .skill-effect-text{color:#ffeaa7}
.skill-effect-overlay.poison .skill-effect-text{color:#00b894}
.skill-effect-overlay.heal-effect .skill-effect-text{color:#55efc4}
.skill-effect-overlay.shield-effect .skill-effect-text{color:#74b9ff}

/* 战斗日志 */
#battle-log{font-size:10px;line-height:1.6;max-height:140px;overflow-y:auto;padding:6px 8px;background:#08080f;border-radius:6px;border:1px solid var(--border);scrollbar-width:thin;scrollbar-color:var(--border) transparent;-webkit-overflow-scrolling:touch}

.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

.team-slot{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center;min-height:100px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.team-slot:active{border-color:var(--gold);border-style:solid}
.team-slot[data-empty]{border-style:dashed}
.log-line{padding:1px 0;animation:fadeIn .3s}
.log-damage{color:#e74c3c}.log-heal{color:#2ecc71}.log-buff{color:#3498db}.log-debuff{color:#e67e22}

.merge-slots{display:flex;gap:8px;margin:8px 0;justify-content:center;flex-wrap:wrap}

/* 建筑卡片 */

.stage-node{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;background:var(--panel2);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .2s;margin:3px;font-size:12px}

.stage-node .stage-icon{font-size:16px}

/* 装备 */
.equip-slot{background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:5px 8px;margin:3px 0;display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer}

/* 模态框 */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:10px;animation:fadeIn .25s ease;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.4)}

/* ===== 英雄详情弹窗增强样式 ===== */

.hero-detail-panel{background:linear-gradient(180deg,#181830,#141428);border:1px solid var(--border);border-radius:14px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;box-shadow:0 12px 40px rgba(0,0,0,.5)}
.hero-detail-panel::-webkit-scrollbar{width:4px}
.hero-detail-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.hd-header{display:flex;align-items:center;gap:14px;padding:16px;border-bottom:1px solid var(--border);position:relative}
.hd-close{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px;line-height:1;transition:color .2s}
.hd-close:hover{color:var(--gold)}
.hd-avatar{width:64px;height:64px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0;border:2px solid var(--border)}
.hd-name{font-size:18px;font-weight:bold;line-height:1.3}
.hd-meta{font-size:11px;color:var(--text2);margin-top:4px}
.hd-lore{font-size:11px;color:var(--text3);font-style:italic;margin-top:6px;line-height:1.5}
.hd-section{padding:12px 16px;border-bottom:1px solid rgba(42,42,74,.5)}
.hd-section:last-child{border-bottom:none}
.hd-section-title{color:var(--gold);font-size:13px;font-weight:bold;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.hd-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.hd-stat-item{background:rgba(0,0,0,.25);border-radius:8px;padding:8px;text-align:center}
.hd-stat-icon{font-size:16px;display:block;margin-bottom:2px}
.hd-stat-val{font-size:15px;font-weight:bold;color:var(--text);display:block}
.hd-stat-label{font-size:9px;color:var(--text2);display:block;margin-top:2px}
.hd-stat-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:4px;overflow:hidden}
.hd-stat-bar-fill{height:100%;border-radius:2px;transition:width .4s ease}
.hd-quality-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:bold}
.hd-quality-common{background:rgba(150,150,150,.2);color:#aaa;border:1px solid rgba(150,150,150,.3)}
.hd-quality-rare{background:rgba(50,120,220,.15);color:#5b9bd5;border:1px solid rgba(50,120,220,.3)}
.hd-quality-epic{background:rgba(140,50,220,.15);color:#b06ce6;border:1px solid rgba(140,50,220,.3)}
.hd-quality-legendary{background:rgba(220,160,30,.15);color:#e8c840;border:1px solid rgba(220,160,30,.3)}
.hd-quality-mythic{background:rgba(220,50,50,.15);color:#ff6b6b;border:1px solid rgba(220,50,50,.3)}
.hd-passive{background:rgba(0,0,0,.2);border-radius:8px;padding:10px;border-left:3px solid var(--gold)}
.hd-passive-name{font-weight:bold;color:var(--gold);font-size:12px}
.hd-passive-desc{font-size:11px;color:var(--text);margin-top:4px;line-height:1.5}
.hd-skill-card{background:rgba(0,0,0,.2);border-radius:8px;padding:10px;display:flex;gap:10px;align-items:flex-start}
.hd-skill-icon{font-size:24px;flex-shrink:0;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border-radius:8px}
.hd-skill-info{flex:1;min-width:0}
.hd-skill-name{font-weight:bold;font-size:12px}
.hd-skill-desc{font-size:10px;color:var(--text2);margin-top:3px;line-height:1.4}
.hd-skill-meta{font-size:9px;color:var(--text3);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
.hd-skill-meta span{display:inline-flex;align-items:center;gap:2px}
.hd-equip-slot{background:rgba(0,0,0,.2);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px}
.hd-equip-slot-empty{color:var(--text3);font-size:11px}
.hd-equip-icon{font-size:20px}
.hd-equip-info{flex:1}
.hd-equip-name{font-size:12px;font-weight:bold}
.hd-equip-stats{font-size:10px;color:var(--green)}
.hd-equip-enhance{font-size:9px;color:var(--blue)}
.hd-trait-tag{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:4px;font-size:10px;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.2);color:var(--gold2)}
.hd-growth-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:11px}
.hd-growth-label{color:var(--text2);width:50px;flex-shrink:0}
.hd-growth-bar{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.hd-growth-bar-fill{height:100%;border-radius:3px}
.hd-growth-val{color:var(--text);font-weight:bold;width:60px;text-align:right;flex-shrink:0}
.hd-mechanism{background:rgba(0,0,0,.15);border-radius:8px;padding:10px}
.hd-mechanism-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:11px;border-bottom:1px solid rgba(255,255,255,.04)}
.hd-mechanism-row:last-child{border-bottom:none}
.hd-mechanism-label{color:var(--text2)}
.hd-mechanism-val{color:var(--text);font-weight:bold}
.hd-actions{display:flex;gap:8px;padding:14px 16px;flex-wrap:wrap}
.hd-actions .btn{flex:1;min-width:80px;text-align:center}

/* Toast */
.toast{position:fixed;top:50px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#1a1a35,#141428);border:1px solid var(--gold);color:var(--gold);padding:10px 20px;border-radius:10px;z-index:200;animation:fadeIn .3s;font-size:12px;box-shadow:0 4px 20px rgba(0,0,0,.5),0 0 0 1px rgba(201,162,39,.15);white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}

/* 网格布局 */
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.flex-center{display:flex;align-items:center;justify-content:center}
.text-gold{color:var(--gold)}.text-red{color:var(--red)}.text-green{color:var(--green)}.text-blue{color:var(--blue)}.text-purple{color:var(--purple)}
.text-dim{color:var(--text2)}.text-sm{font-size:11px}.text-xs{font-size:10px}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mb-8{margin-bottom:8px}
.gap-4{gap:4px}.gap-8{gap:8px}
.hidden{display:none!important}
.tab-bar{display:flex;gap:4px;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:4px;overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:4px 10px;border:1px solid transparent;background:transparent;color:var(--text2);cursor:pointer;border-radius:4px 4px 0 0;font-size:12px;font-family:inherit;white-space:nowrap;touch-action:manipulation}
.tab-btn:active{color:var(--text)}
.tab-btn.active{color:var(--gold);border-color:var(--border);border-bottom-color:var(--panel);background:var(--panel)}

/* ===== 桌面端覆盖 ===== */
@media(min-width:769px){

  #sidebar{position:static;height:100vh;width:56px;background:var(--panel);border-right:1px solid var(--border);border-top:none;display:flex;flex-direction:column;align-items:center;padding-top:10px;gap:4px;justify-content:flex-start}
  #sidebar .nav-btn{width:46px;height:46px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;border-radius:6px;font-size:20px;display:flex;align-items:center;justify-content:center;flex:none;padding:0}
  #sidebar .nav-btn:hover,#sidebar .nav-btn.active{background:var(--panel2);color:var(--gold);border-color:var(--gold)}
  #sidebar .nav-btn .nav-icon{font-size:20px}

  .panel{padding:14px;margin-bottom:12px}

  .grid-3{grid-template-columns:1fr 1fr 1fr;gap:10px}
  .battle-unit{min-width:130px;padding:10px}
  .modal{padding:20px;width:90%}
  .toast{left:auto;right:20px;transform:none}
}
</style>

// 关卡难度配置
const STAGE_CONFIG = {
  // 每20关一个周期（周目）
  cycleLength: 20,
  // 等级曲线: 基础等级 + 周期加成 + 位置加成
  baseLevel: function(id, cycle, posInCycle) {
    return 1 + Math.floor(id * 0.8) + cycle * 3 + Math.floor(posInCycle / 5);
  },
  // 敌人数: 从1个逐渐增加到6个
  enemyCount: function(posInCycle, isBoss, isFinalBoss) {
    if (isFinalBoss) return 6;
    if (isBoss) return 4;
    return Math.min(6, 1 + Math.floor((posInCycle - 1) / 3));
  },
  // 品质曲线: 普通→稀有→史诗→传说→神话
  qualityCurve: function(cycle, posInCycle, isBoss, isFinalBoss) {
    var qIdx = cycle;
    if (isFinalBoss) qIdx = Math.min(4, cycle + 2);
    else if (isBoss) qIdx = Math.min(4, cycle + 1);
    else qIdx = Math.min(4, cycle + Math.floor(posInCycle / 10));
    return QUALITIES[qIdx] || 'common';
  },
  // 技能数量: 随进度增加
  skillCount: function(cycle, posInCycle, isBoss) {
    if (isBoss) return 3;
    return Math.min(3, 1 + Math.floor(cycle / 2) + Math.floor(posInCycle / 10));
  }
};

  var theme=AREA_THEMES[areaIdx];
  var enemyQuality=STAGE_CONFIG.qualityCurve(cycle,posInCycle,isBoss,isFinalBoss);
  var bossQuality=isFinalBoss?'mythic':STAGE_CONFIG.qualityCurve(cycle,posInCycle,true,false);
  
  var enemies=[];
  var nameSuffix=' 第'+Math.ceil(posInCycle/5)+'层';
  
  if(isFinalBoss){
    // 最终Boss: 6人完整阵容，高品质
    var bi=cycle%BOSS_NAMES.length;
    enemies.push({name:BOSS_NAMES[bi].name,icon:BOSS_NAMES[bi].icon,role:BOSS_NAMES[bi].role,quality:'mythic',level:baseLevel+5,skills:pickRandomSkills(BOSS_NAMES[bi].role,3)});
    enemies.push({name:'深渊守卫',icon:'🗿',role:'guardian',quality:'legendary',level:baseLevel+3,skills:pickRandomSkills('guardian',3)});
    enemies.push({name:'暗影刺客',icon:'👤',role:'assassin',quality:'legendary',level:baseLevel+3,skills:pickRandomSkills('assassin',3)});
    enemies.push({name:'混沌法师',icon:'🔮',role:'mage',quality:'legendary',level:baseLevel+3,skills:pickRandomSkills('mage',3)});
    enemies.push({name:'虚空祭司',icon:'👁️',role:'warlock',quality:'epic',level:baseLevel+2,skills:pickRandomSkills('warlock',2)});
    enemies.push({name:'黑暗医师',icon:'💀',role:'healer',quality:'epic',level:baseLevel+2,skills:pickRandomSkills('healer',2)});
  }else if(isBoss){
    // 小Boss: 4人阵容
    var bi=cycle%BOSS_NAMES.length;
    enemies.push({name:BOSS_NAMES[bi].name,icon:BOSS_NAMES[bi].icon,role:BOSS_NAMES[bi].role,quality:bossQuality,level:baseLevel+3,skills:pickRandomSkills(BOSS_NAMES[bi].role,3)});
    enemies.push({name:'精英守卫',icon:'🛡️',role:'guardian',quality:enemyQuality,level:baseLevel+1,skills:pickRandomSkills('guardian',2)});
    enemies.push({name:'暗影法师',icon:'👻',role:'mage',quality:enemyQuality,level:baseLevel+1,skills:pickRandomSkills('mage',2)});
    enemies.push({name:'黑暗医师',icon:'💀',role:'healer',quality:enemyQuality,level:baseLevel,skills:pickRandomSkills('healer',1)});
  }else{
    // 普通关卡: 根据位置决定人数和阵容
    var count=STAGE_CONFIG.enemyCount(posInCycle,isBoss,isFinalBoss);
    var formation=ENEMY_FORMATIONS[Math.min(count-1,ENEMY_FORMATIONS.length-1)];
    var ei=(cycle+Math.floor(posInCycle/3))%ENEMY_NAMES.length;
    var en=ENEMY_NAMES[ei];
    
    // 确保有前排
    var hasTank=false;
    for(var i=0;i<count;i++){
      var role;
      if(i===0 && count>=2){
        // 第一个位置优先坦克
        role=Math.random()<0.7?'guardian':(Math.random()<0.5?'warrior':'paladin');
        hasTank=true;
      }else{
        // 其他位置按阵容权重随机
        var pool=formation;
        var totalWeight=pool.reduce(function(s,r){return s+r.weight},0);
        var rand=Math.random()*totalWeight;
        var cumWeight=0;
        for(var j=0;j<pool.length;j++){
          cumWeight+=pool[j].weight;
          if(rand<=cumWeight){role=pool[j].role;break;}
        }
        if(!role)role=pool[0].role;
      }
      
      // 根据位置调整等级（前排等级略高）
      var lvlOffset=(role==='guardian'||role==='paladin')?1:0;
      var ni=i%en.names.length;
      enemies.push({
        name:en.names[ni],
        icon:en.icon[ni],
        role:role,
        quality:enemyQuality,
        level:baseLevel+lvlOffset,
        skills:pickRandomSkills(role,STAGE_CONFIG.skillCount(cycle,posInCycle,isBoss))
      });
    }
  }

  // 奖励计算（优化版：战利品 = 金币 + 食物 + 石材/铁矿 + 宝石(BOSS) + 经验）
  var difficultyMult=1+cycle*0.3+(isBoss?0.5:0)+(isFinalBoss?1:0);
  
  // 金币稀缺加成：金币越少奖励越多
  var goldRatio=(G.resources.gold||0)/RESOURCE_LIMITS.gold;
  var goldBonus=2-Math.min(goldRatio*1.5,1.5);
  
  // 金币：基础产出随关卡增长，前期更多
  var baseGold=Math.floor((80+id*25)*difficultyMult*(1/(1+cycle*0.15)));
  var goldR=Math.floor(baseGold*goldBonus);
  
  // 经验（不可堆积的战利品，用于升级英雄）
  var expR=Math.floor((30+id*12)*difficultyMult*(1/(1+cycle*0.12))*goldBonus);
  
  // 食物：与食物存量挂钩
  var foodRatio=(G.resources.food||0)/RESOURCE_LIMITS.food;
  var foodBonus=2-Math.min(foodRatio*1.5,1.5);
  var foodR=Math.floor((15+id*6)*difficultyMult*(1/(1+cycle*0.2))*foodBonus);
  
  // 石材/铁矿：BOSS给更多，普通关卡给少量（保证铁匠铺有材料）
  var stoneRatio=(G.resources.stone||0)/RESOURCE_LIMITS.stone;
  var stoneBonus=2-Math.min(stoneRatio*1.5,1.5);
  var baseStone=Math.floor((10+id*3)*difficultyMult*(1/(1+cycle*0.25)));
  var stoneR=Math.floor(baseStone*stoneBonus*(isBoss?1:0.3));
  
  var ironRatio=(G.resources.iron||0)/RESOURCE_LIMITS.iron;
  var ironBonus=2-Math.min(ironRatio*1.5,1.5);
  var baseIron=Math.floor((5+id*2)*difficultyMult*(1/(1+cycle*0.3)));
  var ironR=Math.floor(baseIron*ironBonus*(isBoss?1:0.2));
  
  // 宝石：仅BOSS掉落，与宝石存量挂钩（宝石少时掉落多）
  var gemsR=0;
  if(isBoss){
    var gemRatio=(G.resources.gems||0)/RESOURCE_LIMITS.gems;
    var gemBonus=2-Math.min(gemRatio*1.5,1.5);
    if(isFinalBoss){
      gemsR=Math.floor((3+Math.min(cycle*1.5,5))*gemBonus); // 最终BOSS：3-8宝石
    }else{
      gemsR=Math.floor((1+Math.min(cycle*0.8,2))*gemBonus); // 小BOSS：1-3宝石
    }
  }

  return {
    id:id,
    name:(isFinalBoss?'★★★ ':isBoss?'★ ':'')+theme.prefix+theme.suffix+nameSuffix,
    icon:theme.icon,
    desc:'第'+(cycle+1)+'章 第'+posInCycle+'关 · 敌人'+enemies.length+'人',
    isBoss:isBoss,
    bossType:isFinalBoss?'final':isBoss?'mini':null,
    enemies:enemies,
    rewards:{gold:goldR,exp:expR,food:foodR,stone:stoneR,iron:ironR,gems:gemsR}
  };
}

function pickRandomSkills(role,count){
  var all={
    warrior:['cleave','shield_bash','berserker'],
    guardian:['taunt','iron_wall','shield_bash'],
    mage:['fireball','blizzard','arcane_shield','soul_burn'],
    healer:['heal','group_heal','purify','divine_shield'],
    assassin:['backstab','shadow_step','poison_blade'],
    ranger:['aimed_shot','rain_arrows','trap'],
    warlock:['curse','life_drain','soul_burn'],
    paladin:['holy_strike','divine_shield','holy_light'],
  };
  var pool=all[role]||all.warrior;
  var result=[];
  var shuffled=pool.slice().sort(function(){return Math.random()-0.5});
  for(var i=0;i<Math.min(count,shuffled.length);i++)result.push(shuffled[i]);
  return result;
}

// ==================== 存档系统 ====================
const SAVE_KEY='shadow_dungeon_save';

function saveGame(){
  try{
    var data={g:G,heroIdCounter:G.heroIdCounter};
    localStorage.setItem(SAVE_KEY,JSON.stringify(data));
    showToast('💾 已存档');
  }catch(e){showToast('存档失败');}
}

function loadGame(){
  try{
    var raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return false;
    var data=JSON.parse(raw);
    // 恢复英雄ID计数器
    G.heroIdCounter=data.heroIdCounter||0;
    // 恢复游戏状态（保留引用）
    var saved=data.g;
    Object.keys(saved).forEach(function(k){G[k]=saved[k]});
    // 恢复竞技场每日重置
    var today=new Date().toDateString();
    if(G.arenaState&&G.arenaState.lastChallengeDate!==today){
      G.arenaState.dailyChallengesUsed=0;
      G.arenaState.lastChallengeDate=today;
    }
    // 每日登录检查
    if(G.lastLoginDate!==today){
      G.dailyBonusClaimed=false; // 新的一天，重置领取状态
      G.lastLoginDate=today;
    }
    // 初始化连胜计数
    if(G.pveWinStreak===undefined) G.pveWinStreak=0;
    if(G.pveMaxStreak===undefined) G.pveMaxStreak=0;
    return true;
  }catch(e){console.error('读档失败',e);return false;}
}

// 每日登录奖励领取
function claimDailyBonus(){
  var today=new Date().toDateString();
  if(G.dailyBonusClaimed){showToast('今日已领取过奖励！');return;}
  // 奖励随进度提升
  var progressed=Math.max(1,G.stageProgress);
  var goldR=200+progressed*30;
  var foodR=100+progressed*10;
  var stoneR=30+progressed*5;
  var ironR=15+progressed*3;
  G.resources.gold=Math.min((G.resources.gold||0)+goldR, RESOURCE_LIMITS.gold);
  G.resources.food=Math.min((G.resources.food||0)+foodR, RESOURCE_LIMITS.food);
  G.resources.stone=Math.min((G.resources.stone||0)+stoneR, RESOURCE_LIMITS.stone);
  G.resources.iron=Math.min((G.resources.iron||0)+ironR, RESOURCE_LIMITS.iron);
  G.dailyBonusClaimed=true;
  G.lastLoginDate=today;
  saveGame();
  showToast('🎁 每日奖励已领取！💰'+goldR+' 🍞'+foodR+' 🪨'+stoneR+' ⛏️'+ironR);
  updateResUI();
  renderCurrentTab();
}

function calculateTeamPower(){
  // 计算队伍总战力
  var power=0;
  G.team.forEach(function(slot){
    if(slot){
      var h=G.heroes.find(function(x){return x.uid===slot.uid});
      if(h){
        power+=h.atk*2+h.def*1.5+h.maxHP*0.5+h.spd*3;
      }
    }
  });
  return Math.max(100,power);
}

function calculateOfflineEarnings(){
  if(!G.lastOnlineTime) G.lastOnlineTime=Date.now();
  var now=Date.now();
  var elapsed=now-G.lastOnlineTime;
  // 最多计算12小时
  var maxOffline=12*60*60*1000;
  elapsed=Math.min(elapsed,maxOffline);
  var hours=elapsed/(60*60*1000);
  
  if(hours<0.1) return null; // 少于6分钟不计算
  
  var power=calculateTeamPower();
  var progress=Math.max(1,G.stageProgress);
  
  // 每小时收益 = 战力系数 * 关卡系数
  var goldPerHour=Math.floor(50+progress*15+power*0.1);
  var foodPerHour=Math.floor(20+progress*5);
  var stonePerHour=Math.floor(10+progress*3);
  var ironPerHour=Math.floor(5+progress*1);
  
  return{
    hours:hours,
    gold:Math.floor(goldPerHour*hours),
    food:Math.floor(foodPerHour*hours),
    stone:Math.floor(stonePerHour*hours),
    iron:Math.floor(ironPerHour*hours),
    power:power
  };
}

function claimOfflineEarnings(){
  if(!G.offlineEarnings){
    G.offlineEarnings=calculateOfflineEarnings();
  }
  if(!G.offlineEarnings) return;
  
  var e=G.offlineEarnings;
  G.resources.gold=Math.min((G.resources.gold||0)+e.gold,RESOURCE_LIMITS.gold);
  G.resources.food=Math.min((G.resources.food||0)+e.food,RESOURCE_LIMITS.food);
  G.resources.stone=Math.min((G.resources.stone||0)+e.stone,RESOURCE_LIMITS.stone);
  G.resources.iron=Math.min((G.resources.iron||0)+e.iron,RESOURCE_LIMITS.iron);
  
  showToast('💤 离线收益已领取！离线'+e.hours.toFixed(1)+'小时');
  G.offlineEarnings=null;
  G.lastOnlineTime=Date.now();
  saveGame();
  updateResUI();
  renderCurrentTab();
}

function checkOfflineEarnings(){
  // 检查是否有离线收益
  var earnings=calculateOfflineEarnings();
  if(earnings && earnings.hours>=0.1){

}

function assignTraits(hero){
  // 品质高的英雄获得更多特质
  const tCount = hero.quality==='mythic'?2:hero.quality==='legendary'?2:hero.quality==='epic'?rand(1,2):rand(0,1);
  const assigned = [];
  const pool = [...HERO_TRAITS];
  for(let i=0;i<tCount&&pool.length>0;i++){
    const idx=rand(0,pool.length-1);
    assigned.push(pool.splice(idx,1)[0]);
  }
  hero.traits = assigned;
  // 应用特质对属性的影响
  applyTraits(hero);
}
function applyTraits(hero){
  if(!hero.traits) return;
  for(const trait of hero.traits){
    if(trait.stat && trait.mult){
      const key=trait.stat;
      if(hero[key]!==undefined) hero[key]=Math.floor(hero[key]*trait.mult);
    }
    if(trait.bonus){
      for(const [bk,bv] of Object.entries(trait.bonus)){
        if(hero[bk]!==undefined && bv.mult) hero[bk]=Math.floor(hero[bk]*bv.mult);
      }
    }
  }
}
function getTraitEffect(trait){
  if(!trait) return '';
  // 战斗内生效的特质（不体现在属性面板）
  if(trait.id==='lucky'||trait.id==='vampire'||trait.id==='tactician'||trait.id==='ironWill') return trait.icon+' '+trait.desc;
  return '';
}

    logFn('  '+result,'skill');
  }
  saveGame();

}

// 建筑每分钟产出资源（进入建筑页面时触发，同时启动定时器自动收集）
var G_lastProductionTime=Date.now();
var G_productionTimer=null;

// 资源上限配置
const RESOURCE_LIMITS = {
  gold: 50000,      // 金币上限
  gems: 999,        // 宝石上限
  food: 5000,       // 食物上限（提升较多）
  stone: 3000,      // 石材上限
  iron: 1500,       // 铁矿上限
  fame: 999,        // 声望上限
  expPotion: 99999  // 经验药水上限（较高）
};

function produceResources(){
  var now=Date.now();
  var minutesPassed=(now-G_lastProductionTime)/(1000*60);
  if(minutesPassed<0.02)return; // 小于1秒不计算
  
  // 农场产出食物（配置是每小时产量，转换为每分钟）
  var farmLevel=G.buildings.farm||0;
  if(farmLevel>0){
    var farmDef=BUILDING_DEFS.farm;
    var foodPerHour=farmDef.foodProductionByLevel[farmLevel]||0;
    var foodPerMinute=foodPerHour/60;
    var foodProduced=Math.floor(foodPerMinute*minutesPassed);
    if(foodProduced>0){
      var before=G.resources.food||0;
      G.resources.food=Math.min((G.resources.food||0)+foodProduced, RESOURCE_LIMITS.food);
      var actual=G.resources.food-before;
      if(actual>0) showToast('🌾 农场产出 '+actual+' 食物'+(G.resources.food>=RESOURCE_LIMITS.food?' (已满)':''));
    }
  }
  
  // 矿场产出石材和铁矿（配置是每小时产量，转换为每分钟）
  var mineLevel=G.buildings.mine||0;
  if(mineLevel>0){
    var mineDef=BUILDING_DEFS.mine;
    var stonePerHour=mineDef.stoneProductionByLevel[mineLevel]||0;
    var ironPerHour=mineDef.ironProductionByLevel[mineLevel]||0;
    var stonePerMinute=stonePerHour/60;
    var ironPerMinute=ironPerHour/60;
    var stoneProduced=Math.floor(stonePerMinute*minutesPassed);
    var ironProduced=Math.floor(ironPerMinute*minutesPassed);
    
    var stoneBefore=G.resources.stone||0;
    var ironBefore=G.resources.iron||0;
    
    if(stoneProduced>0){
      G.resources.stone=Math.min((G.resources.stone||0)+stoneProduced, RESOURCE_LIMITS.stone);
    }
    if(ironProduced>0){
      G.resources.iron=Math.min((G.resources.iron||0)+ironProduced, RESOURCE_LIMITS.iron);
    }
    
    var stoneActual=(G.resources.stone||0)-stoneBefore;
    var ironActual=(G.resources.iron||0)-ironBefore;
    
    if(stoneActual>0||ironActual>0){
      var fullMsg='';
      if(G.resources.stone>=RESOURCE_LIMITS.stone) fullMsg+=' 石材已满';
      if(G.resources.iron>=RESOURCE_LIMITS.iron) fullMsg+=' 铁矿已满';
      showToast('⛏️ 矿场产出 '+stoneActual+' 石材 '+ironActual+' 铁矿'+fullMsg);
    }
  }
  
  G_lastProductionTime=now;
  updateResUI();
}

  if(G_productionTimer)clearInterval(G_productionTimer);
  G_productionTimer=setInterval(function(){
     produceResources();
   }, 8000);

function generateArenaOpponent(difficulty){
  // 获取玩家队伍信息
  var teamHeroes=G.team.filter(function(h){return h!==null});
  var teamSize=teamHeroes.length;
  if(teamSize===0)teamSize=1;
  
  // 计算玩家队伍平均等级和品质
  var totalLevel=0,totalQuality=0,maxPlayerLevel=0,totalPower=0;
  teamHeroes.forEach(function(h){
    totalLevel+=h.level;
    totalQuality+=QUALITIES.indexOf(h.quality);
    if(h.level>maxPlayerLevel)maxPlayerLevel=h.level;
    totalPower+=calcHeroPower(h);
  });
  var avgPlayerLevel=Math.floor(totalLevel/teamSize);
  var avgPlayerQuality=Math.floor(totalQuality/teamSize);
  if(avgPlayerLevel===0)avgPlayerLevel=1;
  
  // 难度参数
  var levelMultiplier={easy:0.6,normal:0.9,hard:1.1,nightmare:1.3,mythic:1.5};
  var maxQualityIdx={easy:1,normal:2,hard:3,nightmare:4,mythic:4}[difficulty]||2;
  var baseLevel=Math.max(1,Math.floor(avgPlayerLevel*levelMultiplier[difficulty]));
  
  // 对手人数：与玩家队伍相同（最少2人最多6人）
  var opponentCount=Math.min(Math.max(teamSize,2),6);
  
  // ===== 合理阵容生成（噩梦/神话难度） =====
  // 定义阵容模板：确保坦克+输出+辅助的合理搭配
  var teamCompositions=[
    // 均衡阵容
    [{role:'guardian',min:1},{role:'warrior',min:1},{role:'healer',min:1}],
    // 爆发阵容
    [{role:'warrior',min:1},{role:'assassin',min:1},{role:'mage',min:1}],
    // 消耗阵容
    [{role:'guardian',min:1},{role:'mage',min:1},{role:'healer',min:1}],
    // 控制阵容
    [{role:'mage',min:2},{role:'warlock',min:1}],
    // 速攻阵容
    [{role:'assassin',min:1},{role:'ranger',min:1},{role:'warrior',min:1}],
    // 圣光阵容
    [{role:'paladin',min:1},{role:'healer',min:1},{role:'guardian',min:1}],
    // 暗影阵容
    [{role:'warlock',min:1},{role:'assassin',min:1},{role:'mage',min:1}],
  ];
  
  // 选择阵容模板（噩梦/神话用合理阵容，其他随机）
  var useSmartTeam=(difficulty==='nightmare'||difficulty==='mythic');
  var selectedComp=null;
  if(useSmartTeam){
    selectedComp=pick(teamCompositions);
  }
  
  // 统计已分配的角色
  var roleCount={};
  var opponents=[];
  
  for(var i=0;i<opponentCount;i++){
    // 选择品质：匹配玩家品质范围
    var qualityIdx=Math.min(maxQualityIdx,avgPlayerQuality+rand(-1,1));
    qualityIdx=Math.max(0,Math.min(qualityIdx,QUALITIES.length-1));
    var quality=QUALITIES[qualityIdx];
    
    // 选择角色（智能阵容 or 随机）
    var targetRole=null;
    if(selectedComp){
      // 找到还需要满足的角色要求
      for(var c=0;c<selectedComp.length;c++){
        var req=selectedComp[c];
        var currentCount=roleCount[req.role]||0;
        if(currentCount<req.min){
          targetRole=req.role;
          break;
        }
      }
      // 如果所有要求都满足，随机选
      if(!targetRole){
        var allRoles=Object.keys(ROLES);
        targetRole=pick(allRoles);
      }
    }else{
      // 随机选角色
      var allRoles=Object.keys(ROLES);
      targetRole=pick(allRoles);
    }
    
    roleCount[targetRole]=(roleCount[targetRole]||0)+1;
    
    // 从该角色+品质的英雄模板中选择
    var pool=HERO_TEMPLATES.filter(function(t){return t.quality===quality&&t.role===targetRole});
    if(pool.length===0)pool=HERO_TEMPLATES.filter(function(t){return t.role===targetRole});
    if(pool.length===0)pool=HERO_TEMPLATES;
    var tpl=pick(pool);
    
    var role=ROLES[tpl.role];
    var qm=QUALITY_MULT[tpl.quality];
    
    // 等级波动
    var levelVariation=rand(-2,3);
    var opponentLevel=Math.max(1,baseLevel+levelVariation);
    
    // 技能：使用模板自带技能（已合理搭配）
    var skills=tpl.skills.slice();
    
    // 高难度额外技能加成
    if(difficulty==='nightmare'||difficulty==='mythic'){
      // 给每个英雄额外加一个同角色的强力技能
      var roleSkills=HERO_TEMPLATES.filter(function(t){return t.role===tpl.role&&t.quality!=='common'});
      var bonusPool=[];
      roleSkills.forEach(function(t){
        t.skills.forEach(function(s){
          if(skills.indexOf(s)===-1&&bonusPool.indexOf(s)===-1)bonusPool.push(s);
        });
      });
      if(bonusPool.length>0){
        skills.push(pick(bonusPool));
      }
    }
    
    opponents.push({
      name:tpl.name,
      icon:tpl.icon,
      quality:tpl.quality,
      role:tpl.role,
      level:opponentLevel,
      hp:calcStat(role.baseHP,qm,opponentLevel),
      maxHP:calcStat(role.baseHP,qm,opponentLevel),
      atk:calcStat(role.baseATK,qm,opponentLevel),
      def:calcStat(role.baseDEF,qm,opponentLevel),
      spd:calcStat(role.baseSPD,qm,opponentLevel),
      mp:calcStat(role.baseMP,qm,opponentLevel),
      maxMP:calcStat(role.baseMP,qm,opponentLevel),
      skills:skills,
      alive:true,
      isEnemy:true,
    });
  }
  return opponents;
}

function calculateArenaReward(opponents,difficulty,isWin){
  if(!isWin)return{gold:0,fame:0,extras:{}};
  
  // 计算对手平均等级和品质
  var totalLevel=0,totalQuality=0;
  opponents.forEach(function(o){
    totalLevel+=o.level;
    totalQuality+=QUALITIES.indexOf(o.quality);
  });
  var avgLevel=Math.floor(totalLevel/opponents.length);
  var avgQuality=Math.floor(totalQuality/opponents.length);
  
  var baseGold=ARENA_CONFIG.baseGoldReward;
  var baseFame=ARENA_CONFIG.baseFameReward;
  var diffMult=ARENA_CONFIG.difficultyMultiplier[difficulty]||1;
  
  var levelBonus=1+(avgLevel/80);
  var qualityBonus=1+(avgQuality*0.15);
  var countBonus=opponents.length*0.2;
  
  var gold=Math.floor(baseGold*levelBonus*qualityBonus*(1+countBonus)*diffMult);
  var fame=Math.floor(baseFame*levelBonus*qualityBonus*(1+countBonus)*diffMult);
  
  // 连胜加成
  var winStreak=G.arenaState.winStreak;
  var streakBonus=0;
  var streakThresholds=Object.keys(ARENA_CONFIG.winStreakBonus).map(Number).sort(function(a,b){return b-a});
  for(var i=0;i<streakThresholds.length;i++){
    if(winStreak>=streakThresholds[i]){streakBonus=ARENA_CONFIG.winStreakBonus[streakThresholds[i]];break;}
  }
  gold=Math.floor(gold*(1+streakBonus));
  fame=Math.floor(fame*(1+streakBonus));
  
  // 丰厚额外奖励
  var extras=ARENA_CONFIG.rewardExtras[difficulty]||ARENA_CONFIG.rewardExtras.easy;
  var rewardExtras={};
  
  // 宝石掉落
  if(extras.gemChance>0&&Math.random()<extras.gemChance){
    rewardExtras.gems=extras.gemAmount;
  }
  
  // 经验药水
  var potionAmount=rand(extras.expPotionMin,extras.expPotionMax);
  rewardExtras.expPotion=potionAmount;
  
  // 铁矿
  var ironAmount=rand(extras.ironMin,extras.ironMax);
  rewardExtras.iron=ironAmount;
  
  // 石材（高难度）
  if(difficulty==='hard'||difficulty==='nightmare'||difficulty==='mythic'){
    rewardExtras.stone=rand(5,20)*(difficulty==='mythic'?3:difficulty==='nightmare'?2:1);
  }
  
  return{gold:gold,fame:fame,extras:rewardExtras};
}

function startArenaBattle(difficulty){
  var remaining=getArenaRemainingChallenges();
  if(remaining<=0){showToast('今日挑战次数已用完');return}
  
  // 检查是否有队伍
  var teamHeroes=G.team.filter(function(h){return h!==null});
  if(teamHeroes.length===0){showToast('请先编组队伍');return}
  
  // 生成对手
  var opponents=generateArenaOpponent(difficulty);
  
  // 保存竞技场信息供战斗结束后结算
  G.arenaBattleInfo={
    difficulty:difficulty,
    opponents:opponents
  };
  
  // 启动竞技场战斗
  runArenaBattle(teamHeroes,opponents,difficulty);
}

        unit.cooldowns[skillId]=chosenSkill.cooldown;
        
        // 显示技能效果
        var effectClass='fire';

            }
            recordBattleStat(unit,'damage',dmg);
            recordBattleStat(target,'damageTaken',dmg);
            if(r.crit)recordBattleStat(unit,'crit',1);
            if(target.hp<=0){target.alive=false;log(target.icon+' '+target.name+' 倒下了...','death');animUnit(target,'dying',700)}
          }
        }
      }
      
      renderTeams();
      updateBattleStatsBoard();
      await sleep(500/G_battleSpeed);
    }
    
    renderTeams();
    
    // 检查胜负
    var playerAlive=playerUnits.filter(function(u){return u.alive}).length;
    var enemyAlive=enemyUnits.filter(function(u){return u.alive}).length;
    
    if(playerAlive===0||enemyAlive===0){
      G_battleRunning=false;
      break;
    }
    
    await sleep(300/G_battleSpeed);
  }
  
  // 战斗结束 - 检查是否被中途退出打断
  if(!G.arenaBattleInfo){return;}
  
  var playerAlive=playerUnits.filter(function(u){return u.alive}).length;
  var enemyAlive=enemyUnits.filter(function(u){return u.alive}).length;
  var isWin=playerAlive>0&&enemyAlive===0;
  
  // 【关键】立即保存胜负结果和奖励，防止用户在 await 间隙点退出
  G.arenaIsWin=isWin;
  G.arenaReward=calculateArenaReward(G.arenaBattleInfo.opponents,G.arenaBattleInfo.difficulty,isWin);
  
  await finishArenaBattle(isWin,playerUnits,enemyUnits);
}

async function finishArenaBattle(isWin,playerUnits,enemyUnits){
  updateResUI();
  saveGame();
  renderTeams();
  G_battleRunning=false;
  G_battlePaused=false;
  
  // 保存胜负结果到全局
  G.arenaIsWin=isWin;
  
  // 计算奖励
  var info=G.arenaBattleInfo;
  var difficulty=info.difficulty;
  var opponents=info.opponents;
  var reward=calculateArenaReward(opponents,difficulty,isWin);
  G.arenaReward=reward;
  
  // 显示结算提示（通过Toast）
  if(isWin){
    // 发放奖励
    G.resources.gold=Math.min((G.resources.gold||0)+reward.gold,RESOURCE_LIMITS.gold);
    G.resources.fame=Math.min((G.resources.fame||0)+reward.fame,RESOURCE_LIMITS.fame);
    G.arenaState.totalGoldEarned=(G.arenaState.totalGoldEarned||0)+reward.gold;
    G.arenaState.totalFameEarned=(G.arenaState.totalFameEarned||0)+reward.fame;
    
    // 额外奖励
    var extras=reward.extras||{};
    var extraMsg='';
    if(extras.gems){
      G.resources.gems=Math.min((G.resources.gems||0)+extras.gems,RESOURCE_LIMITS.gems);
      extraMsg+=' 💎'+extras.gems;
    }
    if(extras.expPotion){
      G.resources.expPotion=Math.min((G.resources.expPotion||0)+extras.expPotion,RESOURCE_LIMITS.expPotion);
      extraMsg+=' 🧪'+extras.expPotion;
    }
    if(extras.iron){
      G.resources.iron=Math.min((G.resources.iron||0)+extras.iron,RESOURCE_LIMITS.iron);
      extraMsg+=' ⛏️'+extras.iron;
    }
    if(extras.stone){
      G.resources.stone=Math.min((G.resources.stone||0)+extras.stone,RESOURCE_LIMITS.stone);
      extraMsg+=' 🪨'+extras.stone;
    }
    
    showToast('🎉 竞技场胜利！💰'+reward.gold+' 🏆'+reward.fame+extraMsg);
    updateResUI();
  }else{
    showToast('💀 竞技场失败...');
  }
  
  // 显示战斗结果面板（动画效果）+ 短暂延迟后自动回到竞技场
  var btnArea=document.getElementById('arena-battle-buttons');
  if(btnArea){
    var resultText=isWin?'<span class="text-gold" style="font-size:20px;font-weight:bold">🎉 竞技场胜利！</span>':'<span class="text-red" style="font-size:20px;font-weight:bold">💀 竞技场失败...</span>';
    var rewardText='';
    if(isWin){
      var extraStr='';
      var ex=reward.extras||{};
      if(ex.gems)extraStr+=' 💎'+ex.gems;
      if(ex.expPotion)extraStr+=' 🧪'+ex.expPotion;
      if(ex.iron)extraStr+=' ⛏️'+ex.iron;
      if(ex.stone)extraStr+=' 🪨'+ex.stone;
      rewardText='<div style="text-align:center;margin:12px 0;color:#ffd700;font-size:16px">💰'+reward.gold+' 🏆'+reward.fame+extraStr+'</div>';
    }
    var streakText=isWin?'<div style="text-align:center;margin:8px 0;color:#2ed573">连胜: '+G.arenaState.winStreak+'</div>':'';
    btnArea.innerHTML='<div style="margin:20px 0;text-align:center;padding:20px;background:rgba(0,0,0,0.3);border-radius:10px">'+resultText+rewardText+streakText+'</div>';
  }
  
  // 自动结算（延迟后返回竞技场）
  G.arenaSettleTimer=setTimeout(function(){
    showArenaResult();
  }, 1500);
}

function showArenaResult(){
  var info=G.arenaBattleInfo;
  if(!info)return;
  
  var difficulty=info.difficulty;
  var isWin=G.arenaIsWin;
  var reward=G.arenaReward||{gold:0,fame:0};
  
  // 更新状态
  G.arenaState.dailyChallengesUsed++;
  
  if(isWin){
    G.arenaState.winStreak++;
    if(G.arenaState.winStreak>(G.arenaState.maxWinStreak||0)){
      G.arenaState.maxWinStreak=G.arenaState.winStreak;
    }
    G.arenaState.totalWins++;
    // 记录最高难度
    var diffOrder=['easy','normal','hard','nightmare','mythic'];
    var curIdx=diffOrder.indexOf(G.arenaState.highestDifficulty||'easy');
    var thisIdx=diffOrder.indexOf(difficulty);
    if(thisIdx>curIdx)G.arenaState.highestDifficulty=difficulty;
    // 奖励已在 finishArenaBattle 中发放，这里不再重复
  }else{
    G.arenaState.winStreak=0;
    G.arenaState.totalLosses++;
  }
  
  // 直接渲染竞技场页面（不通过switchTab）
  var contentEl=document.getElementById('content');
  if(contentEl){
    renderArena(contentEl);
  }
  
  // 计算战斗数据汇总
  var totalDamage=0,totalHeal=0,totalTaken=0,totalCrit=0,totalDodge=0;
  var maxDamageUnit='',maxDamage=0;
  for(var k in G_battleStats){
    var s=G_battleStats[k];
    totalDamage+=s.damage||0;
    totalHeal+=s.heal||0;
    totalTaken+=s.damageTaken||0;
    totalCrit+=s.crit||0;
    totalDodge+=s.dodge||0;
    if((s.damage||0)>maxDamage){
      maxDamage=s.damage;maxDamageUnit=s.icon+s.name;

  // 显示结果弹窗
  var diffNames={easy:'🟢简单',normal:'🟡普通',hard:'🔴困难'};
  var resultTitle=isWin?'🎉 竞技场胜利！':'💀 竞技场失败...';
  var resultContent=
    '<div style="text-align:center;margin:8px 0;font-size:12px">难度: '+diffNames[difficulty]+'</div>'+
    '<div style="text-align:center;font-size:18px;margin:16px 0">'+resultTitle+'</div>'+
    (isWin?
      '<div style="text-align:center;margin:8px 0">连胜: <b style="color:#2ed573">'+G.arenaState.winStreak+'</b></div>'+
      '<div style="text-align:center;margin:8px 0">奖励: <b style="color:#ffd700">💰'+reward.gold+'</b> <b style="color:#ff6b6b">🏆'+reward.fame+'</b></div>'
    :'<div style="text-align:center;margin:8px 0;color:var(--red)">连胜已重置</div>')+
    '<div style="margin-top:12px;padding:10px;background:rgba(0,0,0,0.3);border-radius:6px">'+
    '<div style="font-weight:bold;font-size:12px;margin-bottom:6px;color:var(--gold)">📊 战斗数据汇总</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px">'+
    '<span>⚔️ 总伤害: <b style="color:#ff6b6b">'+totalDamage+'</b></span>'+
    '<span>💥 暴击次数: <b style="color:#ff4757">'+totalCrit+'</b></span>'+
    '<span>💚 总治疗: <b style="color:#2ed573">'+totalHeal+'</b></span>'+
    '<span>💨 闪避次数: <b style="color:#70a1ff">'+totalDodge+'</b></span>'+
    '<span style="grid-column:span 2">🛡️ 总承伤: <b style="color:#ffa502">'+totalTaken+'</b></span>'+
    '<span style="grid-column:span 2;color:var(--text2)">🏅 最高输出: '+maxDamageUnit+' ('+maxDamage+')</span>'+
    '</div></div>';
  
  showModal('竞技场结果',resultContent,[{text:'确定',action:"closeModal()",cls:'btn-primary'}]);
  
  delete G.arenaBattleInfo;
  delete G.arenaIsWin;
  delete G.arenaReward;
  delete G.arenaBattleUnits;
  G.arenaSettleTimer=null;
}

function toggleArenaPause(){
  G_battlePaused=!G_battlePaused;
  // 查找控制栏中的暂停/继续按钮
  var allBtns=document.querySelectorAll('.panel .btn-group .btn');
  for(var i=0;i<allBtns.length;i++){
    var txt=allBtns[i].textContent;
    if(txt.indexOf('⏸️')>=0||txt.indexOf('▶️')>=0||txt.indexOf('暂停')>=0||txt.indexOf('继续')>=0){
      allBtns[i].textContent=G_battlePaused?'▶️ 继续':'⏸️ 暂停';
      allBtns[i].classList.toggle('btn-primary',G_battlePaused);
      break;
    }
  }

function exitArenaBattle(){
  // 清除自动结算定时器
  if(G.arenaSettleTimer){clearTimeout(G.arenaSettleTimer);G.arenaSettleTimer=null;}
  
  // 战斗还在进行中 → 根据实际战斗状态判断胜负
  if(G_battleRunning){
    var actualWin=false;
    if(G.arenaBattleUnits){
      var pAlive=G.arenaBattleUnits.playerUnits.filter(function(u){return u.alive}).length;
      var eAlive=G.arenaBattleUnits.enemyUnits.filter(function(u){return u.alive}).length;
      actualWin=pAlive>0&&eAlive===0;
    }
    if(actualWin){
      // 敌人都死了，是胜利，让 async runArenaBattle 自己检测并结算
      G_battleRunning=false;
      G_battlePaused=false;
      showToast('🎉 战斗胜利，正在结算...');
      return;
    }
    // 真的还在打或在失败边缘 → 确认退出视为失败
    if(!confirm('确定要退出竞技场战斗吗？\n此次挑战次数将扣除，并视为失败。'))return;
    G_battleRunning=false;
    G_battlePaused=false;
    _battleScene=null;
    G.arenaIsWin=false;
    G.arenaReward={gold:0,fame:0};
    showArenaResult();
    return;
  }
  
  // 战斗已自然结束 → 直接结算返回竞技场（信任已有的G.arenaIsWin）
  _battleScene=null;
  if(G.arenaBattleInfo){
    showArenaResult();
  }else{
    showToast('返回竞技场');
    var contentEl=document.getElementById('content');
    if(contentEl)renderArena(contentEl);
  }
}

function getHeroLevelCap(){
  var templeLevel=G.buildings.temple||0;
  var templeDef=BUILDING_DEFS.temple;
  return templeDef.heroLevelCapByLevel[templeLevel]||20;
}

function getExpToLevel(level){return Math.floor(50*Math.pow(1.25,level-1))}

function addHeroExp(hero,amount){
  var levelCap=getHeroLevelCap();
  if(hero.level>=levelCap)return false;
  hero.exp+=amount;
  let leveled=false;
  while(hero.exp>=getExpToLevel(hero.level)&&hero.level<levelCap){
    hero.exp-=getExpToLevel(hero.level);
    hero.level++;
    leveled=true;
    const role=ROLES[hero.role];const qm=QUALITY_MULT[hero.quality];
    hero.maxHP=calcStat(role.baseHP, qm, hero.level);
    hero.atk=calcStat(role.baseATK, qm, hero.level);
    hero.def=calcStat(role.baseDEF, qm, hero.level);
    hero.spd=calcStat(role.baseSPD, qm, hero.level);
    hero.maxMP=calcStat(role.baseMP, qm, hero.level);
    hero.hp=hero.maxHP;hero.mp=hero.maxMP;
  }
  // 超出上限的经验清零
  if(hero.level>=levelCap)hero.exp=0;
  return leveled;
}

function createBattleUnit(hero,isEnemy=false){
  const stats=getHeroStats(hero);
  return{
    hero:hero, isEnemy:isEnemy,
    name:hero.name, icon:hero.icon,
    hp:stats.maxHP, maxHP:stats.maxHP,
    mp:stats.maxMP, maxMP:stats.maxMP,
    atk:stats.atk, def:stats.def, spd:stats.spd,
    alive:true, shield:0,
    buffs:[], cooldowns:{},
    dot:[], // 持续伤害
    bonusSkills: hero.bonusSkills||[],
  };
}

function calcDamage(attacker,defender,skill=null){
  // 金手指：一击必杀（玩家攻击时）
  if(G_cheats.enabled && G_cheats.oneHitKill && !attacker.isEnemy){
    return{dmg:999999,crit:true,dodged:false};
  }
  // 金手指：无敌（玩家受击时）
  if(G_cheats.enabled && G_cheats.godMode && !defender.isEnemy){
    return{dmg:0,crit:false,dodged:true};
  }
  let atk=attacker.atk;
  let def=defender.def;
  
  // 获取职业数据
  const attackerRole=ROLES[attacker.role];
  const defenderRole=ROLES[defender.role];
  
  // buff/debuff
  attacker.buffs.forEach(b=>{if(b.stat==='atk')atk=Math.floor(atk*b.mult)});
  defender.buffs.forEach(b=>{if(b.stat==='def')def=Math.floor(def*b.mult)});
  
  // ===== 职业机制 =====
  
  // 战士：狂怒 - 生命值低于30%时攻击力提升50%
  if(attacker.role==='warrior' && attacker.hp/attacker.maxHP<0.3){
    atk=Math.floor(atk*1.5);
  }
  
  // 守护者：铁壁 - 受到伤害减少20%
  if(defender.role==='guardian'){
    def=Math.floor(def*1.2);
  }
  
  // 法师：奥术精通 - 技能伤害提升30%
  if(attacker.role==='mage' && skill){
    atk=Math.floor(atk*1.3);
  }
  
  // 游侠：精准 - 攻击无视目标20%防御
  if(attacker.role==='ranger'){
    def=Math.floor(def*0.8);
  }
  
  // 圣骑士：对亡灵伤害+50%
  if(attacker.role==='paladin' && defender.isUndead){
    atk=Math.floor(atk*1.5);
  }
  
  // 术士：DOT伤害+50%（在executeSkill中处理）
  
  // 基础伤害计算
  let mult=skill?skill.mult:1.0;
  let dmg=Math.max(1,Math.floor((atk*mult-def*0.5)*(0.9+Math.random()*0.2)));
  
  // 暴击计算（考虑职业暴击率 + 英雄特质暴击率）
  let crit=false;
  let critRate=attackerRole&&attackerRole.critRate?attackerRole.critRate:0.1;
  if(skill&&skill.critBonus)critRate+=skill.critBonus;
  // 英雄特质：狂战士 +8%暴击
  if(attacker.traits) attacker.traits.forEach(t=>{if(t.id==='berserker')critRate+=0.08});
  // 金手指模式下暴击率提升
  if(G_cheats.enabled) critRate+=0.1;
  
  // 刺客：暗影步 - 暴击伤害+50%
  let critDmg=attackerRole&&attackerRole.critDmg?attackerRole.critDmg:1.8;
  
  if(Math.random()<critRate){dmg=Math.floor(dmg*critDmg);crit=true}
  
  // 闪避计算（考虑职业闪避率 + 英雄特质闪避率）
  let dodgeChance=defenderRole&&defenderRole.dodgeRate?defenderRole.dodgeRate:0.05;
  defender.buffs.forEach(b=>{if(b.stat==='dodge')dodgeChance+=0.3});
  // 英雄特质：灵动 +8%闪避
  if(defender.traits) defender.traits.forEach(t=>{if(t.id==='nimble')dodgeChance+=0.08});
  if(skill&&skill.alwaysHit)dodgeChance=0;
  if(Math.random()<dodgeChance)return{dmg:0,dodged:true,crit:false};
  
  // 术士：灵魂虹吸 - 造成伤害的15%转化为生命恢复
  if(attacker.role==='warlock' && !attacker.isEnemy){
    const heal=Math.floor(dmg*0.15);
    attacker.hp=Math.min(attacker.maxHP,attacker.hp+heal);
  }
  // 英雄特质：吸血鬼 - 造成伤害的5%吸血
  if(attacker.traits) attacker.traits.forEach(t=>{
    if(t.id==='vampire'){
      const heal=Math.floor(dmg*0.05);
      attacker.hp=Math.min(attacker.maxHP,attacker.hp+heal);
    }
  });
  
  return{dmg,crit,dodged:false};
}
