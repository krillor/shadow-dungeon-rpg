// 更新英雄卡片选中状态
function updateMergeHeroCardStyle(heroUid, isSelected){
  var card=document.querySelector('.hero-card[data-uid="'+heroUid+'"]');
  if(!card)return;

  // 获取英雄信息
  var hero=G.heroes.find(function(h){return h.uid===heroUid});
  if(!hero)return;

  // 检查英雄是否已上阵或锁定
  var teamUids=G.team.filter(function(h){return h!==null}).map(function(h){return h.uid});
  var isInTeam=teamUids.includes(heroUid);
  var isLocked=hero.locked;
  var canClick=!isInTeam && !isLocked;

  if(isSelected){
    card.style.boxShadow='0 0 12px rgba(255,215,0,.4)';
    card.style.borderColor='var(--gold)';
    // 添加或更新已选标记
    var badge=card.querySelector('.merge-selected-badge');
    if(!badge){
      badge=document.createElement('div');
      badge.className='merge-selected-badge';
      badge.style.cssText='position:absolute;top:4px;right:4px;background:var(--gold);color:#000;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:bold';
      badge.textContent='✓ 已选';
      card.appendChild(badge);
    }
    // 更新点击事件（只有可点击的英雄才能移除）
    if(canClick){
      card.onclick=function(){removeMergeHero(heroUid);};
    }
  }else{
    card.style.boxShadow='';
    card.style.borderColor='';
    // 移除已选标记
    var badge=card.querySelector('.merge-selected-badge');
    if(badge)badge.remove();
    // 更新点击事件（只有可点击的英雄才能添加）
    if(canClick){
      card.onclick=function(){addMergeHero(heroUid);};
    }else{
      card.onclick=null;
    }
  }
}

// 更新融合预览
function updateMergePreview(){
  var previewEl=document.getElementById('merge-preview');
  var detailsEl=document.getElementById('merge-preview-details');
  if(!previewEl)return;

  var usedUids=window._mergeSlots||[null,null,null];
  var selectedHeroes=usedUids.filter(Boolean).map(function(uid){return G.heroes.find(function(h){return h.uid==uid});}).filter(Boolean);

  if(selectedHeroes.length<2){
    previewEl.innerHTML='<div class="text-dim text-sm text-center">👇 点击下方英雄卡片添加到融合槽</div>';
    return;
  }

  // 重新计算预览（简化版）
  var qualities=selectedHeroes.map(function(h){return QUALITIES.indexOf(h.quality)});
  var maxQ=Math.max.apply(null,qualities);
  var avgQ=Math.floor(qualities.reduce(function(a,b){return a+b},0)/selectedHeroes.length);
  var previewQuality=QUALITIES[Math.min(maxQ,avgQ)];

  var avgHP=Math.floor(selectedHeroes.reduce(function(s,h){return s+h.maxHP},0)/selectedHeroes.length);
  var avgATK=Math.floor(selectedHeroes.reduce(function(s,h){return s+h.atk},0)/selectedHeroes.length);
  var avgDEF=Math.floor(selectedHeroes.reduce(function(s,h){return s+h.def},0)/selectedHeroes.length);

  previewEl.innerHTML='<div style="background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);border-radius:8px;padding:12px"><div style="color:var(--gold);font-weight:bold;margin-bottom:8px">🔮 融合预览</div><div style="display:flex;gap:16px;flex-wrap:wrap"><div><span class="text-dim">预计品质:</span> <span class="q-'+previewQuality+'">'+QUALITY_NAMES[previewQuality]+'</span></div><div><span class="text-dim">预计属性:</span> ❤️~'+avgHP+' ⚔️~'+avgATK+' 🛡️~'+avgDEF+'</div></div></div>';

  if(detailsEl && selectedHeroes.length>=2){
    detailsEl.open=true;
  }
}

// 更新融合按钮状态
function updateMergeButtonState(){
  var btn=document.getElementById('merge-btn');
  if(!btn)return;

  // 清理无效的融合槽位引用（英雄已被移除的情况）
  // 注意：使用 Array.some 进行宽松类型比较，避免字符串/数字 uid 不匹配
  if(window._mergeSlots){
    var heroUids=G.heroes.map(function(h){return h.uid});
    for(var i=0;i<window._mergeSlots.length;i++){
      if(window._mergeSlots[i]!==null){
        var slotUid=window._mergeSlots[i];
        var exists=heroUids.some(function(uid){return uid==slotUid});
        if(!exists){
          window._mergeSlots[i]=null;
        }
      }
    }
  }

  var usedUids=window._mergeSlots||[null,null,null];
  // 只统计有效英雄（在G.heroes中存在的，使用 == 进行宽松类型比较）
  var validHeroes=usedUids.filter(Boolean).map(function(uid){return G.heroes.find(function(x){return x.uid==uid})}).filter(Boolean);
  var selectedCount=validHeroes.length;

  var qualities=validHeroes.map(function(h){return QUALITIES.indexOf(h.quality)});
  var maxQ=qualities.length>0?Math.max.apply(null,qualities):0;
  var mergeCost=selectedCount>=2?(maxQ+1)*200:0;
  // 加入赌局费用检查
  var gambleInfo=getGambleInfo();
  var canAfford=(G.resources.gold||0)>=mergeCost;
  if(G_mergeGamble!=='normal'&&gambleInfo.cost>0){
    if(gambleInfo.costType==='gems'){
      canAfford=canAfford&&(G.resources.gems||0)>=gambleInfo.cost;
    }else{
      canAfford=(G.resources.gold||0)>=(mergeCost+gambleInfo.cost);
    }
  }

  btn.disabled=selectedCount<2||!canAfford;
}

    const tpl=EQUIP_TEMPLATES.find(t=>t.id===eq.id);

// ==================== 一键穿戴 ====================
function autoEquipAll(){
  // 获取所有未装备的装备
  var unequipped=G.equipment.filter(function(e){return e.heroUid===null});
  if(unequipped.length===0){showToast('没有可穿戴的装备');return}
  
  // 英雄按战力排序（高品质优先，同品质按等级）
  var qualityOrder={mythic:5,legendary:4,epic:3,rare:2,common:1};
  var sortedHeroes=G.heroes.slice().sort(function(a,b){
    var qa=qualityOrder[a.quality]||0, qb=qualityOrder[b.quality]||0;
    if(qa!==qb)return qb-qa;
    return b.level-a.level;
  });
  
  // 装备按品质排序（高品质优先，同品质按强化等级）
  var sortedEquip=unequipped.slice().sort(function(a,b){
    var ta=EQUIP_TEMPLATES.find(function(t){return t.id===a.id});
    var tb=EQUIP_TEMPLATES.find(function(t){return t.id===b.id});
    if(!ta||!tb)return 0;
    var qa=qualityOrder[ta.quality]||0, qb=qualityOrder[tb.quality]||0;
    if(qa!==qb)return qb-qa;
    return (b.enhance||0)-(a.enhance||0);
  });
  
  var equippedCount=0;
  sortedEquip.forEach(function(eq){
    var tpl=EQUIP_TEMPLATES.find(function(t){return t.id===eq.id});
    if(!tpl)return;
    var slot=tpl.type==='weapon'?'weapon':tpl.type==='armor'?'armor':'accessory';
    
    // 找到该槽位未装备的最高优先级英雄
    for(var i=0;i<sortedHeroes.length;i++){
      var hero=sortedHeroes[i];
      if(hero.equipment[slot]==null){
        // 装备
        hero.equipment[slot]=eq.uid;
        eq.heroUid=hero.uid;
        equippedCount++;
        break;
      }
    }
  });
  
  saveGame();
  renderCurrentTab();
  showToast('✅ 一键穿戴完成！共装备 '+equippedCount+' 件');
}

// ==================== 一键强化 ====================
function autoEnhanceAll(){
  // 获取所有已穿戴装备，按品质排序（高品质优先）
  var qualityOrder={mythic:5,legendary:4,epic:3,rare:2,common:1};
  var equipped=G.equipment.filter(function(e){return e.heroUid!==null});
  if(equipped.length===0){showToast('没有已穿戴的装备');return}
  
  // 按品质排序（高品质优先），同品质按强化等级低的优先
  equipped.sort(function(a,b){
    var ta=EQUIP_TEMPLATES.find(function(t){return t.id===a.id});
    var tb=EQUIP_TEMPLATES.find(function(t){return t.id===b.id});
    if(!ta||!tb)return 0;
    var qa=qualityOrder[ta.quality]||0, qb=qualityOrder[tb.quality]||0;
    if(qa!==qb)return qb-qa;
    return (a.enhance||0)-(b.enhance||0);
  });
  
  var totalEnhanced=0;
  var totalGold=0;
  var totalIron=0;
  
  equipped.forEach(function(eq){
    // 先卸下
    var heroUid=eq.heroUid;
    eq.heroUid=null;
    
    var level=eq.enhance||0;
    while(level<10){
      var ironCost=10+level*5;
      var goldCost=50+level*30;
      
      if((G.resources.iron||0)<ironCost||(G.resources.gold||0)<goldCost)break;
      
      G.resources.iron-=ironCost;
      G.resources.gold-=goldCost;
      totalGold+=goldCost;
      totalIron+=ironCost;
      level++;
    }
    
    if(level>(eq.enhance||0)){
      eq.enhance=level;
      totalEnhanced++;
    }
    
    // 重新穿上
    eq.heroUid=heroUid;
  });
  
  saveGame();
  updateResUI();
  renderCurrentTab();
  
  if(totalEnhanced>0){
    showToast('✅ 一键强化完成！强化 '+totalEnhanced+' 件装备 (💰'+totalGold+' ⛏️'+totalIron+')');
  }else{
    showToast('⚠️ 没有装备可以强化（资源不足或已满级）');
  }
}

// ==================== 装备强化与分解 ====================
function enhanceEquipment(equipUid){
  var eq=G.equipment.find(function(e){return e.uid===equipUid});
  if(!eq){showToast('装备不存在！');return}
  if(eq.heroUid){showToast('请先卸下装备！');return}
  
  var level=eq.enhance||0;
  if(level>=10){showToast('已达到最高强化等级！');return}
  
  // 强化消耗：铁矿随等级递增
  var ironCost=10+level*5;
  var goldCost=50+level*30;
  
  if((G.resources.iron||0)<ironCost){showToast('铁矿不足！需要 '+ironCost+' ⛏️');return}
  if((G.resources.gold||0)<goldCost){showToast('金币不足！需要 '+goldCost+' 💰');return}
  
  G.resources.iron-=ironCost;
  G.resources.gold-=goldCost;
  eq.enhance=level+1;
  
  var tpl=EQUIP_TEMPLATES.find(function(t){return t.id===eq.id});
  showToast(tpl.name+' 强化成功！+'+(level+1));
  saveGame();
  updateResUI();
  renderCurrentTab();
}

function decomposeEquipment(equipUid){
  var eq=G.equipment.find(function(e){return e.uid===equipUid});
  if(!eq){showToast('装备不存在！');return}
  if(eq.heroUid){showToast('请先卸下装备！');return}
  
  var tpl=EQUIP_TEMPLATES.find(function(t){return t.id===eq.id});
  if(!tpl){showToast('装备数据错误！');return}
  
  showConfirm('分解装备','确定要分解 <b style="color:var(--gold)">'+tpl.icon+' '+tpl.name+'</b> 吗？<br><span style="font-size:12px;color:var(--text3)">将返还 ⛏️ 铁矿</span>',function(){ doDecompose(equipUid,tpl); });
}

function doDecompose(equipUid,tpl){
  var eq=G.equipment.find(function(e){return e.uid===equipUid});
  if(!eq) return;
  
  // 分解返还铁矿（基础返还+强化返还）
  var qualityIdx=QUALITIES.indexOf(tpl.quality);
  var baseIron=5+qualityIdx*10;
  var enhanceBonus=(eq.enhance||0)*5;
  var ironReturn=baseIron+enhanceBonus;
  
  G.resources.iron=Math.min((G.resources.iron||0)+ironReturn,RESOURCE_LIMITS.iron);
  G.equipment=G.equipment.filter(function(e){return e.uid!==equipUid});
  
  showToast('分解成功！获得 ⛏️'+ironReturn+' 铁矿');
  saveGame();
  updateResUI();
  renderCurrentTab();
}

// 一键分解（分解指定品质及以下的所有未装备装备）
function batchDecompose(maxQuality){
  var maxIdx=QUALITIES.indexOf(maxQuality);
  if(maxIdx<0){showToast('品质参数错误');return}
  
  // 获取符合条件的未装备装备
  var toDecompose=G.equipment.filter(function(eq){
    if(eq.heroUid!==null)return false;
    var tpl=EQUIP_TEMPLATES.find(function(t){return t.id===eq.id});
    if(!tpl)return false;
    var eqIdx=QUALITIES.indexOf(tpl.quality);
    return eqIdx>=0 && eqIdx<=maxIdx;
  });
  
  if(toDecompose.length===0){
    showToast('没有可分解的装备');
    return;
  }
  
  // 显示确认弹窗
  var qualityNames={common:'普通',rare:'稀有',epic:'史诗',legendary:'传说',mythic:'神话'};
  var qColor={common:'#888',rare:'#4a9eff',epic:'#a855f7',legendary:'#f59e0b',mythic:'#ef4444'};
  
  // 计算总返还
  var totalIron=0;
  toDecompose.forEach(function(eq){
    var tpl=EQUIP_TEMPLATES.find(function(t){return t.id===eq.id});
    if(tpl){
      var qualityIdx=QUALITIES.indexOf(tpl.quality);
      var baseIron=5+qualityIdx*10;
      var enhanceBonus=(eq.enhance||0)*5;
      totalIron+=baseIron+enhanceBonus;
    }
  });
  
  openModal(`
    <div class="modal" style="max-width:320px;margin:auto">
      <div style="text-align:center;padding:10px">
        <div style="font-size:48px;margin-bottom:10px">🗑️</div>
        <div style="font-size:18px;font-weight:bold;color:${qColor[maxQuality]}">${qualityNames[maxQuality]}及以下一键分解</div>
        
        <div style="background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);border-radius:8px;padding:12px;margin:15px 0">
          <div style="color:#ff6b6b;font-weight:bold;margin-bottom:8px">⚠️ 确定要分解 ${toDecompose.length} 件装备吗？</div>
          <div style="font-size:12px;color:var(--text2)">将分解以下品质的装备：</div>
          <div style="margin-top:6px;font-size:13px;color:${qColor[maxQuality]}">
            ${QUALITIES.slice(0,maxIdx+1).map(function(q){return qualityNames[q]}).join(' / ')}
          </div>
          <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,107,107,.3)">
            <div style="font-size:12px;color:var(--text2)">预计返还：</div>
            <div style="font-size:18px;font-weight:bold;color:#4a9eff">⛏️ ${totalIron} 铁矿</div>
          </div>
        </div>
        
        <div style="display:flex;gap:10px">
          <button class="btn" style="flex:1" onclick="closeModal()">取消</button>
          <button class="btn" style="flex:1;background:rgba(255,107,107,.2);border-color:rgba(255,107,107,.5);color:#ff6b6b" onclick="confirmBatchDecompose('${maxQuality}')">确认分解</button>
        </div>
      </div>
    </div>
  `);
}

// 确认一键分解
function confirmBatchDecompose(maxQuality){
  var maxIdx=QUALITIES.indexOf(maxQuality);
  if(maxIdx<0){closeModal();return}
  
  var totalIron=0;
  var count=0;
  
  // 收集要分解的装备UID
  var uids=[];
  G.equipment.forEach(function(eq){
    if(eq.heroUid!==null)return;
    var tpl=EQUIP_TEMPLATES.find(function(t){return t.id===eq.id});
    if(!tpl)return;
    var eqIdx=QUALITIES.indexOf(tpl.quality);
    if(eqIdx>=0 && eqIdx<=maxIdx){
      uids.push(eq.uid);
      var baseIron=5+eqIdx*10;
      var enhanceBonus=(eq.enhance||0)*5;
      totalIron+=baseIron+enhanceBonus;
      count++;
    }
  });
  
  // 执行分解
  G.equipment=G.equipment.filter(function(e){return uids.indexOf(e.uid)<0});
  G.resources.iron=(G.resources.iron||0)+totalIron;
  
  closeModal();
  saveGame();
  updateResUI();
  renderCurrentTab();
  
  showToast('✅ 一键分解成功！分解 '+count+' 件装备，获得 ⛏️'+totalIron+' 铁矿');
}

function forgeEquipment(maxQuality){
  // 检查铁匠铺等级是否允许锻造该品质
  var bsLevel=G.buildings.blacksmith||0;
  var bsDef=BUILDING_DEFS.blacksmith;
  var allowedQuality=bsDef.forgeQualityByLevel[bsLevel]||'common';
  var allowedIdx=QUALITIES.indexOf(allowedQuality);
  var requestIdx=QUALITIES.indexOf(maxQuality);
  if(requestIdx>allowedIdx){
    showToast('铁匠铺等级不足！当前最高可锻造：'+QUALITY_NAMES[allowedQuality]+'，需要铁匠铺 Lv.'+(requestIdx+1));
    return;
  }
  // 锻造费用：金币+铁矿（品质越高消耗越多）
  var ironCosts={common:3,rare:8,epic:20,legendary:50,mythic:120};
  var goldCosts={common:50,rare:150,epic:400,legendary:1000,mythic:2500};
  var cost={gold:goldCosts[maxQuality]||100,iron:ironCosts[maxQuality]||5};
  if(!canAfford(cost)){showToast('资源不足！需要 '+RESOURCE_DEFS.gold.icon+cost.gold+' '+RESOURCE_DEFS.iron.icon+cost.iron);return}
  for(let[k,v]of Object.entries(cost))G.resources[k]-=v;
  var maxQIdx=QUALITIES.indexOf(maxQuality);
  var pool=EQUIP_TEMPLATES.filter(t=>QUALITIES.indexOf(t.quality)<=maxQIdx);
  var tpl=pool.length>0?pick(pool):EQUIP_TEMPLATES[0];
  var eq=createEquipment(tpl.id);
  recordCodex('equipment',tpl.id);
  G.equipment.push(eq);
  updateResUI();
  showToast('锻造成功！获得 '+tpl.icon+' '+tpl.name+' ('+QUALITY_NAMES[tpl.quality]+')');
  
  // 更新成就统计
  updateStat('equipmentForged', 1);
  
  // 检查装备相关成就
  checkAchievement('equip_1');
  checkAchievement('equip_2');
  checkAchievement('equip_3');
  checkAchievement('equip_4');
  checkAchievement('equip_7');
  
  renderCurrentTab();
}

function showEquipmentGallery(){
  var qualityOrder={mythic:5,legendary:4,epic:3,rare:2,common:1};
  var sortedTemplates=EQUIP_TEMPLATES.slice().sort(function(a,b){
    var qa=qualityOrder[a.quality]||0,qb=qualityOrder[b.quality]||0;
    if(qa!==qb)return qb-qa;
    return (a.name||'').localeCompare(b.name||'');
  });
  
  var html='<div style="max-height:70vh;overflow-y:auto;padding:10px">';
  html+='<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center">';
  
  for(var i=0;i<sortedTemplates.length;i++){
    var tpl=sortedTemplates[i];
    var statsHtml='';
    for(var k in tpl.stats){
      var icon=RESOURCE_DEFS[k]?RESOURCE_DEFS[k].icon:k;
      statsHtml+='<span style="margin-right:8px">'+icon+tpl.stats[k]+'</span>';
    }
    
    var setInfo='';
    if(tpl.setId && EQUIP_SETS[tpl.setId]){
      var setDef=EQUIP_SETS[tpl.setId];
      setInfo='<div style="margin-top:6px;padding:4px 8px;background:rgba(201,162,39,.15);border-radius:4px;font-size:11px;color:var(--gold)">'+setDef.icon+' '+setDef.name+'</div>';
    }
    
    var skillInfo='';
    if(tpl.specialSkill && EQUIP_SPECIAL_SKILLS[tpl.specialSkill]){
      var sk=EQUIP_SPECIAL_SKILLS[tpl.specialSkill];
      skillInfo='<div style="margin-top:4px;padding:4px 8px;background:rgba(142,68,173,.15);border-radius:4px;font-size:10px;color:#b86eff">'+sk.icon+' '+sk.name+'</div>';
    }
    
    html+='<div class="quality-'+tpl.quality+'" style="width:160px;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center">';
    html+='<div style="font-size:32px;margin-bottom:8px">'+(tpl.icon||'🗡️')+'</div>';
    html+='<div style="font-weight:bold;font-size:13px;color:var(--gold);margin-bottom:4px">'+tpl.name+'</div>';

// 加载排行榜数据
function loadLeaderboardData(type){
  var listEl = document.getElementById('leaderboard-list');
  if(!listEl) return;
  
  listEl.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text3)">加载中...</div>';
  
  var typeNames = {
    power: {name: '战力榜', icon: '⚔️', desc: '队伍总战力', unit: ''},
    stage: {name: '关卡榜', icon: '💀', desc: '最高通关关卡', unit: '关'},
    arena: {name: '竞技榜', icon: '🏟️', desc: '竞技场胜场数', unit: '胜'},
    heroes: {name: '英雄榜', icon: '🧙', desc: '拥有英雄数量', unit: '人'}
  };
  
  var typeInfo = typeNames[type] || typeNames.power;
  
  // 检查云端连接状态
  if (!isCloudReady || !sb || !deviceId) {
    var statusHTML = '<div style="text-align:center;padding:40px 0;color:var(--text3)">' +
      '<div style="font-size:24px;margin-bottom:8px">☁️</div>' +
      '<div style="font-weight:bold;margin-bottom:8px;color:var(--text)">排行榜服务未连接</div>' +
      '<div style="font-size:12px;line-height:1.8">';
    if (!sb) { statusHTML += 'Supabase SDK 未加载<br>'; }
    else if (!deviceId) { statusHTML += '设备 ID 未生成<br>'; }
    else { statusHTML += '云端服务连接失败<br>'; }
    statusHTML += '<br>排行榜需要网络连接，请检查：<br>1. 网络是否正常<br>2. 是否在 TapTap 平台内打开<br>3. 刷新页面重试</div></div>';
    listEl.innerHTML = statusHTML;
    return;
  }
  
  getLeaderboard(type, 1000).then(function(entries) {
    if(entries.length === 0){
      listEl.innerHTML = '<div style="text-align:center;color:var(--text3);padding:40px 0">' +
        '<div style="font-size:24px;margin-bottom:8px">📭</div>' +
        '<div>暂无数据，快来上传你的成绩吧！</div>' +
      '</div>';
      return;
    }
    
    getPlayerRank(type).then(function(playerRank) {
      var html = '<div style="margin-bottom:10px;font-weight:bold;color:var(--gold)">' + typeInfo.icon + ' ' + typeInfo.name + ' - ' + typeInfo.desc + '</div>';
      
      if(playerRank){
        html += '<div style="background:rgba(201,162,39,.1);border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:12px">' +
          '🎯 你的排名: <b style="color:var(--gold)">第' + playerRank.rank + '名</b> / 共' + playerRank.total + '人 | 分数: <b>' + playerRank.score + '</b>' +
        '</div>';
      }
      
      // 构建排行榜列表HTML（可滚动）
      html += '<div class="leaderboard-scroll-container">';
      html += '<div class="leaderboard-list">';
      
      for(var i=0;i<entries.length;i++){
        var entry = entries[i];
        var rank = i + 1;
        var isMe = entry.device_id === deviceId;
        var playerName = isMe ? '<b style="color:var(--gold)">' + (G.playerName || '我') + '</b>' : (entry.name || ('玩家' + (entry.device_id ? entry.device_id.slice(-6) : '???')));
        var dateStr = entry.timestamp ? new Date(entry.timestamp).toLocaleDateString() : '-';
        var scoreStr = entry.score ? entry.score.toLocaleString() : '0';
        
        // 排名样式
        var rankClass = 'rank-normal';
        var rankIcon = rank;
        if(rank === 1) { rankClass = 'rank-1'; rankIcon = '🥇'; }
        else if(rank === 2) { rankClass = 'rank-2'; rankIcon = '🥈'; }
        else if(rank === 3) { rankClass = 'rank-3'; rankIcon = '🥉'; }
        else if(rank <= 10) { rankClass = 'rank-top10'; }
        else if(rank <= 100) { rankClass = 'rank-top100'; }
        
        html += '<div class="leaderboard-item ' + (isMe?'is-me':'') + '">' +
          '<div class="leaderboard-rank ' + rankClass + '">' + rankIcon + '</div>' +
          '<div class="leaderboard-info">' +
            '<div class="leaderboard-name">' + playerName + '</div>' +
            '<div class="leaderboard-date">' + dateStr + '</div>' +
          '</div>' +
          '<div class="leaderboard-score">' + scoreStr + '<span class="leaderboard-unit">' + typeInfo.unit + '</span></div>' +
        '</div>';
      }
      
      html += '</div></div>';
      html += '<div style="text-align:center;color:var(--text3);font-size:11px;margin-top:8px">共 ' + entries.length + ' 条记录 · 已显示全部</div>';
      
      listEl.innerHTML = html;
    });
  }).catch(function(err) {
    console.error('排行榜加载失败:', err);
    var errMsg = err.message || '未知错误';
    listEl.innerHTML = '<div style="text-align:center;padding:40px 0">' +
      '<div style="font-size:24px;margin-bottom:8px">❌</div>' +
      '<div style="font-weight:bold;margin-bottom:8px;color:var(--red)">排行榜加载失败</div>' +
      '<div style="font-size:12px;color:var(--text3);line-height:1.8">' +
      '错误: ' + errMsg + '<br><br>' +
      '可能原因：<br>1. 网络连接不稳定<br>2. TapTap 平台网络限制<br>3. Supabase 服务暂时不可用<br><br>' +
      '请稍后刷新页面重试</div></div>';
  });
}

// 提交所有排行榜数据
function submitAllLeaderboards(){
  if(!isCloudReady){
    showToast('⏳ 云端连接中，请稍后再试');
    return;
  }
  
  // 需要玩家名字才能提交
  if (!G.playerName || G.playerName.trim() === '') {
    showPlayerNameInput();
    return;
  }
  
  var teamPower = 0;
  for(var i=0;i<G.team.length;i++){
    if(G.team[i]) teamPower += calcHeroPower(G.team[i]);
  }
  var maxStage = G.stageProgress || 1;
  var arenaWins = (G.arenaState && G.arenaState.totalWins) ? G.arenaState.totalWins : 0;
  var totalHeroes = G.heroes ? G.heroes.length : 0;
  
  Promise.all([
    submitLeaderboard('power', teamPower, {heroes: G.heroes ? G.heroes.length : 0}),
    submitLeaderboard('stage', maxStage, {stageName: STAGES[maxStage-1] ? STAGES[maxStage-1].name : ''}),
    submitLeaderboard('arena', arenaWins, {winStreak: G.arenaState ? G.arenaState.winStreak : 0}),
    submitLeaderboard('heroes', totalHeroes, {})
  ]).then(function() {
    showToast('☁️ 成绩已上传到云端！');
    var listEl = document.getElementById('leaderboard-list');
    if(listEl) loadLeaderboardData('power');
  }).catch(function(err) {
    showToast('❌ 上传失败: ' + (err.message || '未知错误'));
  });
}

// 管理员删除玩家数据
function adminDeletePlayerData(){
  var name=adminGetName();
  if(!name){adminShowResult('❌ 请输入玩家名字','#ff6b6b');return;}

// ==================== 英雄金手指功能 ====================

// 指定品质生成英雄
function cheatSpawnHero(quality){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  if(!checkHeroLimit(1))return;
  var tpl = HERO_TEMPLATES.filter(function(t){return t.quality===(quality||'rare')})[0] || HERO_TEMPLATES[0];
  var hero = createHero(tpl.id);
  hero.quality = quality || 'rare';
  // 重新计算属性
  var qm = QUALITY_MULT[hero.quality];
  hero.maxHP = Math.floor(hero.maxHP * qm / QUALITY_MULT.common);
  hero.hp = hero.maxHP;
  hero.atk = Math.floor(hero.atk * qm / QUALITY_MULT.common);
  hero.def = Math.floor(hero.def * qm / QUALITY_MULT.common);
  hero.spd = Math.floor(hero.spd * qm / QUALITY_MULT.common);
  hero.maxMP = Math.floor(hero.maxMP * qm / QUALITY_MULT.common);
  hero.mp = hero.maxMP;
  G.heroes.push(hero);
  saveGame();
  showToast('✨ 已生成 ' + QUALITY_NAMES[hero.quality] + ' 英雄: ' + hero.icon + ' ' + hero.name);
  renderCurrentTab();
}

// 修改指定英雄等级
function cheatSetHeroLevel(uid, level){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  var hero = G.heroes.find(function(h){return h.uid===uid});
  if(!hero){showToast('英雄不存在');return;}
  hero.level = Math.max(1, Math.min(99, level));
  saveGame();
  showToast(hero.icon + ' ' + hero.name + ' 等级已设为 ' + hero.level);
  renderCurrentTab();
}

// 一键所有英雄达到品质最大属性
function cheatMaxAllHeroesAtCap(){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  if(!STAT_QUALITY_CAP)return;
  G.heroes.forEach(function(hero){

    hero.maxHP=cap.maxHP;
    hero.hp=cap.maxHP;
    hero.atk=cap.atk;
    hero.def=cap.def;
    hero.spd=cap.spd;
    hero.maxMP=cap.maxMP;
    hero.mp=cap.maxMP;
  });

  showToast('✨ 所有英雄已达到品质最大属性！');
  renderCurrentTab();
}

// 获取英雄某属性的品质上限
function getHeroStatCap(hero,stat){
  if(!STAT_QUALITY_CAP||!hero||!hero.quality)return Infinity;
  var cap=STAT_QUALITY_CAP[hero.quality];
  return cap?cap[stat]:Infinity;
}

// 限制属性不超过品质上限
function clampHeroStat(hero,stat,value){
  var cap=getHeroStatCap(hero,stat);
  return Math.min(value,cap);
}

// 一键满技能所有英雄

    });
  });

  showToast('✨ 所有英雄已学会全部技能');
  renderCurrentTab();
}

    var allTalents = ['hpBoost','atkBoost','defBoost','spdBoost','critRate','critDmg','lifeSteal','dmgReduce','mpRegen','skillDmg'];
    allTalents.forEach(function(t){h.talents[t]=5;});
    // 添加所有技能
    var roleSkills = ROLES[h.role].skills || [];
    roleSkills.forEach(function(s){
      if(h.skills.indexOf(s)===-1) h.skills.push(s);
    });
    var bonus = ['连击','反击','吸血','暴击强化','闪避','坚韧'];
    bonus.forEach(function(s){
      if(h.bonusSkills.indexOf(s)===-1 && h.skills.indexOf(s)===-1) h.bonusSkills.push(s);
    });
    // 装备神话品质满级
    if(!h.equipment) h.equipment = {};
    ['weapon','armor','accessory'].forEach(function(slot){
      if(!h.equipment[slot]){
        h.equipment[slot] = {
          id: slot==='weapon'?'mythic_sword':slot==='armor'?'mythic_armor':'mythic_ring',
          name: slot==='weapon'?'神话之剑':slot==='armor'?'神话铠甲':'神话戒指',
          quality: 'mythic',
          level: 10,
          slot: slot
        };
      }
      h.equipment[slot].quality = 'mythic';
      h.equipment[slot].level = 10;
    });
  });
  saveGame();
  showToast('🔥 所有英雄属性已加满！');
  renderCurrentTab();
}

// 删除指定英雄
function cheatDeleteHero(uid){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  var idx = G.heroes.findIndex(function(h){return h.uid===uid});
  if(idx<0){showToast('英雄不存在');return;}
  var h = G.heroes[idx];
  G.team = G.team.map(function(t){return (t&&t.uid===uid)?null:t});
  G.heroes.splice(idx,1);
  saveGame();
  showToast('🗑️ 已删除 ' + h.icon + ' ' + h.name);
  renderCurrentTab();
}

// 复制英雄
function cheatCloneHero(uid){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  if(!checkHeroLimit(1))return;
  var hero = G.heroes.find(function(h){return h.uid===uid});
  if(!hero){showToast('英雄不存在');return;}
  var clone = JSON.parse(JSON.stringify(hero));
  clone.uid = ++G.heroIdCounter;
  clone.name = hero.name + '·复制';
  G.heroes.push(clone);
  saveGame();
  showToast('📋 已复制 ' + hero.icon + ' ' + hero.name);
  renderCurrentTab();
}

    G_cheats.unlocked=true;
    G_cheats.enabled=true;
    showToast('🔓 金手指已解锁！');
    updateCheatFloatButton(); // 显示悬浮按钮

    err.textContent='❌ 密码错误';
    err.style.display='block';

    input.value='';
    input.focus();

}

// 兑换码核心处理函数
function processRedeemCode(code){
  var codeData=REDEEM_CODES[code];
  if(!codeData)return{success:false,message:'❌ 兑换码无效'};
  if(G.redeemedCodes&&G.redeemedCodes[code])return{success:false,message:'⚠️ 该兑换码已使用过'};
  var rewardDesc=[];
  var resNames={gold:'💰金币',gems:'💎宝石',food:'🍞食物',stone:'🪨石材',iron:'⛏️铁矿',fame:'⭐声望'};
  if(codeData.rewards){
    for(var key in codeData.rewards){
      G.resources[key]=(G.resources[key]||0)+codeData.rewards[key];
      rewardDesc.push(resNames[key]+'+'+codeData.rewards[key]);
    }
  }
  if(codeData.heroes){
    // 检查英雄上限
    var totalHeroCount = codeData.heroes.reduce(function(sum,h){return sum+(h.count||1);},0);
    if(!checkHeroLimit(totalHeroCount))return{success:false,message:'⚠️ 英雄数量已达上限（'+MAX_HEROES_TOTAL+'个），无法兑换英雄'};
    for(var h=0;h<codeData.heroes.length;h++){
      var hConf=codeData.heroes[h];
      var tpl=null;
      if(hConf.id){tpl=HERO_TEMPLATES.find(function(t){return t.id===hConf.id});}
      else if(hConf.quality){var pool=HERO_TEMPLATES.filter(function(t){return t.quality===hConf.quality});tpl=pool[Math.floor(Math.random()*pool.length)];}
      if(tpl){for(var c=0;c<(hConf.count||1);c++){G.heroes.push(createHero(tpl.id));}rewardDesc.push((tpl.icon||'')+QUALITY_NAMES[tpl.quality]+'英雄×'+(hConf.count||1));}
    }
  }
  if(codeData.equipment){
    for(var e=0;e<codeData.equipment.length;e++){
      var eConf=codeData.equipment[e];
      var eTpl=null;
      if(eConf.id){eTpl=EQUIP_TEMPLATES.find(function(t){return t.id===eConf.id});}
      else{var ePool=EQUIP_TEMPLATES.filter(function(t){if(eConf.quality&&t.quality!==eConf.quality)return false;if(eConf.type&&t.type!==eConf.type)return false;return true;});eTpl=ePool[Math.floor(Math.random()*ePool.length)];}
      if(eTpl){for(var ec=0;ec<(eConf.count||1);ec++){var eq=createEquipment(eTpl.id);eq.level=eConf.level||1;G.equipment.push(eq);}rewardDesc.push((eTpl.icon||'')+QUALITY_NAMES[eTpl.quality]+'装备×'+(eConf.count||1)+'(Lv'+(eConf.level||1)+')');}
    }
  }
  if(!G.redeemedCodes)G.redeemedCodes={};
  G.redeemedCodes[code]=Date.now();
  saveGame();updateResUI();
  return{success:true,name:codeData.name,desc:rewardDesc.join('、')};
}

function redeemCode(){
  var input=document.getElementById('redeem-code-input');
  var resultEl=document.getElementById('redeem-result');
  if(!input||!resultEl)return;
  var code=input.value.trim().toUpperCase();
  if(!code){
    resultEl.textContent='请输入兑换码';
    resultEl.style.display='block';
    resultEl.style.color='var(--red)';
    return;
  }
  var result=processRedeemCode(code);
  if(result.success){
    resultEl.innerHTML='<span style="color:#2ecc71">✅ '+result.name+' 兑换成功！</span><br><span style="font-size:12px;color:var(--text2)">'+result.desc+'</span>';
    resultEl.style.display='block';
    resultEl.style.color='#2ecc71';
    input.value='';
    showToast('🎁 '+result.name+'兑换成功！');
  }else{
    resultEl.textContent=result.message;
    resultEl.style.display='block';
    resultEl.style.color=result.message.indexOf('⚠️')>=0?'var(--yellow)':'var(--red)';
  }
}

// Supabase 云存档可靠性检查
function validateSaveData(saveData) {
  var errors = [];
  if (!saveData) { errors.push('存档数据为空'); return errors; }
  if (!saveData.game) { errors.push('缺少 game 字段'); }
  if (!saveData.version) { errors.push('缺少 version 字段'); }
  if (saveData.game) {
    if (!saveData.game.heroes || !Array.isArray(saveData.game.heroes)) { errors.push('heroes 数据异常'); }
    // gold 可能在 game.gold 或 game.resources.gold
    var gold = saveData.game.gold !== undefined ? saveData.game.gold : 
               (saveData.game.resources && saveData.game.resources.gold !== undefined ? saveData.game.resources.gold : null);
    if (gold === null || gold === undefined) { errors.push('gold 数据异常'); }
    if (typeof saveData.game.stageProgress !== 'number') { errors.push('stageProgress 数据异常'); }
  }
  var jsonStr = JSON.stringify(saveData);
  if (jsonStr.length > 5 * 1024 * 1024) { errors.push('存档过大: ' + (jsonStr.length / 1024 / 1024).toFixed(2) + 'MB'); }
  return errors;
}

// Supabase 保存到云端（带可靠性检查）
// 云存档操作冷却时间（秒）
var CLOUD_SAVE_COOLDOWN = 30; // 上传冷却30秒
var CLOUD_LOAD_COOLDOWN = 60; // 下载冷却60秒
var CLOUD_DAILY_SAVE_LIMIT = 5;  // 每日最多上传5次
var CLOUD_DAILY_LOAD_LIMIT = 10; // 每日最多下载10次

// 获取今日日期字符串
function getTodayKey() {
  var d = new Date();
  return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
}

// 检查日限制（金手指解锁后无限制）
function checkCloudDailyLimit(type) {
  // 金手指解锁后跳过所有限制
  if (G_cheats && G_cheats.unlocked) {
    return { allowed: true, count: 999, limit: 999, unlimited: true };
  }
  var today = getTodayKey();
  var key = '_cloud_' + type + '_count_' + today;
  var count = parseInt(lsGet(key) || '0', 10);
  var limit = type === 'save' ? CLOUD_DAILY_SAVE_LIMIT : CLOUD_DAILY_LOAD_LIMIT;
  if (count >= limit) {
    return { allowed: false, count: count, limit: limit };
  }
  // 增加计数
  lsSet(key, (count + 1).toString());
  return { allowed: true, count: count + 1, limit: limit };
}

// 计算对象差异（只返回变化的字段）
function diffObject(oldObj, newObj, path) {
  path = path || '';
  var diff = {};
  var hasDiff = false;
  
  // 处理新增或修改的字段
  for (var key in newObj) {
    if (!newObj.hasOwnProperty(key)) continue;
    var newVal = newObj[key];
    var oldVal = oldObj ? oldObj[key] : undefined;
    var currentPath = path ? path + '.' + key : key;
    
    if (typeof newVal === 'object' && newVal !== null && !Array.isArray(newVal)) {
      // 嵌套对象递归对比
      var nestedDiff = diffObject(oldVal, newVal, currentPath);
      if (nestedDiff !== undefined) {
        diff[key] = nestedDiff;
        hasDiff = true;
      }
    } else if (Array.isArray(newVal)) {
      // 数组直接比较（英雄数组通常整体变化）
      if (JSON.stringify(oldVal) !== JSON.stringify(newVal)) {
        diff[key] = newVal;
        hasDiff = true;
      }
    } else {
      // 基本类型直接比较
      if (oldVal !== newVal) {
        diff[key] = newVal;
        hasDiff = true;
      }
    }
  }
  
  // 处理删除的字段
  if (oldObj) {
    for (var oldKey in oldObj) {
      if (!oldObj.hasOwnProperty(oldKey)) continue;
      if (!(oldKey in newObj)) {
        diff[oldKey] = null; // 标记为删除
        hasDiff = true;
      }
    }
  }
  
  return hasDiff ? diff : undefined;
}

// 增量保存到云端
function supabaseSaveToCloud(silent, forceFull) {
  if (!isCloudReady || !deviceId) {
    if (!silent) showToast('❌ 云端未连接，请稍后再试');
    return Promise.resolve(false);
  }
  
  if (!G.playerName || G.playerName.trim() === '') {
    if (!silent) showPlayerNameInput();
    return Promise.resolve(false);
  }
  
  // 检查日限制（手动上传时）
  if (!silent) {
    var limitCheck = checkCloudDailyLimit('save');
    if (!limitCheck.allowed) {
      showToast('⚠️ 今日上传次数已达上限（' + limitCheck.limit + '次），请明日再试');
      return Promise.resolve(false);
    }
  }
  
  // 检查冷却时间（金手指解锁后跳过）
  var lastSave = parseInt(lsGet('_last_manual_cloud_save') || '0', 10);
  var now = Date.now();
  var elapsed = (now - lastSave) / 1000;
  if (!silent && elapsed < CLOUD_SAVE_COOLDOWN && !(G_cheats && G_cheats.unlocked)) {
    showToast('⏳ 上传冷却中，请 ' + Math.ceil(CLOUD_SAVE_COOLDOWN - elapsed) + ' 秒后再试');
    return Promise.resolve(false);
  }
  
  if (!silent) showToast('⏳ 正在上传到云端...');
  
  // 记录手动上传时间
  lsSet('_last_manual_cloud_save', now.toString());
  
  // 使用无损存档数据
  var saveData = prepareSaveData();
  
  // 可靠性检查
  var errors = validateSaveData(saveData);
  if (errors.length > 0) {
    console.error('[云存档] 可靠性检查失败:', errors);
    if (!silent) showToast('❌ 存档数据异常: ' + errors[0]);
    return Promise.resolve(false);
  }
  
  // 获取上次上传的数据用于增量对比
  var lastCloudData = null;
  try {
    var lastDataStr = lsGet('_last_cloud_data_cache');
    if (lastDataStr) lastCloudData = lastDataStr.game;
  } catch(e) {}
  
  // 智能选择：增量更新 vs 全量更新
  var useIncremental = lastCloudData && !forceFull && silent;
  var dataToUpload;
  var isIncremental = false;
  
  if (useIncremental) {
    // 自动上传时使用增量更新
    var diff = diffObject(lastCloudData, saveData.game);
    if (diff !== undefined) {
      // 只传关键字段 + 变化字段
      dataToUpload = {
        version: saveData.version,
        heroIdCounter: saveData.heroIdCounter,
        game: {
          _partial: true, // 标记为部分更新
          _timestamp: Date.now(),
          heroes: saveData.game.heroes, // 英雄数据通常需要完整传
          stageProgress: saveData.game.stageProgress,
          resources: saveData.game.resources,
          playerName: saveData.game.playerName,
          _diff: diff // 其他变化字段
        }
      };
      isIncremental = true;
    } else {
      // 无变化，跳过上传
      console.log('[云存档] 数据无变化，跳过上传');
      return Promise.resolve(true);
    }
  } else {
    // 手动上传或首次上传使用全量
    dataToUpload = saveData;
  }
  
  // 压缩游戏数据（使用 pako gzip）
  var gameDataJson = JSON.stringify(dataToUpload);
  var originalSize = gameDataJson.length;
  var usedCompression = false;
  
  try {
    if (typeof pako !== 'undefined') {
      // 使用 pako 压缩
      var compressed = pako.deflate(gameDataJson);
      var compressedBase64 = btoa(String.fromCharCode.apply(null, compressed));
      // 将压缩数据和元信息打包到 game_data 字段内
      var wrapper = {
        _c: true,                    // 压缩标记
        _v: saveData.version,        // 存档版本
        _s: originalSize,            // 原始大小
        _i: isIncremental,           // 是否增量
        _d: compressedBase64         // 压缩数据
      };
      gameDataJson = JSON.stringify(wrapper);
      usedCompression = true;
    } else {
      // 降级：不压缩，直接存原始 JSON
      console.warn('[云存档] pako 库未加载，使用未压缩数据');
    }
  } catch (e) {
    console.error('[云存档] 压缩失败，使用未压缩数据:', e);
  }
  
  var finalSize = gameDataJson.length;
  var compressRatio = usedCompression ? Math.round((1 - finalSize / originalSize) * 100) : 0;
  
  // 构造 cloud_saves 表的数据结构（只使用表中已有的列）
  var cloudData = {
    device_id: deviceId,
    player_name: G.playerName,
    provider: 'supabase',
    version: saveData.version,
    game_data: gameDataJson,
    game_size: finalSize
  };
  
  console.log('[云存档] 上传中... 原始:', (originalSize / 1024).toFixed(1), 'KB, ',
    '最终:', (finalSize / 1024).toFixed(1), 'KB, ',
    usedCompression ? '压缩节省:' + compressRatio + '%' : '未压缩', 
    isIncremental ? '(增量模式)' : '(全量模式)');
  
  return sb.from('cloud_saves').upsert(cloudData, { onConflict: 'device_id' })
    .then(function(result) {
      if (result.error) {
        console.error('[云存档] 保存失败:', result.error);
        if (!silent) showToast('❌ 云端保存失败：' + result.error.message);
        return false;
      }
      // 记录上传时间
      G._lastCloudSaveTime = Date.now();
      // 缓存完整数据用于下次增量对比
      lsSet('_last_cloud_data_cache', { game: saveData.game, time: Date.now() });
      if (!silent) {
        var msg = '☁️ 已保存到云端 (' + (finalSize / 1024).toFixed(1) + 'KB';
        if (usedCompression && compressRatio > 0) msg += ' 压缩' + compressRatio + '%';
        msg += ')';
        showToast(msg);
      }
      console.log('[云存档] ✅ 上传成功' + (isIncremental ? ' (增量)' : ' (全量)') + 
        (usedCompression ? ' 压缩率:' + compressRatio + '%' : ''));
      return true;
    })

// 确认从云端恢复
function confirmCloudRestore() {
  // 移除弹窗
  var overlay = document.getElementById('cloud-restore-overlay');
  if (overlay) overlay.remove();
  
  // 记录下载时间
  lsSet('_last_manual_cloud_load', Date.now().toString());
  
  showToast('⏳ 正在从云端恢复...');
  
  sb.from('cloud_saves').select('*').eq('device_id', deviceId).limit(1)
    .then(function(result) {
      if (result.error) {
        console.error('Cloud load error:', result.error);
        showToast('❌ 恢复失败：' + result.error.message);
        return;
      }
      var cloudData = result.data && result.data[0] ? result.data[0] : null;
      if (!cloudData || !cloudData.game_data) {
        showToast('❌ 云端存档数据为空');
        return;
      }
      
      // 解压游戏数据（从 game_data 内部检测压缩标记）
      var saveObj;
      var rawData = cloudData.game_data;
      
      try {
        // game_data 可能是字符串或已解析的对象
        var parsed = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
        
        if (parsed && parsed._c === true && parsed._d) {
          // 新格式：压缩数据 {_c:true, _v:version, _s:originalSize, _d:base64Data}
          if (typeof pako === 'undefined') {
            showToast('❌ 压缩库未加载，无法恢复存档');
            console.error('[云存档] pako 库未加载，无法解压');
            return;
          }
          var binary = atob(parsed._d);
          var bytes = new Uint8Array(binary.length);
          for (var i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
          }
          var decompressed = pako.inflate(bytes, { to: 'string' });
          saveObj = JSON.parse(decompressed);
          console.log('[云存档] 解压成功，传输:', rawData.length, 'B, 解压后:', decompressed.length, 'B');
        } else if (parsed && parsed.game) {
          // 新格式但未压缩：直接是 saveData 结构
          saveObj = parsed;
          console.log('[云存档] 使用未压缩数据（新格式）');
        } else if (parsed && parsed.heroes !== undefined) {
          // 旧格式：未压缩的原始 game 数据（兼容）
          saveObj = {
            version: cloudData.version || 1,
            heroIdCounter: 0,
            game: parsed
          };
          console.log('[云存档] 使用未压缩数据（旧格式兼容模式）');
        } else {
          throw new Error('无法识别的存档格式');
        }
      } catch (e) {
        console.error('[云存档] 数据解析失败:', e);
        showToast('❌ 存档数据解析失败');
        return;
      }
      
      console.log('[云存档] 准备恢复，云端数据:', {
        version: saveObj.version,
        heroIdCounter: saveObj.heroIdCounter,
        gameKeys: saveObj.game ? Object.keys(saveObj.game).slice(0,10) : null,
        heroesCount: saveObj.game && saveObj.game.heroes ? saveObj.game.heroes.length : 0,
        stageProgress: saveObj.game ? saveObj.game.stageProgress : null
      });
      
      // 显示调试信息
      var debugInfo = '云端数据: 英雄=' + (saveObj.game && saveObj.game.heroes ? saveObj.game.heroes.length : 0) + 
                      ' 关卡=' + (saveObj.game ? saveObj.game.stageProgress : '?');
      showToast('📊 ' + debugInfo);
      
      if (restoreSaveData(saveObj)) {
        console.log('[云存档] restoreSaveData 成功，G.heroes.length:', G.heroes.length, 'G.stageProgress:', G.stageProgress);
        debugLog('恢复后: 英雄=' + G.heroes.length + ' 关卡=' + G.stageProgress);
        initGameAfterLoad();
        // 同步写入 localStorage 和 IndexedDB（确保刷新后能读到）
        var data = prepareSaveData();
        var meta = getMeta();
        var slotIdx = meta.currentSlot || 0;
        var key = getSlotKey(slotIdx);
        lsSet(key, data);
        dbSet('saves', slotIdx, data); // 同时写入 IndexedDB
        saveMeta(meta);
        
        // 验证写入
        var verify = lsGet(key);
        console.log('[云存档] 写入完成，验证:', {
          key: key,
          written: verify ? 'OK' : 'FAIL',
          heroesCount: verify && verify.game && verify.game.heroes ? verify.game.heroes.length : 0,
          stageProgress: verify && verify.game ? verify.game.stageProgress : null
        });
        
        showToast('✅ 已从云端恢复，正在刷新...');
        // 延迟刷新确保写入完成
        setTimeout(function() { location.reload(); }, 1000);
      } else {
        showToast('❌ 云端存档格式不兼容');
      }
    })
    .catch(function(error) {
      console.error('Cloud load failed:', error);
      showToast('❌ 恢复失败：' + (error.message || '未知错误'));
    });
}

// Supabase 自动同步检查（仅上传，不自动恢复）
function supabaseCheckAndSync() {
  if (!isCloudReady || !deviceId) return;
  
  var meta = getMeta();
  var slotIdx = meta.currentSlot || 0;
  var localData = lsGet(getSlotKey(slotIdx));
  
  if (localData) {
    if (!G.playerName || G.playerName.trim() === '') return;
    sb.from('cloud_saves').select('device_id').eq('device_id', deviceId).limit(1).maybeSingle()
      .then(function(result) {
        if (!result.error && !result.data) {
          console.log('云端无存档，正在上传...');
          setTimeout(function() { supabaseSaveToCloud(); }, 2000);
        }
      }).catch(function(e) { console.error('检查云端存档失败', e); });
    return;
  }
  
  // 本地无存档时，不再自动从云端恢复
  // 玩家需要手动点击恢复按钮
  console.log('[云存档] 本地无存档，等待玩家手动恢复');
}

        var lastSave = parseInt(lsGet('_last_supabase_cloud') || '0', 10);

          var lastDate = new Date(lastSave);
          infoEl.textContent = '上次本地保存: ' + lastDate.toLocaleDateString() + ' ' + lastDate.toLocaleTimeString().slice(0,5);
        } else {
          infoEl.textContent = '尚未上传到云端';
        }
      });
    
    if (btnsEl) {
      // 检查冷却时间，显示按钮状态
      var lastSave = parseInt(lsGet('_last_manual_cloud_save') || '0', 10);
      var lastLoad = parseInt(lsGet('_last_manual_cloud_load') || '0', 10);
      var now = Date.now();
      var saveCooldown = Math.max(0, CLOUD_SAVE_COOLDOWN - (now - lastSave) / 1000);
      var loadCooldown = Math.max(0, CLOUD_LOAD_COOLDOWN - (now - lastLoad) / 1000);
      
      var saveBtnText = saveCooldown > 0 ? '📤 上传 (' + Math.ceil(saveCooldown) + 's)' : '📤 立即上传';
      var loadBtnText = loadCooldown > 0 ? '📥 下载 (' + Math.ceil(loadCooldown) + 's)' : '📥 从云端恢复';

      var loadBtnDisabled = loadCooldown > 0 ? 'disabled' : '';
      
      btnsEl.innerHTML = '<button class="btn btn-primary" onclick="supabaseSaveToCloud()" ' + saveBtnDisabled + '>' + saveBtnText + '</button>' +
        '<button class="btn" onclick="supabaseLoadCloudSave()" ' + loadBtnDisabled + '>' + loadBtnText + '</button>';
      
      // 冷却时定时刷新按钮状态（降低频率到5秒，减少Supabase查询）
      if ((saveCooldown > 0 || loadCooldown > 0) && !btnsEl._cooldownTimer) {
        btnsEl._cooldownTimer = setInterval(function() {
          // 只更新按钮状态，不重新查询云端
          updateCloudSaveButtonsOnly();
        }, 5000);
        setTimeout(function() {
          clearInterval(btnsEl._cooldownTimer);
          btnsEl._cooldownTimer = null;
          updateCloudSavePanel(); // 最后完整刷新一次
        }, Math.max(saveCooldown, loadCooldown) * 1000);
      }
    }
  } else if (sb && !isCloudReady) {
    // Supabase 初始化中
    panelEl.style.display = '';
    statusEl.textContent = '⏳ 连接中... (' + debugInfo + ')';
    statusEl.style.color = 'var(--text3)';

    if (btnsEl) btnsEl.innerHTML = '';

      if (!isCloudReady && statusEl) {
        infoEl.textContent = '连接较慢，请检查网络或刷新页面重试';
      }
    }, 10000);
  } else {
    // 无云存档
    panelEl.style.display = '';
    statusEl.textContent = '❌ 未连接 (' + debugInfo + ')';

    if (btnsEl) btnsEl.innerHTML = '';
  }
}

    return;
  }
  
  // 检查云端是否已连接
  if (!isCloudReady) {
    showToast('⏳ 云端服务连接中，请稍后再试');
    // 3秒后自动重试
    setTimeout(function() {
      if (isCloudReady) {
        showToast('✅ 云端已连接，请再次点击确认');
      }
    }, 3000);
    return;
  }
  
  // 检查是否同名
  checkPlayerNameExists(name).then(function(exists) {
    if (exists) {
      // 生成建议名字
      var suggestedName = name + Math.floor(Math.random() * 100);
      if (suggestedName.length > 12) {
        suggestedName = name.slice(0, 10) + Math.floor(Math.random() * 10);
      }
      
      // 更新输入框显示建议
      input.value = suggestedName;
      showToast('⚠️ 名字 "' + name + '" 已被使用，建议使用 "' + suggestedName + '"');
      
      // 高亮输入框提示
      input.style.borderColor = '#ff6b6b';
      setTimeout(function() {
        input.style.borderColor = '';
      }, 2000);
      return;
    }
    
    // 名字可用，继续设置
    G.playerName = name;
    saveGame();
    
    // 移除弹窗
    var overlay = document.getElementById('player-name-overlay');
    if (overlay) overlay.remove();
    
    showToast('✅ 名字设置成功：' + name);
    
    // 保存到云端
    saveToCloud();
    
    // 上传排行榜成绩
    submitAllLeaderboards();
  });
}

// 提交排行榜分数
function submitLeaderboard(scoreType, scoreValue, extraData) {
  if (!isCloudReady || !deviceId) {
    return Promise.resolve(false);
  }

  // 需要玩家名字才能提交
  if (!G.playerName || G.playerName.trim() === '') {
    return Promise.resolve(false);
  }

  extraData = extraData || {};

  return sb.from('leaderboard').upsert({
    device_id: deviceId,
    player_name: G.playerName,
    type: scoreType,
    score: scoreValue,
    timestamp: Date.now()
  }, { onConflict: 'device_id,type' })
    .then(function() {
      console.log('Leaderboard submitted:', scoreType, scoreValue);
      return true;
    })
    .catch(function(error) {
      console.error('Leaderboard submit failed:', error);
      return false;
    });
}

// 获取排行榜
function getLeaderboard(scoreType, limit) {
  limit = limit || 100; // 限制最多100条，减少数据传输
  
  if (!isCloudReady) {
    return Promise.resolve([]);
  }
  
  // 只查询需要的字段，减少数据量
  return sb.from('leaderboard').select('device_id,player_name,score,timestamp').eq('type', scoreType).order('score', { ascending: false }).limit(limit)
    .then(function(result) {
      var entries = [];
      if (result.data) {
        for (var i = 0; i < result.data.length; i++) {
          var row = result.data[i];
          entries.push({
            device_id: row.device_id,
            name: row.player_name || ('玩家' + row.device_id.slice(-6)),
            score: row.score,
            timestamp: row.timestamp
          });
        }
      }
      return entries;
    })
    .catch(function(error) {
      console.error('Get leaderboard failed:', error);
      return [];
    });
}

// 获取玩家排名
function getPlayerRank(scoreType) {
  if (!isCloudReady || !deviceId) {
    return Promise.resolve(null);
  }
  
  return sb.from('leaderboard').select('*').eq('type', scoreType).order('score', { ascending: false })
    .then(function(result) {
      if (!result.data || result.data.length === 0) return null;
      
      var rank = 0;
      var playerScore = 0;
      for (var i = 0; i < result.data.length; i++) {
        if (result.data[i].device_id === deviceId) {
          rank = i + 1;
          playerScore = result.data[i].score;
          break;
        }
      }
      
      if (rank > 0) {
        return { rank: rank, total: result.data.length, score: playerScore };
      }
      return null;
    })
    .catch(function(error) {
      console.error('Get player rank failed:', error);
      return null;
    });
}

// 初始化突破系统
function initBreakthroughSystem(){
  if(!G.breakthroughMaterials){
    G.breakthroughMaterials={rare:0,epic:0,legendary:0,mythic:0,hidden:0};
  }
  if(!G.heroBreakthrough)G.heroBreakthrough={};
}

// 获取突破后品质
function getNextQuality(current,tier){
  var qualities=['common','rare','epic','legendary','mythic','hidden'];
  var idx=qualities.indexOf(current);
  if(idx===-1)return current;
  return qualities[Math.min(idx+tier,qualities.length-1)];
}

// 执行突破
function performBreakthrough(hero){
  initBreakthroughSystem();
  var nextQ=getNextQuality(hero.quality,1);
  var mat=BREAKTHROUGH_MATERIALS[nextQ];
  if(!mat){
    showToast('❌ 已达最高品质');
    return false;
  }
  if((G.breakthroughMaterials[nextQ]||0)<mat.cost.material){
    showToast('❌ '+mat.name+'不足（需'+mat.cost.material+'个）');
    return false;
  }
  if((G.resources.gold||0)<mat.cost.gold){
    showToast('❌ 金币不足');
    return false;
  }
  G.breakthroughMaterials[nextQ]-=mat.cost.material;
  G.resources.gold-=mat.cost.gold;
  if(!G.heroBreakthrough[hero.uid])G.heroBreakthrough[hero.uid]={tier:0,count:0};
  G.heroBreakthrough[hero.uid].tier++;
  G.heroBreakthrough[hero.uid].count++;
  var newCap=STAT_QUALITY_CAP[nextQ];
  hero.quality=nextQ;
  var hpRatio=hero.maxHP>0?hero.hp/hero.maxHP:0;
  hero.maxHP=Math.min(Math.floor(hero.maxHP*1.2),newCap.maxHP);
  hero.hp=Math.floor(hero.maxHP*hpRatio);
  hero.atk=Math.min(Math.floor(hero.atk*1.15),newCap.atk);
  hero.def=Math.min(Math.floor(hero.def*1.15),newCap.def);
  hero.spd=Math.min(Math.floor(hero.spd*1.1),newCap.spd);
  hero.maxMP=Math.min(Math.floor(hero.maxMP*1.1),newCap.maxMP);
  hero.mp=Math.min(hero.mp,hero.maxMP);
  if(!hero.bonusSkills)hero.bonusSkills=[];
  if(hero.bonusSkills.length<3){
    var roleTpls=HERO_TEMPLATES.filter(function(t){return t.role===hero.role&&t.quality!=='common'});
    var pool=[];
    roleTpls.forEach(function(t){t.skills.forEach(function(s){if(hero.skills.indexOf(s)<0&&hero.bonusSkills.indexOf(s)<0&&pool.indexOf(s)<0)pool.push(s);});});
    if(pool.length>0)hero.bonusSkills.push(pool[Math.floor(Math.random()*pool.length)]);
  }
  showToast('✨ '+hero.name+'突破成功！品质→'+QUALITY_NAMES[nextQ]);
  saveGame();
  return true;
}

// 解锁金手指悬浮按钮
function unlockCheatFloat(){
  var input = document.getElementById('float-cheat-pwd');
  var err = document.getElementById('float-cheat-error');
  var pwd = input.value.trim();
  if(pwd === 'lxl'){
    G_cheats.unlocked = true;
    G_cheats.enabled = true;
    closeModal();
    showToast('🔓 金手指已解锁！');
    renderCheatFloatPanel();
    document.getElementById('cheat-float-panel').style.display = 'block';
    // 同时解锁导航栏的金手指
    renderCurrentTab();
  }else{
    err.textContent = '❌ 密码错误';
    err.style.display = 'block';
    input.value = '';
    input.focus();
  }
}

    html += '<button class="btn btn-sm '+(G_cheats.freeEnhance?'btn-primary':'')+'" onclick="cheatFreeEnhance();renderCheatFloatPanel()">🔨免费强化</button>';
    html += '<button class="btn btn-sm" onclick="cheatGenerateAllEquipment()">生成全装备</button>';

    html += '</div>';
    html += '</div>';
  }
  
  panel.innerHTML = html;
}

// 切换金手指启用状态
function toggleCheatFloatEnabled(){
  G_cheats.enabled = !G_cheats.enabled;
  showToast(G_cheats.enabled ? '🔓 金手指已开启' : '🔒 金手指已关闭');
  renderCheatFloatPanel();
}

// 添加资源
function cheatAddResource(type, amount){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  if(!G.resources[type]) G.resources[type] = 0;
  G.resources[type] += amount;
  updateResUI();
  saveGame();
  var resourceNames = {gold:'金币',gems:'宝石',food:'食物',stone:'石材',iron:'铁矿',fame:'声望',expPotion:'经验药水'};
  showToast('💰 ' + (resourceNames[type]||type) + ' +' + amount);
}

// 添加突破材料
function cheatAddBreakthroughMaterial(type, amount){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  initBreakthroughSystem();
  if(!G.breakthroughMaterials[type]) G.breakthroughMaterials[type] = 0;
  G.breakthroughMaterials[type] += amount;
  saveGame();
  var matNames = {rare:'突破精华',epic:'突破结晶',legendary:'传说碎片',mythic:'神话核心',hidden:'隐藏核心'};
  showToast('⚡ ' + (matNames[type]||type) + ' +' + amount);
}

// 全部资源加满
function cheatAllResources(){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  G.resources.gold = 100000000;
  G.resources.gems = 100000000;
  G.resources.food = 100000000;
  G.resources.stone = 100000000;
  G.resources.iron = 100000000;
  G.resources.fame = 100000000;
  G.resources.expPotion = 100000000;
  updateResUI();
  saveGame();
  showToast('💰 所有资源已加满至1亿！');
}

// 全部突破材料加满
function cheatAllBreakthroughMaterials(){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  initBreakthroughSystem();
  G.breakthroughMaterials.rare = 999;
  G.breakthroughMaterials.epic = 999;
  G.breakthroughMaterials.legendary = 999;
  G.breakthroughMaterials.mythic = 999;
  G.breakthroughMaterials.hidden = 999;
  saveGame();
  showToast('⚡ 所有突破材料已加满！');
}

</script>
