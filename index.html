// ==================== 命运骰子选择函数 ====================
function applyDiceChoice(choice) {
  closeModal();
  var hero = window._accidentHero;
  if (!hero) return;
  
  var qi = QUALITIES.indexOf(hero.quality);
  if (choice === 'safe') {
    // 保守：品质+1，无技能变异
    if (qi < QUALITIES.length - 1) {
      hero.quality = QUALITIES[qi + 1];
      hero.isMutation = true;
      hero._diceResult = 'safe';
    }
    showToast('🛡️ 保守选择！品质提升！');
  } else if (choice === 'risk') {
    // 冒险：50%品质+2，50%品质-1
    if (Math.random() < 0.5) {
      // 品质+2
      if (qi < QUALITIES.length - 2) {
        hero.quality = QUALITIES[qi + 2];
      } else if (qi < QUALITIES.length - 1) {
        hero.quality = QUALITIES[qi + 1];
      }
      hero.isMutation = true;
      hero._diceResult = 'riskUp';
      showToast('⚔️ 冒险成功！品质大幅提升！');
    } else {
      // 品质-1
      if (qi > 0) {
        hero.quality = QUALITIES[qi - 1];
      }
      hero._diceResult = 'riskDown';
      showToast('⚔️ 冒险失败…品质下降了');
    }
  }
  
  // 更新英雄列表
  var idx = G.heroes.findIndex(function(h){ return h.uid === hero.uid; });
  if (idx >= 0) G.heroes[idx] = hero;
  
  // 更新品质提升标记
  var oldQ = window._accidentOldQuality;
  window._accidentIsQualityUp = QUALITIES.indexOf(hero.quality) > QUALITIES.indexOf(oldQ);
  
  saveGame();
  
  // 显示合成结果
  setTimeout(function(){
    showMergeResult(hero, window._accidentIsQualityUp, oldQ, window._accidentMats, { type:'dice', accident: MERGE_ACCIDENTS.dice });
  }, 300);
}

// ==================== 合成赌局系统 ====================
var G_mergeGamble = 'normal'; // normal/risk/crazy

// 冒险模式使用次数追踪（按时间段重置，例如每小时）
var G_riskUsageCount = 0;
var G_riskUsageResetTime = 0;
var RISK_RESET_INTERVAL = 60 * 60 * 1000; // 1小时重置一次

function setMergeGamble(mode) {
  G_mergeGamble = mode;
  renderMerge(document.getElementById('content'));
}

// 获取当前冒险模式花费（使用次数越多，花费越多）
function getRiskCost() {
  // 检查是否需要重置计数
  var now = Date.now();
  if (now - G_riskUsageResetTime > RISK_RESET_INTERVAL) {
    G_riskUsageCount = 0;
    G_riskUsageResetTime = now;
  }
  // 基础花费10000，每次使用增加20%，最高为金币上限
  var baseCost = 10000;
  var multiplier = 1 + G_riskUsageCount * 0.2;
  return Math.min(Math.floor(baseCost * multiplier), RESOURCE_LIMITS.gold);
}

// 增加冒险模式使用次数
function incrementRiskUsage() {
  var now = Date.now();
  if (now - G_riskUsageResetTime > RISK_RESET_INTERVAL) {
    G_riskUsageCount = 0;
    G_riskUsageResetTime = now;
  }
  G_riskUsageCount++;
}

function getGambleInfo() {
  switch(G_mergeGamble) {
    case 'risk': return { name:'冒险合成', icon:'🎰', cost:getRiskCost(), desc:'品质±1（不低于普通）', color:'#f39c12' };
    case 'crazy': return { name:'疯狂合成', icon:'🃏', cost:100, costType:'gems', desc:'30%神话/30%全变异/40%品质降', color:'#e74c3c' };
    default: return { name:'普通合成', icon:'⚗️', cost:0, desc:'标准概率', color:'var(--text)' };
  }
}

function applyGambleResult(hero) {
  if (G_mergeGamble === 'normal') return hero;
  
  if (G_mergeGamble === 'risk') {
    // 记录冒险模式使用次数
    incrementRiskUsage();
    
    // 根据品质计算成功概率：品质越高，成功概率越小
    // 普通(common): 60%, 稀有(rare): 50%, 史诗(epic): 40%, 传说(legendary): 30%, 神话(mythic): 10%
    var qi = QUALITIES.indexOf(hero.quality);
    var successRate = Math.max(0.1, 0.6 - qi * 0.125);
    
    if (Math.random() < successRate) {
      // 品质+1（不超过神话，冒险模式不产出隐藏品质）
      var maxRiskQIdx = QUALITIES.indexOf('mythic');
      if (qi < maxRiskQIdx) {
        hero.quality = QUALITIES[qi + 1];
        hero._gambleResult = 'up';
      }
    } else {
      // 品质-1（不低于普通）
      if (qi > 0) {
        hero.quality = QUALITIES[qi - 1];
        hero._gambleResult = 'down';
      }
    }
  }
  
  if (G_mergeGamble === 'crazy') {
    var roll = Math.random();
    if (roll < 0.3) {
      // 直接神话
      hero.quality = 'mythic';
      hero.isMutation = true;
      hero._gambleResult = 'mythic';
    } else if (roll < 0.6) {
      // 品质不变但技能全变异
      if (hero.skills) {
        hero.mutatedSkills = [];
        for (var i = 0; i < hero.skills.length; i++) hero.mutatedSkills.push(i);
      }
      hero._gambleResult = 'allMutate';
    } else {
      // 品质降低（不低于普通）
      var qi = QUALITIES.indexOf(hero.quality);
      if (qi > 1) hero.quality = QUALITIES[qi - 2];
      else if (qi > 0) hero.quality = QUALITIES[0];
      hero._gambleResult = 'collapse';
    }
  }
  
  return hero;
}

function getGambleResultText(gr) {
  switch(gr) {
    case 'up': return '🎰 冒险成功！品质提升！';
    case 'down': return '🎰 冒险失败...品质下降';
    case 'mythic': return '🃏 疯狂成功！直接神话品质！';
    case 'allMutate': return '🃏 疯狂成功！所有技能变异！';
    case 'collapse': return '🃏 疯狂失败...品质降低';
    default: return '';
  }
}

// ==================== 合成挑战系统 ====================
function initMergeChallenges() {
  if (!G.mergeChallenges) {
    G.mergeChallenges = {
      daily: null,
      dailyDate: '',
      weekly: null,
      weeklyDate: '',
      completed: {}
    };
  }
  // === 旧存档兼容：清除使用check函数的旧挑战，强制重新生成 ===
  if (G.mergeChallenges.daily && G.mergeChallenges.daily.length > 0 && !G.mergeChallenges.daily[0].checkId) {
    G.mergeChallenges.daily = null;
    G.mergeChallenges.dailyDate = '';
  }
  if (G.mergeChallenges.weekly && G.mergeChallenges.weekly.length > 0 && !G.mergeChallenges.weekly[0].checkId) {
    G.mergeChallenges.weekly = null;
    G.mergeChallenges.weeklyDate = '';
  }
  // 生成每日挑战
  var today = new Date().toDateString();
  if (G.mergeChallenges.dailyDate !== today) {
    var dailyPool = [
      { id:'d_atk', desc:'合成一个攻击力>80的英雄', checkId:'atk80', reward:{gold:500}, icon:'⚔️' },
      { id:'d_skill3', desc:'合成一个有3个以上技能的英雄', checkId:'skill3', reward:{gold:500}, icon:'📚' },
      { id:'d_mutate', desc:'合成一个变异英雄', checkId:'mutate', reward:{gems:1}, icon:'🧬' },
      { id:'d_epic', desc:'合成一个史诗及以上品质英雄', checkId:'epic', reward:{gold:800}, icon:'⭐' },
      { id:'d_speed', desc:'合成一个速度>25的英雄', checkId:'speed25', reward:{gold:500}, icon:'💨' },
      { id:'d_accident', desc:'触发一次合成事件', checkId:'accident', reward:{gems:2}, icon:'💥', special:'accident' }
    ];
    // 随机选3个
    var shuffled = dailyPool.sort(function(){return Math.random()-0.5});
    G.mergeChallenges.daily = shuffled.slice(0,3).map(function(c,i){
      return {
        id:'daily_'+i+'_'+Date.now(),
        desc:c.desc,
        checkId:c.checkId,
        reward:c.reward,
        icon:c.icon,
        special:c.special
      };
    });
    G.mergeChallenges.dailyDate = today;
  }
  // 生成本周挑战
  var weekStart = new Date();
  weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  var weekKey = weekStart.toDateString();
  if (G.mergeChallenges.weeklyDate !== weekKey) {
    var weeklyPool = [
      { id:'w_legend', desc:'本周合成一个传说品质英雄', checkId:'legend', reward:{gems:5}, icon:'⚡', need:1, progress:0 },
      { id:'w_mythic', desc:'本周合成一个神话品质英雄', checkId:'mythic', reward:{gems:10}, icon:'🔥', need:1, progress:0 },
      { id:'w_accident3', desc:'本周触发3次合成事件', checkId:'accident', reward:{gems:5}, icon:'💥', need:3, progress:0, special:'accident' },
      { id:'w_merge10', desc:'本周合成10次', checkId:'count', reward:{gold:3000}, icon:'⚗️', need:10, progress:0, special:'count' }
    ];
    var shuffled = weeklyPool.sort(function(){return Math.random()-0.5});
    G.mergeChallenges.weekly = shuffled.slice(0,2).map(function(c,i){
      return {
        id:'weekly_'+i+'_'+Date.now(),
        desc:c.desc,
        checkId:c.checkId,
        reward:c.reward,
        icon:c.icon,
        need:c.need,
        progress:c.progress,
        special:c.special
      };
    });
    G.mergeChallenges.weeklyDate = weekKey;
  }
}

// 根据checkId动态判断挑战是否完成
function checkChallengeCondition(checkId, hero, accident) {
  switch(checkId) {
    case 'atk80': return hero && hero.atk > 80;
    case 'skill3': return hero && hero.skills && hero.skills.length >= 3;
    case 'mutate': return hero && hero.isMutation;
    case 'epic': return hero && QUALITIES.indexOf(hero.quality) >= 2;
    case 'speed25': return hero && hero.spd > 25;
    case 'accident': return !!accident;
    case 'legend': return hero && hero.quality === 'legendary';
    case 'mythic': return hero && hero.quality === 'mythic';
    case 'count': return true;
    default: return false;
  }
}

function checkMergeChallenge(hero, accident) {
  initMergeChallenges();
  var rewards = [];
  // 检查每日挑战
  if (G.mergeChallenges.daily) {
    G.mergeChallenges.daily.forEach(function(ch) {
      if (G.mergeChallenges.completed[ch.id]) return;
      var passed = false;
      if (ch.special === 'accident' && accident) passed = true;
      else if (checkChallengeCondition(ch.checkId, hero, accident)) passed = true;
      if (passed) {
        G.mergeChallenges.completed[ch.id] = true;
        if (ch.reward.gold) { G.resources.gold = (G.resources.gold||0) + ch.reward.gold; rewards.push(ch.icon + ' +' + ch.reward.gold + '💰'); }
        if (ch.reward.gems) { G.resources.gems = (G.resources.gems||0) + ch.reward.gems; rewards.push(ch.icon + ' +' + ch.reward.gems + '💎'); }
      }
    });
  }
  // 检查每周挑战
  if (G.mergeChallenges.weekly) {
    G.mergeChallenges.weekly.forEach(function(ch) {
      if (G.mergeChallenges.completed[ch.id]) return;
      if (ch.special === 'accident' && accident) { ch.progress = (ch.progress||0) + 1; }
      else if (ch.special === 'count') { ch.progress = (ch.progress||0) + 1; }
      else if (checkChallengeCondition(ch.checkId, hero, accident)) { ch.progress = (ch.progress||0) + 1; }
      if (ch.progress >= ch.need) {
        G.mergeChallenges.completed[ch.id] = true;
        if (ch.reward.gold) { G.resources.gold = (G.resources.gold||0) + ch.reward.gold; rewards.push(ch.icon + ' +' + ch.reward.gold + '💰'); }
        if (ch.reward.gems) { G.resources.gems = (G.resources.gems||0) + ch.reward.gems; rewards.push(ch.icon + ' +' + ch.reward.gems + '💎'); }
      }
    });
  }
  if (rewards.length > 0) {
    setTimeout(function(){ showToast('🎯 挑战完成！' + rewards.join(' ')); }, 1500);
  }
  return rewards;
}

  initMergeChallenges();

  if (G.mergeChallenges.daily) {

var LAB_RECIPES = [
  { id:'exp_potion', name:'经验药水', icon:'🧪', desc:'大量经验', materials:2, qualityMax:1, reward:{expPotion:5}, needHeroes:2 },
  { id:'gold_bar', name:'金砖', icon:'💰', desc:'2000金币', materials:2, qualityMax:1, reward:{gold:2000}, needHeroes:2 },
  { id:'gem_shard', name:'宝石碎片', icon:'💎', desc:'3宝石', materials:3, qualityMax:2, reward:{gems:3}, needHeroes:3 },
  { id:'fragment_10', name:'碎片礼包', icon:'📦', desc:'10碎片(需已有碎片)', materials:2, qualityMax:0, reward:{fragments:10}, needHeroes:2, requireFragments:true },
  { id:'skill_scroll', name:'技能卷轴', icon:'📜', desc:'随机获得1个技能变异标记', materials:2, qualityMax:2, reward:{skillMutate:true}, needHeroes:2 }
];

function doLabRecipe(recipeId) {
  var recipe = LAB_RECIPES.find(function(r){return r.id===recipeId});
  if (!recipe) return;
  if (recipe.requireFragments && (!G.mergeFragments || G.mergeFragments < 10)) {
    showToast('❌ 碎片不足（需要10个）'); return;
  }
  // 消耗材料（从最弱的英雄中选）
  var candidates = G.heroes.filter(function(h){
    return !G.team.includes(h) && !h.locked && QUALITIES.indexOf(h.quality) <= recipe.qualityMax;
  }).sort(function(a,b){return calcHeroPower(a)-calcHeroPower(b)});
  if (candidates.length < recipe.needHeroes) {
    showToast('❌ 材料不足（需要' + recipe.needHeroes + '个' + QUALITY_NAMES[QUALITIES[recipe.qualityMax]] + '及以下英雄）'); return;
  }
  // 消耗英雄
  for (var i = 0; i < recipe.needHeroes; i++) {
    var h = candidates[i];
    var idx = G.heroes.indexOf(h);
    if (idx >= 0) G.heroes.splice(idx, 1);
  }
  // 发放奖励
  if (recipe.reward.gold) G.resources.gold = (G.resources.gold||0) + recipe.reward.gold;
  if (recipe.reward.gems) G.resources.gems = (G.resources.gems||0) + recipe.reward.gems;
  if (recipe.reward.expPotion) G.resources.expPotion = (G.resources.expPotion||0) + recipe.reward.expPotion;
  if (recipe.reward.fragments) G.mergeFragments = (G.mergeFragments||0) + recipe.reward.fragments;
  if (recipe.reward.skillMutate) {
    // 使用独立标记，不依赖金手指系统
    G.mergeForceSkillMutate = true;
  }
  if (recipe.requireFragments) G.mergeFragments -= 10;
  
  showToast(recipe.icon + ' 实验成功！获得 ' + recipe.desc);
  if (recipe.reward.skillMutate) {
    setTimeout(function(){ showToast('🧬 技能变异标记已激活！下次合成必定触发技能变异'); }, 500);
  }
  saveGame();
  renderMerge(document.getElementById('content'));
}

function renderLabHTML() {
  var html = '<div style="margin-bottom:12px">';
  html += '<div style="font-size:12px;color:var(--blue);margin-bottom:8px">🔬 合成实验室 <span class="text-xs text-dim">（消耗英雄换取道具）</span></div>';
  html += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px">';

      return !G.team.includes(h) && !h.locked && QUALITIES.indexOf(h.quality) <= r.qualityMax;

    html += '<button class="btn btn-sm" style="text-align:left;white-space:normal;line-height:1.4;padding:8px;opacity:' + (canDo?'1':'0.4') + '" onclick="doLabRecipe(\'' + r.id + '\')">'

}

// 合成羁绊检测
function detectMergeBond(heroes){
  var roles=heroes.map(function(h){return h.role});
  var uniqueRoles=[];
  roles.forEach(function(r){if(uniqueRoles.indexOf(r)===-1)uniqueRoles.push(r)});
  
  // 3个同职业 → 职业精通
  if(uniqueRoles.length===1){
    return{name:'职业精通',desc:'全属性+10%',mult:1.10};
  }
  
  // 双职业羁绊
  var roleSet=uniqueRoles.slice().sort().join('+');
  var bonds={
    'warrior+mage':{name:'魔剑士',desc:'ATK+15%',mult:1.15},
    'mage+warrior':{name:'魔剑士',desc:'ATK+15%',mult:1.15},
    'assassin+ranger':{name:'暗影猎手',desc:'SPD+20%',mult:1.20},
    'ranger+assassin':{name:'暗影猎手',desc:'SPD+20%',mult:1.20},
    'guardian+healer':{name:'圣盾守护',desc:'DEF+15%,HP+10%',mult:1.15},
    'healer+guardian':{name:'圣盾守护',desc:'DEF+15%,HP+10%',mult:1.15},
    'warlock+mage':{name:'深渊之力',desc:'MP+20%',mult:1.20},
    'mage+warlock':{name:'深渊之力',desc:'MP+20%',mult:1.20},
    'paladin+guardian':{name:'钢铁堡垒',desc:'DEF+20%',mult:1.20},
    'guardian+paladin':{name:'钢铁堡垒',desc:'DEF+20%',mult:1.20},
    'paladin+healer':{name:'神圣之光',desc:'HP+15%',mult:1.15},
    'healer+paladin':{name:'神圣之光',desc:'HP+15%',mult:1.15}
  };
  
  // 3个英雄时检查所有两两组合
  if(heroes.length===3){
    for(var i=0;i<uniqueRoles.length;i++){
      for(var j=i+1;j<uniqueRoles.length;j++){
        var key=uniqueRoles[i]+'+'+uniqueRoles[j];
        if(bonds[key]) return bonds[key];
      }
    }
  }
  
  // 2个英雄时直接检查
  if(heroes.length===2 && bonds[roleSet]) return bonds[roleSet];
  
  return null;
}

// 获取撤销合成费用（按结果英雄品质）- 已降低
function getUndoMergeCost(){
  if(!G.lastMerge)return 0;
  var quality=G.lastMerge.result.quality;
  var costs={common:100,rare:200,epic:500,legendary:1000,mythic:2000,hidden:5000,unknown:8000};
  return costs[quality]||100;
}

// 撤销合成
function undoMerge(){
  if(!G.lastMerge){
    showToast('没有可撤销的合成');
    return;
  }
  var undoCost=getUndoMergeCost();
  if((G.resources.gold||0)<undoCost){
    showToast('💰 金币不足！需要'+undoCost+'金币');
    return;
  }

  // 移除合成结果英雄
  var resultIdx=G.heroes.findIndex(function(h){return h.uid===G.lastMerge.result.uid});
  if(resultIdx>=0) G.heroes.splice(resultIdx,1);

  // 恢复材料英雄
  G.lastMerge.materials.forEach(function(mat){
    var hero={
      uid:mat.uid,id:mat.id,name:mat.name,icon:mat.icon,quality:mat.quality,
      level:mat.level,maxHP:mat.maxHP,hp:mat.maxHP,atk:mat.atk,def:mat.def,
      spd:mat.spd,maxMP:mat.maxMP,mp:mat.maxMP,skills:mat.skills,
      bonusSkills:mat.bonusSkills||[],equipment:mat.equipment,exp:mat.exp,
      role:mat.role,lore:mat.lore,isMutation:mat.isMutation,isHidden:mat.isHidden,
      deathDefyUsed:false
    };
    G.heroes.push(hero);
  });

  G.resources.gold-=undoCost;
  G.lastMerge=null;
  closeMergeResult();
  updateResUI();
  saveGame();
  showToast('↩ 已撤销上次合成，材料英雄已归还');
}

// 获取幸运值信息
function getMergeLuckyInfo(){
  var lucky=G.mergeLucky||0;
  var pity=G.mergePity||0;
  var bonus=Math.min(0.50, 0.30+lucky*0.005);
  return{lucky:lucky,pity:pity,bonus:bonus,rate:Math.round(bonus*100)};
}

// 获取连击信息
function getMergeStreakInfo(){
  if(!G.mergeStreak) return{count:0,active:false,cooldown:0};
  var now=Date.now();
  var cd=Math.max(0,(G.mergeStreak.cooldownEnd||0)-now);
  if(cd>0) return{count:0,active:false,cooldown:cd};
  var active=now-G.mergeStreak.lastTime<=60000;
  if(!active) return{count:0,active:false,cooldown:0};
  return{count:G.mergeStreak.count,active:true,cooldown:0};
}

function executeMerge(heroUids){
  const heroes=heroUids.map(uid=>G.heroes.find(h=>h.uid==uid)).filter(Boolean);
  if(heroes.length<2){showToast('请至少选择2个英雄！');return false}
  
  // 检查是否有锁定的英雄
  const lockedHeroes=heroes.filter(h=>h.locked);
  if(lockedHeroes.length>0){
    showToast(`🔒 ${lockedHeroes[0].name} 已锁定，无法作为合成材料！请先解锁。`);
    return false;
  }
  
  // === 合成消耗：金币 = 材料最高品质 × 200（已降低）===
  var qualities=heroes.map(function(h){return QUALITIES.indexOf(h.quality)});
  var maxQIdx=Math.max.apply(null,qualities);
  var mergeCost = (maxQIdx+1) * 200;
  
  // === 赌局费用前置检查 ===
  var gambleInfo = getGambleInfo();
  var gambleCost = 0;
  var gambleCostType = 'gold';
  if (G_mergeGamble !== 'normal') {
    gambleCost = gambleInfo.cost;
    gambleCostType = gambleInfo.costType || 'gold';
    if (gambleCostType === 'gems') {
      if ((G.resources.gems || 0) < gambleCost) {
        showToast('💎 宝石不足！需要 '+gambleCost+' 宝石');
        return false;
      }
    } else {
      if ((G.resources.gold || 0) < mergeCost + gambleCost) {
        showToast('💰 金币不足！需要 '+(mergeCost+gambleCost)+' 金币（含赌局费用'+gambleCost+'）');
        return false;
      }
    }
  }

  // 检查金币是否足够（合成费用始终需要金币）
  if((G.resources.gold||0) < mergeCost){
    showToast('💰 金币不足！需要 '+mergeCost+' 金币');
    return false;
  }
  G.resources.gold -= mergeCost;
  // 扣除赌局费用
  if (G_mergeGamble !== 'normal' && gambleCost > 0) {
    if (gambleCostType === 'gems') {
      G.resources.gems -= gambleCost;
    } else {
      G.resources.gold -= gambleCost;
    }
  }
  
  // 记录最高品质用于判断品质提升
  var oldQuality=QUALITIES[maxQIdx];
  
  // === 连续合成计数（必须在generateFusedHero之前，确保streakCount正确） ===
  if(!G.mergeStreak) G.mergeStreak={count:0,lastTime:0,cooldownEnd:0};
  var now=Date.now();
  if(now - G.mergeStreak.lastTime > 60000) G.mergeStreak.count=0;
  G.mergeStreak.count++;
  G.mergeStreak.lastTime=now;
  
  // 即时生成融合英雄（此时streakCount已更新，generateFusedHero可正确读取）
  let newHero=generateFusedHero(heroes);
  
  // 判断是否品质提升
  var isQualityUp=QUALITIES.indexOf(newHero.quality)>maxQIdx;
  
  // === 保存回溯数据 ===
  G.lastMerge={
    materials:heroes.map(function(h){return{uid:h.uid,id:h.id,name:h.name,icon:h.icon,quality:h.quality,level:h.level,maxHP:h.maxHP,atk:h.atk,def:h.def,spd:h.spd,maxMP:h.maxMP,skills:h.skills.slice(),bonusSkills:h.bonusSkills.slice(),equipment:JSON.parse(JSON.stringify(h.equipment)),exp:h.exp,role:h.role,lore:h.lore,isMutation:h.isMutation,isHidden:h.isHidden}}),
    result:{uid:newHero.uid, quality:newHero.quality},
    timestamp:Date.now()
  };
  
  // === 连击×10触发后进入5分钟冷却 ===
  if(G.mergeStreak.count >= 10){
    G.mergeStreak.cooldownEnd = now + 5 * 60 * 1000;
    G.mergeStreak.count = 0;
  }
  
  // 连击×5：额外获得1个技能
  if(G.mergeStreak.count>=5 && newHero.skills.length<6){
    var allPool=[];
    heroes.forEach(function(h){
      h.skills.forEach(function(s){if(allPool.indexOf(s)===-1)allPool.push(s)});
      h.bonusSkills.forEach(function(s){if(allPool.indexOf(s)===-1)allPool.push(s)});
    });
    var extra=allPool.filter(function(s){return newHero.skills.indexOf(s)===-1});
    if(extra.length>0) newHero.skills.push(extra[Math.floor(Math.random()*extra.length)]);
  }
  // 连击×10：必定异变（已在generateFusedHero中通过streakForceMutation实现）
  
  // 移除被融合的英雄
  heroes.forEach(h=>{
    const idx=G.heroes.findIndex(x=>x.uid===h.uid);
    if(idx>=0)G.heroes.splice(idx,1);
    for(let i=0;i<G.team.length;i++){
      if(G.team[i]&&G.team[i].uid===h.uid)G.team[i]=null;
    }
  });
  
  // 添加新英雄
  G.heroes.push(newHero);
  
  // 更新未知英雄解锁任务进度（合成职业和品质）
  updateUnknownQuestProgress(newHero.role + '_merged', 1);
  updateUnknownQuestProgress(newHero.quality + '_merged', 1);
  
  // === 合成事件判定（在添加英雄后、展示结果前） ===
  var accident = rollMergeAccident(newHero, heroes);
  var isExplosion = false;
  if (accident) {
    if (!accident.hero) {
      // 爆炸：英雄已添加但需要移除
      isExplosion = true;
      var aidx = G.heroes.indexOf(newHero);
      if (aidx >= 0) G.heroes.splice(aidx, 1);
    } else {
      // 其他事件：用事件修改后的英雄替换
      var aidx = G.heroes.indexOf(newHero);
      if (aidx >= 0) G.heroes[aidx] = accident.hero;
      newHero = accident.hero;
    }
    // 马戏团事件：添加第二个英雄
    if (accident.hero2) {
      G.heroes.push(accident.hero2);
      showToast('🎪 马戏团！额外获得 ' + accident.hero2.icon + ' ' + accident.hero2.name + '！');
    }
    // 黑洞事件：吞噬战力最低的队友
    if (accident.blackHoleVictimUid) {
      var bhIdx = G.heroes.findIndex(function(h){ return h.uid === accident.blackHoleVictimUid; });
      if (bhIdx >= 0) {
        var victim = G.heroes[bhIdx];
        // 从队伍中移除
        for (var ti = 0; ti < G.team.length; ti++) {
          if (G.team[ti] && G.team[ti].uid === victim.uid) G.team[ti] = null;
        }
        G.heroes.splice(bhIdx, 1);
        showToast('🌀 「' + victim.name + '」被黑洞吞噬了…');
      }
    }
  }
  
  // === 合成赌局效果应用（费用已前置扣除，爆炸事件和骰子事件时不执行） ===
  if (G_mergeGamble !== 'normal' && !isExplosion && !(accident && accident.isDice)) {
    newHero = applyGambleResult(newHero);
    // 更新英雄列表中的引用
    var gidx = G.heroes.findIndex(function(h){return h.uid===newHero.uid});
    if (gidx >= 0) G.heroes[gidx] = newHero;
    // 赌局可能改变品质，重新计算 isQualityUp
    isQualityUp = QUALITIES.indexOf(newHero.quality) > maxQIdx;
  }
  
  // === 合成图鉴记录（在事件判定后，记录最终结果） ===
  if(!G.mergeHistory) G.mergeHistory=[];
  // 爆炸事件时记录事件信息，非爆炸事件记录英雄信息
  var historyEntry = {
    time:Date.now(),
    materials:heroes.map(function(h){return{name:h.name,icon:h.icon,quality:h.quality}}),
    mult:isExplosion ? 0 : newHero.inheritMult,
    accident: accident ? { type: accident.type, name: accident.accident.name, icon: accident.accident.icon, color: accident.accident.color, message: accident.message } : null
  };
  if (isExplosion) {
    // 爆炸事件：记录事件结果
    historyEntry.result = {name:'💥 爆炸',icon:'💥',quality:'common',isMutation:false,isUpset:false,bondInfo:null,inheritMult:0};
  } else {
    // 正常合成或其他事件：记录英雄信息
    historyEntry.result = {name:newHero.name,icon:newHero.icon,quality:newHero.quality,isMutation:newHero.isMutation,isUpset:newHero.isUpset,bondInfo:newHero.bondInfo,inheritMult:newHero.inheritMult};
  }
  G.mergeHistory.unshift(historyEntry);
  if(G.mergeHistory.length>50) G.mergeHistory.length=50; // 最多保留50条
  
  // === 合成挑战检测 ===
  checkMergeChallenge(accident ? accident.hero : newHero, accident);
  
  // 显示合成结果
  if (isExplosion) {
    // 爆炸事件：不显示合成结果弹窗，只显示事件弹窗
    showToast(accident.message);
    setTimeout(function(){ showAccidentResult(accident); }, 300);
  } else if (accident) {
    // 有非爆炸事件：先弹事件详情弹窗（优先），关闭后再显示合成结果
    showToast(accident.message);
    showAccidentResult(accident, newHero, isQualityUp, oldQuality, heroes);
  } else {
    // 无事件：正常显示合成结果
    showMergeResult(newHero, isQualityUp, oldQuality, heroes, null);
    // 显示赌局结果
    if (newHero._gambleResult) {
      setTimeout(function(){ showToast(getGambleResultText(newHero._gambleResult)); }, 500);
    }
    showToast('融合成功！获得 '+QUALITY_NAMES[newHero.quality]+' 英雄：'+newHero.icon+' '+newHero.name);
  }
  
  // 更新成就统计
  updateStat('equipmentMerged', 1);
  checkAchievement('equip_5');
  checkAchievement('equip_6');
  checkAchievement('equip_7');
  
  updateResUI();
  saveGame();
  
  // 金手指：关闭单次强制事件（持续模式保持开启）
  if(G_cheats.enabled && G_cheats.forceAccident && !G_cheats.alwaysAccident){
    G_cheats.forceAccident = false;
  }
  
  return { success: true, isExplosion: isExplosion, hasAccident: !!accident };
}

// ==================== 装备系统 ====================
function createEquipment(templateId){
  const tpl=EQUIP_TEMPLATES.find(t=>t.id===templateId);
  if(!tpl)return null;
  var eq={uid:++G.heroIdCounter,id:tpl.id,heroUid:null};
  // 生成词缀
  eq.affixes=generateAffixes(tpl.quality);
  return eq;
}

// 生成装备词缀
function generateAffixes(quality){
  var config = QUALITY_AFFIX_CONFIG[quality] || QUALITY_AFFIX_CONFIG.common;
  var numSlots = config.minSlots + Math.floor(Math.random() * (config.maxSlots - config.minSlots + 1));
  var affixes = [];
  var usedIds = {};
  var categories = ['attack','defense','utility'];
  
  for(var i = 0; i < numSlots; i++){
    var cat = categories[Math.floor(Math.random() * categories.length)];
    var pool = AFFIX_POOL[cat];
    // 避免重复词缀
    var available = pool.filter(function(a){ return !usedIds[a.id]; });
    if(available.length === 0){
      available = pool;
    }
    var affixDef = available[Math.floor(Math.random() * available.length)];
    usedIds[affixDef.id] = true;
    
    // 根据品质决定词缀等级
    var maxTier = config.maxTier;
    var tier;
    if(maxTier <= 2){
      tier = Math.random() < 0.7 ? 1 : 2;
    } else if(maxTier <= 3){
      var r = Math.random();
      tier = r < 0.4 ? 1 : (r < 0.8 ? 2 : 3);
    } else if(maxTier <= 4){
      var r2 = Math.random();
      tier = r2 < 0.2 ? 1 : (r2 < 0.5 ? 2 : (r2 < 0.8 ? 3 : 4));
    } else {
      var r3 = Math.random();
      tier = r3 < 0.1 ? 1 : (r3 < 0.25 ? 2 : (r3 < 0.5 ? 3 : (r3 < 0.8 ? 4 : 5)));
    }
    tier = Math.min(tier, maxTier);
    
    var tierDef = AFFIX_TIERS[tier - 1];
    var value = Math.max(1, Math.round(affixDef.base * tierDef.mult * (0.9 + Math.random() * 0.2)));
    
    affixes.push({
      id: affixDef.id,
      category: cat,
      tier: tier,
      value: value
    });
  }
  
  return affixes;
}

// 获取词缀定义
function getAffixDef(affixId){
  var cats = ['attack','defense','utility'];
  for(var i = 0; i < cats.length; i++){
    var pool = AFFIX_POOL[cats[i]];
    for(var j = 0; j < pool.length; j++){
      if(pool[j].id === affixId) return pool[j];
    }
  }
  return null;
}

// 检测词缀协同
function checkAffixSynergies(affixes){
  var affixIds = affixes.map(function(a){ return a.id; });
  var activeSynergies = [];
  for(var i = 0; i < AFFIX_SYNERGIES.length; i++){
    var syn = AFFIX_SYNERGIES[i];
    var allMatch = true;
    for(var j = 0; j < syn.required.length; j++){
      if(affixIds.indexOf(syn.required[j]) === -1){
        allMatch = false;
        break;
      }
    }
    if(allMatch) activeSynergies.push(syn);
  }
  return activeSynergies;
}

// 生成单个词缀（避免与现有词缀重复）

  var usedIds = {};
  for(var i = 0; i < existingAffixes.length; i++){
    if(i !== excludeIndex) usedIds[existingAffixes[i].id] = true;
  }
  var categories = ['attack','defense','utility'];
  var cat = categories[Math.floor(Math.random() * categories.length)];
  var pool = AFFIX_POOL[cat];
  var available = pool.filter(function(a){ return !usedIds[a.id]; });
  if(available.length === 0) available = pool;
  var affixDef = available[Math.floor(Math.random() * available.length)];
  
  var maxTier = config.maxTier;
  var tier;
  if(maxTier <= 2){
    tier = Math.random() < 0.7 ? 1 : 2;
  } else if(maxTier <= 3){
    var r = Math.random();
    tier = r < 0.4 ? 1 : (r < 0.8 ? 2 : 3);
  } else if(maxTier <= 4){
    var r2 = Math.random();
    tier = r2 < 0.2 ? 1 : (r2 < 0.5 ? 2 : (r2 < 0.8 ? 3 : 4));
  } else {
    var r3 = Math.random();
    tier = r3 < 0.1 ? 1 : (r3 < 0.25 ? 2 : (r3 < 0.5 ? 3 : (r3 < 0.8 ? 4 : 5)));
  }
  tier = Math.min(tier, maxTier);
  
  var tierDef = AFFIX_TIERS[tier - 1];
  var value = Math.max(1, Math.round(affixDef.base * tierDef.mult * (0.9 + Math.random() * 0.2)));
  
  return {
    id: affixDef.id,
    category: cat,
    tier: tier,
    value: value
  };
}

// ==================== 建筑系统 ====================
function getBuildingCost(buildingId,level){
  const def=BUILDING_DEFS[buildingId];
  const cost={};
  for(let[k,v]of Object.entries(def.baseCost)){
    cost[k]=Math.floor(v*Math.pow(1.4,level-1));
  }
  return cost;
}

function canAfford(cost){
  for(let[k,v]of Object.entries(cost)){
    if((G.resources[k]||0)<v)return false;
  }
  return true;
}

function upgradeBuilding(buildingId){
  const def=BUILDING_DEFS[buildingId];
  const curLevel=G.buildings[buildingId];
  if(curLevel>=def.maxLevel){showToast('已达最高等级！');return}
  
  const nextLevel=curLevel+1;
  
  // 检查特殊升级条件（支持固定 upgradeReq 和按等级 upgradeReqByLevel）
  var upgradeReq=null;
  if(def.upgradeReqByLevel && def.upgradeReqByLevel[nextLevel]){
    upgradeReq=def.upgradeReqByLevel[nextLevel];
  }else if(def.upgradeReq){
    upgradeReq=def.upgradeReq;
  }
  
  if(upgradeReq){
    for(let[k,v]of Object.entries(upgradeReq)){
      if((G.resources[k]||0)<v){
        showToast(`升级需要${RESOURCE_DEFS[k]?.name||k}: ${v}`);
        return;
      }
    }
  }
  
  const cost=getBuildingCost(buildingId,curLevel);
  if(!canAfford(cost)){showToast('资源不足！');return}
  
  // 扣除资源
  for(let[k,v]of Object.entries(cost))G.resources[k]-=v;
  // 扣除特殊条件资源
  if(upgradeReq){
    for(let[k,v]of Object.entries(upgradeReq))G.resources[k]-=v;
  }
  
  G.buildings[buildingId]++;
  const newLevel=G.buildings[buildingId];
  updateResUI();
  const effectText=def.effects&&def.effects[newLevel-1]?def.effects[newLevel-1]:'';
  showToast(`${def.name} 升级到 ${newLevel} 级！${effectText}`);
  
  // 检查建筑相关成就
  checkAchievement('build_1');
  checkAchievement('build_2');
  checkAchievement('build_3');
  checkAchievement('build_4');
  checkAchievement('build_5');
  checkAchievement('build_6');
  checkAchievement('build_7');
  checkAchievement('build_8');
  
  saveGame();
  renderCurrentTab();
}

// 酒馆当前显示的英雄选项缓存（避免招募后重新随机）
var G_tavernOptions = null;
// 酒馆中已被招募的英雄ID集合
var G_tavernRecruited = new Set();
// 酒馆保底计数器（每10次刷新必出当前最高品质）
// 存放在G对象中自动存档，兼容旧存档（undefined时默认0）
function getPity(){return G.tavernPity||0}
function setPity(v){G.tavernPity=v}

function getRecruitOptions(){
  // 如果已有缓存，直接返回（招募后不重新随机）
  if(G_tavernOptions && G_tavernOptions.length > 0) return G_tavernOptions;

  // 恢复品质限制，根据酒馆等级
  const tavernLevel=G.buildings.tavern;
  const maxQuality=TAVERN_REFRESH.maxQualityByLevel[tavernLevel]||'common';
  const maxQIdx=QUALITIES.indexOf(maxQuality);
  const pool=HERO_TEMPLATES.filter(t=>QUALITIES.indexOf(t.quality)<=maxQIdx);
  
  // 根据酒馆等级决定选项数量
  const optionCount=TAVERN_REFRESH.optionsCount[tavernLevel]||2;
  
  // 加权随机（基础权重）- 传说10% 神话1%
  const weights={common:50,rare:30,epic:15,legendary:10,mythic:1};
  // 品质加成：提升当前最高可解锁品质的出现率
  const boost=TAVERN_REFRESH.qualityWeightBoost[tavernLevel]||0;
  if(boost>0){
    weights[maxQuality]=Math.round((weights[maxQuality]||10)*(1+boost));
  }
  const options=[];
  for(let i=0;i<optionCount;i++){
    let attempts=0;
    while(attempts<20){
      const tpl=pick(pool);
      const w=weights[tpl.quality]||10;
      if(Math.random()*100<w||attempts>15){
        options.push(tpl);
        break;
      }
      attempts++;
    }
  }
  
  // 保底机制：每10次刷新，必出当前酒馆可解锁的最高品质（传奇或更高）
  if(getPity() >= 10 && options.length > 0){
    // 保底必出当前酒馆可解锁的最高品质
    const pityQuality = maxQuality; // 当前酒馆解锁的最高品质
    const pityPool = HERO_TEMPLATES.filter(t => t.quality === pityQuality);
    if(pityPool.length > 0){
      options[options.length - 1] = pick(pityPool);
      setPity(0); // 重置保底计数
    }
  }
  
  G_tavernOptions = options;
  G_tavernRecruited = new Set();
  return options;
}

// 计算基于资源的最大可招募数量和预估成本
function calcRecruitCapacity(minQuality){
  const tavernLevel = G.buildings.tavern || 1;
  const maxQuality = TAVERN_REFRESH.maxQualityByLevel[tavernLevel] || 'common';
  const maxQIdx = QUALITIES.indexOf(maxQuality);
  const minQIdx = minQuality ? QUALITIES.indexOf(minQuality) : 0;
  
  // 获取符合条件的英雄池
  const pool = HERO_TEMPLATES.filter(t => {
    const qIdx = QUALITIES.indexOf(t.quality);
    return qIdx >= minQIdx && qIdx <= maxQIdx;
  });
  
  if(pool.length === 0) return {count: 0, gold: 0, gems: 0, avgGold: 0, avgGems: 0};
  
  // 计算平均成本（基于品质权重）
  const goldCosts = {common:30, rare:100, epic:300, legendary:0, mythic:0};
  const gemCosts = {common:0, rare:0, epic:0, legendary:3, mythic:8};
  const weights = {common:50, rare:30, epic:15, legendary:10, mythic:1};
  
  var totalWeight = 0;
  var weightedGold = 0;
  var weightedGems = 0;
  
  pool.forEach(function(tpl){
    const w = weights[tpl.quality] || 10;
    totalWeight += w;
    weightedGold += (goldCosts[tpl.quality] || 50) * w;
    weightedGems += (gemCosts[tpl.quality] || 0) * w;
  });
  
  const avgGold = totalWeight > 0 ? weightedGold / totalWeight : 50;
  const avgGems = totalWeight > 0 ? weightedGems / totalWeight : 0;
  
  // 基于当前资源计算最大可招募数量
  var maxByGold = avgGold > 0 ? Math.floor(G.resources.gold / avgGold) : 999999;
  var maxByGems = avgGems > 0 ? Math.floor(G.resources.gems / avgGems) : 999999;
  var maxCount = Math.min(maxByGold, maxByGems);
  
  // 限制最大显示数量（避免数字过大）
  maxCount = Math.min(maxCount, 999);
  
  return {
    count: Math.floor(maxCount),
    gold: Math.floor(maxCount * avgGold),
    gems: Math.floor(maxCount * avgGems),
    avgGold: avgGold,
    avgGems: avgGems,
    maxQuality: maxQuality
  };
}

// 根据酒馆等级和品质筛选生成一个随机英雄模板
function generateRandomHeroForRecruit(minQuality){
  const tavernLevel = G.buildings.tavern || 1;
  const maxQuality = TAVERN_REFRESH.maxQualityByLevel[tavernLevel] || 'common';
  const maxQIdx = QUALITIES.indexOf(maxQuality);
  const minQIdx = minQuality ? QUALITIES.indexOf(minQuality) : 0;
  
  // 获取符合条件的英雄池（在品质范围内）
  const pool = HERO_TEMPLATES.filter(t => {
    const qIdx = QUALITIES.indexOf(t.quality);
    return qIdx >= minQIdx && qIdx <= maxQIdx;
  });
  
  if(pool.length === 0) return null;
  
  // 加权随机选择
  const weights = {common:50, rare:30, epic:15, legendary:10, mythic:1};
  const boost = TAVERN_REFRESH.qualityWeightBoost[tavernLevel] || 0;
  if(boost > 0){
    weights[maxQuality] = Math.round((weights[maxQuality] || 10) * (1 + boost));
  }
  
  let attempts = 0;
  while(attempts < 50){
    const tpl = pick(pool);
    const w = weights[tpl.quality] || 10;
    if(Math.random() * 100 < w || attempts > 40){
      return tpl;
    }
    attempts++;
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

// 一键招募所有可招募英雄（支持品质筛选，根据资源持续招募）
function recruitAllHeroes(minQuality){
  const MAX_RECRUIT_PER_BATCH = 100; // 每次一键招募最多100个
  
  var recruited = 0;
  var totalCost = {gold: 0, gems: 0};
  var goldCosts = {common:30, rare:100, epic:300, legendary:0, mythic:0};
  var gemCosts = {common:0, rare:0, epic:0, legendary:3, mythic:8};
  
  // 获取酒馆等级和最高可招募品质
  const tavernLevel = G.buildings.tavern || 1;
  const maxQuality = TAVERN_REFRESH.maxQualityByLevel[tavernLevel] || 'common';
  
  // 检查当前英雄数量（使用统一上限常量）
  var currentHeroCount = G.heroes ? G.heroes.length : 0;
  if(currentHeroCount >= MAX_HEROES_TOTAL){
    showToast('英雄数量已达上限（' + MAX_HEROES_TOTAL + '个），无法继续招募');
    return;
  }
  
  // 计算本次最多可招募数量
  var maxCanRecruit = Math.min(MAX_RECRUIT_PER_BATCH, MAX_HEROES_TOTAL - currentHeroCount);
  
  // 持续招募，直到资源不足或达到上限
  while(recruited < maxCanRecruit){
    // 生成一个符合条件的随机英雄
    var tpl = generateRandomHeroForRecruit(minQuality);
    if(!tpl) break;
    
    var goldCost = goldCosts[tpl.quality] || 50;
    var gemCost = gemCosts[tpl.quality] || 0;
    
    // 检查资源是否足够
    if(goldCost > 0 && G.resources.gold < goldCost) break;
    if(gemCost > 0 && G.resources.gems < gemCost) break;
    
    // 扣除资源
    if(goldCost > 0) G.resources.gold -= goldCost;
    if(gemCost > 0) G.resources.gems -= gemCost;
    totalCost.gold += goldCost;
    totalCost.gems += gemCost;
    
    // 创建英雄
    var hero = createHero(tpl.id);
    G.heroes.push(hero);
    recruited++;
    
    // 更新统计
    updateStat('heroRecruited', 1);
    recordCodex('heroes', tpl.id);
  }
  
  if(recruited === 0){
    showToast('资源不足以招募任何英雄（当前酒馆最高品质：' + QUALITY_NAMES[maxQuality] + '）');
    return;
  }
  
  // 检查是否达到上限
  var reachLimitMsg = '';
  if(currentHeroCount + recruited >= MAX_TOTAL_HEROES){
    reachLimitMsg = '（已达英雄上限' + MAX_TOTAL_HEROES + '个）';
  } else if(recruited >= MAX_RECRUIT_PER_BATCH){
    reachLimitMsg = '（单次招募上限50个）';
  }
  
  updateResUI();
  saveGame();
  
  var costStr = [];
  if(totalCost.gold > 0) costStr.push('💰' + totalCost.gold);
  if(totalCost.gems > 0) costStr.push('💎' + totalCost.gems);
  
  var qualityStr = minQuality ? QUALITY_NAMES[minQuality] + '及以上' : '全部';
  showToast('🎉 招募了 ' + recruited + ' 个' + qualityStr + '英雄' + reachLimitMsg + '，消耗 ' + costStr.join(' + '));
  
  // 检查成就
  checkAchievement('hero_4');
  checkAchievement('hero_5');
  checkAchievement('hero_6');
  checkAchievement('hero_7');
  checkAchievement('hero_10');
  
  renderTavernRecruit();
}

// 全局英雄上限常量
const MAX_HEROES_TOTAL = 200;

// 检查英雄数量是否已达上限
function checkHeroLimit(count) {
  var current = G.heroes ? G.heroes.length : 0;
  if (current + count > MAX_HEROES_TOTAL) {
    showToast('⚠️ 英雄数量已达上限（' + MAX_HEROES_TOTAL + '个），无法继续招募');
    return false;
  }
  return true;
}

function recruitHero(templateId){
  const tpl=HERO_TEMPLATES.find(t=>t.id===templateId);
  if(!tpl)return;
  // 记录英雄图鉴（即使不招募也记录为"遇见"）
  recordCodex('heroes',templateId);
  // 已招募的英雄不能重复招募
  if(G_tavernRecruited.has(templateId)){showToast('该英雄已被招募！');return}
  // 检查英雄上限
  if(!checkHeroLimit(1))return;
  
  // 招募成本：降低门槛，让更多玩家能体验到招募乐趣
  const goldCosts={common:30,rare:100,epic:300,legendary:0,mythic:0};
  const gemCosts={common:0,rare:0,epic:0,legendary:3,mythic:8};
  
  const goldCost=goldCosts[tpl.quality]||50;
  const gemCost=gemCosts[tpl.quality]||0;
  
  // 检查资源
  if(goldCost>0 && G.resources.gold<goldCost){showToast(`金币不足！需要 ${goldCost} 金币`);return}
  if(gemCost>0 && G.resources.gems<gemCost){showToast(`宝石不足！需要 ${gemCost} 宝石，击败BOSS可获得`);return}
  
  // 扣除资源
  if(goldCost>0) G.resources.gold-=goldCost;
  if(gemCost>0) G.resources.gems-=gemCost;
  
  const hero=createHero(tpl.id);
  G.heroes.push(hero);
  // 标记为已招募（不移除，保持展示）
  G_tavernRecruited.add(templateId);
  updateResUI();
  saveGame();
  
  const costStr=goldCost>0?`${goldCost}金币`:gemCost>0?`${gemCost}宝石`:`${goldCost}金币+${gemCost}宝石`;
  showToast(`招募成功！消耗 ${costStr}，获得 ${hero.icon} ${hero.name}`);
  
  // 更新成就统计
  updateStat('heroRecruited', 1);
  
  // 检查英雄相关成就
  checkAchievement('hero_4');
  checkAchievement('hero_5');
  checkAchievement('hero_6');
  checkAchievement('hero_7');
  checkAchievement('hero_10');
  
  // 如果是在引导阶段，招募成功后自动切回城镇
  if(onGuideRecruitHero()){
    // 引导中，延迟切回城镇
  }else{
    renderTavernRecruit();
  }
}

let currentTab='town';

function switchTab(tab){
  if(G_isH5Package&&tab==='cheats'){showToast('📦 H5版已禁用金手指');return;}
  currentTab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.tab===tab);
  });
  hideGuideTip();
  renderCurrentTab();
  if(tab==='merge' && G.tutorialPhase==='guide' && G.tutorialStep===6){
    onGuideMergeClick();
  }
}

function renderCurrentTab(){
  var contentEl=document.getElementById('content');
  var battlePanel=document.getElementById('battle-panel');
  
  if(G_battleRunning && !G_autoBattle && currentTab==='battle'){
    // 手动战斗中切回战斗页：显示战斗面板，隐藏content
    contentEl.style.display='none';
    battlePanel.style.display='';
  }else if(G_battleRunning){
    // 战斗运行中切到其他页 或 自动推图后台执行：隐藏战斗面板，显示content
    battlePanel.style.display='none';
    contentEl.style.display='';
  }else{
    // 没有战斗：正常显示content
    contentEl.style.display='';
    battlePanel.style.display='none';
  }
  
  switch(currentTab){
    case 'town': renderTown(contentEl);break;
    case 'heroes': renderHeroes(contentEl);break;
    case 'team': renderTeam(contentEl);break;
    case 'battle': renderBattle(contentEl);break;
    case 'merge': renderMerge(contentEl);break;
    case 'equip': renderEquip(contentEl);break;
    case 'buildings': renderBuildings(contentEl);break;
    case 'arena': renderArena(contentEl);break;
    case 'codex': renderCodex(contentEl);break;
    case 'achievements': renderAchievements(contentEl);break;
    case 'leaderboard': renderLeaderboard(contentEl);break;
    case 'breakthrough': contentEl.innerHTML=renderBreakthroughUI();break;
    case 'cheats': renderCheats(contentEl);break;
  }
}

// ==================== 战力计算 ====================
function calcHeroPower(h){
  var s=getHeroStats(h);
  return Math.floor(s.maxHP*0.5+s.atk*3+s.def*2.5+s.spd*2+s.maxMP*0.3);
}

// 战力排序切换
function toggleHeroSort(){
  window._heroSortDesc=!window._heroSortDesc;
  var btn=document.getElementById('hero-sort-btn');
  if(btn)btn.textContent=window._heroSortDesc?'📊战力↓':'📊战力↑';
  var list=document.getElementById('hero-list');
  if(!list)return;
  var cards=Array.from(list.children);
  cards.sort(function(a,b){
    var pa=parseInt(a.querySelector('.hero-power b')?.textContent)||0;
    var pb=parseInt(b.querySelector('.hero-power b')?.textContent)||0;
    return window._heroSortDesc?pb-pa:pa-pb;
  });
  cards.forEach(function(c){list.appendChild(c)});
}

// 重置融合状态（解决融合按钮不亮问题）
function resetMergeState(){
  // 先清除所有英雄卡片的已选样式（在清空_mergeSlots之前）
  var usedUids=[];
  for(var i=0;i<3;i++){
    if(window._mergeSlots[i]){
      usedUids.push(window._mergeSlots[i]);
    }
  }
  // 清除所有已选英雄的卡片样式
  usedUids.forEach(function(uid){
    updateMergeHeroCardStyle(uid,false);
  });
  // 清除融合槽位
  window._mergeSlots=[null,null,null];
  // 清除_merging标志（防止卡死）
  window._merging=false;
  // 清除pending状态
  window._pendingMergeResult=false;
  window._accidentHero=null;
  window._accidentMats=null;
  // 清除特效元素
  var flashes=document.querySelectorAll('.merge-mythic-flash,.merge-legendary-flash,.merge-quality-up-flash,.merge-mutation-flash,.merge-mythic-text,.merge-legendary-text,.merge-mythic-particles,.merge-bond-flash,.merge-streak-flash,.merge-upset-flash,.merge-enhance-flash,.merge-result-overlay');

}

  function buildEquipHTML(){
    let html='';
    for(const slot of ['weapon','armor','accessory']){
      const eid=h.equipment[slot];
      if(eid!=null){
        const eq=G.equipment.find(e=>e.uid===eid);
        if(eq){
          const tpl=EQUIP_TEMPLATES.find(t=>t.id===eq.id);
          if(tpl){
            const enhanceLevel=eq.enhance||0;
            const enhanceMult=1+enhanceLevel*0.1;
            const statsStr=Object.entries(tpl.stats).map(([k,v])=>{
              const finalVal=Math.floor(v*enhanceMult);
              const statNames={atk:'攻击',def:'防御',hp:'生命',mp:'魔法',spd:'速度'};
              return (statNames[k]||k)+'+'+finalVal;
            }).join(' ');
            var setInfoHtml='';
            if(tpl.setId && EQUIP_SETS[tpl.setId]){
              var setDef=EQUIP_SETS[tpl.setId];
              setInfoHtml='<div style="margin-top:4px;padding:4px 6px;background:rgba(201,162,39,.1);border-radius:4px;border:1px solid rgba(201,162,39,.2)">';
              setInfoHtml+='<div style="color:var(--gold);font-size:11px;font-weight:bold">'+setDef.icon+' '+setDef.name+'</div>';
              if(setDef.bonuses[2]) setInfoHtml+='<div style="font-size:10px;color:var(--text2)">2件: '+setDef.bonuses[2].desc+'</div>';
              if(setDef.bonuses[3]) setInfoHtml+='<div style="font-size:10px;color:var(--gold)">3件: '+setDef.bonuses[3].desc+'</div>';
              setInfoHtml+='</div>';
            }
            var skillInfoHtml='';
            if(tpl.specialSkill && EQUIP_SPECIAL_SKILLS[tpl.specialSkill]){
              var sk=EQUIP_SPECIAL_SKILLS[tpl.specialSkill];
              skillInfoHtml='<div style="margin-top:3px;font-size:10px;color:#70a1ff">✦ '+sk.icon+' '+sk.name+': '+sk.desc+'</div>';
            }
            var affixBriefHtml='';
            if(eq.affixes && eq.affixes.length>0){
              affixBriefHtml='<div style="margin-top:3px;display:flex;flex-wrap:wrap;gap:2px">';
              for(var afi=0;afi<eq.affixes.length;afi++){
                var afix=eq.affixes[afi];
                var afixDef=getAffixDef(afix.id);
                if(!afixDef)continue;
                var tierColor=AFFIX_TIERS[afix.tier-1].color;
                affixBriefHtml+='<span style="font-size:9px;padding:1px 4px;border-radius:3px;background:rgba(0,0,0,.3);border:1px solid '+tierColor+';color:'+tierColor+'">'+afixDef.icon+afix.value+afixDef.unit+'</span>';
              }
              affixBriefHtml+='</div>';
              // 协同
              var syns=checkAffixSynergies(eq.affixes);
              if(syns.length>0){
                affixBriefHtml+='<div style="margin-top:2px;font-size:9px;color:var(--gold)">🔗 '+syns.map(function(s){return s.icon+s.name}).join(' ')+'</div>';
              }
            }
            html+='<div class="hd-equip-slot">'
              +'<div class="hd-equip-icon">'+tpl.icon+'</div>'
              +'<div class="hd-equip-info">'
              +'<div class="hd-equip-name q-'+tpl.quality+'">'+tpl.name+'</div>'
              +'<div class="hd-equip-stats">'+statsStr+'</div>'
              +(enhanceLevel>0?'<div class="hd-equip-enhance">强化 +'+enhanceLevel+' (额外+'+Math.round(enhanceLevel*10)+'%)</div>':'')
              +affixBriefHtml
              +skillInfoHtml
              +setInfoHtml
              +'</div>'
              +'<span class="text-xs text-dim">'+slotIcons[slot]+' '+slotNames[slot]+'</span>'
              +'</div>';
            continue;
          }
        }
      }
      html+=`<div class="hd-equip-slot">
        <div class="hd-equip-icon" style="opacity:.3">${slotIcons[slot]}</div>
        <div class="hd-equip-slot-empty">未装备${slotNames[slot]}</div>
      </div>`;
    }
    return html;
  }

  // 构建技能HTML
  function buildSkillHTML(){
    return allSkills.map((sid,idx)=>{
      const sk=SKILLS[sid];
      if(!sk)return '';
      const isBonus=idx>=h.skills.length;
      // 检查是否是变异技能
      const isMutated=h.mutatedSkills&&h.mutatedSkills.includes(idx);
      const typeLabel=skillTypeLabels[sk.type]||sk.type;
      const typeColor=skillTypeColors[sk.type]||'#999';
      let metaParts=[];
      if(sk.mpCost)metaParts.push('💎'+sk.mpCost);
      if(sk.cooldown)metaParts.push('⏱'+sk.cooldown+'回合');
      if(sk.mult)metaParts.push('倍率:'+sk.mult+'x');
      if(sk.healPct)metaParts.push('回复:'+Math.round(sk.healPct*100)+'%');
      if(sk.shieldPct)metaParts.push('护盾:'+Math.round(sk.shieldPct*100)+'%');
      if(sk.stunChance)metaParts.push('眩晕:'+Math.round(sk.stunChance*100)+'%');
      if(sk.critBonus)metaParts.push('暴击+'+Math.round(sk.critBonus*100)+'%');
      if(sk.alwaysHit)metaParts.push('必中');
      if(sk.dot)metaParts.push(sk.dot.name+':'+Math.round(sk.dot.dmgPct*100)+'%/回合');
      return `<div class="hd-skill-card${isMutated?' hd-skill-clickable':''}" style="margin-bottom:8px${isMutated?';border:1px solid #d4a0ff;background:rgba(168,85,247,.08);cursor:pointer':''}"${isMutated?' onclick="event.stopPropagation();showSkillDetail(\''+sid+'\',true)"':''}>
        <div class="hd-skill-icon">${sk.icon}</div>
        <div class="hd-skill-info">
          <div class="hd-skill-name">${isMutated?'🧬 ':''}${sk.name} ${isBonus?'<span class="text-purple text-xs">★融合</span>':''}${isMutated?'<span class="text-xs" style="color:#d4a0ff">✨变异</span>':''}</div>
          <div class="hd-skill-desc">${sk.desc}</div>
          <div class="hd-skill-meta">
            <span style="color:${typeColor};background:rgba(255,255,255,.05);padding:1px 6px;border-radius:3px">${typeLabel}</span>
            ${metaParts.map(p=>'<span>'+p+'</span>').join('')}
            ${isMutated?'<span style="color:#d4a0ff;background:rgba(168,85,247,.15)">🧬变异+详情</span>':''}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // 构建成长预览HTML
  function buildGrowthHTML(){
    const statKeys=['maxHP','atk','def','spd','maxMP'];
    const statNames={maxHP:'❤️ 生命',atk:'⚔️ 攻击',def:'🛡️ 防御',spd:'💨 速度',maxMP:'💎 魔法'};
    const barColors={maxHP:'#c0392b',atk:'#e74c3c',def:'#2980b9',spd:'#27ae60',maxMP:'#8e44ad'};
    return statKeys.map(k=>{
      const val=stats[k]||0;
      const maxRef=statMaxRef[k]||100;
      const pct=Math.min(100,Math.round(val/maxRef*100));
      const nextVal=nextLevelStats[k];
      const diff=nextVal?nextVal-val:0;
      return `<div class="hd-growth-row">
        <div class="hd-growth-label">${statNames[k]}</div>
        <div class="hd-growth-bar">
          <div class="hd-growth-bar-fill" style="width:${pct}%;background:${barColors[k]}"></div>
        </div>
        <div class="hd-growth-val">${val}${diff>0?' <span style="color:var(--green);font-size:9px">+'+diff+'</span>':''}</div>
      </div>`;
    }).join('');
  }

  function buildMechanismHTML(){

    rows.push(['暴击伤害',(role.critDmg?Math.round(role.critDmg*100):150)+'%']);
    if(role.damageReduction)rows.push(['伤害减免',Math.round(role.damageReduction*100)+'%']);
    if(role.dodgeRate)rows.push(['闪避率',Math.round(role.dodgeRate*100)+'%']);
    if(role.healBoost)rows.push(['治疗加成','+'+Math.round(role.healBoost*100)+'%']);
    if(role.skillDmgBoost)rows.push(['技能伤害','+'+Math.round(role.skillDmgBoost*100)+'%']);
    if(role.lifeSteal)rows.push(['生命汲取',Math.round(role.lifeSteal*100)+'%']);
    if(role.hitBonus)rows.push(['命中加成','+'+Math.round(role.hitBonus*100)+'%']);
    if(role.armorPen)rows.push(['护甲穿透',Math.round(role.armorPen*100)+'%']);
    if(role.shieldBoost)rows.push(['护盾加成','+'+Math.round(role.shieldBoost*100)+'%']);
    if(role.regenPct)rows.push(['每回合回复',Math.round(role.regenPct*100)+'%']);
    if(role.dotBoost)rows.push(['DOT加成','+'+Math.round(role.dotBoost*100)+'%']);
    if(role.undeadBonus)rows.push(['对亡灵伤害','+'+Math.round(role.undeadBonus*100)+'%']);
    if(role.deathDefy)rows.push(['死亡守护','每场1次']);
    return rows.map(([label,val])=>`<div class="hd-mechanism-row"><span class="hd-mechanism-label">${label}</span><span class="hd-mechanism-val">${val}</span></div>`).join('');
  }

// 左右切换英雄详情
function _navHeroDetail(dir){
  var newIdx = _heroDetailIdx + dir;
  if (newIdx < 0 || newIdx >= _heroDetailList.length) return;
  _heroDetailIdx = newIdx;
  var h = _heroDetailList[newIdx];
  if (!h) return;
  // 使用平滑过渡动画
  _renderHeroDetailAnimated(h, dir);
}

// 平滑过渡渲染英雄详情（双容器滑动，无闪动无黑屏）
function _renderHeroDetailAnimated(h, dir){
  var panel = document.getElementById('hero-detail-panel');
  var overlay = document.getElementById('hero-detail-overlay');
  if (!panel || !overlay) {
    _renderHeroDetail(h);
    return;
  }
  
  // 防止重复触发
  if (panel._transitioning) return;
  panel._transitioning = true;
  
  // 1. 获取面板位置和尺寸
  var rect = panel.getBoundingClientRect();
  var parent = panel.parentElement;
  
  // 2. 创建新面板容器（与旧面板完全重叠）
  var wrapper = document.createElement('div');
  wrapper.id = 'hd-slide-wrapper';
  wrapper.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;pointer-events:none;z-index:20';
  parent.style.position = 'relative';
  parent.appendChild(wrapper);
  
  // 3. 生成新英雄的 HTML（只取面板内容，不含 overlay）
  // 临时调用 _renderHeroDetail 但拦截 openModal
  var newHtml;
  var origOpenModal = window.openModal;
  window.openModal = function(html){ newHtml = html; };
  _renderHeroDetail(h);
  window.openModal = origOpenModal;
  
  // 从新 HTML 中提取面板
  var tempDiv = document.createElement('div');
  tempDiv.innerHTML = newHtml;
  var newPanel = tempDiv.querySelector('.hero-detail-panel');
  if (!newPanel) { wrapper.remove(); panel._transitioning = false; return; }
  
  // 4. 设置新面板样式：放在旧面板旁边
  newPanel.style.position = 'absolute';
  newPanel.style.top = '0';
  newPanel.style.left = '0';
  newPanel.style.width = rect.width + 'px';
  newPanel.style.height = rect.height + 'px';
  newPanel.style.margin = '0';
  newPanel.style.transform = dir > 0 ? 'translateX(100%)' : 'translateX(-100%)';
  newPanel.style.transition = 'none';
  newPanel.style.opacity = '1';
  newPanel.style.pointerEvents = 'auto';
  wrapper.appendChild(newPanel);
  
  // 5. 两个面板同时滑动
  requestAnimationFrame(function(){
    panel.style.transition = 'transform .28s cubic-bezier(.4,0,.2,1)';
    panel.style.transform = dir > 0 ? 'translateX(-100%)' : 'translateX(100%)';
    
    newPanel.style.transition = 'transform .28s cubic-bezier(.4,0,.2,1)';
    newPanel.style.transform = 'translateX(0)';
  });
  
  // 6. 动画结束后：用新面板替换旧面板
  setTimeout(function(){
    // 将新面板的样式恢复正常
    newPanel.style.position = '';
    newPanel.style.top = '';
    newPanel.style.left = '';
    newPanel.style.width = '';
    newPanel.style.height = '';
    newPanel.style.margin = '';
    newPanel.style.transform = '';
    newPanel.style.transition = '';
    newPanel.style.pointerEvents = '';
    
    // 替换旧面板
    panel.remove();
    wrapper.remove();
    parent.style.position = '';
    
    // 重新绑定滑动事件
    _bindHeroDetailSwipe();
    panel._transitioning = false;
  }, 300);
}

// 绑定详情面板触摸滑动
function _bindHeroDetailSwipe(){
  var panel = document.getElementById('hero-detail-panel');
  if (!panel) return;
  var startX = 0, startY = 0, swiping = false;
  panel.addEventListener('touchstart', function(e){
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiping = true;
  }, {passive: true});
  panel.addEventListener('touchend', function(e){
    if (!swiping) return;
    swiping = false;
    var dx = e.changedTouches[0].clientX - startX;
    var dy = e.changedTouches[0].clientY - startY;
    // 水平滑动距离大于50px且大于垂直距离
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      _navHeroDetail(dx < 0 ? 1 : -1);
    }
  }, {passive: true});
}

// 使用经验药水（支持倍数：1/5/10/50/-1为全部）
function useExpPotion(heroUid,mult=1){
  const hero=G.heroes.find(h=>h.uid===heroUid);
  if(!hero)return;
  
  const levelCap=getHeroLevelCap();
  if(hero.level>=levelCap){
    showToast('该英雄已达当前等级上限！');
    return;
  }
  
  // 计算实际消耗数量
  const unitCost=100; // 每次消耗100药水
  let actualMult=mult;
  if(mult===-1){
    // 全部使用：计算最大可用倍数
    actualMult=Math.floor((G.resources.expPotion||0)/unitCost);
    if(actualMult<=0){
      showToast('经验药水不足！');
      return;
    }
  }
  
  const totalCost=unitCost*actualMult;
  const totalExp=100*actualMult;
  
  if((G.resources.expPotion||0)<totalCost){
    showToast(`经验药水不足！需要 🧪${totalCost}`);
    return;
  }
  
  // 消耗药水并增加经验
  G.resources.expPotion-=totalCost;
  const leveledUp=addHeroExp(hero,totalExp);
  
  updateResourceBar();
  saveGame();
  
  if(leveledUp){
    showToast(`${hero.icon}${hero.name} 升级了！当前 Lv.${hero.level}`);
  }else{
    showToast(`${hero.icon}${hero.name} 获得经验 +${totalExp} (${hero.exp}/${getExpToLevel(hero.level)})`);
  }
  
  // 刷新英雄详情弹窗
  showHeroDetail(heroUid);
}

// 快捷购买经验药水
function buyExpPotionQuick(count){
  const potionPrice=50;
  const potionAmount=100;
  const totalCost=count*potionPrice;
  const totalAmount=count*potionAmount;
  
  if(count<=0){
    showToast('购买数量必须大于0！');
    return;
  }
  
  if((G.resources.gold||0)<totalCost){
    showToast(`金币不足！需要 💰${totalCost}，当前 💰${G.resources.gold||0}`);
    return;
  }
  
  if((G.resources.expPotion||0)+totalAmount>RESOURCE_LIMITS.expPotion){
    const maxCanBuy=Math.floor((RESOURCE_LIMITS.expPotion-(G.resources.expPotion||0))/potionAmount);
    if(maxCanBuy<=0){
      showToast('经验药水已达上限！');
    }else{
      showToast(`超过存储上限！最多还能购买 ${maxCanBuy} 份`);
    }
    return;
  }
  
  G.resources.gold-=totalCost;
  G.resources.expPotion=(G.resources.expPotion||0)+totalAmount;
  updateResourceBar();
  saveGame();
  showToast(`购买成功！消耗 💰${totalCost}，获得 🧪${totalAmount}经验药水`);
  renderTavernRecruit(); // 刷新界面显示
}

// 购买最大数量的经验药水
function buyExpPotionMax(){
  const potionPrice=50;
  const potionAmount=100;
  const maxByGold=Math.floor((G.resources.gold||0)/potionPrice);
  const maxByLimit=Math.floor((RESOURCE_LIMITS.expPotion-(G.resources.expPotion||0))/potionAmount);
  const maxCount=Math.min(maxByGold,maxByLimit);
  
  if(maxCount<=0){
    if(maxByGold<=0){
      showToast('金币不足！');
    }else{
      showToast('经验药水已达上限！');
    }
    return;
  }
  
  buyExpPotionQuick(maxCount);
}

function dismissHero(uid){
  var idx=G.heroes.findIndex(h=>h.uid===uid);
  if(idx<0)return;
  var h=G.heroes[idx];

          </div>

// 确认遣散（执行返还）
function confirmDismiss(uid){
  var idx=G.heroes.findIndex(h=>h.uid===uid);
  if(idx<0){
    closeModal();
    return;
  }
  var h=G.heroes[idx];
  
  // 计算返还资源
  var totalExp=0;
  for(var i=1;i<h.level;i++){
    totalExp+=getExpToLevel(i);
  }
  totalExp+=h.exp||0;
  var returnExp=Math.floor(totalExp*0.7);
  
  var qualityCostMult={common:1,rare:2,epic:4,legendary:8,mythic:16};
  var baseCost=50;
  var returnGold=Math.floor(baseCost*(qualityCostMult[h.quality]||1)*h.level*0.5);
  
  // 从队伍移除
  G.team=G.team.map(t=>(t&&t.uid===uid)?null:t);
  G.heroes.splice(idx,1);
  
  // 发放返还资源
  G.resources.expPotion=(G.resources.expPotion||0)+returnExp;
  G.resources.gold=(G.resources.gold||0)+returnGold;

function filterHeroes(filter,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#hero-list .hero-card').forEach(card=>{
    var show=true;
    if(filter==='all')show=true;
    else if(filter==='team')show=G.team.some(t=>t&&t.uid===parseInt(card.dataset.uid));
    else if(['rare','epic','legendary','mythic'].includes(filter))show=card.dataset.quality===filter;
    else show=card.dataset.role===filter;
    card.style.display=show?'':'none';
  });
}

// 切换天赋分支Tab
function switchTalentBranch(heroUid,branchKey,btn){

  document.querySelectorAll('.tt-branch').forEach(b=>b.classList.remove('active'));

// 检查是否可以添加天赋点
function canAddTalent(hero,talent){
  // 检查前置要求
  if(talent.requires){
    for(const reqId of talent.requires){
      if(!(hero.talents[reqId]>0))return false;
    }
  }
  return true;
}

// 添加天赋点
function addTalentPoint(heroUid,talentId){
  const hero=G.heroes.find(h=>h.uid===heroUid);
  if(!hero)return;
  
  const tree=TALENT_TREES[hero.role];
  if(!tree)return;
  
  // 查找天赋
  let talent=null;
  for(const branch of Object.values(tree.branches)){
    talent=branch.talents.find(t=>t.id===talentId);
    if(talent)break;
  }
  if(!talent)return;
  
  // 检查可用点数
  const usedPoints=Object.values(hero.talents).reduce((sum,p)=>sum+p,0);
  const availablePoints=hero.talentPoints-usedPoints;
  if(availablePoints<=0){
    showToast('天赋点不足！');
    return;
  }
  
  // 检查是否已满
  const currentPoints=hero.talents[talentId]||0;
  if(currentPoints>=talent.maxPoints){
    showToast('该天赋已满级！');
    return;
  }
  
  // 检查前置要求
  if(!canAddTalent(hero,talent)){
    showToast('前置天赋未激活！');
    return;
  }
  
  // 添加天赋点
  hero.talents[talentId]=currentPoints+1;
  saveGame();
  
  // 播放音效或特效（可选）
  showToast(`✨ ${talent.name} +1！`);
  
  // 刷新界面
  showTalentTree(heroUid);
}

// 重置天赋
function resetTalents(heroUid){
  const hero=G.heroes.find(h=>h.uid===heroUid);
  if(!hero)return;
  
  // 检查资源
  if((G.resources.gold||0)<TALENT_CONFIG.resetCostGold){
    showToast('金币不足！');
    return;
  }
  if((G.resources.gems||0)<TALENT_CONFIG.resetCostGems){
    showToast('宝石不足！');
    return;
  }
  
  // 检查是否有天赋可重置
  const usedPoints=Object.values(hero.talents||{}).reduce((sum,p)=>sum+p,0);
  if(usedPoints===0){
    showToast('该英雄没有分配天赋点！');
    return;
  }
  
  // 确认重置
  const html=`
    <div style="text-align:center;padding:10px">
      <div style="font-size:48px;margin-bottom:10px">🔄</div>
      <div style="color:#ff6b6b;font-weight:bold;margin-bottom:10px">确定要重置天赋吗？</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:15px">

      </div>
      <div style="display:flex;gap:10px">
        <button class="btn" style="flex:1" onclick="closeModal()">取消</button>
        <button class="btn" style="flex:1;background:rgba(255,107,107,.2);border-color:rgba(255,107,107,.5);color:#ff6b6b" onclick="confirmResetTalents(${heroUid})">确认重置</button>

// 确认重置天赋
function confirmResetTalents(heroUid){
  const hero=G.heroes.find(h=>h.uid===heroUid);
  if(!hero)return;
  
  // 扣除资源
  G.resources.gold-=TALENT_CONFIG.resetCostGold;
  G.resources.gems-=TALENT_CONFIG.resetCostGems;
  
  // 返还天赋点
  const usedPoints=Object.values(hero.talents||{}).reduce((sum,p)=>sum+p,0);
  hero.talentPoints+=usedPoints;
  hero.talents={};
  
  saveGame();
  updateResourceBar();
  closeModal();
  showToast(`🔄 天赋已重置，返还 ${usedPoints} 点天赋点！`);
  showTalentTree(heroUid);
}

// 获取英雄天赋效果汇总
function getTalentEffects(hero){
  const effects={};
  if(!hero||!hero.talents)return effects;
  
  const tree=TALENT_TREES[hero.role];
  if(!tree)return effects;
  
  for(const[branchId,branch]of Object.entries(tree.branches)){
    for(const talent of branch.talents){
      const points=hero.talents[talent.id]||0;
      if(points>0){
        const effectType=talent.effect.type;
        const effectValue=talent.effect.value*points;
        if(!effects[effectType])effects[effectType]=0;
        effects[effectType]+=effectValue;
      }
    }
  }
  
  return effects;
}

// 渲染羁绊预览面板
function renderBondPreview(team){
  var teamH=team.filter(function(t){return t!==null;});
  var bonds=detectActiveBonds(teamH);

  // 构建所有羁绊信息
  var allBondInfo=[];
  for(var i=0;i<HERO_BONDS.length;i++){
    var bond=HERO_BONDS[i];
    var count=0;
    if(bond.check==='role'){
      count=teamH.filter(function(h){return h.role===bond.key;}).length;
    } else if(bond.checkFn){
      count=bond.checkFn(teamH);
    }
    var nextThreshold=null;
    for(var t=0;t<bond.thresholds.length;t++){
      if(count<bond.thresholds[t].need){nextThreshold=bond.thresholds[t];break;}
    }
    var isActive=bonds.some(function(ab){return ab.bond.id===bond.id;});
    allBondInfo.push({bond:bond,count:count,nextThreshold:nextThreshold,isActive:isActive});
  }

  var typeOrder={role:0,theme:1,fun:2};
  allBondInfo.sort(function(a,b){return (typeOrder[a.bond.type]||9)-(typeOrder[b.bond.type]||9);});

  var typeNames={role:'⚔️ 职业羁绊',theme:'🌟 主题羁绊',fun:'🎉 趣味羁绊'};
  var typeColors={role:'#4a9eff',theme:'#a855f7',fun:'#f59e0b'};

  var html='<div class="panel"><div class="panel-title"><span class="icon">🔗</span> 英雄羁绊'
    +(bonds.length>0?' <span style="font-size:11px;color:var(--green);font-weight:normal">('+bonds.length+'激活)</span>':'')
    +'</div>';

  // 激活的羁绊高亮展示
  if(bonds.length>0){
    html+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">';
    for(var bi=0;bi<bonds.length;bi++){
      var ab=bonds[bi];
      var bc=typeColors[ab.bond.type]||'#888';
      html+='<span style="display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:bold;border:1px solid '+bc+';color:'+bc+';background:'+bc+'15">'+ab.bond.icon+' '+ab.bond.name+'</span>';
    }
    html+='</div>';
  }

  // 所有羁绊进度列表
  var lastType='';
  for(var j=0;j<allBondInfo.length;j++){
    var item=allBondInfo[j];
    if(item.count===0 && !item.nextThreshold) continue;
    if(item.bond.type!==lastType){
      lastType=item.bond.type;
      html+='<div style="color:'+typeColors[lastType]+';font-size:11px;font-weight:bold;margin:8px 0 4px;padding-top:6px;border-top:1px solid rgba(255,255,255,.05)">'+typeNames[lastType]+'</div>';
    }
    var tc=typeColors[item.bond.type];
    var maxNeed=item.bond.thresholds[item.bond.thresholds.length-1].need;
    var countText=item.count+'/'+maxNeed;
    var pct=Math.min(100,Math.floor(item.count/maxNeed*100));

    // 进度条
    var barColor=item.isActive?'var(--green)':'var(--text3)';
    var activeDesc='';
    if(item.isActive){
      var activeThreshold=item.bond.thresholds.filter(function(t){return item.count>=t.need;}).pop();
      if(activeThreshold) activeDesc='<div style="font-size:10px;color:var(--green);margin-top:2px">✨ '+activeThreshold.desc+'</div>';
    }
    var nextDesc=item.nextThreshold?'<div style="font-size:10px;color:var(--text3);margin-top:1px">→ '+item.nextThreshold.desc+'</div>':'<div style="font-size:10px;color:var(--gold);margin-top:1px">已满级!</div>';

    html+='<div class="bond-preview-item" style="border-color:'+(item.isActive?tc:'var(--border)')+';'+(item.isActive?'background:linear-gradient(135deg,'+tc+'08,'+tc+'03)':'')+'">'
      +'<div style="display:flex;align-items:center;gap:6px">'
      +'<span style="font-size:16px">'+item.bond.icon+'</span>'
      +'<span style="font-weight:bold;color:'+(item.isActive?tc:'var(--text)')+';font-size:12px;flex:1">'+item.bond.name+'</span>'
      +'<span style="font-size:10px;color:'+(item.isActive?'var(--green)':'var(--text2)')+'">'+countText+'</span>'
      +'</div>'
      +'<div style="height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:4px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+barColor+';border-radius:2px;transition:width .3s"></div></div>'
      +activeDesc+nextDesc
      +'</div>';
  }

  html+='</div>';
  return html;
}

// ==================== 扫荡功能 ====================
function quickClear(stageId){
  var stage=getStage(stageId);
  if(!stage || stageId>=G.stageProgress){
    showToast('只能扫荡已通关的关卡！');
    return;
  }
  var teamHeroes=G.team.filter(h=>h!==null);
  if(teamHeroes.length===0){
    showToast('请先编队！');
    return;
  }
  
  // 扫荡：直接结算奖励，跳过战斗
  var rw=stage.rewards;
  // 连胜加成
  var streakBonus=1+Math.min((G.pveWinStreak||0)*0.05,0.5);
  var finalGold=Math.floor((rw.gold||0)*streakBonus);
  var finalFood=Math.floor((rw.food||0)*streakBonus);
  var finalStone=Math.floor((rw.stone||0)*streakBonus);
  var finalIron=Math.floor((rw.iron||0)*streakBonus);
  
  G.resources.gold=Math.min((G.resources.gold||0)+finalGold,RESOURCE_LIMITS.gold);
  G.resources.food=Math.min((G.resources.food||0)+finalFood,RESOURCE_LIMITS.food);
  G.resources.stone=Math.min((G.resources.stone||0)+finalStone,RESOURCE_LIMITS.stone);
  G.resources.iron=Math.min((G.resources.iron||0)+finalIron,RESOURCE_LIMITS.iron);
  G.resources.gems=Math.min((G.resources.gems||0)+(rw.gems||0),RESOURCE_LIMITS.gems);
  
  // 经验
  teamHeroes.forEach(function(h){
    var expBonus=1;
    if(h.traits) h.traits.forEach(function(t){if(t.id==='tactician')expBonus+=0.20});
    addHeroExp(h,Math.floor((rw.exp||0)*expBonus));
  });
  
  // 装备掉落（扫荡掉率降低）
  if(Math.random()<0.15+stageId*0.02){
    var possibleDrops=EQUIP_TEMPLATES.filter(function(e){return QUALITIES.indexOf(e.quality)<=Math.min(stageId,4)});
    if(possibleDrops.length>0){
      var tpl=pick(possibleDrops);
      var drop={uid:++G.heroIdCounter,id:tpl.id,heroUid:null};
      G.equipment.push(drop);
      recordCodex('equipment',tpl.id);
      showToast('扫荡成功！获得 '+tpl.name);
    }else{
      showToast('扫荡成功！💰'+finalGold+' 🍞'+finalFood);
    }
  }else{
    showToast('扫荡成功！💰'+finalGold+' 🍞'+finalFood+' 🪨'+finalStone);
  }
  
  // 更新在线时间
  G.lastOnlineTime=Date.now();
  saveGame();
  updateResUI();
}

// 快捷添加英雄
function quickAddMergeHeroes(mode){
  var usedUids=window._mergeSlots||[null,null,null];
  var usedSet=new Set(usedUids.filter(Boolean));
  var teamUids=G.team.filter(h=>h!==null).map(h=>h.uid);
  var available=G.heroes.filter(function(h){return !usedSet.has(h.uid)&&!teamUids.some(function(u){return u==h.uid})&&!h.locked;});

  if(available.length===0){
    showToast('没有可用英雄');
    return;
  }

  var toAdd=[];

  if(mode==='highest'){
    // 添加最高品质的英雄
    var qualityOrder=['hidden','mythic','legendary','epic','rare','common'];
    for(var i=0;i<qualityOrder.length;i++){
      var q=qualityOrder[i];
      var heroes=available.filter(function(h){return h.quality===q;});
      if(heroes.length>0){
        toAdd=heroes.slice(0,3);
        break;
      }
    }
  }else if(mode==='lowest'){
    // 添加最低品质的英雄
    var qualityOrder2=['common','rare','epic','legendary','mythic','hidden'];
    for(var i=0;i<qualityOrder2.length;i++){
      var q=qualityOrder2[i];
      var heroes=available.filter(function(h){return h.quality===q;});
      if(heroes.length>0){
        toAdd=heroes.slice(0,3);
        break;
      }
    }
  }else if(mode==='same'){
    // 添加同品质的英雄（优先选择数量最多的品质）
    var qualityCounts={};
    available.forEach(function(h){
      qualityCounts[h.quality]=(qualityCounts[h.quality]||0)+1;
    });
    var maxQ='common';
    var maxCount=0;
    for(var q in qualityCounts){
      if(qualityCounts[q]>maxCount){
        maxCount=qualityCounts[q];
        maxQ=q;
      }
    }
    toAdd=available.filter(function(h){return h.quality===maxQ;}).slice(0,3);
  }else{
    // 按品质全选
    toAdd=available.filter(function(h){return h.quality===mode;}).slice(0,3);
  }

  if(toAdd.length<2){
    showToast('可用英雄不足2个');
    return;
  }

  // 清除所有现有选中英雄的卡片状态
  for(var i=0;i<3;i++){
    var heroUid = window._mergeSlots[i];
    if(heroUid){
      updateMergeHeroCardStyle(heroUid, false);
    }
  }

  // 清空后添加
  window._mergeSlots=[null,null,null];
  for(var i=0;i<Math.min(toAdd.length,3);i++){
    window._mergeSlots[i]=toAdd[i].uid;
    updateMergeHeroCardStyle(toAdd[i].uid, true);
  }

  renderMerge(document.getElementById('content'));
}

function addMergeHero(heroUid){
  heroUid = Number(heroUid);
  for(var i=0;i<3;i++){
    if(window._mergeSlots[i]!=null && window._mergeSlots[i]==heroUid){
      return;
    }
  }
  for(var i=0;i<3;i++){
    if(!window._mergeSlots[i]){
      window._mergeSlots[i]=heroUid;
      updateMergeUI();
      return;
    }
  }
  showToast('合成框已满（最多3个）');
}

function removeMergeHero(heroUid){
  heroUid = Number(heroUid);
  for(var i=0;i<3;i++){
    if(window._mergeSlots[i]!=null && window._mergeSlots[i]==heroUid){
      window._mergeSlots[i]=null;
      updateMergeUI();
      return;
    }
  }
}

function showMergePicker(slotIdx){
  const usedUids=window._mergeSlots.filter(Boolean);
  // 获取已上阵英雄UID列表
  const teamUids=G.team.filter(h=>h!==null).map(h=>h.uid);
  // 过滤：已使用的 + 已上阵的 + 已锁定的（使用 == 宽松比较）
  const available=G.heroes.filter(h=>!usedUids.some(function(u){return u==h.uid})&&!teamUids.some(function(u){return u==h.uid})&&!h.locked);
  if(available.length===0){
    // 检查是否因为全部上阵或锁定了
    const allInTeam=G.heroes.length>0&&G.heroes.every(h=>teamUids.some(function(u){return u==h.uid}));
    const allLocked=G.heroes.length>0&&G.heroes.every(h=>h.locked||teamUids.some(function(u){return u==h.uid}));
    if(allInTeam){
      showToast('所有英雄都已上阵，无法合成');
    }else if(allLocked){
      showToast('所有英雄都已锁定，无法合成');
    }else{
      showToast('没有可用英雄');
    }
    return;
  }
  const html=available.map(h=>`
    <div class="hero-card quality-${h.quality}" onclick="pickMergeHero(${slotIdx},${h.uid})" style="cursor:pointer">
      <div class="hero-avatar">${h.icon}</div>
      <div class="hero-info">
        <div class="hero-name"><span class="q-${h.quality}">${h.name}</span></div>
        <div class="hero-meta">${ROLES[h.role].icon} ${ROLES[h.role].name} · Lv.${h.level}</div>
      </div>
    </div>
  `).join('');
  showModal('选择合成材料',html);
}

function pickMergeHero(slotIdx,heroUid){
  // 将uid转换为数字类型，避免字符串/数字类型不匹配问题
  heroUid = Number(heroUid);
  // 如果该槽位已有英雄，先取消选中状态
  var oldHeroUid = window._mergeSlots[slotIdx];
  if(oldHeroUid){
    updateMergeHeroCardStyle(oldHeroUid, false);
  }
  window._mergeSlots[slotIdx]=heroUid;
  updateMergeHeroCardStyle(heroUid, true);
  closeModal();
  updateMergeUI();
}

function updateMergeUI(){
  const slots=window._mergeSlots||[null,null,null];
  for(let i=0;i<3;i++){
    const el=document.getElementById('merge-slot-'+i);
    if(!el) continue;
    const hero=slots[i]?G.heroes.find(h=>h.uid==slots[i]):null;
    if(hero){
      el.innerHTML='<span class="slot-icon">'+hero.icon+'</span><span class="slot-name q-'+hero.quality+'">'+hero.name+'</span><span class="slot-remove" onclick="event.stopPropagation();removeMergeSlot('+i+')">×</span>';
      el.className='merge-slot filled quality-'+hero.quality;
      el.onclick=null;
    }else{
      el.innerHTML='<span class="slot-placeholder">?</span><span class="slot-hint">点击添加</span>';
      el.className='merge-slot';
      el.onclick=(function(idx){return function(){showMergePicker(idx)}})(i);
    }
  }
  const activeSlots=slots.filter(Boolean);
  const resultEl=document.getElementById('merge-result');
  const previewEl=document.getElementById('merge-preview');
  const btn=document.getElementById('merge-btn');

  if(activeSlots.length>=2){
    const heroes=activeSlots.map(uid=>G.heroes.find(h=>h.uid==uid)).filter(Boolean);
    if(heroes.length>=2){
      // 计算费用并检查是否足够
      var qIdx=heroes.map(function(h){return QUALITIES.indexOf(h.quality)});
      var mQ=Math.max.apply(null,qIdx);
      var mergeCost=(mQ+1)*200;
      var canAfford=(G.resources.gold||0)>=mergeCost;
      // 检查赌局费用
      var gambleInfo=getGambleInfo();
      if(G_mergeGamble!=='normal'&&gambleInfo.cost>0){
        if(gambleInfo.costType==='gems'){
          canAfford=canAfford&&(G.resources.gems||0)>=gambleInfo.cost;
        }else{
          canAfford=(G.resources.gold||0)>=(mergeCost+gambleInfo.cost);
        }
      }
      
      if(G_cheats.enabled && G_cheats.showMergeResult){
        var _savedMergeTotalCount = G.mergeTotalCount;
        var _savedMergeMythicPity = G.mergeMythicPity;
        var _savedMergeHiddenPity = G.mergeHiddenPity;
        var _savedMergeLucky = G.mergeLucky;
        var _savedMergePity = G.mergePity;
        var _savedHeroIdCounter = G.heroIdCounter;
        var preview=generateFusedHero(heroes);
        G.mergeTotalCount = _savedMergeTotalCount;
        G.mergeMythicPity = _savedMergeMythicPity;
        G.mergeHiddenPity = _savedMergeHiddenPity;
        G.mergeLucky = _savedMergeLucky;
        G.mergePity = _savedMergePity;
        G.heroIdCounter = _savedHeroIdCounter;
        if(resultEl){
          resultEl.innerHTML='<span class="result-icon">'+preview.icon+'</span><span class="result-name q-'+preview.quality+'">'+preview.name+'</span><span class="result-quality q-'+preview.quality+'">'+QUALITY_NAMES[preview.quality]+'</span>';
          resultEl.className='merge-result ready';
        }
        if(previewEl){
          var skillNames=preview.skills.map(function(s){return SKILLS[s]?SKILLS[s].icon+SKILLS[s].name:s}).join(' ');
          previewEl.innerHTML='<span class="text-green">✓ 可融合：'+preview.icon+' '+preview.name+' ('+QUALITY_NAMES[preview.quality]+')</span>'
            +'<br><span class="text-xs text-dim">❤️'+preview.maxHP+' ⚔️'+preview.atk+' 🛡️'+preview.def+' 🏃'+preview.spd+' 💧'+preview.maxMP+'</span>'
            +'<br><span class="text-xs text-purple">技能：'+skillNames+'</span>';
        }
      }else{
        var bondPrev=detectMergeBond(heroes);
        var cost=(mQ+1)*200;
        var bondStr=bondPrev?'<br><span class="merge-bond-tag">'+bondPrev.name+'</span> <span style="color:#5dade2;font-size:11px">'+bondPrev.desc+'</span>':'';
        if(resultEl){
          resultEl.innerHTML='<span class="result-icon" style="animation:float 2s ease-in-out infinite">❓</span><span class="result-name" style="color:var(--text3)">???</span>';
          resultEl.className='merge-result ready';
        }
        if(previewEl){
          previewEl.innerHTML='<span class="text-green">✓ 已选择 '+heroes.length+' 个英雄，可进行融合</span>'
            +'<br><span class="text-xs text-dim">💰 消耗 '+cost+' 金币'+bondStr+'</span>';
        }
      }
      if(btn) btn.disabled=!canAfford;
    }else{
      if(resultEl){
        resultEl.innerHTML='<span class="result-placeholder">?</span><span class="result-hint">融合结果</span>';
        resultEl.className='merge-result';
      }
      if(previewEl) previewEl.innerHTML='<span class="text-red">英雄不存在</span>';
      if(btn) btn.disabled=true;
    }
  }else{
    if(resultEl){
      resultEl.innerHTML='<span class="result-placeholder">?</span><span class="result-hint">融合结果</span>';
      resultEl.className='merge-result';
    }
    if(previewEl) previewEl.innerHTML='请选择至少2个英雄进行融合';
    if(btn) btn.disabled=true;
  }
}

function doMerge(){
  // === 防重复点击保护 ===
  if(window._merging){
    showToast('⏳ 合成进行中，请稍候...');
    return;
  }
  
  const activeSlots=window._mergeSlots.filter(Boolean);
  // 检查是否至少选了2个英雄
  if(activeSlots.length < 2){
    showToast('请选择至少2个英雄进行融合');
    return;
  }
  // 计算合成费用
  var validHeroes=activeSlots.map(function(uid){return G.heroes.find(function(h){return h.uid==uid})}).filter(Boolean);
  if(validHeroes.length < 2){
    showToast('选中的英雄不存在，请重新选择');
    return;
  }
  
  // === 检查是否有锁定的英雄 ===
  var lockedHeroes=validHeroes.filter(function(h){return h.locked});
  if(lockedHeroes.length>0){
    showToast('🔒 '+lockedHeroes[0].name+' 已锁定，无法作为合成材料！请先解锁。');
    return;
  }
  
  var qualities=validHeroes.map(function(h){return QUALITIES.indexOf(h.quality)});
  var maxQ=qualities.length>0?Math.max.apply(null,qualities):0;
  var mergeCost=(maxQ+1)*200;
  
  // === 检查赌局费用 ===
  var gambleInfo=getGambleInfo();
  var gambleCost=0;
  var gambleCostType='gold';
  if(G_mergeGamble!=='normal'){
    gambleCost=gambleInfo.cost;
    gambleCostType=gambleInfo.costType||'gold';
    if(gambleCostType==='gems'){
      if((G.resources.gems||0) < gambleCost){
        showToast('💎 宝石不足！需要 '+gambleCost+' 宝石');
        return;
      }
    }else{
      if((G.resources.gold||0) < mergeCost+gambleCost){
        showToast('💰 金币不足！需要 '+(mergeCost+gambleCost)+' 金币（含赌局费用'+gambleCost+'）');
        return;
      }
    }
  }
  
  // 检查金币是否足够（合成费用）
  if((G.resources.gold||0) < mergeCost){
    showToast('💰 金币不足！需要 '+mergeCost+'💰，您只有 '+(G.resources.gold||0)+'💰');
    return;
  }
  
  // === 标记合成进行中，防止重复点击 ===
  window._merging=true;
  
  try{
    var result=executeMerge(activeSlots);
    if(result && result.success){
      // 所有成功合成（包括爆炸事件和非爆炸事件）都清空融合框并刷新渲染
      window._mergeSlots=[null,null,null];
    }
  }catch(e){
    console.error('[Merge] executeMerge error:', e);
    showToast('⚠️ 合成出错: ' + (e.message || e));
    // 出错时也清空槽位，避免卡死
    window._mergeSlots=[null,null,null];
  }
  
  // === 无论成功失败，都刷新UI（单独try-catch防止异常导致_merging卡死） ===
  try{
    var contentEl=document.getElementById('content');
    if(contentEl){
      renderMerge(contentEl);
    }
  }catch(e){
    console.error('[Merge] renderMerge error:', e);
  }
  
  // === 无论如何都释放锁定 ===
  window._merging=false;
}

  window._mergeSlots=[null,null,null];
  renderMerge(document.getElementById('content'));
}
