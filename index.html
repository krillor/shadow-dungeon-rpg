// 检测当前编队的激活羁绊
function detectActiveBonds(teamHeroes){
  var activeBonds=[];
  for(var i=0;i<HERO_BONDS.length;i++){
    var bond=HERO_BONDS[i];
    var count=0;
    if(bond.check==='role'){
      count=teamHeroes.filter(function(h){return h.role===bond.key;}).length;
    } else if(bond.checkFn){
      count=bond.checkFn(teamHeroes);
    }
    // 找到最高满足的阈值
    var activatedThreshold=null;
    for(var t=0;t<bond.thresholds.length;t++){
      if(count>=bond.thresholds[t].need){
        activatedThreshold=bond.thresholds[t];
      }
    }
    if(activatedThreshold){
      activeBonds.push({bond:bond,count:count,threshold:activatedThreshold});
    }
  }
  return activeBonds;
}

// 应用羁绊效果到战斗单位
function applyBondEffects(playerUnits, activeBonds){
  for(var i=0;i<activeBonds.length;i++){
    var ab=activeBonds[i];
    var effects=ab.threshold.effect;
    if(!Array.isArray(effects)) effects=[effects];
    for(var j=0;j<effects.length;j++){
      var eff=effects[j];
      switch(eff.type){
        case 'teamBuff':
          for(var u=0;u<playerUnits.length;u++){
            applyBuffToUnit(playerUnits[u],eff);
          }
          break;
        case 'teamAllBuff':
          for(var u=0;u<playerUnits.length;u++){
            playerUnits[u].maxHP=Math.floor(playerUnits[u].maxHP*(1+eff.value));
            playerUnits[u].hp=Math.floor(playerUnits[u].hp*(1+eff.value));
            playerUnits[u].atk=Math.floor(playerUnits[u].atk*(1+eff.value));
            playerUnits[u].def=Math.floor(playerUnits[u].def*(1+eff.value));
            playerUnits[u].spd=Math.floor(playerUnits[u].spd*(1+eff.value));
            playerUnits[u].maxMP=Math.floor(playerUnits[u].maxMP*(1+eff.value));
            playerUnits[u].mp=Math.floor(playerUnits[u].mp*(1+eff.value));
          }
          break;
        case 'teamRegen':
          for(var u=0;u<playerUnits.length;u++){
            if(!playerUnits[u]._bondRegen) playerUnits[u]._bondRegen=0;
            playerUnits[u]._bondRegen+=eff.value;
          }
          break;
        case 'teamMpRegen':
          for(var u=0;u<playerUnits.length;u++){
            if(!playerUnits[u]._bondMpRegen) playerUnits[u]._bondMpRegen=0;
            playerUnits[u]._bondMpRegen+=eff.value;
          }
          break;
        case 'onHitDot':
        case 'onHitFreeze':
        case 'onHitExtraDmg':
        case 'onHitDebuff':
        case 'killHeal':
        case 'firstStrike':
        case 'expBoost':
        case 'goldBoost':
        case 'randomElementDmg':
          // 存储到全局战斗标记
          if(!window._battleBondEffects) window._battleBondEffects=[];
          window._battleBondEffects.push(eff);
          break;
      }
    }
  }
}

function applyBuffToUnit(unit,eff){
  switch(eff.stat){
    case 'atk': unit.atk=Math.floor(unit.atk*(1+eff.value)); break;
    case 'def': unit.def=Math.floor(unit.def*(1+eff.value)); break;
    case 'spd': unit.spd=Math.floor(unit.spd*(1+eff.value)); break;
    case 'hp':
      unit.maxHP=Math.floor(unit.maxHP*(1+eff.value));
      unit.hp=Math.min(unit.hp+Math.floor(unit.maxHP*eff.value),unit.maxHP);
      break;
    case 'mp':
      unit.maxMP=Math.floor(unit.maxMP*(1+eff.value));
      unit.mp=Math.min(unit.mp+Math.floor(unit.maxMP*eff.value),unit.maxMP);
      break;
    case 'critRate': if(!unit._bondCritRate)unit._bondCritRate=0; unit._bondCritRate+=eff.value; break;
    case 'critDmg': if(!unit._bondCritDmg)unit._bondCritDmg=0; unit._bondCritDmg+=eff.value; break;
    case 'dodgeRate': if(!unit._bondDodge)unit._bondDodge=0; unit._bondDodge+=eff.value; break;
    case 'hitBonus': if(!unit._bondHit)unit._bondHit=0; unit._bondHit+=eff.value; break;
    case 'armorPen': if(!unit._bondArmorPen)unit._bondArmorPen=0; unit._bondArmorPen+=eff.value; break;
    case 'lifeSteal': if(!unit._bondLifeSteal)unit._bondLifeSteal=0; unit._bondLifeSteal+=eff.value; break;
    case 'skillDmg': if(!unit._bondSkillDmg)unit._bondSkillDmg=0; unit._bondSkillDmg+=eff.value; break;
    case 'healBoost': if(!unit._bondHealBoost)unit._bondHealBoost=0; unit._bondHealBoost+=eff.value; break;
    case 'dmgReduce': if(!unit._bondDmgReduce)unit._bondDmgReduce=0; unit._bondDmgReduce+=eff.value; break;
    case 'dotBoost': if(!unit._bondDotBoost)unit._bondDotBoost=0; unit._bondDotBoost+=eff.value; break;
    case 'mpReduce': if(!unit._bondMpReduce)unit._bondMpReduce=0; unit._bondMpReduce+=eff.value; break;
    case 'undeadBonus': if(!unit._bondUndeadBonus)unit._bondUndeadBonus=0; unit._bondUndeadBonus+=eff.value; break;
    case 'shieldBoost': if(!unit._bondShieldBoost)unit._bondShieldBoost=0; unit._bondShieldBoost+=eff.value; break;
  }
}

// 生成羁绊UI HTML
function renderBondsHTML(activeBonds, compact){
  if(!activeBonds||activeBonds.length===0) return '';
  var html='';
  for(var i=0;i<activeBonds.length;i++){
    var ab=activeBonds[i];
    var bond=ab.bond;
    var typeColors={role:'#4a9eff',theme:'#a855f7',fun:'#f59e0b'};
    var color=typeColors[bond.type]||'#888';
    if(compact){
      html+='<span class="bond-tag-compact" style="border-color:'+color+';color:'+color+'" title="'+ab.threshold.desc+'">'+bond.icon+bond.name+'</span>';
    } else {
      html+='<div class="bond-card" style="border-color:'+color+'">'
        +'<div class="bond-card-header">'
        +'<span class="bond-card-icon">'+bond.icon+'</span>'
        +'<span class="bond-card-name" style="color:'+color+'">'+bond.name+'</span>'
        +'<span class="bond-card-type" style="background:'+color+'22;color:'+color+';border:1px solid '+color+'44">'+({role:'职业',theme:'主题',fun:'趣味'}[bond.type])+'</span>'
        +'</div>'
        +'<div class="bond-card-desc">'+ab.threshold.desc+'</div>'
        +'<div class="bond-card-story">📖 '+bond.story+'</div>'
        +'</div>';
    }
  }
  return html;
}

// 酒馆宝石解锁品质上限
function unlockTavernQuality(level){
  var cfg=TAVERN_QUALITY_UNLOCK[level];
  if(!cfg){showToast('❌ 无效的解锁等级');return;}
  var curLevel=G.buildings.tavern||1;
  if(level<=curLevel){showToast('❌ 已经解锁');return;}
  if(level>curLevel+1){showToast('❌ 需要按顺序逐级解锁');return;}
  if((G.resources.gems||0)<cfg.gems){showToast('❌ 宝石不足，需要💎'+cfg.gems);return;}
  G.resources.gems-=cfg.gems;
  G.buildings.tavern=level;
  G_tavernOptions=null;
  G_tavernRecruited=new Set();
  setPity(0);
  updateResUI();
  saveGame();
  showToast('🎉 '+cfg.name+' 解锁成功！');
  renderTavernRecruit();
}

// ==================== 存档系统 V5（无损序列化 + IndexedDB 为主存储） ====================
// 版本号
var SAVE_VERSION = 5;

// ===== IndexedDB 主存储系统 =====
var DB_NAME = 'ShadowDungeonDB_v5';
var DB_VERSION = 1;
var _db = null;
var _isDBReady = false;

// 初始化 IndexedDB（主存储）
function initDB() {
  return new Promise(function(resolve) {
    if (!window.indexedDB) {
      console.warn('IndexedDB 不可用，将使用 localStorage');
      resolve(false);
      return;
    }
    
    // 重置状态
    _isDBReady = false;
    _db = null;
    
    var request = indexedDB.open(DB_NAME, DB_VERSION);
    
    request.onerror = function() {
      console.error('IndexedDB 打开失败');
      _isDBReady = false;
      _db = null;
      resolve(false);
    };
    
    request.onsuccess = function(e) {
      _db = e.target.result;
      _isDBReady = true;
      console.log('IndexedDB 初始化成功');
      resolve(true);
    };
    
    request.onblocked = function() {
      console.warn('IndexedDB 被阻塞，尝试关闭其他连接');
      _isDBReady = false;
      _db = null;
      resolve(false);
    };
    
    request.onupgradeneeded = function(e) {
      var db = e.target.result;
      
      // 存档存储（主存储）
      if (!db.objectStoreNames.contains('saves')) {
        db.createObjectStore('saves', { keyPath: 'slotIdx' });
      }
      
      // 元数据存储
      if (!db.objectStoreNames.contains('meta')) {
        db.createObjectStore('meta', { keyPath: 'slotIdx' });
      }
      
      // 备份存储
      if (!db.objectStoreNames.contains('backups')) {
        var bs = db.createObjectStore('backups', { keyPath: 'slotIdx' });
        bs.createIndex('slotIdx', 'slotIdx');
        bs.createIndex('timestamp', 'timestamp');
      }
    };
  });
}

// IndexedDB 异步操作封装
function dbGet(store, key) {
  return new Promise(function(resolve) {
    if (!_isDBReady || !_db) { resolve(null); return; }
    try {
      var tx = _db.transaction(store, 'readonly');
      var req = tx.objectStore(store).get(key);
      req.onsuccess = function() { resolve(req.result ? req.result.data : null); };
      req.onerror = function() { resolve(null); };
    } catch(e) { resolve(null); }
  });
}

function dbSet(store, key, data) {
  return new Promise(function(resolve) {
    if (!_isDBReady || !_db) { resolve(false); return; }
    try {
      var tx = _db.transaction(store, 'readwrite');
      var req = tx.objectStore(store).put({ slotIdx: key, data: data, timestamp: Date.now() });
      req.onsuccess = function() { resolve(true); };
      req.onerror = function() { resolve(false); };
    } catch(e) { resolve(false); }
  });
}

function dbDelete(store, key) {
  return new Promise(function(resolve) {
    if (!_isDBReady || !_db) { resolve(false); return; }
    try {
      var tx = _db.transaction(store, 'readwrite');
      tx.objectStore(store).delete(key);
      resolve(true);
    } catch(e) { resolve(false); }
  });
}

// ===== localStorage 尽力而为副本 =====
function lsSet(key, data) {
  try {
    localStorage.setItem(key, JSON.stringify(data));
    return true;
  } catch(e) {
    // 配额超限，吞掉错误
    console.warn('localStorage 写入失败（可能配额不足）');
    return false;
  }
}

function lsGet(key) {
  try {
    var raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function lsRemove(key) {
  try { localStorage.removeItem(key); } catch(e) {}
}

// ===== 解压 V3-V4 压缩存档 =====
function decompressSaveV3V4(compressed) {
  if (!compressed || !compressed.h) return null;
  
  try {
    var heroes = [];
    var heroMap = compressed.h;
    
    // 重建英雄数据
    for (var uid in heroMap) {
      var h = heroMap[uid];
      var hero = {
        uid: parseInt(uid),
        name: h.n,
        icon: h.i,
        role: h.r,
        level: h.l,
        exp: h.xp || 0,
        quality: h.q,
        skills: h.sk || [],
        talents: h.t || [],
        traits: h.tr || [],
        equipment: h.eq || {},
        bonusSkills: h.bs || [],
        isMutation: h.m || false
      };
      heroes.push(hero);
    }
    
    // 重建队伍
    var team = (compressed.t || []).map(function(uid) {
      return heroes.find(function(h) { return h.uid == uid; }) || null;
    });
    
    // 重建装备
    var equipment = [];
    if (compressed.eq) {
      for (var eid in compressed.eq) {
        var eq = compressed.eq[eid];
        equipment.push({
          uid: parseInt(eid),
          id: eq.id,
          quality: eq.q,
          level: eq.l,
          bonusStats: eq.s || {}
        });
      }
    }
    
    return {
      heroes: heroes,
      team: team,
      equipment: equipment,
      stageProgress: compressed.sp || 1,
      gold: compressed.g || 0,
      gems: compressed.gm || 0,
      materials: compressed.m || {},
      buildings: compressed.b || {},
      achievements: compressed.a || {},
      codex: compressed.c || {},
      heroIdCounter: compressed.hc || heroes.length,
      totalPlayTime: compressed.pt || 0
    };
  } catch(e) {
    console.error('解压存档失败', e);
    return null;
  }
}

function restoreSaveData(data) {
  if (!data) {
    debugLog('[RS]ERR: data 为空');
    return false;
  }
  
  // 检测版本
  var version = data.version || 1;
  var saved = data.game;
  
  debugLog('[RS] 版本: v' + version + ', saved类型:', typeof saved);
  debugLog('[RS] saved keys:', saved ? Object.keys(saved).slice(0,15) : null);
  debugLog('解析: saved=' + (saved ? Object.keys(saved).slice(0,5).join(',') : 'null'));
  
  // 智能检测压缩格式（不依赖版本号）
  if (saved && (saved.h || (saved.heroes && typeof saved.heroes === 'object' && !Array.isArray(saved.heroes)))) {
    debugLog('[RS] 检测到压缩格式，正在解压...');
    var decompressed = decompressSaveV3V4(saved);
    if (decompressed) {
      saved = decompressed;
      debugLog('[RS] 压缩格式解压成功');
    } else {
      console.warn('[restoreSaveData] 解压失败，尝试直接读取');
    }
  }
  
  // V1-V2 格式检测（无 version 或 version < 3，且无 game 包装）
  if (!saved && (data.heroes || data.team)) {
    debugLog('[RS] 检测到 V1-V2 格式（无 game 包装）');
    saved = data;
  }
  
  // V3-V4 可能直接是 game 对象
  if (!saved && data.stageProgress !== undefined) {
    debugLog('[RS] 检测到 V3-V4 格式（直接 game 对象）');
    saved = data;
  }
  
  if (!saved) {
    debugLog('[RS]ERR: saved 为空，存档无效');
    debugLog('存档无效: saved为空');
    return false;
  }
  
  debugLog('[RS] 最终 saved.heroes:', saved.heroes ? saved.heroes.length : 'null/undefined');
  
  // ===== 全面字段补丁（向前兼容） =====
  // 核心数据
  if (!saved.heroes || !Array.isArray(saved.heroes)) saved.heroes = [];
  if (!saved.team || !Array.isArray(saved.team)) saved.team = [];
  if (!saved.equipment || !Array.isArray(saved.equipment)) saved.equipment = [];
  
  // 资源
  if (typeof saved.gold !== 'number') saved.gold = 0;
  if (typeof saved.gems !== 'number') saved.gems = 0;
  if (!saved.materials || typeof saved.materials !== 'object') saved.materials = {};
  
  // 进度
  if (typeof saved.stageProgress !== 'number') saved.stageProgress = 1;
  if (!saved.buildings || typeof saved.buildings !== 'object') saved.buildings = {};
  if (!saved.achievements || typeof saved.achievements !== 'object') saved.achievements = { unlocked: {}, progress: {}, totalClaimed: 0 };
  if (!saved.codex || typeof saved.codex !== 'object') saved.codex = { discovered: {}, unlocked: {} };
  
  // 竞技场
  if (!saved.arenaState || typeof saved.arenaState !== 'object') {
    saved.arenaState = { totalWins: 0, winStreak: 0, maxWinStreak: 0, dailyChallengesUsed: 0 };
  }
  
  // 统计
  if (!saved.stats || typeof saved.stats !== 'object') {
    saved.stats = { totalKills: 0, totalHeroesRecruited: 0, totalEquipmentForged: 0, totalEquipmentMerged: 0, totalGoldEarned: 0, totalGemsEarned: 0, maxStageReached: 1, maxHeroLevel: 0 };
  }
  
  // 其他
  if (typeof saved.totalPlayTime !== 'number') saved.totalPlayTime = 0;
  if (typeof saved.tutorialDone !== 'boolean') saved.tutorialDone = saved.heroes.length > 0;
  if (saved.tutorialPhase === undefined) saved.tutorialPhase = '';
  if (saved.tutorialStep === undefined) saved.tutorialStep = 0;
  if (!saved.loginStreak) saved.loginStreak = 0;
  if (!saved.lastLoginDateStreak) saved.lastLoginDateStreak = '';
  
  // 先恢复 heroes
  G.heroes = saved.heroes;
  
  // 重建队伍引用（兼容多种格式）
  if (Array.isArray(saved.team)) {
    saved.team = saved.team.map(function(item) {
      if (!item) return null;
      // 格式1: 已经是英雄对象
      if (typeof item === 'object' && item.uid !== undefined) {
        // 验证英雄是否仍存在
        return G.heroes.find(function(h) { return h && h.uid === item.uid; }) || null;
      }
      // 格式2: uid 数字/字符串
      return G.heroes.find(function(h) { return h && (h.uid === item || h.uid == item); }) || null;
    });
  }
  
  // 复制到 G
  G.heroIdCounter = data.heroIdCounter || saved.heroIdCounter || (saved.heroes ? saved.heroes.length : 0);
  Object.keys(saved).forEach(function(k) { G[k] = saved[k]; });
  
  console.log('存档恢复成功，英雄数: ' + G.heroes.length + ', 关卡: ' + G.stageProgress);
  return true;
}

// ===== 核心存盘函数 =====
function saveGame() {
  try {
    // 校验
    if (!G || !G.heroes || !Array.isArray(G.heroes)) {
      console.error('存档校验失败：核心数据异常');
      return;
    }
    
    var meta = getMeta();
    var slotIdx = meta.currentSlot || 0;
    
    // 准备数据
    var data = prepareSaveData();
    
    // 写入 IndexedDB（主存储）
    dbSet('saves', slotIdx, data);
    
    // localStorage 尽力而为（失败不报错）
    lsSet(getSlotKey(slotIdx), data);
    
    // 大数值优化：英雄数据分片存储（超过100个英雄时启用，容错处理）
    if (typeof HeroDataShard !== 'undefined' && HeroDataShard && G.heroes && G.heroes.length > HeroDataShard.SHARD_SIZE) {
      HeroDataShard.save(G.heroes);
    }
    
    // 更新元数据
    if (!meta.slots[slotIdx]) meta.slots[slotIdx] = {};
    meta.slots[slotIdx].timestamp = Date.now();
    meta.slots[slotIdx].stageProgress = G.stageProgress || 1;
    meta.slots[slotIdx].heroCount = G.heroes ? G.heroes.length : 0;
    meta.slots[slotIdx].playTime = G.totalPlayTime || 0;
    
    // 自动备份（IndexedDB）
    var now = Date.now();
    if (!meta._lastAutoBackup) meta._lastAutoBackup = 0;
    
    if (now - meta._lastAutoBackup >= 2 * 60 * 1000) { // 2分钟
      var backupKey = 'auto_' + now;
      var backupData = { slotIdx: slotIdx, data: data, timestamp: now };
      dbSet('backups', backupKey, backupData);
      meta.autoBackups = meta.autoBackups || [];
      meta.autoBackups.push({ key: backupKey, slotIdx: slotIdx, timestamp: now });
      // 限制数量
      while (meta.autoBackups.length > MAX_AUTO_BACKUPS) {
        var old = meta.autoBackups.shift();
        dbDelete('backups', old.key);
      }
      meta._lastAutoBackup = now;
    }
    
    saveMeta(meta);
    
    // Supabase 云端自动同步（每小时一次）
    if (sb && isCloudReady && G.playerName) {
      var lastSupabaseCloud = parseInt(lsGet('_last_supabase_cloud') || '0', 10);
      var ONE_HOUR = 60 * 60 * 1000;
      if (now - lastSupabaseCloud >= ONE_HOUR) {
        lsSet('_last_supabase_cloud', now.toString());
        console.log('[云存档] 每小时自动同步...');
        setTimeout(function() {
          supabaseSaveToCloud(true).catch(function(e) {
            console.error('[云存档] 自动同步失败:', e);
          });
        }, 500);
      }
    }
    
  } catch(e) {
    console.error('saveGame 异常', e);
  }
}

// ===== 核心读档函数 =====
async function loadGame() {
  try {
    var meta = await dbGet('meta', 'main') || getMeta();
    var slotIdx = meta.currentSlot || 0;
    
    debugLog('[LG] 开始加载，槽位:', slotIdx);
    
    // 强制读取当前槽位数据（不使用回退到其他槽位，每个槽位独立）
    var key = getSlotKey(slotIdx);
    var data = lsGet(key);
    debugLog('[LG] 读取槽位' + (slotIdx+1) + ':', key, data ? '有数据' : '无数据');
    
    // 如果当前槽位没有数据，不再回退到其他槽位
    if (!data) {
      debugLog('[LG] 槽位' + (slotIdx+1) + '无存档，保持空白状态');
      return false;
    }
    
    debugLog('[LG] 读取到数据:', {
      version: data.version,
      hasGame: !!data.game,
      heroesCount: data.game && data.game.heroes ? data.game.heroes.length : 0,
      stageProgress: data.game ? data.game.stageProgress : null
    });
    
    // 显示调试信息
    debugLog('读档: 英雄=' + (data.game && data.game.heroes ? data.game.heroes.length : 0) + 
              ' 关卡=' + (data.game ? data.game.stageProgress : '?'));
    
    // 大数值优化：如果存在分片数据，合并到存档中（容错处理）
    if (typeof HeroDataShard !== 'undefined' && HeroDataShard) {
      var shardedHeroes = HeroDataShard.load();
      if (shardedHeroes && data && data.game) {
        data.game.heroes = shardedHeroes;
      }
    }
    
    // 恢复数据
    var restoreResult = restoreSaveData(data);
    debugLog('[LG] restoreSaveData 返回:', restoreResult);
    if (!restoreResult) {
      // 迁移失败，尝试从备份恢复
      return await restoreFromBackup(meta, slotIdx);
    }
    
    debugLog('[LG] 调用 initGameAfterLoad...');
    initGameAfterLoad();
    debugLog('[LG] initGameAfterLoad 完成，准备返回 true');
    return true;
    
  } catch(e) {
    debugLog('[LG]ERR: 异常:', e);
    debugLog('读档异常: ' + (e.message || '未知错误'));
    return false;
  }
}

// 从备份恢复
async function restoreFromBackup(meta, slotIdx) {
  try {
    // 尝试 IndexedDB 自动备份
    var backups = meta.autoBackups || [];
    for (var i = backups.length - 1; i >= 0; i--) {
      var bk = backups[i];
      var data = await dbGet('backups', bk.key);
      if (data && data.data) {
        if (restoreSaveData(data.data)) {
          initGameAfterLoad();
          saveGame();
          showToast('⚠️ 已从自动备份恢复');
          return true;
        }
      }
    }
    
    // 尝试手动备份
    var manualBks = meta.manualBackups || [];
    for (var i = manualBks.length - 1; i >= 0; i--) {
      var bk = manualBks[i];
      var data = lsGet(bk.key);
      if (data && restoreSaveData(data)) {
        initGameAfterLoad();
        saveGame();
        showToast('⚠️ 已从手动备份恢复');
        return true;
      }
    }
    
    return false;
  } catch(e) {
    console.error('restoreFromBackup 失败', e);
    return false;
  }
}

// ===== 加载后初始化 =====
function initGameAfterLoad() {
  // 重建队伍引用（兼容 uid 和英雄对象两种格式）
  if (G.team && G.heroes) {
    G.team = G.team.map(function(item) {
      if (!item) return null;
      // 如果已经是英雄对象（有 uid 属性），直接返回
      if (typeof item === 'object' && item.uid !== undefined) {
        // 验证英雄是否仍在 heroes 列表中
        return G.heroes.find(function(h) { return h && h.uid === item.uid; }) || null;
      }
      // 如果是 uid（数字或字符串），查找对应英雄
      return G.heroes.find(function(h) { return h && (h.uid === item || h.uid == item); }) || null;
    });
  }
  
  // 每日重置
  var today = new Date().toDateString();
  if (G.arenaState && G.arenaState.lastChallengeDate !== today) {
    G.arenaState.dailyChallengesUsed = 0;
    G.arenaState.lastChallengeDate = today;
  }
  if (G.lastLoginDate !== today) {
    G.dailyBonusClaimed = true;
    G.lastLoginDate = today;
  }
  
  // 登录连续性
  if (!G.loginStreak) G.loginStreak = 0;
  if (!G.lastLoginDateStreak) G.lastLoginDateStreak = '';
  var yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  if (G.lastLoginDateStreak === new Date().toDateString()) {
    // 今天已登录
  } else if (G.lastLoginDateStreak === yesterday.toDateString()) {
    G.loginStreak = (G.loginStreak || 0) + 1;
    G.lastLoginDateStreak = today;
  } else {
    G.loginStreak = 1;
    G.lastLoginDateStreak = today;
  }
  
  // 合成事件到期检查
  checkMergeEventExpirations();
  
  // 默认值
  if (!G.achievements) G.achievements = { unlocked: {}, progress: {}, totalClaimed: 0 };
  if (!G.stats) G.stats = { totalKills: 0, totalHeroesRecruited: 0, totalEquipmentForged: 0, totalEquipmentMerged: 0, totalGoldEarned: 0, totalGemsEarned: 0, maxStageReached: 1, maxHeroLevel: 0 };
  if (!G.tutorialDone) G.tutorialDone = !!(G.heroes && G.heroes.length > 0);
  if (G.tutorialPhase === undefined) G.tutorialPhase = '';
  if (G.tutorialStep === undefined) G.tutorialStep = 0;
  
  setTimeout(function() { checkAllAchievements && checkAllAchievements(); }, 1000);
}

// ===== 合成事件到期检查 =====
function checkMergeEventExpirations() {
  if (!G.heroes) return;
  var now = Date.now();
  var changed = false;
  
  G.heroes.forEach(function(h) {
    // 青蛙诅咒到期
    if (h.isFrogCursed && h.frogCurseExpire && now >= h.frogCurseExpire) {
      h.isFrogCursed = false;
      if (h.frogOriginalStats) {
        h.maxHP = Math.floor(h.frogOriginalStats.maxHP * 1.2);
        h.atk = Math.floor(h.frogOriginalStats.atk * 1.2);
        h.def = Math.floor(h.frogOriginalStats.def * 1.2);
        h.spd = Math.floor(h.frogOriginalStats.spd * 1.2);
        h.maxMP = Math.floor(h.frogOriginalStats.maxMP * 1.2);
        h.hp = h.maxHP;
        h.mp = h.maxMP;
        delete h.frogOriginalStats;
      }
      changed = true;
    }
    // 幽灵到期
    if (h.isGhost && h.ghostExpire && now >= h.ghostExpire) {
      h.isGhost = false;
      delete h.ghostExpire;
      delete h.ghostBonus;
      changed = true;
    }
    // 镜像到期
    if (h.isMirror && h.mirrorExpire && now >= h.mirrorExpire) {
      var idx = G.heroes.indexOf(h);
      if (idx >= 0) G.heroes.splice(idx, 1);
      changed = true;
    }
  });
  
  if (changed) saveGame();
}

// ===== 手动备份 =====
function createManualBackup() {
  try {
    var meta = getMeta();
    var slotIdx = meta.currentSlot || 0;
    var data = prepareSaveData();
    var backupKey = 'manual_' + Date.now();
    
    // 保存到 localStorage
    lsSet(backupKey, data);
    
    var stage = G.stageProgress || 1;
    var heroCount = G.heroes ? G.heroes.length : 0;
    
    meta.manualBackups = meta.manualBackups || [];
    meta.manualBackups.unshift({
      key: backupKey,
      slotIdx: slotIdx,
      timestamp: Date.now(),
      stageProgress: stage,
      heroCount: heroCount,
      note: '手动备份'
    });
    
    while (meta.manualBackups.length > MAX_MANUAL_BACKUPS) {
      var old = meta.manualBackups.pop();
      lsRemove(old.key);
    }
    
    saveMeta(meta);
    
    showModal('📌 备份成功', '<div style="text-align:center;padding:20px">' +
      '<div style="font-size:48px">✅</div>' +
      '<div style="font-weight:bold;margin:16px 0">手动备份已保存</div>' +
      '<div style="font-size:12px;color:var(--text2)">关卡: ' + stage + ' | 英雄: ' + heroCount + '</div>' +
      '<button class="btn btn-primary" style="width:100%;margin-top:20px" onclick="closeModal()">确定</button>' +
    '</div>');
    
  } catch(e) {
    showToast('❌ 备份失败');
  }
}

// ===== 切换存档槽位 =====
function switchSaveSlot(slotIdx) {
  var meta = getMeta();
  var oldSlot = meta.currentSlot || 0;
  if (oldSlot === slotIdx) {
    showToast('已在当前槽位');
    return;
  }
  
  showToast('正在切换槽位...');
  
  // 保存当前进度到旧槽位（同步写 localStorage，确保不丢失）
  var data = prepareSaveData();
  lsSet(getSlotKey(oldSlot), data);
  
  // 更新旧槽位元数据
  if (!meta.slots[oldSlot]) meta.slots[oldSlot] = {};
  meta.slots[oldSlot].timestamp = Date.now();
  meta.slots[oldSlot].stageProgress = G.stageProgress || 1;
  meta.slots[oldSlot].heroCount = G.heroes ? G.heroes.length : 0;
  
  // 切换到新槽位
  meta.currentSlot = slotIdx;
  saveMeta(meta);
  
  // 后台异步写 IndexedDB（不阻塞 reload）
  dbSet('saves', oldSlot, data);
  
  // 延迟 reload 确保 saveMeta 完成
  setTimeout(function() {
    location.reload();
  }, 100);
}

// ===== 从备份恢复 =====
function restoreBackup(type, idx) {
  var meta = getMeta();
  var backups = type === 'auto' ? (meta.autoBackups || []) : (meta.manualBackups || []);
  if (!backups[idx]) {
    showToast('备份不存在');
    return;
  }
  
  var backup = backups[idx];
  var data = lsGet(backup.key);
  if (!data) {
    showToast('备份数据已丢失');
    return;
  }
  
  // 先备份当前
  var currentBackup = 'current_' + Date.now();
  lsSet(currentBackup, prepareSaveData());
  meta.manualBackups = meta.manualBackups || [];
  meta.manualBackups.unshift({
    key: currentBackup,
    slotIdx: meta.currentSlot,
    timestamp: Date.now(),
    stageProgress: G.stageProgress || 1,
    heroCount: G.heroes ? G.heroes.length : 0,
    note: '恢复前备份'
  });
  saveMeta(meta);
  
  // 恢复
  if (restoreSaveData(data)) {
    initGameAfterLoad();
    saveGame();
    showToast('✅ 已恢复备份');
    setTimeout(function() { location.reload(); }, 500);
  } else {
    showToast('❌ 恢复失败');
  }
}

// ===== 删除存档 =====
function deleteSaveSlot(slotIdx) {
  var meta = getMeta();
  
  // 删除 IndexedDB
  dbDelete('saves', slotIdx);
  
  // 删除 localStorage
  lsRemove(getSlotKey(slotIdx));
  
  delete meta.slots[slotIdx];
  
  if ((meta.currentSlot || 0) === slotIdx) {
    // 切换到其他槽位
    for (var i = 0; i < MAX_SLOTS; i++) {
      if (i !== slotIdx && meta.slots[i]) {
        meta.currentSlot = i;
        saveMeta(meta);
        location.reload();
        return;
      }
    }
    // 无其他存档
    resetGame();
  } else {
    saveMeta(meta);
    showToast('🗑️ 槽位' + (slotIdx+1) + '已删除');
    renderCurrentTab();
  }
}

function deleteBackup(type, idx) {
  var meta = getMeta();
  var backups = type === 'auto' ? meta.autoBackups : meta.manualBackups;
  if (!backups || !backups[idx]) return;
  
  lsRemove(backups[idx].key);
  backups.splice(idx, 1);
  saveMeta(meta);
  
  showToast('🗑️ 备份已删除');
  renderCurrentTab();
}

function clearAllBackups() {
  var meta = getMeta();
  
  (meta.autoBackups || []).forEach(function(b) { lsRemove(b.key); });
  (meta.manualBackups || []).forEach(function(b) { lsRemove(b.key); });
  
  meta.autoBackups = [];
  meta.manualBackups = [];
  saveMeta(meta);
  
  showToast('🗑️ 所有备份已清理');
  renderCurrentTab();
}

// ===== 重置游戏 =====
function resetGame() {
  // 重置云存档状态
  isCloudReady = false;
  cloudProvider = 'none';
  
  // 清除 localStorage
  lsRemove(META_KEY);
  for (var i = 0; i < MAX_SLOTS; i++) {
    lsRemove(getSlotKey(i));
    lsRemove('shadow_dungeon_slot_' + i);
    lsRemove('shadow_dungeon_slot_' + i + '_safe');
  }
  var keys = [];
  for (var k in localStorage) {
    if (k.indexOf('shadow_dungeon') >= 0 || k.indexOf('sd_') >= 0) keys.push(k);
  }
  keys.forEach(function(k) { lsRemove(k); });
  
  // 清除 IndexedDB（删除整个数据库）
  if (_isDBReady && _db) {
    try {
      _db.close();
    } catch(e) {}
  }
  _isDBReady = false;
  _db = null;
  
  try {
    indexedDB.deleteDatabase(DB_NAME);
  } catch(e) {}
  
  showToast('游戏已重置，正在重新加载...');
  setTimeout(function() { location.reload(); }, 800);
}

function resetGameAndStartNew() {
  localStorage.setItem('shadow_dungeon_reset', '1');
  resetGame();
}

// ===== 文件导出/导入 =====
function exportSaveToFile() {
  try {
    var data = prepareSaveData();
    var meta = getMeta();
    var slotIdx = meta.currentSlot || 0;
    
    var exportData = {
      game: data.game,
      heroIdCounter: data.heroIdCounter,
      timestamp: data.timestamp,
      version: SAVE_VERSION,
      slotIdx: slotIdx,
      stageProgress: G.stageProgress || 1,
      heroCount: G.heroes ? G.heroes.length : 0,
      exportedAt: new Date().toISOString()
    };
    
    var json = JSON.stringify(exportData, null, 2);
    var blob = new Blob([json], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    
    var a = document.createElement('a');
    a.href = url;
    a.download = 'shadow_dungeon_save_' + slotIdx + '_' + Date.now() + '.json';
    a.click();
    
    URL.revokeObjectURL(url);
    showToast('📥 存档已导出');
    
  } catch(e) {
    console.error('导出失败', e);
    showToast('❌ 导出失败');
  }
}

function importSaveFromFile() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        
        if (!data.game || !data.version) {
          showToast('❌ 文件格式无效');
          return;
        }
        
        // 验证数据完整性
        if (!data.game.heroes || !Array.isArray(data.game.heroes)) {
          showToast('❌ 存档数据不完整（缺少英雄数据）');
          return;
        }
        
        // 导入前备份当前进度
        var currentBackup = prepareSaveData();
        lsSet('import_backup_' + Date.now(), currentBackup);
        
        // 使用 restoreSaveData 恢复（经过迁移检查和队伍重建）
        var saveObj = {
          version: data.version,
          heroIdCounter: data.heroIdCounter || 0,
          game: data.game
        };
        
        if (!restoreSaveData(saveObj)) {
          showToast('❌ 存档数据无法恢复');
          return;
        }
        
        initGameAfterLoad();
        saveGame();
        
        showModal('📤 导入成功', '<div style="text-align:center;padding:20px">' +
          '<div style="font-size:48px">✅</div>' +
          '<div style="font-weight:bold;margin:16px 0">存档已导入</div>' +
          '<div style="font-size:12px;color:var(--text2)">关卡: ' + (data.stageProgress || '?') + ' | 英雄: ' + (data.heroCount || '?') + '</div>' +
          '<button class="btn btn-primary" style="width:100%;margin-top:20px" onclick="location.reload()">确定</button>' +
        '</div>');
        
      } catch(e2) {
        console.error('解析失败', e2);
        showToast('❌ 文件解析失败');
      }
    };
    reader.readAsText(file);
  };
  
  input.click();
}

// ===== 云存档操作确认 =====
function showCloudSaveConfirm(action) {
  if (action === 'upload') {
    showConfirm(
      '📤 上传到云端',
      '确定要将当前存档上传到 TapTap 云端吗？\n\n云端已有存档将被覆盖！',
      function() {
        tapSaveToCloud().then(function(success) {
          if (success) {
            console.log('[云存档] 上传成功');
          }
        });
      },
      '上传',
      '取消'
    );
  } else if (action === 'download') {
    // 先检查冲突
    checkCloudConflict().then(function(conflict) {
      if (conflict) {
        showCloudConflictDialog();
      } else {
        showConfirm(
          '📥 从云端下载',
          '确定要从 TapTap 云端下载存档吗？\n\n当前本地存档将被覆盖！',
          function() {
            tapLoadCloudSave().then(function(success) {
              if (success) {
                console.log('[云存档] 下载成功，重新加载页面');
                setTimeout(function() { location.reload(); }, 1000);
              }
            });
          },
          '下载',
          '取消'
        );
      }
    });
  }
}

// ===== 检查云存档冲突 =====
function checkCloudConflict() {
  return new Promise(function(resolve) {
    if (!tapCloudManager || !tapSaveId) {
      resolve(false);
      return;
    }
    
    // 获取本地存档时间
    var meta = getMeta();
    var localTime = meta.slots[meta.currentSlot || 0]?.timestamp || 0;
    
    // 获取云端存档信息
    tapCloudManager.get(tapSaveId).then(function(result) {
      if (!result || !result.saveData) {
        resolve(false);
        return;
      }
      
      try {
        var cloudData = JSON.parse(result.saveData);
        var cloudTime = cloudData.game?.timestamp || cloudData.timestamp || 0;
        
        // 如果本地比云端新超过 5 分钟，视为冲突
        var timeDiff = localTime - cloudTime;
        console.log('[云存档] 本地时间:', new Date(localTime).toLocaleString());
        console.log('[云存档] 云端时间:', new Date(cloudTime).toLocaleString());
        console.log('[云存档] 时间差:', Math.floor(timeDiff / 1000 / 60), '分钟');
        
        resolve(Math.abs(timeDiff) > 5 * 60 * 1000);
      } catch(e) {
        console.error('[云存档] 解析云端存档失败:', e);
        resolve(false);
      }
    }).catch(function(e) {
      console.error('[云存档] 获取云端存档失败:', e);
      resolve(false);
    });
  });
}

// ===== 删除备份 =====
function deleteBackup(idx) {
  var meta = getMeta();
  if (!meta.manualBackups || idx >= meta.manualBackups.length) return;

// ==================== 离线挂机收益系统 ====================
function calculateTeamPower(){
  // 计算队伍总战力
  var power=0;
  G.team.forEach(function(slot){
    if(slot){
      var h=G.heroes.find(function(x){return x.uid===slot.uid});
      if(h){
        power+=h.atk*2+h.def*1.5+h.maxHP*0.5+h.spd*3;
      }
    }
  });
  return Math.max(100,power);
}

function calculateOfflineEarnings(){
  if(!G.lastOnlineTime) G.lastOnlineTime=Date.now();
  var now=Date.now();
  var elapsed=now-G.lastOnlineTime;
  // 最多计算12小时
  var maxOffline=12*60*60*1000;
  elapsed=Math.min(elapsed,maxOffline);
  var hours=elapsed/(60*60*1000);
  
  if(hours<0.1) return null; // 少于6分钟不计算
  
  var power=calculateTeamPower();
  var progress=Math.max(1,G.stageProgress);
  
  // 每小时收益 = 战力系数 * 关卡系数
  var goldPerHour=Math.floor(50+progress*15+power*0.1);
  var foodPerHour=Math.floor(20+progress*5);
  var stonePerHour=Math.floor(10+progress*3);
  var ironPerHour=Math.floor(5+progress*1);
  
  return{
    hours:hours,
    gold:Math.floor(goldPerHour*hours),
    food:Math.floor(foodPerHour*hours),
    stone:Math.floor(stonePerHour*hours),
    iron:Math.floor(ironPerHour*hours),
    power:power
  };
}

function claimOfflineEarnings(){
  if(!G.offlineEarnings){
    G.offlineEarnings=calculateOfflineEarnings();
  }
  if(!G.offlineEarnings) return;
  
  var e=G.offlineEarnings;
  G.resources.gold=Math.min((G.resources.gold||0)+e.gold,RESOURCE_LIMITS.gold);
  G.resources.food=Math.min((G.resources.food||0)+e.food,RESOURCE_LIMITS.food);
  G.resources.stone=Math.min((G.resources.stone||0)+e.stone,RESOURCE_LIMITS.stone);
  G.resources.iron=Math.min((G.resources.iron||0)+e.iron,RESOURCE_LIMITS.iron);
  
  showToast('💤 离线收益已领取！离线'+e.hours.toFixed(1)+'小时');
  G.offlineEarnings=null;
  G.lastOnlineTime=Date.now();
  saveGame();
  updateResUI();
  renderCurrentTab();
}

function checkOfflineEarnings(){
  // 检查是否有离线收益
  var earnings=calculateOfflineEarnings();
  if(earnings && earnings.hours>=0.1){
    G.offlineEarnings=earnings;
    return true;
  }
  G.lastOnlineTime=Date.now();
  return false;
}

// 检查并解锁成就（已屏蔽）
function checkAchievement(achievementId) {
  return false; // 屏蔽成就系统
  if (!ACHIEVEMENTS[achievementId]) return false;
  if (G.achievements.unlocked[achievementId]) return false; // 已解锁
  
  const ach = ACHIEVEMENTS[achievementId];
  let progress = 0;
  
  // 根据成就类型获取进度
  switch(achievementId) {
    // 战斗成就
    case 'battle_1': case 'battle_2': case 'battle_3': case 'battle_4':
      progress = G.stats.totalKills;
      break;
    case 'battle_5': case 'battle_6':
      progress = G.pveMaxStreak || 0;
      break;
    case 'battle_7': case 'battle_8': case 'battle_9': case 'battle_10':
      progress = G.stats.maxStageReached;
      break;
    // 英雄成就
    case 'hero_1': case 'hero_2': case 'hero_3':
      progress = G.stats.totalHeroesRecruited;
      break;
    case 'hero_4':
      progress = G.heroes.some(h => h.quality === 'rare') ? 1 : 0;
      break;
    case 'hero_5':
      progress = G.heroes.some(h => h.quality === 'epic') ? 1 : 0;
      break;
    case 'hero_6':
      progress = G.heroes.some(h => h.quality === 'legendary') ? 1 : 0;
      break;
    case 'hero_7':
      progress = G.heroes.some(h => h.quality === 'mythic') ? 1 : 0;
      break;
    case 'hero_8':
      progress = G.heroes.some(h => h.level >= 30) ? 1 : 0;
      break;
    case 'hero_9':
      progress = G.heroes.some(h => h.level >= 60) ? 1 : 0;
      break;
    case 'hero_10':
      progress = G.team.filter(s => s !== null).length;
      break;
    // 装备成就
    case 'equip_1': case 'equip_2': case 'equip_3':
      progress = G.stats.totalEquipmentForged;
      break;
    case 'equip_4':
      progress = G.equipment.length;
      break;
    case 'equip_5': case 'equip_6':
      progress = G.stats.totalEquipmentMerged;
      break;
    case 'equip_7':
      progress = checkSetCollection() ? 1 : 0;
      break;
    // 建设成就
    case 'build_1': case 'build_2':
      progress = G.buildings.tavern || 0;
      break;
    case 'build_3':
      progress = G.buildings.farm || 0;
      break;
    case 'build_4':
      progress = G.buildings.mine || 0;
      break;
    case 'build_5':
      progress = (G.buildings.blacksmith || 0) >= 1 ? 1 : 0;
      break;
    case 'build_6':
      progress = (G.buildings.temple || 0) >= 1 ? 1 : 0;
      break;
    case 'build_7':
      progress = (G.buildings.arena || 0) >= 1 ? 1 : 0;
      break;
    case 'build_8':
      const hasAll = ['tavern', 'farm', 'mine', 'blacksmith', 'temple', 'arena'].every(b => (G.buildings[b] || 0) >= 1);
      progress = hasAll ? 1 : 0;
      break;
    // 竞技成就
    case 'arena_1':
      progress = (G.arenaState.totalWins + G.arenaState.totalLosses) > 0 ? 1 : 0;
      break;
    case 'arena_2': case 'arena_3': case 'arena_4':
      progress = G.arenaState.totalWins || 0;
      break;
    case 'arena_5':
      progress = G.arenaState.maxWinStreak || 0;
      break;
    case 'arena_6':
      progress = G.arenaState.highestDifficulty === 'hard' || G.arenaState.highestDifficulty === 'nightmare' || G.arenaState.highestDifficulty === 'mythic' ? 1 : 0;
      break;
    case 'arena_7':
      progress = G.arenaState.highestDifficulty === 'nightmare' || G.arenaState.highestDifficulty === 'mythic' ? 1 : 0;
      break;
    // 特殊成就
    case 'special_1':
      progress = G.dailyBonusClaimed ? 1 : 0;
      break;
    case 'special_2':
      progress = G.stats.totalGoldEarned;
      break;
    case 'special_3':
      progress = G.stats.totalGemsEarned;
      break;
    case 'special_4':
      const hasCodex = Object.keys(G.codex.heroes).length > 0 || Object.keys(G.codex.equipment).length > 0 || Object.keys(G.codex.monsters).length > 0;
      progress = hasCodex ? 1 : 0;
      break;
    case 'special_5':
      progress = G.achievements.progress.mutationTriggered ? 1 : 0;
      break;
  }
  
  // 保存进度
  G.achievements.progress[achievementId] = progress;
  
  // 检查是否达成
  if (progress >= ach.target) {
    unlockAchievement(achievementId);
    return true;
  }
  return false;
}

// 检查是否集齐任意套装
function checkSetCollection() {
  for (const setId in EQUIP_SETS) {
    const set = EQUIP_SETS[setId];

      G.equipment.some(e => e.templateId === pieceId)
    ).length;
    if (ownedPieces >= 3) return true;
  }
  return false;
}

// 领取成就奖励
function claimAchievementReward(achievementId) {
  const ach = ACHIEVEMENTS[achievementId];
  if (!ach || !G.achievements.unlocked[achievementId]) return;
  
  // 标记已领取（使用特殊标记）
  if (typeof G.achievements.unlocked[achievementId] === 'number') {
    G.achievements.unlocked[achievementId] = { unlockedAt: G.achievements.unlocked[achievementId], claimed: true };
  }
  
  // 发放奖励
  const r = ach.reward;
  if (r.gold) G.resources.gold = Math.min((G.resources.gold || 0) + r.gold, RESOURCE_LIMITS.gold);
  if (r.gems) G.resources.gems = Math.min((G.resources.gems || 0) + r.gems, RESOURCE_LIMITS.gems);
  if (r.expPotion) G.resources.expPotion = Math.min((G.resources.expPotion || 0) + r.expPotion, RESOURCE_LIMITS.expPotion);
  if (r.iron) G.resources.iron = Math.min((G.resources.iron || 0) + r.iron, RESOURCE_LIMITS.iron);
  if (r.stone) G.resources.stone = Math.min((G.resources.stone || 0) + r.stone, RESOURCE_LIMITS.stone);
  if (r.fame) G.resources.fame = (G.resources.fame || 0) + r.fame;
  
  G.achievements.totalClaimed++;
  updateResourceBar();
  saveGame();
  
  showToast(`🎉 领取奖励: ${formatRewardText(r)}`);
}

}

// 更新统计数据（在相关操作时调用）
function updateStat(type, value) {
  if (!G.stats) G.stats = {};
  switch(type) {
    case 'kills':
      G.stats.totalKills = (G.stats.totalKills || 0) + value;
      checkAchievement('battle_1'); checkAchievement('battle_2'); checkAchievement('battle_3'); checkAchievement('battle_4');
      break;
    case 'heroRecruited':
      G.stats.totalHeroesRecruited = (G.stats.totalHeroesRecruited || 0) + value;
      checkAchievement('hero_1'); checkAchievement('hero_2'); checkAchievement('hero_3');
      break;
    case 'equipmentForged':
      G.stats.totalEquipmentForged = (G.stats.totalEquipmentForged || 0) + value;
      checkAchievement('equip_1'); checkAchievement('equip_2'); checkAchievement('equip_3');
      break;
    case 'equipmentMerged':
      G.stats.totalEquipmentMerged = (G.stats.totalEquipmentMerged || 0) + value;
      checkAchievement('equip_5'); checkAchievement('equip_6');
      break;
    case 'goldEarned':
      G.stats.totalGoldEarned = (G.stats.totalGoldEarned || 0) + value;
      checkAchievement('special_2');
      break;
    case 'gemsEarned':
      G.stats.totalGemsEarned = (G.stats.totalGemsEarned || 0) + value;
      checkAchievement('special_3');
      break;
    case 'stageReached':
      if (value > (G.stats.maxStageReached || 1)) {
        G.stats.maxStageReached = value;
        checkAchievement('battle_7'); checkAchievement('battle_8'); checkAchievement('battle_9'); checkAchievement('battle_10');
      }
      break;
    case 'mutation':
      G.achievements.progress.mutationTriggered = true;
      checkAchievement('special_5');
      break;
  }
}

// 检查未知英雄解锁条件
function checkUnknownHeroUnlock(){
  if(!G.unknownQuestProgress) return;
  
  // 遍历所有未知英雄
  G.heroes.forEach(function(hero){
    if(!hero.isUnknown || hero.isUnlocked || !hero.unknownTemplate) return;
    
    var quest = hero.unknownTemplate.unlockQuest;
    if(!quest || !quest.conditions) return;
    
    // 检查所有条件是否满足
    var allConditionsMet = quest.conditions.every(function(cond){
      var progress = G.unknownQuestProgress[cond.type] || 0;
      return progress >= cond.target;
    });
    
    if(allConditionsMet){
      // 解锁未知英雄！
      unlockUnknownHero(hero);
    }
  });
}

// 获取未知英雄解锁进度
function getUnknownHeroQuestProgress(hero){
  if(!hero || !hero.isUnknown || !hero.unknownTemplate || !hero.unknownTemplate.unlockQuest) return null;
  
  var quest = hero.unknownTemplate.unlockQuest;
  var conditions = quest.conditions.map(function(cond){
    var current = (G.unknownQuestProgress && G.unknownQuestProgress[cond.type]) || 0;
    return {
      type: cond.type,
      target: cond.target,
      current: Math.min(current, cond.target),
      desc: cond.desc,
      completed: current >= cond.target
    };
  });
  
  var completed = conditions.every(function(c){return c.completed;});
  var progress = conditions.reduce(function(sum, c){return sum + (c.completed ? 1 : 0);}, 0);
  
  return {
    name: quest.name,
    desc: quest.desc,
    conditions: conditions,
    completed: completed,
    progress: progress,
    total: conditions.length
  };
}

];
function assignTraits(hero){
  // 品质高的英雄获得更多特质
  const tCount = hero.quality==='mythic'?2:hero.quality==='legendary'?2:hero.quality==='epic'?rand(1,2):rand(0,1);
  const assigned = [];
  const pool = [...HERO_TRAITS];
  for(let i=0;i<tCount&&pool.length>0;i++){
    const idx=rand(0,pool.length-1);
    assigned.push(pool.splice(idx,1)[0]);
  }
  hero.traits = assigned;
  // 应用特质对属性的影响
  applyTraits(hero);
}
function applyTraits(hero){
  if(!hero.traits) return;
  for(const trait of hero.traits){
    if(trait.stat && trait.mult){
      const key=trait.stat;
      if(hero[key]!==undefined) hero[key]=Math.floor(hero[key]*trait.mult);
    }
    if(trait.bonus){
      for(const [bk,bv] of Object.entries(trait.bonus)){
        if(hero[bk]!==undefined && bv.mult) hero[bk]=Math.floor(hero[bk]*bv.mult);
      }
    }
  }
}
function getTraitEffect(trait){
  if(!trait) return '';
  // 战斗内生效的特质（不体现在属性面板）
  if(trait.id==='lucky'||trait.id==='vampire'||trait.id==='tactician'||trait.id==='ironWill') return trait.icon+' '+trait.desc;
  return '';
}

// 格式化资源数值（使用万/亿单位）
function formatResource(num){
  if(num === undefined || num === null) return '0';
  num = Number(num);
  if(num >= 100000000){
    // 亿
    return (num / 100000000).toFixed(2).replace(/\.?0+$/, '') + '亿';
  }else if(num >= 10000){
    // 万
    return (num / 10000).toFixed(1).replace(/\.?0+$/, '') + '万';
  }else{
    return num.toString();
  }
}

function createHero(templateId,level=1){
  const tpl=HERO_TEMPLATES.find(t=>t.id===templateId);
  if(!tpl)return null;
  const role=ROLES[tpl.role];
  const qm=QUALITY_MULT[tpl.quality];
  const hero={
    uid: ++G.heroIdCounter,
    id:tpl.id, name:tpl.name, icon:tpl.icon,
    role:tpl.role, quality:tpl.quality,
    level:level, exp:0,
    maxHP: calcStat(role.baseHP, qm, level),
    hp:0,
    atk: calcStat(role.baseATK, qm, level),
    def: calcStat(role.baseDEF, qm, level),
    spd: calcStat(role.baseSPD, qm, level),
    maxMP: calcStat(role.baseMP, qm, level),
    mp:0,
    skills: [...tpl.skills],
    equipment:{weapon:null,armor:null,accessory:null},
    lore: tpl.lore,
    bonusSkills:[],
    deathDefyUsed: false,
    talents: {},           // 已分配的天赋点 {talentId: points}
    talentPoints: 0,       // 可用天赋点
  };
  hero.hp=hero.maxHP;
  hero.mp=hero.maxMP;
  // 分配随机特质
  assignTraits(hero);
  return hero;
}

function triggerExploreEvent(logFn){
  // 30%概率触发探索事件
  if(Math.random()>0.30) return false;
  G.exploreStats.totalEvents++;
  // 加权随机选择事件
  var totalWeight=EXPLORE_EVENTS.reduce(function(s,e){return s+e.weight},0);
  var r=Math.random()*totalWeight;
  var acc=0;
  var event=EXPLORE_EVENTS[0];
  for(var i=0;i<EXPLORE_EVENTS.length;i++){
    acc+=EXPLORE_EVENTS[i].weight;
    if(r<acc){event=EXPLORE_EVENTS[i];break}
  }
  var result=event.effect();
  if(logFn){
    logFn('\n🌟 探索事件: '+event.icon+' '+event.name,'title');
    logFn('  '+event.desc,'info');
    logFn('  '+result,'skill');
  }
  saveGame();
  return true;
}

function getHeroStats(hero){
  var s={hp:hero.hp,maxHP:hero.maxHP,atk:hero.atk,def:hero.def,spd:hero.spd,mp:hero.mp,maxMP:hero.maxMP};
  // 装备加成（含强化加成）

  for(var si=0;si<slots.length;si++){
    var slot=slots[si];
    var eid=hero.equipment[slot];
    if(eid!=null){
      var eq=G.equipment.find(function(e){return e.uid===eid});
      if(eq){
        var tpl=EQUIP_TEMPLATES.find(function(t){return t.id===eq.id});
        if(tpl){
          var enhanceLevel=eq.enhance||0;
          var enhanceMult=1+enhanceLevel*0.1;
          var statKeys=Object.keys(tpl.stats);
          for(var ki=0;ki<statKeys.length;ki++){
            var k=statKeys[ki];
            var v=tpl.stats[k];
            if(s[k]!==undefined){
              var finalValue=Math.floor(v*enhanceMult);
              s[k]+=finalValue;
            }
          }
        }
      }
    }
  }
  // 套装加成
  var setCounts={};
  for(var si2=0;si2<slots.length;si2++){
    var slot2=slots[si2];
    var eId=hero.equipment[slot2];
    if(eId!=null){
      var eq2=G.equipment.find(function(e){return e.uid===eId});
      if(eq2){
        var tpl2=EQUIP_TEMPLATES.find(function(t){return t.id===eq2.id});
        if(tpl2 && tpl2.setId && EQUIP_SETS[tpl2.setId]){
          setCounts[tpl2.setId]=(setCounts[tpl2.setId]||0)+1;
        }
      }
    }
  }
  for(var setId in setCounts){
    var count=setCounts[setId];
    var setDef=EQUIP_SETS[setId];
    if(setDef && setDef.bonuses[count]){
      var bonus=setDef.bonuses[count];
      if(bonus.stats){
        var bKeys=Object.keys(bonus.stats);
        for(var bi=0;bi<bKeys.length;bi++){
          var bk=bKeys[bi];
          if(s[bk]!==undefined) s[bk]+=bonus.stats[bk];
        }
      }
    }
  }
  // 词缀加成
  for(var ai=0;ai<slots.length;ai++){
    var aslot=slots[ai];
    var aeid=hero.equipment[aslot];
    if(aeid!=null){
      var aeq=G.equipment.find(function(e){return e.uid===aeid});
      if(aeq && aeq.affixes && aeq.affixes.length>0){
        for(var aj=0;aj<aeq.affixes.length;aj++){
          var affix=aeq.affixes[aj];
          var adef=getAffixDef(affix.id);
          if(!adef)continue;
          // 百分比类词缀用乘算
          if(adef.stat==='critRate'||adef.stat==='critDmg'||adef.stat==='atkSpd'||
             adef.stat==='armorPen'||adef.stat==='lifeSteal'||adef.stat==='hitBonus'||
             adef.stat==='dodgeRate'||adef.stat==='blockRate'||adef.stat==='dmgReduce'||
             adef.stat==='thorns'||adef.stat==='shieldBoost'||adef.stat==='hpRegen'||
             adef.stat==='maxHpBonus'||adef.stat==='cdr'||adef.stat==='mpReduce'||
             adef.stat==='expBonus'||adef.stat==='goldBonus'||adef.stat==='skillBoost'||
             adef.stat==='healBoost'){
            // 存储到特殊字段，战斗时使用
            if(!s._affixEffects) s._affixEffects={};
            s._affixEffects[adef.stat]=(s._affixEffects[adef.stat]||0)+affix.value;
          }
          // 固定值类词缀直接加
          if(adef.stat==='maxHpBonus'){
            s.maxHP=Math.floor(s.maxHP*(1+affix.value/100));
            s.hp=Math.min(s.hp,s.maxHP);
          }
        }
      }
    }
  }
  // 天赋加成
  var talentEffects=getTalentEffects(hero);
  if(talentEffects.hpMax) s.maxHP=Math.floor(s.maxHP*(1+talentEffects.hpMax));
  if(talentEffects.atk) s.atk=Math.floor(s.atk*(1+talentEffects.atk));
  if(talentEffects.def) s.def=Math.floor(s.def*(1+talentEffects.def));
  if(talentEffects.spd) s.spd=Math.floor(s.spd*(1+talentEffects.spd));
  if(talentEffects.mpMax) s.maxMP=Math.floor(s.maxMP*(1+talentEffects.mpMax));
  // 确保当前HP/MP不超过最大值
  if(s.hp>s.maxHP) s.hp=s.maxHP;
  if(s.mp>s.maxMP) s.mp=s.maxMP;
  return s;
}


// ==================== 装备特殊技能系统 ====================
function checkEquipSpecialSkill(unit, triggerType, target, allUnits){
  if(!unit.hero || unit.isEnemy) return;
  var hero=unit.hero;
  var triggeredSkills=[];
  for(var slot in hero.equipment){
    var eUid=hero.equipment[slot];
    if(eUid==null) continue;
    var eq=G.equipment.find(function(e){return e.uid===eUid});
    if(!eq) continue;
    var tpl=EQUIP_TEMPLATES.find(function(t){return t.id===eq.id});
    if(!tpl || !tpl.specialSkill) continue;
    var skill=EQUIP_SPECIAL_SKILLS[tpl.specialSkill];
    if(!skill || skill.trigger!==triggerType) continue;
    // 狂战之魂特殊条件：生命低于30%才触发
    if(tpl.specialSkill==='sk_berserker_soul' && unit.hp/unit.maxHP>0.3) continue;
    if(Math.random()<(skill.chance||0.2)){
      triggeredSkills.push({skill:skill, tpl:tpl});
    }
  }
  // 检查套装3件激活的特殊效果
  var setCounts={};
  for(var s in hero.equipment){
    var eId2=hero.equipment[s];
    if(eId2==null) continue;
    var eq2=G.equipment.find(function(e){return e.uid===eId2});
    if(!eq2) continue;
    var tpl2=EQUIP_TEMPLATES.find(function(t){return t.id===eq2.id});
    if(tpl2 && tpl2.setId) setCounts[tpl2.setId]=(setCounts[tpl2.setId]||0)+1;
  }
  for(var setId in setCounts){
    if(setCounts[setId]>=3){
      var setDef=EQUIP_SETS[setId];
      if(setDef && setDef.bonuses[3] && setDef.bonuses[3].specialEffect){
        var se=EQUIP_SPECIAL_SKILLS[setDef.bonuses[3].specialEffect];
        if(se && se.trigger===triggerType && Math.random()<(se.chance||0.2)){
          triggeredSkills.push({skill:se, tpl:{name:setDef.name, icon:setDef.icon}});
        }
      }
    }
  }
  // 执行触发的技能效果
  for(var i=0;i<triggeredSkills.length;i++){
    applyEquipSpecialEffect(unit, triggeredSkills[i].skill, triggeredSkills[i].tpl, target, allUnits);
  }
}

function applyEquipSpecialEffect(unit, skill, sourceTpl, target, allUnits){
  var eff=skill.effect;
  if(!eff) return;
  showFloat(unit, sourceTpl.icon+' '+skill.name, 'skill-name');

  if(eff.type==='damage'){
    var dmgTargets=eff.target==='all_enemies' ? allUnits.filter(function(u){return u.isEnemy && u.alive}) : (target && target.alive ? [target] : []);
    for(var i=0;i<dmgTargets.length;i++){
      var dmg=Math.floor(unit.atk*(eff.value||0.3));
      dmgTargets[i].hp-=dmg;
      showFloat(dmgTargets[i], '-'+dmg, 'damage');
      recordBattleStat(unit, 'damage', dmg);
      if(dmgTargets[i].hp<=0){dmgTargets[i].alive=false; showFloat(dmgTargets[i], '倒下', 'death');}
    }
  } else if(eff.type==='heal'){
    var healTargets=eff.target==='all_allies' ? allUnits.filter(function(u){return !u.isEnemy && u.alive}) : [unit];
    for(var i=0;i<healTargets.length;i++){
      var healAmt=Math.floor(healTargets[i].maxHP*(eff.value||0.1));
      healTargets[i].hp=Math.min(healTargets[i].hp+healAmt, healTargets[i].maxHP);
      showFloat(healTargets[i], '+'+healAmt, 'heal');
      recordBattleStat(unit, 'heal', healAmt);
    }
  } else if(eff.type==='buff'){
    unit.buffs.push({name:skill.name, stat:eff.stat||'atk', mult:1+(eff.value||0.2), duration:eff.duration||2});
  } else if(eff.type==='debuff'){
    var debuffTargets=eff.target==='all_enemies' ? allUnits.filter(function(u){return u.isEnemy && u.alive}) : (target && target.alive ? [target] : []);
    for(var i=0;i<debuffTargets.length;i++){
      debuffTargets[i].buffs.push({name:skill.name, stat:eff.stat||'atk', mult:eff.value||0.8, duration:eff.duration||2});
      showFloat(debuffTargets[i], '▼'+skill.name, 'debuff-text');
    }
  } else if(eff.type==='shield'){
    var shieldTargets=eff.target==='all_allies' ? allUnits.filter(function(u){return !u.isEnemy && u.alive}) : [unit];
    for(var i=0;i<shieldTargets.length;i++){
      var shieldAmt=Math.floor(shieldTargets[i].maxHP*(eff.value||0.1));
      shieldTargets[i].shield=(shieldTargets[i].shield||0)+shieldAmt;
      showFloat(shieldTargets[i], '🛡+'+shieldAmt, 'buff-text');
    }
  } else if(eff.type==='dot'){
    var dotTargets=eff.target==='all_enemies' ? allUnits.filter(function(u){return u.isEnemy && u.alive}) : (target && target.alive ? [target] : []);
    for(var i=0;i<dotTargets.length;i++){
      dotTargets[i].dot.push({name:skill.name, dmg:Math.floor(unit.atk*(eff.value||0.05)), duration:eff.duration||3, sourceRole:unit.role});
      showFloat(dotTargets[i], '☠'+skill.name, 'debuff-text');
    }
  } else if(eff.type==='dodge'){
    unit.buffs.push({name:skill.name, stat:'dodge', mult:1+(eff.value||0.5), duration:eff.duration||1});
    showFloat(unit, '💨'+skill.name, 'buff-text');
  }
}

// 建筑每分钟产出资源（进入建筑页面时触发，同时启动定时器自动收集）
var G_lastProductionTime=Date.now();
var G_productionTimer=null;

// 资源上限配置
const RESOURCE_LIMITS = {
  gold: 100000000,    // 金币上限 1亿
  gems: 100000000,    // 宝石上限 1亿
  food: 100000000,    // 食物上限 1亿
  stone: 100000000,   // 石材上限 1亿
  iron: 100000000,    // 铁矿上限 1亿
  fame: 100000000,    // 声望上限 1亿
  expPotion: 100000000 // 经验药水上限 1亿
};

function produceResources(){
  var now=Date.now();
  var minutesPassed=(now-G_lastProductionTime)/(1000*60);
  if(minutesPassed<0.02)return; // 小于1秒不计算
  
  // 农场产出食物（配置是每小时产量，转换为每分钟）
  var farmLevel=G.buildings.farm||0;
  if(farmLevel>0){
    var farmDef=BUILDING_DEFS.farm;
    var foodPerHour=farmDef.foodProductionByLevel[farmLevel]||0;
    var foodPerMinute=foodPerHour/60;
    var foodProduced=Math.floor(foodPerMinute*minutesPassed);
    if(foodProduced>0){
      var before=G.resources.food||0;
      G.resources.food=Math.min((G.resources.food||0)+foodProduced, RESOURCE_LIMITS.food);
      var actual=G.resources.food-before;
      if(actual>0) showToast('🌾 农场产出 '+actual+' 食物'+(G.resources.food>=RESOURCE_LIMITS.food?' (已满)':''));
    }
  }
  
  // 矿场产出石材和铁矿（配置是每小时产量，转换为每分钟）
  var mineLevel=G.buildings.mine||0;
  if(mineLevel>0){
    var mineDef=BUILDING_DEFS.mine;
    var stonePerHour=mineDef.stoneProductionByLevel[mineLevel]||0;
    var ironPerHour=mineDef.ironProductionByLevel[mineLevel]||0;
    var stonePerMinute=stonePerHour/60;
    var ironPerMinute=ironPerHour/60;
    var stoneProduced=Math.floor(stonePerMinute*minutesPassed);
    var ironProduced=Math.floor(ironPerMinute*minutesPassed);
    
    var stoneBefore=G.resources.stone||0;
    var ironBefore=G.resources.iron||0;
    
    if(stoneProduced>0){
      G.resources.stone=Math.min((G.resources.stone||0)+stoneProduced, RESOURCE_LIMITS.stone);
    }
    if(ironProduced>0){
      G.resources.iron=Math.min((G.resources.iron||0)+ironProduced, RESOURCE_LIMITS.iron);
    }
    
    var stoneActual=(G.resources.stone||0)-stoneBefore;
    var ironActual=(G.resources.iron||0)-ironBefore;
    
    if(stoneActual>0||ironActual>0){
      var fullMsg='';
      if(G.resources.stone>=RESOURCE_LIMITS.stone) fullMsg+=' 石材已满';
      if(G.resources.iron>=RESOURCE_LIMITS.iron) fullMsg+=' 铁矿已满';
      showToast('⛏️ 矿场产出 '+stoneActual+' 石材 '+ironActual+' 铁矿'+fullMsg);
    }
  }
  
  G_lastProductionTime=now;
  updateResUI();
}

// 启动自动资源生产（每15秒检查一次）
function startAutoProduction(){
  if(G_productionTimer)clearInterval(G_productionTimer);
  G_productionTimer=setInterval(function(){
     produceResources();
   }, 8000);
}

// 手动收集资源（点击建筑页面时触发）
function collectResources(){
  produceResources();
}

// 竞技场对手生成（V2 - 属性突破系统版本）
function generateArenaOpponent(difficulty){
  // 初始化突破系统
  if(!G.breakthroughMaterials){
    G.breakthroughMaterials={rare:0,epic:0,legendary:0,mythic:0,hidden:0};
  }
  if(!G.heroBreakthrough)G.heroBreakthrough={};
  
  var config=ARENA_CONFIG_V2;
  var teamHeroes=G.team.filter(function(h){return h!==null});
  var teamSize=teamHeroes.length||1;
  
  // 分析玩家队伍
  var playerStats={
    count:teamSize,totalLevel:0,maxLevel:0,avgQuality:0,
    roles:{},isPhysicalHeavy:false,isMagicHeavy:false,
    hasTank:false,hasHealer:false,totalPower:0
  };
  var physicalRoles=['warrior','assassin','ranger'];
  var magicRoles=['mage','warlock'];
  var physicalCount=0,magicCount=0;
  teamHeroes.forEach(function(h){
    playerStats.totalLevel+=h.level;
    if(h.level>playerStats.maxLevel)playerStats.maxLevel=h.level;
    playerStats.avgQuality+=QUALITIES.indexOf(h.quality);
    playerStats.roles[h.role]=(playerStats.roles[h.role]||0)+1;
    playerStats.totalPower+=calcHeroPower(h);
    if(physicalRoles.indexOf(h.role)>=0)physicalCount++;
    if(magicRoles.indexOf(h.role)>=0)magicCount++;
    if(h.role==='guardian'||h.role==='paladin')playerStats.hasTank=true;
    if(h.role==='healer')playerStats.hasHealer=true;
  });
  if(teamSize>0){
    playerStats.avgLevel=Math.floor(playerStats.totalLevel/teamSize);
    playerStats.avgQuality=Math.floor(playerStats.avgQuality/teamSize);
  }
  playerStats.isPhysicalHeavy=physicalCount>=3;
  playerStats.isMagicHeavy=magicCount>=3;
  
  // 难度参数
  var statMult=config.statMultiplier[difficulty]||0.9;
  var maxQuality=config.maxQuality[difficulty]||'epic';
  var skillCount=config.skillCount[difficulty]||2;
  var equipLevel=config.equipmentLevel[difficulty]||'none';
  var bondsEnabled=config.bondEnabled[difficulty]||false;
  
  var opponentCount=Math.min(Math.max(teamSize,2),6);
  
  // 克制阵容生成
  var counterComps={
    antiPhysical:{roles:['guardian','guardian','mage','healer','warlock','paladin']},
    antiMagic:{roles:['paladin','ranger','ranger','assassin','healer','warrior']},
    antiNoTank:{roles:['assassin','assassin','warrior','ranger','mage','warlock']},
    antiNoHeal:{roles:['warlock','warlock','mage','guardian','assassin','ranger']},
    balanced:{roles:['guardian','warrior','mage','healer','assassin','ranger']},
    extreme:{roles:['warrior','warrior','mage','mage','assassin','assassin']}
  };
  var targetComp;
  if(difficulty==='hell'||difficulty==='mythic'){
    targetComp=counterComps.extreme;
  }else if(playerStats.isPhysicalHeavy){
    targetComp=counterComps.antiPhysical;
  }else if(playerStats.isMagicHeavy){
    targetComp=counterComps.antiMagic;
  }else if(!playerStats.hasTank){
    targetComp=counterComps.antiNoTank;
  }else if(!playerStats.hasHealer){
    targetComp=counterComps.antiNoHeal;
  }else{
    targetComp=counterComps.balanced;
  }
  
  var roleCount={};
  var opponents=[];
  var qualities=['common','rare','epic','legendary','mythic','hidden'];
  var maxQIdx=qualities.indexOf(maxQuality);
  
  for(var i=0;i<opponentCount;i++){
    var targetRole=targetComp.roles[i]||Object.keys(ROLES)[Math.floor(Math.random()*Object.keys(ROLES).length)];
    roleCount[targetRole]=(roleCount[targetRole]||0)+1;
    
    // 品质选择
    var targetQIdx;
    if(difficulty==='hell')targetQIdx=Math.max(0,maxQIdx-1);
    else if(difficulty==='mythic')targetQIdx=maxQIdx;
    else targetQIdx=Math.min(maxQIdx,playerStats.avgQuality+1);
    var quality=qualities[targetQIdx];
    
    var pool=HERO_TEMPLATES.filter(function(t){return t.quality===quality&&t.role===targetRole});
    if(pool.length===0)pool=HERO_TEMPLATES.filter(function(t){return t.role===targetRole&&QUALITIES.indexOf(t.quality)<=maxQIdx});
    if(pool.length===0)pool=HERO_TEMPLATES;
    var tpl=pool[Math.floor(Math.random()*pool.length)];
    
    var role=ROLES[tpl.role];
    var qm=QUALITY_MULT[tpl.quality];
    
    var baseLevel=Math.max(1,Math.floor(playerStats.maxLevel*statMult));
    var opponentLevel=Math.max(1,baseLevel+Math.floor(Math.random()*5)-2);
    
    var baseStats={
      maxHP:calcStat(role.baseHP,qm,opponentLevel),
      atk:calcStat(role.baseATK,qm,opponentLevel),
      def:calcStat(role.baseDEF,qm,opponentLevel),
      spd:calcStat(role.baseSPD,qm,opponentLevel),
      maxMP:calcStat(role.baseMP,qm,opponentLevel)
    };
    
    // 高难度加成
    if(difficulty==='hell'||difficulty==='mythic'){
      var bonus=difficulty==='mythic'?1.3:1.15;
      baseStats.maxHP=Math.floor(baseStats.maxHP*bonus);
      baseStats.atk=Math.floor(baseStats.atk*bonus);
      baseStats.def=Math.floor(baseStats.def*bonus);
      baseStats.spd=Math.floor(baseStats.spd*bonus);
      baseStats.maxMP=Math.floor(baseStats.maxMP*bonus);
    }
    
    // 技能选择
    var skills=tpl.skills.slice();
    var roleTpls=HERO_TEMPLATES.filter(function(t){return t.role===targetRole&&t.quality!=='common'});
    var skillPool=[];
    roleTpls.forEach(function(t){t.skills.forEach(function(s){if(skills.indexOf(s)<0&&skillPool.indexOf(s)<0)skillPool.push(s);});});
    if((difficulty==='nightmare'||difficulty==='hell'||difficulty==='mythic')&&playerStats.isPhysicalHeavy){
      ['blizzard','curse','shadow_step'].forEach(function(s){if(skillPool.indexOf(s)>=0&&skills.indexOf(s)<0)skills.push(s);});
    }
    if((difficulty==='nightmare'||difficulty==='hell'||difficulty==='mythic')&&playerStats.isMagicHeavy){
      ['backstab','aimed_shot','berserk'].forEach(function(s){if(skillPool.indexOf(s)>=0&&skills.indexOf(s)<0)skills.push(s);});
    }
    while(skills.length<skillCount&&skillPool.length>0){
      skills.push(skillPool.splice(Math.floor(Math.random()*skillPool.length),1)[0]);
    }
    
    var opponent={
      name:tpl.name+(difficulty==='hell'||difficulty==='mythic'?'·觉醒':''),
      icon:tpl.icon,quality:tpl.quality,role:tpl.role,level:opponentLevel,
      hp:baseStats.maxHP,maxHP:baseStats.maxHP,atk:baseStats.atk,def:baseStats.def,
      spd:baseStats.spd,mp:baseStats.maxMP,maxMP:baseStats.maxMP,
      skills:skills.slice(0,skillCount),bonusSkills:[],equipment:{weapon:null,armor:null,accessory:null},
      alive:true,isEnemy:true
    };
    
    // 羁绊加成
    if(bondsEnabled){
      var bonusMult=difficulty==='mythic'?1.2:1.1;
      opponent.atk=Math.floor(opponent.atk*bonusMult);
      opponent.def=Math.floor(opponent.def*bonusMult);
      opponent.maxHP=Math.floor(opponent.maxHP*bonusMult);
      opponent.hp=opponent.maxHP;
      opponent.spd=Math.floor(opponent.spd*bonusMult);
    }
    
    opponents.push(opponent);
  }
  return opponents;
}

function calculateArenaReward(opponents,difficulty,isWin){
  if(!isWin)return{gold:0,fame:0,extras:{},materials:{}};
  
  initBreakthroughSystem();
  
  // 使用ARENA_CONFIG_V2配置
  var config=ARENA_CONFIG_V2;
  var rewardMult=config.rewardMultiplier[difficulty]||1;
  
  // 计算对手平均等级和品质
  var totalLevel=0,totalQuality=0;
  opponents.forEach(function(o){
    totalLevel+=o.level;
    totalQuality+=QUALITIES.indexOf(o.quality);
  });
  var avgLevel=Math.floor(totalLevel/opponents.length);
  var avgQuality=Math.floor(totalQuality/opponents.length);
  
  // 基础奖励
  var baseGold=500;
  var baseFame=50;
  
  var levelBonus=1+(avgLevel/getHeroLevelCap());
  var qualityBonus=1+(avgQuality*0.15);
  var countBonus=opponents.length*0.2;
  
  var gold=Math.floor(baseGold*levelBonus*qualityBonus*(1+countBonus)*rewardMult);
  var fame=Math.floor(baseFame*levelBonus*qualityBonus*(1+countBonus)*rewardMult);
  
  // 连胜加成
  var winStreak=G.arenaState.winStreak||0;
  var streakBonus=0;
  if(winStreak>=10)streakBonus=1.0;
  else if(winStreak>=5)streakBonus=0.5;
  else if(winStreak>=3)streakBonus=0.3;
  else if(winStreak>=2)streakBonus=0.2;
  
  gold=Math.floor(gold*(1+streakBonus));
  fame=Math.floor(fame*(1+streakBonus));
  
  // 额外奖励
  var rewardExtras={};
  
  // 经验药水
  rewardExtras.expPotion=Math.floor(3*rewardMult);
  
  // 铁矿
  rewardExtras.iron=Math.floor(5*rewardMult);
  
  // 石材（高难度）
  if(difficulty==='hard'||difficulty==='nightmare'||difficulty==='hell'||difficulty==='mythic'){
    rewardExtras.stone=Math.floor(10*rewardMult);
  }
  
  // 宝石（噩梦及以上）
  if((difficulty==='nightmare'||difficulty==='hell'||difficulty==='mythic')&&Math.random()<0.3){
    rewardExtras.gems=Math.floor(rewardMult);
  }
  
  // 突破材料掉落
  var materialDrops=config.materialDrop[difficulty]||{};
  var rewardMaterials={};
  
  Object.keys(materialDrops).forEach(function(quality){
    var dropChance=materialDrops[quality];
    if(Math.random()<dropChance){
      var mat=BREAKTHROUGH_MATERIALS[quality];
      if(mat){
        var amount=Math.floor(Math.random()*2)+1; // 1-2个
        rewardMaterials[quality]=amount;
        if(!G.breakthroughMaterials[quality])G.breakthroughMaterials[quality]=0;
        G.breakthroughMaterials[quality]+=amount;
      }
    }
  });
  
  return{gold:gold,fame:fame,extras:rewardExtras,materials:rewardMaterials};
}

function startArenaBattle(difficulty){
  var remaining=getArenaRemainingChallenges();
  if(remaining<=0){showToast('今日挑战次数已用完');return}
  
  // 检查是否有队伍
  var teamHeroes=G.team.filter(function(h){return h!==null});
  if(teamHeroes.length===0){showToast('请先编组队伍');return}
  
  // 生成对手
  var opponents=generateArenaOpponent(difficulty);
  
  // 保存竞技场信息供战斗结束后结算
  G.arenaBattleInfo={
    difficulty:difficulty,
    opponents:opponents
  };
  
  // 启动竞技场战斗
  runArenaBattle(teamHeroes,opponents,difficulty);
}

async function runArenaBattle(teamHeroes,opponents,difficulty){

  if(G_battleRunning){return;}
  G_battleRunning=true;
  G_battlePaused=false;
  
  // 创建玩家单位
  var playerUnits=teamHeroes.map(function(h){return createBattleUnit(h,false)});
  
  // 创建对手单位（类似关卡敌人）
  var enemyUnits=opponents.map(function(e){
    // 构建fakeHero对象
    var fakeHero={

      level:e.level,

      atk:e.atk,
      def:e.def,

      maxMP:e.maxMP,
      hp:e.hp,
      mp:e.mp,
      equipment:{weapon:null,armor:null,accessory:null}

    return createBattleUnit(fakeHero,true);
  });
  
  var allUnits=playerUnits.concat(enemyUnits);
  
  // 保存战斗单位到全局，供退出时检查实际胜负
  G.arenaBattleUnits={playerUnits:playerUnits,enemyUnits:enemyUnits};
  
  // 初始化战斗统计数据

  var contentEl=document.getElementById('content');
  if(!contentEl){G_battleRunning=false;return;}
  
  var diffNames={easy:'🟢简单',normal:'🟡普通',hard:'🔴困难'};
  
  // 渲染竞技场战斗界面
  function renderArenaBattleUI(){
    contentEl.innerHTML=`<div class="panel">

        <div style="font-size:12px;color:var(--text2)">回合: <span id="arena-round">1</span>/50</div>
        <div class="btn-group">
          <button class="btn btn-sm" onclick="exitArenaBattle()" style="color:#ff6b6b">🚪 退出</button>
          <button class="btn btn-sm ${G_battlePaused?'btn-primary':''}" onclick="toggleArenaPause()">${G_battlePaused?'▶️ 继续':'⏸️ 暂停'}</button>
          <button class="btn btn-sm" onclick="setArenaSpeed(1)">x1</button>

        </div>
      </div>

      <!-- 战斗统计面板 -->

        <div style="font-weight:bold;font-size:13px;margin-bottom:8px;color:var(--gold)">📊 战斗数据</div>
        <div style="display:flex;gap:20px">
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;color:var(--text2);margin-bottom:4px">🟢 我方</div>

      <div id="arena-battle-buttons" class="btn-group mt-8" style="justify-content:center"></div>
    </div>`;
  }
  
  renderArenaBattleUI();
  
  // 设置战斗场景引用，使动画效果可用
  _battleScene=document.getElementById('arena-battle-scene');
  
  var logEl=document.getElementById('arena-battle-log');
  var playerTeamEl=document.getElementById('arena-player-team');
  var enemyTeamEl=document.getElementById('arena-enemy-team');
  var roundEl=document.getElementById('arena-round');
  var btnArea=document.getElementById('arena-battle-buttons');
  
  if(!logEl||!playerTeamEl||!enemyTeamEl){G_battleRunning=false;return;}
  
  function log(msg,cls){
    cls=cls||'info';
    var line=document.createElement('div');
    line.className='log-line log-'+cls;
    line.textContent=msg;
    logEl.appendChild(line);
    _logCount++;
    if(_logCount>MAX_LOG_LINES){var first=logEl.firstChild;if(first)logEl.removeChild(first);}
    logEl.scrollTop=logEl.scrollHeight;
  }
  
  function renderTeams(){
    playerTeamEl.innerHTML=playerUnits.map(function(u){
      var hpPct=Math.max(0,(u.maxHP>0?u.hp/u.maxHP:0)*100);
      var mpPct=Math.max(0,(u.mp/u.maxMP)*100);
      var shieldPct=u.maxHP>0?Math.min(100,(u.shield/u.maxHP)*100):0;
      var isLow=hpPct<30;
