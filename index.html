function getHeroStats(hero){
  var s={hp:hero.hp,maxHP:hero.maxHP,atk:hero.atk,def:hero.def,spd:hero.spd,mp:hero.mp,maxMP:hero.maxMP};
  // 装备加成（含强化加成）
  var slots=['weapon','armor','accessory'];
  for(var si=0;si<slots.length;si++){
    var slot=slots[si];
    var eid=hero.equipment[slot];
    if(eid!=null){
      var eq=G.equipment.find(function(e){return e.uid===eid});
      if(eq){
        var tpl=EQUIP_TEMPLATES.find(function(t){return t.id===eq.id});
        if(tpl){
          var enhanceLevel=eq.enhance||0;
          var enhanceMult=1+enhanceLevel*0.1;
          var statKeys=Object.keys(tpl.stats);
          for(var ki=0;ki<statKeys.length;ki++){
            var k=statKeys[ki];
            var v=tpl.stats[k];
            if(s[k]!==undefined){
              var finalValue=Math.floor(v*enhanceMult);
              s[k]+=finalValue;
            }
          }
        }
      }
    }
  }
  // 套装加成
  var setCounts={};
  for(var si2=0;si2<slots.length;si2++){
    var slot2=slots[si2];
    var eId=hero.equipment[slot2];
    if(eId!=null){
      var eq2=G.equipment.find(function(e){return e.uid===eId});
      if(eq2){
        var tpl2=EQUIP_TEMPLATES.find(function(t){return t.id===eq2.id});
        if(tpl2 && tpl2.setId && EQUIP_SETS[tpl2.setId]){
          setCounts[tpl2.setId]=(setCounts[tpl2.setId]||0)+1;
        }
      }
    }
  }
  for(var setId in setCounts){
    var count=setCounts[setId];
    var setDef=EQUIP_SETS[setId];
    if(setDef && setDef.bonuses[count]){
      var bonus=setDef.bonuses[count];
      if(bonus.stats){
        var bKeys=Object.keys(bonus.stats);
        for(var bi=0;bi<bKeys.length;bi++){
          var bk=bKeys[bi];
          if(s[bk]!==undefined) s[bk]+=bonus.stats[bk];
        }
      }
    }
  }
  // 词缀加成
  for(var ai=0;ai<slots.length;ai++){
    var aslot=slots[ai];
    var aeid=hero.equipment[aslot];
    if(aeid!=null){
      var aeq=G.equipment.find(function(e){return e.uid===aeid});
      if(aeq && aeq.affixes && aeq.affixes.length>0){
        for(var aj=0;aj<aeq.affixes.length;aj++){
          var affix=aeq.affixes[aj];
          var adef=getAffixDef(affix.id);
          if(!adef)continue;
          // 百分比类词缀用乘算
          if(adef.stat==='critRate'||adef.stat==='critDmg'||adef.stat==='atkSpd'||
             adef.stat==='armorPen'||adef.stat==='lifeSteal'||adef.stat==='hitBonus'||
             adef.stat==='dodgeRate'||adef.stat==='blockRate'||adef.stat==='dmgReduce'||
             adef.stat==='thorns'||adef.stat==='shieldBoost'||adef.stat==='hpRegen'||
             adef.stat==='maxHpBonus'||adef.stat==='cdr'||adef.stat==='mpReduce'||
             adef.stat==='expBonus'||adef.stat==='goldBonus'||adef.stat==='skillBoost'||
             adef.stat==='healBoost'){
            // 存储到特殊字段，战斗时使用
            if(!s._affixEffects) s._affixEffects={};
            s._affixEffects[adef.stat]=(s._affixEffects[adef.stat]||0)+affix.value;
          }
          // 固定值类词缀直接加
          if(adef.stat==='maxHpBonus'){
            s.maxHP=Math.floor(s.maxHP*(1+affix.value/100));
            s.hp=Math.min(s.hp,s.maxHP);
          }
        }
      }
    }
  }
  // 天赋加成
  var talentEffects=getTalentEffects(hero);
  if(talentEffects.hpMax) s.maxHP=Math.floor(s.maxHP*(1+talentEffects.hpMax));
  if(talentEffects.atk) s.atk=Math.floor(s.atk*(1+talentEffects.atk));
  if(talentEffects.def) s.def=Math.floor(s.def*(1+talentEffects.def));
  if(talentEffects.spd) s.spd=Math.floor(s.spd*(1+talentEffects.spd));
  if(talentEffects.mpMax) s.maxMP=Math.floor(s.maxMP*(1+talentEffects.mpMax));
  // 确保当前HP/MP不超过最大值
  if(s.hp>s.maxHP) s.hp=s.maxHP;
  if(s.mp>s.maxMP) s.mp=s.maxMP;
  return s;
}


// ==================== 装备特殊技能系统 ====================
function checkEquipSpecialSkill(unit, triggerType, target, allUnits){
  if(!unit.hero || unit.isEnemy) return;
  var hero=unit.hero;
  var triggeredSkills=[];
  for(var slot in hero.equipment){
    var eUid=hero.equipment[slot];
    if(eUid==null) continue;
    var eq=G.equipment.find(function(e){return e.uid===eUid});
    if(!eq) continue;
    var tpl=EQUIP_TEMPLATES.find(function(t){return t.id===eq.id});
    if(!tpl || !tpl.specialSkill) continue;
    var skill=EQUIP_SPECIAL_SKILLS[tpl.specialSkill];
    if(!skill || skill.trigger!==triggerType) continue;
    // 狂战之魂特殊条件：生命低于30%才触发
    if(tpl.specialSkill==='sk_berserker_soul' && unit.hp/unit.maxHP>0.3) continue;
    if(Math.random()<(skill.chance||0.2)){
      triggeredSkills.push({skill:skill, tpl:tpl});
    }
  }
  // 检查套装3件激活的特殊效果
  var setCounts={};
  for(var s in hero.equipment){
    var eId2=hero.equipment[s];
    if(eId2==null) continue;
    var eq2=G.equipment.find(function(e){return e.uid===eId2});
    if(!eq2) continue;
    var tpl2=EQUIP_TEMPLATES.find(function(t){return t.id===eq2.id});
    if(tpl2 && tpl2.setId) setCounts[tpl2.setId]=(setCounts[tpl2.setId]||0)+1;
  }
  for(var setId in setCounts){
    if(setCounts[setId]>=3){
      var setDef=EQUIP_SETS[setId];
      if(setDef && setDef.bonuses[3] && setDef.bonuses[3].specialEffect){
        var se=EQUIP_SPECIAL_SKILLS[setDef.bonuses[3].specialEffect];
        if(se && se.trigger===triggerType && Math.random()<(se.chance||0.2)){
          triggeredSkills.push({skill:se, tpl:{name:setDef.name, icon:setDef.icon}});
        }
      }
    }
  }
  // 执行触发的技能效果
  for(var i=0;i<triggeredSkills.length;i++){
    applyEquipSpecialEffect(unit, triggeredSkills[i].skill, triggeredSkills[i].tpl, target, allUnits);
  }
}

function applyEquipSpecialEffect(unit, skill, sourceTpl, target, allUnits){
  var eff=skill.effect;
  if(!eff) return;
  showFloat(unit, sourceTpl.icon+' '+skill.name, 'skill-name');

  if(eff.type==='damage'){
    var dmgTargets=eff.target==='all_enemies' ? allUnits.filter(function(u){return u.isEnemy && u.alive}) : (target && target.alive ? [target] : []);
    for(var i=0;i<dmgTargets.length;i++){
      var dmg=Math.floor(unit.atk*(eff.value||0.3));
      dmgTargets[i].hp-=dmg;
      showFloat(dmgTargets[i], '-'+dmg, 'damage');
      recordBattleStat(unit, 'damage', dmg);
      if(dmgTargets[i].hp<=0){dmgTargets[i].alive=false; showFloat(dmgTargets[i], '倒下', 'death');}
    }
  } else if(eff.type==='heal'){
    var healTargets=eff.target==='all_allies' ? allUnits.filter(function(u){return !u.isEnemy && u.alive}) : [unit];
    for(var i=0;i<healTargets.length;i++){
      var healAmt=Math.floor(healTargets[i].maxHP*(eff.value||0.1));
      healTargets[i].hp=Math.min(healTargets[i].hp+healAmt, healTargets[i].maxHP);
      showFloat(healTargets[i], '+'+healAmt, 'heal');
      recordBattleStat(unit, 'heal', healAmt);
    }
  } else if(eff.type==='buff'){
    unit.buffs.push({name:skill.name, stat:eff.stat||'atk', mult:1+(eff.value||0.2), duration:eff.duration||2});
  } else if(eff.type==='debuff'){
    var debuffTargets=eff.target==='all_enemies' ? allUnits.filter(function(u){return u.isEnemy && u.alive}) : (target && target.alive ? [target] : []);
    for(var i=0;i<debuffTargets.length;i++){
      debuffTargets[i].buffs.push({name:skill.name, stat:eff.stat||'atk', mult:eff.value||0.8, duration:eff.duration||2});
      showFloat(debuffTargets[i], '▼'+skill.name, 'debuff-text');
    }
  } else if(eff.type==='shield'){
    var shieldTargets=eff.target==='all_allies' ? allUnits.filter(function(u){return !u.isEnemy && u.alive}) : [unit];
    for(var i=0;i<shieldTargets.length;i++){
      var shieldAmt=Math.floor(shieldTargets[i].maxHP*(eff.value||0.1));
      shieldTargets[i].shield=(shieldTargets[i].shield||0)+shieldAmt;
      showFloat(shieldTargets[i], '🛡+'+shieldAmt, 'buff-text');
    }
  } else if(eff.type==='dot'){
    var dotTargets=eff.target==='all_enemies' ? allUnits.filter(function(u){return u.isEnemy && u.alive}) : (target && target.alive ? [target] : []);
    for(var i=0;i<dotTargets.length;i++){
      dotTargets[i].dot.push({name:skill.name, dmg:Math.floor(unit.atk*(eff.value||0.05)), duration:eff.duration||3, sourceRole:unit.role});
      showFloat(dotTargets[i], '☠'+skill.name, 'debuff-text');
    }
  } else if(eff.type==='dodge'){
    unit.buffs.push({name:skill.name, stat:'dodge', mult:1+(eff.value||0.5), duration:eff.duration||1});
    showFloat(unit, '💨'+skill.name, 'buff-text');
  }
}

// 建筑每分钟产出资源（进入建筑页面时触发，同时启动定时器自动收集）
var G_lastProductionTime=Date.now();
var G_productionTimer=null;

// 资源上限配置
const RESOURCE_LIMITS = {
  gold: 500000,     // 金币上限 50万
  gems: 9999,       // 宝石上限 9999
  food: 50000,      // 食物上限 5万
  stone: 30000,     // 石材上限 3万
  iron: 15000,      // 铁矿上限 1.5万
  fame: 9999,       // 声望上限 9999
  expPotion: 999999 // 经验药水上限 99万
};

function produceResources(){
  var now=Date.now();
  var minutesPassed=(now-G_lastProductionTime)/(1000*60);
  if(minutesPassed<0.02)return; // 小于1秒不计算
  
  // 农场产出食物（配置是每小时产量，转换为每分钟）
  var farmLevel=G.buildings.farm||0;
  if(farmLevel>0){
    var farmDef=BUILDING_DEFS.farm;
    var foodPerHour=farmDef.foodProductionByLevel[farmLevel]||0;
    var foodPerMinute=foodPerHour/60;
    var foodProduced=Math.floor(foodPerMinute*minutesPassed);
    if(foodProduced>0){
      var before=G.resources.food||0;
      G.resources.food=Math.min((G.resources.food||0)+foodProduced, RESOURCE_LIMITS.food);
      var actual=G.resources.food-before;
      if(actual>0) showToast('🌾 农场产出 '+actual+' 食物'+(G.resources.food>=RESOURCE_LIMITS.food?' (已满)':''));
    }
  }
  
  // 矿场产出石材和铁矿（配置是每小时产量，转换为每分钟）
  var mineLevel=G.buildings.mine||0;
  if(mineLevel>0){
    var mineDef=BUILDING_DEFS.mine;
    var stonePerHour=mineDef.stoneProductionByLevel[mineLevel]||0;
    var ironPerHour=mineDef.ironProductionByLevel[mineLevel]||0;
    var stonePerMinute=stonePerHour/60;
    var ironPerMinute=ironPerHour/60;
    var stoneProduced=Math.floor(stonePerMinute*minutesPassed);
    var ironProduced=Math.floor(ironPerMinute*minutesPassed);
    
    var stoneBefore=G.resources.stone||0;
    var ironBefore=G.resources.iron||0;
    
    if(stoneProduced>0){
      G.resources.stone=Math.min((G.resources.stone||0)+stoneProduced, RESOURCE_LIMITS.stone);
    }
    if(ironProduced>0){
      G.resources.iron=Math.min((G.resources.iron||0)+ironProduced, RESOURCE_LIMITS.iron);
    }
    
    var stoneActual=(G.resources.stone||0)-stoneBefore;
    var ironActual=(G.resources.iron||0)-ironBefore;
    
    if(stoneActual>0||ironActual>0){
      var fullMsg='';
      if(G.resources.stone>=RESOURCE_LIMITS.stone) fullMsg+=' 石材已满';
      if(G.resources.iron>=RESOURCE_LIMITS.iron) fullMsg+=' 铁矿已满';
      showToast('⛏️ 矿场产出 '+stoneActual+' 石材 '+ironActual+' 铁矿'+fullMsg);
    }
  }
  
  G_lastProductionTime=now;
  updateResUI();
}

// 启动自动资源生产（每15秒检查一次）
function startAutoProduction(){
  if(G_productionTimer)clearInterval(G_productionTimer);
  G_productionTimer=setInterval(function(){
     produceResources();
   }, 8000);
}

// 手动收集资源（点击建筑页面时触发）
function collectResources(){
  produceResources();
}

function generateArenaOpponent(difficulty){
  // 获取玩家队伍信息
  var teamHeroes=G.team.filter(function(h){return h!==null});
  var teamSize=teamHeroes.length;
  if(teamSize===0)teamSize=1;
  
  // 计算玩家队伍平均等级和品质
  var totalLevel=0,totalQuality=0,maxPlayerLevel=0,totalPower=0;
  teamHeroes.forEach(function(h){
    totalLevel+=h.level;
    totalQuality+=QUALITIES.indexOf(h.quality);
    if(h.level>maxPlayerLevel)maxPlayerLevel=h.level;
    totalPower+=calcHeroPower(h);
  });
  var avgPlayerLevel=Math.floor(totalLevel/teamSize);
  var avgPlayerQuality=Math.floor(totalQuality/teamSize);
  if(avgPlayerLevel===0)avgPlayerLevel=1;
  
  // 难度参数
  var levelMultiplier={easy:0.6,normal:0.9,hard:1.1,nightmare:1.3,mythic:1.5};
  var maxQualityIdx={easy:1,normal:2,hard:3,nightmare:4,mythic:4}[difficulty]||2;
  var baseLevel=Math.max(1,Math.floor(avgPlayerLevel*levelMultiplier[difficulty]));
  
  // 对手人数：与玩家队伍相同（最少2人最多6人）
  var opponentCount=Math.min(Math.max(teamSize,2),6);
  
  // ===== 合理阵容生成（噩梦/神话难度） =====
  // 定义阵容模板：确保坦克+输出+辅助的合理搭配
  var teamCompositions=[
    // 均衡阵容
    [{role:'guardian',min:1},{role:'warrior',min:1},{role:'healer',min:1}],
    // 爆发阵容
    [{role:'warrior',min:1},{role:'assassin',min:1},{role:'mage',min:1}],
    // 消耗阵容
    [{role:'guardian',min:1},{role:'mage',min:1},{role:'healer',min:1}],
    // 控制阵容
    [{role:'mage',min:2},{role:'warlock',min:1}],
    // 速攻阵容
    [{role:'assassin',min:1},{role:'ranger',min:1},{role:'warrior',min:1}],
    // 圣光阵容
    [{role:'paladin',min:1},{role:'healer',min:1},{role:'guardian',min:1}],
    // 暗影阵容
    [{role:'warlock',min:1},{role:'assassin',min:1},{role:'mage',min:1}],
  ];
  
  // 选择阵容模板（噩梦/神话用合理阵容，其他随机）
  var useSmartTeam=(difficulty==='nightmare'||difficulty==='mythic');
  var selectedComp=null;
  if(useSmartTeam){
    selectedComp=pick(teamCompositions);
  }
  
  // 统计已分配的角色
  var roleCount={};
  var opponents=[];
  
  for(var i=0;i<opponentCount;i++){
    // 选择品质：匹配玩家品质范围
    var qualityIdx=Math.min(maxQualityIdx,avgPlayerQuality+rand(-1,1));
    qualityIdx=Math.max(0,Math.min(qualityIdx,QUALITIES.length-1));
    var quality=QUALITIES[qualityIdx];
    
    // 选择角色（智能阵容 or 随机）
    var targetRole=null;
    if(selectedComp){
      // 找到还需要满足的角色要求
      for(var c=0;c<selectedComp.length;c++){
        var req=selectedComp[c];
        var currentCount=roleCount[req.role]||0;
        if(currentCount<req.min){
          targetRole=req.role;
          break;
        }
      }
      // 如果所有要求都满足，随机选
      if(!targetRole){
        var allRoles=Object.keys(ROLES);
        targetRole=pick(allRoles);
      }
    }else{
      // 随机选角色
      var allRoles=Object.keys(ROLES);
      targetRole=pick(allRoles);
    }
    
    roleCount[targetRole]=(roleCount[targetRole]||0)+1;
    
    // 从该角色+品质的英雄模板中选择
    var pool=HERO_TEMPLATES.filter(function(t){return t.quality===quality&&t.role===targetRole});
    if(pool.length===0)pool=HERO_TEMPLATES.filter(function(t){return t.role===targetRole});
    if(pool.length===0)pool=HERO_TEMPLATES;
    var tpl=pick(pool);
    
    var role=ROLES[tpl.role];
    var qm=QUALITY_MULT[tpl.quality];
    
    // 等级波动
    var levelVariation=rand(-2,3);
    var opponentLevel=Math.max(1,baseLevel+levelVariation);
    
    // 技能：使用模板自带技能（已合理搭配）
    var skills=tpl.skills.slice();
    
    // 高难度额外技能加成
    if(difficulty==='nightmare'||difficulty==='mythic'){
      // 给每个英雄额外加一个同角色的强力技能
      var roleSkills=HERO_TEMPLATES.filter(function(t){return t.role===tpl.role&&t.quality!=='common'});
      var bonusPool=[];
      roleSkills.forEach(function(t){
        t.skills.forEach(function(s){
          if(skills.indexOf(s)===-1&&bonusPool.indexOf(s)===-1)bonusPool.push(s);
        });
      });
      if(bonusPool.length>0){
        skills.push(pick(bonusPool));
      }
    }
    
    opponents.push({
      name:tpl.name,
      icon:tpl.icon,
      quality:tpl.quality,
      role:tpl.role,
      level:opponentLevel,
      hp:calcStat(role.baseHP,qm,opponentLevel),
      maxHP:calcStat(role.baseHP,qm,opponentLevel),
      atk:calcStat(role.baseATK,qm,opponentLevel),
      def:calcStat(role.baseDEF,qm,opponentLevel),
      spd:calcStat(role.baseSPD,qm,opponentLevel),
      mp:calcStat(role.baseMP,qm,opponentLevel),
      maxMP:calcStat(role.baseMP,qm,opponentLevel),
      skills:skills,
      alive:true,
      isEnemy:true,
    });
  }
  return opponents;
}

function calculateArenaReward(opponents,difficulty,isWin){
  if(!isWin)return{gold:0,fame:0,extras:{}};
  
  // 计算对手平均等级和品质
  var totalLevel=0,totalQuality=0;
  opponents.forEach(function(o){
    totalLevel+=o.level;
    totalQuality+=QUALITIES.indexOf(o.quality);
  });
  var avgLevel=Math.floor(totalLevel/opponents.length);
  var avgQuality=Math.floor(totalQuality/opponents.length);
  
  var baseGold=ARENA_CONFIG.baseGoldReward;
  var baseFame=ARENA_CONFIG.baseFameReward;
  var diffMult=ARENA_CONFIG.difficultyMultiplier[difficulty]||1;
  
  var levelBonus=1+(avgLevel/getHeroLevelCap());
  var qualityBonus=1+(avgQuality*0.15);
  var countBonus=opponents.length*0.2;
  
  var gold=Math.floor(baseGold*levelBonus*qualityBonus*(1+countBonus)*diffMult);
  var fame=Math.floor(baseFame*levelBonus*qualityBonus*(1+countBonus)*diffMult);
  
  // 连胜加成
  var winStreak=G.arenaState.winStreak;
  var streakBonus=0;
  var streakThresholds=Object.keys(ARENA_CONFIG.winStreakBonus).map(Number).sort(function(a,b){return b-a});
  for(var i=0;i<streakThresholds.length;i++){
    if(winStreak>=streakThresholds[i]){streakBonus=ARENA_CONFIG.winStreakBonus[streakThresholds[i]];break;}
  }
  gold=Math.floor(gold*(1+streakBonus));
  fame=Math.floor(fame*(1+streakBonus));
  
  // 丰厚额外奖励
  var extras=ARENA_CONFIG.rewardExtras[difficulty]||ARENA_CONFIG.rewardExtras.easy;
  var rewardExtras={};
  
  // 宝石掉落
  if(extras.gemChance>0&&Math.random()<extras.gemChance){
    rewardExtras.gems=extras.gemAmount;
  }
  
  // 经验药水
  var potionAmount=rand(extras.expPotionMin,extras.expPotionMax);
  rewardExtras.expPotion=potionAmount;
  
  // 铁矿
  var ironAmount=rand(extras.ironMin,extras.ironMax);
  rewardExtras.iron=ironAmount;
  
  // 石材（高难度）
  if(difficulty==='hard'||difficulty==='nightmare'||difficulty==='mythic'){
    rewardExtras.stone=rand(5,20)*(difficulty==='mythic'?3:difficulty==='nightmare'?2:1);
  }
  
  return{gold:gold,fame:fame,extras:rewardExtras};
}

function startArenaBattle(difficulty){
  var remaining=getArenaRemainingChallenges();
  if(remaining<=0){showToast('今日挑战次数已用完');return}
  
  // 检查是否有队伍
  var teamHeroes=G.team.filter(function(h){return h!==null});
  if(teamHeroes.length===0){showToast('请先编组队伍');return}
  
  // 生成对手
  var opponents=generateArenaOpponent(difficulty);
  
  // 保存竞技场信息供战斗结束后结算
  G.arenaBattleInfo={
    difficulty:difficulty,
    opponents:opponents
  };
  
  // 启动竞技场战斗
  runArenaBattle(teamHeroes,opponents,difficulty);
}

            checkEquipSpecialSkill(unit,'onAttack',target,allUnits);
            if(target.hp<=0){
              target.alive=false;log(target.icon+' '+target.name+' 倒下了...','death');animUnit(target,'dying',700);
              checkEquipSpecialSkill(unit,'onKill',target,allUnits);
            } else {
              checkEquipSpecialSkill(target,'onHit',unit,allUnits);
            }
          }
        }
      }

      renderTeams();
      updateBattleStatsBoard();
      await sleep(500/G_battleSpeed);
    }

    renderTeams();

    // 检查胜负
    var playerAlive=playerUnits.filter(function(u){return u.alive}).length;
    var enemyAlive=enemyUnits.filter(function(u){return u.alive}).length;
    
    if(playerAlive===0||enemyAlive===0){
      G_battleRunning=false;
      break;
    }
    
    await sleep(300/G_battleSpeed);
  }
  
  // 战斗结束 - 检查是否被中途退出打断
  if(!G.arenaBattleInfo){return;}
  
  var playerAlive=playerUnits.filter(function(u){return u.alive}).length;
  var enemyAlive=enemyUnits.filter(function(u){return u.alive}).length;
  var isWin=playerAlive>0&&enemyAlive===0;
  
  // 【关键】立即保存胜负结果和奖励，防止用户在 await 间隙点退出
  G.arenaIsWin=isWin;
  var reward=calculateArenaReward(G.arenaBattleInfo.opponents,G.arenaBattleInfo.difficulty,isWin);
  G.arenaReward=reward;
  
  await finishArenaBattle(isWin,playerUnits,enemyUnits,reward);
}

async function finishArenaBattle(isWin,playerUnits,enemyUnits,reward){
  // 保存胜负结果到全局
  G.arenaIsWin=isWin;
  G.arenaReward=reward;
  
  // 显示结算提示（通过Toast）
  if(isWin){
    // 发放奖励
    G.resources.gold=Math.min((G.resources.gold||0)+reward.gold,RESOURCE_LIMITS.gold);
    G.resources.fame=Math.min((G.resources.fame||0)+reward.fame,RESOURCE_LIMITS.fame);
    G.arenaState.totalGoldEarned=(G.arenaState.totalGoldEarned||0)+reward.gold;
    G.arenaState.totalFameEarned=(G.arenaState.totalFameEarned||0)+reward.fame;
    
    // 额外奖励
    var extras=reward.extras||{};
    var extraMsg='';
    if(extras.gems){
      G.resources.gems=Math.min((G.resources.gems||0)+extras.gems,RESOURCE_LIMITS.gems);
      extraMsg+=' 💎'+extras.gems;
    }
    if(extras.expPotion){
      G.resources.expPotion=Math.min((G.resources.expPotion||0)+extras.expPotion,RESOURCE_LIMITS.expPotion);
      extraMsg+=' 🧪'+extras.expPotion;
    }
    if(extras.iron){
      G.resources.iron=Math.min((G.resources.iron||0)+extras.iron,RESOURCE_LIMITS.iron);
      extraMsg+=' ⛏️'+extras.iron;
    }
    if(extras.stone){
      G.resources.stone=Math.min((G.resources.stone||0)+extras.stone,RESOURCE_LIMITS.stone);
      extraMsg+=' 🪨'+extras.stone;
    }
    
    showToast('🎉 竞技场胜利！💰'+reward.gold+' 🏆'+reward.fame+extraMsg);
    updateResUI();
  }else{
    showToast('💀 竞技场失败...');
  }
  
  // 显示战斗结果面板（动画效果）+ 短暂延迟后自动回到竞技场
  var btnArea=document.getElementById('arena-battle-buttons');
  if(btnArea){
    var resultText=isWin?'<span class="text-gold" style="font-size:20px;font-weight:bold">🎉 竞技场胜利！</span>':'<span class="text-red" style="font-size:20px;font-weight:bold">💀 竞技场失败...</span>';
    var rewardText='';
    if(isWin){
      var extraStr='';
      var ex=reward.extras||{};
      if(ex.gems)extraStr+=' 💎'+ex.gems;
      if(ex.expPotion)extraStr+=' 🧪'+ex.expPotion;
      if(ex.iron)extraStr+=' ⛏️'+ex.iron;
      if(ex.stone)extraStr+=' 🪨'+ex.stone;
      rewardText='<div style="text-align:center;margin:12px 0;color:#ffd700;font-size:16px">💰'+reward.gold+' 🏆'+reward.fame+extraStr+'</div>';
    }
    var streakText=isWin?'<div style="text-align:center;margin:8px 0;color:#2ed573">连胜: '+G.arenaState.winStreak+'</div>':'';
    btnArea.innerHTML='<div style="margin:20px 0;text-align:center;padding:20px;background:rgba(0,0,0,0.3);border-radius:10px">'+resultText+rewardText+streakText+'</div>';
  }
  
  // 【修复】奖励发放完毕后再存档，确保资源变化被正确保存
  updateResUI();
  saveGame();
  renderTeams();
  G_battleRunning=false;
  G_battlePaused=false;
  
  // 自动结算（延迟后返回竞技场）
  G.arenaSettleTimer=setTimeout(function(){
    showArenaResult();
  }, 1500);
}

function showArenaResult(){
  var info=G.arenaBattleInfo;
  if(!info)return;
  
  var difficulty=info.difficulty;
  var isWin=G.arenaIsWin;
  var reward=G.arenaReward||{gold:0,fame:0};
  
  // 更新状态
  G.arenaState.dailyChallengesUsed++;
  
  if(isWin){
    G.arenaState.winStreak++;
    if(G.arenaState.winStreak>(G.arenaState.maxWinStreak||0)){
      G.arenaState.maxWinStreak=G.arenaState.winStreak;
    }
    G.arenaState.totalWins++;
    // 记录最高难度
    var diffOrder=['easy','normal','hard','nightmare','mythic'];
    var curIdx=diffOrder.indexOf(G.arenaState.highestDifficulty||'easy');
    var thisIdx=diffOrder.indexOf(difficulty);
    if(thisIdx>curIdx)G.arenaState.highestDifficulty=difficulty;
    // 奖励已在 finishArenaBattle 中发放，这里不再重复
    
    // 自动提交排行榜数据

      var teamPower=0;
      for(var i=0;i<G.team.length;i++){
        if(G.team[i]) teamPower += calcHeroPower(G.team[i]);
      }
      submitLeaderboard('arena',G.arenaState.totalWins,{winStreak:G.arenaState.winStreak});
      submitLeaderboard('power',teamPower,{heroes:G.heroes?G.heroes.length:0});
    }
    
    // 检查竞技场成就
    checkAchievement('arena_1');

    checkAchievement('arena_3');

  var maxDamageUnit='',maxDamage=0;

    var s=G_battleStats[k];
    totalDamage+=s.damage||0;

    if((s.damage||0)>maxDamage){

  // 显示结果弹窗
  var diffNames={easy:'🟢简单',normal:'🟡普通',hard:'🔴困难'};
  var resultTitle=isWin?'🎉 竞技场胜利！':'💀 竞技场失败...';
  var resultContent=
    '<div style="text-align:center;margin:8px 0;font-size:12px">难度: '+diffNames[difficulty]+'</div>'+
    '<div style="text-align:center;font-size:18px;margin:16px 0">'+resultTitle+'</div>'+
    (isWin?
      '<div style="text-align:center;margin:8px 0">连胜: <b style="color:#2ed573">'+G.arenaState.winStreak+'</b></div>'+
      '<div style="text-align:center;margin:8px 0">奖励: <b style="color:#ffd700">💰'+reward.gold+'</b> <b style="color:#ff6b6b">🏆'+reward.fame+'</b></div>'
    :'<div style="text-align:center;margin:8px 0;color:var(--red)">连胜已重置</div>')+
    '<div style="margin-top:12px;padding:10px;background:rgba(0,0,0,0.3);border-radius:6px">'+
    '<div style="font-weight:bold;font-size:12px;margin-bottom:6px;color:var(--gold)">📊 战斗数据汇总</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px">'+
    '<span>⚔️ 总伤害: <b style="color:#ff6b6b">'+totalDamage+'</b></span>'+
    '<span>💥 暴击次数: <b style="color:#ff4757">'+totalCrit+'</b></span>'+

function exitArenaBattle(){
  // 清除自动结算定时器
  if(G.arenaSettleTimer){clearTimeout(G.arenaSettleTimer);G.arenaSettleTimer=null;}
  
  // 战斗还在进行中 → 根据实际战斗状态判断胜负
  if(G_battleRunning){
    var actualWin=false;
    if(G.arenaBattleUnits){
      var pAlive=G.arenaBattleUnits.playerUnits.filter(function(u){return u.alive}).length;
      var eAlive=G.arenaBattleUnits.enemyUnits.filter(function(u){return u.alive}).length;
      actualWin=pAlive>0&&eAlive===0;
    }
    if(actualWin){
      // 敌人都死了，是胜利，让 async runArenaBattle 自己检测并结算
      G_battleRunning=false;
      G_battlePaused=false;
      showToast('🎉 战斗胜利，正在结算...');
      return;
    }
    // 真的还在打或在失败边缘 → 确认退出视为失败
    if(!confirm('确定要退出竞技场战斗吗？\n此次挑战次数将扣除，并视为失败。'))return;
    G_battleRunning=false;
    G_battlePaused=false;
    _battleScene=null;
    G.arenaIsWin=false;
    G.arenaReward={gold:0,fame:0};
    showArenaResult();
    return;
  }
  
  // 战斗已自然结束 → 直接结算返回竞技场（信任已有的G.arenaIsWin）
  _battleScene=null;
  if(G.arenaBattleInfo){
    showArenaResult();
  }else{
    showToast('返回竞技场');
    var contentEl=document.getElementById('content');
    if(contentEl)renderArena(contentEl);
  }
}

function getHeroLevelCap(){
  var templeLevel=G.buildings.temple||0;
  var templeDef=BUILDING_DEFS.temple;
  return templeDef.heroLevelCapByLevel[templeLevel]||20;
}

function getExpToLevel(level){return Math.floor(50*Math.pow(1.25,level-1))}

function addHeroExp(hero,amount){
  var levelCap=getHeroLevelCap();
  if(hero.level>=levelCap)return false;
  hero.exp+=amount;
  var leveled=false;
  var newTalentPoints=0;
  while(hero.exp>=getExpToLevel(hero.level)&&hero.level<levelCap){
    hero.exp-=getExpToLevel(hero.level);
    hero.level++;
    leveled=true;
    const role=ROLES[hero.role];const qm=QUALITY_MULT[hero.quality];
    // 记录升级前的比例
    var hpRatio=hero.hp/hero.maxHP;
    var mpRatio=hero.mp/hero.maxMP;
    // 重新计算基础属性（与当前属性取最大值，确保异变/隐藏品质加成不被覆盖）
    hero.maxHP=Math.max(hero.maxHP, calcStat(role.baseHP, qm, hero.level));
    hero.atk=Math.max(hero.atk, calcStat(role.baseATK, qm, hero.level));
    hero.def=Math.max(hero.def, calcStat(role.baseDEF, qm, hero.level));
    hero.spd=Math.max(hero.spd, calcStat(role.baseSPD, qm, hero.level));
    hero.maxMP=Math.max(hero.maxMP, calcStat(role.baseMP, qm, hero.level));
    // 保持HP/MP比例（满血升级保持满血，残血升级按比例恢复）
    hero.hp=Math.max(1,Math.floor(hero.maxHP*hpRatio));
    hero.mp=Math.floor(hero.maxMP*mpRatio);
    // 升级获得天赋点：50级后开放，51-65级获得15点
    if(hero.level>TALENT_CONFIG.unlockLevel && hero.level<=(TALENT_CONFIG.unlockLevel+TALENT_CONFIG.maxPoints)){
      newTalentPoints++;
    }
  }
  // 超出上限的经验清零
  if(hero.level>=levelCap)hero.exp=0;
  // 如果有获得天赋点，显示提示
  if(newTalentPoints>0){
    hero.talentPoints=(hero.talentPoints||0)+newTalentPoints;
    showToast('🌟 '+hero.name+' 获得 '+newTalentPoints+' 点天赋点！');
  }
  return leveled;
}

function createBattleUnit(hero,isEnemy=false){

  return{
    hero:hero, isEnemy:isEnemy,

  };

function calcDamage(attacker,defender,skill=null){
  // 金手指：一击必杀（玩家攻击时）
  if(G_cheats.enabled && G_cheats.oneHitKill && !attacker.isEnemy){
    return{dmg:999999,crit:true,dodged:false};
  }
  // 金手指：无敌（玩家受击时）
  if(G_cheats.enabled && G_cheats.godMode && !defender.isEnemy){
    return{dmg:0,crit:false,dodged:true};
  }
  let atk=attacker.atk;
  let def=defender.def;
  
  // 获取职业数据
  const attackerRole=ROLES[attacker.role];
  const defenderRole=ROLES[defender.role];
  
  // buff/debuff
  attacker.buffs.forEach(b=>{if(b.stat==='atk')atk=Math.floor(atk*b.mult)});
  defender.buffs.forEach(b=>{if(b.stat==='def')def=Math.floor(def*b.mult)});
  
  // ===== 职业机制 =====
  
  // 战士：狂怒 - 生命值低于30%时攻击力提升50%
  if(attacker.role==='warrior' && attacker.hp/attacker.maxHP<0.3){
    atk=Math.floor(atk*1.5);
  }
  
  // 守护者：铁壁 - 受到伤害减少20%
  if(defender.role==='guardian'){
    def=Math.floor(def*1.2);
  }
  
  // 法师：奥术精通 - 技能伤害提升30%
  if(attacker.role==='mage' && skill){
    atk=Math.floor(atk*1.3);
  }
  
  // 游侠：精准 - 攻击无视目标20%防御
  if(attacker.role==='ranger'){
    def=Math.floor(def*0.8);
  }
  
  // 圣骑士：对亡灵伤害+50%
  if(attacker.role==='paladin' && defender.isUndead){
    atk=Math.floor(atk*1.5);
  }
  
  // 术士：DOT伤害+50%（在executeSkill中处理）
  
  // 基础伤害计算
  let mult=skill?skill.mult:1.0;
  let dmg=Math.max(1,Math.floor((atk*mult-def*0.5)*(0.9+Math.random()*0.2)));
  
  // 暴击计算（考虑职业暴击率 + 英雄特质暴击率）
  let crit=false;
  let critRate=attackerRole&&attackerRole.critRate?attackerRole.critRate:0.1;
  if(skill&&skill.critBonus)critRate+=skill.critBonus;
  // 英雄特质：狂战士 +8%暴击
  if(attacker.traits) attacker.traits.forEach(t=>{if(t.id==='berserker')critRate+=0.08});
  // 金手指模式下暴击率提升
  if(G_cheats.enabled) critRate+=0.1;
  
  // 刺客：暗影步 - 暴击伤害+50%
  let critDmg=attackerRole&&attackerRole.critDmg?attackerRole.critDmg:1.8;
  
  // 羁绊暴击加成
  if(attacker._bondCritRate) critRate+=attacker._bondCritRate;
  if(attacker._bondCritDmg) critDmg+=attacker._bondCritDmg;
  
  if(Math.random()<critRate){dmg=Math.floor(dmg*critDmg);crit=true}
  
  // 闪避计算（考虑职业闪避率 + 英雄特质闪避率）
  let dodgeChance=defenderRole&&defenderRole.dodgeRate?defenderRole.dodgeRate:0.05;
  defender.buffs.forEach(b=>{if(b.stat==='dodge')dodgeChance+=0.3});
  // 英雄特质：灵动 +8%闪避
  if(defender.traits) defender.traits.forEach(t=>{if(t.id==='nimble')dodgeChance+=0.08});
  // 羁绊闪避加成
  if(defender._bondDodge) dodgeChance+=defender._bondDodge;
  if(skill&&skill.alwaysHit)dodgeChance=0;
  if(Math.random()<dodgeChance)return{dmg:0,dodged:true,crit:false};
  
  // 术士：灵魂虹吸 - 造成伤害的15%转化为生命恢复
  if(attacker.role==='warlock' && !attacker.isEnemy){
    const heal=Math.floor(dmg*0.15);
    attacker.hp=Math.min(attacker.maxHP,attacker.hp+heal);
  }
  // 英雄特质：吸血鬼 - 造成伤害的5%吸血
  if(attacker.traits) attacker.traits.forEach(t=>{
    if(t.id==='vampire'){
      const heal=Math.floor(dmg*0.05);
      attacker.hp=Math.min(attacker.maxHP,attacker.hp+heal);
    }
  });
  
  return{dmg,crit,dodged:false};
}

    backstab: '{attacker}如影随形，瞬间出现在{target}身后！',
    poison_blade: '{attacker}的利刃泛着幽绿光芒，刺向{target}！',
    curse: '{attacker}低声吟唱诅咒咒语，{target}感到力量在流逝！',
    life_drain: '{attacker}伸出枯瘦的手，吸取{target}的生命力！',
  }
};

function getBattleDesc(type,attacker,target,skill){
  var tpl='';
  if(type==='skill'&&skill&&BATTLE_DESCRIPTIONS.skill[skill.id]){
    tpl=BATTLE_DESCRIPTIONS.skill[skill.id];
  }else if(BATTLE_DESCRIPTIONS[type]){
    tpl=pick(BATTLE_DESCRIPTIONS[type]);
  }
  if(!tpl)return '';
  return tpl.replace('{attacker}',attacker.icon+attacker.name).replace('{target}',target.icon+target.name);
}

// 连击追踪器
var G_comboCount={};
function getCombo(unit){return G_comboCount[unit.uid]||0}
function addCombo(unit){G_comboCount[unit.uid]=(G_comboCount[unit.uid]||0)+1;return G_comboCount[unit.uid]}
function resetCombo(unit){G_comboCount[unit.uid]=0}

function getValidTarget(unit,allUnits,targetType){
  const allies=allUnits.filter(u=>u.alive&&u.isEnemy===unit.isEnemy&&u!==unit);
  const enemies=allUnits.filter(u=>u.alive&&u.isEnemy!==unit.isEnemy);
  // 检查嘲讽
  if(targetType.includes('enemy')){
    const taunter=enemies.find(u=>u.buffs.some(b=>b.stat==='taunt'));
    if(taunter&&targetType==='single_enemy')return taunter;
  }
  switch(targetType){
    case 'single_enemy': return pick(enemies);
    case 'all_enemies': return enemies;
    case 'single_ally': return pick(allies.filter(u=>u.hp<u.maxHP))||pick(allies.length>0?allies:[unit]);
    case 'all_allies': return allUnits.filter(u=>u.alive&&u.isEnemy===unit.isEnemy);
    case 'self': return unit;
    default: return pick(enemies);
  }
}

async function executeSkill(user,target,skill,allUnits,logFn){
  const targets=Array.isArray(target)?target:[target];
  switch(skill.type){
    case 'damage':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const r=calcDamage(user,t,skill);
        if(r.dodged){logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，但 ${t.icon}${t.name} 闪避了！`,'info');return}
        let dmg=r.dmg;
        if(t.shield>0){const absorbed=Math.min(t.shield,dmg);t.shield-=absorbed;dmg-=absorbed}
        t.hp=Math.max(0,t.hp-dmg);
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name} 对 ${t.icon}${t.name} 造成 ${dmg} 点伤害${r.crit?' 💥暴击！':''}`,r.crit?'crit':'damage');
        if(skill.stunChance&&Math.random()<skill.stunChance){
          t.buffs.push({stat:'stun',duration:1,name:'眩晕'});
          logFn(`${t.icon}${t.name} 被眩晕了！`,'debuff');
        }
        if(skill.dot){
          t.dot.push({dmg:Math.floor(user.atk*skill.dot.dmgPct),duration:skill.dot.duration,name:'中毒'});
          logFn(`${t.icon}${t.name} 被施加了 ${skill.dot.name}！`,'debuff');
        }
        if(skill.debuff){
          const db=skill.debuff;
          if(db.stat==='all'){
            t.buffs.push({stat:'atk',mult:db.mult,duration:db.duration,name:'诅咒-攻'});
            t.buffs.push({stat:'def',mult:db.mult,duration:db.duration,name:'诅咒-防'});
          }else{
            t.buffs.push({stat:db.stat,mult:db.mult,duration:db.duration,name:'削弱'});
          }
          logFn(`${t.icon}${t.name} 被削弱了！`,'debuff');
        }
        if(t.hp<=0){t.alive=false;logFn(`${t.icon} ${t.name} 倒下了...`,'death')}
      });break;
    }
    case 'heal':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const heal=Math.floor(t.maxHP*skill.healPct);
        t.hp=Math.min(t.maxHP,t.hp+heal);
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，恢复 ${t.icon}${t.name} ${heal} 点生命`,'heal');
      });break;
    }
    case 'buff':{
      targets.forEach(t=>{
        if(!t.alive)return;
        t.buffs.push({...skill.buff,name:skill.name});
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，${t===user?'自身':'队友'}获得增益效果`,'buff');
      });break;
    }
    case 'shield':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const amt=Math.floor(t.maxHP*skill.shieldPct);
        t.shield+=amt;
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，为 ${t.icon}${t.name} 添加 ${amt} 点护盾`,'buff');
      });break;
    }
    case 'drain':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const r=calcDamage(user,t,skill);
        if(r.dodged){logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，但 ${t.icon}${t.name} 闪避了！`,'info');return}
        let dmg=r.dmg;
        if(t.shield>0){const absorbed=Math.min(t.shield,dmg);t.shield-=absorbed;dmg-=absorbed}
        t.hp=Math.max(0,t.hp-dmg);
        const healAmt=Math.floor(dmg*0.5);
        user.hp=Math.min(user.maxHP,user.hp+healAmt);
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，对 ${t.icon}${t.name} 造成 ${dmg} 伤害，恢复 ${healAmt} 生命`,'skill');
        if(t.hp<=0){t.alive=false;logFn(`${t.icon} ${t.name} 倒下了...`,'death')}
      });break;
    }
    case 'debuff':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const db=skill.debuff;
        if(db.stat==='all'){
          t.buffs.push({stat:'atk',mult:db.mult,duration:db.duration,name:'诅咒-攻'});
          t.buffs.push({stat:'def',mult:db.mult,duration:db.duration,name:'诅咒-防'});
        }else{
          t.buffs.push({stat:db.stat,mult:db.mult,duration:db.duration,name:'诅咒'});
        }
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，${t.icon}${t.name} 被诅咒了！`,'debuff');
      });break;
    }
    case 'cleanse':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const negCount=t.buffs.filter(b=>b.stat==='stun'||b.stat==='atk'&&b.mult<1||b.stat==='def'&&b.mult<1).length;
        t.buffs=t.buffs.filter(b=>!(b.stat==='stun'||(b.stat==='atk'&&b.mult<1)||(b.stat==='def'&&b.mult<1)));
        t.dot=[];
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，清除了 ${t.icon}${t.name} 的 ${negCount} 个负面效果`,'heal');
      });break;
    }
  }
}

// ==================== 智能战斗AI ====================
function smartChooseSkill(unit,allUnits){
  var role=unit.hero.role;
  var allies=allUnits.filter(function(u){return u.alive&&u.isEnemy===unit.isEnemy&&u!==unit});
  var enemies=allUnits.filter(function(u){return u.alive&&u.isEnemy!==unit.isEnemy});
  var allAlive=allUnits.filter(function(u){return u.alive});

  // 获取可用技能
  var available=[];
  var allSkillIds=[].concat(unit.hero.skills,unit.bonusSkills);
  allSkillIds.forEach(function(sid){
    var sk=SKILLS[sid];if(!sk)return;
    if(unit.mp<sk.mpCost)return;
    if(unit.cooldowns[sid]>0)return;
    available.push({id:sid,skill:sk});
  });
  if(available.length===0)return null;

  // 计算战场态势
  var allyHurtCount=allies.filter(function(a){return a.hp<a.maxHP*0.5}).length;
  var allyCriticalCount=allies.filter(function(a){return a.hp<a.maxHP*0.25}).length;
  var selfHurtPct=unit.hp/unit.maxHP;
  var enemyCount=enemies.length;
  var hasAllyDebuff=allies.some(function(a){return a.buffs.some(function(b){return b.stat==='stun'||(b.stat==='atk'&&b.mult<1)||(b.stat==='def'&&b.mult<1)})||a.dot.length>0});
  var hasEnemyBuff=enemies.some(function(e){return e.buffs.some(function(b){return b.stat==='taunt'})});
  var lowestAlly=null;var lowestPct=1;
  allies.concat([unit]).forEach(function(a){var p=a.hp/a.maxHP;if(p<lowestPct){lowestPct=p;lowestAlly=a}});
  var lowestEnemy=null;var lowestEnemyPct=1;
  enemies.forEach(function(e){var p=e.hp/e.maxHP;if(p<lowestEnemyPct){lowestEnemyPct=p;lowestEnemy=e}});

  // 按角色定位分策略
  if(role==='healer'){
    // 治愈者：优先治疗，其次净化
    if(allyCriticalCount>=2){
      var gh=available.find(function(s){return s.skill.type==='heal'&&s.skill.target==='all_allies'});
      if(gh)return gh;
    }
    if(allyHurtCount>0||selfHurtPct<0.6){
      var heal=available.find(function(s){return s.skill.type==='heal'&&s.skill.target==='single_ally'});
      if(heal)return heal;
      var gh2=available.find(function(s){return s.skill.type==='heal'});
      if(gh2)return gh2;
    }
    if(hasAllyDebuff){
      var cleanse=available.find(function(s){return s.skill.type==='cleanse'});
      if(cleanse)return cleanse;
    }
    return null; // 没治疗需求就普攻
  }

  if(role==='guardian'){
    // 守护者：嘲讽>铁壁>盾击
    if(!unit.buffs.some(function(b){return b.stat==='taunt'})){
      var taunt=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='taunt'});
      if(taunt&&enemyCount>1)return taunt;
    }
    if(allyHurtCount>=2){
      var iw=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='def'});
      if(iw)return iw;
    }
    var dmg=available.find(function(s){return s.skill.type==='damage'});
    if(dmg)return dmg;
    return null;
  }

  if(role==='paladin'){
    // 圣骑士：治疗>护盾>输出
    if(allyCriticalCount>=2){
      var gh=available.find(function(s){return s.skill.type==='heal'&&s.skill.target==='all_allies'});
      if(gh)return gh;
    }
    if(lowestAlly&&lowestPct<0.4){
      var ds=available.find(function(s){return s.skill.type==='shield'});
      if(ds)return ds;
      var heal=available.find(function(s){return s.skill.type==='heal'});
      if(heal)return heal;
    }
    var atk=available.find(function(s){return s.skill.type==='damage'});
    if(atk)return atk;
    return null;
  }

  if(role==='mage'){
    // 法师：AOE>护盾>单体爆发
    if(enemyCount>=2){
      var aoe=available.find(function(s){return s.skill.type==='damage'&&s.skill.target==='all_enemies'});
      if(aoe)return aoe;
    }
    if(allyHurtCount>=2){
      var sh=available.find(function(s){return s.skill.type==='shield'});
      if(sh)return sh;
    }
    // 单体高伤害
    var singles=available.filter(function(s){return s.skill.type==='damage'&&s.skill.target==='single_enemy'});
    singles.sort(function(a,b){return b.skill.mult-a.skill.mult});
    if(singles.length>0)return singles[0];
    return null;
  }

  if(role==='assassin'){
    // 刺客：暗影步(低血量时)>毒刃>背刺
    if(selfHurtPct<0.5){
      var ss=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='dodge'});
      if(ss)return ss;
    }
    // 优先给没DOT的目标上毒
    var poison=available.find(function(s){return s.skill.dot});
    if(poison){
      var noDotEnemy=enemies.find(function(e){return e.dot.length===0});
      if(noDotEnemy)return poison;
    }
    var highDmg=available.find(function(s){return s.skill.type==='damage'&&s.skill.mult>=1.5});
    if(highDmg)return highDmg;
    var anyDmg=available.find(function(s){return s.skill.type==='damage'});
    if(anyDmg)return anyDmg;
    return null;
  }

  if(role==='warlock'){
    // 术士：诅咒>生命汲取>灵魂灼烧
    var curse=available.find(function(s){return s.skill.type==='debuff'});
    if(curse){
      var noCurse=enemies.find(function(e){return !e.buffs.some(function(b){return b.stat==='atk'&&b.mult<1})});
      if(noCurse)return curse;
    }
    if(selfHurtPct<0.7){
      var drain=available.find(function(s){return s.skill.type==='drain'});
      if(drain)return drain;
    }
    var dot=available.find(function(s){return s.skill.dot});
    if(dot){
      var noDot=enemies.find(function(e){return e.dot.length===0});
      if(noDot)return dot;
    }
    var anyDmg=available.find(function(s){return s.skill.type==='damage'});
    if(anyDmg)return anyDmg;
    return null;
  }

  if(role==='ranger'){
    // 游侠：AOE>精准射击>陷阱
    if(enemyCount>=3){
      var aoe=available.find(function(s){return s.skill.type==='damage'&&s.skill.target==='all_enemies'});
      if(aoe)return aoe;
    }
    var aimed=available.find(function(s){return s.skill.type==='damage'&&s.skill.alwaysHit});
    if(aimed)return aimed;
    if(selfHurtPct<0.6&&!unit.buffs.some(function(b){return b.stat==='reflect'})){
      var trap=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='reflect'});
      if(trap)return trap;
    }
    var anyDmg=available.find(function(s){return s.skill.type==='damage'});
    if(anyDmg)return anyDmg;
    return null;
  }

  // 战士(默认)：先开buff>AOE>单体
  if(role==='warrior'){
    var atkBuff=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='atk'});
    if(atkBuff&&!unit.buffs.some(function(b){return b.stat==='atk'&&b.mult>1})){
      if(enemyCount>=2||enemies.some(function(e){return e.hp>e.maxHP*0.5}))return atkBuff;
    }
    if(enemyCount>=2){
      var aoe=available.find(function(s){return s.skill.type==='damage'&&s.skill.target==='all_enemies'});
      if(aoe)return aoe;
    }
    var dmg=available.find(function(s){return s.skill.type==='damage'});
    if(dmg)return dmg;
    return null;
  }

  // 兜底：优先伤害技能
  var anySkill=available.find(function(s){return s.skill.type==='damage'});
  if(anySkill)return anySkill;
  return available.length>0?available[0]:null;
}

// ==================== 全局战斗视觉辅助函数 ====================
var _battleScene=null;
var G_autoBattle=false;
var G_battleSpeed=1;
var G_currentStageId=1;
var G_battlePaused=false;
var G_battleRunning=false;

// 战斗统计数据（按角色存储）
var G_battleStats={};
var G_battleUnitIdCounter=0;

function resetBattleStats(){
  G_battleStats={};
  G_battleUnitIdCounter=0;
  updateBattleStatsBoard();
}

function getUnitKey(unit){
  // 使用单位的唯一ID，如果没有则生成一个
  if(!unit.battleId){
    G_battleUnitIdCounter++;
    unit.battleId=(unit.isEnemy?'E':'P')+'_'+G_battleUnitIdCounter;
  }
  return unit.battleId;
}

function recordBattleStat(unit,stat,value){
  var key=getUnitKey(unit);
  if(!G_battleStats[key]){
    G_battleStats[key]={
      name:unit.name,
      icon:unit.icon,
      isEnemy:unit.isEnemy,
      battleId:unit.battleId,
      damage:0,heal:0,damageTaken:0,control:0,dodge:0,crit:0
    };
  }
  G_battleStats[key][stat]=(G_battleStats[key][stat]||0)+value;
  updateBattleStatsBoard();
}

function forceEndBattle(){
  if(!G_battleRunning){
    // 不在战斗中，直接返回关卡选择
    hideBattlePanel();
    switchTab('battle');
    return;
  }
  // 战斗中，需要确认
  var confirmed=confirm('确定要结束战斗吗？\n这将视为战斗失败。');
  if(confirmed){
    G_battleRunning=false;
    G_battlePaused=false;
    G_autoBattle=false;
    showToast('战斗已结束');
    hideBattlePanel();
    switchTab('battle');
  }
  // 点击取消时不做任何操作
}

function updateBattleStatsBoard(){
  // 计算统计数据（不分面板类型）
  var allyStats=[];
  var enemyStats=[];
  
  for(var key in G_battleStats){
    var stat=G_battleStats[key];
    if(stat.isEnemy){
      enemyStats.push(stat);
    }else{
      allyStats.push(stat);
    }
  }
  
  // 按输出排序
  allyStats.sort(function(a,b){return b.damage-a.damage;});
  enemyStats.sort(function(a,b){return b.damage-a.damage;});
  
  function renderStatRow(stat){
    var idNum=stat.battleId?stat.battleId.split('_')[1]:'';
    var displayName=stat.name+(idNum?' <span style="color:#888;font-size:9px">#'+idNum+'</span>':'');
    return '<div style="padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.1)">'
      +'<div style="display:flex;align-items:center;gap:4px;margin-bottom:2px">'
      +'<span style="font-size:14px">'+stat.icon+'</span>'
      +'<span style="flex:1;font-weight:bold;font-size:11px">'+displayName+'</span>'
      +'</div>'
      +'<div style="display:flex;gap:4px;flex-wrap:wrap;font-size:10px">'
      +'<span style="color:#ff6b6b">⚔️'+stat.damage+'</span>'
      +'<span style="color:#2ed573">💚'+stat.heal+'</span>'
      +'<span style="color:#ffa502">🛡️'+stat.damageTaken+'</span>'
      +'<span style="color:#a55eea">🎯'+stat.control+'</span>'
      +'<span style="color:#70a1ff">💨'+stat.dodge+'</span>'
      +'<span style="color:#ff4757">💥'+stat.crit+'</span>'
      +'</div>'
      +'</div>';
  }
  
  function renderToPanel(allyEl,enemyEl){
    if(!allyEl||!enemyEl)return;
    allyEl.innerHTML=allyStats.length>0?allyStats.map(renderStatRow).join(''):'<div class="text-dim">暂无数据</div>';
    enemyEl.innerHTML=enemyStats.length>0?enemyStats.map(renderStatRow).join(''):'<div class="text-dim">暂无数据</div>';
  }
  
  // 更新普通战斗面板
  renderToPanel(
    document.getElementById('ally-stats'),
    document.getElementById('enemy-stats')
  );
  
  // 更新竞技场战斗面板
  renderToPanel(
    document.getElementById('arena-ally-stats'),
    document.getElementById('arena-enemy-stats')
  );
}

  showToast(G_battlePaused?'⏸️ 战斗已暂停':'▶️ 战斗继续');

function setBattleSpeed(spd){
