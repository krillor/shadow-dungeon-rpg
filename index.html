var G_comboCount={};
function getCombo(unit){return G_comboCount[unit.uid]||0}
function addCombo(unit){G_comboCount[unit.uid]=(G_comboCount[unit.uid]||0)+1;return G_comboCount[unit.uid]}
function resetCombo(unit){G_comboCount[unit.uid]=0}

function getValidTarget(unit,allUnits,targetType){
  const allies=allUnits.filter(u=>u.alive&&u.isEnemy===unit.isEnemy&&u!==unit);
  const enemies=allUnits.filter(u=>u.alive&&u.isEnemy!==unit.isEnemy);
  // 检查嘲讽
  if(targetType.includes('enemy')){
    const taunter=enemies.find(u=>u.buffs.some(b=>b.stat==='taunt'));
    if(taunter&&targetType==='single_enemy')return taunter;
  }
  switch(targetType){
    case 'single_enemy': return pick(enemies);
    case 'all_enemies': return enemies;
    case 'single_ally': return pick(allies.filter(u=>u.hp<u.maxHP))||pick(allies.length>0?allies:[unit]);
    case 'all_allies': return allUnits.filter(u=>u.alive&&u.isEnemy===unit.isEnemy);
    case 'self': return unit;
    default: return pick(enemies);
  }
}

async function executeSkill(user,target,skill,allUnits,logFn){
  const targets=Array.isArray(target)?target:[target];
  switch(skill.type){
    case 'damage':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const r=calcDamage(user,t,skill);
        if(r.dodged){logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，但 ${t.icon}${t.name} 闪避了！`,'info');return}
        let dmg=r.dmg;
        if(t.shield>0){const absorbed=Math.min(t.shield,dmg);t.shield-=absorbed;dmg-=absorbed}
        t.hp=Math.max(0,t.hp-dmg);
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name} 对 ${t.icon}${t.name} 造成 ${dmg} 点伤害${r.crit?' 💥暴击！':''}`,r.crit?'crit':'damage');
        if(skill.stunChance&&Math.random()<skill.stunChance){
          t.buffs.push({stat:'stun',duration:1,name:'眩晕'});
          logFn(`${t.icon}${t.name} 被眩晕了！`,'debuff');
        }
        if(skill.dot){
          t.dot.push({dmg:Math.floor(user.atk*skill.dot.dmgPct),duration:skill.dot.duration,name:'中毒'});
          logFn(`${t.icon}${t.name} 被施加了 ${skill.dot.name}！`,'debuff');
        }
        if(skill.debuff){
          const db=skill.debuff;
          if(db.stat==='all'){
            t.buffs.push({stat:'atk',mult:db.mult,duration:db.duration,name:'诅咒-攻'});
            t.buffs.push({stat:'def',mult:db.mult,duration:db.duration,name:'诅咒-防'});
          }else{
            t.buffs.push({stat:db.stat,mult:db.mult,duration:db.duration,name:'削弱'});
          }
          logFn(`${t.icon}${t.name} 被削弱了！`,'debuff');
        }
        if(t.hp<=0){t.alive=false;logFn(`${t.icon} ${t.name} 倒下了...`,'death')}
      });break;
    }
    case 'heal':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const heal=Math.floor(t.maxHP*skill.healPct);
        t.hp=Math.min(t.maxHP,t.hp+heal);
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，恢复 ${t.icon}${t.name} ${heal} 点生命`,'heal');
      });break;
    }
    case 'buff':{
      targets.forEach(t=>{
        if(!t.alive)return;
        t.buffs.push({...skill.buff,name:skill.name});
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，${t===user?'自身':'队友'}获得增益效果`,'buff');
      });break;
    }
    case 'shield':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const amt=Math.floor(t.maxHP*skill.shieldPct);
        t.shield+=amt;
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，为 ${t.icon}${t.name} 添加 ${amt} 点护盾`,'buff');
      });break;
    }
    case 'drain':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const r=calcDamage(user,t,skill);
        if(r.dodged){logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，但 ${t.icon}${t.name} 闪避了！`,'info');return}
        let dmg=r.dmg;
        if(t.shield>0){const absorbed=Math.min(t.shield,dmg);t.shield-=absorbed;dmg-=absorbed}
        t.hp=Math.max(0,t.hp-dmg);
        const healAmt=Math.floor(dmg*0.5);
        user.hp=Math.min(user.maxHP,user.hp+healAmt);
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，对 ${t.icon}${t.name} 造成 ${dmg} 伤害，恢复 ${healAmt} 生命`,'skill');
        if(t.hp<=0){t.alive=false;logFn(`${t.icon} ${t.name} 倒下了...`,'death')}
      });break;
    }
    case 'debuff':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const db=skill.debuff;
        if(db.stat==='all'){
          t.buffs.push({stat:'atk',mult:db.mult,duration:db.duration,name:'诅咒-攻'});
          t.buffs.push({stat:'def',mult:db.mult,duration:db.duration,name:'诅咒-防'});
        }else{
          t.buffs.push({stat:db.stat,mult:db.mult,duration:db.duration,name:'诅咒'});
        }
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，${t.icon}${t.name} 被诅咒了！`,'debuff');
      });break;
    }
    case 'cleanse':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const negCount=t.buffs.filter(b=>b.stat==='stun'||b.stat==='atk'&&b.mult<1||b.stat==='def'&&b.mult<1).length;
        t.buffs=t.buffs.filter(b=>!(b.stat==='stun'||(b.stat==='atk'&&b.mult<1)||(b.stat==='def'&&b.mult<1)));
        t.dot=[];
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，清除了 ${t.icon}${t.name} 的 ${negCount} 个负面效果`,'heal');
      });break;
    }
  }
}

// ==================== 智能战斗AI ====================
function smartChooseSkill(unit,allUnits){
  var role=unit.hero.role;
  var allies=allUnits.filter(function(u){return u.alive&&u.isEnemy===unit.isEnemy&&u!==unit});
  var enemies=allUnits.filter(function(u){return u.alive&&u.isEnemy!==unit.isEnemy});
  var allAlive=allUnits.filter(function(u){return u.alive});

  // 获取可用技能
  var available=[];
  var allSkillIds=[].concat(unit.hero.skills,unit.bonusSkills);
  allSkillIds.forEach(function(sid){
    var sk=SKILLS[sid];if(!sk)return;
    if(unit.mp<sk.mpCost)return;
    if(unit.cooldowns[sid]>0)return;
    available.push({id:sid,skill:sk});
  });
  if(available.length===0)return null;

  // 计算战场态势
  var allyHurtCount=allies.filter(function(a){return a.hp<a.maxHP*0.5}).length;
  var allyCriticalCount=allies.filter(function(a){return a.hp<a.maxHP*0.25}).length;
  var selfHurtPct=unit.hp/unit.maxHP;
  var enemyCount=enemies.length;
  var hasAllyDebuff=allies.some(function(a){return a.buffs.some(function(b){return b.stat==='stun'||(b.stat==='atk'&&b.mult<1)||(b.stat==='def'&&b.mult<1)})||a.dot.length>0});
  var hasEnemyBuff=enemies.some(function(e){return e.buffs.some(function(b){return b.stat==='taunt'})});
  var lowestAlly=null;var lowestPct=1;
  allies.concat([unit]).forEach(function(a){var p=a.hp/a.maxHP;if(p<lowestPct){lowestPct=p;lowestAlly=a}});
  var lowestEnemy=null;var lowestEnemyPct=1;
  enemies.forEach(function(e){var p=e.hp/e.maxHP;if(p<lowestEnemyPct){lowestEnemyPct=p;lowestEnemy=e}});

  // 按角色定位分策略
  if(role==='healer'){
    // 治愈者：优先治疗，其次净化
    if(allyCriticalCount>=2){
      var gh=available.find(function(s){return s.skill.type==='heal'&&s.skill.target==='all_allies'});
      if(gh)return gh;
    }
    if(allyHurtCount>0||selfHurtPct<0.6){
      var heal=available.find(function(s){return s.skill.type==='heal'&&s.skill.target==='single_ally'});
      if(heal)return heal;
      var gh2=available.find(function(s){return s.skill.type==='heal'});
      if(gh2)return gh2;
    }
    if(hasAllyDebuff){
      var cleanse=available.find(function(s){return s.skill.type==='cleanse'});
      if(cleanse)return cleanse;
    }
    return null; // 没治疗需求就普攻
  }

  if(role==='guardian'){
    // 守护者：嘲讽>铁壁>盾击
    if(!unit.buffs.some(function(b){return b.stat==='taunt'})){
      var taunt=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='taunt'});
      if(taunt&&enemyCount>1)return taunt;
    }
    if(allyHurtCount>=2){
      var iw=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='def'});
      if(iw)return iw;
    }
    var dmg=available.find(function(s){return s.skill.type==='damage'});
    if(dmg)return dmg;
    return null;
  }

  if(role==='paladin'){
    // 圣骑士：治疗>护盾>输出
    if(allyCriticalCount>=2){
      var gh=available.find(function(s){return s.skill.type==='heal'&&s.skill.target==='all_allies'});
      if(gh)return gh;
    }
    if(lowestAlly&&lowestPct<0.4){
      var ds=available.find(function(s){return s.skill.type==='shield'});
      if(ds)return ds;
      var heal=available.find(function(s){return s.skill.type==='heal'});
      if(heal)return heal;
    }
    var atk=available.find(function(s){return s.skill.type==='damage'});
    if(atk)return atk;
    return null;
  }

  if(role==='mage'){
    // 法师：AOE>护盾>单体爆发
    if(enemyCount>=2){
      var aoe=available.find(function(s){return s.skill.type==='damage'&&s.skill.target==='all_enemies'});
      if(aoe)return aoe;
    }
    if(allyHurtCount>=2){
      var sh=available.find(function(s){return s.skill.type==='shield'});
      if(sh)return sh;
    }
    // 单体高伤害
    var singles=available.filter(function(s){return s.skill.type==='damage'&&s.skill.target==='single_enemy'});
    singles.sort(function(a,b){return b.skill.mult-a.skill.mult});
    if(singles.length>0)return singles[0];
    return null;
  }

  if(role==='assassin'){
    // 刺客：暗影步(低血量时)>毒刃>背刺
    if(selfHurtPct<0.5){
      var ss=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='dodge'});
      if(ss)return ss;
    }
    // 优先给没DOT的目标上毒
    var poison=available.find(function(s){return s.skill.dot});
    if(poison){
      var noDotEnemy=enemies.find(function(e){return e.dot.length===0});
      if(noDotEnemy)return poison;
    }
    var highDmg=available.find(function(s){return s.skill.type==='damage'&&s.skill.mult>=1.5});
    if(highDmg)return highDmg;
    var anyDmg=available.find(function(s){return s.skill.type==='damage'});
    if(anyDmg)return anyDmg;
    return null;
  }

  if(role==='warlock'){
    // 术士：诅咒>生命汲取>灵魂灼烧
    var curse=available.find(function(s){return s.skill.type==='debuff'});
    if(curse){
      var noCurse=enemies.find(function(e){return !e.buffs.some(function(b){return b.stat==='atk'&&b.mult<1})});
      if(noCurse)return curse;
    }
    if(selfHurtPct<0.7){
      var drain=available.find(function(s){return s.skill.type==='drain'});
      if(drain)return drain;
    }
    var dot=available.find(function(s){return s.skill.dot});
    if(dot){
      var noDot=enemies.find(function(e){return e.dot.length===0});
      if(noDot)return dot;
    }
    var anyDmg=available.find(function(s){return s.skill.type==='damage'});
    if(anyDmg)return anyDmg;
    return null;
  }

  if(role==='ranger'){
    // 游侠：AOE>精准射击>陷阱
    if(enemyCount>=3){
      var aoe=available.find(function(s){return s.skill.type==='damage'&&s.skill.target==='all_enemies'});
      if(aoe)return aoe;
    }
    var aimed=available.find(function(s){return s.skill.type==='damage'&&s.skill.alwaysHit});
    if(aimed)return aimed;
    if(selfHurtPct<0.6&&!unit.buffs.some(function(b){return b.stat==='reflect'})){
      var trap=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='reflect'});
      if(trap)return trap;
    }
    var anyDmg=available.find(function(s){return s.skill.type==='damage'});
    if(anyDmg)return anyDmg;
    return null;
  }

  // 战士(默认)：先开buff>AOE>单体
  if(role==='warrior'){
    var atkBuff=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='atk'});
    if(atkBuff&&!unit.buffs.some(function(b){return b.stat==='atk'&&b.mult>1})){
      if(enemyCount>=2||enemies.some(function(e){return e.hp>e.maxHP*0.5}))return atkBuff;
    }
    if(enemyCount>=2){
      var aoe=available.find(function(s){return s.skill.type==='damage'&&s.skill.target==='all_enemies'});
      if(aoe)return aoe;
    }
    var dmg=available.find(function(s){return s.skill.type==='damage'});
    if(dmg)return dmg;
    return null;
  }

  // 兜底：优先伤害技能
  var anySkill=available.find(function(s){return s.skill.type==='damage'});
  if(anySkill)return anySkill;
  return available.length>0?available[0]:null;
}

// ==================== 全局战斗视觉辅助函数 ====================
var _battleScene=null;
var G_autoBattle=false;
var G_battleSpeed=1;
var G_currentStageId=1;
var G_battlePaused=false;
var G_battleRunning=false;

// 战斗统计数据（按角色存储）
var G_battleStats={};
var G_battleUnitIdCounter=0;

function resetBattleStats(){
  G_battleStats={};
  G_battleUnitIdCounter=0;
  updateBattleStatsBoard();
}

function getUnitKey(unit){
  // 使用单位的唯一ID，如果没有则生成一个
  if(!unit.battleId){
    G_battleUnitIdCounter++;
    unit.battleId=(unit.isEnemy?'E':'P')+'_'+G_battleUnitIdCounter;
  }
  return unit.battleId;
}

function recordBattleStat(unit,stat,value){
  var key=getUnitKey(unit);
  if(!G_battleStats[key]){
    G_battleStats[key]={
      name:unit.name,
      icon:unit.icon,
      isEnemy:unit.isEnemy,
      battleId:unit.battleId,
      damage:0,heal:0,damageTaken:0,control:0,dodge:0,crit:0
    };
  }
  G_battleStats[key][stat]=(G_battleStats[key][stat]||0)+value;
  updateBattleStatsBoard();
}

function forceEndBattle(){
  if(!G_battleRunning){
    // 不在战斗中，直接返回关卡选择
    hideBattlePanel();
    switchTab('battle');
    return;
  }
  // 战斗中，需要确认
  var confirmed=confirm('确定要结束战斗吗？\n这将视为战斗失败。');
  if(confirmed){
    G_battleRunning=false;
    G_battlePaused=false;
    G_autoBattle=false;
    showToast('战斗已结束');
    hideBattlePanel();
    switchTab('battle');
  }
  // 点击取消时不做任何操作
}

function updateBattleStatsBoard(){
  // 计算统计数据（不分面板类型）
  var allyStats=[];
  var enemyStats=[];
  
  for(var key in G_battleStats){
    var stat=G_battleStats[key];
    if(stat.isEnemy){
      enemyStats.push(stat);
    }else{
      allyStats.push(stat);
    }
  }
  
  // 按输出排序
  allyStats.sort(function(a,b){return b.damage-a.damage;});
  enemyStats.sort(function(a,b){return b.damage-a.damage;});
  
  function renderStatRow(stat){
    var idNum=stat.battleId?stat.battleId.split('_')[1]:'';
    var displayName=stat.name+(idNum?' <span style="color:#888;font-size:9px">#'+idNum+'</span>':'');
    return '<div style="padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.1)">'
      +'<div style="display:flex;align-items:center;gap:4px;margin-bottom:2px">'
      +'<span style="font-size:14px">'+stat.icon+'</span>'
      +'<span style="flex:1;font-weight:bold;font-size:11px">'+displayName+'</span>'
      +'</div>'
      +'<div style="display:flex;gap:4px;flex-wrap:wrap;font-size:10px">'
      +'<span style="color:#ff6b6b">⚔️'+stat.damage+'</span>'
      +'<span style="color:#2ed573">💚'+stat.heal+'</span>'
      +'<span style="color:#ffa502">🛡️'+stat.damageTaken+'</span>'
      +'<span style="color:#a55eea">🎯'+stat.control+'</span>'
      +'<span style="color:#70a1ff">💨'+stat.dodge+'</span>'
      +'<span style="color:#ff4757">💥'+stat.crit+'</span>'
      +'</div>'
      +'</div>';
  }
  
  function renderToPanel(allyEl,enemyEl){
    if(!allyEl||!enemyEl)return;
    allyEl.innerHTML=allyStats.length>0?allyStats.map(renderStatRow).join(''):'<div class="text-dim">暂无数据</div>';
    enemyEl.innerHTML=enemyStats.length>0?enemyStats.map(renderStatRow).join(''):'<div class="text-dim">暂无数据</div>';
  }
  
  // 更新普通战斗面板
  renderToPanel(
    document.getElementById('ally-stats'),
    document.getElementById('enemy-stats')
  );
  
  // 更新竞技场战斗面板
  renderToPanel(
    document.getElementById('arena-ally-stats'),
    document.getElementById('arena-enemy-stats')
  );
}

  G_battlePaused=!G_battlePaused;
  showToast(G_battlePaused?'⏸️ 战斗已暂停':'▶️ 战斗继续');
  updatePauseButton();
}

  var btn=document.getElementById('battle-pause-btn');

    btn.textContent=G_battlePaused?'▶️ 继续':'⏸️ 暂停';

function setBattleSpeed(spd){

async function runBattle(stageId){
  // 如果战斗已在运行，不重复启动
  if(G_battleRunning){return;}
  G_battleRunning=true;
  G_battlePaused=false;
  updatePauseButton();
  
  const stage=getStage(stageId);
  if(!stage){G_battleRunning=false;return;}
  const teamHeroes=G.team.filter(h=>h!==null);
  if(teamHeroes.length===0){showToast('请先编队！');G_battleRunning=false;return;}

  let playerUnits=teamHeroes.map(h=>createBattleUnit(h,false));
  let enemyUnits=stage.enemies.map(e=>{
    const tpl=HERO_TEMPLATES.find(t=>t.name===e.name)||HERO_TEMPLATES.find(t=>t.role===e.role&&t.quality===e.quality);
    const fakeHero=tpl?{...createHero(tpl.id,e.level),name:e.name,icon:e.icon,skills:e.skills,bonusSkills:[]}
      :{name:e.name,icon:e.icon,role:e.role,quality:e.quality,level:e.level,skills:e.skills,bonusSkills:[],
        maxHP:calcStat(ROLES[e.role]?ROLES[e.role].baseHP:100,QUALITY_MULT[e.quality]||1,e.level),
        atk:calcStat(ROLES[e.role]?ROLES[e.role].baseATK:15,QUALITY_MULT[e.quality]||1,e.level),
        def:calcStat(ROLES[e.role]?ROLES[e.role].baseDEF:10,QUALITY_MULT[e.quality]||1,e.level),
        spd:calcStat(ROLES[e.role]?ROLES[e.role].baseSPD:10,QUALITY_MULT[e.quality]||1,e.level),
        maxMP:calcStat(ROLES[e.role]?ROLES[e.role].baseMP:40,QUALITY_MULT[e.quality]||1,e.level),
        hp:0,mp:0,equipment:{weapon:null,armor:null,accessory:null}};
    fakeHero.hp=fakeHero.maxHP;fakeHero.mp=fakeHero.maxMP;
    return createBattleUnit(fakeHero,true);
  });
  let allUnits=[...playerUnits,...enemyUnits];
  
  // 初始化战斗统计数据
  resetBattleStats();

  // 显示战斗面板，切换到战斗页（自动推图时跳过UI切换，后台执行）
  if(!G_autoBattle){
    currentTab='battle';
    document.querySelectorAll('.nav-btn').forEach(b=>{
      b.classList.toggle('active',b.dataset.tab==='battle');
    });
  }
  var battlePanel=document.getElementById('battle-panel');
  if(!battlePanel){showToast('战斗面板加载失败');G_battleRunning=false;return;}
  if(!G_autoBattle){
    battlePanel.style.display='';
    document.getElementById('content').style.display='none';
  }
  const logEl=document.getElementById('battle-log');
  const playerTeamEl=document.getElementById('player-team');
  const enemyTeamEl=document.getElementById('enemy-team');
  const battleInfoEl=document.getElementById('battle-info');
  const battleScene=document.getElementById('battle-scene');
  if(!logEl||!playerTeamEl||!enemyTeamEl||!battleInfoEl||!battleScene){showToast('战斗元素加载失败');G_battleRunning=false;return;}
  _battleScene=battleScene;
  var pbbRound=0;
  const roundBadge=document.getElementById('battle-round-badge');
  logEl.innerHTML='';
  battleInfoEl.innerHTML=`<div class="log-title">⚔️ 第${stage.id}章：${stage.name}</div><div class="text-dim text-sm">${stage.desc}</div>`;

  function log(msg,cls){
    cls=cls||'info';
    var line=document.createElement('div');
    line.className='log-line log-'+cls;
    line.textContent=msg;
    logEl.appendChild(line);
    logEl.scrollTop=logEl.scrollHeight;
  }

  function renderTeams(){
    playerTeamEl.innerHTML=playerUnits.map(u=>{
      const hpPct=Math.max(0,(u.hp/u.maxHP)*100);
      const mpPct=Math.max(0,(u.mp/u.maxMP)*100);
      const shieldPct=u.maxHP>0?Math.min(100,(u.shield/u.maxHP)*100):0;
      const isLow=hpPct<30;
      const roleIcon=ROLES[u.hero.role]?ROLES[u.hero.role].icon:'⚔️';
      const buffsHTML=u.buffs.map(b=>{
        const isPos=b.mult>1||b.stat==='taunt'||b.stat==='dodge'||b.stat==='reflect'||b.stat==='stun';
        return '<span class="buff-tag '+(isPos?'buff-positive':'buff-negative')+'">'+(b.name||b.stat)+(b.duration>0?'('+b.duration+')':'')+'</span>';
      }).join('');
      const dotsHTML=u.dot.map(d=>'<span class="buff-tag buff-dot">'+d.name+'('+d.duration+')</span>').join('');
      return '<div class="battle-unit ally-unit '+(u.alive?'':'dead')+'" data-battle-uid="'+u.name+'-'+u.icon+'">'
        +'<div class="unit-avatar-wrap">'
        +'<div class="unit-role-icon">'+roleIcon+'</div>'
        +'<div class="unit-avatar quality-'+u.hero.quality+'">'+u.icon+'</div>'
        +'<div class="unit-level">'+u.hero.level+'</div>'
        +'</div>'
        +'<div class="unit-name">'+u.name+'</div>'
        +'<div class="unit-bars">'
        +'<div class="unit-bar"><span class="unit-bar-label">HP</span><div class="unit-bar-track"><div class="unit-bar-fill hp '+(isLow?'low':'')+'" style="width:'+hpPct+'%"></div></div><span class="unit-bar-val">'+Math.max(0,u.hp)+'/'+u.maxHP+'</span></div>'
        +'<div class="unit-bar"><span class="unit-bar-label">MP</span><div class="unit-bar-track"><div class="unit-bar-fill mp" style="width:'+mpPct+'%"></div></div><span class="unit-bar-val">'+u.mp+'/'+u.maxMP+'</span></div>'
        +(u.shield>0?'<div class="unit-bar unit-shield-bar"><span class="unit-bar-label" style="color:#54a0ff">🛡</span><div class="unit-bar-track"><div class="unit-bar-fill shield-bar" style="width:'+shieldPct+'%"></div></div><span class="unit-bar-val" style="color:#54a0ff">'+u.shield+'</span></div>':'')
        +'</div>'
        +'<div class="unit-buffs">'+buffsHTML+dotsHTML+'</div>'
        +'</div>';
    }).join('');
    enemyTeamEl.innerHTML=enemyUnits.map(u=>{
      const hpPct=Math.max(0,(u.hp/u.maxHP)*100);
      const shieldPct=u.maxHP>0?Math.min(100,(u.shield/u.maxHP)*100):0;
      const isLow=hpPct<30;
      const roleIcon=ROLES[u.hero.role]?ROLES[u.hero.role].icon:'⚔️';
      const buffsHTML=u.buffs.map(b=>{
        const isPos=b.mult>1||b.stat==='taunt'||b.stat==='dodge'||b.stat==='reflect'||b.stat==='stun';
        return '<span class="buff-tag '+(isPos?'buff-positive':'buff-negative')+'">'+(b.name||b.stat)+(b.duration>0?'('+b.duration+')':'')+'</span>';
      }).join('');
      const dotsHTML=u.dot.map(d=>'<span class="buff-tag buff-dot">'+d.name+'('+d.duration+')</span>').join('');
      return '<div class="battle-unit enemy-unit '+(u.alive?'':'dead')+'" data-battle-uid="'+u.name+'-'+u.icon+'">'
        +'<div class="unit-avatar-wrap">'
        +'<div class="unit-role-icon">'+roleIcon+'</div>'
        +'<div class="unit-avatar quality-'+u.hero.quality+'">'+u.icon+'</div>'
        +'<div class="unit-level">'+u.hero.level+'</div>'
        +'</div>'
        +'<div class="unit-name">'+u.name+'</div>'
        +'<div class="unit-bars">'
        +'<div class="unit-bar"><span class="unit-bar-label">HP</span><div class="unit-bar-track"><div class="unit-bar-fill hp '+(isLow?'low':'')+'" style="width:'+hpPct+'%"></div></div><span class="unit-bar-val">'+Math.max(0,u.hp)+'/'+u.maxHP+'</span></div>'
        +(u.shield>0?'<div class="unit-bar unit-shield-bar"><span class="unit-bar-label" style="color:#54a0ff">🛡</span><div class="unit-bar-track"><div class="unit-bar-fill shield-bar" style="width:'+shieldPct+'%"></div></div><span class="unit-bar-val" style="color:#54a0ff">'+u.shield+'</span></div>':'')
        +'</div>'
        +'<div class="unit-buffs">'+buffsHTML+dotsHTML+'</div>'
        +'</div>';
    }).join('');
  }

  renderTeams();
  log('⚔️ 战斗开始！','title');
  await sleep(600);

  let round=0;
  const maxRounds=30;

  while(round<maxRounds){
    round++;
    pbbRound=round;
    roundBadge.textContent='回合 '+round;
    log('—— 第 '+round+' 回合 ——','title');
    // 每3回合有概率触发探索事件（地下城堡风格）
    if(round%3===0 && round<maxRounds-2){
      triggerExploreEvent(log);
      await sleep(200);
    }
    await sleep(300);

    allUnits.filter(u=>u.alive).forEach(u=>{
      // 治愈者：生命链接 - 每回合自动恢复5%生命值
      if(u.role==='healer' && !u.isEnemy){
        const regen=Math.floor(u.maxHP*0.05);
        u.hp=Math.min(u.maxHP,u.hp+regen);
        showFloat(u,'+'+regen+' 生命恢复','heal');
      }
      
      u.dot=u.dot.filter(d=>{
        // 术士：DOT伤害+50%
        let dotDmg=d.dmg;
        if(d.sourceRole==='warlock'){
          dotDmg=Math.floor(dotDmg*1.5);
        }
        u.hp=Math.max(0,u.hp-dotDmg);
        log(u.icon+u.name+' 受到 '+d.name+'，损失 '+dotDmg+' 生命','debuff');
        showFloat(u,'-'+dotDmg+' '+d.name,'damage');
        animUnit(u,'hit',300);
        // 记录DOT承伤
        recordBattleStat(u,'damageTaken',dotDmg);
        
        // 圣骑士：圣光庇护 - 受到致命伤害时保留1点生命
        if(u.hp<=0 && u.role==='paladin' && !u.isEnemy && !u.deathDefyUsed){
          u.hp=1;
          u.deathDefyUsed=true;
          log(u.icon+' '+u.name+' 触发圣光庇护，保留1点生命！','heal');
          showFloat(u,'圣光庇护！','heal');
        }else if(u.hp<=0){
          u.alive=false;
          log(u.icon+' '+u.name+' 倒下了...','death');
          animUnit(u,'dying',700);
        }
        d.duration--;
        return d.duration>0;
      });
      u.buffs=u.buffs.filter(b=>{b.duration--;return b.duration>0});
    });
    renderTeams();
    await sleep(200);

    if(!playerUnits.some(u=>u.alive)){log('💀 战斗失败...队伍全军覆没。','death');break}
    if(!enemyUnits.some(u=>u.alive)){log('🎉 战斗胜利！','title');break}

    const acting=[...allUnits.filter(u=>u.alive)].sort((a,b)=>b.spd-a.spd);

    for(const unit of acting){
      if(!unit.alive)continue;
      highlightUnit(unit);
      await sleep(200);

      if(unit.buffs.some(b=>b.stat==='stun')){
        log(unit.icon+' '+unit.name+' 处于眩晕状态，无法行动','info');
        showFloat(unit,'眩晕!','debuff-text');
        await sleep(300);
        clearHighlight();
        continue;
      }

      const allSkillIds=[...unit.hero.skills,...unit.bonusSkills];
      let chosenSkill=null;
      let skillId=null;

      // 智能AI选择技能
      const smartChoice=smartChooseSkill(unit,allUnits);
      if(smartChoice){
        skillId=smartChoice.id;
        chosenSkill=smartChoice.skill;
      }

      if(chosenSkill){
        // 金手指：无限蓝
        if(!(G_cheats.enabled && G_cheats.infiniteMP && !unit.isEnemy)){
          unit.mp-=chosenSkill.mpCost;
        }
        unit.cooldowns[skillId]=chosenSkill.cooldown;

        let effectClass='fire';
        if(chosenSkill.name.indexOf('冰')>=0||chosenSkill.name.indexOf('暴风雪')>=0)effectClass='ice';
        else if(chosenSkill.name.indexOf('暗')>=0||chosenSkill.name.indexOf('诅咒')>=0||chosenSkill.name.indexOf('灵魂')>=0)effectClass='dark';
        else if(chosenSkill.name.indexOf('圣')>=0||chosenSkill.name.indexOf('光')>=0||chosenSkill.name.indexOf('净化')>=0)effectClass='holy';
        else if(chosenSkill.name.indexOf('毒')>=0)effectClass='poison';
        else if(chosenSkill.type==='heal'||chosenSkill.type==='cleanse')effectClass='heal-effect';
        else if(chosenSkill.type==='shield')effectClass='shield-effect';

        showSkillEffect(chosenSkill.icon,chosenSkill.name,effectClass);
        showFloat(unit,chosenSkill.icon+chosenSkill.name,'skill-name');
        await sleep(400);

        const target=getValidTarget(unit,allUnits,chosenSkill.target);
        if(target){
          await executeSkillV2(unit,target,chosenSkill,allUnits,log);
          await sleep(300);
        }
      }else{
        const target=getValidTarget(unit,allUnits,'single_enemy');
        if(target){
          const r=calcDamage(unit,target,null);
          // MUD风格战斗描述 + 连击系统
          var comboNum=getCombo(unit);
          if(r.dodged){
            log(getBattleDesc('dodge',unit,target)||unit.icon+' '+unit.name+' 攻击 '+target.icon+target.name+'，但被闪避了！','info');
            showFloat(target,'闪避!','dodge');
            recordBattleStat(target,'dodge',1);
            resetCombo(unit);
          }else{
            let dmg=r.dmg;
            // 连击加成：每次连击+5%伤害，最高+30%
            if(comboNum>0){
              dmg=Math.floor(dmg*(1+Math.min(comboNum*0.05,0.3)));
            }
            const reflectBuff=target.buffs.find(b=>b.stat==='reflect');
            if(reflectBuff){
              const reflectDmg=Math.floor(dmg*reflectBuff.mult);
              unit.hp=Math.max(0,unit.hp-reflectDmg);
              log(target.icon+target.name+' 反弹了 '+reflectDmg+' 点伤害！','damage');
              showFloat(unit,'-'+reflectDmg+' 反弹','damage');
              animUnit(unit,'hit',300);
              if(unit.hp<=0){unit.alive=false;log(unit.icon+' '+unit.name+' 倒下了...','death');animUnit(unit,'dying',700)}
            }
            if(target.shield>0){const absorbed=Math.min(target.shield,dmg);target.shield-=absorbed;dmg-=absorbed;if(absorbed>0)showFloat(target,'🛡-'+absorbed,'shield-num')}
            target.hp=Math.max(0,target.hp-dmg);
            // MUD风格攻击描述
            if(r.crit){
              log(getBattleDesc('crit',unit,target),'crit');
            }else if(comboNum>0){
              log(getBattleDesc('combo',unit,target),'crit');
            }else{
              log(getBattleDesc('attack',unit,target),'damage');
            }
            log('  → 造成 '+dmg+' 点伤害'+(comboNum>0?' ('+(comboNum+1)+'连击)':''),r.crit?'crit':'damage');
            showFloat(target,(r.crit?'💥':'')+dmg,r.crit?'crit':'damage');
            animUnit(target,'hit',300);
            // 记录统计数据
            recordBattleStat(unit,'damage',dmg);
            recordBattleStat(target,'damageTaken',dmg);
            if(r.crit)recordBattleStat(unit,'crit',1);
            // 连击计数
            addCombo(unit);
            // 反击机制：防御者有10%概率反击（守护者20%）
            if(target.alive && Math.random()<(target.role==='guardian'?0.2:0.1)){
              var counterDmg=Math.floor(calcDamage(target,unit,null).dmg*0.5);
              unit.hp=Math.max(0,unit.hp-counterDmg);
              log(getBattleDesc('counter',unit,target)+' 造成 '+counterDmg+' 点伤害！','skill');
              showFloat(unit,'⚡反击-'+counterDmg,'damage');
              animUnit(unit,'hit',300);
              recordBattleStat(target,'damage',counterDmg);
              if(unit.hp<=0){unit.alive=false;log(unit.icon+' '+unit.name+' 倒下了...','death');animUnit(unit,'dying',700)}
            }
            if(target.hp<=0){target.alive=false;log(target.icon+' '+target.name+' 倒下了...','death');animUnit(target,'dying',700)}
          }
          updateBattleStatsBoard();
        }
      }

      for(let sid in unit.cooldowns){unit.cooldowns[sid]--}
      clearHighlight();
      renderTeams();
      await sleep(250);

      if(!playerUnits.some(u=>u.alive)){break}
      if(!enemyUnits.some(u=>u.alive)){break}
    }

    renderTeams();
    if(!playerUnits.some(u=>u.alive)){log('💀 战斗失败...队伍全军覆没。','death');break}
    if(!enemyUnits.some(u=>u.alive)){log('🎉 战斗胜利！','title');break}

    allUnits.filter(u=>u.alive).forEach(u=>{u.mp=Math.min(u.maxMP,u.mp+Math.floor(u.maxMP*0.05))});
  }

  if(round>=maxRounds){log('⏰ 回合用尽，战斗平局。','info')}

  const won=enemyUnits.every(u=>!u.alive);
  if(won){
    const rw=stage.rewards;
    // 记录怪物图鉴
    recordMonsterCodex(stage.enemies||enemyUnits);
    G.exploreStats.totalBattles++;
    // PVE连胜奖励
    if(stage.isBoss) G.pveWinStreak=(G.pveWinStreak||0)+1; // BOSS关才算连胜
    if(G.pveWinStreak>G.pveMaxStreak) G.pveMaxStreak=G.pveWinStreak;
    var streakBonus=1+Math.min(G.pveWinStreak*(G.pveWinStreak>3?0.08:0.05),0.5); // 最高50%
    // 英雄幸运特质：战斗奖励+15%
    var luckyBonus=1;
    teamHeroes.forEach(h=>{if(h.traits) h.traits.forEach(t=>{if(t.id==='lucky')luckyBonus+=0.15})});
    
    // 奖励受资源上限约束 + 连胜加成 + 幸运加成
    var totalBonus=streakBonus*luckyBonus;
    var finalGold=Math.floor((rw.gold||0)*totalBonus);
    var finalFood=Math.floor((rw.food||0)*totalBonus);
    var finalStone=Math.floor((rw.stone||0)*totalBonus);
    var finalIron=Math.floor((rw.iron||0)*totalBonus);
    G.resources.gold=Math.min((G.resources.gold||0)+finalGold, RESOURCE_LIMITS.gold);
    G.resources.food=Math.min((G.resources.food||0)+finalFood, RESOURCE_LIMITS.food);
    G.resources.stone=Math.min((G.resources.stone||0)+finalStone, RESOURCE_LIMITS.stone);
    G.resources.iron=Math.min((G.resources.iron||0)+finalIron, RESOURCE_LIMITS.iron);
    G.resources.gems=Math.min((G.resources.gems||0)+(rw.gems||0), RESOURCE_LIMITS.gems);
    if(stage.id>=G.stageProgress){G.stageProgress=stage.id+1}
    G_currentStageId=stage.id+1;
    // 战术大师特质：经验+20%
    teamHeroes.forEach(h=>{
      var expBonus=1;
      if(h.traits) h.traits.forEach(t=>{if(t.id==='tactician')expBonus+=0.20});
      addHeroExp(h,Math.floor((rw.exp||0)*expBonus));
    });
    
    // 经验药水掉落（概率随关卡提升）
    var potionDrop=0;
    var potionChance=0.25+stage.id*0.03; // 基础25%，每关+3%
    if(Math.random()<potionChance){
      potionDrop=Math.floor((20+stage.id*5)*totalBonus);
      G.resources.expPotion=Math.min((G.resources.expPotion||0)+potionDrop,RESOURCE_LIMITS.expPotion);
    }
    
    let drop=null;
    if(Math.random()<0.3+stage.id*0.05){
      const possibleDrops=EQUIP_TEMPLATES.filter(e=>QUALITIES.indexOf(e.quality)<=Math.min(stage.id,4));
      if(possibleDrops.length>0){
        const tpl=pick(possibleDrops);
        drop={uid:++G.heroIdCounter,id:tpl.id,heroUid:null};
        G.equipment.push(drop);
        recordCodex('equipment',tpl.id);
      }
    }
    log('\n📦 战利品：💰'+(rw.gold||0)+' 🍞'+(rw.food||0)+' 🪨'+(rw.stone||0)+' ⛏️'+(rw.iron||0)+(rw.gems?' 💎'+rw.gems:'')+' ⭐经验+'+(rw.exp||0)+(potionDrop>0?' 🧪经验药水+'+potionDrop:'')+(drop?' 🎁'+EQUIP_TEMPLATES.find(t=>t.id===drop.id).name:''),'title');
    if(G.pveWinStreak>=3){
      log('🔥 '+G.pveWinStreak+'连胜！奖励加成 +'+Math.round((streakBonus-1)*100)+'%','crit');
    }
    if(luckyBonus>1) log('🍀 幸运加成 +'+Math.round((luckyBonus-1)*100)+'%','info');
    showToast('战斗胜利！'+(G.pveWinStreak>=3?G.pveWinStreak+'连胜！':''));
  }else{
    showToast('战斗失败...');
  }

  updateResUI();
  renderTeams();
  saveGame();
  G_battlePaused=false;
  updatePauseButton();
  
  var btnArea=document.getElementById('battle-buttons');
  if(btnArea){
    if(G_autoBattle&&won){
      btnArea.innerHTML='<span class="text-gold text-sm">✅ 胜利！自动进入下一关...</span>';
      updateResUI();
      setTimeout(function(){
        G_battleRunning=false;
        startBattle(G_currentStageId);
      },1500/G_battleSpeed);
    }else if(G_autoBattle&&!won){
      // 自动推图失败：停止自动推图，不切回战斗页
      G_battleRunning=false;
      G_autoBattle=false;
      updateAutoBattleButtons(false);
      showToast('💀 自动推图失败！关卡 '+G_currentStageId);
    }else{
      G_battleRunning=false;
      G_autoBattle=false;
      updateAutoBattleButtons(false);
      // 非自动战斗：显示醒目的"返回"按钮
      btnArea.innerHTML='<div style="text-align:center;padding:16px 0">'
        +'<div style="font-size:16px;font-weight:bold;margin-bottom:8px">'+(won?'🎉 战斗胜利！':'💀 战斗失败...')+'</div>'
        +'<button class="btn btn-primary" onclick="forceEndBattle()" style="font-size:14px;padding:8px 32px">返回关卡选择</button>'
        +'</div>';
    }
  }
}

async function executeSkillV2(user,target,skill,allUnits,logFn){
  const targets=Array.isArray(target)?target:[target];
  var userSide=user.isEnemy?'enemy':'ally';
  switch(skill.type){
    case 'damage':
      targets.forEach(t=>{
        if(!t.alive)return;
        const r=calcDamage(user,t,skill);
        if(r.dodged){
          logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，但 '+t.icon+t.name+' 闪避了！','info');
          showFloat(t,'闪避!','dodge');
          recordBattleStat(t,'dodge',1);
          return;
        }
        let dmg=r.dmg;
        if(t.shield>0){const absorbed=Math.min(t.shield,dmg);t.shield-=absorbed;dmg-=absorbed;if(absorbed>0)showFloat(t,'🛡-'+absorbed,'shield-num')}
        t.hp=Math.max(0,t.hp-dmg);
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+' 对 '+t.icon+t.name+' 造成 '+dmg+' 点伤害'+(r.crit?' 💥暴击！':''),r.crit?'crit':'damage');
        showFloat(t,(r.crit?'💥':'')+dmg,r.crit?'crit':'damage');
        animUnit(t,'hit',300);
        // 记录统计数据
        recordBattleStat(user,'damage',dmg);
        recordBattleStat(t,'damageTaken',dmg);
        if(r.crit)recordBattleStat(user,'crit',1);
        if(skill.stunChance&&Math.random()<skill.stunChance){
          t.buffs.push({stat:'stun',duration:1,name:'眩晕'});
          logFn(t.icon+t.name+' 被眩晕了！','debuff');
          showFloat(t,'眩晕!','debuff-text');
          recordBattleStat(user,'control',1);
        }
        if(skill.dot){t.dot.push({dmg:Math.floor(user.atk*skill.dot.dmgPct),duration:skill.dot.duration,name:'中毒',sourceRole:user.role});logFn(t.icon+t.name+' 被施加了 '+skill.dot.name+'！','debuff');showFloat(t,'☠中毒','debuff-text')}
        if(skill.debuff){const db=skill.debuff;if(db.stat==='all'){t.buffs.push({stat:'atk',mult:db.mult,duration:db.duration,name:'诅咒-攻'});t.buffs.push({stat:'def',mult:db.mult,duration:db.duration,name:'诅咒-防'})}else{t.buffs.push({stat:db.stat,mult:db.mult,duration:db.duration,name:'削弱'})}logFn(t.icon+t.name+' 被削弱了！','debuff');showFloat(t,'▼削弱','debuff-text')}
        if(t.hp<=0){t.alive=false;logFn(t.icon+' '+t.name+' 倒下了...','death');animUnit(t,'dying',700)}
      });
      updateBattleStatsBoard();
      break;
    case 'heal':
      var totalHeal=0;
      targets.forEach(t=>{
        if(!t.alive)return;
        const heal=Math.floor(t.maxHP*skill.healPct);
        t.hp=Math.min(t.maxHP,t.hp+heal);
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，恢复 '+t.icon+t.name+' '+heal+' 点生命','heal');
        showFloat(t,'+'+heal,'heal');animUnit(t,'heal-target',500);
        totalHeal+=heal;
      });
      // 记录施法者的治疗输出量（治疗自己或别人的总量）
      if(totalHeal>0)recordBattleStat(user,'heal',totalHeal);
      updateBattleStatsBoard();
      break;
    case 'buff':
      targets.forEach(t=>{
        if(!t.alive)return;
        t.buffs.push({...skill.buff,name:skill.name});
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，'+(t===user?'自身':'队友')+'获得增益效果','buff');
        showFloat(t,'↑'+skill.name,'buff-text');animUnit(t,'heal-target',500);
      });break;
    case 'shield':
      targets.forEach(t=>{
        if(!t.alive)return;
        const amt=Math.floor(t.maxHP*skill.shieldPct);
        t.shield+=amt;
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，为 '+t.icon+t.name+' 添加 '+amt+' 点护盾','buff');
        showFloat(t,'🛡+'+amt,'shield-num');animUnit(t,'shield-up',400);
      });break;
    case 'drain':
      targets.forEach(t=>{
        if(!t.alive)return;
        const r=calcDamage(user,t,skill);
        if(r.dodged){logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，但 '+t.icon+t.name+' 闪避了！','info');showFloat(t,'闪避!','dodge');return}
        let dmg=r.dmg;
        if(t.shield>0){const absorbed=Math.min(t.shield,dmg);t.shield-=absorbed;dmg-=absorbed}
        t.hp=Math.max(0,t.hp-dmg);
        const healAmt=Math.floor(dmg*0.5);
        user.hp=Math.min(user.maxHP,user.hp+healAmt);
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，对 '+t.icon+t.name+' 造成 '+dmg+' 伤害，恢复 '+healAmt+' 生命','skill');
        showFloat(t,'-'+dmg,'damage');animUnit(t,'hit',300);
        showFloat(user,'+'+healAmt,'heal');animUnit(user,'heal-target',500);
        if(t.hp<=0){t.alive=false;logFn(t.icon+' '+t.name+' 倒下了...','death');animUnit(t,'dying',700)}
      });break;
    case 'debuff':
      targets.forEach(t=>{
        if(!t.alive)return;
        const db=skill.debuff;
        if(db.stat==='all'){t.buffs.push({stat:'atk',mult:db.mult,duration:db.duration,name:'诅咒-攻'});t.buffs.push({stat:'def',mult:db.mult,duration:db.duration,name:'诅咒-防'})}else{t.buffs.push({stat:db.stat,mult:db.mult,duration:db.duration,name:'诅咒'})}
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，'+t.icon+t.name+' 被诅咒了！','debuff');
        showFloat(t,'▼'+skill.name,'debuff-text');
      });break;
    case 'cleanse':
      targets.forEach(t=>{
        if(!t.alive)return;
        const negCount=t.buffs.filter(b=>b.stat==='stun'||(b.stat==='atk'&&b.mult<1)||(b.stat==='def'&&b.mult<1)).length;
        t.buffs=t.buffs.filter(b=>!(b.stat==='stun'||(b.stat==='atk'&&b.mult<1)||(b.stat==='def'&&b.mult<1)));
        t.dot=[];
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，清除了 '+t.icon+t.name+' 的 '+negCount+' 个负面效果','heal');
        showFloat(t,'✨净化','buff-text');animUnit(t,'heal-target',500);
      });break;
  }
}

function sleep(ms){
  return new Promise(function(r){
    var checkPause=function(){
      if(G_battlePaused){
        setTimeout(checkPause,100);
      }else{
        setTimeout(r,Math.max(20,ms/G_battleSpeed));
      }
    };
    checkPause();
  });
}

function findMergeRecipe(heroUids){

// 异变概率配置
var G_MUTATION_RATE = 0.30;       // 30% 异变概率
var G_QUALITY_UP_RATE = 0.05;      // 5% 品质+1概率
var G_LEGENDARY_DIRECT_RATE = 0.03; // 3% 直接传说概率
var G_MYTHIC_DIRECT_RATE = 0.01;   // 1% 直接神话概率

function generateFusedHero(heroes){
  // 基于输入英雄属性即时生成新英雄
  var inputIds=heroes.map(function(h){return h.id}).sort().join('+');
  var hash=hashStr(inputIds);
  
  // 1. 确定新品质：金手指强制 > 正常计算
  var qualities=heroes.map(function(h){return QUALITIES.indexOf(h.quality)});
  var maxQ=Math.max.apply(null,qualities);
  var avgQ=Math.floor(qualities.reduce(function(s,v){return s+v},0)/qualities.length);
  // 新品质 = 平均品质，但不能超过最高品质
  var newQIdx=Math.min(maxQ,avgQ);
  var newQuality=QUALITIES[newQIdx];
  
  // 金手指强制品质（最高优先级）
  if(G_cheats.enabled && G_cheats.forceQuality){
    newQuality=G_cheats.forceQuality;
    newQIdx=QUALITIES.indexOf(newQuality);
  }
  
  // 2. 判定特殊结果（优先级：神话 > 传说 > 品质+1 > 异变 > 普通）
  // 金手指强制异变
  var isMutation=G_cheats.forceMutation||Math.random()<G_MUTATION_RATE;
  var isQualityUp=false;
  var isDirectLegendary=false;
  var isDirectMythic=false;
  
  // 1% 直接神话（最高优先级，无视当前品质）
  if(Math.random()<G_MYTHIC_DIRECT_RATE){
    newQuality='mythic';
    newQIdx=QUALITIES.indexOf('mythic');
    isMutation=true;
    isDirectMythic=true;
  }
  // 3% 直接传说（无视当前品质，但低于神话优先级）
  else if(Math.random()<G_LEGENDARY_DIRECT_RATE){
    newQuality='legendary';
    newQIdx=QUALITIES.indexOf('legendary');
    isMutation=true;
    isDirectLegendary=true;
  }
  // 5% 品质+1（不超过神话）
  else if(Math.random()<G_QUALITY_UP_RATE && newQIdx<QUALITIES.length-1){
    newQIdx++;
    newQuality=QUALITIES[newQIdx];
    isMutation=true;
    isQualityUp=true;
  }
  
  // 3. 确定新职业：基于哈希从输入英雄职业中选
  var allRoles=heroes.map(function(h){return h.role});
  var uniqueRoles=[];
  allRoles.forEach(function(r){if(uniqueRoles.indexOf(r)===-1)uniqueRoles.push(r)});
  var mainRole=uniqueRoles[hash%uniqueRoles.length];
  
  // 4. 确定新技能
  var allSkillPool=[];
  heroes.forEach(function(h){
    h.skills.forEach(function(s){if(allSkillPool.indexOf(s)===-1)allSkillPool.push(s)});
    h.bonusSkills.forEach(function(s){if(allSkillPool.indexOf(s)===-1)allSkillPool.push(s)});
  });
  // 加入目标角色的基础技能
  var roleData=ROLES[mainRole];
  if(roleData&&roleData.skills){
    roleData.skills.forEach(function(s){if(allSkillPool.indexOf(s)===-1)allSkillPool.push(s)});
  }
  // 异变英雄额外获得1-2个技能
  var baseSkillCount=2+Math.floor(hash%3);
  var skillCount=isMutation?Math.min(allSkillPool.length,baseSkillCount+1+Math.floor(Math.random()*2)):baseSkillCount;
  var shuffled=allSkillPool.slice().sort(function(){return Math.random()-0.5});
  var newSkills=shuffled.slice(0,skillCount);
  
  // 5. 确定新属性 - 统一逻辑：max(职业品质标准, 材料最高属性)
  var roleData=ROLES[mainRole];
  var baseHP=roleData?roleData.baseHP:100;
  var baseATK=roleData?roleData.baseATK:15;
  var baseDEF=roleData?roleData.baseDEF:10;
  var baseSPD=roleData?roleData.baseSPD:10;
  var baseMP=roleData?roleData.baseMP:40;
  
  // 取材料最高等级
  var maxLevel=Math.max.apply(null,heroes.map(function(h){return h.level}));
  
  // 基于新职业和新品质计算标准值
  var qm=QUALITY_MULT[newQuality];
  var stdHP=calcStat(baseHP,qm,maxLevel);
  var stdATK=calcStat(baseATK,qm,maxLevel);
  var stdDEF=calcStat(baseDEF,qm,maxLevel);
  var stdSPD=calcStat(baseSPD,qm,maxLevel);
  var stdMP=calcStat(baseMP,qm,maxLevel);
  
  // 取材料中各属性的最高值
  var maxMaterialHP=Math.max.apply(null,heroes.map(function(h){return h.maxHP}));
  var maxMaterialATK=Math.max.apply(null,heroes.map(function(h){return h.atk}));
  var maxMaterialDEF=Math.max.apply(null,heroes.map(function(h){return h.def}));
  var maxMaterialSPD=Math.max.apply(null,heroes.map(function(h){return h.spd}));
  var maxMaterialMP=Math.max.apply(null,heroes.map(function(h){return h.maxMP}));
  
  // 最终属性 = max(职业品质标准, 材料最高属性)
  // 确保合成英雄既符合职业品质标准，又不弱于材料
  var maxHP=Math.max(stdHP,maxMaterialHP);
  var atk=Math.max(stdATK,maxMaterialATK);
  var def=Math.max(stdDEF,maxMaterialDEF);
  var spd=Math.max(stdSPD,maxMaterialSPD);
  var maxMP=Math.max(stdMP,maxMaterialMP);
  
  // 异变/品质提升时额外加成10%
  if(isMutation||isQualityUp||isDirectLegendary||isDirectMythic){
    maxHP=Math.floor(maxHP*1.1);
    atk=Math.floor(atk*1.1);
    def=Math.floor(def*1.1);
    spd=Math.floor(spd*1.1);
    maxMP=Math.floor(maxMP*1.1);
  }
  console.log('[Merge]',newQuality,mainRole,'stdHP='+stdHP,'matHP='+maxMaterialHP,'final='+maxHP);
  
  // 6. 生成名称和图标
  var namePrefixes={
    warrior:['战','狂','铁','血','龙','雷','烈'],
    guardian:['圣','磐','不灭','永恒','钢铁','堡垒'],
    mage:['奥','星','虚空','深渊','混沌','元素'],
    healer:['圣','天','生命','光明','神圣','自然'],
    assassin:['影','暗','幽','幻','夜','魂'],
    ranger:['风','雷','疾','苍','天','猎'],
    warlock:['暗','虚空','噬魂','诅咒','冥','渊'],
    paladin:['圣','光','神','天启','审判','黎明']
  };
  var nameSuffixes={
    warrior:['战士','勇者','剑圣','战神','武圣','斗士'],
    guardian:['守卫','壁垒','守护者','铁壁','圣盾','堡垒'],
    mage:['法师','贤者','术士','大魔导师','星术师','元素使'],
    healer:['祭司','圣者','神官','治愈者','生命使','圣女'],
    assassin:['杀手','暗影','收割者','幽灵','夜行者','影刃'],
    ranger:['游侠','猎手','弓圣','风行者','神射手','鹰眼'],
    warlock:['术士','召唤师','噬魂者','冥王','虚空使','深渊者'],
    paladin:['骑士','圣骑','审判者','守护者','神卫','天骑']
  };
  var icons={
    warrior:['⚔️','🗡️','🪓','😤','🐉','⚡'],
    guardian:['🛡️','🏰','🗿','🔱','🧱','🔰'],
    mage:['🔮','🌟','❄️','🔥','💥','🌠'],
    healer:['💚','✝️','🌈','👼','🌳','🌟'],
    assassin:['🗡️','👤','🌑','👻','⚰️','🌙'],
    ranger:['🏹','⛈️','🌪️','🎯','🦅','🌟'],
    warlock:['👁️','😈','🌀','🩸','💀','🌑'],
    paladin:['✨','⚡','🛡️','🔰','🌟','⚜️']
  };
  var prefixes=namePrefixes[mainRole]||namePrefixes.warrior;
  var suffixes=nameSuffixes[mainRole]||nameSuffixes.warrior;
  var iconList=icons[mainRole]||icons.warrior;
  
  var prefix=prefixes[hash%prefixes.length];
  var suffix=suffixes[(hash>>4)%suffixes.length];
  var icon=iconList[(hash>>8)%iconList.length];
  
  // 异变英雄名称前缀
  var qualityPrefix={common:'',rare:'精英',epic:'史诗',legendary:'传说',mythic:'神话'};
  var mutationPrefix=isMutation?'☣️异变·':'';
  var newName=mutationPrefix+(qualityPrefix[newQuality]||'')+prefix+suffix;
  
  // 7. 继承最高等级
  var maxLevel=0;
  heroes.forEach(function(h){if(h.level>maxLevel)maxLevel=h.level});
  
  // 8. 创建英雄对象
  var newHero={
    uid:++G.heroIdCounter,
    id:'fused_'+hash%100000+(isMutation?'_mut':''),
    name:newName,
    icon:icon,
    role:mainRole,
    quality:newQuality,
    level:maxLevel,
    maxHP:maxHP,
    hp:maxHP,
    atk:atk,
    def:def,
    spd:spd,
    maxMP:maxMP,
    mp:maxMP,
    skills:newSkills,
    bonusSkills:[],
    equipment:{weapon:null,armor:null,accessory:null},
    exp:0,
    lore:isMutation?
      '☣️异变英雄！由'+heroes.map(function(h){return h.name}).join('与')+'融合时发生异变，拥有超越同品质的力量。':
      '由'+heroes.map(function(h){return h.name}).join('与')+'融合诞生的'+QUALITY_NAMES[newQuality]+'英雄。',
    deathDefyUsed: false,
    isMutation: isMutation
  };
  
  return newHero;
}

function hashStr(str){
  var hash=5381;
  for(var i=0;i<str.length;i++){
    hash=((hash<<5)+hash)+str.charCodeAt(i);
    hash=hash&0x7fffffff;
  }
  return hash;
}

  flashes.forEach(function(f){f.remove()});
}

function executeMerge(heroUids){
  const heroes=heroUids.map(uid=>G.heroes.find(h=>h.uid===uid)).filter(Boolean);
  if(heroes.length<2){showToast('请至少选择2个英雄！');return false}
  
  // 记录最高品质用于判断品质提升
  var qualities=heroes.map(function(h){return QUALITIES.indexOf(h.quality)});
  var maxQIdx=Math.max.apply(null,qualities);
  var oldQuality=QUALITIES[maxQIdx];
  
  // 即时生成融合英雄
  const newHero=generateFusedHero(heroes);
  
  // 判断是否品质提升
  var isQualityUp=QUALITIES.indexOf(newHero.quality)>maxQIdx;
  
  // 移除被融合的英雄
  heroes.forEach(h=>{
    const idx=G.heroes.findIndex(x=>x.uid===h.uid);
    if(idx>=0)G.heroes.splice(idx,1);
    // 从队伍中移除
    for(let i=0;i<G.team.length;i++){
      if(G.team[i]&&G.team[i].uid===h.uid)G.team[i]=null;
    }
  });
  
  // 添加新英雄
  G.heroes.push(newHero);
  
  // 显示合成结果
  showMergeResult(newHero,isQualityUp,oldQuality);
  
  showToast('融合成功！获得 '+QUALITY_NAMES[newHero.quality]+' 英雄：'+newHero.icon+' '+newHero.name);
  return true;
}

// ==================== 装备系统 ====================
function createEquipment(templateId){
  const tpl=EQUIP_TEMPLATES.find(t=>t.id===templateId);
  if(!tpl)return null;
  return{uid:++G.heroIdCounter,id:tpl.id,heroUid:null};
}

function equipItem(heroUid,equipUid){
  const hero=G.heroes.find(h=>h.uid===heroUid);
  const equip=G.equipment.find(e=>e.uid===equipUid);
  if(!hero||!equip)return;
  const tpl=EQUIP_TEMPLATES.find(t=>t.id===equip.id);
  if(!tpl)return;
  // 卸下当前装备
  const slot=tpl.type==='weapon'?'weapon':tpl.type==='armor'?'armor':'accessory';
  const oldEquipUid=hero.equipment[slot];
  if(oldEquipUid!=null){
    const oldEq=G.equipment.find(e=>e.uid===oldEquipUid);
    if(oldEq)oldEq.heroUid=null;
  }
  // 装上新的
  hero.equipment[slot]=equipUid;
  equip.heroUid=heroUid;
  showToast(`${hero.name} 装备了 ${tpl.name}`);
}

function unequipItem(heroUid,slot){
  const hero=G.heroes.find(h=>h.uid===heroUid);
  if(!hero)return;
  const equipUid=hero.equipment[slot];
  if(equipUid==null)return;
  const equip=G.equipment.find(e=>e.uid===equipUid);
  if(equip)equip.heroUid=null;
  hero.equipment[slot]=null;
}

// ==================== 建筑系统 ====================
function getBuildingCost(buildingId,level){
  const def=BUILDING_DEFS[buildingId];
  const cost={};
  for(let[k,v]of Object.entries(def.baseCost)){
    cost[k]=Math.floor(v*Math.pow(1.4,level-1));
  }
  return cost;
}

function canAfford(cost){
  for(let[k,v]of Object.entries(cost)){
    if((G.resources[k]||0)<v)return false;
  }
  return true;
}

function upgradeBuilding(buildingId){
  const def=BUILDING_DEFS[buildingId];
  const curLevel=G.buildings[buildingId];
  if(curLevel>=def.maxLevel){showToast('已达最高等级！');return}
  
  const nextLevel=curLevel+1;
  
  // 检查特殊升级条件（支持固定 upgradeReq 和按等级 upgradeReqByLevel）
  var upgradeReq=null;
  if(def.upgradeReqByLevel && def.upgradeReqByLevel[nextLevel]){
    upgradeReq=def.upgradeReqByLevel[nextLevel];
  }else if(def.upgradeReq){
    upgradeReq=def.upgradeReq;
  }
  
  if(upgradeReq){
    for(let[k,v]of Object.entries(upgradeReq)){
      if((G.resources[k]||0)<v){
        showToast(`升级需要${RESOURCE_DEFS[k]?.name||k}: ${v}`);
        return;
      }
    }
  }
  
  const cost=getBuildingCost(buildingId,curLevel);
  if(!canAfford(cost)){showToast('资源不足！');return}
  
  // 扣除资源
  for(let[k,v]of Object.entries(cost))G.resources[k]-=v;
  // 扣除特殊条件资源
  if(upgradeReq){
    for(let[k,v]of Object.entries(upgradeReq))G.resources[k]-=v;
  }
  
  G.buildings[buildingId]++;
  const newLevel=G.buildings[buildingId];
  updateResUI();
  const effectText=def.effects&&def.effects[newLevel-1]?def.effects[newLevel-1]:'';
  showToast(`${def.name} 升级到 ${newLevel} 级！${effectText}`);
  saveGame();
  renderCurrentTab();
}

function getTavernRefreshCost(){
  // 刷新费用绑定酒馆等级（固定，不递增）
  const tavernLevel=G.buildings.tavern||1;
  return TAVERN_REFRESH.costByLevel[tavernLevel]||TAVERN_REFRESH.costByLevel[1];
}

function canRefreshTavern(){
  const cost=getTavernRefreshCost();
  for(let[k,v]of Object.entries(cost)){
    if((G.resources[k]||0)<v)return false;
  }
  return true;
}

function refreshTavernOptions(){
  if(!canRefreshTavern()){
    const cost=getTavernRefreshCost();
    const costStr=Object.entries(cost).map(([k,v])=>`${RESOURCE_DEFS[k]?.icon||''}${v}`).join(' ');
    showToast(`刷新需要: ${costStr}`);
    return;
  }
  
  // 扣除刷新费用（固定，不递增）
  const cost=getTavernRefreshCost();
  for(let[k,v]of Object.entries(cost)){
    G.resources[k]-=v;
  }
  
  // 增加保底计数
  setPity(getPity()+1);
  
  // 清除缓存，强制重新随机
  G_tavernOptions=null;
  
  updateResUI();
  saveGame();
  
  // 检查是否触发保底
  if(getPity() >= 10){
    showToast('🎉 保底触发！本次必出高品质英雄！');
  }else{
    showToast(`已刷新英雄列表（${getPity()}/10 次后保底）`);
  }
  
  // 只刷新酒馆内容，不退出酒馆
  renderTavernRecruit();
}

// 酒馆当前显示的英雄选项缓存（避免招募后重新随机）
var G_tavernOptions = null;
// 酒馆中已被招募的英雄ID集合
var G_tavernRecruited = new Set();
// 酒馆保底计数器（每10次刷新必出当前最高品质英雄）
// 存放在G对象中自动存档，兼容旧存档（undefined时默认0）
function getPity(){return G.tavernPity||0}
function setPity(v){G.tavernPity=v}

function getRecruitOptions(){
  // 如果已有缓存，直接返回（招募后不重新随机）
  if(G_tavernOptions && G_tavernOptions.length > 0) return G_tavernOptions;

  const tavernLevel=G.buildings.tavern;
  const maxQuality=TAVERN_REFRESH.maxQualityByLevel[tavernLevel]||'common';
  const maxQIdx=QUALITIES.indexOf(maxQuality);
  const pool=HERO_TEMPLATES.filter(t=>QUALITIES.indexOf(t.quality)<=maxQIdx);
  
  // 根据酒馆等级决定选项数量
  const optionCount=TAVERN_REFRESH.optionsCount[tavernLevel]||2;
  
  // 加权随机（基础权重）
  const weights={common:50,rare:30,epic:15,legendary:4,mythic:1};
  // 品质加成：提升当前最高可解锁品质的出现率
  const boost=TAVERN_REFRESH.qualityWeightBoost[tavernLevel]||0;
  if(boost>0){
    weights[maxQuality]=Math.round((weights[maxQuality]||10)*(1+boost));
  }
  const options=[];
  for(let i=0;i<optionCount;i++){
    let attempts=0;
    while(attempts<20){
      const tpl=pick(pool);
      const w=weights[tpl.quality]||10;
      if(Math.random()*100<w||attempts>15){
        options.push(tpl);
        break;
      }
      attempts++;
    }
  }
  
  // 保底机制：每10次刷新，最后一个位置必出当前最高品质英雄
  if(getPity() >= 10 && options.length > 0){
    // 保底基于当前最高可解锁品质（而非固定史诗）
    const pityPool = HERO_TEMPLATES.filter(t => 
      QUALITIES.indexOf(t.quality) >= maxQIdx - 1 && // 最高品质或次高品质
      QUALITIES.indexOf(t.quality) <= maxQIdx
    );
    if(pityPool.length > 0){
      options[options.length - 1] = pick(pityPool);
      setPity(0); // 重置保底计数
    }else{
      // 如果池子为空（极端情况），直接从全池中选最高品质
      const highPool = pool.filter(t => QUALITIES.indexOf(t.quality) === maxQIdx);
      if(highPool.length > 0){
        options[options.length - 1] = pick(highPool);
        setPity(0);
      }
    }
  }
  
  G_tavernOptions = options;
  G_tavernRecruited = new Set();
  return options;
}

function recruitHero(templateId){
  const tpl=HERO_TEMPLATES.find(t=>t.id===templateId);
  if(!tpl)return;
  // 记录英雄图鉴（即使不招募也记录为"遇见"）
  recordCodex('heroes',templateId);
  // 已招募的英雄不能重复招募
  if(G_tavernRecruited.has(templateId)){showToast('该英雄已被招募！');return}
  
  // 招募成本：降低门槛，让更多玩家能体验到招募乐趣
  const goldCosts={common:30,rare:100,epic:300,legendary:0,mythic:0};
  const gemCosts={common:0,rare:0,epic:0,legendary:3,mythic:8};
  
  const goldCost=goldCosts[tpl.quality]||50;
  const gemCost=gemCosts[tpl.quality]||0;
  
  // 检查资源
  if(goldCost>0 && G.resources.gold<goldCost){showToast(`金币不足！需要 ${goldCost} 金币`);return}
  if(gemCost>0 && G.resources.gems<gemCost){showToast(`宝石不足！需要 ${gemCost} 宝石，击败BOSS可获得`);return}
  
  // 扣除资源
  if(goldCost>0) G.resources.gold-=goldCost;
  if(gemCost>0) G.resources.gems-=gemCost;
  
  const hero=createHero(tpl.id);
  G.heroes.push(hero);
  // 标记为已招募（不移除，保持展示）
  G_tavernRecruited.add(templateId);
  updateResUI();
  saveGame();
  
  const costStr=goldCost>0?`${goldCost}金币`:gemCost>0?`${gemCost}宝石`:`${goldCost}金币+${gemCost}宝石`;
  showToast(`招募成功！消耗 ${costStr}，获得 ${hero.icon} ${hero.name}`);
  // 招募后保持在酒馆，已招募的显示为灰色禁用
  renderTavernRecruit();
}

let currentTab='town';

function switchTab(tab){
  // H5独立模式禁入金手指
  if(G_isH5Package&&tab==='cheats'){showToast('📦 H5版已禁用金手指');return;}
  currentTab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.tab===tab);
  });
  renderCurrentTab();
}

function renderCurrentTab(){
  var contentEl=document.getElementById('content');
  var battlePanel=document.getElementById('battle-panel');
  
  if(G_battleRunning && !G_autoBattle && currentTab==='battle'){
    // 手动战斗中切回战斗页：显示战斗面板，隐藏content
    contentEl.style.display='none';
    battlePanel.style.display='';
  }else if(G_battleRunning){
    // 战斗运行中切到其他页 或 自动推图后台执行：隐藏战斗面板，显示content
    battlePanel.style.display='none';
    contentEl.style.display='';
  }else{
    // 没有战斗：正常显示content
    contentEl.style.display='';
    battlePanel.style.display='none';
  }
  
  switch(currentTab){
    case 'town': renderTown(contentEl);break;
    case 'heroes': renderHeroes(contentEl);break;
    case 'team': renderTeam(contentEl);break;
    case 'battle': renderBattle(contentEl);break;
    case 'merge': renderMerge(contentEl);break;
    case 'equip': renderEquip(contentEl);break;
    case 'buildings': renderBuildings(contentEl);break;
    case 'arena': renderArena(contentEl);break;
    case 'codex': renderCodex(contentEl);break;
    case 'cheats': renderCheats(contentEl);break;
  }
}

// ==================== 战力计算 ====================
function calcHeroPower(h){
  var s=getHeroStats(h);
  return Math.floor(s.maxHP*0.5+s.atk*3+s.def*2.5+s.spd*2+s.maxMP*0.3);
}

// 战力排序切换
function toggleHeroSort(){
  window._heroSortDesc=!window._heroSortDesc;
  var btn=document.getElementById('hero-sort-btn');
  if(btn)btn.textContent=window._heroSortDesc?'📊战力↓':'📊战力↑';
  var list=document.getElementById('hero-list');
  if(!list)return;
  var cards=Array.from(list.children);
  cards.sort(function(a,b){
    var pa=parseInt(a.querySelector('.hero-power b')?.textContent)||0;
    var pb=parseInt(b.querySelector('.hero-power b')?.textContent)||0;
    return window._heroSortDesc?pb-pa:pa-pb;
  });
  cards.forEach(function(c){list.appendChild(c)});
}
function renderHeroes(el){
  if(G.heroes.length===0){
    el.innerHTML=`<div class="panel"><div class="panel-title"><span class="icon">⚔️</span> 英雄列表</div><div class="text-dim">还没有英雄，去酒馆招募吧！</div><div class="btn-group mt-8"><button class="btn btn-primary" onclick="renderTavernRecruit()">🍺 前往酒馆</button></div></div>`;
    return;
  }
  const sorted=[...G.heroes].sort((a,b)=>{
    const qi=QUALITIES.indexOf(a.quality)-QUALITIES.indexOf(b.quality);
    return qi!==0?-qi:b.level-a.level;
  });
  el.innerHTML=`
    <div class="panel">
      <div class="panel-title"><span class="icon">⚔️</span> 英雄列表 (${G.heroes.length})</div>
      <div style="display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;align-items:center">
        <button class="tab-btn active" onclick="filterHeroes('all',this)">全部</button>
        <button class="tab-btn" onclick="filterHeroes('team',this)">🛡️队伍</button>
        ${["rare","epic","legendary","mythic"].map(q=>`<button class="tab-btn" onclick="filterHeroes('${q}',this)">${QUALITY_NAMES[q]}</button>`).join('')}
        <span style="flex:1"></span>
        <button class="tab-btn" onclick="toggleHeroSort()" id="hero-sort-btn">📊战力↓</button>
      </div>
      <div id="hero-list">
        ${sorted.map(h=>renderHeroCard(h)).join('')}
      </div>
    </div>
  `;
}

      <div class="hero-meta">${role.icon} ${role.name} · ${QUALITY_NAMES[h.quality]} · Lv.${h.level} ${h.bonusSkills.length>0?'<span class="text-purple">★合成</span>':''}</div>

// 英雄详情弹窗（增强版）
function showHeroDetail(uid){
  const h=G.heroes.find(x=>x.uid===uid);
  if(!h)return;
  const role=ROLES[h.role];
  const stats=getHeroStats(h);
  const allSkills=[...h.skills,...h.bonusSkills];
  const inTeam=G.team.some(t=>t&&t.uid===h.uid);
  const power=calcHeroPower(h);
  const levelCap=getHeroLevelCap();

  // 品质颜色映射
  const qualityColors={common:'#aaa',rare:'#5b9bd5',epic:'#b06ce6',legendary:'#e8c840',mythic:'#ff6b6b'};
  const qualityStars={common:'★',rare:'★★',epic:'★★★',legendary:'★★★★',mythic:'★★★★★'};
  const qualityDescs={
    common:'基础品质，属性成长一般',
    rare:'稀有品质，属性加成+25%',
    epic:'史诗品质，属性加成+55%',
    legendary:'传说品质，属性加成+90%',
    mythic:'神话品质，属性加成+140%'
  };

  // 属性上限参考（用于进度条百分比）
  const statMaxRef={maxHP:8000,atk:500,def:350,spd:120,maxMP:500};
  const statColors={maxHP:'#c0392b',atk:'#e74c3c',def:'#2980b9',spd:'#27ae60',maxMP:'#8e44ad'};

  // 技能类型标签
  const skillTypeLabels={damage:'伤害',buff:'增益',debuff:'减益',heal:'治疗',shield:'护盾',drain:'汲取',cleanse:'净化'};
  const skillTypeColors={damage:'#e74c3c',buff:'#27ae60',debuff:'#8e44ad',heal:'#2ecc71',shield:'#3498db',drain:'#c0392b',cleanse:'#f1c40f'};

  // 装备槽位名称
  const slotNames={weapon:'武器',armor:'护甲',accessory:'饰品'};
  const slotIcons={weapon:'⚔️',armor:'🛡️',accessory:'💍'};

  // 计算下一级属性预览
  const nextLevelStats={};
  if(h.level<levelCap){
    const qm=QUALITY_MULT[h.quality];
    nextLevelStats.maxHP=calcStat(role.baseHP,qm,h.level+1);
    nextLevelStats.atk=calcStat(role.baseATK,qm,h.level+1);
    nextLevelStats.def=calcStat(role.baseDEF,qm,h.level+1);
    nextLevelStats.spd=calcStat(role.baseSPD,qm,h.level+1);
    nextLevelStats.maxMP=calcStat(role.baseMP,qm,h.level+1);
  }

  // 构建装备HTML
  function buildEquipHTML(){
    let html='';
    for(const slot of ['weapon','armor','accessory']){
      const eid=h.equipment[slot];
      if(eid!=null){
        const eq=G.equipment.find(e=>e.uid===eid);
        if(eq){
          const tpl=EQUIP_TEMPLATES.find(t=>t.id===eq.id);
          if(tpl){
            const enhanceLevel=eq.enhance||0;
            const enhanceMult=1+enhanceLevel*0.1;
            const statsStr=Object.entries(tpl.stats).map(([k,v])=>{
              const finalVal=Math.floor(v*enhanceMult);
              const statNames={atk:'攻击',def:'防御',hp:'生命',mp:'魔法',spd:'速度'};
              return (statNames[k]||k)+'+'+finalVal;
            }).join(' ');
            html+=`<div class="hd-equip-slot">
              <div class="hd-equip-icon">${tpl.icon}</div>
              <div class="hd-equip-info">
                <div class="hd-equip-name q-${tpl.quality}">${tpl.name}</div>
                <div class="hd-equip-stats">${statsStr}</div>
                ${enhanceLevel>0?`<div class="hd-equip-enhance">强化 +${enhanceLevel} (额外+${Math.round(enhanceLevel*10)}%)</div>`:''}
              </div>
              <span class="text-xs text-dim">${slotIcons[slot]} ${slotNames[slot]}</span>
            </div>`;
            continue;
          }
        }
      }
      html+=`<div class="hd-equip-slot">
        <div class="hd-equip-icon" style="opacity:.3">${slotIcons[slot]}</div>
        <div class="hd-equip-slot-empty">未装备${slotNames[slot]}</div>
      </div>`;
    }
    return html;
  }

  // 构建技能HTML
  function buildSkillHTML(){
    return allSkills.map((sid,idx)=>{
      const sk=SKILLS[sid];
      if(!sk)return '';
      const isBonus=idx>=h.skills.length;
      const typeLabel=skillTypeLabels[sk.type]||sk.type;
      const typeColor=skillTypeColors[sk.type]||'#999';
      let metaParts=[];
      if(sk.mpCost)metaParts.push('💎'+sk.mpCost);
      if(sk.cooldown)metaParts.push('⏱'+sk.cooldown+'回合');
      if(sk.mult)metaParts.push('倍率:'+sk.mult+'x');
      if(sk.healPct)metaParts.push('回复:'+Math.round(sk.healPct*100)+'%');
      if(sk.shieldPct)metaParts.push('护盾:'+Math.round(sk.shieldPct*100)+'%');
      if(sk.stunChance)metaParts.push('眩晕:'+Math.round(sk.stunChance*100)+'%');
      if(sk.critBonus)metaParts.push('暴击+'+Math.round(sk.critBonus*100)+'%');
      if(sk.alwaysHit)metaParts.push('必中');
      if(sk.dot)metaParts.push(sk.dot.name+':'+Math.round(sk.dot.dmgPct*100)+'%/回合');
      return `<div class="hd-skill-card" style="margin-bottom:8px">
        <div class="hd-skill-icon">${sk.icon}</div>

          <div class="hd-skill-name">${sk.name} ${isBonus?'<span class="text-purple text-xs">★融合</span>':''}</div>

          <div class="hd-skill-meta">
            <span style="color:${typeColor};background:rgba(255,255,255,.05);padding:1px 6px;border-radius:3px">${typeLabel}</span>
            ${metaParts.map(p=>'<span>'+p+'</span>').join('')}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // 构建成长预览HTML
  function buildGrowthHTML(){
    const statKeys=['maxHP','atk','def','spd','maxMP'];
    const statNames={maxHP:'❤️ 生命',atk:'⚔️ 攻击',def:'🛡️ 防御',spd:'💨 速度',maxMP:'💎 魔法'};
    const barColors={maxHP:'#c0392b',atk:'#e74c3c',def:'#2980b9',spd:'#27ae60',maxMP:'#8e44ad'};
    return statKeys.map(k=>{
      const val=stats[k]||0;
      const maxRef=statMaxRef[k]||100;
      const pct=Math.min(100,Math.round(val/maxRef*100));
      const nextVal=nextLevelStats[k];
      const diff=nextVal?nextVal-val:0;
      return `<div class="hd-growth-row">
        <div class="hd-growth-label">${statNames[k]}</div>
        <div class="hd-growth-bar">
          <div class="hd-growth-bar-fill" style="width:${pct}%;background:${barColors[k]}"></div>
        </div>
        <div class="hd-growth-val">${val}${diff>0?' <span style="color:var(--green);font-size:9px">+'+diff+'</span>':''}</div>
      </div>`;
    }).join('');
  }

  // 构建机制数据HTML

          <div class="hd-lore">"${h.lore}"</div>
        </div>
      </div>

      <!-- 品质说明 -->
      <div class="hd-section">
        <div class="hd-section-title">🏷️ 品质信息</div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <span class="hd-quality-badge hd-quality-${h.quality}" style="font-size:12px;padding:4px 12px">${qualityStars[h.quality]} ${QUALITY_NAMES[h.quality]}</span>

      <!-- 属性详情 -->
      <div class="hd-section">

        <div class="hd-stat-grid">

// 使用经验药水
// 使用经验药水（支持倍数：1/5/10/50/-1为全部）
function useExpPotion(heroUid,mult=1){
  const hero=G.heroes.find(h=>h.uid===heroUid);
  if(!hero)return;
  
  const levelCap=getHeroLevelCap();
  if(hero.level>=levelCap){
    showToast('该英雄已达当前等级上限！');
    return;
  }
  
  // 计算实际消耗数量
  const unitCost=100; // 每次消耗100药水
  let actualMult=mult;
  if(mult===-1){
    // 全部使用：计算最大可用倍数
    actualMult=Math.floor((G.resources.expPotion||0)/unitCost);
    if(actualMult<=0){
      showToast('经验药水不足！');
      return;
    }
  }
  
  const totalCost=unitCost*actualMult;
  const totalExp=100*actualMult;
  
  if((G.resources.expPotion||0)<totalCost){
    showToast(`经验药水不足！需要 🧪${totalCost}`);
    return;
  }
  
  // 消耗药水并增加经验
  G.resources.expPotion-=totalCost;
  const leveledUp=addHeroExp(hero,totalExp);
  
  updateResourceBar();
  saveGame();
  
  if(leveledUp){
    showToast(`${hero.icon}${hero.name} 升级了！当前 Lv.${hero.level}`);
  }else{
    showToast(`${hero.icon}${hero.name} 获得经验 +${totalExp} (${hero.exp}/${getExpToLevel(hero.level)})`);
  }
  
  // 刷新英雄详情弹窗
  showHeroDetail(heroUid);
}

// 购买经验药水
function buyExpPotion(){
  const potionPrice=50;
  const potionAmount=100;
  
  if((G.resources.gold||0)<potionPrice){
    showToast('金币不足！需要 💰'+potionPrice);
    return;
  }
  
  if((G.resources.expPotion||0)+potionAmount>RESOURCE_LIMITS.expPotion){
    showToast('经验药水已达上限！');
    return;
  }
  
  G.resources.gold-=potionPrice;
  G.resources.expPotion=(G.resources.expPotion||0)+potionAmount;
  updateResourceBar();
  saveGame();
  showToast(`购买成功！获得 🧪${potionAmount}经验药水`);
  renderTavernRecruit(); // 刷新界面显示
}

// 遣散英雄（返还资源）
function dismissHero(uid){
  var idx=G.heroes.findIndex(h=>h.uid===uid);
  if(idx<0)return;
  var h=G.heroes[idx];
  
  // 计算返还资源
  // 经验返还：累计获得经验的 70%
  var totalExp=0;
  for(var i=1;i<h.level;i++){
    totalExp+=getExpToLevel(i);
  }
  totalExp+=h.exp;
  var returnExp=Math.floor(totalExp*0.7);
  
  // 金币返还：基于品质和等级的招募成本返还 50%
  var qualityCostMult={common:1,rare:2,epic:4,legendary:8,mythic:16};
  var baseCost=50;
  var returnGold=Math.floor(baseCost*qualityCostMult[h.quality]*h.level*0.5);
  
  // 执行遣散
  G.team=G.team.map(t=>(t&&t.uid===uid)?null:t);
  G.heroes.splice(idx,1);
  
  // 发放返还资源
  if(returnExp>0){
    G.resources.expPotion=(G.resources.expPotion||0)+returnExp;
  }
  if(returnGold>0){
    G.resources.gold=Math.min((G.resources.gold||0)+returnGold,RESOURCE_LIMITS.gold);
  }
  
  closeModal();
  renderCurrentTab();
  updateResourceBar();
  saveGame();
  showToast(`已遣散 ${h.icon}${h.name} 返还 🧪${returnExp}经验药水 💰${returnGold}金币`);
}

// ==================== 扫荡功能 ====================
function quickClear(stageId){
  var stage=getStage(stageId);
  if(!stage || stageId>=G.stageProgress){
    showToast('只能扫荡已通关的关卡！');
    return;
  }
  var teamHeroes=G.team.filter(h=>h!==null);
  if(teamHeroes.length===0){
    showToast('请先编队！');
    return;
  }
  
  // 扫荡：直接结算奖励，跳过战斗
  var rw=stage.rewards;
  // 连胜加成
  var streakBonus=1+Math.min((G.pveWinStreak||0)*0.05,0.5);
  var finalGold=Math.floor((rw.gold||0)*streakBonus);
  var finalFood=Math.floor((rw.food||0)*streakBonus);
  var finalStone=Math.floor((rw.stone||0)*streakBonus);
  var finalIron=Math.floor((rw.iron||0)*streakBonus);
  
  G.resources.gold=Math.min((G.resources.gold||0)+finalGold,RESOURCE_LIMITS.gold);
  G.resources.food=Math.min((G.resources.food||0)+finalFood,RESOURCE_LIMITS.food);
  G.resources.stone=Math.min((G.resources.stone||0)+finalStone,RESOURCE_LIMITS.stone);
  G.resources.iron=Math.min((G.resources.iron||0)+finalIron,RESOURCE_LIMITS.iron);
  G.resources.gems=Math.min((G.resources.gems||0)+(rw.gems||0),RESOURCE_LIMITS.gems);
  
  // 经验
  teamHeroes.forEach(function(h){
    var expBonus=1;
    if(h.traits) h.traits.forEach(function(t){if(t.id==='tactician')expBonus+=0.20});
    addHeroExp(h,Math.floor((rw.exp||0)*expBonus));
  });
  
  // 装备掉落（扫荡掉率降低）
  if(Math.random()<0.15+stageId*0.02){
    var possibleDrops=EQUIP_TEMPLATES.filter(function(e){return QUALITIES.indexOf(e.quality)<=Math.min(stageId,4)});
    if(possibleDrops.length>0){
      var tpl=pick(possibleDrops);
      var drop={uid:++G.heroIdCounter,id:tpl.id,heroUid:null};
      G.equipment.push(drop);
      recordCodex('equipment',tpl.id);
      showToast('扫荡成功！获得 '+tpl.name);
    }else{
      showToast('扫荡成功！💰'+finalGold+' 🍞'+finalFood);
    }
  }else{
    showToast('扫荡成功！💰'+finalGold+' 🍞'+finalFood+' 🪨'+finalStone);
  }
  
  // 更新在线时间
  G.lastOnlineTime=Date.now();
  saveGame();
  updateResUI();
}

// ==================== 一键穿戴 ====================
function autoEquipAll(){
  // 获取所有未装备的装备
  var unequipped=G.equipment.filter(function(e){return e.heroUid===null});
  if(unequipped.length===0){showToast('没有可穿戴的装备');return}
  
  // 英雄按战力排序（高品质优先，同品质按等级）
  var qualityOrder={mythic:5,legendary:4,epic:3,rare:2,common:1};
  var sortedHeroes=G.heroes.slice().sort(function(a,b){
    var qa=qualityOrder[a.quality]||0, qb=qualityOrder[b.quality]||0;
    if(qa!==qb)return qb-qa;
    return b.level-a.level;
  });
  
  // 装备按品质排序（高品质优先，同品质按强化等级）
  var sortedEquip=unequipped.slice().sort(function(a,b){
    var ta=EQUIP_TEMPLATES.find(function(t){return t.id===a.id});
    var tb=EQUIP_TEMPLATES.find(function(t){return t.id===b.id});
    if(!ta||!tb)return 0;
    var qa=qualityOrder[ta.quality]||0, qb=qualityOrder[tb.quality]||0;
    if(qa!==qb)return qb-qa;
    return (b.enhance||0)-(a.enhance||0);
  });
  
  var equippedCount=0;
  sortedEquip.forEach(function(eq){
    var tpl=EQUIP_TEMPLATES.find(function(t){return t.id===eq.id});
    if(!tpl)return;
    var slot=tpl.type==='weapon'?'weapon':tpl.type==='armor'?'armor':'accessory';
    
    // 找到该槽位未装备的最高优先级英雄
    for(var i=0;i<sortedHeroes.length;i++){
      var hero=sortedHeroes[i];
      if(hero.equipment[slot]==null){
        // 装备
        hero.equipment[slot]=eq.uid;
        eq.heroUid=hero.uid;
        equippedCount++;
        break;
      }
    }
  });
  
  saveGame();
  renderCurrentTab();
  showToast('✅ 一键穿戴完成！共装备 '+equippedCount+' 件');
}

// ==================== 一键强化 ====================
function autoEnhanceAll(){
  // 获取所有已穿戴装备，按品质排序（高品质优先）
  var qualityOrder={mythic:5,legendary:4,epic:3,rare:2,common:1};
  var equipped=G.equipment.filter(function(e){return e.heroUid!==null});
  if(equipped.length===0){showToast('没有已穿戴的装备');return}
  
  // 按品质排序（高品质优先），同品质按强化等级低的优先
  equipped.sort(function(a,b){
    var ta=EQUIP_TEMPLATES.find(function(t){return t.id===a.id});
    var tb=EQUIP_TEMPLATES.find(function(t){return t.id===b.id});
    if(!ta||!tb)return 0;
    var qa=qualityOrder[ta.quality]||0, qb=qualityOrder[tb.quality]||0;
    if(qa!==qb)return qb-qa;
    return (a.enhance||0)-(b.enhance||0);
  });
  
  var totalEnhanced=0;
  var totalGold=0;
  var totalIron=0;
  
  equipped.forEach(function(eq){
    // 先卸下
    var heroUid=eq.heroUid;
    eq.heroUid=null;
    
    var level=eq.enhance||0;
    while(level<10){
      var ironCost=10+level*5;
      var goldCost=50+level*30;
      
      if((G.resources.iron||0)<ironCost||(G.resources.gold||0)<goldCost)break;
      
      G.resources.iron-=ironCost;
      G.resources.gold-=goldCost;
      totalGold+=goldCost;
      totalIron+=ironCost;
      level++;
    }
    
    if(level>(eq.enhance||0)){
      eq.enhance=level;
      totalEnhanced++;
    }
    
    // 重新穿上
    eq.heroUid=heroUid;
  });
  
  saveGame();
  updateResUI();
  renderCurrentTab();
  
  if(totalEnhanced>0){
    showToast('✅ 一键强化完成！强化 '+totalEnhanced+' 件装备 (💰'+totalGold+' ⛏️'+totalIron+')');
  }else{
    showToast('⚠️ 没有装备可以强化（资源不足或已满级）');
  }
}

// ==================== 装备强化与分解 ====================
function enhanceEquipment(equipUid){
  var eq=G.equipment.find(function(e){return e.uid===equipUid});
  if(!eq){showToast('装备不存在！');return}
  if(eq.heroUid){showToast('请先卸下装备！');return}
  
  var level=eq.enhance||0;
  if(level>=10){showToast('已达到最高强化等级！');return}
  
  // 强化消耗：铁矿随等级递增
  var ironCost=10+level*5;
  var goldCost=50+level*30;
  
  if((G.resources.iron||0)<ironCost){showToast('铁矿不足！需要 '+ironCost+' ⛏️');return}
  if((G.resources.gold||0)<goldCost){showToast('金币不足！需要 '+goldCost+' 💰');return}
  
  G.resources.iron-=ironCost;
  G.resources.gold-=goldCost;
  eq.enhance=level+1;
  
  var tpl=EQUIP_TEMPLATES.find(function(t){return t.id===eq.id});
  showToast(tpl.name+' 强化成功！+'+(level+1));
  saveGame();
  updateResUI();
  renderCurrentTab();
}

function decomposeEquipment(equipUid){
  var eq=G.equipment.find(function(e){return e.uid===equipUid});
  if(!eq){showToast('装备不存在！');return}
  if(eq.heroUid){showToast('请先卸下装备！');return}
  
  var tpl=EQUIP_TEMPLATES.find(function(t){return t.id===eq.id});
  if(!tpl){showToast('装备数据错误！');return}
  
  if(!confirm('确定要分解 '+tpl.name+' 吗？'))return;
  
  // 分解返还铁矿（基础返还+强化返还）
  var qualityIdx=QUALITIES.indexOf(tpl.quality);
  var baseIron=5+qualityIdx*10;
  var enhanceBonus=(eq.enhance||0)*5;
  var ironReturn=baseIron+enhanceBonus;
  
  G.resources.iron=Math.min((G.resources.iron||0)+ironReturn,RESOURCE_LIMITS.iron);
  G.equipment=G.equipment.filter(function(e){return e.uid!==equipUid});
  
  showToast('分解成功！获得 ⛏️'+ironReturn+' 铁矿');
  saveGame();
  updateResUI();
  renderCurrentTab();
}

function forgeEquipment(maxQuality){
  // 检查铁匠铺等级是否允许锻造该品质
  var bsLevel=G.buildings.blacksmith||0;
  var bsDef=BUILDING_DEFS.blacksmith;
  var allowedQuality=bsDef.forgeQualityByLevel[bsLevel]||'common';
  var allowedIdx=QUALITIES.indexOf(allowedQuality);
  var requestIdx=QUALITIES.indexOf(maxQuality);
  if(requestIdx>allowedIdx){
    showToast('铁匠铺等级不足！当前最高可锻造：'+QUALITY_NAMES[allowedQuality]+'，需要铁匠铺 Lv.'+(requestIdx+1));
    return;
  }
  // 锻造费用：金币+铁矿（品质越高消耗越多）
  var ironCosts={common:3,rare:8,epic:20,legendary:50,mythic:120};
  var goldCosts={common:50,rare:150,epic:400,legendary:1000,mythic:2500};
  var cost={gold:goldCosts[maxQuality]||100,iron:ironCosts[maxQuality]||5};
  if(!canAfford(cost)){showToast('资源不足！需要 '+RESOURCE_DEFS.gold.icon+cost.gold+' '+RESOURCE_DEFS.iron.icon+cost.iron);return}
  for(let[k,v]of Object.entries(cost))G.resources[k]-=v;
  var maxQIdx=QUALITIES.indexOf(maxQuality);
  var pool=EQUIP_TEMPLATES.filter(t=>QUALITIES.indexOf(t.quality)<=maxQIdx);
  var tpl=pool.length>0?pick(pool):EQUIP_TEMPLATES[0];
  var eq=createEquipment(tpl.id);
  G.equipment.push(eq);
  updateResUI();
  showToast('锻造成功！获得 '+tpl.icon+' '+tpl.name+' ('+QUALITY_NAMES[tpl.quality]+')');
  renderCurrentTab();
}

function renderArena(el){

// 指定品质生成英雄
function cheatSpawnHero(quality){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  var tpl = HERO_TEMPLATES.filter(function(t){return t.quality===(quality||'rare')})[0] || HERO_TEMPLATES[0];
  var hero = createHero(tpl.id);
  hero.quality = quality || 'rare';
  // 重新计算属性
  var qm = QUALITY_MULT[hero.quality];
  hero.maxHP = Math.floor(hero.maxHP * qm / QUALITY_MULT.common);
  hero.hp = hero.maxHP;
  hero.atk = Math.floor(hero.atk * qm / QUALITY_MULT.common);
  hero.def = Math.floor(hero.def * qm / QUALITY_MULT.common);
  hero.spd = Math.floor(hero.spd * qm / QUALITY_MULT.common);
  hero.maxMP = Math.floor(hero.maxMP * qm / QUALITY_MULT.common);
  hero.mp = hero.maxMP;
  G.heroes.push(hero);
  saveGame();
  showToast('✨ 已生成 ' + QUALITY_NAMES[hero.quality] + ' 英雄: ' + hero.icon + ' ' + hero.name);
  renderCurrentTab();
}

// 修改指定英雄等级
function cheatSetHeroLevel(uid, level){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  var hero = G.heroes.find(function(h){return h.uid===uid});
  if(!hero){showToast('英雄不存在');return;}
  hero.level = Math.max(1, Math.min(99, level));
  saveGame();
  showToast(hero.icon + ' ' + hero.name + ' 等级已设为 ' + hero.level);
  renderCurrentTab();
}

function cheatMaxAllSkills(){

  G.heroes.forEach(function(h){
    // 添加所有该职业的技能

  renderCurrentTab();
}

function cheatDeleteHero(uid){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  var idx = G.heroes.findIndex(function(h){return h.uid===uid});
  if(idx<0){showToast('英雄不存在');return;}
  var h = G.heroes[idx];
  G.team = G.team.map(function(t){return (t&&t.uid===uid)?null:t});

  showToast('🗑️ 已删除 ' + h.icon + ' ' + h.name);
  renderCurrentTab();

// 复制英雄
function cheatCloneHero(uid){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  var hero = G.heroes.find(function(h){return h.uid===uid});
  if(!hero){showToast('英雄不存在');return;}
  var clone = JSON.parse(JSON.stringify(hero));
  clone.uid = ++G.heroIdCounter;
  clone.name = hero.name + '·复制';
  G.heroes.push(clone);
  saveGame();
  showToast('📋 已复制 ' + hero.icon + ' ' + hero.name);
  renderCurrentTab();
}

function unlockCheats(){
  var input=document.getElementById('cheat-password-input');
  var err=document.getElementById('cheat-error');
  if(!input||!err)return;
  var pwd=input.value.trim();
  if(pwd==='741929749'){
    G_cheats.unlocked=true;
    G_cheats.enabled=true;
    showToast('🔓 金手指已解锁！');
    renderCurrentTab();
  }else{
    err.textContent='❌ 密码错误，请联系QQ741929749获取正确密码';
    err.style.display='block';
    input.value='';
    input.focus();
  }
}

function toggleCheats(){
  G_cheats.enabled = !G_cheats.enabled;
  showToast(G_cheats.enabled ? '🔓 金手指已开启' : '🔒 金手指已关闭');
  updateCheatPanel();
}

function cheatGold(){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  G.resources.gold += 999999;
  updateResUI();
  showToast('💰 金币 +999999');
}

function cheatGems(){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  G.resources.gems += 999;
  updateResUI();
  showToast('💎 宝石 +999');
}

function cheatAllResources(){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  G.resources.gold += 999999;
  G.resources.gems += 999;
  G.resources.stone += 999;
  G.resources.iron += 999;
  G.resources.food += 999;
  G.resources.fame += 999;
  updateResUI();
  showToast('📦 所有资源已加满');
}

function cheatMaxLevel(){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  G.heroes.forEach(function(h){
    h.level = 50;
    h.exp = 0;
    h.maxHP = Math.floor(h.maxHP * (1 + (h.level - 1) * 0.15));
    h.atk = Math.floor(h.atk * (1 + (h.level - 1) * 0.12));
    h.def = Math.floor(h.def * (1 + (h.level - 1) * 0.10));
  });
  showToast('⭐ 所有英雄已升至50级');
}

function cheatGodMode(){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  G_cheats.godMode = !G_cheats.godMode;
  showToast(G_cheats.godMode ? '🛡️ 无敌模式已开启' : '🛡️ 无敌模式已关闭');

}

  // 刷新合成页面以更新显示
  if(document.getElementById('merge-result')){
    updateMergeUI();
  }

function cheatSkipStage(){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  G.stageProgress++;
  showToast('⏭️ 已跳过当前关卡');
}

function cheatUnlockAll(){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  // 解锁所有英雄模板
  HERO_TEMPLATES.forEach(function(tpl){
    if(!G.heroes.some(function(h){return h.templateId===tpl.id})){
      G.heroes.push(createHero(tpl.id, 1));
    }
  });
  showToast('🔓 已解锁所有英雄');
}

function updateCheatPanel(){
  var panel = document.getElementById('cheat-panel');
  if(panel){
    panel.style.display = G_cheats.enabled ? 'block' : 'none';
  }
}

// ==================== 初始化 ====================
function initGame(){
  // 尝试读档
  if(loadGame()){
    updateResUI();
    startAutoProduction();
    switchTab('town');
    showToast('📂 已读取存档');
    return;
  }
  
  // 给玩家初始英雄
  const starter1=createHero('swordsman',1);
  const starter2=createHero('squire',1);
  const starter3=createHero('apprentice',1);
  const starter4=createHero('herbalist',1);
  G.heroes.push(starter1,starter2,starter3,starter4);
  G.team[0]=starter1;
  G.team[1]=starter2;
  G.team[2]=starter3;
  G.team[3]=starter4;

  // 初始装备
  G.equipment.push(createEquipment('rusty_sword'));
  G.equipment.push(createEquipment('wooden_shield'));
  G.equipment.push(createEquipment('leather_armor'));
  G.equipment.push(createEquipment('magic_ring'));

  updateResUI();
  G.stageProgress=1;
  startAutoProduction();
  switchTab('town');
}

// 导航事件
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>switchTab(btn.dataset.tab));
});

// 启动游戏
initGame();

// H5独立模式隐藏金手指按钮
if(G_isH5Package){
  var cheatBtn=document.getElementById('nav-cheats-btn');
  if(cheatBtn)cheatBtn.style.display='none';
}

// 自动战斗测试入口
if(window.location.hash==='#autobattle'){setTimeout(function(){startBattle(1)},800)}
