          <div><span class="text-dim">预计属性:</span> ❤️~${avgHP} ⚔️~${avgATK} 🛡️~${avgDEF}</div>
        </div>
        <div style="margin-top:8px">
          <span class="text-dim">技能池 (${skillPool.length}个):</span>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">
            ${skillPool.slice(0,8).map(sk=>`<span class="skill-tag" style="font-size:10px">${sk.icon}${sk.name}</span>`).join('')}${skillPool.length>8?`<span class="text-dim text-xs">+${skillPool.length-8}个</span>`:''}
          </div>
        </div>
        <div style="margin-top:8px;font-size:11px;color:var(--text3)">
          🎲 异变率: 30% | 品质+1: 5% | 神话降临: 1%
        </div>
      </div>`;
  }
  
  var luckyInfo=getMergeLuckyInfo();
  var streakInfo=getMergeStreakInfo();
  var qualities=selectedHeroes.map(function(h){return QUALITIES.indexOf(h.quality)});
  var maxQ=qualities.length>0?Math.max.apply(null,qualities):0;
  var mergeCost=selectedHeroes.length>=2?(maxQ+1)*1000:0;
  var bondPreview=selectedHeroes.length>=2?detectMergeBond(selectedHeroes):null;
  var canAfford=(G.resources.gold||0)>=mergeCost;
  
  // 合成历史
  var historyHtml='';
  if(G.mergeHistory&&G.mergeHistory.length>0){
    historyHtml='<div class="panel"><div class="panel-title"><span class="icon">📖</span> 合成记录 <span class="text-xs text-dim">('+G.mergeHistory.length+'条)</span></div><div style="max-height:200px;overflow-y:auto">';
    G.mergeHistory.slice(0,10).forEach(function(rec){
      var cls=rec.result.isMutation?(rec.result.quality==='hidden'?'hidden':rec.result.quality==='mythic'?'mythic':rec.result.quality==='legendary'?'legendary':'mutation'):'';
      if(rec.result.isUpset) cls='quality-up';
      var bondTag=rec.result.bondInfo?' <span class="merge-bond-tag">'+rec.result.bondInfo.name+'</span>':'';
      var upsetTag=rec.result.isUpset?' <span style="color:#2ecc71;font-size:10px">🍀</span>':'';
      historyHtml+='<div class="merge-history-item '+cls+'">'
        +'<span>'+rec.materials.map(function(m){return m.icon}).join('+')+' → '+rec.result.icon+' '+rec.result.name
        +'<span class="q-'+rec.result.quality+'" style="font-size:10px;margin-left:4px">'+QUALITY_NAMES[rec.result.quality]+'</span>'
        +bondTag+upsetTag
        +'<span class="text-dim" style="margin-left:auto;font-size:10px">×'+(rec.mult?rec.mult.toFixed(2):'?')+'</span>'
        +'</div>';
    });
    historyHtml+='</div></div>';
  }
  
  // 回溯按钮
  var undoHtml='';
  if(G.lastMerge && (Date.now()-G.lastMerge.timestamp)<86400000){
    undoHtml='<div style="margin-top:8px;text-align:center"><button class="merge-undo-btn" onclick="undoMerge()">↩ 撤销上次合成 (50💎)</button></div>';
  }
  
  // 羁绊预览
  var bondHtml='';
  if(bondPreview){
    bondHtml='<div style="margin-top:8px;padding:8px 12px;background:linear-gradient(135deg,rgba(52,152,219,.1),rgba(155,89,182,.05));border:1px solid rgba(52,152,219,.2);border-radius:var(--radius-sm);font-size:12px">'
      +'<span class="merge-bond-tag">'+bondPreview.name+'</span> <span style="color:#5dade2">'+bondPreview.desc+'</span></div>';
  }
  
  // 连击显示
  var streakHtml='';
  if(streakInfo.cooldown>0){
    var min=Math.floor(streakInfo.cooldown/60000);
    var sec=Math.floor((streakInfo.cooldown%60000)/1000);
    streakHtml='<div style="text-align:center;margin-bottom:8px"><span class="merge-streak-badge" style="background:rgba(100,100,100,.15);border-color:rgba(100,100,100,.3);color:#888">⏱️ 冷却中 '+min+':'+(sec<10?'0':'')+sec+'</span></div>';
  }else if(streakInfo.active&&streakInfo.count>=2){
    var streakBonus=streakInfo.count>=10?'必定异变':streakInfo.count>=5?'额外技能+1':streakInfo.count>=3?'属性下限提升':'';
    streakHtml='<div style="text-align:center;margin-bottom:8px"><span class="merge-streak-badge">🔥 连击 ×'+streakInfo.count+'</span>'
      +(streakBonus?' <span class="text-xs" style="color:#ff6b6b">'+streakBonus+'</span>':'')+'</div>';
  }
  
  el.innerHTML=`
    ${streakHtml}
    <div class="panel merge-glow">
      <div class="panel-title"><span class="icon">⚗️</span> 英雄融合</div>
      <div class="merge-lucky-bar">
        <div>
          <div class="merge-lucky-label">🍀 幸运值</div>
          <div class="merge-lucky-val">${luckyInfo.lucky}</div>
        </div>
        <div style="flex:1">
          <div class="merge-lucky-label">异变概率 <span class="merge-lucky-bonus">${luckyInfo.rate}%</span></div>
          <div class="merge-pity-bar"><div class="merge-pity-fill" style="width:${luckyInfo.rate/50*100}%"></div></div>
        </div>
        <div>
          <div class="merge-lucky-label">🎯 保底</div>
          <div class="merge-lucky-val" style="font-size:14px;color:${luckyInfo.pity>=8?'#ff6b6b':'var(--text)'}">${luckyInfo.pity}/10</div>
        </div>
      </div>
      <div class="merge-cost">💰 消耗: <b>${mergeCost}</b> 金币 ${canAfford?'':'<span class="text-red">(不足)</span>'}</div>
      <div class="merge-slots" id="merge-slots">
        <div class="merge-slot" id="merge-slot-0">?</div>
        <div class="merge-slot" id="merge-slot-1">?</div>
        <div class="merge-slot" id="merge-slot-2">?</div>
        <div class="merge-arrow">→</div>
        <div class="merge-result" id="merge-result">?</div>
      </div>
      ${bondHtml}
      <div id="merge-preview" class="text-dim text-sm mt-8">${selectedHeroes.length<2?'请选择至少2个英雄进行融合':previewHTML}</div>
      <div class="btn-group mt-8">
        <button class="btn btn-primary" id="merge-btn" onclick="doMerge()" ${selectedHeroes.length<2||!canAfford?'disabled':''}>开始融合</button>
        <button class="btn" onclick="clearMerge()">清空</button>
      </div>
      ${undoHtml}
    </div>
    <div class="panel">
      <div class="panel-title"><span class="icon">📖</span> 融合规则</div>
      <div class="text-dim text-sm" style="line-height:2">
        <div>⚗️ <b>任意融合</b>：任何2-3个英雄都可以融合</div>
        <div>💰 <b>合成消耗</b>：金币 = (最高品质+1) × 1000</div>
        <div>🎲 <b>属性继承</b>：材料平均值 × (0.6~1.8)随机</div>
        <div>🍀 <b>幸运值</b>：每次普通合成+1，提升异变概率</div>
        <div>🎯 <b>保底机制</b>：连续10次无特殊触发，下次品质+1</div>
        <div>🔗 <b>合成羁绊</b>：特定职业组合获得属性加成</div>
        <div>🍀 <b>以弱胜强</b>：低品质材料5%逆袭史诗</div>
        <div>🧬 <b>技能变异</b>：异变时10%技能强化变异</div>
        <div>🔥 <b>连续合成</b>：1分钟内连击获得额外奖励</div>
        <div>↩ <b>合成回溯</b>：50💎撤销最近一次合成</div>
      </div>
    </div>
    ${historyHtml}
    <div class="panel">
      <div class="panel-title"><span class="icon">👥</span> 可用英雄 (${heroCount}) <span class="text-xs text-dim">点击添加/移除</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px">${heroesHTML}</div>
    </div>
  `;
  if(!window._mergeSlots) window._mergeSlots=[null,null,null];
  updateMergeUI();
}

function addMergeHero(heroUid){
  // 找到第一个空槽位
  for(var i=0;i<3;i++){
    if(!window._mergeSlots[i]){
      window._mergeSlots[i]=heroUid;
      renderMerge(document.getElementById('content'));
      return;
    }
  }
  showToast('合成框已满（最多3个）');
}

function removeMergeHero(heroUid){
  // 找到并移除该英雄
  for(var i=0;i<3;i++){
    if(window._mergeSlots[i]===heroUid){
      window._mergeSlots[i]=null;
      renderMerge(document.getElementById('content'));
      return;
    }
  }
}

function showMergePicker(slotIdx){
  const usedUids=window._mergeSlots.filter(Boolean);
  // 获取已上阵英雄UID列表
  const teamUids=G.team.filter(h=>h!==null).map(h=>h.uid);
  // 过滤：已使用的 + 已上阵的 + 已锁定的
  const available=G.heroes.filter(h=>!usedUids.includes(h.uid)&&!teamUids.includes(h.uid)&&!h.locked);
  if(available.length===0){
    // 检查是否因为全部上阵或锁定了
    const allInTeam=G.heroes.length>0&&G.heroes.every(h=>teamUids.includes(h.uid));
    const allLocked=G.heroes.length>0&&G.heroes.every(h=>h.locked||teamUids.includes(h.uid));
    if(allInTeam){
      showToast('所有英雄都已上阵，无法合成');
    }else if(allLocked){
      showToast('所有英雄都已锁定，无法合成');
    }else{
      showToast('没有可用英雄');
    }
    return;
  }
  const html=available.map(h=>`
    <div class="hero-card quality-${h.quality}" onclick="pickMergeHero(${slotIdx},${h.uid})" style="cursor:pointer">
      <div class="hero-avatar">${h.icon}</div>
      <div class="hero-info">
        <div class="hero-name"><span class="q-${h.quality}">${h.name}</span></div>
        <div class="hero-meta">${ROLES[h.role].icon} ${ROLES[h.role].name} · Lv.${h.level}</div>
      </div>
    </div>
  `).join('');
  showModal('选择合成材料',html);
}

function pickMergeHero(slotIdx,heroUid){
  window._mergeSlots[slotIdx]=heroUid;
  closeModal();
  updateMergeUI();
}

function updateMergeUI(){
  const slots=window._mergeSlots;
  for(let i=0;i<3;i++){
    const el=document.getElementById('merge-slot-'+i);
    const hero=slots[i]?G.heroes.find(h=>h.uid===slots[i]):null;
    if(hero){
      el.innerHTML='<div style="text-align:center"><div style="font-size:28px">'+hero.icon+'</div><div class="text-xs q-'+hero.quality+'">'+hero.name+'</div><div class="text-xs text-dim">Lv.'+hero.level+'</div></div>';
      el.classList.add('filled','quality-'+hero.quality);
    }else{
      el.innerHTML='?';
      el.classList.remove('filled');
      el.className='merge-slot';
    }
  }
  const activeSlots=slots.filter(Boolean);
  const resultEl=document.getElementById('merge-result');
  const previewEl=document.getElementById('merge-preview');
  const btn=document.getElementById('merge-btn');

  if(activeSlots.length>=2){
    const heroes=activeSlots.map(uid=>G.heroes.find(h=>h.uid===uid)).filter(Boolean);
    if(heroes.length>=2){
      // 预览融合结果（需要金手指开启 showMergeResult 才显示）
      if(G_cheats.enabled && G_cheats.showMergeResult){
        var preview=generateFusedHero(heroes);
        resultEl.innerHTML='<div style="text-align:center"><div style="font-size:32px">'+preview.icon+'</div><div class="text-xs q-'+preview.quality+'" style="font-weight:bold">'+preview.name+'</div><div class="text-xs text-dim">'+ROLES[preview.role].icon+' '+ROLES[preview.role].name+'</div></div>';
        var skillNames=preview.skills.map(function(s){return SKILLS[s]?SKILLS[s].icon+SKILLS[s].name:s}).join(' ');
        previewEl.innerHTML='<span class="text-green">✓ 可融合：'+preview.icon+' '+preview.name+' ('+QUALITY_NAMES[preview.quality]+')</span>'
          +'<br><span class="text-xs text-dim">❤️'+preview.maxHP+' ⚔️'+preview.atk+' 🛡️'+preview.def+' 🏃'+preview.spd+' 💧'+preview.maxMP+'</span>'
          +'<br><span class="text-xs text-purple">技能：'+skillNames+'</span>';
      }else{
        var bondPrev=detectMergeBond(heroes);
        var qIdx=heroes.map(function(h){return QUALITIES.indexOf(h.quality)});
        var mQ=Math.max.apply(null,qIdx);
        var cost=(mQ+1)*1000;
        var bondStr=bondPrev?'<br><span class="merge-bond-tag">'+bondPrev.name+'</span> <span style="color:#5dade2;font-size:11px">'+bondPrev.desc+'</span>':'';
        resultEl.innerHTML='<div style="text-align:center"><div style="font-size:32px">❓</div><div class="text-xs text-dim">???</div></div>';
        previewEl.innerHTML='<span class="text-green">✓ 已选择 '+heroes.length+' 个英雄，可进行融合</span>'
          +'<br><span class="text-xs text-dim">💰 消耗 '+cost+' 金币'+bondStr+'</span>';
      }
      btn.disabled=false;
    }else{
      resultEl.innerHTML='?';
      previewEl.innerHTML='<span class="text-red">英雄不存在</span>';
      btn.disabled=true;
    }
  }else{
    resultEl.innerHTML='?';
    previewEl.innerHTML='请选择至少2个英雄进行融合';
    btn.disabled=true;
  }
}

function doMerge(){
  const activeSlots=window._mergeSlots.filter(Boolean);
  if(executeMerge(activeSlots)){
    window._mergeSlots=[null,null,null];
    renderMerge(document.getElementById('content'));
  }
}

function clearMerge(){
  window._mergeSlots=[null,null,null];
  renderMerge(document.getElementById('content'));
}

function renderEquip(el){
  const unequipped=G.equipment.filter(e=>e.heroUid===null);
  const equipped=G.equipment.filter(e=>e.heroUid!==null);
  
  // 简化版装备列表 - 只显示名字和套装标记
  let unequippedHTML='';
  unequipped.forEach(eq=>{
    const tpl=EQUIP_TEMPLATES.find(t=>t.id===eq.id);
    if(!tpl)return;
    const enhanceLevel=eq.enhance||0;
    const enhanceBonus=enhanceLevel>0?'+'+enhanceLevel:'';
    // 套装标记
    let setBadge='';
    if(tpl.setId && EQUIP_SETS[tpl.setId]){
      setBadge='<span class="equip-set-badge">'+EQUIP_SETS[tpl.setId].icon+'</span>';
    }
    // 词缀数量标记

      }
      var tierClr=AFFIX_TIERS[bestTier-1].color;
      affixCountHtml='<span style="font-size:9px;color:'+tierClr+';margin-left:3px">🔮'+eq.affixes.length+'</span>';
    }
    unequippedHTML+='<div class="equip-item quality-'+tpl.quality+'" onclick="showEquipDetail('+eq.uid+')">'

      +'<span class="equip-name q-'+tpl.quality+'">'+tpl.name+'<span class="equip-enhance">'+enhanceBonus+'</span></span>'

      setBadge='<span class="equip-set-badge">'+EQUIP_SETS[tpl.setId].icon+'</span>';

      }
      var tierClr2=AFFIX_TIERS[bestTier2-1].color;
      affixCountHtml2='<span style="font-size:9px;color:'+tierClr2+';margin-left:3px">🔮'+eq.affixes.length+'</span>';
    }
    equippedHTML+='<div class="equip-item quality-'+tpl.quality+'" onclick="showEquipDetail('+eq.uid+')">'
      +'<span class="equip-icon">'+tpl.icon+'</span>'
      +'<span class="equip-name q-'+tpl.quality+'">'+tpl.name+'<span class="equip-enhance">'+enhanceBonus+'</span></span>'

      +setBadge

// ==================== 一键穿戴 ====================
function autoEquipAll(){
  // 获取所有未装备的装备
  var unequipped=G.equipment.filter(function(e){return e.heroUid===null});
  if(unequipped.length===0){showToast('没有可穿戴的装备');return}
  
  // 英雄按战力排序（高品质优先，同品质按等级）
  var qualityOrder={mythic:5,legendary:4,epic:3,rare:2,common:1};
  var sortedHeroes=G.heroes.slice().sort(function(a,b){
    var qa=qualityOrder[a.quality]||0, qb=qualityOrder[b.quality]||0;
    if(qa!==qb)return qb-qa;
    return b.level-a.level;
  });
  
  // 装备按品质排序（高品质优先，同品质按强化等级）
  var sortedEquip=unequipped.slice().sort(function(a,b){
    var ta=EQUIP_TEMPLATES.find(function(t){return t.id===a.id});
    var tb=EQUIP_TEMPLATES.find(function(t){return t.id===b.id});
    if(!ta||!tb)return 0;
    var qa=qualityOrder[ta.quality]||0, qb=qualityOrder[tb.quality]||0;
    if(qa!==qb)return qb-qa;
    return (b.enhance||0)-(a.enhance||0);
  });
  
  var equippedCount=0;
  sortedEquip.forEach(function(eq){
    var tpl=EQUIP_TEMPLATES.find(function(t){return t.id===eq.id});
    if(!tpl)return;
    var slot=tpl.type==='weapon'?'weapon':tpl.type==='armor'?'armor':'accessory';
    
    // 找到该槽位未装备的最高优先级英雄
    for(var i=0;i<sortedHeroes.length;i++){
      var hero=sortedHeroes[i];
      if(hero.equipment[slot]==null){
        // 装备
        hero.equipment[slot]=eq.uid;
        eq.heroUid=hero.uid;
        equippedCount++;
        break;
      }
    }
  });
  
  saveGame();
  renderCurrentTab();
  showToast('✅ 一键穿戴完成！共装备 '+equippedCount+' 件');
}

// ==================== 一键强化 ====================
function autoEnhanceAll(){
  // 获取所有已穿戴装备，按品质排序（高品质优先）
  var qualityOrder={mythic:5,legendary:4,epic:3,rare:2,common:1};
  var equipped=G.equipment.filter(function(e){return e.heroUid!==null});
  if(equipped.length===0){showToast('没有已穿戴的装备');return}
  
  // 按品质排序（高品质优先），同品质按强化等级低的优先
  equipped.sort(function(a,b){
    var ta=EQUIP_TEMPLATES.find(function(t){return t.id===a.id});
    var tb=EQUIP_TEMPLATES.find(function(t){return t.id===b.id});
    if(!ta||!tb)return 0;
    var qa=qualityOrder[ta.quality]||0, qb=qualityOrder[tb.quality]||0;
    if(qa!==qb)return qb-qa;
    return (a.enhance||0)-(b.enhance||0);
  });
  
  var totalEnhanced=0;
  var totalGold=0;
  var totalIron=0;
  
  equipped.forEach(function(eq){
    // 先卸下
    var heroUid=eq.heroUid;
    eq.heroUid=null;
    
    var level=eq.enhance||0;
    while(level<10){
      var ironCost=10+level*5;
      var goldCost=50+level*30;
      
      if((G.resources.iron||0)<ironCost||(G.resources.gold||0)<goldCost)break;
      
      G.resources.iron-=ironCost;
      G.resources.gold-=goldCost;
      totalGold+=goldCost;
      totalIron+=ironCost;
      level++;
    }
    
    if(level>(eq.enhance||0)){
      eq.enhance=level;
      totalEnhanced++;
    }
    
    // 重新穿上
    eq.heroUid=heroUid;
  });
  
  saveGame();
  updateResUI();
  renderCurrentTab();
  
  if(totalEnhanced>0){
    showToast('✅ 一键强化完成！强化 '+totalEnhanced+' 件装备 (💰'+totalGold+' ⛏️'+totalIron+')');
  }else{
    showToast('⚠️ 没有装备可以强化（资源不足或已满级）');
  }
}

// ==================== 装备强化与分解 ====================
function enhanceEquipment(equipUid){
  var eq=G.equipment.find(function(e){return e.uid===equipUid});
  if(!eq){showToast('装备不存在！');return}
  if(eq.heroUid){showToast('请先卸下装备！');return}
  
  var level=eq.enhance||0;
  if(level>=10){showToast('已达到最高强化等级！');return}
  
  // 强化消耗：铁矿随等级递增
  var ironCost=10+level*5;
  var goldCost=50+level*30;
  
  if((G.resources.iron||0)<ironCost){showToast('铁矿不足！需要 '+ironCost+' ⛏️');return}
  if((G.resources.gold||0)<goldCost){showToast('金币不足！需要 '+goldCost+' 💰');return}
  
  G.resources.iron-=ironCost;
  G.resources.gold-=goldCost;
  eq.enhance=level+1;
  
  var tpl=EQUIP_TEMPLATES.find(function(t){return t.id===eq.id});
  showToast(tpl.name+' 强化成功！+'+(level+1));
  saveGame();
  updateResUI();
  renderCurrentTab();
}

function decomposeEquipment(equipUid){
  var eq=G.equipment.find(function(e){return e.uid===equipUid});
  if(!eq){showToast('装备不存在！');return}
  if(eq.heroUid){showToast('请先卸下装备！');return}
  
  var tpl=EQUIP_TEMPLATES.find(function(t){return t.id===eq.id});
  if(!tpl){showToast('装备数据错误！');return}
  
  showConfirm('分解装备','确定要分解 <b style="color:var(--gold)">'+tpl.icon+' '+tpl.name+'</b> 吗？<br><span style="font-size:12px;color:var(--text3)">将返还 ⛏️ 铁矿</span>',function(){ doDecompose(equipUid,tpl); });
}

function doDecompose(equipUid,tpl){
  var eq=G.equipment.find(function(e){return e.uid===equipUid});
  if(!eq) return;
  
  // 分解返还铁矿（基础返还+强化返还）
  var qualityIdx=QUALITIES.indexOf(tpl.quality);
  var baseIron=5+qualityIdx*10;
  var enhanceBonus=(eq.enhance||0)*5;
  var ironReturn=baseIron+enhanceBonus;
  
  G.resources.iron=Math.min((G.resources.iron||0)+ironReturn,RESOURCE_LIMITS.iron);
  G.equipment=G.equipment.filter(function(e){return e.uid!==equipUid});
  
  showToast('分解成功！获得 ⛏️'+ironReturn+' 铁矿');
  saveGame();
  updateResUI();
  renderCurrentTab();
}

// 一键分解（分解指定品质及以下的所有未装备装备）
function batchDecompose(maxQuality){
  var maxIdx=QUALITIES.indexOf(maxQuality);
  if(maxIdx<0){showToast('品质参数错误');return}
  
  // 获取符合条件的未装备装备
  var toDecompose=G.equipment.filter(function(eq){
    if(eq.heroUid!==null)return false;
    var tpl=EQUIP_TEMPLATES.find(function(t){return t.id===eq.id});
    if(!tpl)return false;
    var eqIdx=QUALITIES.indexOf(tpl.quality);
    return eqIdx>=0 && eqIdx<=maxIdx;
  });
  
  if(toDecompose.length===0){
    showToast('没有可分解的装备');
    return;
  }
  
  // 显示确认弹窗
  var qualityNames={common:'普通',rare:'稀有',epic:'史诗',legendary:'传说',mythic:'神话'};
  var qColor={common:'#888',rare:'#4a9eff',epic:'#a855f7',legendary:'#f59e0b',mythic:'#ef4444'};
  
  // 计算总返还
  var totalIron=0;
  toDecompose.forEach(function(eq){
    var tpl=EQUIP_TEMPLATES.find(function(t){return t.id===eq.id});
    if(tpl){
      var qualityIdx=QUALITIES.indexOf(tpl.quality);
      var baseIron=5+qualityIdx*10;
      var enhanceBonus=(eq.enhance||0)*5;
      totalIron+=baseIron+enhanceBonus;
    }
  });
  
  openModal(`
    <div class="modal" style="max-width:320px;margin:auto">
      <div style="text-align:center;padding:10px">
        <div style="font-size:48px;margin-bottom:10px">🗑️</div>
        <div style="font-size:18px;font-weight:bold;color:${qColor[maxQuality]}">${qualityNames[maxQuality]}及以下一键分解</div>
        
        <div style="background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);border-radius:8px;padding:12px;margin:15px 0">
          <div style="color:#ff6b6b;font-weight:bold;margin-bottom:8px">⚠️ 确定要分解 ${toDecompose.length} 件装备吗？</div>

// 确认一键分解
function confirmBatchDecompose(maxQuality){
  var maxIdx=QUALITIES.indexOf(maxQuality);
  if(maxIdx<0){closeModal();return}
  
  var totalIron=0;
  var count=0;
  
  // 收集要分解的装备UID
  var uids=[];
  G.equipment.forEach(function(eq){
    if(eq.heroUid!==null)return;
    var tpl=EQUIP_TEMPLATES.find(function(t){return t.id===eq.id});
    if(!tpl)return;
    var eqIdx=QUALITIES.indexOf(tpl.quality);
    if(eqIdx>=0 && eqIdx<=maxIdx){
      uids.push(eq.uid);
      var baseIron=5+eqIdx*10;
      var enhanceBonus=(eq.enhance||0)*5;
      totalIron+=baseIron+enhanceBonus;
      count++;
    }
  });
  
  // 执行分解
  G.equipment=G.equipment.filter(function(e){return uids.indexOf(e.uid)<0});
  G.resources.iron=(G.resources.iron||0)+totalIron;
  
  closeModal();
  saveGame();
  updateResUI();
  renderCurrentTab();
  
  showToast('✅ 一键分解成功！分解 '+count+' 件装备，获得 ⛏️'+totalIron+' 铁矿');
}

function forgeEquipment(maxQuality){
  // 检查铁匠铺等级是否允许锻造该品质
  var bsLevel=G.buildings.blacksmith||0;
  var bsDef=BUILDING_DEFS.blacksmith;
  var allowedQuality=bsDef.forgeQualityByLevel[bsLevel]||'common';
  var allowedIdx=QUALITIES.indexOf(allowedQuality);
  var requestIdx=QUALITIES.indexOf(maxQuality);
  if(requestIdx>allowedIdx){
    showToast('铁匠铺等级不足！当前最高可锻造：'+QUALITY_NAMES[allowedQuality]+'，需要铁匠铺 Lv.'+(requestIdx+1));
    return;
  }
  // 锻造费用：金币+铁矿（品质越高消耗越多）
  var ironCosts={common:3,rare:8,epic:20,legendary:50,mythic:120};
  var goldCosts={common:50,rare:150,epic:400,legendary:1000,mythic:2500};
  var cost={gold:goldCosts[maxQuality]||100,iron:ironCosts[maxQuality]||5};
  if(!canAfford(cost)){showToast('资源不足！需要 '+RESOURCE_DEFS.gold.icon+cost.gold+' '+RESOURCE_DEFS.iron.icon+cost.iron);return}
  for(let[k,v]of Object.entries(cost))G.resources[k]-=v;
  var maxQIdx=QUALITIES.indexOf(maxQuality);
  var pool=EQUIP_TEMPLATES.filter(t=>QUALITIES.indexOf(t.quality)<=maxQIdx);
  var tpl=pool.length>0?pick(pool):EQUIP_TEMPLATES[0];
  var eq=createEquipment(tpl.id);
  recordCodex('equipment',tpl.id);
  G.equipment.push(eq);
  updateResUI();
  showToast('锻造成功！获得 '+tpl.icon+' '+tpl.name+' ('+QUALITY_NAMES[tpl.quality]+')');
  
  // 更新成就统计
  updateStat('equipmentForged', 1);
  
  // 检查装备相关成就
  checkAchievement('equip_1');
  checkAchievement('equip_2');
  checkAchievement('equip_3');
  checkAchievement('equip_4');
  checkAchievement('equip_7');
  
  renderCurrentTab();
}

function renderAchievements(el){
  // 初始化成就数据
  if(!G.achievements) G.achievements={unlocked:{},progress:{},totalClaimed:0};
  if(!G.stats) G.stats={totalKills:0,totalHeroesRecruited:0,totalEquipmentForged:0,totalEquipmentMerged:0,totalGoldEarned:0,totalGemsEarned:0,maxStageReached:1,maxHeroLevel:0};
  
  // 计算统计
  var totalAchievements=Object.keys(ACHIEVEMENTS).length;
  var unlockedCount=Object.keys(G.achievements.unlocked).length;
  var claimedCount=G.achievements.totalClaimed||0;
  var completionRate=Math.round(unlockedCount/totalAchievements*100);
  
  // 按分类分组成就
  var achievementsByCategory={};
  for(var cat in ACHIEVEMENT_CATEGORIES){
    achievementsByCategory[cat]=[];
  }
  for(var id in ACHIEVEMENTS){
    var ach=ACHIEVEMENTS[id];
    achievementsByCategory[ach.category].push(ach);
  }
  
  // 渲染分类标签
  var categoryTabs=Object.entries(ACHIEVEMENT_CATEGORIES).map(function([catKey,catInfo]){
    var count=achievementsByCategory[catKey].filter(function(a){return G.achievements.unlocked[a.id]}).length;
    var total=achievementsByCategory[catKey].length;
    return `<button class="tab-btn" onclick="switchAchievementCategory('${catKey}')" data-cat="${catKey}">${catInfo.icon} ${catInfo.name} (${count}/${total})</button>`;
  }).join('');
  
  // 渲染成就列表
  function renderAchievementList(category){
    var achs=achievementsByCategory[category]||[];
    return achs.map(function(ach){
      var unlocked=!!G.achievements.unlocked[ach.id];
      var claimed=unlocked&&G.achievements.unlocked[ach.id].claimed;
      var progress=G.achievements.progress[ach.id]||0;
      var pct=Math.min(100,Math.round(progress/ach.target*100));
      var catInfo=ACHIEVEMENT_CATEGORIES[ach.category];
      
      return `<div class="achievement-item ${unlocked?'unlocked':''} ${claimed?'claimed':''}" style="background:var(--panel);border:1px solid ${unlocked?catInfo.color:'var(--border)'};border-radius:10px;padding:12px;margin-bottom:8px;opacity:${unlocked?1:0.7}">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:32px;width:50px;text-align:center">${ach.icon}</div>
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
              <span style="font-weight:bold;color:${unlocked?catInfo.color:'var(--text)'};font-size:15px">${ach.name}</span>
              ${unlocked?'<span style="background:'+catInfo.color+';color:#fff;font-size:10px;padding:2px 6px;border-radius:4px">已解锁</span>':''}
              ${claimed?'<span style="background:var(--green);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px">已领取</span>':''}
            </div>
            <div style="font-size:12px;color:var(--text2);margin-bottom:6px">${ach.desc}</div>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="flex:1;background:rgba(255,255,255,.1);border-radius:4px;height:6px;overflow:hidden">
                <div style="height:100%;width:${pct}%;background:${unlocked?catInfo.color:'var(--text3)'};border-radius:4px;transition:width .3s"></div>
              </div>
              <span style="font-size:11px;color:var(--text3);white-space:nowrap">${progress}/${ach.target}</span>
            </div>
          </div>
          <div style="text-align:right;min-width:80px">
            <div style="font-size:11px;color:var(--text3);margin-bottom:4px">奖励</div>
            <div style="font-size:12px;color:var(--gold)">${formatReward(ach.reward)}</div>
            ${unlocked&&!claimed?`<button class="btn btn-primary btn-sm" onclick="claimAchievementReward('${ach.id}');renderAchievements(document.getElementById('content'))" style="margin-top:6px;font-size:11px;padding:4px 10px">领取</button>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
  }
  
  el.innerHTML=`<div class="panel">
    <div class="panel-title"><span class="icon">🏆</span> 成就系统</div>
    <div style="background:rgba(0,0,0,.2);border-radius:8px;padding:12px;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
        <div style="text-align:center">
          <div style="font-size:28px;font-weight:bold;color:var(--gold)">${unlockedCount}</div>
          <div style="font-size:11px;color:var(--text3)">已解锁</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:28px;font-weight:bold;color:var(--green)">${claimedCount}</div>
          <div style="font-size:11px;color:var(--text3)">已领取</div>
        </div>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:12px">总进度</span>
            <span style="font-size:12px;color:var(--gold)">${completionRate}%</span>
          </div>
          <div style="background:rgba(255,255,255,.1);border-radius:4px;height:10px;overflow:hidden">
            <div style="height:100%;width:${completionRate}%;background:linear-gradient(90deg,var(--gold),#ff6b00);border-radius:4px;transition:width .3s"></div>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${categoryTabs}
      </div>
    </div>
    <div id="achievement-list">
      ${renderAchievementList('battle')}
    </div>
  </div>`;
  
  // 默认选中第一个分类
  setTimeout(function(){
    var firstBtn=document.querySelector('[data-cat="battle"]');
    if(firstBtn) firstBtn.classList.add('active');
  },0);
}

      if(ACHIEVEMENTS[id].category===cat) achs.push(ACHIEVEMENTS[id]);
    }
    
    el.innerHTML=achs.map(function(ach){
      var unlocked=!!G.achievements.unlocked[ach.id];
      var claimed=unlocked&&G.achievements.unlocked[ach.id].claimed;
      var progress=G.achievements.progress[ach.id]||0;
      var pct=Math.min(100,Math.round(progress/ach.target*100));
      var catInfo=ACHIEVEMENT_CATEGORIES[ach.category];
      
      return `<div class="achievement-item ${unlocked?'unlocked':''} ${claimed?'claimed':''}" style="background:var(--panel);border:1px solid ${unlocked?catInfo.color:'var(--border)'};border-radius:10px;padding:12px;margin-bottom:8px;opacity:${unlocked?1:0.7}">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:32px;width:50px;text-align:center">${ach.icon}</div>

            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
              <span style="font-weight:bold;color:${unlocked?catInfo.color:'var(--text)'};font-size:15px">${ach.name}</span>
              ${unlocked?'<span style="background:'+catInfo.color+';color:#fff;font-size:10px;padding:2px 6px;border-radius:4px">已解锁</span>':''}
              ${claimed?'<span style="background:var(--green);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px">已领取</span>':''}
            </div>
            <div style="font-size:12px;color:var(--text2);margin-bottom:6px">${ach.desc}</div>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="flex:1;background:rgba(255,255,255,.1);border-radius:4px;height:6px;overflow:hidden">
                <div style="height:100%;width:${pct}%;background:${unlocked?catInfo.color:'var(--text3)'};border-radius:4px;transition:width .3s"></div>
              </div>
              <span style="font-size:11px;color:var(--text3);white-space:nowrap">${progress}/${ach.target}</span>
            </div>
          </div>
          <div style="text-align:right;min-width:80px">
            <div style="font-size:11px;color:var(--text3);margin-bottom:4px">奖励</div>
            <div style="font-size:12px;color:var(--gold)">${formatReward(ach.reward)}</div>
            ${unlocked&&!claimed?`<button class="btn btn-primary btn-sm" onclick="claimAchievementReward('${ach.id}');switchAchievementCategory('${cat}')" style="margin-top:6px;font-size:11px;padding:4px 10px">领取</button>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
  });
  
  // 更新按钮状态
  document.querySelectorAll('[data-cat]').forEach(function(btn){
    btn.classList.toggle('active',btn.dataset.cat===cat);
  });
}

function showEquipmentGallery(){
  var qualityOrder={mythic:5,legendary:4,epic:3,rare:2,common:1};
  var sortedTemplates=EQUIP_TEMPLATES.slice().sort(function(a,b){
    var qa=qualityOrder[a.quality]||0,qb=qualityOrder[b.quality]||0;
    if(qa!==qb)return qb-qa;
    return (a.name||'').localeCompare(b.name||'');
  });
  
  var html='<div style="max-height:70vh;overflow-y:auto;padding:10px">';
  html+='<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center">';
  
  for(var i=0;i<sortedTemplates.length;i++){
    var tpl=sortedTemplates[i];
    var statsHtml='';
    for(var k in tpl.stats){
      var icon=RESOURCE_DEFS[k]?RESOURCE_DEFS[k].icon:k;
      statsHtml+='<span style="margin-right:8px">'+icon+tpl.stats[k]+'</span>';
    }
    
    var setInfo='';
    if(tpl.setId && EQUIP_SETS[tpl.setId]){
      var setDef=EQUIP_SETS[tpl.setId];
      setInfo='<div style="margin-top:6px;padding:4px 8px;background:rgba(201,162,39,.15);border-radius:4px;font-size:11px;color:var(--gold)">'+setDef.icon+' '+setDef.name+'</div>';
    }
    
    var skillInfo='';
    if(tpl.specialSkill && EQUIP_SPECIAL_SKILLS[tpl.specialSkill]){
      var sk=EQUIP_SPECIAL_SKILLS[tpl.specialSkill];
      skillInfo='<div style="margin-top:4px;padding:4px 8px;background:rgba(142,68,173,.15);border-radius:4px;font-size:10px;color:#b86eff">'+sk.icon+' '+sk.name+'</div>';
    }
    
    html+='<div class="quality-'+tpl.quality+'" style="width:160px;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center">';
    html+='<div style="font-size:32px;margin-bottom:8px">'+(tpl.icon||'🗡️')+'</div>';
    html+='<div style="font-weight:bold;font-size:13px;color:var(--gold);margin-bottom:4px">'+tpl.name+'</div>';
    html+='<div style="font-size:10px;color:var(--text2);margin-bottom:6px">'+QUALITY_NAMES[tpl.quality]+' · '+slotNames[tpl.type]+'</div>';
    html+='<div style="font-size:11px;color:var(--text);margin-bottom:6px">'+statsHtml+'</div>';
    html+='<div style="font-size:10px;color:var(--text3);line-height:1.4">'+tpl.desc+'</div>';
    html+=setInfo;
    html+=skillInfo;
    html+='</div>';
  }
  
  html+='</div></div>';
  showModal('📋 装备展示 ('+EQUIP_TEMPLATES.length+'件)',html,[{text:'关闭',action:'closeModal()',cls:'btn-primary'}]);
}

// 加载排行榜数据
function loadLeaderboardData(type){
  var listEl = document.getElementById('leaderboard-list');
  if(!listEl) return;
  
  listEl.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text3)">加载中...</div>';
  
  var typeNames = {
    power: {name: '战力榜', icon: '⚔️', desc: '队伍总战力', unit: ''},
    stage: {name: '关卡榜', icon: '💀', desc: '最高通关关卡', unit: '关'},
    arena: {name: '竞技榜', icon: '🏟️', desc: '竞技场胜场数', unit: '胜'},
    heroes: {name: '英雄榜', icon: '🧙', desc: '拥有英雄数量', unit: '人'}
  };
  
  var typeInfo = typeNames[type] || typeNames.power;
  
  getLeaderboard(type, 1000).then(function(entries) {
    if(entries.length === 0){
      listEl.innerHTML = '<div style="text-align:center;color:var(--text3);padding:40px 0">' +
        '<div style="font-size:24px;margin-bottom:8px">📭</div>' +
        '<div>暂无数据，快来上传你的成绩吧！</div>' +
      '</div>';
      return;
    }
    
    getPlayerRank(type).then(function(playerRank) {
      var html = '<div style="margin-bottom:10px;font-weight:bold;color:var(--gold)">' + typeInfo.icon + ' ' + typeInfo.name + ' - ' + typeInfo.desc + '</div>';
      
      if(playerRank){
        html += '<div style="background:rgba(201,162,39,.1);border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:12px">' +
          '🎯 你的排名: <b style="color:var(--gold)">第' + playerRank.rank + '名</b> / 共' + playerRank.total + '人 | 分数: <b>' + playerRank.score + '</b>' +
        '</div>';
      }
      
      // 构建排行榜列表HTML（可滚动）
      html += '<div class="leaderboard-scroll-container">';
      html += '<div class="leaderboard-list">';
      
      for(var i=0;i<entries.length;i++){
        var entry = entries[i];
        var rank = i + 1;
        var isMe = entry.device_id === deviceId;
        var playerName = isMe ? '<b style="color:var(--gold)">' + (G.playerName || '我') + '</b>' : (entry.name || ('玩家' + (entry.device_id ? entry.device_id.slice(-6) : '???')));
        var dateStr = entry.timestamp ? new Date(entry.timestamp).toLocaleDateString() : '-';
        var scoreStr = entry.score ? entry.score.toLocaleString() : '0';
        
        // 排名样式
        var rankClass = 'rank-normal';
        var rankIcon = rank;
        if(rank === 1) { rankClass = 'rank-1'; rankIcon = '🥇'; }
        else if(rank === 2) { rankClass = 'rank-2'; rankIcon = '🥈'; }
        else if(rank === 3) { rankClass = 'rank-3'; rankIcon = '🥉'; }
        else if(rank <= 10) { rankClass = 'rank-top10'; }
        else if(rank <= 100) { rankClass = 'rank-top100'; }
        
        html += '<div class="leaderboard-item ' + (isMe?'is-me':'') + '">' +
          '<div class="leaderboard-rank ' + rankClass + '">' + rankIcon + '</div>' +
          '<div class="leaderboard-info">' +
            '<div class="leaderboard-name">' + playerName + '</div>' +
            '<div class="leaderboard-date">' + dateStr + '</div>' +
          '</div>' +
          '<div class="leaderboard-score">' + scoreStr + '<span class="leaderboard-unit">' + typeInfo.unit + '</span></div>' +
        '</div>';
      }
      
      html += '</div></div>';
      html += '<div style="text-align:center;color:var(--text3);font-size:11px;margin-top:8px">共 ' + entries.length + ' 条记录 · 已显示全部</div>';
      
      listEl.innerHTML = html;
    });
  }).catch(function(err) {
    listEl.innerHTML = '<div style="text-align:center;color:var(--red);padding:40px 0">加载失败: ' + (err.message || '未知错误') + '</div>';
  });
}

// 提交所有排行榜数据
function submitAllLeaderboards(){
  if(!isCloudReady){
    showToast('⏳ 云端连接中，请稍后再试');
    return;
  }
  
  // 需要玩家名字才能提交
  if (!G.playerName || G.playerName.trim() === '') {
    showPlayerNameInput();
    return;
  }
  
  var teamPower = 0;
  for(var i=0;i<G.team.length;i++){
    if(G.team[i]) teamPower += calcHeroPower(G.team[i]);
  }
  var maxStage = G.stageProgress || 1;
  var arenaWins = (G.arenaState && G.arenaState.totalWins) ? G.arenaState.totalWins : 0;
  var totalHeroes = G.heroes ? G.heroes.length : 0;
  
  Promise.all([
    submitLeaderboard('power', teamPower, {heroes: G.heroes ? G.heroes.length : 0}),
    submitLeaderboard('stage', maxStage, {stageName: STAGES[maxStage-1] ? STAGES[maxStage-1].name : ''}),
    submitLeaderboard('arena', arenaWins, {winStreak: G.arenaState ? G.arenaState.winStreak : 0}),
    submitLeaderboard('heroes', totalHeroes, {})
  ]).then(function() {
    showToast('☁️ 成绩已上传到云端！');
    var listEl = document.getElementById('leaderboard-list');
    if(listEl) loadLeaderboardData('power');
  }).catch(function(err) {
    showToast('❌ 上传失败: ' + (err.message || '未知错误'));
  });
}

// 获取管理员输入的玩家名字

  var el=document.getElementById('admin-query-name');
  return el?el.value.trim():'';
}
function adminGetResultDiv(){
  return document.getElementById('admin-query-result');
}
function adminShowResult(text,color){

  if(div){div.style.display='block';div.style.color=color||'var(--text2)';div.innerHTML=text;}
}

// 管理员查看玩家数据
function adminQueryPlayerData(){
  var name=adminGetName();
  if(!name){adminShowResult('❌ 请输入玩家名字','#ff6b6b');return;}
  if(!isCloudReady){adminShowResult('❌ 云端未连接','#ff6b6b');return;}
  adminShowResult('⏳ 查询中...','var(--text3)');
  Promise.all([
    sb.from('saves').select('*').eq('player_name',name).limit(1),
    sb.from('leaderboard').select('*').eq('player_name',name)
  ]).then(function(results){
    var saveData=results[0].data&&results[0].data[0]?results[0].data[0]:null;
    var lbData=results[1].data||[];
    if(!saveData&&!lbData.length){adminShowResult('❌ 未找到玩家：'+name,'#ff6b6b');return;}
    var html='<div style="background:rgba(0,0,0,.2);border-radius:8px;padding:10px;margin-top:6px;border:1px solid var(--border)">';
    // 基本信息

// 管理员删除玩家数据
function adminDeletePlayerData(){
  var name=adminGetName();
  if(!name){adminShowResult('❌ 请输入玩家名字','#ff6b6b');return;}
  if(!isCloudReady){adminShowResult('❌ 云端未连接','#ff6b6b');return;}
  showConfirm('⚠️ 删除确认',
    '确定要删除玩家 "'+name+'" 的所有云端数据吗？\n\n这将删除：\n- 云端存档（saves 表）\n- 排行榜成绩（leaderboard 表）\n\n此操作不可恢复！',
    function(){
      Promise.all([
        sb.from('saves').select('device_id').eq('player_name',name).limit(1),
        sb.from('leaderboard').select('device_id').eq('player_name',name).limit(1)
      ]).then(function(results){
        var deviceId1=results[0].data&&results[0].data[0]?results[0].data[0].device_id:null;
        var deviceId2=results[1].data&&results[1].data[0]?results[1].data[0].device_id:null;
        var targetDeviceId=deviceId1||deviceId2;
        if(!targetDeviceId){adminShowResult('❌ 未找到玩家：'+name,'#ff6b6b');return;}
        return Promise.all([
          sb.from('saves').delete().eq('device_id',targetDeviceId),
          sb.from('leaderboard').delete().eq('device_id',targetDeviceId)
        ]).then(function(){
          adminShowResult('✅ 已删除玩家 "'+name+'" 的所有云端数据','#27ae60');
          document.getElementById('admin-query-name').value='';
        });
      }).catch(function(error){
        console.error('Delete error:',error);
        adminShowResult('❌ 删除失败：'+(error.message||'未知错误'),'#ff6b6b');
      });
    },
    '确认删除',
    '取消'
  );
}

// 指定品质生成英雄
function cheatSpawnHero(quality){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  var tpl = HERO_TEMPLATES.filter(function(t){return t.quality===(quality||'rare')})[0] || HERO_TEMPLATES[0];
  var hero = createHero(tpl.id);
  hero.quality = quality || 'rare';
  // 重新计算属性
  var qm = QUALITY_MULT[hero.quality];
  hero.maxHP = Math.floor(hero.maxHP * qm / QUALITY_MULT.common);
  hero.hp = hero.maxHP;
  hero.atk = Math.floor(hero.atk * qm / QUALITY_MULT.common);
  hero.def = Math.floor(hero.def * qm / QUALITY_MULT.common);
  hero.spd = Math.floor(hero.spd * qm / QUALITY_MULT.common);
  hero.maxMP = Math.floor(hero.maxMP * qm / QUALITY_MULT.common);
  hero.mp = hero.maxMP;
  G.heroes.push(hero);
  saveGame();
  showToast('✨ 已生成 ' + QUALITY_NAMES[hero.quality] + ' 英雄: ' + hero.icon + ' ' + hero.name);
  renderCurrentTab();
}

// 修改指定英雄等级
function cheatSetHeroLevel(uid, level){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  var hero = G.heroes.find(function(h){return h.uid===uid});
  if(!hero){showToast('英雄不存在');return;}
  hero.level = Math.max(1, Math.min(99, level));
  saveGame();
  showToast(hero.icon + ' ' + hero.name + ' 等级已设为 ' + hero.level);
  renderCurrentTab();
}

// 一键满技能所有英雄
function cheatMaxAllSkills(){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  G.heroes.forEach(function(h){
    // 添加所有该职业的技能
    var roleSkills = ROLES[h.role].skills || [];

  });
  saveGame();
  showToast('✨ 所有英雄已学会全部技能');

}

// 一键所有英雄属性加满
function cheatMaxAllStats(){
  if(!G_cheats.enabled){showToast('请先开启金手指');return;}
  var maxStats = {maxHP:99999,atk:9999,def:9999,spd:999,maxMP:9999};
  G.heroes.forEach(function(h){
    // 基础属性加满
    h.maxHP = maxStats.maxHP;
    h.hp = maxStats.maxHP;
    h.atk = maxStats.atk;
    h.def = maxStats.def;
    h.spd = maxStats.spd;
    h.maxMP = maxStats.maxMP;
    h.mp = maxStats.maxMP;
    // 等级设为最高
    h.level = 99;
    h.exp = 0;
    // 天赋点加满
    h.talentPoints = 99;
    // 所有天赋升满
    if(!h.talents) h.talents = {};
    var allTalents = ['hpBoost','atkBoost','defBoost','spdBoost','critRate','critDmg','lifeSteal','dmgReduce','mpRegen','skillDmg'];
    allTalents.forEach(function(t){h.talents[t]=5;});
    // 添加所有技能
    var roleSkills = ROLES[h.role].skills || [];
    roleSkills.forEach(function(s){
      if(h.skills.indexOf(s)===-1) h.skills.push(s);
    });
    var bonus = ['连击','反击','吸血','暴击强化','闪避','坚韧'];
    bonus.forEach(function(s){
      if(h.bonusSkills.indexOf(s)===-1 && h.skills.indexOf(s)===-1) h.bonusSkills.push(s);
    });
    // 装备神话品质满级

// 兑换码功能
function redeemCode(){
  var input=document.getElementById('redeem-code-input');
  var resultEl=document.getElementById('redeem-result');
  if(!input||!resultEl)return;
  var code=input.value.trim().toUpperCase();
  
  if(!code){
    resultEl.textContent='请输入兑换码';
    resultEl.style.display='block';
    resultEl.style.color='var(--red)';
    return;
  }
  
  var codeData = REDEEM_CODES[code];
  
  if(!codeData){
    resultEl.textContent='❌ 兑换码无效';
    resultEl.style.display='block';
    resultEl.style.color='var(--red)';
    return;
  }
  
  // 检查是否已使用
  if(G.redeemedCodes && G.redeemedCodes[code]){
    resultEl.textContent='⚠️ 该兑换码已使用过';
    resultEl.style.display='block';
    resultEl.style.color='var(--yellow)';
    return;
  }
  
  // 发放资源奖励
  var rewardDesc = [];
  var resNames = {gold:'💰金币', gems:'💎宝石', food:'🍞食物', stone:'🪨石材', iron:'⛏️铁矿', fame:'⭐声望'};
  if(codeData.rewards){
    for(var key in codeData.rewards){
      G.resources[key] = (G.resources[key]||0) + codeData.rewards[key];
      rewardDesc.push(resNames[key] + '+' + codeData.rewards[key]);
    }
  }
  
  // 发放英雄
  if(codeData.heroes){
    for(var h=0;h<codeData.heroes.length;h++){
      var hConf = codeData.heroes[h];
      var tpl = null;
      if(hConf.id){
        tpl = HERO_TEMPLATES.find(function(t){return t.id===hConf.id});
      } else if(hConf.quality){
        var pool = HERO_TEMPLATES.filter(function(t){return t.quality===hConf.quality});
        tpl = pool[Math.floor(Math.random()*pool.length)];
      }
      if(tpl){
        for(var c=0;c<(hConf.count||1);c++){
          var hero = createHero(tpl.id);
          G.heroes.push(hero);
        }
        var qName = QUALITY_NAMES[tpl.quality] || tpl.quality;
        rewardDesc.push((tpl.icon||'') + qName + '英雄×' + (hConf.count||1));
      }
    }
  }
  
  // 发放装备
  if(codeData.equipment){
    for(var e=0;e<codeData.equipment.length;e++){
      var eConf = codeData.equipment[e];
      var eTpl = null;
      if(eConf.id){
        eTpl = EQUIP_TEMPLATES.find(function(t){return t.id===eConf.id});
      } else {
        var ePool = EQUIP_TEMPLATES.filter(function(t){
          if(eConf.quality && t.quality !== eConf.quality) return false;
          if(eConf.type && t.type !== eConf.type) return false;
          return true;
        });
        eTpl = ePool[Math.floor(Math.random()*ePool.length)];
      }
      if(eTpl){
        for(var ec=0;ec<(eConf.count||1);ec++){
          var equip = createEquipment(eTpl.id);
          equip.level = eConf.level || 1;
          G.equipment.push(equip);
        }
        var eqName = QUALITY_NAMES[eTpl.quality] || eTpl.quality;
        rewardDesc.push((eTpl.icon||'') + eqName + '装备×' + (eConf.count||1) + '(Lv' + (eConf.level||1) + ')');
      }
    }
  }
  
  // 记录已兑换
  if(!G.redeemedCodes) G.redeemedCodes = {};
  G.redeemedCodes[code] = Date.now();
  
  saveGame();
  updateResUI();
  
  resultEl.innerHTML = '<span style="color:#2ecc71">✅ ' + codeData.name + ' 兑换成功！</span><br>' +
    '<span style="font-size:12px;color:var(--text2)">' + rewardDesc.join('<br>') + '</span>';
  resultEl.style.display = 'block';
  input.value = '';
  
  showToast('🎁 ' + codeData.name + '兑换成功！');
}

// 获取或创建设备ID
function getOrCreateDeviceId() {
  var id = localStorage.getItem('shadow_dungeon_device_id');

    id = 'd_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

// 初始化 Supabase
function initSupabase() {
  try {
    if (typeof supabase === 'undefined' || !supabase.createClient) {
      console.log('Supabase SDK not loaded');
      return false;
    }
    
    if (SUPABASE_URL === 'YOUR_SUPABASE_URL') {

      return false;

    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 不在这里加载云端存档，等本地读档完成后再决定是否从云端恢复
      }
    }).catch(function(error) {
      console.error('Supabase auth error:', error);
    });
    
    return true;
  } catch (e) {
    console.error('Supabase init error:', e);
    return false;
  }
}

// 保存到云端（完整游戏状态）
function saveToCloud() {
  if (!isCloudReady || !deviceId) {
    showToast('❌ 云端未连接，请稍后再试');
    return Promise.resolve(false);
  }
  
  // 首次上传需要玩家名字
  if (!G.playerName || G.playerName.trim() === '') {
    showPlayerNameInput();
    return Promise.resolve(false);
  }
  
  showToast('⏳ 正在上传到云端...');
  
  // 保存完整游戏状态
  var saveData = {
    device_id: deviceId,
    player_name: G.playerName,
    game_state: G,
    hero_id_counter: G.heroIdCounter || 0,
    lastSave: Date.now(),
    version: '1.0'
  };
  
  return sb.from('saves').upsert(saveData, { onConflict: 'device_id' })
    .then(function(result) {
      console.log('Cloud save result:', result);
      if (result.error) {
        console.error('Cloud save error:', result.error);
        showToast('❌ 云端保存失败：' + result.error.message);
        return false;
      }
      showToast('☁️ 已保存到云端');
      return true;
    })
    .catch(function(error) {
      console.error('Cloud save failed:', error);
      showToast('❌ 云端保存失败：' + (error.message || '未知错误'));
      return false;
    });
}

// 从云端加载（完整游戏状态）
function loadCloudSave() {
  if (!isCloudReady || !deviceId) {
    showToast('❌ 云端未连接，请稍后再试');
    return Promise.resolve(false);
  }
  
  showToast('⏳ 正在从云端下载...');
  
  // 使用 .limit(1) 而不是 .single()，避免无数据时抛错
  return sb.from('saves').select('*').eq('device_id', deviceId).limit(1)
    .then(function(result) {
      console.log('Cloud load result:', result);
      if (result.error) {
        console.error('Cloud load error:', result.error);
        showToast('❌ 查询失败：' + result.error.message);
        return false;
      }
      var data = result.data && result.data[0] ? result.data[0] : null;
      console.log('Cloud data:', data, 'deviceId:', deviceId);
      if (!data) {
        showToast('❌ 云端没有存档 (device: ' + deviceId.substr(0, 8) + '...)');
        return false;
      }
      var gameState = data.game_state;
      if (!gameState) {
        showToast('❌ 云端存档格式不兼容，请重新上传');
        return false;
      }
      // 恢复 heroIdCounter
      if (data.hero_id_counter) G.heroIdCounter = data.hero_id_counter;
      // 恢复完整游戏状态
      Object.keys(gameState).forEach(function(k) { G[k] = gameState[k]; });
      // 保存到本地
      saveGame();
      showToast('✅ 已从云端恢复，正在刷新...');
      setTimeout(function() { location.reload(); }, 800);
      return true;
    })
    .catch(function(error) {
      console.error('Cloud load failed:', error);
      showToast('❌ 云端加载失败：' + (error.message || '未知错误'));
      return false;
    });
}

// 检查名字是否已存在（所有设备）
function checkPlayerNameExists(name) {
  if (!isCloudReady) return Promise.resolve(false);
  
  // 同时检查 saves 和 leaderboard 两个表
  var promise1 = sb.from('saves').select('device_id').eq('player_name', name).limit(1);
  var promise2 = sb.from('leaderboard').select('device_id').eq('player_name', name).limit(1);
  
  return Promise.all([promise1, promise2])
    .then(function(results) {
      var inSaves = results[0].data && results[0].data.length > 0;
      var inLeaderboard = results[1].data && results[1].data.length > 0;
      return inSaves || inLeaderboard;
    })
    .catch(function() {
      return false;
    });
}

// 确认玩家名字
function confirmPlayerName() {
  var input = document.getElementById('player-name-input');
  var name = input ? input.value.trim() : '';
  
  if (!name || name.length === 0) {
    showToast('请输入名字');
    return;
  }
  
  if (name.length > 12) {
    showToast('名字最多12个字符');
    return;
  }
  
  // 检查是否同名
  checkPlayerNameExists(name).then(function(exists) {
    if (exists) {
      // 生成建议名字
      var suggestedName = name + Math.floor(Math.random() * 100);
      if (suggestedName.length > 12) {
        suggestedName = name.slice(0, 10) + Math.floor(Math.random() * 10);
      }
      
      // 更新输入框显示建议
      input.value = suggestedName;
      showToast('⚠️ 名字 "' + name + '" 已被使用，建议使用 "' + suggestedName + '"');
      
      // 高亮输入框提示
      input.style.borderColor = '#ff6b6b';
      setTimeout(function() {
        input.style.borderColor = '';
      }, 2000);
      return;
    }
    
    // 名字可用，继续设置
    G.playerName = name;
    saveGame();
    
    // 移除弹窗
    var overlay = document.getElementById('player-name-overlay');
    if (overlay) overlay.remove();
    
    showToast('✅ 名字设置成功：' + name);
    
    // 保存到云端
    saveToCloud();
    
    // 上传排行榜成绩
    submitAllLeaderboards();
  });
}

// 提交排行榜分数
function submitLeaderboard(scoreType, scoreValue, extraData) {
  if (!isCloudReady || !deviceId) {
    return Promise.resolve(false);
  }
  
  // 需要玩家名字才能提交
  if (!G.playerName || G.playerName.trim() === '') {
    return Promise.resolve(false);
  }
  
  extraData = extraData || {};
  
  return sb.from('leaderboard').upsert({
    device_id: deviceId,
    player_name: G.playerName,
    type: scoreType,
    score: scoreValue,
    timestamp: Date.now()
  }, { onConflict: 'device_id,type' })
    .then(function() {
      console.log('Leaderboard submitted:', scoreType, scoreValue);
      return true;
    })
    .catch(function(error) {
      console.error('Leaderboard submit failed:', error);
      return false;
    });
}

// 获取排行榜
function getLeaderboard(scoreType, limit) {
  limit = limit || 1000;
  
  if (!isCloudReady) {
    return Promise.resolve([]);
  }
  
  return sb.from('leaderboard').select('*').eq('type', scoreType).order('score', { ascending: false }).limit(limit)
    .then(function(result) {
      var entries = [];
      if (result.data) {
        for (var i = 0; i < result.data.length; i++) {
          var row = result.data[i];
          entries.push({
            device_id: row.device_id,
            name: row.player_name || ('玩家' + row.device_id.slice(-6)),
            score: row.score,
            timestamp: row.timestamp
          });
        }
      }
      return entries;
    })
    .catch(function(error) {
      console.error('Get leaderboard failed:', error);
      return [];
    });
}

// 获取玩家排名
function getPlayerRank(scoreType) {
  if (!isCloudReady || !deviceId) {
    return Promise.resolve(null);
  }
  
  return sb.from('leaderboard').select('*').eq('type', scoreType).order('score', { ascending: false })
    .then(function(result) {
      if (!result.data || result.data.length === 0) return null;
      
      var rank = 0;
      var playerScore = 0;
      for (var i = 0; i < result.data.length; i++) {
        if (result.data[i].device_id === deviceId) {
          rank = i + 1;
          playerScore = result.data[i].score;
          break;
        }
      }
      
      if (rank > 0) {
        return { rank: rank, total: result.data.length, score: playerScore };
      }
      return null;
    })
    .catch(function(error) {
      console.error('Get player rank failed:', error);
      return null;
    });
}

// ==================== 初始化 ====================
function initGame(){
  // 初始化 Supabase（后台连接，不阻塞游戏启动）
  initSupabase();
  
  // 尝试读档
  if(loadGame()){
    updateResUI();
    startAutoProduction();
    switchTab('town');
    showToast('📂 已读取存档');
    return;
  }
  
  // 没有本地存档，初始化新游戏
  initNewGame();
}

// 初始化新游戏
function initNewGame(){
  // 给玩家初始英雄
  const starter1=createHero('swordsman',1);
  const starter2=createHero('squire',1);
  const starter3=createHero('apprentice',1);
  const starter4=createHero('herbalist',1);
  G.heroes.push(starter1,starter2,starter3,starter4);
  G.team[0]=starter1;
  G.team[1]=starter2;
  G.team[2]=starter3;
  G.team[3]=starter4;

  // 初始装备
  G.equipment.push(createEquipment('rusty_sword'));
  G.equipment.push(createEquipment('wooden_shield'));
  G.equipment.push(createEquipment('leather_armor'));
  G.equipment.push(createEquipment('magic_ring'));

  updateResUI();
  G.stageProgress=1;
  startAutoProduction();
  switchTab('town');
}

document.querySelectorAll('.nav-btn').forEach(btn=>{

});

// 启动游戏
initGame();

if(G_isH5Package){
  var cheatBtn=document.getElementById('nav-cheats-btn');

}

// 注册 Service Worker（PWA 离线支持）
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
