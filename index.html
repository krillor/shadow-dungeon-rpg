  speeds.forEach(function(s){
    var btn=document.getElementById('speed-'+s);
    if(btn){
      if(s===spd){
        btn.classList.add('btn-primary');
      }else{
        btn.classList.remove('btn-primary');
      }
    }
  });
}

async function runBattle(stageId){
  // 如果战斗已在运行，不重复启动
  if(G_battleRunning){return;}
  G_battleRunning=true;
  G_battlePaused=false;
  updatePauseButton();
  
  const stage=getStage(stageId);
  if(!stage){G_battleRunning=false;return;}
  const teamHeroes=G.team.filter(h=>h!==null);
  if(teamHeroes.length===0){showToast('请先编队！');G_battleRunning=false;return;}

  let playerUnits=teamHeroes.map(h=>createBattleUnit(h,false));

  // 羁绊系统
  window._battleBondEffects=[];
  var activeBonds=detectActiveBonds(teamHeroes);
  applyBondEffects(playerUnits,activeBonds);

  let enemyUnits=stage.enemies.map(e=>{
    const tpl=HERO_TEMPLATES.find(t=>t.name===e.name)||HERO_TEMPLATES.find(t=>t.role===e.role&&t.quality===e.quality);
    const fakeHero=tpl?{...createHero(tpl.id,e.level),name:e.name,icon:e.icon,skills:e.skills,bonusSkills:[]}
      :{name:e.name,icon:e.icon,role:e.role,quality:e.quality,level:e.level,skills:e.skills,bonusSkills:[],
        maxHP:calcStat(ROLES[e.role]?ROLES[e.role].baseHP:100,QUALITY_MULT[e.quality]||1,e.level),
        atk:calcStat(ROLES[e.role]?ROLES[e.role].baseATK:15,QUALITY_MULT[e.quality]||1,e.level),
        def:calcStat(ROLES[e.role]?ROLES[e.role].baseDEF:10,QUALITY_MULT[e.quality]||1,e.level),
        spd:calcStat(ROLES[e.role]?ROLES[e.role].baseSPD:10,QUALITY_MULT[e.quality]||1,e.level),
        maxMP:calcStat(ROLES[e.role]?ROLES[e.role].baseMP:40,QUALITY_MULT[e.quality]||1,e.level),
        hp:0,mp:0,equipment:{weapon:null,armor:null,accessory:null}};
    fakeHero.hp=fakeHero.maxHP;fakeHero.mp=fakeHero.maxMP;
    return createBattleUnit(fakeHero,true);
  });
  let allUnits=[...playerUnits,...enemyUnits];
  
  // 初始化战斗统计数据
  resetBattleStats();

  // 显示战斗面板，切换到战斗页（自动推图时跳过UI切换，后台执行）
  if(!G_autoBattle){
    currentTab='battle';
    document.querySelectorAll('.nav-btn').forEach(b=>{
      b.classList.toggle('active',b.dataset.tab==='battle');
    });
  }
  var battlePanel=document.getElementById('battle-panel');
  if(!battlePanel){showToast('战斗面板加载失败');G_battleRunning=false;return;}
  if(!G_autoBattle){
    battlePanel.style.display='';
    document.getElementById('content').style.display='none';
  }
  const logEl=document.getElementById('battle-log');
  const playerTeamEl=document.getElementById('player-team');
  const enemyTeamEl=document.getElementById('enemy-team');
  const battleInfoEl=document.getElementById('battle-info');
  const battleScene=document.getElementById('battle-scene');
  if(!logEl||!playerTeamEl||!enemyTeamEl||!battleInfoEl||!battleScene){showToast('战斗元素加载失败');G_battleRunning=false;return;}
  _battleScene=battleScene;
  var pbbRound=0;
  const roundBadge=document.getElementById('battle-round-badge');
  logEl.innerHTML='';
  battleInfoEl.innerHTML=`<div class="log-title">⚔️ 第${stage.id}章：${stage.name}</div><div class="text-dim text-sm">${stage.desc}</div>`;

  // 显示激活的羁绊
  if(activeBonds.length>0){
    battleInfoEl.innerHTML+='<div style="margin-top:8px" id="battle-bonds-display">'+renderBondsHTML(activeBonds,true)+'</div>';
  }

  function log(msg,cls){
    cls=cls||'info';
    var line=document.createElement('div');
    line.className='log-line log-'+cls;
    line.textContent=msg;
    logEl.appendChild(line);
    logEl.scrollTop=logEl.scrollHeight;
  }

  function renderTeams(){
    playerTeamEl.innerHTML=playerUnits.map(u=>{
      const hpPct=Math.max(0,(u.hp/u.maxHP)*100);
      const mpPct=Math.max(0,(u.mp/u.maxMP)*100);
      const shieldPct=u.maxHP>0?Math.min(100,(u.shield/u.maxHP)*100):0;
      const isLow=hpPct<30;
      const roleIcon=ROLES[u.hero.role]?ROLES[u.hero.role].icon:'⚔️';
      const buffsHTML=u.buffs.map(b=>{
        const isPos=b.mult>1||b.stat==='taunt'||b.stat==='dodge'||b.stat==='reflect'||b.stat==='stun';
        return '<span class="buff-tag '+(isPos?'buff-positive':'buff-negative')+'">'+(b.name||b.stat)+(b.duration>0?'('+b.duration+')':'')+'</span>';
      }).join('');
      const dotsHTML=u.dot.map(d=>'<span class="buff-tag buff-dot">'+d.name+'('+d.duration+')</span>').join('');
      return '<div class="battle-unit ally-unit '+(u.alive?'':'dead')+'" data-battle-uid="'+u.name+'-'+u.icon+'">'
        +'<div class="unit-avatar-wrap">'
        +'<div class="unit-role-icon">'+roleIcon+'</div>'
        +'<div class="unit-avatar quality-'+u.hero.quality+'">'+u.icon+'</div>'
        +'<div class="unit-level">'+u.hero.level+'</div>'
        +'</div>'
        +'<div class="unit-name">'+u.name+'</div>'
        +'<div class="unit-bars">'
        +'<div class="unit-bar"><span class="unit-bar-label">HP</span><div class="unit-bar-track"><div class="unit-bar-fill hp '+(isLow?'low':'')+'" style="width:'+hpPct+'%"></div></div><span class="unit-bar-val">'+Math.max(0,u.hp)+'/'+u.maxHP+'</span></div>'
        +'<div class="unit-bar"><span class="unit-bar-label">MP</span><div class="unit-bar-track"><div class="unit-bar-fill mp" style="width:'+mpPct+'%"></div></div><span class="unit-bar-val">'+u.mp+'/'+u.maxMP+'</span></div>'
        +(u.shield>0?'<div class="unit-bar unit-shield-bar"><span class="unit-bar-label" style="color:#54a0ff">🛡</span><div class="unit-bar-track"><div class="unit-bar-fill shield-bar" style="width:'+shieldPct+'%"></div></div><span class="unit-bar-val" style="color:#54a0ff">'+u.shield+'</span></div>':'')
        +'</div>'
        +'<div class="unit-buffs">'+buffsHTML+dotsHTML+'</div>'
        +'</div>';
    }).join('');
    enemyTeamEl.innerHTML=enemyUnits.map(u=>{
      const hpPct=Math.max(0,(u.hp/u.maxHP)*100);
      const shieldPct=u.maxHP>0?Math.min(100,(u.shield/u.maxHP)*100):0;
      const isLow=hpPct<30;
      const roleIcon=ROLES[u.hero.role]?ROLES[u.hero.role].icon:'⚔️';
      const buffsHTML=u.buffs.map(b=>{
        const isPos=b.mult>1||b.stat==='taunt'||b.stat==='dodge'||b.stat==='reflect'||b.stat==='stun';
        return '<span class="buff-tag '+(isPos?'buff-positive':'buff-negative')+'">'+(b.name||b.stat)+(b.duration>0?'('+b.duration+')':'')+'</span>';
      }).join('');
      const dotsHTML=u.dot.map(d=>'<span class="buff-tag buff-dot">'+d.name+'('+d.duration+')</span>').join('');
      return '<div class="battle-unit enemy-unit '+(u.alive?'':'dead')+'" data-battle-uid="'+u.name+'-'+u.icon+'">'
        +'<div class="unit-avatar-wrap">'
        +'<div class="unit-role-icon">'+roleIcon+'</div>'
        +'<div class="unit-avatar quality-'+u.hero.quality+'">'+u.icon+'</div>'
        +'<div class="unit-level">'+u.hero.level+'</div>'
        +'</div>'
        +'<div class="unit-name">'+u.name+'</div>'
        +'<div class="unit-bars">'
        +'<div class="unit-bar"><span class="unit-bar-label">HP</span><div class="unit-bar-track"><div class="unit-bar-fill hp '+(isLow?'low':'')+'" style="width:'+hpPct+'%"></div></div><span class="unit-bar-val">'+Math.max(0,u.hp)+'/'+u.maxHP+'</span></div>'
        +(u.shield>0?'<div class="unit-bar unit-shield-bar"><span class="unit-bar-label" style="color:#54a0ff">🛡</span><div class="unit-bar-track"><div class="unit-bar-fill shield-bar" style="width:'+shieldPct+'%"></div></div><span class="unit-bar-val" style="color:#54a0ff">'+u.shield+'</span></div>':'')
        +'</div>'
        +'<div class="unit-buffs">'+buffsHTML+dotsHTML+'</div>'
        +'</div>';
    }).join('');
  }

  renderTeams();
  log('⚔️ 战斗开始！','title');
  await sleep(600);

  let round=0;
  const maxRounds=30;

  while(round<maxRounds){
    round++;
    pbbRound=round;
    roundBadge.textContent='回合 '+round;
    log('—— 第 '+round+' 回合 ——','title');
    // 每3回合有概率触发探索事件（地下城堡风格）
    if(round%3===0 && round<maxRounds-2){
      triggerExploreEvent(log);
      await sleep(200);
    }
    await sleep(300);

    allUnits.filter(u=>u.alive).forEach(function(u){
      // 治愈者：生命链接 - 每回合自动恢复5%生命值
      if(u.role==='healer' && !u.isEnemy){
        const regen=Math.floor(u.maxHP*0.05);
        u.hp=Math.min(u.maxHP,u.hp+regen);
        showFloat(u,'+'+regen+' 生命恢复','heal');
      }

      // 装备特殊技能触发 - 回合开始 turnStart
      checkEquipSpecialSkill(u,'turnStart',null,allUnits);

      u.dot=u.dot.filter(d=>{
        // 术士：DOT伤害+50%
        let dotDmg=d.dmg;
        if(d.sourceRole==='warlock'){
          dotDmg=Math.floor(dotDmg*1.5);
        }
        u.hp=Math.max(0,u.hp-dotDmg);
        log(u.icon+u.name+' 受到 '+d.name+'，损失 '+dotDmg+' 生命','debuff');
        showFloat(u,'-'+dotDmg+' '+d.name,'damage');
        animUnit(u,'hit',300);
        // 记录DOT承伤
        recordBattleStat(u,'damageTaken',dotDmg);
        
        // 圣骑士：圣光庇护 - 受到致命伤害时保留1点生命
        if(u.hp<=0 && u.role==='paladin' && !u.isEnemy && !u.deathDefyUsed){
          u.hp=1;
          u.deathDefyUsed=true;
          log(u.icon+' '+u.name+' 触发圣光庇护，保留1点生命！','heal');
          showFloat(u,'圣光庇护！','heal');
        }else if(u.hp<=0){
          u.alive=false;
          log(u.icon+' '+u.name+' 倒下了...','death');
          animUnit(u,'dying',700);
        }
        d.duration--;
        return d.duration>0;
      });
      u.buffs=u.buffs.filter(b=>{b.duration--;return b.duration>0});
    });
    renderTeams();
    await sleep(200);

    if(!playerUnits.some(u=>u.alive)){log('💀 战斗失败...队伍全军覆没。','death');break}
    if(!enemyUnits.some(u=>u.alive)){log('🎉 战斗胜利！','title');break}

    const acting=[...allUnits.filter(u=>u.alive)].sort((a,b)=>b.spd-a.spd);

    for(const unit of acting){
      if(!unit.alive)continue;
      highlightUnit(unit);
      await sleep(200);

      if(unit.buffs.some(b=>b.stat==='stun')){
        log(unit.icon+' '+unit.name+' 处于眩晕状态，无法行动','info');
        showFloat(unit,'眩晕!','debuff-text');
        await sleep(300);
        clearHighlight();
        continue;
      }

      const allSkillIds=[...unit.hero.skills,...unit.bonusSkills];
      let chosenSkill=null;
      let skillId=null;

      // 智能AI选择技能
      const smartChoice=smartChooseSkill(unit,allUnits);
      if(smartChoice){
        skillId=smartChoice.id;
        chosenSkill=smartChoice.skill;
      }

      if(chosenSkill){
        // 金手指：无限蓝
        if(!(G_cheats.enabled && G_cheats.infiniteMP && !unit.isEnemy)){
          unit.mp-=chosenSkill.mpCost;
        }
        unit.cooldowns[skillId]=chosenSkill.cooldown;

        let effectClass='fire';
        if(chosenSkill.name.indexOf('冰')>=0||chosenSkill.name.indexOf('暴风雪')>=0)effectClass='ice';
        else if(chosenSkill.name.indexOf('暗')>=0||chosenSkill.name.indexOf('诅咒')>=0||chosenSkill.name.indexOf('灵魂')>=0)effectClass='dark';
        else if(chosenSkill.name.indexOf('圣')>=0||chosenSkill.name.indexOf('光')>=0||chosenSkill.name.indexOf('净化')>=0)effectClass='holy';
        else if(chosenSkill.name.indexOf('毒')>=0)effectClass='poison';
        else if(chosenSkill.type==='heal'||chosenSkill.type==='cleanse')effectClass='heal-effect';
        else if(chosenSkill.type==='shield')effectClass='shield-effect';

        showSkillEffect(chosenSkill.icon,chosenSkill.name,effectClass);
        showFloat(unit,chosenSkill.icon+chosenSkill.name,'skill-name');
        await sleep(400);

        const target=getValidTarget(unit,allUnits,chosenSkill.target);
        if(target){
          await executeSkillV2(unit,target,chosenSkill,allUnits,log);
          await sleep(300);
        }
      }else{
        const target=getValidTarget(unit,allUnits,'single_enemy');
        if(target){
          const r=calcDamage(unit,target,null);
          // MUD风格战斗描述 + 连击系统
          var comboNum=getCombo(unit);
          if(r.dodged){
            log(getBattleDesc('dodge',unit,target)||unit.icon+' '+unit.name+' 攻击 '+target.icon+target.name+'，但被闪避了！','info');
            showFloat(target,'闪避!','dodge');
            recordBattleStat(target,'dodge',1);
            resetCombo(unit);
          }else{
            let dmg=r.dmg;
            // 连击加成：每次连击+5%伤害，最高+30%
            if(comboNum>0){
              dmg=Math.floor(dmg*(1+Math.min(comboNum*0.05,0.3)));
            }
            const reflectBuff=target.buffs.find(b=>b.stat==='reflect');
            if(reflectBuff){
              const reflectDmg=Math.floor(dmg*reflectBuff.mult);
              unit.hp=Math.max(0,unit.hp-reflectDmg);
              log(target.icon+target.name+' 反弹了 '+reflectDmg+' 点伤害！','damage');
              showFloat(unit,'-'+reflectDmg+' 反弹','damage');
              animUnit(unit,'hit',300);
              if(unit.hp<=0){unit.alive=false;log(unit.icon+' '+unit.name+' 倒下了...','death');animUnit(unit,'dying',700)}
            }
            if(target.shield>0){const absorbed=Math.min(target.shield,dmg);target.shield-=absorbed;dmg-=absorbed;if(absorbed>0)showFloat(target,'🛡-'+absorbed,'shield-num')}
            target.hp=Math.max(0,target.hp-dmg);
            // MUD风格攻击描述
            if(r.crit){
              log(getBattleDesc('crit',unit,target),'crit');
            }else if(comboNum>0){
              log(getBattleDesc('combo',unit,target),'crit');
            }else{
              log(getBattleDesc('attack',unit,target),'damage');
            }
            log('  → 造成 '+dmg+' 点伤害'+(comboNum>0?' ('+(comboNum+1)+'连击)':''),r.crit?'crit':'damage');
            showFloat(target,(r.crit?'💥':'')+dmg,r.crit?'crit':'damage');
            animUnit(target,'hit',300);
            // 记录统计数据
            recordBattleStat(unit,'damage',dmg);
            recordBattleStat(target,'damageTaken',dmg);
            if(r.crit)recordBattleStat(unit,'crit',1);
            // 连击计数
            addCombo(unit);
            // 装备特殊技能触发 - 攻击者 onAttack
            checkEquipSpecialSkill(unit,'onAttack',target,allUnits);
            // 反击机制：防御者有10%概率反击（守护者20%）
            if(target.alive && Math.random()<(target.role==='guardian'?0.2:0.1)){
              var counterDmg=Math.floor(calcDamage(target,unit,null).dmg*0.5);
              unit.hp=Math.max(0,unit.hp-counterDmg);
              log(getBattleDesc('counter',unit,target)+' 造成 '+counterDmg+' 点伤害！','skill');
              showFloat(unit,'⚡反击-'+counterDmg,'damage');
              animUnit(unit,'hit',300);
              recordBattleStat(target,'damage',counterDmg);
              if(unit.hp<=0){unit.alive=false;log(unit.icon+' '+unit.name+' 倒下了...','death');animUnit(unit,'dying',700)}
            }
            if(target.hp<=0){
              target.alive=false;log(target.icon+' '+target.name+' 倒下了...','death');animUnit(target,'dying',700);
              // 装备特殊技能触发 - 击杀 onKill
              checkEquipSpecialSkill(unit,'onKill',target,allUnits);
            } else {
              // 装备特殊技能触发 - 被攻击者 onHit
              checkEquipSpecialSkill(target,'onHit',unit,allUnits);
            }
          }
          updateBattleStatsBoard();
        }
      }

      for(let sid in unit.cooldowns){unit.cooldowns[sid]--}
      clearHighlight();
      renderTeams();
      await sleep(250);

      if(!playerUnits.some(u=>u.alive)){break}
      if(!enemyUnits.some(u=>u.alive)){break}
    }

    renderTeams();
    if(!playerUnits.some(u=>u.alive)){log('💀 战斗失败...队伍全军覆没。','death');break}
    if(!enemyUnits.some(u=>u.alive)){log('🎉 战斗胜利！','title');break}

    allUnits.filter(u=>u.alive).forEach(u=>{u.mp=Math.min(u.maxMP,u.mp+Math.floor(u.maxMP*0.05))});
  }

  if(round>=maxRounds){log('⏰ 回合用尽，战斗平局。','info')}

  const won=enemyUnits.every(u=>!u.alive);
  if(won){
    const rw=stage.rewards;
    // 记录怪物图鉴
    recordMonsterCodex(stage.enemies||enemyUnits);
    G.exploreStats.totalBattles++;
    // PVE连胜奖励
    if(stage.isBoss) G.pveWinStreak=(G.pveWinStreak||0)+1; // BOSS关才算连胜
    if(G.pveWinStreak>G.pveMaxStreak) G.pveMaxStreak=G.pveWinStreak;
    var streakBonus=1+Math.min(G.pveWinStreak*(G.pveWinStreak>3?0.08:0.05),0.5); // 最高50%
    // 英雄幸运特质：战斗奖励+15%
    var luckyBonus=1;
    teamHeroes.forEach(h=>{if(h.traits) h.traits.forEach(t=>{if(t.id==='lucky')luckyBonus+=0.15})});
    
    // 奖励受资源上限约束 + 连胜加成 + 幸运加成
    var totalBonus=streakBonus*luckyBonus;
    var finalGold=Math.floor((rw.gold||0)*totalBonus);
    var finalFood=Math.floor((rw.food||0)*totalBonus);
    var finalStone=Math.floor((rw.stone||0)*totalBonus);
    var finalIron=Math.floor((rw.iron||0)*totalBonus);
    G.resources.gold=Math.min((G.resources.gold||0)+finalGold, RESOURCE_LIMITS.gold);
    G.resources.food=Math.min((G.resources.food||0)+finalFood, RESOURCE_LIMITS.food);
    G.resources.stone=Math.min((G.resources.stone||0)+finalStone, RESOURCE_LIMITS.stone);
    G.resources.iron=Math.min((G.resources.iron||0)+finalIron, RESOURCE_LIMITS.iron);
    G.resources.gems=Math.min((G.resources.gems||0)+(rw.gems||0), RESOURCE_LIMITS.gems);
    if(stage.id>=G.stageProgress){G.stageProgress=stage.id+1}
    G_currentStageId=stage.id+1;
    // 战术大师特质：经验+20%
    teamHeroes.forEach(h=>{
      var expBonus=1;
      if(h.traits) h.traits.forEach(t=>{if(t.id==='tactician')expBonus+=0.20});
      addHeroExp(h,Math.floor((rw.exp||0)*expBonus));
    });
    
    // 经验药水掉落（概率随关卡提升）
    var potionDrop=0;
    var potionChance=0.25+stage.id*0.03; // 基础25%，每关+3%
    if(Math.random()<potionChance){
      potionDrop=Math.floor((20+stage.id*5)*totalBonus);
      G.resources.expPotion=Math.min((G.resources.expPotion||0)+potionDrop,RESOURCE_LIMITS.expPotion);
    }
    
    let drop=null;
    if(Math.random()<0.3+stage.id*0.05){
      const possibleDrops=EQUIP_TEMPLATES.filter(e=>QUALITIES.indexOf(e.quality)<=Math.min(stage.id,4));
      if(possibleDrops.length>0){
        const tpl=pick(possibleDrops);
        drop={uid:++G.heroIdCounter,id:tpl.id,heroUid:null};
        G.equipment.push(drop);
        recordCodex('equipment',tpl.id);
      }
    }
    log('\n📦 战利品：💰'+(rw.gold||0)+' 🍞'+(rw.food||0)+' 🪨'+(rw.stone||0)+' ⛏️'+(rw.iron||0)+(rw.gems?' 💎'+rw.gems:'')+' ⭐经验+'+(rw.exp||0)+(potionDrop>0?' 🧪经验药水+'+potionDrop:'')+(drop?' 🎁'+EQUIP_TEMPLATES.find(t=>t.id===drop.id).name:''),'title');
    if(G.pveWinStreak>=3){
      log('🔥 '+G.pveWinStreak+'连胜！奖励加成 +'+Math.round((streakBonus-1)*100)+'%','crit');
    }
    if(luckyBonus>1) log('🍀 幸运加成 +'+Math.round((luckyBonus-1)*100)+'%','info');
    showToast('战斗胜利！'+(G.pveWinStreak>=3?G.pveWinStreak+'连胜！':''));
    
    // 更新成就统计
    updateStat('kills', stage.enemies.length);
    updateStat('goldEarned', finalGold);
    updateStat('gemsEarned', rw.gems || 0);
    updateStat('stageReached', stage.id + 1);
    
    // 检查战斗相关成就
    checkAchievement('battle_5');
    checkAchievement('battle_6');
  }else{
    showToast('战斗失败...');
  }

  updateResUI();
  renderTeams();
  saveGame();
  G_battlePaused=false;
  updatePauseButton();
  
  var btnArea=document.getElementById('battle-buttons');
  if(btnArea){
    if(G_autoBattle&&won){
      btnArea.innerHTML='<span class="text-gold text-sm">✅ 胜利！自动进入下一关...</span>';
      updateResUI();
      setTimeout(function(){
        G_battleRunning=false;
        startBattle(G_currentStageId);
      },1500/G_battleSpeed);
    }else if(G_autoBattle&&!won){
      // 自动推图失败：停止自动推图，不切回战斗页
      G_battleRunning=false;
      G_autoBattle=false;
      updateAutoBattleButtons(false);
      showToast('💀 自动推图失败！关卡 '+G_currentStageId);
    }else{
      G_battleRunning=false;
      G_autoBattle=false;
      updateAutoBattleButtons(false);
      // 非自动战斗：显示醒目的"返回"按钮
      btnArea.innerHTML='<div style="text-align:center;padding:16px 0">'
        +'<div style="font-size:16px;font-weight:bold;margin-bottom:8px">'+(won?'🎉 战斗胜利！':'💀 战斗失败...')+'</div>'
        +'<button class="btn btn-primary" onclick="forceEndBattle()" style="font-size:14px;padding:8px 32px">返回关卡选择</button>'
        +'</div>';
      
      // 战斗胜利后提交排行榜
      if(won && isCloudReady){
        var teamPower=0;
        for(var i=0;i<G.team.length;i++){
          if(G.team[i]) teamPower += calcHeroPower(G.team[i]);
        }
        var stageName = STAGES[G.stageProgress-1] ? STAGES[G.stageProgress-1].name : '';
        submitLeaderboard('stage',G.stageProgress,{stageName:stageName});
        submitLeaderboard('power',teamPower,{heroes:G.heroes?G.heroes.length:0});
        // 同时保存到云端
        saveToCloud();
      }
    }
  }
}

async function executeSkillV2(user,target,skill,allUnits,logFn){
  const targets=Array.isArray(target)?target:[target];
  var userSide=user.isEnemy?'enemy':'ally';
  switch(skill.type){
    case 'damage':
      targets.forEach(t=>{
        if(!t.alive)return;
        const r=calcDamage(user,t,skill);
        if(r.dodged){
          logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，但 '+t.icon+t.name+' 闪避了！','info');
          showFloat(t,'闪避!','dodge');
          recordBattleStat(t,'dodge',1);
          return;
        }
        let dmg=r.dmg;
        if(t.shield>0){const absorbed=Math.min(t.shield,dmg);t.shield-=absorbed;dmg-=absorbed;if(absorbed>0)showFloat(t,'🛡-'+absorbed,'shield-num')}
        t.hp=Math.max(0,t.hp-dmg);
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+' 对 '+t.icon+t.name+' 造成 '+dmg+' 点伤害'+(r.crit?' 💥暴击！':''),r.crit?'crit':'damage');
        showFloat(t,(r.crit?'💥':'')+dmg,r.crit?'crit':'damage');
        animUnit(t,'hit',300);
        // 记录统计数据
        recordBattleStat(user,'damage',dmg);
        recordBattleStat(t,'damageTaken',dmg);
        if(r.crit)recordBattleStat(user,'crit',1);
        if(skill.stunChance&&Math.random()<skill.stunChance){
          t.buffs.push({stat:'stun',duration:1,name:'眩晕'});
          logFn(t.icon+t.name+' 被眩晕了！','debuff');
          showFloat(t,'眩晕!','debuff-text');
          recordBattleStat(user,'control',1);
        }
        if(skill.dot){t.dot.push({dmg:Math.floor(user.atk*skill.dot.dmgPct),duration:skill.dot.duration,name:'中毒',sourceRole:user.role});logFn(t.icon+t.name+' 被施加了 '+skill.dot.name+'！','debuff');showFloat(t,'☠中毒','debuff-text')}
        if(skill.debuff){const db=skill.debuff;if(db.stat==='all'){t.buffs.push({stat:'atk',mult:db.mult,duration:db.duration,name:'诅咒-攻'});t.buffs.push({stat:'def',mult:db.mult,duration:db.duration,name:'诅咒-防'})}else{t.buffs.push({stat:db.stat,mult:db.mult,duration:db.duration,name:'削弱'})}logFn(t.icon+t.name+' 被削弱了！','debuff');showFloat(t,'▼削弱','debuff-text')}
        if(t.hp<=0){t.alive=false;logFn(t.icon+' '+t.name+' 倒下了...','death');animUnit(t,'dying',700)}
      });
      updateBattleStatsBoard();
      break;
    case 'heal':
      var totalHeal=0;
      targets.forEach(t=>{
        if(!t.alive)return;
        const heal=Math.floor(t.maxHP*skill.healPct);
        t.hp=Math.min(t.maxHP,t.hp+heal);
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，恢复 '+t.icon+t.name+' '+heal+' 点生命','heal');
        showFloat(t,'+'+heal,'heal');animUnit(t,'heal-target',500);
        totalHeal+=heal;
      });
      // 记录施法者的治疗输出量（治疗自己或别人的总量）
      if(totalHeal>0)recordBattleStat(user,'heal',totalHeal);
      updateBattleStatsBoard();
      break;
    case 'buff':
      targets.forEach(t=>{
        if(!t.alive)return;
        t.buffs.push({...skill.buff,name:skill.name});
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，'+(t===user?'自身':'队友')+'获得增益效果','buff');
        showFloat(t,'↑'+skill.name,'buff-text');animUnit(t,'heal-target',500);
      });break;
    case 'shield':
      targets.forEach(t=>{
        if(!t.alive)return;
        const amt=Math.floor(t.maxHP*skill.shieldPct);
        t.shield+=amt;
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，为 '+t.icon+t.name+' 添加 '+amt+' 点护盾','buff');
        showFloat(t,'🛡+'+amt,'shield-num');animUnit(t,'shield-up',400);
      });break;
    case 'drain':
      targets.forEach(t=>{
        if(!t.alive)return;
        const r=calcDamage(user,t,skill);
        if(r.dodged){logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，但 '+t.icon+t.name+' 闪避了！','info');showFloat(t,'闪避!','dodge');return}
        let dmg=r.dmg;
        if(t.shield>0){const absorbed=Math.min(t.shield,dmg);t.shield-=absorbed;dmg-=absorbed}
        t.hp=Math.max(0,t.hp-dmg);
        const healAmt=Math.floor(dmg*0.5);
        user.hp=Math.min(user.maxHP,user.hp+healAmt);
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，对 '+t.icon+t.name+' 造成 '+dmg+' 伤害，恢复 '+healAmt+' 生命','skill');
        showFloat(t,'-'+dmg,'damage');animUnit(t,'hit',300);
        showFloat(user,'+'+healAmt,'heal');animUnit(user,'heal-target',500);
        if(t.hp<=0){t.alive=false;logFn(t.icon+' '+t.name+' 倒下了...','death');animUnit(t,'dying',700)}
      });break;
    case 'debuff':
      targets.forEach(t=>{
        if(!t.alive)return;
        const db=skill.debuff;
        if(db.stat==='all'){t.buffs.push({stat:'atk',mult:db.mult,duration:db.duration,name:'诅咒-攻'});t.buffs.push({stat:'def',mult:db.mult,duration:db.duration,name:'诅咒-防'})}else{t.buffs.push({stat:db.stat,mult:db.mult,duration:db.duration,name:'诅咒'})}
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，'+t.icon+t.name+' 被诅咒了！','debuff');
        showFloat(t,'▼'+skill.name,'debuff-text');
      });break;
    case 'cleanse':
      targets.forEach(t=>{
        if(!t.alive)return;
        const negCount=t.buffs.filter(b=>b.stat==='stun'||(b.stat==='atk'&&b.mult<1)||(b.stat==='def'&&b.mult<1)).length;
        t.buffs=t.buffs.filter(b=>!(b.stat==='stun'||(b.stat==='atk'&&b.mult<1)||(b.stat==='def'&&b.mult<1)));
        t.dot=[];
        logFn(user.icon+' '+user.name+' 使用 '+skill.icon+skill.name+'，清除了 '+t.icon+t.name+' 的 '+negCount+' 个负面效果','heal');
        showFloat(t,'✨净化','buff-text');animUnit(t,'heal-target',500);
      });break;
  }
}

function sleep(ms){
  return new Promise(function(r){
    var checkPause=function(){
      if(G_battlePaused){
        setTimeout(checkPause,100);
      }else{
        setTimeout(r,Math.max(20,ms/G_battleSpeed));
      }
    };
    checkPause();
  });
}

// ==================== 合成系统 ====================
function findMergeRecipe(heroUids){
  if(heroUids.length<2)return null;
  const heroes=heroUids.map(uid=>G.heroes.find(h=>h.uid===uid)).filter(Boolean);
  if(heroes.length<2)return null;
  return{recipe:{result:'__dynamic__',inheritSkills:true,lore:'英雄的融合创造了新的存在。'},usedHeroes:heroes};
}

// 异变概率配置
var G_MUTATION_RATE = 0.30;       // 30% 异变概率
var G_QUALITY_UP_RATE = 0.05;      // 5% 品质+1概率
var G_LEGENDARY_DIRECT_RATE = 0.03; // 3% 直接传说概率
var G_MYTHIC_DIRECT_RATE = 0.01;   // 1% 直接神话概率
var G_HIDDEN_DIRECT_RATE = 0.001;  // 0.1% 隐藏品质概率

function generateFusedHero(heroes){
  // === 幸运值系统：影响异变概率 ===
  var luckyBonus = (G.mergeLucky||0) * 0.005; // 每点幸运+0.5%
  var effectiveMutationRate = Math.min(0.50, G_MUTATION_RATE + luckyBonus);
  
  // === 连击×10：必定异变（触发后进入5分钟冷却） ===
  var streakCount = (G.mergeStreak && G.mergeStreak.count) || 0;
  var now = Date.now();
  var cooldownEnd = (G.mergeStreak && G.mergeStreak.cooldownEnd) || 0;
  var inCooldown = now < cooldownEnd;
  var streakForceMutation = streakCount >= 10 && !inCooldown;
  
  // === 保底系统：连续10次无特殊触发，下次必定品质+1 ===
  var pityTrigger = false;
  if((G.mergePity||0) >= 10){
    pityTrigger = true;
    G.mergePity = 0;
  }
  
  // 基于输入英雄属性即时生成新英雄
  var inputIds=heroes.map(function(h){return h.id}).sort().join('+');
  var hash=hashStr(inputIds);
  
  // 1. 确定新品质：金手指强制 > 正常计算
  var qualities=heroes.map(function(h){return QUALITIES.indexOf(h.quality)});
  var maxQ=Math.max.apply(null,qualities);
  var avgQ=Math.floor(qualities.reduce(function(s,v){return s+v},0)/qualities.length);
  // 新品质 = 平均品质，但不能超过最高品质
  var newQIdx=Math.min(maxQ,avgQ);
  var newQuality=QUALITIES[newQIdx];
  
  // 金手指强制品质（最高优先级）
  if(G_cheats.enabled && G_cheats.forceQuality){
    newQuality=G_cheats.forceQuality;
    newQIdx=QUALITIES.indexOf(newQuality);
  }
  
  // 2. 判定特殊结果（优先级：隐藏 > 神话 > 传说 > 品质+1 > 异变 > 普通）
  // 金手指强制异变
  var isMutation=G_cheats.forceMutation||streakForceMutation||Math.random()<effectiveMutationRate;
  var isQualityUp=false;
  var isDirectLegendary=false;
  var isDirectMythic=false;
  var isDirectHidden=false;
  
  // 0.1% 隐藏品质（最高优先级，无视当前品质）
  if(Math.random()<G_HIDDEN_DIRECT_RATE){
    newQuality='hidden';
    newQIdx=QUALITIES.indexOf('hidden');
    isMutation=true;
    isDirectHidden=true;
  }
  // 1% 直接神话
  else if(Math.random()<G_MYTHIC_DIRECT_RATE){
    newQuality='mythic';
    newQIdx=QUALITIES.indexOf('mythic');
    isMutation=true;
    isDirectMythic=true;
  }
  // 3% 直接传说
  else if(Math.random()<G_LEGENDARY_DIRECT_RATE){
    newQuality='legendary';
    newQIdx=QUALITIES.indexOf('legendary');
    isMutation=true;
    isDirectLegendary=true;
  }
  // 5% 品质+1（不超过隐藏）
  else if(Math.random()<G_QUALITY_UP_RATE && newQIdx<QUALITIES.length-1){
    newQIdx++;
    newQuality=QUALITIES[newQIdx];
    isMutation=true;
    isQualityUp=true;
  }
  
  // === 保底触发：连续10次无特殊结果，强制品质+1 ===
  if(pityTrigger && !isDirectHidden && !isDirectMythic && !isDirectLegendary && !isQualityUp){
    if(newQIdx < QUALITIES.length-1){
      newQIdx++;
      newQuality=QUALITIES[newQIdx];
      isMutation=true;
      isQualityUp=true;
    }
  }
  
  // === 反转合成（以弱胜强）：所有材料品质<=稀有时，5%直接史诗 ===
  var allLowQuality = qualities.every(function(q){return q<=1});
  var qualityGap = maxQ - Math.min.apply(null,qualities);
  var isUpset = false;
  if(allLowQuality && Math.random()<0.05 && !isDirectHidden && !isDirectMythic && !isDirectLegendary){
    newQuality='epic';
    newQIdx=QUALITIES.indexOf('epic');
    isMutation=true;
    isUpset=true;
  }
  // 材料品质差距大时，属性倍率下限提升到1.0
  var upsetBonus = (qualityGap>=2 && Math.random()<0.3);
  
  // === 合成羁绊检测 ===
  var bondInfo = detectMergeBond(heroes);
  var bondMult = bondInfo ? bondInfo.mult : 1.0;
  
  // 3. 确定新职业：基于哈希从输入英雄职业中选
  var allRoles=heroes.map(function(h){return h.role});
  var uniqueRoles=[];
  allRoles.forEach(function(r){if(uniqueRoles.indexOf(r)===-1)uniqueRoles.push(r)});
  var mainRole=uniqueRoles[hash%uniqueRoles.length];
  
  // 4. 确定新技能
  var allSkillPool=[];
  heroes.forEach(function(h){
    h.skills.forEach(function(s){if(allSkillPool.indexOf(s)===-1)allSkillPool.push(s)});
    h.bonusSkills.forEach(function(s){if(allSkillPool.indexOf(s)===-1)allSkillPool.push(s)});
  });
  // 加入目标角色的基础技能
  var roleData=ROLES[mainRole];
  if(roleData&&roleData.skills){
    roleData.skills.forEach(function(s){if(allSkillPool.indexOf(s)===-1)allSkillPool.push(s)});
  }
  
  // 隐藏品质：可选择所有素材英雄的全部技能（最多6个）
  var skillCount;
  if(isDirectHidden){
    // 隐藏品质：收集所有素材技能，最多6个
    skillCount=Math.min(6,allSkillPool.length);
    var shuffled=allSkillPool.slice().sort(function(){return Math.random()-0.5});
    var newSkills=shuffled.slice(0,skillCount);
  }else{
    // 异变英雄额外获得1-2个技能
    var baseSkillCount=2+Math.floor(hash%3);
    skillCount=isMutation?Math.min(allSkillPool.length,baseSkillCount+1+Math.floor(Math.random()*2)):baseSkillCount;
    var shuffled=allSkillPool.slice().sort(function(){return Math.random()-0.5});
    var newSkills=shuffled.slice(0,skillCount);
  }
  
  // === 技能变异：异变时10%概率某个技能变异 ===
  var mutatedSkills = [];
  if(isMutation && newSkills.length > 0 && Math.random() < 0.10){
    var mutIdx = Math.floor(Math.random() * newSkills.length);
    var mutSkillName = newSkills[mutIdx];
    // 标记变异技能
    mutatedSkills.push(mutIdx);
  }
  
  // 5. 确定新属性 - 统一逻辑：max(职业品质标准, 材料最高属性)
  var roleData=ROLES[mainRole];
  var baseHP=roleData?roleData.baseHP:100;
  var baseATK=roleData?roleData.baseATK:15;
  var baseDEF=roleData?roleData.baseDEF:10;
  var baseSPD=roleData?roleData.baseSPD:10;
  var baseMP=roleData?roleData.baseMP:40;
  
  // 取材料最高等级
  var maxLevel=Math.max.apply(null,heroes.map(function(h){return h.level}));
  
  // 取材料中各属性的平均值
  var avgMaterialHP=Math.floor(heroes.reduce(function(s,h){return s+h.maxHP},0)/heroes.length);
  var avgMaterialATK=Math.floor(heroes.reduce(function(s,h){return s+h.atk},0)/heroes.length);
  var avgMaterialDEF=Math.floor(heroes.reduce(function(s,h){return s+h.def},0)/heroes.length);
  var avgMaterialSPD=Math.floor(heroes.reduce(function(s,h){return s+h.spd},0)/heroes.length);
  var avgMaterialMP=Math.floor(heroes.reduce(function(s,h){return s+h.maxMP},0)/heroes.length);
  
  // 属性继承：材料平均值的0.6~1.8倍随机
  // 连击×3：属性下限提升到0.8
  var minMult = upsetBonus ? 1.0 : (streakCount>=3 ? 0.8 : 0.6);
  var inheritMult=minMult+Math.random()*(1.8-minMult);
  // 羁绊加成
  inheritMult *= bondMult;
  var maxHP=Math.floor(avgMaterialHP*inheritMult);
  var atk=Math.floor(avgMaterialATK*inheritMult);
  var def=Math.floor(avgMaterialDEF*inheritMult);
  var spd=Math.floor(avgMaterialSPD*inheritMult);
  var maxMP=Math.floor(avgMaterialMP*inheritMult);
  
  // 异变/品质提升时额外加成10%，隐藏品质额外加成30%
  if(isDirectHidden){
    maxHP=Math.floor(maxHP*1.3);
    atk=Math.floor(atk*1.3);
    def=Math.floor(def*1.3);
    spd=Math.floor(spd*1.3);
    maxMP=Math.floor(maxMP*1.3);
  }else if(isMutation||isQualityUp||isDirectLegendary||isDirectMythic){
    maxHP=Math.floor(maxHP*1.1);
    atk=Math.floor(atk*1.1);
    def=Math.floor(def*1.1);
    spd=Math.floor(spd*1.1);
    maxMP=Math.floor(maxMP*1.1);
  }
  console.log('[Merge]',newQuality,mainRole,'mult='+inheritMult.toFixed(2),'finalHP='+maxHP);
  
  // 6. 生成名称和图标
  var namePrefixes={
    warrior:['战','狂','铁','血','龙','雷','烈'],
    guardian:['圣','磐','不灭','永恒','钢铁','堡垒'],
    mage:['奥','星','虚空','深渊','混沌','元素'],
    healer:['圣','天','生命','光明','神圣','自然'],
    assassin:['影','暗','幽','幻','夜','魂'],
    ranger:['风','雷','疾','苍','天','猎'],
    warlock:['暗','虚空','噬魂','诅咒','冥','渊'],
    paladin:['圣','光','神','天启','审判','黎明']
  };
  var nameSuffixes={
    warrior:['战士','勇者','剑圣','战神','武圣','斗士'],
    guardian:['守卫','壁垒','守护者','铁壁','圣盾','堡垒'],
    mage:['法师','贤者','术士','大魔导师','星术师','元素使'],
    healer:['祭司','圣者','神官','治愈者','生命使','圣女'],
    assassin:['杀手','暗影','收割者','幽灵','夜行者','影刃'],
    ranger:['游侠','猎手','弓圣','风行者','神射手','鹰眼'],
    warlock:['术士','召唤师','噬魂者','冥王','虚空使','深渊者'],
    paladin:['骑士','圣骑','审判者','守护者','神卫','天骑']
  };
  var icons={
    warrior:['⚔️','🗡️','🪓','😤','🐉','⚡'],
    guardian:['🛡️','🏰','🗿','🔱','🧱','🔰'],
    mage:['🔮','🌟','❄️','🔥','💥','🌠'],
    healer:['💚','✝️','🌈','👼','🌳','🌟'],
    assassin:['🗡️','👤','🌑','👻','⚰️','🌙'],
    ranger:['🏹','⛈️','🌪️','🎯','🦅','🌟'],
    warlock:['👁️','😈','🌀','🩸','💀','🌑'],
    paladin:['✨','⚡','🛡️','🔰','🌟','⚜️']
  };
  var prefixes=namePrefixes[mainRole]||namePrefixes.warrior;
  var suffixes=nameSuffixes[mainRole]||nameSuffixes.warrior;
  var iconList=icons[mainRole]||icons.warrior;
  
  var prefix=prefixes[hash%prefixes.length];
  var suffix=suffixes[(hash>>4)%suffixes.length];
  var icon=iconList[(hash>>8)%iconList.length];
  
  // 异变英雄名称前缀
  var qualityPrefix={common:'',rare:'精英',epic:'史诗',legendary:'传说',mythic:'神话',hidden:'✦隐藏'};
  var mutationPrefix=isDirectHidden?'✦异变·':isMutation?'☣️异变·':'';
  var newName=mutationPrefix+(qualityPrefix[newQuality]||'')+prefix+suffix;
  
  // 7. 继承最高等级
  var maxLevel=0;
  heroes.forEach(function(h){if(h.level>maxLevel)maxLevel=h.level});
  
  // 8. 创建英雄对象
  var newHero={
    uid:++G.heroIdCounter,
    id:'fused_'+hash%100000+(isMutation?'_mut':''),
    name:newName,
    icon:icon,
    role:mainRole,
    quality:newQuality,
    level:maxLevel,
    maxHP:maxHP,
    hp:maxHP,
    atk:atk,
    def:def,
    spd:spd,
    maxMP:maxMP,
    mp:maxMP,
    skills:newSkills,
    bonusSkills:[],
    equipment:{weapon:null,armor:null,accessory:null},
    exp:0,
    lore:isDirectHidden?
      '✦隐藏品质！由'+heroes.map(function(h){return h.name}).join('与')+'融合时发生奇迹异变，集所有素材技能于一身，拥有超越神话的力量。':
      isMutation?
      '☣️异变英雄！由'+heroes.map(function(h){return h.name}).join('与')+'融合时发生异变，拥有超越同品质的力量。':
      '由'+heroes.map(function(h){return h.name}).join('与')+'融合诞生的'+QUALITY_NAMES[newQuality]+'英雄。',
    deathDefyUsed: false,
    isMutation: isMutation,
    isHidden: !!isDirectHidden,
    isUpset: isUpset,
    bondInfo: bondInfo,
    mutatedSkills: mutatedSkills,
    inheritMult: inheritMult
  };
  
  // === 更新幸运值和保底 ===
  if(!G.mergeLucky) G.mergeLucky = 0;
  if(!G.mergePity) G.mergePity = 0;
  if(isDirectHidden || isDirectMythic || isDirectLegendary || isQualityUp || isUpset){
    G.mergeLucky = 0; // 特殊触发清零幸运值
    G.mergePity = 0;
  } else if(isMutation){
    G.mergeLucky = Math.max(0, G.mergeLucky - 2); // 异变减2
    G.mergePity = 0;
  } else {
    G.mergeLucky++; // 普通合成+1
    G.mergePity++;
  }
  
  return newHero;
}

function hashStr(str){
  var hash=5381;
  for(var i=0;i<str.length;i++){
    hash=((hash<<5)+hash)+str.charCodeAt(i);
    hash=hash&0x7fffffff;
  }
  return hash;
}

// 合成羁绊检测
function detectMergeBond(heroes){
  var roles=heroes.map(function(h){return h.role});
  var uniqueRoles=[];
  roles.forEach(function(r){if(uniqueRoles.indexOf(r)===-1)uniqueRoles.push(r)});
  
  // 3个同职业 → 职业精通
  if(uniqueRoles.length===1){
    return{name:'职业精通',desc:'全属性+10%',mult:1.10};
  }
  
  // 双职业羁绊
  var roleSet=uniqueRoles.slice().sort().join('+');
  var bonds={
    'warrior+mage':{name:'魔剑士',desc:'ATK+15%',mult:1.15},
    'mage+warrior':{name:'魔剑士',desc:'ATK+15%',mult:1.15},
    'assassin+ranger':{name:'暗影猎手',desc:'SPD+20%',mult:1.20},
    'ranger+assassin':{name:'暗影猎手',desc:'SPD+20%',mult:1.20},
    'guardian+healer':{name:'圣盾守护',desc:'DEF+15%,HP+10%',mult:1.15},
    'healer+guardian':{name:'圣盾守护',desc:'DEF+15%,HP+10%',mult:1.15},
    'warlock+mage':{name:'深渊之力',desc:'MP+20%',mult:1.20},
    'mage+warlock':{name:'深渊之力',desc:'MP+20%',mult:1.20},
    'paladin+guardian':{name:'钢铁堡垒',desc:'DEF+20%',mult:1.20},
    'guardian+paladin':{name:'钢铁堡垒',desc:'DEF+20%',mult:1.20},
    'paladin+healer':{name:'神圣之光',desc:'HP+15%',mult:1.15},
    'healer+paladin':{name:'神圣之光',desc:'HP+15%',mult:1.15}
  };
  
  // 3个英雄时检查所有两两组合
  if(heroes.length===3){
    for(var i=0;i<uniqueRoles.length;i++){
      for(var j=i+1;j<uniqueRoles.length;j++){
        var key=uniqueRoles[i]+'+'+uniqueRoles[j];
        if(bonds[key]) return bonds[key];
      }
    }
  }
  
  // 2个英雄时直接检查
  if(heroes.length===2 && bonds[roleSet]) return bonds[roleSet];
  
  return null;
}

    showToast('💎 宝石不足！需要50宝石');

  var resultIdx=G.heroes.findIndex(function(h){return h.uid===G.lastMerge.result.uid});
  if(resultIdx>=0) G.heroes.splice(resultIdx,1);

      uid:mat.uid,id:mat.id,name:mat.name,icon:mat.icon,quality:mat.quality,

// 获取连击信息
function getMergeStreakInfo(){
  if(!G.mergeStreak) return{count:0,active:false,cooldown:0};
  var now=Date.now();
  var cooldownLeft=Math.max(0,(G.mergeStreak.cooldownEnd||0)-now);
  if(cooldownLeft>0) return{count:0,active:false,cooldown:cooldownLeft};
  var active=now-G.mergeStreak.lastTime<=60000;
  if(!active) return{count:0,active:false,cooldown:0};
  return{count:G.mergeStreak.count,active:true,cooldown:0};
}

function executeMerge(heroUids){
  const heroes=heroUids.map(uid=>G.heroes.find(h=>h.uid===uid)).filter(Boolean);
  if(heroes.length<2){showToast('请至少选择2个英雄！');return false}
  
  // 检查是否有锁定的英雄
  const lockedHeroes=heroes.filter(h=>h.locked);
  if(lockedHeroes.length>0){
    showToast(`🔒 ${lockedHeroes[0].name} 已锁定，无法作为合成材料！请先解锁。`);
    return false;
  }
  
  // === 合成消耗：金币 = 材料最高品质 × 1000 ===
  var qualities=heroes.map(function(h){return QUALITIES.indexOf(h.quality)});
  var maxQIdx=Math.max.apply(null,qualities);
  var mergeCost = (maxQIdx+1) * 1000;
  if((G.resources.gold||0) < mergeCost){
    showToast('💰 金币不足！需要 '+mergeCost+' 金币');
    return false;
  }
  G.resources.gold -= mergeCost;
  
  // 记录最高品质用于判断品质提升
  var oldQuality=QUALITIES[maxQIdx];
  
  // === 连续合成计数（必须在generateFusedHero之前） ===
  if(!G.mergeStreak) G.mergeStreak={count:0,lastTime:0,cooldownEnd:0};
  var now=Date.now();
  if(now - G.mergeStreak.lastTime > 60000) G.mergeStreak.count=0;
  G.mergeStreak.count++;
  G.mergeStreak.lastTime=now;
  
  // 即时生成融合英雄（此时streakCount已更新）
  const newHero=generateFusedHero(heroes);
  
  // 判断是否品质提升
  var isQualityUp=QUALITIES.indexOf(newHero.quality)>maxQIdx;
  
  // === 保存回溯数据 ===
  G.lastMerge={
    materials:heroes.map(function(h){return{uid:h.uid,id:h.id,name:h.name,icon:h.icon,quality:h.quality,level:h.level,maxHP:h.maxHP,atk:h.atk,def:h.def,spd:h.spd,maxMP:h.maxMP,skills:h.skills.slice(),bonusSkills:h.bonusSkills.slice(),equipment:JSON.parse(JSON.stringify(h.equipment)),exp:h.exp,role:h.role,lore:h.lore,isMutation:h.isMutation,isHidden:h.isHidden}}),
    result:{uid:newHero.uid},
    timestamp:Date.now()
  };
  
  // === 连击×10触发后进入5分钟冷却 ===
  if(G.mergeStreak.count >= 10){
    G.mergeStreak.cooldownEnd = now + 5 * 60 * 1000;
    G.mergeStreak.count = 0;
  }
  
  // 连击×5：额外获得1个技能
  if(G.mergeStreak.count>=5 && newHero.skills.length<6){
    var allPool=[];
    heroes.forEach(function(h){
      h.skills.forEach(function(s){if(allPool.indexOf(s)===-1)allPool.push(s)});
      h.bonusSkills.forEach(function(s){if(allPool.indexOf(s)===-1)allPool.push(s)});
    });
    var extra=allPool.filter(function(s){return newHero.skills.indexOf(s)===-1});
    if(extra.length>0) newHero.skills.push(extra[Math.floor(Math.random()*extra.length)]);
  }
  // 连击×10：必定异变（已在generateFusedHero中通过streakForceMutation实现）
  
  // === 合成图鉴记录 ===
  if(!G.mergeHistory) G.mergeHistory=[];
  G.mergeHistory.unshift({
    time:Date.now(),
    materials:heroes.map(function(h){return{name:h.name,icon:h.icon,quality:h.quality}}),
    result:{name:newHero.name,icon:newHero.icon,quality:newHero.quality,isMutation:newHero.isMutation,isUpset:newHero.isUpset,bondInfo:newHero.bondInfo,inheritMult:newHero.inheritMult},
    mult:newHero.inheritMult
  });
  if(G.mergeHistory.length>50) G.mergeHistory.length=50; // 最多保留50条
  
  // 移除被融合的英雄
  heroes.forEach(h=>{
    const idx=G.heroes.findIndex(x=>x.uid===h.uid);
    if(idx>=0)G.heroes.splice(idx,1);
    for(let i=0;i<G.team.length;i++){
      if(G.team[i]&&G.team[i].uid===h.uid)G.team[i]=null;
    }
  });
  
  // 添加新英雄
  G.heroes.push(newHero);
  
  // 显示合成结果
  showMergeResult(newHero,isQualityUp,oldQuality);
  
  showToast('融合成功！获得 '+QUALITY_NAMES[newHero.quality]+' 英雄：'+newHero.icon+' '+newHero.name);
  
  // 更新成就统计
  updateStat('equipmentMerged', 1);
  checkAchievement('equip_5');
  checkAchievement('equip_6');
  checkAchievement('equip_7');
  
  updateResUI();
  saveGame();
  return true;
}

function createEquipment(templateId){
  const tpl=EQUIP_TEMPLATES.find(t=>t.id===templateId);
  if(!tpl)return null;
  var eq={uid:++G.heroIdCounter,id:tpl.id,heroUid:null};
  // 生成词缀
  eq.affixes=generateAffixes(tpl.quality);
  return eq;
}

// 生成装备词缀
function generateAffixes(quality){
  var config = QUALITY_AFFIX_CONFIG[quality] || QUALITY_AFFIX_CONFIG.common;
  var numSlots = config.minSlots + Math.floor(Math.random() * (config.maxSlots - config.minSlots + 1));
  var affixes = [];
  var usedIds = {};
  var categories = ['attack','defense','utility'];
  
  for(var i = 0; i < numSlots; i++){
    var cat = categories[Math.floor(Math.random() * categories.length)];
    var pool = AFFIX_POOL[cat];
    // 避免重复词缀
    var available = pool.filter(function(a){ return !usedIds[a.id]; });
    if(available.length === 0){
      available = pool;
    }
    var affixDef = available[Math.floor(Math.random() * available.length)];
    usedIds[affixDef.id] = true;
    
    // 根据品质决定词缀等级
    var maxTier = config.maxTier;
    var tier;
    if(maxTier <= 2){
      tier = Math.random() < 0.7 ? 1 : 2;
    } else if(maxTier <= 3){
      var r = Math.random();
      tier = r < 0.4 ? 1 : (r < 0.8 ? 2 : 3);
    } else if(maxTier <= 4){
      var r2 = Math.random();
      tier = r2 < 0.2 ? 1 : (r2 < 0.5 ? 2 : (r2 < 0.8 ? 3 : 4));
    } else {
      var r3 = Math.random();
      tier = r3 < 0.1 ? 1 : (r3 < 0.25 ? 2 : (r3 < 0.5 ? 3 : (r3 < 0.8 ? 4 : 5)));
    }
    tier = Math.min(tier, maxTier);
    
    var tierDef = AFFIX_TIERS[tier - 1];
    var value = Math.max(1, Math.round(affixDef.base * tierDef.mult * (0.9 + Math.random() * 0.2)));
    
    affixes.push({
      id: affixDef.id,
      category: cat,
      tier: tier,
      value: value
    });
  }
  
  return affixes;
}

// 获取词缀定义
function getAffixDef(affixId){
  var cats = ['attack','defense','utility'];
  for(var i = 0; i < cats.length; i++){
    var pool = AFFIX_POOL[cats[i]];
    for(var j = 0; j < pool.length; j++){
      if(pool[j].id === affixId) return pool[j];
    }
  }
  return null;
}

// 检测词缀协同
function checkAffixSynergies(affixes){
  var affixIds = affixes.map(function(a){ return a.id; });
  var activeSynergies = [];
  for(var i = 0; i < AFFIX_SYNERGIES.length; i++){
    var syn = AFFIX_SYNERGIES[i];
    var allMatch = true;
    for(var j = 0; j < syn.required.length; j++){
      if(affixIds.indexOf(syn.required[j]) === -1){
        allMatch = false;
        break;
      }
    }
    if(allMatch) activeSynergies.push(syn);
  }
  return activeSynergies;
}

// 洗练词缀（替换指定槽位的词缀）
function rerollAffix(equipUid, slotIndex){
  var eq = G.equipment.find(function(e){ return e.uid === equipUid; });
  if(!eq){ showToast('装备不存在'); return false; }
  if(eq.heroUid){ showToast('请先卸下装备再洗练'); return false; }
  
  var tpl = EQUIP_TEMPLATES.find(function(t){ return t.id === eq.id; });
  if(!tpl) return false;
  
  var cost = REROLL_COSTS[tpl.quality] || REROLL_COSTS.common;
  if((G.resources.gold || 0) < cost.gold){ showToast('金币不足，需要' + cost.gold + '金币'); return false; }
  if((G.resources.gems || 0) < cost.gems){ showToast('宝石不足，需要' + cost.gems + '宝石'); return false; }
  
  G.resources.gold -= cost.gold;
  G.resources.gems -= cost.gems;
  
  if(!eq.affixes) eq.affixes = [];
  if(slotIndex < 0 || slotIndex >= eq.affixes.length){
    // 新增词缀槽位
    var config = QUALITY_AFFIX_CONFIG[tpl.quality] || QUALITY_AFFIX_CONFIG.common;
    if(eq.affixes.length >= config.maxSlots){ showToast('词缀槽位已满'); return false; }
    var newAffix = generateSingleAffix(tpl.quality, eq.affixes);
    if(newAffix) eq.affixes.push(newAffix);
  } else {
    // 替换现有词缀
    var newAffix2 = generateSingleAffix(tpl.quality, eq.affixes, slotIndex);
    if(newAffix2) eq.affixes[slotIndex] = newAffix2;
  }
  
  saveGame();
  updateResUI();
  showToast('✨ 洗练成功！');
  return true;
}

// 生成单个词缀（避免与现有词缀重复）
function generateSingleAffix(quality, existingAffixes, excludeIndex){
  var config = QUALITY_AFFIX_CONFIG[quality] || QUALITY_AFFIX_CONFIG.common;
  var usedIds = {};
  for(var i = 0; i < existingAffixes.length; i++){
    if(i !== excludeIndex) usedIds[existingAffixes[i].id] = true;
  }
  var categories = ['attack','defense','utility'];
  var cat = categories[Math.floor(Math.random() * categories.length)];
  var pool = AFFIX_POOL[cat];
  var available = pool.filter(function(a){ return !usedIds[a.id]; });
  if(available.length === 0) available = pool;
  var affixDef = available[Math.floor(Math.random() * available.length)];
  
  var maxTier = config.maxTier;
  var tier;
  if(maxTier <= 2){
    tier = Math.random() < 0.7 ? 1 : 2;
  } else if(maxTier <= 3){
    var r = Math.random();
    tier = r < 0.4 ? 1 : (r < 0.8 ? 2 : 3);
  } else if(maxTier <= 4){
    var r2 = Math.random();
    tier = r2 < 0.2 ? 1 : (r2 < 0.5 ? 2 : (r2 < 0.8 ? 3 : 4));
  } else {
    var r3 = Math.random();
    tier = r3 < 0.1 ? 1 : (r3 < 0.25 ? 2 : (r3 < 0.5 ? 3 : (r3 < 0.8 ? 4 : 5)));
  }
  tier = Math.min(tier, maxTier);
  
  var tierDef = AFFIX_TIERS[tier - 1];
  var value = Math.max(1, Math.round(affixDef.base * tierDef.mult * (0.9 + Math.random() * 0.2)));
  
  return {
    id: affixDef.id,
    category: cat,
    tier: tier,
    value: value
  };
}

// 一键洗练全部词缀
function rerollAllAffixes(equipUid){
  var eq = G.equipment.find(function(e){ return e.uid === equipUid; });
  if(!eq){ showToast('装备不存在'); return false; }
  if(eq.heroUid){ showToast('请先卸下装备再洗练'); return false; }
  
  var tpl = EQUIP_TEMPLATES.find(function(t){ return t.id === eq.id; });
  if(!tpl) return false;
  
  var cost = REROLL_COSTS[tpl.quality] || REROLL_COSTS.common;
  var totalGold = cost.gold * 3;
  var totalGems = cost.gems * 3;
  if((G.resources.gold || 0) < totalGold){ showToast('金币不足，需要' + totalGold + '金币'); return false; }
  if((G.resources.gems || 0) < totalGems){ showToast('宝石不足，需要' + totalGems + '宝石'); return false; }
  
  G.resources.gold -= totalGold;
  G.resources.gems -= totalGems;
  
  eq.affixes = generateAffixes(tpl.quality);
  
  saveGame();
  updateResUI();
  showToast('✨ 全部洗练成功！');
  return true;
}

function equipItem(heroUid,equipUid){
  const hero=G.heroes.find(h=>h.uid===heroUid);
  const equip=G.equipment.find(e=>e.uid===equipUid);
  if(!hero||!equip)return;
  const tpl=EQUIP_TEMPLATES.find(t=>t.id===equip.id);
  if(!tpl)return;
  // 卸下当前装备
  const slot=tpl.type==='weapon'?'weapon':tpl.type==='armor'?'armor':'accessory';
  const oldEquipUid=hero.equipment[slot];
  if(oldEquipUid!=null){
    const oldEq=G.equipment.find(e=>e.uid===oldEquipUid);
    if(oldEq)oldEq.heroUid=null;
  }
  // 装上新的
  hero.equipment[slot]=equipUid;
  equip.heroUid=heroUid;
  showToast(`${hero.name} 装备了 ${tpl.name}`);
}

function unequipItem(heroUid,slot){
  const hero=G.heroes.find(h=>h.uid===heroUid);
  if(!hero)return;
  const equipUid=hero.equipment[slot];
  if(equipUid==null)return;
  const equip=G.equipment.find(e=>e.uid===equipUid);
  if(equip)equip.heroUid=null;
  hero.equipment[slot]=null;
}

// ==================== 建筑系统 ====================
function getBuildingCost(buildingId,level){
  const def=BUILDING_DEFS[buildingId];
  const cost={};
  for(let[k,v]of Object.entries(def.baseCost)){
    cost[k]=Math.floor(v*Math.pow(1.4,level-1));
  }
  return cost;
}

function canAfford(cost){
  for(let[k,v]of Object.entries(cost)){
    if((G.resources[k]||0)<v)return false;
  }
  return true;
}

function upgradeBuilding(buildingId){
  const def=BUILDING_DEFS[buildingId];
  const curLevel=G.buildings[buildingId];
  if(curLevel>=def.maxLevel){showToast('已达最高等级！');return}
  
  const nextLevel=curLevel+1;
  
  // 检查特殊升级条件（支持固定 upgradeReq 和按等级 upgradeReqByLevel）
  var upgradeReq=null;
  if(def.upgradeReqByLevel && def.upgradeReqByLevel[nextLevel]){
    upgradeReq=def.upgradeReqByLevel[nextLevel];
  }else if(def.upgradeReq){
    upgradeReq=def.upgradeReq;
  }
  
  if(upgradeReq){
    for(let[k,v]of Object.entries(upgradeReq)){
      if((G.resources[k]||0)<v){
        showToast(`升级需要${RESOURCE_DEFS[k]?.name||k}: ${v}`);
        return;
      }
    }
  }
  
  const cost=getBuildingCost(buildingId,curLevel);
  if(!canAfford(cost)){showToast('资源不足！');return}
  
  // 扣除资源
  for(let[k,v]of Object.entries(cost))G.resources[k]-=v;
  // 扣除特殊条件资源
  if(upgradeReq){
    for(let[k,v]of Object.entries(upgradeReq))G.resources[k]-=v;
  }
  
  G.buildings[buildingId]++;
  const newLevel=G.buildings[buildingId];
  updateResUI();
  const effectText=def.effects&&def.effects[newLevel-1]?def.effects[newLevel-1]:'';
  showToast(`${def.name} 升级到 ${newLevel} 级！${effectText}`);
  
  // 检查建筑相关成就
  checkAchievement('build_1');
  checkAchievement('build_2');
  checkAchievement('build_3');
  checkAchievement('build_4');
  checkAchievement('build_5');
  checkAchievement('build_6');
  checkAchievement('build_7');
  checkAchievement('build_8');
  
  saveGame();
  renderCurrentTab();
}

function getTavernRefreshCost(){

  const tavernLevel=G.buildings.tavern||1;
  return TAVERN_REFRESH.costByLevel[tavernLevel]||TAVERN_REFRESH.costByLevel[1];
}

function canRefreshTavern(){
  const cost=getTavernRefreshCost();
  for(let[k,v]of Object.entries(cost)){
    if((G.resources[k]||0)<v)return false;
  }
  return true;
}

function refreshTavernOptions(){
  if(!canRefreshTavern()){
    const cost=getTavernRefreshCost();
    const costStr=Object.entries(cost).map(([k,v])=>`${RESOURCE_DEFS[k]?.icon||''}${v}`).join(' ');
    showToast(`刷新需要: ${costStr}`);
    return;
  }
  
  // 扣除刷新费用（固定，不递增）
  const cost=getTavernRefreshCost();
  for(let[k,v]of Object.entries(cost)){
    G.resources[k]-=v;
  }
  
  // 增加保底计数
  setPity(getPity()+1);
  
  // 清除缓存，强制重新随机
  G_tavernOptions=null;
  
  updateResUI();
  saveGame();
  
  // 检查是否触发保底
  if(getPity() >= 10){
    showToast('🎉 保底触发！本次必出高品质英雄！');
  }else{
    showToast(`已刷新英雄列表（${getPity()}/10 次后保底）`);
  }
  
  // 只刷新酒馆内容，不退出酒馆
  renderTavernRecruit();
}

// 酒馆当前显示的英雄选项缓存（避免招募后重新随机）
var G_tavernOptions = null;
// 酒馆中已被招募的英雄ID集合
var G_tavernRecruited = new Set();
// 酒馆保底计数器（每10次刷新必出当前最高品质英雄）
// 存放在G对象中自动存档，兼容旧存档（undefined时默认0）
function getPity(){return G.tavernPity||0}
function setPity(v){G.tavernPity=v}

function getRecruitOptions(){
  // 如果已有缓存，直接返回（招募后不重新随机）
  if(G_tavernOptions && G_tavernOptions.length > 0) return G_tavernOptions;

  const tavernLevel=G.buildings.tavern;
  const maxQuality=TAVERN_REFRESH.maxQualityByLevel[tavernLevel]||'common';
  const maxQIdx=QUALITIES.indexOf(maxQuality);
  const pool=HERO_TEMPLATES.filter(t=>QUALITIES.indexOf(t.quality)<=maxQIdx);
  
  // 根据酒馆等级决定选项数量
  const optionCount=TAVERN_REFRESH.optionsCount[tavernLevel]||2;
  
  // 加权随机（基础权重）
  const weights={common:50,rare:30,epic:15,legendary:4,mythic:1};
  // 品质加成：提升当前最高可解锁品质的出现率
  const boost=TAVERN_REFRESH.qualityWeightBoost[tavernLevel]||0;
  if(boost>0){
    weights[maxQuality]=Math.round((weights[maxQuality]||10)*(1+boost));
  }
  const options=[];
  for(let i=0;i<optionCount;i++){
    let attempts=0;
    while(attempts<20){
      const tpl=pick(pool);
      const w=weights[tpl.quality]||10;
      if(Math.random()*100<w||attempts>15){
        options.push(tpl);
        break;
      }
      attempts++;
    }
  }
  
  // 保底机制：每10次刷新，最后一个位置必出当前最高品质英雄
  if(getPity() >= 10 && options.length > 0){
    // 保底必出当前最高可解锁品质
    const pityPool = HERO_TEMPLATES.filter(t => 
      QUALITIES.indexOf(t.quality) === maxQIdx // 只选最高品质
    );
    if(pityPool.length > 0){
      options[options.length - 1] = pick(pityPool);
      setPity(0); // 重置保底计数
    }
  }
  
  G_tavernOptions = options;
  G_tavernRecruited = new Set();
  return options;
}

function recruitHero(templateId){
  const tpl=HERO_TEMPLATES.find(t=>t.id===templateId);
  if(!tpl)return;
  // 记录英雄图鉴（即使不招募也记录为"遇见"）
  recordCodex('heroes',templateId);
  // 已招募的英雄不能重复招募
  if(G_tavernRecruited.has(templateId)){showToast('该英雄已被招募！');return}
  
  // 招募成本：降低门槛，让更多玩家能体验到招募乐趣
  const goldCosts={common:30,rare:100,epic:300,legendary:0,mythic:0};
  const gemCosts={common:0,rare:0,epic:0,legendary:3,mythic:8};
  
  const goldCost=goldCosts[tpl.quality]||50;
  const gemCost=gemCosts[tpl.quality]||0;
  
  // 检查资源
  if(goldCost>0 && G.resources.gold<goldCost){showToast(`金币不足！需要 ${goldCost} 金币`);return}
  if(gemCost>0 && G.resources.gems<gemCost){showToast(`宝石不足！需要 ${gemCost} 宝石，击败BOSS可获得`);return}
  
  // 扣除资源
  if(goldCost>0) G.resources.gold-=goldCost;
  if(gemCost>0) G.resources.gems-=gemCost;
  
  const hero=createHero(tpl.id);
  G.heroes.push(hero);
  // 标记为已招募（不移除，保持展示）
  G_tavernRecruited.add(templateId);
  updateResUI();
  saveGame();
  
  const costStr=goldCost>0?`${goldCost}金币`:gemCost>0?`${gemCost}宝石`:`${goldCost}金币+${gemCost}宝石`;
  showToast(`招募成功！消耗 ${costStr}，获得 ${hero.icon} ${hero.name}`);
  
  // 更新成就统计
  updateStat('heroRecruited', 1);
  
  // 检查英雄相关成就
  checkAchievement('hero_4');
  checkAchievement('hero_5');
  checkAchievement('hero_6');
  checkAchievement('hero_7');
  checkAchievement('hero_10');
  
  // 招募后保持在酒馆，已招募的显示为灰色禁用
  renderTavernRecruit();
}

// ==================== 战力计算 ====================
function calcHeroPower(h){
  var s=getHeroStats(h);
  return Math.floor(s.maxHP*0.5+s.atk*3+s.def*2.5+s.spd*2+s.maxMP*0.3);
}

// 战力排序切换
function toggleHeroSort(){
  window._heroSortDesc=!window._heroSortDesc;
  var btn=document.getElementById('hero-sort-btn');
  if(btn)btn.textContent=window._heroSortDesc?'📊战力↓':'📊战力↑';
  var list=document.getElementById('hero-list');
  if(!list)return;
  var cards=Array.from(list.children);
  cards.sort(function(a,b){
    var pa=parseInt(a.querySelector('.hero-power b')?.textContent)||0;
    var pb=parseInt(b.querySelector('.hero-power b')?.textContent)||0;
    return window._heroSortDesc?pb-pa:pa-pb;
  });
  cards.forEach(function(c){list.appendChild(c)});
}

// 使用经验药水
// 使用经验药水（支持倍数：1/5/10/50/-1为全部）
function useExpPotion(heroUid,mult=1){
  const hero=G.heroes.find(h=>h.uid===heroUid);
  if(!hero)return;
  
  const levelCap=getHeroLevelCap();
  if(hero.level>=levelCap){
    showToast('该英雄已达当前等级上限！');
    return;
  }
  
  // 计算实际消耗数量
  const unitCost=100; // 每次消耗100药水
  let actualMult=mult;
  if(mult===-1){
    // 全部使用：计算最大可用倍数
    actualMult=Math.floor((G.resources.expPotion||0)/unitCost);
    if(actualMult<=0){
      showToast('经验药水不足！');
      return;
    }
  }
  
  const totalCost=unitCost*actualMult;
  const totalExp=100*actualMult;
  
  if((G.resources.expPotion||0)<totalCost){
    showToast(`经验药水不足！需要 🧪${totalCost}`);
    return;
  }
  
  // 消耗药水并增加经验
  G.resources.expPotion-=totalCost;
  const leveledUp=addHeroExp(hero,totalExp);
  
  updateResourceBar();
  saveGame();
  
  if(leveledUp){
    showToast(`${hero.icon}${hero.name} 升级了！当前 Lv.${hero.level}`);
  }else{
    showToast(`${hero.icon}${hero.name} 获得经验 +${totalExp} (${hero.exp}/${getExpToLevel(hero.level)})`);
  }
  
  // 刷新英雄详情弹窗
  showHeroDetail(heroUid);
}

// 更新购买成本显示
function updatePotionBuyCost(){
  const count=parseInt(document.getElementById('potion-buy-count')?.value)||1;
  const potionAmount=100;
  const potionPrice=50;
  const totalAmount=count*potionAmount;
  const totalCost=count*potionPrice;
  
  const amountEl=document.getElementById('potion-buy-total-amount');
  const costEl=document.getElementById('potion-buy-total-cost');
  const errorEl=document.getElementById('potion-buy-error');
  
  if(amountEl)amountEl.textContent=totalAmount;
  if(costEl)costEl.textContent=totalCost;
  
  // 检查限制并显示错误
  if(errorEl){
    let errorMsg='';
    if((G.resources.gold||0)<totalCost){
      errorMsg='金币不足！';
    }else if((G.resources.expPotion||0)+totalAmount>RESOURCE_LIMITS.expPotion){
      errorMsg='超过经验药水存储上限！';
    }
    errorEl.textContent=errorMsg;
    errorEl.style.display=errorMsg?'block':'none';
  }
}

// 快捷购买经验药水
function buyExpPotionQuick(count){
  const potionPrice=50;
  const potionAmount=100;
  const totalCost=count*potionPrice;
  const totalAmount=count*potionAmount;
  
  if(count<=0){
    showToast('购买数量必须大于0！');
    return;
  }
  
  if((G.resources.gold||0)<totalCost){
    showToast(`金币不足！需要 💰${totalCost}，当前 💰${G.resources.gold||0}`);
    return;
  }
  
  if((G.resources.expPotion||0)+totalAmount>RESOURCE_LIMITS.expPotion){
    const maxCanBuy=Math.floor((RESOURCE_LIMITS.expPotion-(G.resources.expPotion||0))/potionAmount);
    if(maxCanBuy<=0){
      showToast('经验药水已达上限！');
    }else{
      showToast(`超过存储上限！最多还能购买 ${maxCanBuy} 份`);
    }
    return;
  }
  
  G.resources.gold-=totalCost;
  G.resources.expPotion=(G.resources.expPotion||0)+totalAmount;
  updateResourceBar();
  saveGame();

// 购买最大数量的经验药水
function buyExpPotionMax(){
  const potionPrice=50;
  const potionAmount=100;
  const maxByGold=Math.floor((G.resources.gold||0)/potionPrice);
  const maxByLimit=Math.floor((RESOURCE_LIMITS.expPotion-(G.resources.expPotion||0))/potionAmount);
  const maxCount=Math.min(maxByGold,maxByLimit);
  
  if(maxCount<=0){
    if(maxByGold<=0){
      showToast('金币不足！');
    }else{
      showToast('经验药水已达上限！');
    }
    return;
  }
  
  buyExpPotionQuick(maxCount);
}

// 更新使用药水成本显示
function updatePotionUseCost(heroUid){
  const count=parseInt(document.getElementById(`potion-use-count-${heroUid}`)?.value)||1;
  const unitCost=100;
  const unitExp=100;
  const totalCost=count*unitCost;
  const totalExp=count*unitExp;
  
  const costEl=document.getElementById(`potion-use-cost-${heroUid}`);
  const expEl=document.getElementById(`potion-use-exp-${heroUid}`);
  const btnEl=document.getElementById(`potion-use-btn-${heroUid}`);
  
  if(costEl)costEl.textContent=totalCost;
  if(expEl)expEl.textContent=totalExp;
  
  // 检查资源是否足够
  if(btnEl){
    const hasEnough=(G.resources.expPotion||0)>=totalCost;
    btnEl.disabled=!hasEnough;
    btnEl.style.opacity=hasEnough?'1':'0.5';
  }
}

function useExpPotionCustom(heroUid){

// 确认遣散（执行返还）
function confirmDismiss(uid){
  var idx=G.heroes.findIndex(h=>h.uid===uid);
  if(idx<0){
    closeModal();
    return;
  }
  var h=G.heroes[idx];
  
  // 计算返还资源
  var totalExp=0;
  for(var i=1;i<h.level;i++){
    totalExp+=getExpToLevel(i);
  }
  totalExp+=h.exp||0;
  var returnExp=Math.floor(totalExp*0.7);
  
  var qualityCostMult={common:1,rare:2,epic:4,legendary:8,mythic:16};
  var baseCost=50;
  var returnGold=Math.floor(baseCost*(qualityCostMult[h.quality]||1)*h.level*0.5);
  
  // 从队伍移除
  G.team=G.team.map(t=>(t&&t.uid===uid)?null:t);

    else if(['rare','epic','legendary','mythic'].includes(filter))show=card.dataset.quality===filter;
    else show=card.dataset.role===filter;
    card.style.display=show?'':'none';
  });
}

function switchTalentBranch(heroUid,branchKey,btn){

// 检查是否可以添加天赋点
function canAddTalent(hero,talent){
  // 检查前置要求
  if(talent.requires){
    for(const reqId of talent.requires){
      if(!(hero.talents[reqId]>0))return false;
    }
  }
  return true;
}

// 添加天赋点
function addTalentPoint(heroUid,talentId){
  const hero=G.heroes.find(h=>h.uid===heroUid);
  if(!hero)return;
  
  const tree=TALENT_TREES[hero.role];
  if(!tree)return;
  
  // 查找天赋
  let talent=null;
  for(const branch of Object.values(tree.branches)){
    talent=branch.talents.find(t=>t.id===talentId);
    if(talent)break;
  }
  if(!talent)return;
  
  // 检查可用点数
  const usedPoints=Object.values(hero.talents).reduce((sum,p)=>sum+p,0);
  const availablePoints=hero.talentPoints-usedPoints;
  if(availablePoints<=0){
    showToast('天赋点不足！');
    return;
  }
  
  // 检查是否已满
  const currentPoints=hero.talents[talentId]||0;
  if(currentPoints>=talent.maxPoints){
    showToast('该天赋已满级！');
    return;
  }
  
  // 检查前置要求
  if(!canAddTalent(hero,talent)){
    showToast('前置天赋未激活！');
    return;
  }
  
  // 添加天赋点
  hero.talents[talentId]=currentPoints+1;
  saveGame();
  
  // 播放音效或特效（可选）
  showToast(`✨ ${talent.name} +1！`);
  
  // 刷新界面
  showTalentTree(heroUid);
}

// 重置天赋
function resetTalents(heroUid){
  const hero=G.heroes.find(h=>h.uid===heroUid);
  if(!hero)return;
  
  // 检查资源
  if((G.resources.gold||0)<TALENT_CONFIG.resetCostGold){
    showToast('金币不足！');
    return;
  }
  if((G.resources.gems||0)<TALENT_CONFIG.resetCostGems){
    showToast('宝石不足！');
    return;
  }
  
  // 检查是否有天赋可重置
  const usedPoints=Object.values(hero.talents||{}).reduce((sum,p)=>sum+p,0);
  if(usedPoints===0){

      <div style="color:#ff6b6b;font-weight:bold;margin-bottom:10px">确定要重置天赋吗？</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:15px">

// 确认重置天赋
function confirmResetTalents(heroUid){
  const hero=G.heroes.find(h=>h.uid===heroUid);
  if(!hero)return;
  
  // 扣除资源
  G.resources.gold-=TALENT_CONFIG.resetCostGold;
  G.resources.gems-=TALENT_CONFIG.resetCostGems;
  
  // 返还天赋点
  const usedPoints=Object.values(hero.talents||{}).reduce((sum,p)=>sum+p,0);
  hero.talentPoints+=usedPoints;
  hero.talents={};
  
  saveGame();
  updateResourceBar();
  closeModal();
  showToast(`🔄 天赋已重置，返还 ${usedPoints} 点天赋点！`);
  showTalentTree(heroUid);
}

// 获取英雄天赋效果汇总
function getTalentEffects(hero){
  const effects={};
  if(!hero||!hero.talents)return effects;
  
  const tree=TALENT_TREES[hero.role];
  if(!tree)return effects;
  
  for(const[branchId,branch]of Object.entries(tree.branches)){
    for(const talent of branch.talents){
      const points=hero.talents[talent.id]||0;
      if(points>0){
        const effectType=talent.effect.type;
        const effectValue=talent.effect.value*points;
        if(!effects[effectType])effects[effectType]=0;
        effects[effectType]+=effectValue;
      }
    }
  }
  
  return effects;
}

// 渲染羁绊预览面板
function renderBondPreview(team){
  var teamH=team.filter(function(t){return t!==null;});
  var bonds=detectActiveBonds(teamH);

  // 构建所有羁绊信息
  var allBondInfo=[];
  for(var i=0;i<HERO_BONDS.length;i++){
    var bond=HERO_BONDS[i];
    var count=0;
    if(bond.check==='role'){
      count=teamH.filter(function(h){return h.role===bond.key;}).length;
    } else if(bond.checkFn){
      count=bond.checkFn(teamH);
    }
    var nextThreshold=null;
    for(var t=0;t<bond.thresholds.length;t++){
      if(count<bond.thresholds[t].need){nextThreshold=bond.thresholds[t];break;}
    }
    var isActive=bonds.some(function(ab){return ab.bond.id===bond.id;});
    allBondInfo.push({bond:bond,count:count,nextThreshold:nextThreshold,isActive:isActive});
  }

  var typeOrder={role:0,theme:1,fun:2};
  allBondInfo.sort(function(a,b){return (typeOrder[a.bond.type]||9)-(typeOrder[b.bond.type]||9);});

  var typeNames={role:'⚔️ 职业羁绊',theme:'🌟 主题羁绊',fun:'🎉 趣味羁绊'};
  var typeColors={role:'#4a9eff',theme:'#a855f7',fun:'#f59e0b'};

  var html='<div class="panel"><div class="panel-title"><span class="icon">🔗</span> 英雄羁绊'
    +(bonds.length>0?' <span style="font-size:11px;color:var(--green);font-weight:normal">('+bonds.length+'激活)</span>':'')
    +'</div>';

  // 激活的羁绊高亮展示
  if(bonds.length>0){
    html+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">';
    for(var bi=0;bi<bonds.length;bi++){
      var ab=bonds[bi];
      var bc=typeColors[ab.bond.type]||'#888';
      html+='<span style="display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:bold;border:1px solid '+bc+';color:'+bc+';background:'+bc+'15">'+ab.bond.icon+' '+ab.bond.name+'</span>';
    }
    html+='</div>';
  }

  // 所有羁绊进度列表
  var lastType='';
  for(var j=0;j<allBondInfo.length;j++){
    var item=allBondInfo[j];
    if(item.count===0 && !item.nextThreshold) continue;
    if(item.bond.type!==lastType){
      lastType=item.bond.type;
      html+='<div style="color:'+typeColors[lastType]+';font-size:11px;font-weight:bold;margin:8px 0 4px;padding-top:6px;border-top:1px solid rgba(255,255,255,.05)">'+typeNames[lastType]+'</div>';
    }
    var tc=typeColors[item.bond.type];
    var maxNeed=item.bond.thresholds[item.bond.thresholds.length-1].need;
    var countText=item.count+'/'+maxNeed;
    var pct=Math.min(100,Math.floor(item.count/maxNeed*100));

    // 进度条
    var barColor=item.isActive?'var(--green)':'var(--text3)';
    var activeDesc='';
    if(item.isActive){
      var activeThreshold=item.bond.thresholds.filter(function(t){return item.count>=t.need;}).pop();
      if(activeThreshold) activeDesc='<div style="font-size:10px;color:var(--green);margin-top:2px">✨ '+activeThreshold.desc+'</div>';
    }
    var nextDesc=item.nextThreshold?'<div style="font-size:10px;color:var(--text3);margin-top:1px">→ '+item.nextThreshold.desc+'</div>':'<div style="font-size:10px;color:var(--gold);margin-top:1px">已满级!</div>';

    html+='<div class="bond-preview-item" style="border-color:'+(item.isActive?tc:'var(--border)')+';'+(item.isActive?'background:linear-gradient(135deg,'+tc+'08,'+tc+'03)':'')+'">'
      +'<div style="display:flex;align-items:center;gap:6px">'
      +'<span style="font-size:16px">'+item.bond.icon+'</span>'
      +'<span style="font-weight:bold;color:'+(item.isActive?tc:'var(--text)')+';font-size:12px;flex:1">'+item.bond.name+'</span>'
      +'<span style="font-size:10px;color:'+(item.isActive?'var(--green)':'var(--text2)')+'">'+countText+'</span>'
      +'</div>'
      +'<div style="height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:4px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+barColor+';border-radius:2px;transition:width .3s"></div></div>'
      +activeDesc+nextDesc
      +'</div>';
  }

  html+='</div>';
  return html;
}

// ==================== 扫荡功能 ====================
function quickClear(stageId){
  var stage=getStage(stageId);
  if(!stage || stageId>=G.stageProgress){
    showToast('只能扫荡已通关的关卡！');
    return;
  }
  var teamHeroes=G.team.filter(h=>h!==null);
  if(teamHeroes.length===0){
    showToast('请先编队！');
    return;
  }
  
  // 扫荡：直接结算奖励，跳过战斗
  var rw=stage.rewards;
  // 连胜加成
  var streakBonus=1+Math.min((G.pveWinStreak||0)*0.05,0.5);
  var finalGold=Math.floor((rw.gold||0)*streakBonus);
  var finalFood=Math.floor((rw.food||0)*streakBonus);
  var finalStone=Math.floor((rw.stone||0)*streakBonus);
  var finalIron=Math.floor((rw.iron||0)*streakBonus);
  
  G.resources.gold=Math.min((G.resources.gold||0)+finalGold,RESOURCE_LIMITS.gold);
  G.resources.food=Math.min((G.resources.food||0)+finalFood,RESOURCE_LIMITS.food);
  G.resources.stone=Math.min((G.resources.stone||0)+finalStone,RESOURCE_LIMITS.stone);
  G.resources.iron=Math.min((G.resources.iron||0)+finalIron,RESOURCE_LIMITS.iron);
  G.resources.gems=Math.min((G.resources.gems||0)+(rw.gems||0),RESOURCE_LIMITS.gems);
  
  // 经验
  teamHeroes.forEach(function(h){
    var expBonus=1;
    if(h.traits) h.traits.forEach(function(t){if(t.id==='tactician')expBonus+=0.20});
    addHeroExp(h,Math.floor((rw.exp||0)*expBonus));
  });
  
  // 装备掉落（扫荡掉率降低）
  if(Math.random()<0.15+stageId*0.02){
    var possibleDrops=EQUIP_TEMPLATES.filter(function(e){return QUALITIES.indexOf(e.quality)<=Math.min(stageId,4)});
    if(possibleDrops.length>0){
      var tpl=pick(possibleDrops);
      var drop={uid:++G.heroIdCounter,id:tpl.id,heroUid:null};
      G.equipment.push(drop);
      recordCodex('equipment',tpl.id);
      showToast('扫荡成功！获得 '+tpl.name);
    }else{
      showToast('扫荡成功！💰'+finalGold+' 🍞'+finalFood);
    }
  }else{
    showToast('扫荡成功！💰'+finalGold+' 🍞'+finalFood+' 🪨'+finalStone);
  }
  
  // 更新在线时间
  G.lastOnlineTime=Date.now();
  saveGame();
  updateResUI();
}

      +'<div class="hero-name"><span class="q-'+h.quality+'">'+h.name+'</span>'+(isUsed?' <span class="text-green">✓</span>':'')+'</div>'

      +'<div class="hero-stats text-xs text-dim">❤️'+h.maxHP+' ⚔️'+h.atk+' 🛡️'+h.def+'</div>'
      +'</div></div>';
  }).join('');
  
  // 计算融合预览
  var selectedHeroes=usedUids.filter(Boolean).map(uid=>G.heroes.find(h=>h.uid===uid)).filter(Boolean);
  var previewHTML='';
  if(selectedHeroes.length>=2){
    // 品质预览
    var qualities=selectedHeroes.map(h=>QUALITIES.indexOf(h.quality));
    var maxQ=Math.max(...qualities);
    var avgQ=Math.floor(qualities.reduce((a,b)=>a+b,0)/qualities.length);
    var previewQuality=QUALITIES[Math.min(maxQ,avgQ)];
    
    // 技能池预览
    var allSkills=new Set();

    previewHTML=`
      <div style="background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);border-radius:8px;padding:12px;margin-top:12px">

        <div style="display:flex;gap:16px;flex-wrap:wrap">
