<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a12;--panel:#12122a;--panel2:#1a1a38;--panel3:#222250;
  --border:#2a2a55;--border-light:#35356a;
  --gold:#c9a227;--gold2:#e8d44d;--gold-dim:rgba(201,162,39,.15);
  --red:#e74c3c;--green:#2ecc71;--blue:#3498db;--purple:#9b59b6;
  --text:#e0d5c0;--text2:#9a8d7b;--text3:#6a5d4d;
  --hp-bar:#e74c3c;--mp-bar:#3498db;--exp-bar:#2ecc71;
  --nav-h:56px;--top-h:42px;
  --shadow-sm:0 2px 8px rgba(0,0,0,.25);
  --shadow-md:0 4px 16px rgba(0,0,0,.35);
  --shadow-lg:0 8px 32px rgba(0,0,0,.45);
  --shadow-gold:0 0 20px rgba(201,162,39,.15);
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;
  --transition:all .25s cubic-bezier(.4,0,.2,1);
}
body{background:var(--bg);color:var(--text);font-family:'Microsoft YaHei','PingFang SC','SimHei',sans-serif;font-size:14px;overflow:hidden;height:100vh;width:100vw;-webkit-user-select:none;user-select:none;line-height:1.5}
#app{display:flex;flex-direction:column;height:100vh;width:100vw}

/* ===== 顶部栏 ===== */
#top-bar{height:var(--top-h);background:linear-gradient(180deg,rgba(26,26,56,.95),rgba(18,18,42,.98));border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:6px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;flex-wrap:nowrap;box-shadow:var(--shadow-sm);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
#top-bar::-webkit-scrollbar{display:none}
.res-item{display:flex;align-items:center;gap:3px;font-size:11px;white-space:nowrap;flex-shrink:0;background:rgba(255,255,255,.04);padding:4px 10px;border-radius:14px;border:1px solid rgba(255,255,255,.06);transition:var(--transition)}
.res-item:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.1)}
.res-icon{font-size:13px}
.res-val{color:var(--gold);font-weight:bold;font-size:12px}
.sep{color:var(--text3);margin:0 1px;flex-shrink:0;opacity:.3}

/* ===== 底部导航 ===== */
#sidebar{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:linear-gradient(180deg,rgba(20,20,48,.97),rgba(12,12,30,.99));border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:0 1px;z-index:50;gap:0;flex-shrink:0;box-shadow:0 -4px 20px rgba(0,0,0,.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
#sidebar .nav-btn{width:auto;height:var(--nav-h);border:none;background:transparent;color:var(--text3);cursor:pointer;border-radius:0;font-size:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:var(--transition);flex:1;min-width:0;padding:4px 0;position:relative}
#sidebar .nav-btn:hover{color:var(--text);background:rgba(255,255,255,.03)}
#sidebar .nav-btn.active{color:var(--gold);border-color:transparent}
#sidebar .nav-btn.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:0 0 3px 3px;box-shadow:0 0 12px rgba(201,162,39,.6)}
#sidebar .nav-btn .nav-label{font-size:9px;margin-top:2px;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;transition:color .25s}
#sidebar .nav-btn .nav-icon{font-size:19px;line-height:1;transition:transform .25s}
#sidebar .nav-btn.active .nav-icon{transform:scale(1.1)}
#sidebar .nav-btn.active .nav-label{color:var(--gold);font-weight:bold}

/* ===== 主内容区 ===== */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;padding-bottom:var(--nav-h)}
#content{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
#content::-webkit-scrollbar{width:3px}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* 战斗面板 - 可滚动 */
#battle-panel{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;-webkit-overflow-scrolling:touch}
#battle-panel::-webkit-scrollbar{width:4px}
#battle-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ===== 面板 ===== */
.panel{background:linear-gradient(145deg,var(--panel),rgba(18,18,42,.8));border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-md);position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
.panel-title{color:var(--gold);font-size:15px;font-weight:bold;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:8px;letter-spacing:.3px}
.panel-title .icon{font-size:18px;filter:drop-shadow(0 0 4px rgba(201,162,39,.3))}
/* ===== 存档管理样式 ===== */
.stat-row{display:flex;justify-content:center;gap:24px;padding:12px;background:rgba(201,162,39,.06);border-radius:8px;border:1px solid rgba(201,162,39,.15)}
.stat-item .stat-val{font-size:16px;font-weight:bold;color:var(--text)}
.stat-item .stat-label{font-size:10px;color:var(--text3);margin-top:2px}
.badge{font-size:10px;color:var(--text3);background:rgba(255,255,255,.05);padding:2px 8px;border-radius:10px}
.backup-item{display:flex;align-items:center;justify-content:space-between;padding:10px;background:rgba(0,0,0,.2);border-radius:6px;margin-bottom:6px;border-left:2px solid var(--gold)}
.backup-item.backup-restore{border-left-color:#ffa500;background:rgba(255,165,0,.06)}
.backup-info{flex:1;min-width:0}
.backup-meta{display:flex;align-items:center;gap:8px;font-size:11px;flex-wrap:wrap}
.backup-time{color:var(--text3);min-width:45px}
.backup-tag{color:var(--text2);padding:1px 6px;background:rgba(255,255,255,.05);border-radius:3px}
.backup-tag.backup-power{color:var(--gold);background:rgba(201,162,39,.12)}
.backup-note{font-size:10px;color:var(--text3);margin-top:3px}
.backup-actions{display:flex;gap:6px;flex-shrink:0}
.empty-state{text-align:center;padding:16px;color:var(--text3);font-size:11px}


/* ===== 合成结果展示 ===== */
.merge-result-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.98)}}
@keyframes btnGlow{0%,100%{box-shadow:0 0 5px rgba(255,165,0,.3)}50%{box-shadow:0 0 15px rgba(255,165,0,.6)}}
.merge-result-card{background:var(--panel);border:2px solid var(--gold);border-radius:16px;padding:24px;max-width:360px;width:90%;text-align:center;position:relative;animation:cardPop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes cardPop{0%{opacity:0;transform:scale(.3) translateY(50px)}70%{transform:scale(1.05) translateY(-10px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.merge-result-avatar{width:100px;height:100px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:56px;margin:0 auto 16px;position:relative;border:3px solid var(--border);animation:avatarGlow 1.5s ease infinite alternate}
@keyframes avatarGlow{from{box-shadow:0 0 20px rgba(201,162,39,.3)}to{box-shadow:0 0 40px rgba(201,162,39,.6)}}
.merge-result-quality{font-size:14px;font-weight:bold;margin-bottom:8px}
.merge-result-name{font-size:20px;font-weight:900;color:var(--gold);margin-bottom:12px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.merge-result-mutation{color:#a855f7;font-size:12px;font-weight:bold;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:4px}
.merge-result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0;padding:12px;background:rgba(0,0,0,.3);border-radius:8px}
.merge-result-stat{font-size:11px;color:var(--text2)}
.merge-result-stat b{display:block;color:var(--text);font-size:14px;margin-top:2px}
.merge-result-skills{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:12px 0}
.merge-result-skill{background:rgba(41,128,185,.2);color:var(--blue);padding:3px 8px;border-radius:4px;font-size:10px;border:1px solid rgba(41,128,185,.3)}
/* 异变特效 */
.merge-mutation-flash{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,rgba(168,85,247,.5),transparent 70%);pointer-events:none;z-index:299;animation:mutationFlash 1.2s ease-out forwards}
@keyframes mutationFlash{0%{opacity:0}20%{opacity:1}60%{opacity:.5}100%{opacity:0}}
/* 品质提升特效 */
.merge-quality-up-flash{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,rgba(245,158,11,.5),transparent 70%);pointer-events:none;z-index:299;animation:qualityUpFlash 1.5s ease-out forwards}
@keyframes qualityUpFlash{0%{opacity:0}15%{opacity:1}40%{opacity:.6}100%{opacity:0}}
/* 传说特效 */
.merge-legendary-flash{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,rgba(255,184,51,.6),transparent 60%),radial-gradient(ellipse at 30% 30%,rgba(255,200,100,.4),transparent 50%);pointer-events:none;z-index:299;animation:legendaryFlash 2s ease-out forwards}
@keyframes legendaryFlash{0%{opacity:0;transform:scale(.8)}20%{opacity:1;transform:scale(1)}50%{opacity:.8}100%{opacity:0;transform:scale(1.2)}}
.merge-legendary-text{position:fixed;top:20%;left:50%;transform:translateX(-50%);font-size:48px;font-weight:900;color:#ffb833;text-shadow:0 0 30px rgba(255,184,51,.8),0 0 60px rgba(255,184,51,.4);pointer-events:none;z-index:301;animation:legendaryText 2s ease-out forwards}
@keyframes legendaryText{0%{opacity:0;transform:translateX(-50%) scale(.5) translateY(30px)}30%{opacity:1;transform:translateX(-50%) scale(1.1) translateY(0)}70%{opacity:1}100%{opacity:0;transform:translateX(-50%) scale(1) translateY(-20px)}}
/* 神话特效 */
.merge-mythic-flash{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,rgba(239,68,68,.7),transparent 50%),radial-gradient(ellipse at 20% 80%,rgba(168,85,247,.5),transparent 40%),radial-gradient(ellipse at 80% 20%,rgba(245,158,11,.5),transparent 40%);pointer-events:none;z-index:299;animation:mythicFlash 3s ease-out forwards}
@keyframes mythicFlash{0%{opacity:0;transform:scale(.5)}25%{opacity:1;transform:scale(1.1)}60%{opacity:.9}100%{opacity:0;transform:scale(1.3)}}
.merge-mythic-text{position:fixed;top:15%;left:50%;transform:translateX(-50%);font-size:56px;font-weight:900;color:#ff5555;text-shadow:0 0 40px rgba(239,68,68,.9),0 0 80px rgba(239,68,68,.5),0 4px 12px rgba(0,0,0,.8);pointer-events:none;z-index:301;animation:mythicText 3s ease-out forwards}
@keyframes mythicText{0%{opacity:0;transform:translateX(-50%) scale(.3) rotate(-10deg)}20%{opacity:1;transform:translateX(-50%) scale(1.2) rotate(0)}50%{opacity:1;transform:translateX(-50%) scale(1)}80%{opacity:.8}100%{opacity:0;transform:translateX(-50%) scale(1.1) translateY(-30px)}}
.merge-mythic-particles{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:300;overflow:hidden}
.merge-mythic-particles::before,.merge-mythic-particles::after{content:"✨";position:absolute;font-size:24px;animation:particleFloat 2s ease-out forwards}
.merge-mythic-particles::before{left:20%;top:30%;animation-delay:.2s}
.merge-mythic-particles::after{right:25%;top:40%;animation-delay:.5s}
@keyframes particleFloat{0%{opacity:0;transform:translateY(20px) scale(0)}50%{opacity:1;transform:translateY(-20px) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(.5)}}


/* ===== 城镇界面优化 ===== */
.town-hero-summary{display:flex;gap:8px;margin-top:10px;padding:12px;background:linear-gradient(135deg,rgba(0,0,0,.25),rgba(0,0,0,.15));border-radius:var(--radius-md);font-size:11px;border:1px solid rgba(255,255,255,.04)}
.town-hero-summary-item{flex:1;text-align:center}
.town-hero-summary-val{font-size:16px;font-weight:bold;color:var(--gold);text-shadow:0 0 8px rgba(201,162,39,.2)}
.town-hero-summary-lbl{color:var(--text2);margin-top:3px;font-size:10px}
.town-module-btn{background:linear-gradient(145deg,var(--panel2),var(--panel));border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 8px;cursor:pointer;transition:var(--transition);text-align:center;position:relative;overflow:hidden}
.town-module-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.02),transparent);pointer-events:none}
.town-module-btn:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:var(--shadow-md),var(--shadow-gold)}
.town-module-btn:active{transform:translateY(0);opacity:.85}
.town-module-btn-icon{font-size:30px;margin-bottom:6px;display:block;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.town-module-btn-name{font-size:12px;font-weight:bold;color:var(--gold)}
.town-module-btn-info{font-size:10px;color:var(--text2);margin-top:3px}
.town-quick-btns{display:flex;gap:8px;flex-wrap:wrap}

/* ===== 英雄卡片 ===== */
.hero-card{background:linear-gradient(145deg,var(--panel2),var(--panel));border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;margin-bottom:8px;cursor:pointer;transition:var(--transition);display:flex;gap:10px;position:relative;overflow:hidden}
.hero-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .25s}
.hero-card:hover::before{opacity:1}
.hero-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:var(--border-light)}
.hero-card:active{transform:translateY(0);box-shadow:none}
.hero-card.selected{border-color:var(--gold);box-shadow:0 0 16px rgba(201,162,39,.25)}
.quality-common::before{background:linear-gradient(90deg,#888,#666)}
.quality-rare::before{background:linear-gradient(90deg,#4a9eff,#2980b9)}
.quality-epic::before{background:linear-gradient(90deg,#a855f7,#8e44ad)}
.quality-legendary::before{background:linear-gradient(90deg,#f59e0b,#d97706)}
.quality-mythic::before{background:linear-gradient(90deg,#ef4444,#dc2626)}
.quality-hidden::before{background:linear-gradient(90deg,#00ffcc,#00cc99)}
.quality-rare{border-color:rgba(74,158,255,.3)!important}
.quality-epic{border-color:rgba(168,85,247,.3)!important}
.quality-legendary{border-color:rgba(245,158,11,.3)!important;box-shadow:inset 0 0 20px rgba(245,158,11,.04)}
.quality-mythic{border-color:rgba(239,68,68,.3)!important;box-shadow:inset 0 0 20px rgba(239,68,68,.04)}
.quality-hidden{border-color:rgba(0,255,204,.4)!important;box-shadow:inset 0 0 25px rgba(0,255,204,.08),0 0 15px rgba(0,255,204,.1)}
.hero-avatar{width:50px;height:50px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;border:2px solid var(--border);position:relative;transition:var(--transition);background:rgba(0,0,0,.2)}
.hero-card:hover .hero-avatar{transform:scale(1.08);border-color:var(--border-light)}
.hero-info{flex:1;min-width:0}
.hero-name{font-size:13px;font-weight:bold;color:var(--gold);display:flex;align-items:center;gap:4px}
.hero-meta{font-size:10px;color:var(--text2);margin-top:2px}
.hero-stats{font-size:10px;color:var(--text2);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
.hero-skills{font-size:10px;margin-top:4px;display:flex;gap:3px;flex-wrap:wrap}
.skill-tag{background:rgba(52,152,219,.12);color:var(--blue);padding:2px 7px;border-radius:4px;font-size:9px;border:1px solid rgba(52,152,219,.2);transition:var(--transition)}
.skill-tag:hover{background:rgba(52,152,219,.25);border-color:rgba(52,152,219,.4)}
.stat-tag{color:var(--text2);display:inline-flex;align-items:center;gap:2px}
.stat-tag b{color:var(--text);font-weight:600}
.bar-wrap{height:4px;background:rgba(0,0,0,.3);border-radius:2px;margin-top:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .3s}
.hero-team-badge{position:absolute;top:6px;right:6px;background:rgba(46,204,113,.15);color:#2ed573;font-size:9px;padding:2px 6px;border-radius:4px;border:1px solid rgba(46,204,113,.25);font-weight:bold}
.hero-level-badge{position:absolute;bottom:-2px;right:-2px;background:rgba(0,0,0,.8);border:1px solid var(--border);border-radius:4px;padding:0 4px;font-size:8px;color:var(--gold);font-weight:bold}
.hero-power{font-size:10px;color:var(--text3);margin-top:2px}
.hero-power b{color:var(--gold);font-size:11px}

/* 品质颜色 */
.quality-common{border-color:#888!important}
.quality-rare{border-color:#4a9eff!important}
.quality-epic{border-color:#a855f7!important}
.quality-legendary{border-color:#f59e0b!important}
.quality-mythic{border-color:#ef4444!important}
.quality-hidden{border-color:#00ffcc!important;box-shadow:0 0 15px rgba(0,255,204,.2)}
.q-common{color:#aaa}.q-rare{color:#5bb5ff}.q-epic{color:#b86eff}.q-legendary{color:#ffb833;text-shadow:0 0 10px rgba(255,184,51,.4)}.q-mythic{color:#ff5555;text-shadow:0 0 10px rgba(255,85,85,.4)}.q-hidden{color:#00ffcc;text-shadow:0 0 12px rgba(0,255,204,.6),0 0 24px rgba(0,255,204,.3)}

/* ===== 按钮 ===== */
.btn{padding:8px 18px;border:1px solid var(--border);background:linear-gradient(145deg,var(--panel2),var(--panel));color:var(--text);cursor:pointer;border-radius:var(--radius-sm);font-size:13px;transition:var(--transition);font-family:inherit;touch-action:manipulation;position:relative;overflow:hidden;letter-spacing:.3px}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.03),transparent);pointer-events:none}
.btn:hover{border-color:var(--border-light);background:linear-gradient(145deg,var(--panel3),var(--panel2));box-shadow:var(--shadow-sm)}
.btn:active{opacity:.8;transform:scale(.97)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;filter:grayscale(.5)}
.btn-primary{background:linear-gradient(135deg,#2a1a00,#3a2a00);border-color:var(--gold);color:var(--gold);font-weight:bold}
.btn-primary:hover{background:linear-gradient(135deg,#3a2a00,#4a3a00);box-shadow:0 0 16px rgba(201,162,39,.25);border-color:var(--gold2)}
.btn-primary:active{background:linear-gradient(135deg,#3a2a00,#4a3a00)}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(231,76,60,.1);box-shadow:0 0 12px rgba(231,76,60,.15)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:var(--radius-sm)}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}

/* ===== 战斗场景 ===== */
.battle-scene{position:relative;background:linear-gradient(180deg,#060610 0%,#0c0c1a 40%,#141430 100%);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;margin-bottom:10px;overflow:hidden;min-height:200px;box-shadow:inset 0 0 60px rgba(0,0,0,.4)}
.battle-scene::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 120%,rgba(100,50,180,.08) 0%,transparent 70%);pointer-events:none}
.battle-vs{display:flex;gap:6px;align-items:start;justify-content:center}
.battle-vs > div{min-width:0;flex-shrink:1}
.battle-vs .ally-side,.battle-vs .enemy-side{display:flex;flex-direction:column;gap:6px;min-width:0;flex:1}
.battle-vs .vs-center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:20px;flex-shrink:0;min-width:30px}
.battle-side-label{text-align:center;font-size:11px;font-weight:bold;padding:3px 0;border-radius:4px;letter-spacing:1px}
.battle-side-label.ally{color:#5dade2;background:rgba(93,173,226,.1);border:1px solid rgba(93,173,226,.2)}
.battle-side-label.enemy{color:#e74c3c;background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.2)}
.battle-vs-text{font-size:20px;font-weight:900;color:var(--gold);text-shadow:0 0 20px rgba(201,162,39,.5);animation:vsPulse 2s ease-in-out infinite}
@keyframes vsPulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.1);opacity:1}}
.battle-round-badge{font-size:9px;color:var(--text2);margin-top:6px;background:var(--panel2);padding:2px 6px;border-radius:10px;border:1px solid var(--border)}

/* ===== 战斗单位卡片 ===== */
.battle-unit{position:relative;background:linear-gradient(145deg,#16213e,#1a1a2e);border:2px solid var(--border);border-radius:var(--radius-sm);padding:6px;min-width:110px;transition:all .4s ease;overflow:visible;width:100%}
.battle-unit::after{content:'';position:absolute;top:-1px;left:-1px;right:-1px;bottom:-1px;border-radius:8px;opacity:0;transition:opacity .3s;pointer-events:none}
.battle-unit.ally-unit{border-color:rgba(93,173,226,.3)}
.battle-unit.ally-unit::after{box-shadow:0 0 10px rgba(93,173,226,.3)}
.battle-unit.enemy-unit{border-color:rgba(231,76,60,.3)}
.battle-unit.enemy-unit::after{box-shadow:0 0 10px rgba(231,76,60,.3)}
.battle-unit.dead{opacity:.3;filter:grayscale(1) brightness(.5);transform:scale(.92)}
.battle-unit.dead .unit-avatar{filter:grayscale(1)}
.battle-unit.acting{z-index:10;transform:scale(1.04)}
.battle-unit.acting::after{opacity:1}
.battle-unit.acting.ally-unit{border-color:#5dade2;box-shadow:0 0 15px rgba(93,173,226,.4)}
.battle-unit.acting.enemy-unit{border-color:#e74c3c;box-shadow:0 0 15px rgba(231,76,60,.4)}
.battle-unit.hit{animation:hitShake .3s ease}
.battle-unit.heal-target{animation:healGlow .5s ease}
.battle-unit.shield-up{animation:shieldFlash .4s ease}
@keyframes hitShake{0%{transform:translateX(0);filter:brightness(1)}10%{transform:translateX(-5px);filter:brightness(1.5)}20%{transform:translateX(4px);filter:brightness(1.3)}30%{transform:translateX(-3px)}45%{transform:translateX(3px);filter:brightness(1.1)}60%{transform:translateX(-2px)}80%{transform:translateX(1px)}100%{transform:translateX(0);filter:brightness(1)}}
@keyframes healGlow{0%{box-shadow:0 0 0 rgba(46,204,113,0)}50%{box-shadow:0 0 15px rgba(46,204,113,.5)}100%{box-shadow:0 0 0 rgba(46,204,113,0)}}
@keyframes shieldFlash{0%{box-shadow:0 0 0 rgba(52,152,219,0)}50%{box-shadow:0 0 20px rgba(52,152,219,.6)}100%{box-shadow:0 0 0 rgba(52,152,219,0)}}
@keyframes deathFade{0%{opacity:1;transform:scale(1);filter:none}30%{opacity:.8;transform:scale(1.08);filter:brightness(2) saturate(0)}60%{opacity:.4;transform:scale(.95);filter:grayscale(.8) brightness(1.2)}100%{opacity:.25;transform:scale(.9);filter:grayscale(1) brightness(.4)}}
.battle-unit.dying{animation:deathFade .6s ease forwards}
/* 暴击特效 */
@keyframes critFlash{0%{box-shadow:0 0 0 0 rgba(255,200,0,.8)}50%{box-shadow:0 0 30px 8px rgba(255,150,0,.9),inset 0 0 15px rgba(255,200,0,.3)}100%{box-shadow:0 0 0 0 rgba(255,200,0,0)}}
.battle-unit.crit-hit{animation:critFlash .5s ease}
/* 连胜特效 */
@keyframes streakPulse{0%,100%{border-color:var(--gold)}50%{border-color:#ff6b00}}
.streak-active{animation:streakPulse 1.5s ease infinite}
/* 特质标签 */
.trait-tag{display:inline-block;background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,165,0,.1));border:1px solid rgba(255,215,0,.3);color:#ffd700;padding:2px 6px;border-radius:4px;font-size:9px;margin:2px}
/* 每日奖励提示 */
.daily-bonus-banner{background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,165,0,.05));border:1px solid rgba(255,215,0,.3);border-radius:8px;padding:12px;text-align:center;margin-bottom:10px;animation:dailyPulse 2s ease infinite}
@keyframes dailyPulse{0%,100%{opacity:.8}50%{opacity:1}}

/* 战斗单位头像 */
.unit-avatar-wrap{position:relative;width:44px;height:44px;margin:0 auto 4px}
.unit-avatar{width:44px;height:44px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid var(--border);background:rgba(0,0,0,.3);position:relative;z-index:1;margin:0 auto}
.unit-avatar.quality-common{border-color:#666}.unit-avatar.quality-rare{border-color:#4a9eff;box-shadow:0 0 6px rgba(74,158,255,.3)}
.unit-avatar.quality-epic{border-color:#a855f7;box-shadow:0 0 6px rgba(168,85,247,.3)}
.unit-avatar.quality-legendary{border-color:#f59e0b;box-shadow:0 0 8px rgba(245,158,11,.4)}
.unit-avatar.quality-mythic{border-color:#ef4444;box-shadow:0 0 10px rgba(239,68,68,.4)}
.unit-avatar.quality-hidden{border-color:#00ffcc;box-shadow:0 0 12px rgba(0,255,204,.5)}
.unit-level{position:absolute;bottom:-2px;right:-2px;background:#111;border:1px solid var(--border);border-radius:3px;padding:0 4px;font-size:8px;color:var(--gold);font-weight:bold;z-index:2}
.unit-role-icon{position:absolute;top:-4px;left:-4px;font-size:11px;z-index:2;filter:drop-shadow(0 1px 2px rgba(0,0,0,.8))}
.unit-name{text-align:center;font-size:11px;font-weight:bold;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.unit-bars{display:flex;flex-direction:column;gap:2px}
.unit-bar{display:flex;align-items:center;gap:3px;font-size:8px}
.unit-bar-label{width:16px;text-align:right;color:var(--text3);font-weight:bold;flex-shrink:0}
.unit-bar-track{flex:1;height:5px;background:#0a0a0a;border-radius:2px;overflow:hidden;position:relative;min-width:30px}
.unit-bar-fill{height:100%;border-radius:2px;transition:width .4s ease;position:relative}
.unit-bar-fill.hp{background:linear-gradient(90deg,#c0392b,#e74c3c)}
.unit-bar-fill.hp.low{background:linear-gradient(90deg,#922b21,#c0392b);animation:hpPulse 1s ease-in-out infinite}
.unit-bar-fill.mp{background:linear-gradient(90deg,#2471a3,#3498db)}
.unit-bar-fill.shield-bar{background:linear-gradient(90deg,#2e86c1,#5dade2);position:absolute;top:0;left:0;z-index:1}
@keyframes hpPulse{0%,100%{opacity:1}50%{opacity:.6}}
.unit-bar-val{width:36px;text-align:left;color:var(--text2);font-size:8px;flex-shrink:0}
.unit-buffs{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:3px;min-height:14px}
.buff-tag{padding:1px 4px;border-radius:2px;font-size:8px;font-weight:bold;border:1px solid transparent}

/* 浮动伤害数字 */
.float-num{position:absolute;font-weight:900;font-size:14px;pointer-events:none;z-index:100;animation:floatUp 1s ease-out forwards;text-shadow:0 2px 4px rgba(0,0,0,.8);white-space:nowrap;left:50%;transform:translateX(-50%)}
.float-num.damage{color:#ff4757}.float-num.crit{color:#ffd32a;font-size:22px;text-shadow:0 0 12px rgba(255,211,42,.8),0 0 24px rgba(255,150,0,.4);animation:critFloat .8s ease-out forwards}
@keyframes critFloat{0%{opacity:1;top:10%;transform:translateX(-50%) scale(.5)}15%{opacity:1;transform:translateX(-50%) scale(1.4)}30%{transform:translateX(-50%) scale(1)}100%{opacity:0;top:-30%;transform:translateX(-50%) scale(.8)}}
.float-num.combo-text{color:#ff6348;font-size:16px;font-weight:900;text-shadow:0 0 10px rgba(255,99,72,.6);animation:comboFloat .7s ease-out forwards}
@keyframes comboFloat{0%{opacity:1;top:5%;transform:translateX(-50%) scale(.6)}20%{opacity:1;transform:translateX(-50%) scale(1.2)}100%{opacity:0;top:-20%;transform:translateX(-50%) scale(.9)}}
.float-num.kill-text{color:#ff4757;font-size:20px;font-weight:900;text-shadow:0 0 15px rgba(255,71,87,.8);animation:killFloat 1s ease-out forwards}
@keyframes killFloat{0%{opacity:1;top:0%;transform:translateX(-50%) scale(.3)}25%{opacity:1;transform:translateX(-50%) scale(1.5)}50%{transform:translateX(-50%) scale(1.1)}100%{opacity:0;top:-35%;transform:translateX(-50%) scale(.7)}}
.float-num.heal{color:#2ed573}.float-num.shield-num{color:#54a0ff}
.float-num.dodge{color:#a4b0be;font-size:11px;font-style:italic}
.float-num.miss{color:#636e72;font-size:11px}
.float-num.skill-name{color:#d4a0ff;font-size:12px;font-weight:bold}
.float-num.buff-text{color:#70a1ff;font-size:10px}
.float-num.debuff-text{color:#ff7979;font-size:10px}
@keyframes floatUp{0%{opacity:1;top:10%}20%{opacity:1}100%{opacity:0;top:-25%}}

/* 技能全屏特效 */
.skill-effect-overlay{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:50;display:flex;align-items:center;justify-content:center}
.skill-effect-bg{position:absolute;top:0;left:0;right:0;bottom:0;opacity:0;animation:skillBgFlash .6s ease-out forwards}
@keyframes skillBgFlash{0%{opacity:0}15%{opacity:.15}100%{opacity:0}}
.skill-effect-overlay.fire .skill-effect-bg{background:radial-gradient(ellipse at center,rgba(255,99,72,.5),transparent 70%)}
.skill-effect-overlay.ice .skill-effect-bg{background:radial-gradient(ellipse at center,rgba(116,185,255,.5),transparent 70%)}
.skill-effect-overlay.dark .skill-effect-bg{background:radial-gradient(ellipse at center,rgba(108,92,231,.5),transparent 70%)}
.skill-effect-overlay.holy .skill-effect-bg{background:radial-gradient(ellipse at center,rgba(255,234,167,.5),transparent 70%)}
.skill-effect-overlay.poison .skill-effect-bg{background:radial-gradient(ellipse at center,rgba(0,184,148,.5),transparent 70%)}
.skill-effect-overlay.heal-effect .skill-effect-bg{background:radial-gradient(ellipse at center,rgba(85,239,196,.4),transparent 70%)}
.skill-effect-overlay.shield-effect .skill-effect-bg{background:radial-gradient(ellipse at center,rgba(116,185,255,.4),transparent 70%)}
.skill-effect-text{font-size:20px;font-weight:900;animation:skillFlash .8s ease-out forwards;text-shadow:0 0 20px currentColor,0 2px 8px rgba(0,0,0,.8);position:relative;z-index:1}
@keyframes skillFlash{0%{opacity:0;transform:scale(.3) translateY(10px)}15%{opacity:1;transform:scale(1.3) translateY(-5px)}30%{transform:scale(1) translateY(0)}75%{opacity:1}100%{opacity:0;transform:scale(1.05) translateY(-10px)}}
.skill-effect-overlay.fire .skill-effect-text{color:#ff6348}
.skill-effect-overlay.ice .skill-effect-text{color:#74b9ff}
.skill-effect-overlay.dark .skill-effect-text{color:#6c5ce7}
.skill-effect-overlay.holy .skill-effect-text{color:#ffeaa7}
.skill-effect-overlay.poison .skill-effect-text{color:#00b894}
.skill-effect-overlay.heal-effect .skill-effect-text{color:#55efc4}
.skill-effect-overlay.shield-effect .skill-effect-text{color:#74b9ff}

/* 战斗日志 */
#battle-log{font-size:10px;line-height:1.6;max-height:140px;overflow-y:auto;padding:6px 8px;background:#08080f;border-radius:6px;border:1px solid var(--border);scrollbar-width:thin;scrollbar-color:var(--border) transparent;-webkit-overflow-scrolling:touch}
#battle-log::-webkit-scrollbar{width:3px}
#battle-log::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* 编队网格 - 自动换行 */
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(min-width:480px){.team-grid{grid-template-columns:repeat(6,1fr)}}
.team-slot{background:linear-gradient(145deg,var(--panel2),var(--panel));border:1px solid var(--border);border-radius:var(--radius-md);padding:10px 6px;text-align:center;min-height:120px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:var(--transition);position:relative;overflow:hidden}
.team-slot::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .25s}
.team-slot:hover::before{opacity:1}
.team-slot:active{transform:scale(.97)}
.team-slot[data-empty]{border-style:dashed;opacity:.6}
.team-slot[data-empty]:hover{opacity:1;border-color:var(--gold);background:rgba(201,162,39,.04)}
.team-slot .slot-icon{font-size:32px;line-height:1}
.team-slot .slot-name{font-size:12px;font-weight:bold;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.team-slot .slot-role{font-size:10px;color:var(--text2);display:flex;align-items:center;gap:3px}
.team-slot .slot-level{font-size:10px;color:var(--blue);font-weight:bold}
.team-slot .slot-stats{display:flex;gap:6px;justify-content:center;margin-top:2px;font-size:10px;color:var(--text2)}
.team-slot .slot-stats b{color:var(--text);font-weight:600}
.team-slot .slot-remove{font-size:9px;color:var(--red);opacity:.7;margin-top:2px}
.team-slot .slot-empty-icon{font-size:28px;color:var(--text3);line-height:1}
.team-slot .slot-empty-text{font-size:11px;color:var(--text3)}
.team-slot .slot-badges{position:absolute;top:4px;right:4px;display:flex;gap:2px}
.team-slot .slot-badge{font-size:8px;padding:1px 4px;border-radius:3px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1)}
.team-slot .slot-affix-count{position:absolute;bottom:4px;right:4px;font-size:9px;color:var(--purple)}
.team-power-bar{display:flex;align-items:center;gap:8px;padding:10px 12px;background:linear-gradient(135deg,rgba(201,162,39,.06),rgba(201,162,39,.02));border:1px solid rgba(201,162,39,.15);border-radius:var(--radius-md);margin-bottom:10px}
.team-power-num{font-size:22px;font-weight:900;color:var(--gold);text-shadow:0 0 12px rgba(201,162,39,.3)}
.team-power-label{font-size:11px;color:var(--text2)}
.team-hero-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.team-hero-filter .filter-btn{padding:5px 12px;border:1px solid var(--border);background:var(--panel2);color:var(--text2);cursor:pointer;border-radius:var(--radius-sm);font-size:11px;transition:var(--transition);font-family:inherit}
.team-hero-filter .filter-btn:hover{border-color:var(--border-light);color:var(--text)}
.team-hero-filter .filter-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,162,39,.08)}
.bond-preview-item{background:rgba(0,0,0,.15);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin:4px 0;transition:var(--transition);cursor:default}
.bond-preview-item:hover{border-color:var(--border-light);background:rgba(0,0,0,.2)}
.bond-preview-item.active{animation:bondPulse 2s ease-in-out infinite}
@keyframes bondPulse{0%,100%{box-shadow:0 0 4px rgba(201,162,39,.1)}50%{box-shadow:0 0 12px rgba(201,162,39,.2)}}
/* 排行榜滚动列表 */
.leaderboard-scroll-container{max-height:400px;overflow-y:auto;overflow-x:hidden;border-radius:8px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.05)}
.leaderboard-scroll-container::-webkit-scrollbar{width:6px}
.leaderboard-scroll-container::-webkit-scrollbar-track{background:rgba(0,0,0,.2);border-radius:3px}
.leaderboard-scroll-container::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
.leaderboard-scroll-container::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.25)}
.leaderboard-list{display:flex;flex-direction:column}
.leaderboard-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.03);transition:background .2s}
.leaderboard-item:nth-child(even){background:rgba(255,255,255,.04)}
.leaderboard-item:hover{background:rgba(255,255,255,.08)}
.leaderboard-item.is-me{background:rgba(201,162,39,.12);border-left:3px solid var(--gold)}
.leaderboard-rank{font-size:14px;font-weight:bold;min-width:32px;text-align:center;padding:4px 6px;border-radius:4px}
.leaderboard-rank.rank-1{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#000;box-shadow:0 0 8px rgba(255,215,0,.4)}
.leaderboard-rank.rank-2{background:linear-gradient(135deg,#c0c0c0,#a0a0a0);color:#000}
.leaderboard-rank.rank-3{background:linear-gradient(135deg,#cd7f32,#b87333);color:#fff}
.leaderboard-rank.rank-top10{background:rgba(201,162,39,.2);color:var(--gold);border:1px solid rgba(201,162,39,.3)}
.leaderboard-rank.rank-top100{background:rgba(168,85,247,.15);color:#a855f7;border:1px solid rgba(168,85,247,.3)}
.leaderboard-rank.rank-normal{color:var(--text2)}
.leaderboard-info{flex:1;min-width:0}
.leaderboard-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.leaderboard-date{font-size:10px;color:var(--text3);margin-top:1px}
.leaderboard-score{font-weight:bold;color:var(--gold);font-size:14px;text-align:right;min-width:80px}
.leaderboard-unit{font-size:10px;color:var(--text2);margin-left:2px;font-weight:normal}
.log-line{padding:1px 0;animation:fadeIn .3s}
.log-damage{color:#e74c3c}.log-heal{color:#2ecc71}.log-buff{color:#3498db}.log-debuff{color:#e67e22}
.log-crit{color:#f1c40f;font-weight:bold}.log-death{color:#888;font-style:italic}.log-info{color:var(--text2)}
.log-skill{color:#9b59b6;font-weight:bold}.log-title{color:var(--gold);font-weight:bold;font-size:12px}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* ===== 合成增强系统样式 ===== */
.merge-lucky-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:linear-gradient(135deg,rgba(255,215,0,.08),rgba(255,165,0,.04));border:1px solid rgba(255,215,0,.2);border-radius:var(--radius-md);margin-bottom:10px}
.merge-lucky-val{font-size:18px;font-weight:900;color:var(--gold);text-shadow:0 0 8px rgba(201,162,39,.3);min-width:30px;text-align:center}
.merge-lucky-label{font-size:11px;color:var(--text2)}
.merge-lucky-bonus{font-size:10px;color:#2ecc71;font-weight:bold}
.merge-pity-bar{height:4px;background:rgba(0,0,0,.3);border-radius:2px;margin-top:6px;overflow:hidden}
.merge-pity-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),#ff6b00);transition:width .3s}
.merge-streak-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:linear-gradient(135deg,rgba(239,68,68,.15),rgba(255,165,0,.1));border:1px solid rgba(239,68,68,.3);border-radius:20px;font-size:11px;font-weight:bold;color:#ff6b6b;animation:streakPulse 1.5s ease infinite}
.merge-bond-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;background:linear-gradient(135deg,rgba(52,152,219,.15),rgba(155,89,182,.1));border:1px solid rgba(52,152,219,.3);border-radius:12px;font-size:10px;color:#5dade2;font-weight:bold}
.merge-skill-mut{background:linear-gradient(135deg,rgba(168,85,247,.2),rgba(239,68,68,.15))!important;color:#d4a0ff!important;border-color:rgba(168,85,247,.4)!important}
.merge-cost{display:flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(0,0,0,.2);border-radius:var(--radius-sm);font-size:12px;color:var(--text2);margin-bottom:8px}
.merge-cost b{color:var(--gold)}
.merge-history-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(0,0,0,.15);border-radius:6px;margin-bottom:4px;border-left:3px solid var(--border);font-size:11px}
.merge-history-item.mutation{border-left-color:#a855f7}
.merge-history-item.legendary{border-left-color:#f59e0b}
.merge-history-item.mythic{border-left-color:#ef4444}
.merge-history-item.hidden{border-left-color:#00ffcc}
.merge-history-item.quality-up{border-left-color:#2ecc71}
.merge-undo-btn{background:linear-gradient(135deg,rgba(52,152,219,.15),rgba(52,152,219,.05));border:1px solid rgba(52,152,219,.3);color:#5dade2;padding:4px 10px;border-radius:var(--radius-sm);font-size:11px;cursor:pointer;transition:var(--transition)}
.merge-undo-btn:hover{background:rgba(52,152,219,.25);border-color:rgba(52,152,219,.5)}

function getStage(id){
  if(id<=STAGES.length)return STAGES[id-1];
  return generateStage(id);
}

// 关卡难度配置
const STAGE_CONFIG = {
  // 每20关一个周期（周目）
  cycleLength: 20,
  // 等级曲线: 基础等级 + 周期加成 + 位置加成
  baseLevel: function(id, cycle, posInCycle) {
    return 1 + Math.floor(id * 0.8) + cycle * 3 + Math.floor(posInCycle / 5);
  },
  // 敌人数: 从1个逐渐增加到6个
  enemyCount: function(posInCycle, isBoss, isFinalBoss) {
    if (isFinalBoss) return 6;
    if (isBoss) return 4;
    return Math.min(6, 1 + Math.floor((posInCycle - 1) / 3));
  },
  // 品质曲线: 普通→稀有→史诗→传说→神话
  qualityCurve: function(cycle, posInCycle, isBoss, isFinalBoss) {
    var qIdx = cycle;
    if (isFinalBoss) qIdx = Math.min(4, cycle + 2);
    else if (isBoss) qIdx = Math.min(4, cycle + 1);
    else qIdx = Math.min(4, cycle + Math.floor(posInCycle / 10));
    return QUALITIES[qIdx] || 'common';
  },
  // 技能数量: 随进度增加
  skillCount: function(cycle, posInCycle, isBoss) {
    if (isBoss) return 3;
    return Math.min(3, 1 + Math.floor(cycle / 2) + Math.floor(posInCycle / 10));
  }
};

// 敌人阵容模板（确保有前排、输出、辅助搭配）
const ENEMY_FORMATIONS = [
  // 1人: 单一输出
  [{role:'warrior',weight:1},{role:'assassin',weight:1},{role:'mage',weight:1}],
  // 2人: 坦克+输出

  // 3人: 坦克+输出+输出/辅助
  [{role:'guardian',weight:1},{role:'warrior',weight:1},{role:'mage',weight:1},{role:'assassin',weight:1},{role:'healer',weight:0.5}],
  // 4人: 坦克+2输出+辅助
  [{role:'guardian',weight:1},{role:'warrior',weight:1},{role:'mage',weight:1},{role:'assassin',weight:1},{role:'ranger',weight:1},{role:'healer',weight:1}],
  // 5人: 坦克+3输出+辅助
  [{role:'guardian',weight:1},{role:'warrior',weight:1},{role:'mage',weight:1},{role:'assassin',weight:1},{role:'ranger',weight:1},{role:'warlock',weight:1},{role:'healer',weight:1}],
  // 6人: 完整阵容
  [{role:'guardian',weight:1},{role:'paladin',weight:1},{role:'warrior',weight:1},{role:'mage',weight:1},{role:'assassin',weight:1},{role:'ranger',weight:1},{role:'warlock',weight:1},{role:'healer',weight:1}]
];

function generateStage(id){
  var cycle=Math.floor((id-1)/STAGE_CONFIG.cycleLength);
  var posInCycle=((id-1)%STAGE_CONFIG.cycleLength)+1;
  var isBoss=(posInCycle%5===0);
  var isFinalBoss=(posInCycle===STAGE_CONFIG.cycleLength);
  var baseLevel=STAGE_CONFIG.baseLevel(id,cycle,posInCycle);
  var areaIdx=cycle%AREA_THEMES.length;
  var theme=AREA_THEMES[areaIdx];
  var enemyQuality=STAGE_CONFIG.qualityCurve(cycle,posInCycle,isBoss,isFinalBoss);
  var bossQuality=isFinalBoss?'mythic':STAGE_CONFIG.qualityCurve(cycle,posInCycle,true,false);
  
  var enemies=[];
  var nameSuffix=' 第'+Math.ceil(posInCycle/5)+'层';
  
  if(isFinalBoss){
    // 最终Boss: 6人完整阵容，高品质
    var bi=cycle%BOSS_NAMES.length;
    enemies.push({name:BOSS_NAMES[bi].name,icon:BOSS_NAMES[bi].icon,role:BOSS_NAMES[bi].role,quality:'mythic',level:baseLevel+5,skills:pickRandomSkills(BOSS_NAMES[bi].role,3)});
    enemies.push({name:'深渊守卫',icon:'🗿',role:'guardian',quality:'legendary',level:baseLevel+3,skills:pickRandomSkills('guardian',3)});
    enemies.push({name:'暗影刺客',icon:'👤',role:'assassin',quality:'legendary',level:baseLevel+3,skills:pickRandomSkills('assassin',3)});
    enemies.push({name:'混沌法师',icon:'🔮',role:'mage',quality:'legendary',level:baseLevel+3,skills:pickRandomSkills('mage',3)});
    enemies.push({name:'虚空祭司',icon:'👁️',role:'warlock',quality:'epic',level:baseLevel+2,skills:pickRandomSkills('warlock',2)});
    enemies.push({name:'黑暗医师',icon:'💀',role:'healer',quality:'epic',level:baseLevel+2,skills:pickRandomSkills('healer',2)});
  }else if(isBoss){
    // 小Boss: 4人阵容
    var bi=cycle%BOSS_NAMES.length;
    enemies.push({name:BOSS_NAMES[bi].name,icon:BOSS_NAMES[bi].icon,role:BOSS_NAMES[bi].role,quality:bossQuality,level:baseLevel+3,skills:pickRandomSkills(BOSS_NAMES[bi].role,3)});
    enemies.push({name:'精英守卫',icon:'🛡️',role:'guardian',quality:enemyQuality,level:baseLevel+1,skills:pickRandomSkills('guardian',2)});
    enemies.push({name:'暗影法师',icon:'👻',role:'mage',quality:enemyQuality,level:baseLevel+1,skills:pickRandomSkills('mage',2)});
    enemies.push({name:'黑暗医师',icon:'💀',role:'healer',quality:enemyQuality,level:baseLevel,skills:pickRandomSkills('healer',1)});
  }else{
    // 普通关卡: 根据位置决定人数和阵容
    var count=STAGE_CONFIG.enemyCount(posInCycle,isBoss,isFinalBoss);
    var formation=ENEMY_FORMATIONS[Math.min(count-1,ENEMY_FORMATIONS.length-1)];
    var ei=(cycle+Math.floor(posInCycle/3))%ENEMY_NAMES.length;
    var en=ENEMY_NAMES[ei];
    
    // 确保有前排
    var hasTank=false;
    for(var i=0;i<count;i++){
      var role;
      if(i===0 && count>=2){
        // 第一个位置优先坦克
        role=Math.random()<0.7?'guardian':(Math.random()<0.5?'warrior':'paladin');
        hasTank=true;
      }else{
        // 其他位置按阵容权重随机
        var pool=formation;
        var totalWeight=pool.reduce(function(s,r){return s+r.weight},0);
        var rand=Math.random()*totalWeight;
        var cumWeight=0;
        for(var j=0;j<pool.length;j++){
          cumWeight+=pool[j].weight;
          if(rand<=cumWeight){role=pool[j].role;break;}
        }
        if(!role)role=pool[0].role;
      }
      
      // 根据位置调整等级（前排等级略高）
      var lvlOffset=(role==='guardian'||role==='paladin')?1:0;
      var ni=i%en.names.length;
      enemies.push({
        name:en.names[ni],
        icon:en.icon[ni],
        role:role,
        quality:enemyQuality,
        level:baseLevel+lvlOffset,
        skills:pickRandomSkills(role,STAGE_CONFIG.skillCount(cycle,posInCycle,isBoss))
      });
    }
  }

  // 奖励计算（优化版：战利品 = 金币 + 食物 + 石材/铁矿 + 宝石(BOSS) + 经验）
  var difficultyMult=1+cycle*0.3+(isBoss?0.5:0)+(isFinalBoss?1:0);
  
  // 金币稀缺加成：金币越少奖励越多
  var goldRatio=(G.resources.gold||0)/RESOURCE_LIMITS.gold;
  var goldBonus=2-Math.min(goldRatio*1.5,1.5);
  
  // 金币：基础产出随关卡增长，前期更多
  var baseGold=Math.floor((80+id*25)*difficultyMult*(1/(1+cycle*0.15)));
  var goldR=Math.floor(baseGold*goldBonus);
  
  // 经验（不可堆积的战利品，用于升级英雄）
  var expR=Math.floor((30+id*12)*difficultyMult*(1/(1+cycle*0.12))*goldBonus);
  
  // 食物：与食物存量挂钩
  var foodRatio=(G.resources.food||0)/RESOURCE_LIMITS.food;
  var foodBonus=2-Math.min(foodRatio*1.5,1.5);
  var foodR=Math.floor((15+id*6)*difficultyMult*(1/(1+cycle*0.2))*foodBonus);
  
  // 石材/铁矿：BOSS给更多，普通关卡给少量（保证铁匠铺有材料）
  var stoneRatio=(G.resources.stone||0)/RESOURCE_LIMITS.stone;
  var stoneBonus=2-Math.min(stoneRatio*1.5,1.5);
  var baseStone=Math.floor((10+id*3)*difficultyMult*(1/(1+cycle*0.25)));
  var stoneR=Math.floor(baseStone*stoneBonus*(isBoss?1:0.3));
  
  var ironRatio=(G.resources.iron||0)/RESOURCE_LIMITS.iron;
  var ironBonus=2-Math.min(ironRatio*1.5,1.5);
  var baseIron=Math.floor((5+id*2)*difficultyMult*(1/(1+cycle*0.3)));
  var ironR=Math.floor(baseIron*ironBonus*(isBoss?1:0.2));
  
  // 宝石：仅BOSS掉落，与宝石存量挂钩（宝石少时掉落多）
  var gemsR=0;
  if(isBoss){
    var gemRatio=(G.resources.gems||0)/RESOURCE_LIMITS.gems;
    var gemBonus=2-Math.min(gemRatio*1.5,1.5);
    if(isFinalBoss){
      gemsR=Math.floor((3+Math.min(cycle*1.5,5))*gemBonus); // 最终BOSS：3-8宝石
    }else{
      gemsR=Math.floor((1+Math.min(cycle*0.8,2))*gemBonus); // 小BOSS：1-3宝石
    }
  }

  return {
    id:id,
    name:(isFinalBoss?'★★★ ':isBoss?'★ ':'')+theme.prefix+theme.suffix+nameSuffix,
    icon:theme.icon,
    desc:'第'+(cycle+1)+'章 第'+posInCycle+'关 · 敌人'+enemies.length+'人',
    isBoss:isBoss,
    bossType:isFinalBoss?'final':isBoss?'mini':null,
    enemies:enemies,
    rewards:{gold:goldR,exp:expR,food:foodR,stone:stoneR,iron:ironR,gems:gemsR}
  };
}

function pickRandomSkills(role,count){
  var all={
    warrior:['cleave','shield_bash','berserker'],
    guardian:['taunt','iron_wall','shield_bash'],
    mage:['fireball','blizzard','arcane_shield','soul_burn'],
    healer:['heal','group_heal','purify','divine_shield'],
    assassin:['backstab','shadow_step','poison_blade'],
    ranger:['aimed_shot','rain_arrows','trap'],
    warlock:['curse','life_drain','soul_burn'],
    paladin:['holy_strike','divine_shield','holy_light'],
  };
  var pool=all[role]||all.warrior;
  var result=[];
  var shuffled=pool.slice().sort(function(){return Math.random()-0.5});
  for(var i=0;i<Math.min(count,shuffled.length);i++)result.push(shuffled[i]);
  return result;
}

// 检测当前编队的激活羁绊
function detectActiveBonds(teamHeroes){
  var activeBonds=[];
  for(var i=0;i<HERO_BONDS.length;i++){
    var bond=HERO_BONDS[i];
    var count=0;
    if(bond.check==='role'){
      count=teamHeroes.filter(function(h){return h.role===bond.key;}).length;
    } else if(bond.checkFn){
      count=bond.checkFn(teamHeroes);
    }
    // 找到最高满足的阈值
    var activatedThreshold=null;
    for(var t=0;t<bond.thresholds.length;t++){
      if(count>=bond.thresholds[t].need){
        activatedThreshold=bond.thresholds[t];
      }
    }
    if(activatedThreshold){
      activeBonds.push({bond:bond,count:count,threshold:activatedThreshold});
    }
  }
  return activeBonds;
}

// 应用羁绊效果到战斗单位
function applyBondEffects(playerUnits, activeBonds){
  for(var i=0;i<activeBonds.length;i++){
    var ab=activeBonds[i];
    var effects=ab.threshold.effect;
    if(!Array.isArray(effects)) effects=[effects];
    for(var j=0;j<effects.length;j++){
      var eff=effects[j];
      switch(eff.type){
        case 'teamBuff':
          for(var u=0;u<playerUnits.length;u++){
            applyBuffToUnit(playerUnits[u],eff);
          }
          break;
        case 'teamAllBuff':
          for(var u=0;u<playerUnits.length;u++){
            playerUnits[u].maxHP=Math.floor(playerUnits[u].maxHP*(1+eff.value));
            playerUnits[u].hp=Math.floor(playerUnits[u].hp*(1+eff.value));
            playerUnits[u].atk=Math.floor(playerUnits[u].atk*(1+eff.value));
            playerUnits[u].def=Math.floor(playerUnits[u].def*(1+eff.value));
            playerUnits[u].spd=Math.floor(playerUnits[u].spd*(1+eff.value));
            playerUnits[u].maxMP=Math.floor(playerUnits[u].maxMP*(1+eff.value));
            playerUnits[u].mp=Math.floor(playerUnits[u].mp*(1+eff.value));
          }
          break;
        case 'teamRegen':
          for(var u=0;u<playerUnits.length;u++){
            if(!playerUnits[u]._bondRegen) playerUnits[u]._bondRegen=0;
            playerUnits[u]._bondRegen+=eff.value;
          }
          break;
        case 'teamMpRegen':
          for(var u=0;u<playerUnits.length;u++){
            if(!playerUnits[u]._bondMpRegen) playerUnits[u]._bondMpRegen=0;
            playerUnits[u]._bondMpRegen+=eff.value;
          }
          break;
        case 'onHitDot':
        case 'onHitFreeze':
        case 'onHitExtraDmg':
        case 'onHitDebuff':
        case 'killHeal':
        case 'firstStrike':
        case 'expBoost':
        case 'goldBoost':
        case 'randomElementDmg':
          // 存储到全局战斗标记
          if(!window._battleBondEffects) window._battleBondEffects=[];
          window._battleBondEffects.push(eff);
          break;
      }
    }
  }
}

function applyBuffToUnit(unit,eff){
  switch(eff.stat){
    case 'atk': unit.atk=Math.floor(unit.atk*(1+eff.value)); break;
    case 'def': unit.def=Math.floor(unit.def*(1+eff.value)); break;
    case 'spd': unit.spd=Math.floor(unit.spd*(1+eff.value)); break;
    case 'hp':
      unit.maxHP=Math.floor(unit.maxHP*(1+eff.value));
      unit.hp=Math.min(unit.hp+Math.floor(unit.maxHP*eff.value),unit.maxHP);
      break;
    case 'mp':
      unit.maxMP=Math.floor(unit.maxMP*(1+eff.value));
      unit.mp=Math.min(unit.mp+Math.floor(unit.maxMP*eff.value),unit.maxMP);
      break;
    case 'critRate': if(!unit._bondCritRate)unit._bondCritRate=0; unit._bondCritRate+=eff.value; break;
    case 'critDmg': if(!unit._bondCritDmg)unit._bondCritDmg=0; unit._bondCritDmg+=eff.value; break;
    case 'dodgeRate': if(!unit._bondDodge)unit._bondDodge=0; unit._bondDodge+=eff.value; break;
    case 'hitBonus': if(!unit._bondHit)unit._bondHit=0; unit._bondHit+=eff.value; break;
    case 'armorPen': if(!unit._bondArmorPen)unit._bondArmorPen=0; unit._bondArmorPen+=eff.value; break;
    case 'lifeSteal': if(!unit._bondLifeSteal)unit._bondLifeSteal=0; unit._bondLifeSteal+=eff.value; break;
    case 'skillDmg': if(!unit._bondSkillDmg)unit._bondSkillDmg=0; unit._bondSkillDmg+=eff.value; break;
    case 'healBoost': if(!unit._bondHealBoost)unit._bondHealBoost=0; unit._bondHealBoost+=eff.value; break;
    case 'dmgReduce': if(!unit._bondDmgReduce)unit._bondDmgReduce=0; unit._bondDmgReduce+=eff.value; break;
    case 'dotBoost': if(!unit._bondDotBoost)unit._bondDotBoost=0; unit._bondDotBoost+=eff.value; break;
    case 'mpReduce': if(!unit._bondMpReduce)unit._bondMpReduce=0; unit._bondMpReduce+=eff.value; break;
    case 'undeadBonus': if(!unit._bondUndeadBonus)unit._bondUndeadBonus=0; unit._bondUndeadBonus+=eff.value; break;
    case 'shieldBoost': if(!unit._bondShieldBoost)unit._bondShieldBoost=0; unit._bondShieldBoost+=eff.value; break;
  }
}

// 生成羁绊UI HTML
function renderBondsHTML(activeBonds, compact){
  if(!activeBonds||activeBonds.length===0) return '';
  var html='';
  for(var i=0;i<activeBonds.length;i++){
    var ab=activeBonds[i];
    var bond=ab.bond;
    var typeColors={role:'#4a9eff',theme:'#a855f7',fun:'#f59e0b'};
    var color=typeColors[bond.type]||'#888';
    if(compact){
      html+='<span class="bond-tag-compact" style="border-color:'+color+';color:'+color+'" title="'+ab.threshold.desc+'">'+bond.icon+bond.name+'</span>';
    } else {
      html+='<div class="bond-card" style="border-color:'+color+'">'
        +'<div class="bond-card-header">'
        +'<span class="bond-card-icon">'+bond.icon+'</span>'
        +'<span class="bond-card-name" style="color:'+color+'">'+bond.name+'</span>'
        +'<span class="bond-card-type" style="background:'+color+'22;color:'+color+';border:1px solid '+color+'44">'+({role:'职业',theme:'主题',fun:'趣味'}[bond.type])+'</span>'
        +'</div>'
        +'<div class="bond-card-desc">'+ab.threshold.desc+'</div>'
        +'<div class="bond-card-story">📖 '+bond.story+'</div>'
        +'</div>';
    }
  }
  return html;
}

// ==================== 存档系统（多存档+备份管理） ====================
var SAVE_KEY='shadow_dungeon_save';
var SAVE_META_KEY='shadow_dungeon_meta';
var MAX_SAVE_SLOTS=3;
var MAX_AUTO_BACKUPS=5;
var MAX_MANUAL_BACKUPS=10;

// 获取存档元数据
function getSaveMeta(){
  try{
    var raw=localStorage.getItem(SAVE_META_KEY);
    return raw?JSON.parse(raw):{currentSlot:0,slots:{},autoBackups:[],manualBackups:[]};
  }catch(e){return {currentSlot:0,slots:{},autoBackups:[],manualBackups:[]};}
}

// 保存存档元数据
function saveSaveMeta(meta){
  try{localStorage.setItem(SAVE_META_KEY,JSON.stringify(meta));}catch(e){}
}

// 获取当前存档槽位键名
function getSlotKey(slotIdx){
  return 'shadow_dungeon_slot_'+slotIdx;
}

// 获取当前槽位数据
function getCurrentSlotData(){
  var meta=getSaveMeta();
  var slotIdx=meta.currentSlot||0;
  try{
    var raw=localStorage.getItem(getSlotKey(slotIdx));
    return raw?JSON.parse(raw):null;
  }catch(e){return null;}
}

// 保存游戏（到当前槽位+自动备份）
function saveGame(){
  try{
    var meta=getSaveMeta();
    var slotIdx=meta.currentSlot||0;
    var data={g:G,heroIdCounter:G.heroIdCounter};
    var jsonStr=JSON.stringify(data);
    // 保存到当前槽位
    localStorage.setItem(getSlotKey(slotIdx),jsonStr);
    // 同时保持旧键兼容
    localStorage.setItem(SAVE_KEY,jsonStr);
    // 更新槽位元数据
    if(!meta.slots[slotIdx]) meta.slots[slotIdx]={};
    meta.slots[slotIdx].timestamp=Date.now();
    meta.slots[slotIdx].size=jsonStr.length;
    meta.slots[slotIdx].stageProgress=G.stageProgress||1;
    meta.slots[slotIdx].heroCount=G.heroes?G.heroes.length:0;
    meta.slots[slotIdx].playTime=G.totalPlayTime||0;
    // 自动备份（每次保存前创建自动备份）
    var backupKey='shadow_dungeon_auto_'+Date.now();
    localStorage.setItem(backupKey,jsonStr);
    if(!meta.autoBackups) meta.autoBackups=[];
    meta.autoBackups.unshift({
      key:backupKey,
      slotIdx:slotIdx,
      timestamp:Date.now(),
      stageProgress:G.stageProgress||1,
      heroCount:G.heroes?G.heroes.length:0,
      totalPower:calcTotalPower()
    });
    // 限制自动备份数量
    while(meta.autoBackups.length>MAX_AUTO_BACKUPS){
      var old=meta.autoBackups.pop();
      try{localStorage.removeItem(old.key);}catch(e){}
    }
    saveSaveMeta(meta);
    showToast('💾 已存档 (槽位'+(slotIdx+1)+')');
  }catch(e){
    if(e.name==='QuotaExceededError'){
      showToast('❌ 存档空间不足，请删除旧备份');
    }else{
      showToast('存档失败');
    }
  }
}

// 计算队伍总战力
function calcTotalPower(){
  var total=0;
  if(G.heroes){
    for(var i=0;i<G.heroes.length;i++){
      var h=G.heroes[i];
      if(h){
        total+=h.atk+h.def+h.maxHP+h.spd;
      }
    }
  }
  return total;
}

// 加载游戏（从当前槽位）
function loadGame(){
  try{
    var meta=getSaveMeta();
    var slotIdx=meta.currentSlot||0;
    // 优先从槽位读取，回退到旧键
    var raw=localStorage.getItem(getSlotKey(slotIdx))||localStorage.getItem(SAVE_KEY);
    if(!raw)return false;
    var data=JSON.parse(raw);
    G.heroIdCounter=data.heroIdCounter||0;
    var saved=data.g;
    Object.keys(saved).forEach(function(k){G[k]=saved[k]});
    // 修复：重新建立G.team和G.heroes之间的引用关系
    if(G.team && G.heroes){
      for(var i=0;i<G.team.length;i++){
        if(G.team[i]){
          var matchedHero=G.heroes.find(function(h){return h&&h.uid===G.team[i].uid;});
          if(matchedHero){G.team[i]=matchedHero;}
          else{G.team[i]=null;}
        }
      }
    }
    var today=new Date().toDateString();
    if(G.arenaState&&G.arenaState.lastChallengeDate!==today){
      G.arenaState.dailyChallengesUsed=0;
      G.arenaState.lastChallengeDate=today;
    }
    if(G.lastLoginDate!==today){
      G.dailyBonusClaimed=false;
      G.lastLoginDate=today;
    }
    if(G.pveWinStreak===undefined) G.pveWinStreak=0;
    if(G.pveMaxStreak===undefined) G.pveMaxStreak=0;
    if(!G.achievements) G.achievements={unlocked:{},progress:{},totalClaimed:0};
    if(!G.stats) G.stats={totalKills:0,totalHeroesRecruited:0,totalEquipmentForged:0,totalEquipmentMerged:0,totalGoldEarned:0,totalGemsEarned:0,maxStageReached:1,maxHeroLevel:0};
    setTimeout(function(){checkAllAchievements();},1000);
    return true;
  }catch(e){console.error('读档失败',e);return false;}
}

// 从备份恢复
function restoreBackup(type, backupIdx){
  var meta=getSaveMeta();
  var backups=type==='auto'?meta.autoBackups:meta.manualBackups;
  if(!backups||!backups[backupIdx]){showToast('备份不存在');return;}
  var backup=backups[backupIdx];
  var raw=localStorage.getItem(backup.key);
  if(!raw){showToast('备份数据已丢失');return;}
  // 恢复前先备份当前状态（作为手动备份）
  var currentData={g:G,heroIdCounter:G.heroIdCounter};
  var currentBackupKey='shadow_dungeon_manual_'+Date.now();
  localStorage.setItem(currentBackupKey,JSON.stringify(currentData));
  if(!meta.manualBackups) meta.manualBackups=[];
  meta.manualBackups.unshift({
    key:currentBackupKey,
    slotIdx:meta.currentSlot,
    timestamp:Date.now(),
    stageProgress:G.stageProgress||1,
    heroCount:G.heroes?G.heroes.length:0,
    note:'恢复前自动保存'
  });
  while(meta.manualBackups.length>MAX_MANUAL_BACKUPS){
    var old=meta.manualBackups.pop();
    try{localStorage.removeItem(old.key);}catch(e){}
  }
  // 写入当前槽位
  localStorage.setItem(getSlotKey(meta.currentSlot),raw);
  localStorage.setItem(SAVE_KEY,raw);
  saveSaveMeta(meta);
  showToast('✅ 已恢复备份，正在重新加载...');
  setTimeout(function(){location.reload();},500);
}

// 格式化时间
function formatSaveTime(ts){
  if(!ts)return '未知';
  var d=new Date(ts);
  var now=new Date();
  var diff=now-d;
  if(diff<60000) return '刚刚';
  if(diff<3600000) return Math.floor(diff/60000)+'分钟前';
  if(diff<86400000) return Math.floor(diff/3600000)+'小时前';
  if(diff<172800000) return '昨天 '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
  return (d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
}

// 格式化游戏时长
function formatPlayTime(minutes){
  if(!minutes||minutes<=0) return '0分钟';
  if(minutes<60) return Math.floor(minutes)+'分钟';
  if(minutes<1440) return Math.floor(minutes/60)+'小时'+Math.floor(minutes%60)+'分';
  return Math.floor(minutes/1440)+'天'+Math.floor((minutes%1440)/60)+'小时';
}

// 每日登录奖励领取
function claimDailyBonus(){
  var today=new Date().toDateString();
  if(G.dailyBonusClaimed){showToast('今日已领取过奖励！');return;}
  // 奖励随进度提升
  var progressed=Math.max(1,G.stageProgress);
  var goldR=200+progressed*30;
  var foodR=100+progressed*10;
  var stoneR=30+progressed*5;
  var ironR=15+progressed*3;
  G.resources.gold=Math.min((G.resources.gold||0)+goldR, RESOURCE_LIMITS.gold);
  G.resources.food=Math.min((G.resources.food||0)+foodR, RESOURCE_LIMITS.food);
  G.resources.stone=Math.min((G.resources.stone||0)+stoneR, RESOURCE_LIMITS.stone);
  G.resources.iron=Math.min((G.resources.iron||0)+ironR, RESOURCE_LIMITS.iron);
  G.dailyBonusClaimed=true;
  G.lastLoginDate=today;
  saveGame();
  showToast('🎁 每日奖励已领取！💰'+goldR+' 🍞'+foodR+' 🪨'+stoneR+' ⛏️'+ironR);
  
  // 检查每日签到成就
  checkAchievement('special_1');
  
  updateResUI();
  renderCurrentTab();
}

// ==================== 离线挂机收益系统 ====================
function calculateTeamPower(){
  // 计算队伍总战力
  var power=0;
  G.team.forEach(function(slot){
    if(slot){
      var h=G.heroes.find(function(x){return x.uid===slot.uid});
      if(h){
        power+=h.atk*2+h.def*1.5+h.maxHP*0.5+h.spd*3;
      }
    }
  });
  return Math.max(100,power);
}

function calculateOfflineEarnings(){
  if(!G.lastOnlineTime) G.lastOnlineTime=Date.now();
  var now=Date.now();
  var elapsed=now-G.lastOnlineTime;
  // 最多计算12小时
  var maxOffline=12*60*60*1000;
  elapsed=Math.min(elapsed,maxOffline);
  var hours=elapsed/(60*60*1000);
  
  if(hours<0.1) return null; // 少于6分钟不计算
  
  var power=calculateTeamPower();
  var progress=Math.max(1,G.stageProgress);
  
  // 每小时收益 = 战力系数 * 关卡系数
  var goldPerHour=Math.floor(50+progress*15+power*0.1);
  var foodPerHour=Math.floor(20+progress*5);
  var stonePerHour=Math.floor(10+progress*3);
  var ironPerHour=Math.floor(5+progress*1);
  
  return{
    hours:hours,
    gold:Math.floor(goldPerHour*hours),
    food:Math.floor(foodPerHour*hours),
    stone:Math.floor(stonePerHour*hours),
    iron:Math.floor(ironPerHour*hours),
    power:power
  };
}

function claimOfflineEarnings(){
  if(!G.offlineEarnings){
    G.offlineEarnings=calculateOfflineEarnings();
  }
  if(!G.offlineEarnings) return;
  
  var e=G.offlineEarnings;
  G.resources.gold=Math.min((G.resources.gold||0)+e.gold,RESOURCE_LIMITS.gold);
  G.resources.food=Math.min((G.resources.food||0)+e.food,RESOURCE_LIMITS.food);
  G.resources.stone=Math.min((G.resources.stone||0)+e.stone,RESOURCE_LIMITS.stone);
  G.resources.iron=Math.min((G.resources.iron||0)+e.iron,RESOURCE_LIMITS.iron);
  
  showToast('💤 离线收益已领取！离线'+e.hours.toFixed(1)+'小时');
  G.offlineEarnings=null;
  G.lastOnlineTime=Date.now();
  saveGame();
  updateResUI();
  renderCurrentTab();
}

function checkOfflineEarnings(){
  // 检查是否有离线收益
  var earnings=calculateOfflineEarnings();
  if(earnings && earnings.hours>=0.1){
    G.offlineEarnings=earnings;
    return true;
  }
  G.lastOnlineTime=Date.now();
  return false;
}

// 检查并解锁成就
function checkAchievement(achievementId) {
  if (!ACHIEVEMENTS[achievementId]) return false;
  if (G.achievements.unlocked[achievementId]) return false; // 已解锁
  
  const ach = ACHIEVEMENTS[achievementId];
  let progress = 0;
  
  // 根据成就类型获取进度
  switch(achievementId) {
    // 战斗成就
    case 'battle_1': case 'battle_2': case 'battle_3': case 'battle_4':
      progress = G.stats.totalKills;
      break;
    case 'battle_5': case 'battle_6':
      progress = G.pveMaxStreak || 0;
      break;
    case 'battle_7': case 'battle_8': case 'battle_9': case 'battle_10':
      progress = G.stats.maxStageReached;
      break;
    // 英雄成就
    case 'hero_1': case 'hero_2': case 'hero_3':
      progress = G.stats.totalHeroesRecruited;
      break;
    case 'hero_4':
      progress = G.heroes.some(h => h.quality === 'rare') ? 1 : 0;
      break;
    case 'hero_5':
      progress = G.heroes.some(h => h.quality === 'epic') ? 1 : 0;
      break;
    case 'hero_6':
      progress = G.heroes.some(h => h.quality === 'legendary') ? 1 : 0;
      break;
    case 'hero_7':
      progress = G.heroes.some(h => h.quality === 'mythic') ? 1 : 0;
      break;
    case 'hero_8':
      progress = G.heroes.some(h => h.level >= 30) ? 1 : 0;
      break;
    case 'hero_9':
      progress = G.heroes.some(h => h.level >= 60) ? 1 : 0;
      break;
    case 'hero_10':
      progress = G.team.filter(s => s !== null).length;
      break;
    // 装备成就
    case 'equip_1': case 'equip_2': case 'equip_3':
      progress = G.stats.totalEquipmentForged;
      break;
    case 'equip_4':
      progress = G.equipment.length;
      break;
    case 'equip_5': case 'equip_6':
      progress = G.stats.totalEquipmentMerged;
      break;
    case 'equip_7':
      progress = checkSetCollection() ? 1 : 0;
      break;
    // 建设成就
    case 'build_1': case 'build_2':
      progress = G.buildings.tavern || 0;
      break;
    case 'build_3':
      progress = G.buildings.farm || 0;
      break;
    case 'build_4':
      progress = G.buildings.mine || 0;
      break;
    case 'build_5':
      progress = (G.buildings.blacksmith || 0) >= 1 ? 1 : 0;
      break;
    case 'build_6':
      progress = (G.buildings.temple || 0) >= 1 ? 1 : 0;
      break;
    case 'build_7':
      progress = (G.buildings.arena || 0) >= 1 ? 1 : 0;
      break;
    case 'build_8':
      const hasAll = ['tavern', 'farm', 'mine', 'blacksmith', 'temple', 'arena'].every(b => (G.buildings[b] || 0) >= 1);
      progress = hasAll ? 1 : 0;
      break;
    // 竞技成就
    case 'arena_1':
      progress = (G.arenaState.totalWins + G.arenaState.totalLosses) > 0 ? 1 : 0;
      break;
    case 'arena_2': case 'arena_3': case 'arena_4':
      progress = G.arenaState.totalWins || 0;
      break;
    case 'arena_5':
      progress = G.arenaState.maxWinStreak || 0;
      break;
    case 'arena_6':
      progress = G.arenaState.highestDifficulty === 'hard' || G.arenaState.highestDifficulty === 'nightmare' || G.arenaState.highestDifficulty === 'mythic' ? 1 : 0;
      break;
    case 'arena_7':
      progress = G.arenaState.highestDifficulty === 'nightmare' || G.arenaState.highestDifficulty === 'mythic' ? 1 : 0;
      break;
    // 特殊成就
    case 'special_1':
      progress = G.dailyBonusClaimed ? 1 : 0;
      break;
    case 'special_2':
      progress = G.stats.totalGoldEarned;
      break;
    case 'special_3':
      progress = G.stats.totalGemsEarned;
      break;
    case 'special_4':
      const hasCodex = Object.keys(G.codex.heroes).length > 0 || Object.keys(G.codex.equipment).length > 0 || Object.keys(G.codex.monsters).length > 0;
      progress = hasCodex ? 1 : 0;
      break;
    case 'special_5':
      progress = G.achievements.progress.mutationTriggered ? 1 : 0;
      break;
  }
  
  // 保存进度
  G.achievements.progress[achievementId] = progress;
  
  // 检查是否达成
  if (progress >= ach.target) {
    unlockAchievement(achievementId);
    return true;
  }
  return false;
}

// 检查是否集齐任意套装
function checkSetCollection() {
  for (const setId in EQUIP_SETS) {
    const set = EQUIP_SETS[setId];
    const ownedPieces = set.pieces.filter(pieceId => 
      G.equipment.some(e => e.templateId === pieceId)
    ).length;
    if (ownedPieces >= 3) return true;
  }
  return false;
}

// 解锁成就
function unlockAchievement(achievementId) {
  if (G.achievements.unlocked[achievementId]) return;
  
  G.achievements.unlocked[achievementId] = Date.now();
  const ach = ACHIEVEMENTS[achievementId];

  saveGame();
}

// 格式化奖励显示
function formatReward(reward) {
  const icons = { gold: '💰', gems: '💎', expPotion: '🧪', iron: '⛏️', stone: '🪨', fame: '🏆' };
  return Object.entries(reward).map(([type, amount]) => 
    `<span style="color:var(--gold);font-weight:bold">${icons[type] || ''} ${amount}</span>`
  ).join('');
}

// 领取成就奖励
function claimAchievementReward(achievementId) {
  const ach = ACHIEVEMENTS[achievementId];
  if (!ach || !G.achievements.unlocked[achievementId]) return;
  
  // 标记已领取（使用特殊标记）
  if (typeof G.achievements.unlocked[achievementId] === 'number') {
    G.achievements.unlocked[achievementId] = { unlockedAt: G.achievements.unlocked[achievementId], claimed: true };
  }
  
  // 发放奖励
  const r = ach.reward;
  if (r.gold) G.resources.gold = Math.min((G.resources.gold || 0) + r.gold, RESOURCE_LIMITS.gold);
  if (r.gems) G.resources.gems = Math.min((G.resources.gems || 0) + r.gems, RESOURCE_LIMITS.gems);
  if (r.expPotion) G.resources.expPotion = Math.min((G.resources.expPotion || 0) + r.expPotion, RESOURCE_LIMITS.expPotion);
  if (r.iron) G.resources.iron = Math.min((G.resources.iron || 0) + r.iron, RESOURCE_LIMITS.iron);
  if (r.stone) G.resources.stone = Math.min((G.resources.stone || 0) + r.stone, RESOURCE_LIMITS.stone);
  if (r.fame) G.resources.fame = (G.resources.fame || 0) + r.fame;
  
  G.achievements.totalClaimed++;
  updateResourceBar();
  saveGame();
  
  showToast(`🎉 领取奖励: ${formatRewardText(r)}`);
}

// 格式化奖励文本
function formatRewardText(reward) {
  const names = { gold: '金币', gems: '宝石', expPotion: '经验药水', iron: '铁矿', stone: '石材', fame: '声望' };
  return Object.entries(reward).map(([type, amount]) => `${names[type] || type}×${amount}`).join(', ');
}

// 批量检查所有成就（用于初始化或重大事件后）
function checkAllAchievements() {
  let unlockedCount = 0;
  for (const id in ACHIEVEMENTS) {
    if (checkAchievement(id)) unlockedCount++;
  }
  if (unlockedCount > 0) {
    showToast(`🎉 解锁了 ${unlockedCount} 个新成就！`);
  }
  return unlockedCount;
}

// 更新统计数据（在相关操作时调用）
function updateStat(type, value) {
  if (!G.stats) G.stats = {};
  switch(type) {
    case 'kills':
      G.stats.totalKills = (G.stats.totalKills || 0) + value;
      checkAchievement('battle_1'); checkAchievement('battle_2'); checkAchievement('battle_3'); checkAchievement('battle_4');
      break;
    case 'heroRecruited':
      G.stats.totalHeroesRecruited = (G.stats.totalHeroesRecruited || 0) + value;
      checkAchievement('hero_1'); checkAchievement('hero_2'); checkAchievement('hero_3');
      break;
    case 'equipmentForged':
      G.stats.totalEquipmentForged = (G.stats.totalEquipmentForged || 0) + value;
      checkAchievement('equip_1'); checkAchievement('equip_2'); checkAchievement('equip_3');
      break;
    case 'equipmentMerged':
      G.stats.totalEquipmentMerged = (G.stats.totalEquipmentMerged || 0) + value;
      checkAchievement('equip_5'); checkAchievement('equip_6');
      break;
    case 'goldEarned':
      G.stats.totalGoldEarned = (G.stats.totalGoldEarned || 0) + value;
      checkAchievement('special_2');
      break;
    case 'gemsEarned':
      G.stats.totalGemsEarned = (G.stats.totalGemsEarned || 0) + value;
      checkAchievement('special_3');
      break;
    case 'stageReached':
      if (value > (G.stats.maxStageReached || 1)) {
        G.stats.maxStageReached = value;
        checkAchievement('battle_7'); checkAchievement('battle_8'); checkAchievement('battle_9'); checkAchievement('battle_10');
      }
      break;
    case 'mutation':
      G.achievements.progress.mutationTriggered = true;
      checkAchievement('special_5');
      break;
  }
}

const HERO_TRAITS = [
  {id:'brave',     name:'勇猛',       icon:'🦁', desc:'攻击力+8%',           stat:'atk', mult:1.08},
  {id:'tough',     name:'坚韧',       icon:'🛡️', desc:'防御力+8%',           stat:'def', mult:1.08},
  {id:'swift',     name:'敏捷',       icon:'💨', desc:'速度+10%',            stat:'spd', mult:1.10},
  {id:'vital',     name:'活力',       icon:'💪', desc:'生命值+10%',          stat:'maxHP', mult:1.10},
  {id:'wise',      name:'睿智',       icon:'🧠', desc:'MP+15%',              stat:'maxMP', mult:1.15},
  {id:'berserker', name:'狂战士',     icon:'😡', desc:'暴击率+8%',           stat:'critRate', add:0.08},
  {id:'nimble',    name:'灵动',       icon:'🦶', desc:'闪避率+8%',           stat:'dodgeRate', add:0.08},
  {id:'giant',     name:'巨人血统',   icon:'🩸', desc:'生命+20%，速度-10%',  stat:'maxHP', mult:1.20, bonus:{spd:{mult:0.90}}},
  {id:'lucky',     name:'幸运儿',     icon:'🍀', desc:'战斗奖励+15%',        stat:'rewardBonus', add:0.15},
  {id:'vampire',   name:'吸血鬼',     icon:'🦇', desc:'攻击伤害5%吸血',      stat:'lifesteal', add:0.05},
  {id:'tactician', name:'战术大师',   icon:'🎯', desc:'经验获取+20%',        stat:'expBonus', add:0.20},
  {id:'ironWill',  name:'钢铁意志',   icon:'⚡', desc:'被控制时间减半',      stat:'ccResist', add:0.50},
];
function assignTraits(hero){
  // 品质高的英雄获得更多特质
  const tCount = hero.quality==='mythic'?2:hero.quality==='legendary'?2:hero.quality==='epic'?rand(1,2):rand(0,1);
  const assigned = [];
  const pool = [...HERO_TRAITS];
  for(let i=0;i<tCount&&pool.length>0;i++){
    const idx=rand(0,pool.length-1);
    assigned.push(pool.splice(idx,1)[0]);
  }
  hero.traits = assigned;
  // 应用特质对属性的影响
  applyTraits(hero);
}
function applyTraits(hero){
  if(!hero.traits) return;
  for(const trait of hero.traits){
    if(trait.stat && trait.mult){
      const key=trait.stat;
      if(hero[key]!==undefined) hero[key]=Math.floor(hero[key]*trait.mult);
    }
    if(trait.bonus){
      for(const [bk,bv] of Object.entries(trait.bonus)){
        if(hero[bk]!==undefined && bv.mult) hero[bk]=Math.floor(hero[bk]*bv.mult);
      }
    }
  }
}
function getTraitEffect(trait){
  if(!trait) return '';
  // 战斗内生效的特质（不体现在属性面板）
  if(trait.id==='lucky'||trait.id==='vampire'||trait.id==='tactician'||trait.id==='ironWill') return trait.icon+' '+trait.desc;
  return '';
}

// ==================== 英雄系统 ====================
function createHero(templateId,level=1){
  const tpl=HERO_TEMPLATES.find(t=>t.id===templateId);
  if(!tpl)return null;
  const role=ROLES[tpl.role];
  const qm=QUALITY_MULT[tpl.quality];
  const hero={
    uid: ++G.heroIdCounter,
    id:tpl.id, name:tpl.name, icon:tpl.icon,
    role:tpl.role, quality:tpl.quality,
    level:level, exp:0,
    maxHP: calcStat(role.baseHP, qm, level),
    hp:0,
    atk: calcStat(role.baseATK, qm, level),
    def: calcStat(role.baseDEF, qm, level),
    spd: calcStat(role.baseSPD, qm, level),
    maxMP: calcStat(role.baseMP, qm, level),
    mp:0,
    skills: [...tpl.skills],
    equipment:{weapon:null,armor:null,accessory:null},
    lore: tpl.lore,
    bonusSkills:[],
    deathDefyUsed: false,
    talents: {},           // 已分配的天赋点 {talentId: points}
    talentPoints: 0,       // 可用天赋点
  };
  hero.hp=hero.maxHP;
  hero.mp=hero.maxMP;
  // 分配随机特质
  assignTraits(hero);
  return hero;
}

function triggerExploreEvent(logFn){
  // 30%概率触发探索事件
  if(Math.random()>0.30) return false;
  G.exploreStats.totalEvents++;
  // 加权随机选择事件
  var totalWeight=EXPLORE_EVENTS.reduce(function(s,e){return s+e.weight},0);
  var r=Math.random()*totalWeight;
  var acc=0;
  var event=EXPLORE_EVENTS[0];
  for(var i=0;i<EXPLORE_EVENTS.length;i++){
    acc+=EXPLORE_EVENTS[i].weight;
    if(r<acc){event=EXPLORE_EVENTS[i];break}
  }
  var result=event.effect();
  if(logFn){
    logFn('\n🌟 探索事件: '+event.icon+' '+event.name,'title');
    logFn('  '+event.desc,'info');
    logFn('  '+result,'skill');
  }
  saveGame();
  return true;
}
