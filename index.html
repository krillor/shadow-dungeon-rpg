      return '<div class="battle-unit ally-unit '+(u.alive?'':'dead')+'" data-battle-uid="'+u.name+'-'+u.icon+'">'
        +'<div class="unit-avatar-wrap">'
        +'<div class="unit-role-icon">'+roleIcon+'</div>'
        +'<div class="unit-avatar quality-'+u.hero.quality+'">'+u.icon+'</div>'
        +'<div class="unit-level">'+u.hero.level+'</div>'
        +'</div>'
        +'<div class="unit-name">'+u.name+'</div>'
        +'<div class="unit-bars">'
        +'<div class="unit-bar"><span class="unit-bar-label">HP</span><div class="unit-bar-track"><div class="unit-bar-fill hp '+(isLow?'low':'')+'" style="width:'+hpPct+'%"></div></div><span class="unit-bar-val">'+Math.max(0,u.hp)+'/'+u.maxHP+'</span></div>'
        +'<div class="unit-bar"><span class="unit-bar-label">MP</span><div class="unit-bar-track"><div class="unit-bar-fill mp" style="width:'+mpPct+'%"></div></div><span class="unit-bar-val">'+u.mp+'/'+u.maxMP+'</span></div>'
        +(u.shield>0?'<div class="unit-bar unit-shield-bar"><span class="unit-bar-label" style="color:#54a0ff">🛡</span><div class="unit-bar-track"><div class="unit-bar-fill shield-bar" style="width:'+shieldPct+'%"></div></div><span class="unit-bar-val" style="color:#54a0ff">'+u.shield+'</span></div>':'')
        +'</div>'
        +'<div class="unit-buffs">'+buffsHTML+dotsHTML+'</div>'
        +'</div>';
    }).join('');
    enemyTeamEl.innerHTML=enemyUnits.map(function(u){
      var hpPct=Math.max(0,(u.maxHP>0?u.hp/u.maxHP:0)*100);
      var shieldPct=u.maxHP>0?Math.min(100,(u.shield/u.maxHP)*100):0;
      var isLow=hpPct<30;
      var roleIcon=ROLES[u.hero.role]?ROLES[u.hero.role].icon:'⚔️';
      var buffsHTML=u.buffs.map(function(b){
        var isPos=b.mult>1||b.stat==='taunt'||b.stat==='dodge'||b.stat==='reflect'||b.stat==='stun';
        return '<span class="buff-tag '+(isPos?'buff-positive':'buff-negative')+'">'+(b.name||b.stat)+(b.duration>0?'('+b.duration+')':'')+'</span>';
      }).join('');
      var dotsHTML=u.dot.map(function(d){return '<span class="buff-tag buff-dot">'+d.name+'('+d.duration+')</span>'}).join('');
      return '<div class="battle-unit enemy-unit '+(u.alive?'':'dead')+'" data-battle-uid="'+u.name+'-'+u.icon+'">'
        +'<div class="unit-avatar-wrap">'
        +'<div class="unit-role-icon">'+roleIcon+'</div>'
        +'<div class="unit-avatar quality-'+u.hero.quality+'">'+u.icon+'</div>'
        +'<div class="unit-level">'+u.hero.level+'</div>'
        +'</div>'
        +'<div class="unit-name">'+u.name+'</div>'
        +'<div class="unit-bars">'
        +'<div class="unit-bar"><span class="unit-bar-label">HP</span><div class="unit-bar-track"><div class="unit-bar-fill hp '+(isLow?'low':'')+'" style="width:'+hpPct+'%"></div></div><span class="unit-bar-val">'+Math.max(0,u.hp)+'/'+u.maxHP+'</span></div>'
        +(u.shield>0?'<div class="unit-bar unit-shield-bar"><span class="unit-bar-label" style="color:#54a0ff">🛡</span><div class="unit-bar-track"><div class="unit-bar-fill shield-bar" style="width:'+shieldPct+'%"></div></div><span class="unit-bar-val" style="color:#54a0ff">'+u.shield+'</span></div>':'')
        +'</div>'
        +'<div class="unit-buffs">'+buffsHTML+dotsHTML+'</div>'
        +'</div>';
    }).join('');
  }
  
  renderTeams();
  
  // 战斗主循环
  var round=0;
  var maxRounds=50;
  
  while(G_battleRunning&&round<maxRounds){
    if(G_battlePaused){await sleep(200);continue}
    round++;
    if(roundEl)roundEl.textContent=round;
    log('=== 第 '+round+' 回合 ===','round');
    
    // 回合开始处理
    // 羁绊回血回蓝
    for(var bu=0;bu<playerUnits.length;bu++){
      var pu=playerUnits[bu];
      if(!pu.alive) continue;
      if(pu._bondRegen && pu._bondRegen>0){
        var regenHp=Math.floor(pu.maxHP*pu._bondRegen);
        if(regenHp>0){pu.hp=Math.min(pu.hp+regenHp,pu.maxHP);}
      }
      if(pu._bondMpRegen && pu._bondMpRegen>0){
        var regenMp=Math.floor(pu.maxMP*pu._bondMpRegen);
        if(regenMp>0){pu.mp=Math.min(pu.mp+regenMp,pu.maxMP);}
      }
    }
    for(var i=0;i<allUnits.length;i++){
      var u=allUnits[i];
      if(!u.alive)continue;
      // DOT伤害
      if(u.dot&&u.dot.length>0){
        u.dot=u.dot.filter(function(d){
          var dotDmg=d.dmg;
          if(d.sourceRole==='warlock')dotDmg=Math.floor(dotDmg*1.5);
          u.hp=Math.max(0,u.hp-dotDmg);
          log(u.icon+u.name+' 受到 '+d.name+'，损失 '+dotDmg+' 生命','debuff');
          showFloat(u,'-'+dotDmg+' '+d.name,'damage');
          animUnit(u,'hit',300);
          recordBattleStat(u,'damageTaken',dotDmg);
          if(u.hp<=0){u.alive=false;log(u.icon+' '+u.name+' 倒下了...','death');animUnit(u,'dying',700)}
          d.duration--;
          return d.duration>0;
        });
      }
      // BUFF持续时间
      if(u.buffs&&u.buffs.length>0){
        u.buffs.forEach(function(b){if(b.duration)b.duration--});
        u.buffs=u.buffs.filter(function(b){return b.duration===undefined||b.duration>0});
      }
      // 冷却
      if(u.cooldowns){
        for(var skillId in u.cooldowns){
          if(u.cooldowns[skillId]>0)u.cooldowns[skillId]--;
        }
      }
      // 装备特殊技能触发 - 回合开始 turnStart
      checkEquipSpecialSkill(u,'turnStart',null,allUnits);
      // ===== 合成事件战斗效果 =====
      // 暗影侵蚀：每回合20%概率失控攻击队友
      if(!u.isEnemy && u.hero && u.hero.isShadowCursed && Math.random() < (u.hero.shadowCurseChance || 0.2)){
        var allies = allUnits.filter(function(a){ return !a.isEnemy && a.alive && a.uid !== u.uid; });
        if(allies.length > 0){
          var victim = allies[Math.floor(Math.random() * allies.length)];
          var betrayDmg = Math.floor(u.atk * 0.8);
          victim.hp = Math.max(0, victim.hp - betrayDmg);
          log('🌑 '+u.icon+u.name+' 暗影侵蚀发作！失控攻击了队友 '+victim.icon+victim.name+'，造成 '+betrayDmg+' 伤害！','debuff');
          showFloat(victim,'🌑-'+betrayDmg,'damage');
          animUnit(victim,'hit',300);
          if(victim.hp <= 0){ victim.alive = false; log(victim.icon+' '+victim.name+' 被队友击杀...','death'); animUnit(victim,'dying',700); }
        }
      }
      // 吟游诗人：全队士气+5%（首次回合给全队加buff）
      if(!u.isEnemy && u.hero && u.hero.isBard && u.hero.bardMorale && !u._bardBuffApplied){
        u._bardBuffApplied = true;
        var moraleMult = u.hero.bardMorale;
        allUnits.filter(function(a){ return !a.isEnemy && a.alive; }).forEach(function(ally){
          ally.atk = Math.floor(ally.atk * (1 + moraleMult));
          ally.maxHP = Math.floor(ally.maxHP * (1 + moraleMult));
          ally.hp = Math.min(ally.hp + Math.floor(ally.maxHP * moraleMult), ally.maxHP);
        });
        log('🎵 '+u.icon+u.name+' 吟唱「'+u.hero.bardPoem.name+'」！全队士气+5%！','buff');
        showFloat(u,'🎵士气+5%','heal');
      }
    }
    
    // 按速度排序行动
    var turnOrder=allUnits.filter(function(u){return u.alive}).sort(function(a,b){return b.spd-a.spd});
    clearHighlight();
    
    for(var idx=0;idx<turnOrder.length;idx++){
      if(!G_battleRunning)break;
      if(G_battlePaused){await sleep(200);idx--;continue}
      
      var unit=turnOrder[idx];
      if(!unit||!unit.alive)continue;
      
      highlightUnit(unit);
      
      // 眩晕检查
      var stunBuff=unit.buffs.find(function(b){return b.stat==='stun'});
      if(stunBuff){
        log(unit.icon+' '+unit.name+' 处于眩晕状态，无法行动','debuff');
        showFloat(unit,'眩晕','debuff-text');
        continue;
      }
      
      // AI决策 - 使用smartChooseSkill
      var smartChoice=smartChooseSkill(unit,allUnits);
      if(smartChoice){
        var skillId=smartChoice.id;
        var chosenSkill=smartChoice.skill;
        
        // 扣除MP
        if(!(G_cheats.enabled && G_cheats.infiniteMP && !unit.isEnemy)){
          unit.mp-=chosenSkill.mpCost;
        }
        unit.cooldowns[skillId]=chosenSkill.cooldown;
        
        // 显示技能效果
        var effectClass='fire';
        if(chosenSkill.name.indexOf('冰')>=0||chosenSkill.name.indexOf('暴风雪')>=0)effectClass='ice';
        else if(chosenSkill.name.indexOf('暗')>=0||chosenSkill.name.indexOf('诅咒')>=0||chosenSkill.name.indexOf('灵魂')>=0)effectClass='dark';
        else if(chosenSkill.name.indexOf('圣')>=0||chosenSkill.name.indexOf('光')>=0||chosenSkill.name.indexOf('净化')>=0)effectClass='holy';
        else if(chosenSkill.name.indexOf('毒')>=0)effectClass='poison';
        else if(chosenSkill.type==='heal'||chosenSkill.type==='cleanse')effectClass='heal-effect';
        else if(chosenSkill.type==='shield')effectClass='shield-effect';
        
        showSkillEffect(chosenSkill.icon,chosenSkill.name,effectClass);
        showFloat(unit,chosenSkill.icon+chosenSkill.name,'skill-name');
        await sleep(400);
        
        var target=getValidTarget(unit,allUnits,chosenSkill.target);
        if(target){
          await executeSkillV2(unit,target,chosenSkill,allUnits,log);
        }
      }else{
        // 普通攻击
        var target=getValidTarget(unit,allUnits,'single_enemy');
        if(target){
          var r=calcDamage(unit,target,null);
          if(r.dodged){
            log(unit.icon+' '+unit.name+' 攻击 '+target.icon+target.name+'，但被闪避了！','info');
            showFloat(target,'闪避!','dodge');
            recordBattleStat(target,'dodge',1);
          }else{
            var dmg=r.dmg;
            if(target.shield>0){var absorbed=Math.min(target.shield,dmg);target.shield-=absorbed;dmg-=absorbed;if(absorbed>0)showFloat(target,'🛡-'+absorbed,'shield-num')}
            target.hp=Math.max(0,target.hp-dmg);
            log(unit.icon+' '+unit.name+' 攻击 '+target.icon+target.name+'，造成 '+dmg+' 点伤害'+(r.crit?' 💥暴击！':''),r.crit?'crit':'damage');
            showFloat(target,(r.crit?'💥':'')+dmg,r.crit?'crit':'damage');
            animUnit(target,'hit',300);
            // 暴击视觉特效
            if(r.crit){
              showFloat(target,'暴击!💥','crit-flash');
              const el=document.querySelector('.battle-unit .unit[data-uid="'+target.uid+'"]');
              if(el){el.classList.add('crit-hit');setTimeout(()=>el.classList.remove('crit-hit'),500)}
            }
            recordBattleStat(unit,'damage',dmg);
            recordBattleStat(target,'damageTaken',dmg);
            if(r.crit)recordBattleStat(unit,'crit',1);
            // 装备特殊技能触发
            checkEquipSpecialSkill(unit,'onAttack',target,allUnits);
            if(target.hp<=0){
              target.alive=false;log(target.icon+' '+target.name+' 倒下了...','death');animUnit(target,'dying',700);
              checkEquipSpecialSkill(unit,'onKill',target,allUnits);
            } else {
              checkEquipSpecialSkill(target,'onHit',unit,allUnits);
            }
          }
        }
      }

      renderTeams();
      updateBattleStatsBoard();
      await sleep(500/G_battleSpeed);
    }

    renderTeams();

    // 检查胜负
    var playerAlive=playerUnits.filter(function(u){return u.alive}).length;
    var enemyAlive=enemyUnits.filter(function(u){return u.alive}).length;
    
    if(playerAlive===0||enemyAlive===0){
      G_battleRunning=false;
      break;
    }
    
    await sleep(300/G_battleSpeed);
  }
  
  // 战斗结束 - 检查是否被中途退出打断
  if(!G.arenaBattleInfo){return;}
  
  var playerAlive=playerUnits.filter(function(u){return u.alive}).length;
  var enemyAlive=enemyUnits.filter(function(u){return u.alive}).length;
  var isWin=playerAlive>0&&enemyAlive===0;
  
  // 【关键】立即保存胜负结果和奖励，防止用户在 await 间隙点退出
  G.arenaIsWin=isWin;
  var reward=calculateArenaReward(G.arenaBattleInfo.opponents,G.arenaBattleInfo.difficulty,isWin);
  G.arenaReward=reward;
  
  await finishArenaBattle(isWin,playerUnits,enemyUnits,reward);
}

async function finishArenaBattle(isWin,playerUnits,enemyUnits,reward){
  // 保存胜负结果到全局
  G.arenaIsWin=isWin;
  G.arenaReward=reward;
  
  // 显示结算提示（通过Toast）
  if(isWin){
    // 发放奖励
    G.resources.gold=Math.min((G.resources.gold||0)+reward.gold,RESOURCE_LIMITS.gold);
    G.resources.fame=Math.min((G.resources.fame||0)+reward.fame,RESOURCE_LIMITS.fame);
    G.arenaState.totalGoldEarned=(G.arenaState.totalGoldEarned||0)+reward.gold;
    G.arenaState.totalFameEarned=(G.arenaState.totalFameEarned||0)+reward.fame;
    
    // 额外奖励
    var extras=reward.extras||{};
    var extraMsg='';
    if(extras.gems){
      G.resources.gems=Math.min((G.resources.gems||0)+extras.gems,RESOURCE_LIMITS.gems);
      extraMsg+=' 💎'+extras.gems;
    }
    if(extras.expPotion){
      G.resources.expPotion=Math.min((G.resources.expPotion||0)+extras.expPotion,RESOURCE_LIMITS.expPotion);
      extraMsg+=' 🧪'+extras.expPotion;
    }
    if(extras.iron){
      G.resources.iron=Math.min((G.resources.iron||0)+extras.iron,RESOURCE_LIMITS.iron);
      extraMsg+=' ⛏️'+extras.iron;
    }
    if(extras.stone){
      G.resources.stone=Math.min((G.resources.stone||0)+extras.stone,RESOURCE_LIMITS.stone);
      extraMsg+=' 🪨'+extras.stone;
    }
    
    // 突破材料奖励
    var materials=reward.materials||{};

      var mat=BREAKTHROUGH_MATERIALS[quality];
      if(mat){
        matMsg+=' '+mat.icon+materials[quality];
      }
    });
    
    showToast('🎉 竞技场胜利！💰'+reward.gold+' 🏆'+reward.fame+extraMsg+matMsg);
    updateResUI();
  }else{
    showToast('💀 竞技场失败...');
  }
  
  // 显示战斗结果面板（动画效果）+ 短暂延迟后自动回到竞技场
  var btnArea=document.getElementById('arena-battle-buttons');
  if(btnArea){
    var resultText=isWin?'<span class="text-gold" style="font-size:20px;font-weight:bold">🎉 竞技场胜利！</span>':'<span class="text-red" style="font-size:20px;font-weight:bold">💀 竞技场失败...</span>';
    var rewardText='';
    if(isWin){
      var extraStr='';
      var ex=reward.extras||{};
      if(ex.gems)extraStr+=' 💎'+ex.gems;
      if(ex.expPotion)extraStr+=' 🧪'+ex.expPotion;
      if(ex.iron)extraStr+=' ⛏️'+ex.iron;
      if(ex.stone)extraStr+=' 🪨'+ex.stone;
      // 突破材料
      var matStr='';
      var mats=reward.materials||{};
      Object.keys(mats).forEach(function(q){
        var m=BREAKTHROUGH_MATERIALS[q];
        if(m)matStr+=' '+m.icon+mats[q];
      });
      rewardText='<div style="text-align:center;margin:12px 0;color:#ffd700;font-size:16px">💰'+reward.gold+' 🏆'+reward.fame+extraStr+matStr+'</div>';
    }
    var streakText=isWin?'<div style="text-align:center;margin:8px 0;color:#2ed573">连胜: '+G.arenaState.winStreak+'</div>':'';
    btnArea.innerHTML='<div style="margin:20px 0;text-align:center;padding:20px;background:rgba(0,0,0,0.3);border-radius:10px">'+resultText+rewardText+streakText+'</div>';
  }
  
  // 【修复】奖励发放完毕后再存档，确保资源变化被正确保存
  updateResUI();
  saveGame();
  renderTeams();
  G_battleRunning=false;
  G_battlePaused=false;
  
  // 自动结算（延迟后返回竞技场）
  G.arenaSettleTimer=setTimeout(function(){
    showArenaResult();
  }, 1500);
}

function showArenaResult(){
  var info=G.arenaBattleInfo;
  if(!info)return;
  
  var difficulty=info.difficulty;
  var isWin=G.arenaIsWin;
  var reward=G.arenaReward||{gold:0,fame:0};
  
  // 更新状态
  G.arenaState.dailyChallengesUsed++;
  
  if(isWin){
    G.arenaState.winStreak++;
    if(G.arenaState.winStreak>(G.arenaState.maxWinStreak||0)){
      G.arenaState.maxWinStreak=G.arenaState.winStreak;
    }
    G.arenaState.totalWins++;
    // 记录最高难度
    var diffOrder=['easy','normal','hard','nightmare','mythic'];
    var curIdx=diffOrder.indexOf(G.arenaState.highestDifficulty||'easy');
    var thisIdx=diffOrder.indexOf(difficulty);
    if(thisIdx>curIdx)G.arenaState.highestDifficulty=difficulty;
    // 奖励已在 finishArenaBattle 中发放，这里不再重复
    
    // 自动提交排行榜数据
    if(isCloudReady){
      var teamPower=0;
      for(var i=0;i<G.team.length;i++){
        if(G.team[i]) teamPower += calcHeroPower(G.team[i]);
      }
      submitLeaderboard('arena',G.arenaState.totalWins,{winStreak:G.arenaState.winStreak});
      submitLeaderboard('power',teamPower,{heroes:G.heroes?G.heroes.length:0});
    }
    
    // 检查竞技场成就
    checkAchievement('arena_1');
    checkAchievement('arena_2');
    checkAchievement('arena_3');
    checkAchievement('arena_4');
    checkAchievement('arena_5');
    checkAchievement('arena_6');
    checkAchievement('arena_7');
  }else{
    G.arenaState.winStreak=0;
    G.arenaState.totalLosses++;
  }
  
  // 直接渲染竞技场页面（不通过switchTab）
  var contentEl=document.getElementById('content');
  if(contentEl){
    renderArena(contentEl);
  }
  
  // 计算战斗数据汇总
  var totalDamage=0,totalHeal=0,totalTaken=0,totalCrit=0,totalDodge=0;
  var maxDamageUnit='',maxDamage=0;
  for(var k in G_battleStats){
    var s=G_battleStats[k];
    totalDamage+=s.damage||0;
    totalHeal+=s.heal||0;
    totalTaken+=s.damageTaken||0;
    totalCrit+=s.crit||0;
    totalDodge+=s.dodge||0;
    if((s.damage||0)>maxDamage){
      maxDamage=s.damage;maxDamageUnit=s.icon+s.name;
    }
  }
  
  // 显示结果弹窗
  var diffNames={easy:'🟢简单',normal:'🟡普通',hard:'🔴困难'};
  var resultTitle=isWin?'🎉 竞技场胜利！':'💀 竞技场失败...';
  var resultContent=
    '<div style="text-align:center;margin:8px 0;font-size:12px">难度: '+diffNames[difficulty]+'</div>'+
    '<div style="text-align:center;font-size:18px;margin:16px 0">'+resultTitle+'</div>'+
    (isWin?
      '<div style="text-align:center;margin:8px 0">连胜: <b style="color:#2ed573">'+G.arenaState.winStreak+'</b></div>'+
      '<div style="text-align:center;margin:8px 0">奖励: <b style="color:#ffd700">💰'+reward.gold+'</b> <b style="color:#ff6b6b">🏆'+reward.fame+'</b></div>'
    :'<div style="text-align:center;margin:8px 0;color:var(--red)">连胜已重置</div>')+
    '<div style="margin-top:12px;padding:10px;background:rgba(0,0,0,0.3);border-radius:6px">'+
    '<div style="font-weight:bold;font-size:12px;margin-bottom:6px;color:var(--gold)">📊 战斗数据汇总</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px">'+
    '<span>⚔️ 总伤害: <b style="color:#ff6b6b">'+totalDamage+'</b></span>'+
    '<span>💥 暴击次数: <b style="color:#ff4757">'+totalCrit+'</b></span>'+
    '<span>💚 总治疗: <b style="color:#2ed573">'+totalHeal+'</b></span>'+
    '<span>💨 闪避次数: <b style="color:#70a1ff">'+totalDodge+'</b></span>'+
    '<span style="grid-column:span 2">🛡️ 总承伤: <b style="color:#ffa502">'+totalTaken+'</b></span>'+
    '<span style="grid-column:span 2;color:var(--text2)">🏅 最高输出: '+maxDamageUnit+' ('+maxDamage+')</span>'+
    '</div></div>';
  
  showModal('竞技场结果',resultContent,[{text:'确定',action:"closeModal()",cls:'btn-primary'}]);
  
  delete G.arenaBattleInfo;
  delete G.arenaIsWin;
  delete G.arenaReward;
  delete G.arenaBattleUnits;
  G.arenaSettleTimer=null;
}

function toggleArenaPause(){
  G_battlePaused=!G_battlePaused;
  // 查找控制栏中的暂停/继续按钮
  var allBtns=document.querySelectorAll('.panel .btn-group .btn');
  for(var i=0;i<allBtns.length;i++){
    var txt=allBtns[i].textContent;
    if(txt.indexOf('⏸️')>=0||txt.indexOf('▶️')>=0||txt.indexOf('暂停')>=0||txt.indexOf('继续')>=0){
      allBtns[i].textContent=G_battlePaused?'▶️ 继续':'⏸️ 暂停';
      allBtns[i].classList.toggle('btn-primary',G_battlePaused);
      break;
    }
  }
}

function exitArenaBattle(){
  // 清除自动结算定时器
  if(G.arenaSettleTimer){clearTimeout(G.arenaSettleTimer);G.arenaSettleTimer=null;}
  
  // 战斗还在进行中 → 根据实际战斗状态判断胜负
  if(G_battleRunning){
    var actualWin=false;
    if(G.arenaBattleUnits){
      var pAlive=G.arenaBattleUnits.playerUnits.filter(function(u){return u.alive}).length;
      var eAlive=G.arenaBattleUnits.enemyUnits.filter(function(u){return u.alive}).length;
      actualWin=pAlive>0&&eAlive===0;
    }
    if(actualWin){
      // 敌人都死了，是胜利，让 async runArenaBattle 自己检测并结算
      G_battleRunning=false;
      G_battlePaused=false;
      showToast('🎉 战斗胜利，正在结算...');
      return;
    }
    // 真的还在打或在失败边缘 → 确认退出视为失败
    if(!confirm('确定要退出竞技场战斗吗？\n此次挑战次数将扣除，并视为失败。'))return;
    G_battleRunning=false;
    G_battlePaused=false;
    _battleScene=null;
    G.arenaIsWin=false;
    G.arenaReward={gold:0,fame:0};
    showArenaResult();
    return;
  }
  
  // 战斗已自然结束 → 直接结算返回竞技场（信任已有的G.arenaIsWin）
  _battleScene=null;
  if(G.arenaBattleInfo){
    showArenaResult();
  }else{
    showToast('返回竞技场');
    var contentEl=document.getElementById('content');
    if(contentEl)renderArena(contentEl);
  }
}

function getHeroLevelCap(){
  // 直接返回最大等级120，不再依赖神殿等级
  return 120;
}

function getExpToLevel(level){return Math.floor(50*Math.pow(1.25,level-1))}

function addHeroExp(hero,amount){
  var levelCap=getHeroLevelCap();
  if(hero.level>=levelCap)return false;
  hero.exp+=amount;
  var leveled=false;
  var newTalentPoints=0;
  while(hero.exp>=getExpToLevel(hero.level)&&hero.level<levelCap){
    hero.exp-=getExpToLevel(hero.level);
    hero.level++;
    leveled=true;
    const role=ROLES[hero.role];const qm=QUALITY_MULT[hero.quality];
    // 记录升级前的比例
    var hpRatio=hero.maxHP>0?hero.hp/hero.maxHP:0;
    var mpRatio=hero.maxMP>0?hero.mp/hero.maxMP:0;
    // 重新计算基础属性（与当前属性取最大值，确保异变/隐藏品质加成不被覆盖）
    if(hero.isUnknown && hero.unknownTemplate && hero.unknownTemplate.hiddenStats){
      // 未知英雄：基于模板属性按等级缩放（模板属性视为Lv.1基准值）
      var hs=hero.unknownTemplate.hiddenStats;
      var lvlScale = 1 + 0.35 * Math.log(1 + hero.level); // 与calcStat相同的增长曲线
      hero.maxHP=Math.max(hero.maxHP, Math.floor(hs.maxHP * lvlScale));
      hero.atk=Math.max(hero.atk, Math.floor(hs.atk * lvlScale));
      hero.def=Math.max(hero.def, Math.floor(hs.def * lvlScale));
      hero.spd=Math.max(hero.spd, Math.floor(hs.spd * lvlScale));
      hero.maxMP=Math.max(hero.maxMP, Math.floor(hs.maxMP * lvlScale));
    }else{
      hero.maxHP=Math.max(hero.maxHP, calcStat(role.baseHP, qm, hero.level));
      hero.atk=Math.max(hero.atk, calcStat(role.baseATK, qm, hero.level));
      hero.def=Math.max(hero.def, calcStat(role.baseDEF, qm, hero.level));
      hero.spd=Math.max(hero.spd, calcStat(role.baseSPD, qm, hero.level));
      hero.maxMP=Math.max(hero.maxMP, calcStat(role.baseMP, qm, hero.level));
    }
    // 保持HP/MP比例（满血升级保持满血，残血升级按比例恢复）
    hero.hp=Math.max(1,Math.floor(hero.maxHP*hpRatio));
    hero.mp=Math.floor(hero.maxMP*mpRatio);
    // 升级获得天赋点：50级后开放，51-65级获得15点
    if(hero.level>TALENT_CONFIG.unlockLevel && hero.level<=(TALENT_CONFIG.unlockLevel+TALENT_CONFIG.maxPoints)){
      newTalentPoints++;
    }
  }
  // 超出上限的经验清零
  if(hero.level>=levelCap)hero.exp=0;
  // 如果有获得天赋点，显示提示
  if(newTalentPoints>0){
    hero.talentPoints=(hero.talentPoints||0)+newTalentPoints;
    showToast('🌟 '+hero.name+' 获得 '+newTalentPoints+' 点天赋点！');
  }
  return leveled;
}

function createBattleUnit(hero,isEnemy=false){

  G_battleUnitIdCounter++;
  return{

    buffs:[], cooldowns:{},
    dot:[], // 持续伤害
    bonusSkills: hero.bonusSkills||[],
  };
}

function calcDamage(attacker,defender,skill=null,skillIdx=-1){
  // 变异技能增幅：伤害+50%，治疗+40%，护盾+40%
  var isMutatedSkill=false;
  if(skill && attacker.hero && attacker.hero.mutatedSkills && attacker.hero.mutatedSkills.length>0){
    var allSkillIds=[].concat(attacker.hero.skills,attacker.hero.bonusSkills);
    if(skillIdx>=0){
      isMutatedSkill=attacker.hero.mutatedSkills.indexOf(skillIdx)>=0;
    }else{
      // 通过skill id查找索引
      for(var mi=0;mi<allSkillIds.length;mi++){
        if(allSkillIds[mi]===skill.id||allSkillIds[mi]===skill.name){
          isMutatedSkill=attacker.hero.mutatedSkills.indexOf(mi)>=0;
          break;
        }
      }
    }
  }
  // 金手指：一击必杀（玩家攻击时）
  if(G_cheats.enabled && G_cheats.oneHitKill && !attacker.isEnemy){
    return{dmg:999999,crit:true,dodged:false};
  }
  // 金手指：无敌（玩家受击时）
  if(G_cheats.enabled && G_cheats.godMode && !defender.isEnemy){
    return{dmg:0,crit:false,dodged:true};
  }
  let atk=attacker.atk;
  let def=defender.def;
  
  // 获取职业数据
  const attackerRole=ROLES[attacker.role];
  const defenderRole=ROLES[defender.role];
  
  // buff/debuff
  attacker.buffs.forEach(b=>{if(b.stat==='atk')atk=Math.floor(atk*b.mult)});
  defender.buffs.forEach(b=>{if(b.stat==='def')def=Math.floor(def*b.mult)});
  
  // ===== 职业机制 =====
  
  // 战士：狂怒 - 生命值低于30%时攻击力提升50%
  if(attacker.role==='warrior' && (attacker.maxHP>0?attacker.hp/attacker.maxHP:0)<0.3){
    atk=Math.floor(atk*1.5);
  }
  
  // 守护者：铁壁 - 受到伤害减少20%
  if(defender.role==='guardian'){
    def=Math.floor(def*1.2);
  }
  
  // 法师：奥术精通 - 技能伤害提升30%
  if(attacker.role==='mage' && skill){
    atk=Math.floor(atk*1.3);
  }
  
  // 游侠：精准 - 攻击无视目标20%防御
  if(attacker.role==='ranger'){
    def=Math.floor(def*0.8);
  }
  
  // 圣骑士：对亡灵伤害+50%
  if(attacker.role==='paladin' && defender.isUndead){
    atk=Math.floor(atk*1.5);
  }
  
  // 术士：DOT伤害+50%（在executeSkill中处理）
  
  // 基因突变：使用突变获得的被动技能
  if(attacker.hero && attacker.hero.isGeneMutation && attacker.hero.geneMutatedPassive){
    var gp = attacker.hero.geneMutatedPassive;
    // 狂怒（战士被动）：生命低于30%时攻击+50%
    if(gp.name === '狂怒' && (attacker.maxHP>0?attacker.hp/attacker.maxHP:0) < 0.3) atk=Math.floor(atk*1.5);
    // 奥术精通（法师被动）：技能伤害+30%
    if(gp.name === '奥术精通' && skill) atk=Math.floor(atk*1.3);
    // 暗影步（刺客被动）：闪避+25%（在闪避判定中处理）
    // 精准（游侠被动）：攻击无视20%防御
    if(gp.name === '精准') def=Math.floor(def*0.8);
    // 灵魂虹吸（术士被动）：伤害15%转化为生命
    // 生命链接（治愈者被动）：治疗+40%（在治疗技能中处理）
    // 圣光庇护（圣骑士被动）：致命伤害保留1HP（在受击判定中处理）
    // 铁壁（守护者被动）：受伤-20%
    if(gp.name === '铁壁') def=Math.floor(def*1.2);
  }
  
  // 基因突变被动（防御者）
  if(defender.hero && defender.hero.isGeneMutation && defender.hero.geneMutatedPassive){
    var gp2 = defender.hero.geneMutatedPassive;
    if(gp2.name === '铁壁') def=Math.floor(def*1.2);
  }
  
  // 基础伤害计算
  let mult=skill?skill.mult:1.0;
  // 变异技能伤害增幅 +50%
  if(isMutatedSkill) mult*=1.5;
  let dmg=Math.max(1,Math.floor((atk*mult-def*0.5)*(0.9+Math.random()*0.2)));
  
  // 暴击计算（考虑职业暴击率 + 英雄特质暴击率）
  let crit=false;
  let critRate=attackerRole&&attackerRole.critRate?attackerRole.critRate:0.1;
  if(skill&&skill.critBonus)critRate+=skill.critBonus;
  // 英雄特质：狂战士 +8%暴击
  if(attacker.traits) attacker.traits.forEach(t=>{if(t.id==='berserker')critRate+=0.08});
  // 金手指模式下暴击率提升
  if(G_cheats.enabled) critRate+=0.1;
  
  // 刺客：暗影步 - 暴击伤害+50%
  let critDmg=attackerRole&&attackerRole.critDmg?attackerRole.critDmg:1.8;
  
  // 羁绊暴击加成（上限95%）
  if(attacker._bondCritRate) critRate+=attacker._bondCritRate;
  critRate=Math.min(0.95,Math.max(0,critRate)); // 限制在0-95%
  if(attacker._bondCritDmg) critDmg+=attacker._bondCritDmg;
  
  if(Math.random()<critRate){dmg=Math.floor(dmg*critDmg);crit=true}
  
  // 闪避计算（考虑职业闪避率 + 英雄特质闪避率，上限80%）
  let dodgeChance=defenderRole&&defenderRole.dodgeRate?defenderRole.dodgeRate:0.05;
  defender.buffs.forEach(b=>{if(b.stat==='dodge')dodgeChance+=0.3});
  if(defender._dodgeBonus)dodgeChance+=defender._dodgeBonus;
  // 英雄特质：灵动 +8%闪避
  if(defender.traits) defender.traits.forEach(t=>{if(t.id==='nimble')dodgeChance+=0.08});
  // 羁绊闪避加成
  if(defender._bondDodge) dodgeChance+=defender._bondDodge;
  dodgeChance=Math.min(0.8,Math.max(0,dodgeChance)); // 限制在0-80%
  if(skill&&skill.alwaysHit)dodgeChance=0;
  if(Math.random()<dodgeChance)return{dmg:0,dodged:true,crit:false};
  
  // 关卡特性：物理/魔法抗性
  if(defender._physResist&&attacker.role!=='mage'&&attacker.role!=='warlock'&&attacker.role!=='healer'){
    dmg=Math.floor(dmg*(1-defender._physResist));
  }
  if(defender._magicResist&&(attacker.role==='mage'||attacker.role==='warlock'||attacker.role==='healer')){
    dmg=Math.floor(dmg*(1-defender._magicResist));
  }
  
  // 术士：灵魂虹吸 - 造成伤害的15%转化为生命恢复
  if(attacker.role==='warlock' && !attacker.isEnemy){
    const heal=Math.floor(dmg*0.15);
    attacker.hp=Math.min(attacker.maxHP,attacker.hp+heal);
  }
  // 英雄特质：吸血鬼 - 造成伤害的5%吸血
  if(attacker.traits) attacker.traits.forEach(t=>{
    if(t.id==='vampire'){
      const heal=Math.floor(dmg*0.05);
      attacker.hp=Math.min(attacker.maxHP,attacker.hp+heal);
    }
  });
  
  return{dmg,crit,dodged:false};
}

function getBattleDesc(type,attacker,target,skill){
  var tpl='';
  if(type==='skill'&&skill&&BATTLE_DESCRIPTIONS.skill[skill.id]){
    tpl=BATTLE_DESCRIPTIONS.skill[skill.id];
  }else if(BATTLE_DESCRIPTIONS[type]){
    tpl=pick(BATTLE_DESCRIPTIONS[type]);
  }
  if(!tpl)return '';
  return tpl.replace('{attacker}',attacker.icon+attacker.name).replace('{target}',target.icon+target.name);
}

// 连击追踪器
var G_comboCount={};
function getCombo(unit){return G_comboCount[unit.uid]||0}
function addCombo(unit){G_comboCount[unit.uid]=(G_comboCount[unit.uid]||0)+1;return G_comboCount[unit.uid]}
function resetCombo(unit){G_comboCount[unit.uid]=0}

function getValidTarget(unit,allUnits,targetType){
  const allies=allUnits.filter(u=>u.alive&&u.isEnemy===unit.isEnemy&&u!==unit);
  const enemies=allUnits.filter(u=>u.alive&&u.isEnemy!==unit.isEnemy);
  // 检查嘲讽
  if(targetType.includes('enemy')){
    const taunter=enemies.find(u=>u.buffs.some(b=>b.stat==='taunt'));
    if(taunter&&targetType==='single_enemy')return taunter;
  }
  switch(targetType){
    case 'single_enemy': return pick(enemies);
    case 'all_enemies': return enemies;
    case 'single_ally': return pick(allies.filter(u=>u.hp<u.maxHP))||pick(allies.length>0?allies:[unit]);
    case 'all_allies': return allUnits.filter(u=>u.alive&&u.isEnemy===unit.isEnemy);
    case 'self': return unit;
    default: return pick(enemies);
  }
}

async function executeSkill(user,target,skill,allUnits,logFn){
  const targets=Array.isArray(target)?target:[target];
  switch(skill.type){
    case 'damage':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const r=calcDamage(user,t,skill);
        if(r.dodged){logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，但 ${t.icon}${t.name} 闪避了！`,'info');return}
        let dmg=r.dmg;
        if(t.shield>0){const absorbed=Math.min(t.shield,dmg);t.shield-=absorbed;dmg-=absorbed}
        t.hp=Math.max(0,t.hp-dmg);
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name} 对 ${t.icon}${t.name} 造成 ${dmg} 点伤害${r.crit?' 💥暴击！':''}`,r.crit?'crit':'damage');
        if(skill.stunChance&&Math.random()<skill.stunChance){
          t.buffs.push({stat:'stun',duration:1,name:'眩晕'});
          logFn(`${t.icon}${t.name} 被眩晕了！`,'debuff');
        }
        if(skill.dot){
          t.dot.push({dmg:Math.floor(user.atk*skill.dot.dmgPct),duration:skill.dot.duration,name:'中毒'});
          logFn(`${t.icon}${t.name} 被施加了 ${skill.dot.name}！`,'debuff');
        }
        if(skill.debuff){
          const db=skill.debuff;
          if(db.stat==='all'){
            t.buffs.push({stat:'atk',mult:db.mult,duration:db.duration,name:'诅咒-攻'});
            t.buffs.push({stat:'def',mult:db.mult,duration:db.duration,name:'诅咒-防'});
          }else{
            t.buffs.push({stat:db.stat,mult:db.mult,duration:db.duration,name:'削弱'});
          }
          logFn(`${t.icon}${t.name} 被削弱了！`,'debuff');
        }
        if(t.hp<=0){t.alive=false;logFn(`${t.icon} ${t.name} 倒下了...`,'death')}
      });break;
    }
    case 'heal':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const heal=Math.floor(t.maxHP*skill.healPct);
        t.hp=Math.min(t.maxHP,t.hp+heal);
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，恢复 ${t.icon}${t.name} ${heal} 点生命`,'heal');
      });break;
    }
    case 'buff':{
      targets.forEach(t=>{
        if(!t.alive)return;
        t.buffs.push({...skill.buff,name:skill.name});
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，${t===user?'自身':'队友'}获得增益效果`,'buff');
      });break;
    }
    case 'shield':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const amt=Math.floor(t.maxHP*skill.shieldPct);
        t.shield+=amt;
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，为 ${t.icon}${t.name} 添加 ${amt} 点护盾`,'buff');
      });break;
    }
    case 'drain':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const r=calcDamage(user,t,skill);
        if(r.dodged){logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，但 ${t.icon}${t.name} 闪避了！`,'info');return}
        let dmg=r.dmg;
        if(t.shield>0){const absorbed=Math.min(t.shield,dmg);t.shield-=absorbed;dmg-=absorbed}
        t.hp=Math.max(0,t.hp-dmg);
        const healAmt=Math.floor(dmg*0.5);
        user.hp=Math.min(user.maxHP,user.hp+healAmt);
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，对 ${t.icon}${t.name} 造成 ${dmg} 伤害，恢复 ${healAmt} 生命`,'skill');
        if(t.hp<=0){t.alive=false;logFn(`${t.icon} ${t.name} 倒下了...`,'death')}
      });break;
    }
    case 'debuff':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const db=skill.debuff;
        if(db.stat==='all'){
          t.buffs.push({stat:'atk',mult:db.mult,duration:db.duration,name:'诅咒-攻'});
          t.buffs.push({stat:'def',mult:db.mult,duration:db.duration,name:'诅咒-防'});
        }else{
          t.buffs.push({stat:db.stat,mult:db.mult,duration:db.duration,name:'诅咒'});
        }
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，${t.icon}${t.name} 被诅咒了！`,'debuff');
      });break;
    }
    case 'cleanse':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const negCount=t.buffs.filter(b=>b.stat==='stun'||b.stat==='atk'&&b.mult<1||b.stat==='def'&&b.mult<1).length;
        t.buffs=t.buffs.filter(b=>!(b.stat==='stun'||(b.stat==='atk'&&b.mult<1)||(b.stat==='def'&&b.mult<1)));
        t.dot=[];
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，清除了 ${t.icon}${t.name} 的 ${negCount} 个负面效果`,'heal');
      });break;
    }
  }
}

// ==================== 智能战斗AI ====================
function smartChooseSkill(unit,allUnits){
  var role=unit.hero.role;
  var allies=allUnits.filter(function(u){return u.alive&&u.isEnemy===unit.isEnemy&&u!==unit});
  var enemies=allUnits.filter(function(u){return u.alive&&u.isEnemy!==unit.isEnemy});
  var allAlive=allUnits.filter(function(u){return u.alive});

  // 获取可用技能
  var available=[];
  var allSkillIds=[].concat(unit.hero.skills,unit.bonusSkills);
  allSkillIds.forEach(function(sid){
    var sk=SKILLS[sid];if(!sk)return;
    if(unit.mp<sk.mpCost)return;
    if(unit.cooldowns[sid]>0)return;
    available.push({id:sid,skill:sk});
  });
  if(available.length===0)return null;

  // 计算战场态势
  var allyHurtCount=allies.filter(function(a){return a.hp<a.maxHP*0.5}).length;
  var allyCriticalCount=allies.filter(function(a){return a.hp<a.maxHP*0.25}).length;
  var selfHurtPct=unit.hp/unit.maxHP;
  var enemyCount=enemies.length;
  var hasAllyDebuff=allies.some(function(a){return a.buffs.some(function(b){return b.stat==='stun'||(b.stat==='atk'&&b.mult<1)||(b.stat==='def'&&b.mult<1)})||a.dot.length>0});
  var hasEnemyBuff=enemies.some(function(e){return e.buffs.some(function(b){return b.stat==='taunt'})});
  var lowestAlly=null;var lowestPct=1;
  allies.concat([unit]).forEach(function(a){var p=a.hp/a.maxHP;if(p<lowestPct){lowestPct=p;lowestAlly=a}});
  var lowestEnemy=null;var lowestEnemyPct=1;
  enemies.forEach(function(e){var p=e.hp/e.maxHP;if(p<lowestEnemyPct){lowestEnemyPct=p;lowestEnemy=e}});

  // 按角色定位分策略
  if(role==='healer'){
    // 治愈者：复活>群体治疗>单体治疗>净化>祝福
    var deadAllies=allUnits.filter(function(a){return !a.alive&&a.isEnemy===unit.isEnemy});
    if(deadAllies.length>0&&allyCriticalCount<2){
      var rev=available.find(function(s){return s.skill.type==='revive'});
      if(rev)return rev;
    }
    if(allyCriticalCount>=2){
      var gh=available.find(function(s){return s.skill.type==='heal'&&s.skill.target==='all_allies'});
      if(gh)return gh;
    }
    if(allyHurtCount>0||selfHurtPct<0.6){
      var regen=available.find(function(s){return s.skill.type==='heal'&&s.skill.target==='single_ally'&&s.skill.healPct>=0.5});
      if(regen&&lowestPct<0.4)return regen;
      var heal=available.find(function(s){return s.skill.type==='heal'&&s.skill.target==='single_ally'});
      if(heal)return heal;
      var gh2=available.find(function(s){return s.skill.type==='heal'});
      if(gh2)return gh2;
    }
    if(hasAllyDebuff){
      var cleanse=available.find(function(s){return s.skill.type==='cleanse'});
      if(cleanse)return cleanse;
    }
    var blessing=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='def'});
    if(blessing&&!allies.some(function(a){return a.buffs.some(function(b){return b.name===blessing.skill.name})}))return blessing;
    return null;
  }

  if(role==='guardian'){
    // 守护者：嘲讽>铁壁>坚守>牺牲>盾击>大地震击
    if(!unit.buffs.some(function(b){return b.stat==='taunt'})){
      var taunt=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='taunt'});
      if(taunt&&enemyCount>1)return taunt;
    }
    if(allyHurtCount>=2){
      var iw=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='def'&&s.skill.target==='all_allies'});
      if(iw)return iw;
    }
    if(selfHurtPct<0.5){
      var fortify=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='def'&&s.skill.target==='self'&&s.skill.buff.mult>=1.5});
      if(fortify&&!unit.buffs.some(function(b){return b.name===fortify.skill.name}))return fortify;
    }
    if(lowestAlly&&lowestPct<0.4){
      var sac=available.find(function(s){return s.skill.type==='shield'&&s.skill.shieldPct>=0.4});
      if(sac)return sac;
    }
    var dmg=available.find(function(s){return s.skill.type==='damage'});
    if(dmg)return dmg;
    return null;
  }

  if(role==='paladin'){
    // 圣骑士：治疗>护盾>审判>圣光洗礼>圣光打击>神圣护甲
    if(allyCriticalCount>=2){
      var gh=available.find(function(s){return s.skill.type==='heal'&&s.skill.target==='all_allies'});
      if(gh)return gh;
    }
    if(lowestAlly&&lowestPct<0.4){
      var ds=available.find(function(s){return s.skill.type==='shield'&&s.skill.shieldPct>=0.3});
      if(ds)return ds;
      var heal=available.find(function(s){return s.skill.type==='heal'});
      if(heal)return heal;
    }
    if(selfHurtPct<0.5){
      var ha=available.find(function(s){return s.skill.type==='shield'&&s.skill.buff&&s.skill.buff.stat==='def'});
      if(ha&&!unit.buffs.some(function(b){return b.name===ha.skill.name}))return ha;
    }
    var judg=available.find(function(s){return s.skill.stunChance});
    if(judg)return judg;
    var atk=available.find(function(s){return s.skill.type==='damage'});
    if(atk)return atk;
    return null;
  }

  if(role==='mage'){
    // 法师：陨石>暴风雪>雷霆>火球>奥术护盾>魔力爆发
    if(enemyCount>=3){
      var aoe=available.find(function(s){return s.skill.type==='damage'&&s.skill.target==='all_enemies'&&s.skill.mult>=0.8});
      if(aoe)return aoe;
    }
    if(enemyCount>=2){
      var aoe2=available.find(function(s){return s.skill.type==='damage'&&s.skill.target==='all_enemies'});
      if(aoe2)return aoe2;
    }
    if(allyHurtCount>=2){
      var sh=available.find(function(s){return s.skill.type==='shield'});
      if(sh)return sh;
    }
    var singles=available.filter(function(s){return s.skill.type==='damage'&&s.skill.target==='single_enemy'});
    singles.sort(function(a,b){return b.skill.mult-a.skill.mult});
    if(singles.length>0)return singles[0];
    return null;
  }

  if(role==='assassin'){
    // 刺客：暗影步(低血量时)>烟幕弹>暗杀>毒刃>背刺>飞刀
    if(selfHurtPct<0.5){
      var ss=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='dodge'&&s.skill.target==='self'});
      if(ss)return ss;
    }
    if(allyHurtCount>=2){
      var smoke=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='dodge'&&s.skill.target==='all_allies'});
      if(smoke)return smoke;
    }
    var poison=available.find(function(s){return s.skill.dot});
    if(poison){
      var noDotEnemy=enemies.find(function(e){return e.dot.length===0});
      if(noDotEnemy)return poison;
    }
    var highDmg=available.filter(function(s){return s.skill.type==='damage'&&s.skill.mult>=1.5});
    highDmg.sort(function(a,b){return b.skill.mult-a.skill.mult});
    if(highDmg.length>0)return highDmg[0];
    var anyDmg=available.find(function(s){return s.skill.type==='damage'});
    if(anyDmg)return anyDmg;
    return null;
  }

  if(role==='warlock'){
    // 术士：灵魂锁链>诅咒>瘟疫>生命汲取>黑暗契约>灵魂灼烧
    var aoeDebuff=available.find(function(s){return s.skill.type==='debuff'&&s.skill.target==='all_enemies'});
    if(aoeDebuff){
      var noDebuff=enemies.find(function(e){return !e.buffs.some(function(b){return b.stat==='atk'&&b.mult<1})});
      if(noDebuff)return aoeDebuff;
    }
    var curse=available.find(function(s){return s.skill.type==='debuff'});
    if(curse){
      var noCurse=enemies.find(function(e){return !e.buffs.some(function(b){return b.stat==='atk'&&b.mult<1})});
      if(noCurse)return curse;
    }
    if(selfHurtPct<0.7){
      var drain=available.find(function(s){return s.skill.type==='drain'});
      if(drain)return drain;
    }
    var dot=available.find(function(s){return s.skill.dot});
    if(dot){
      var noDot=enemies.find(function(e){return e.dot.length===0});
      if(noDot)return dot;
    }
    var anyDmg=available.find(function(s){return s.skill.type==='damage'});
    if(anyDmg)return anyDmg;
    return null;
  }

  if(role==='ranger'){
    // 游侠：多重射击>箭雨>鹰眼>精准射击>毒箭>陷阱
    if(enemyCount>=3){
      var aoe=available.find(function(s){return s.skill.type==='damage'&&s.skill.target==='all_enemies'&&s.skill.mult>=0.7});
      if(aoe)return aoe;
    }
    if(enemyCount>=2){
      var aoe2=available.find(function(s){return s.skill.type==='damage'&&s.skill.target==='all_enemies'});
      if(aoe2)return aoe2;
    }
    if(!unit.buffs.some(function(b){return b.stat==='atk'&&b.mult>1})){
      var eagle=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='atk'});
      if(eagle)return eagle;
    }
    var aimed=available.find(function(s){return s.skill.type==='damage'&&s.skill.alwaysHit});
    if(aimed)return aimed;
    if(selfHurtPct<0.6&&!unit.buffs.some(function(b){return b.stat==='reflect'})){
      var trap=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='reflect'});
      if(trap)return trap;
    }
    var anyDmg=available.find(function(s){return s.skill.type==='damage'});
    if(anyDmg)return anyDmg;
    return null;
  }

  // 战士(默认)：战吼>狂暴>处决>旋风斩>盾击>铁血意志
  if(role==='warrior'){
    if(enemyCount>=2){
      var warCry=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='atk'&&s.skill.target==='all_allies'});
      if(warCry&&!allies.some(function(a){return a.buffs.some(function(b){return b.name===warCry.skill.name})}))return warCry;
    }
    var atkBuff=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='atk'&&s.skill.target==='self'});
    if(atkBuff&&!unit.buffs.some(function(b){return b.stat==='atk'&&b.mult>1})){
      if(enemyCount>=2||enemies.some(function(e){return e.hp>e.maxHP*0.5}))return atkBuff;
    }
    var exec=available.find(function(s){return s.skill.executeThreshold});
    if(exec&&enemies.some(function(e){return e.hp<e.maxHP*0.3}))return exec;
    if(enemyCount>=2){
      var aoe=available.find(function(s){return s.skill.type==='damage'&&s.skill.target==='all_enemies'});
      if(aoe)return aoe;
    }
    var dmg=available.find(function(s){return s.skill.type==='damage'});
    if(dmg)return dmg;
    return null;
  }

  // 兜底：优先伤害技能
  var anySkill=available.find(function(s){return s.skill.type==='damage'});
  if(anySkill)return anySkill;
  return available.length>0?available[0]:null;
}
